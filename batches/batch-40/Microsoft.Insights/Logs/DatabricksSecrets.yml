name: Log Analytics DatabricksSecrets table
description: A Log Analytics workspace table holding ingested Azure Databricks secret-scope audit log records (events about secret/scope access). Reading it is a data-plane operation that returns the stored log rows.
scope: MEDIUM
notes: Records audit metadata about secret usage (scope/key names, access events), not the secret values themselves.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Returns secret-scope access audit events, exposing secret/scope names and who accessed them — useful for targeting credentials — but not the secret values.
