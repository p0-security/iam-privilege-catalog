name: Log Analytics DeviceConnectSession table
description: A Log Analytics table (DeviceConnectSession) in an Azure Monitor workspace that stores collected device connection-session telemetry log records.
scope: MEDIUM
notes: "Monitoring/diagnostics data: confidential operational telemetry, not core production data, hence MEDIUM scope."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns DeviceConnectSession rows, allowing export of device connection/session telemetry that may reveal connectivity patterns.
