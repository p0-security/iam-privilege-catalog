name: Autoscale scale actions log table
description: A Log Analytics / Azure Monitor table holding autoscale scale-action log records (executed scaling operations). This is a monitoring/diagnostics data-plane asset.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Read of the AutoscaleScaleActionsLog table exports records of scaling actions revealing infrastructure elasticity patterns.
