name: Log Analytics DHAppFailure table
description: A Log Analytics table (DHAppFailure) in an Azure Monitor workspace that stores collected device-health application-failure telemetry log records.
scope: MEDIUM
notes: "Monitoring/diagnostics data: confidential operational telemetry, not core production data, hence MEDIUM scope."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns the DHAppFailure table, allowing export of application crash/failure diagnostic telemetry.
