name: Log Analytics DeviceHealth table
description: A Log Analytics table (DeviceHealth) in an Azure Monitor workspace that stores collected device health/status telemetry log records.
scope: MEDIUM
notes: "Monitoring/diagnostics data: confidential operational telemetry, not core production data, hence MEDIUM scope."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns the DeviceHealth table, allowing export of device health/status telemetry.
