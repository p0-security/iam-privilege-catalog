name: Log Analytics DeviceHardwareHealth table
description: A Log Analytics table (DeviceHardwareHealth) in an Azure Monitor workspace that stores collected device hardware-health telemetry log records.
scope: MEDIUM
notes: "Monitoring/diagnostics data: confidential operational telemetry, not core production data, hence MEDIUM scope."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns the DeviceHardwareHealth table, allowing export of hardware-health diagnostic telemetry.
