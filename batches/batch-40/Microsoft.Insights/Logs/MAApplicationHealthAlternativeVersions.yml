name: Log Analytics MAApplicationHealthAlternativeVersions table (Azure Migrate)
description: "A Log Analytics (Azure Monitor) table holding Azure Migrate application alternative-version health telemetry: software version/health details for discovered applications."
scope: MEDIUM
notes: Monitoring/assessment data plane; software-version inventory aids vulnerability targeting.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns alternative-version application health records, exporting log data (exfiltration:logs) and disclosing software version inventory useful for finding vulnerable components (discovery:infra).
