name: Log Analytics DatabricksInstancePools table
description: A Log Analytics workspace table holding ingested Azure Databricks instance-pool diagnostic log records. Reading it is a data-plane operation that returns the stored log rows.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry for a single analytics workload; not the primary data store itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Returns ingested instance-pool activity logs, letting an attacker export operational telemetry about Databricks compute pools.
