name: Sentinel analytics/alert rules
description: Microsoft Sentinel alert (analytics) rules are the detection logic of the SIEM, defining the queries and conditions that generate security alerts and incidents.
scope: HIGH
notes: These rules embody the organization's detection coverage; knowledge of them reveals exactly what is and is not monitored.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting alert rules removes detection coverage entirely, blinding the SOC to the corresponding attacker activity.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Updating alert rules lets an attacker weaken, disable, or alter detection logic so malicious activity goes unflagged, directly degrading the SIEM's defensive function.
