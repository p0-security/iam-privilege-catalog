name: Azure SQL Managed Instance private endpoint connection proxy
description: The private endpoint connection proxy sub-resource of an Azure SQL Managed Instance, representing the private-link connectivity plumbing that binds the managed database instance to private endpoints.
scope: HIGH
notes: Controls private network reachability of a production managed database instance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the connection proxy tears down a private-endpoint network connectivity component of the managed instance, disrupting legitimate private access (DoS-like network destruction).
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating the proxy can establish or alter a private-endpoint network path to the production managed instance, enabling network movement toward the database and mutating its connectivity configuration.
