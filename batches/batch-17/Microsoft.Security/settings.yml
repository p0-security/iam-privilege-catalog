name: Defender for Cloud settings
description: Microsoft Defender for Cloud settings are the scope-level (subscription) security configuration controlling Defender plans, threat-protection integrations (e.g. MCAS/WDATP), auto-provisioning, and data export.
scope: HIGH
notes: A subscription-wide security-governance configuration; toggling it affects defensive coverage across resources in scope.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:defense
    notes: Updating Defender for Cloud settings lets an attacker disable threat-protection integrations or auto-provisioning subscription-wide, broadly weakening detection and evading defenses.
