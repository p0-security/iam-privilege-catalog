name: Contextual service endpoint policy
description: A contextual service endpoint policy on a VNet subnet controls which Azure services subnet traffic is permitted to reach over service endpoints, acting as an egress/access-restriction control.
scope: HIGH
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the policy removes the egress access restriction enforced on the subnet, disabling a network defense mechanism.
  write:
    risks:
      - impact:manipulation
      - escalation:network
      - destruction:defense
    notes: Creating/updating the policy changes which services the subnet may reach, manipulating egress controls, widening reachable resources, and weakening an egress defense restriction.
