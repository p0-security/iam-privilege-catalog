name: P2S connection configuration proxies
description: A P2S Connection Configuration Proxy is a control-plane definition under a VPN Server Configuration's policy group that describes Point-to-Site VPN client connection configuration (routing/connectivity mapping for connecting clients).
scope: HIGH
notes: Directly controls how P2S VPN clients connect and which network they reach for a single connectivity function. Reads expose configuration only, not secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a P2S connection configuration proxy removes a VPN connection configuration component, disrupting Point-to-Site client connectivity.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating a P2S connection configuration proxy modifies how VPN clients connect and what they can reach, manipulating network configuration and potentially extending an attacker's reach into the connected network.
