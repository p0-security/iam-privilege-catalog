name: Kubernetes Pod Bindings
description: "Kubernetes Binding objects in an AKS managed cluster: the scheduler subresource that assigns an unscheduled pod to a specific node, overriding normal scheduler placement."
scope: HIGH
notes: Forcing pod placement lets an attacker target privileged or sensitive nodes, co-locating attacker workloads with high-value workloads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:hijack
      - impact:manipulation
    notes: Writing a Binding force-schedules a pod onto an attacker-chosen node (e.g. control-plane-adjacent or nodes hosting sensitive workloads), commandeering placement to run/co-locate workloads and manipulating scheduling decisions.
