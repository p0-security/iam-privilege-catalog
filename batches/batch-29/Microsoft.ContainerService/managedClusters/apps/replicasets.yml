name: Kubernetes ReplicaSets (AKS)
description: Kubernetes ReplicaSet workload controllers inside an AKS managed cluster; they maintain a stable set of replica pods running container workloads. This is a data-plane (in-cluster) resource accessed through the AKS Kubernetes API.
scope: HIGH
notes: Pod templates reveal container images, environment, mounted secrets/volumes, and service-account bindings; write access lets an attacker run arbitrary containers and assume pod identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting (or DeleteCollection of) ReplicaSets tears down the pods backing applications, destroying workload infrastructure and disrupting the services they support.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating ReplicaSets lets an attacker schedule arbitrary containers (cryptomining/botnet), craft pod specs that mount service-account tokens to assume pod identities for lateral movement, and alter existing workload definitions.
