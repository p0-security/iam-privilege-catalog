name: Kubernetes PersistentVolumes
description: Cluster-scoped Kubernetes PersistentVolume objects on an AKS managed cluster, which define storage resources (capacity, backing disk/CSI/hostPath references, reclaim policy) that back stateful workloads.
scope: HIGH
notes: PVs reference backend storage (Azure disks/files, hostPath) that holds production application data; their configuration governs where and how that data is mounted into pods.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - destruction:infra
      - impact:dos
    notes: Deleting PVs removes storage bindings workloads depend on (DoS), tears down storage infrastructure, and with a Delete reclaim policy destroys the underlying persisted data.
  write:
    risks:
      - impact:manipulation
      - escalation:data
    notes: Creating/updating PVs lets an attacker bind cluster storage to attacker-chosen or existing backing stores (e.g. point a PV at an existing Azure disk or a node hostPath), manipulating storage configuration and gaining access to additional data on those volumes.
