name: AKS agent (node) pools
description: An AKS managed-cluster agent pool — the worker-node compute (VMSS-backed VMs) of an Azure Kubernetes Service cluster, including VM size, count, OS image, version, networking, and node identity configuration.
scope: HIGH
notes: Provides the production compute that runs the cluster's container workloads for a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
      - impact:manipulation
    notes: Triggering a node-image upgrade forces a rolling cordon/drain/reimage of the pool's nodes, disrupting running workloads (DoS) and mutating node-pool operational state (manipulation).
  write:
    risks:
      - impact:dos
    notes: Invoking this action forces a rolling cordon-drain-reimage of the agent pool's nodes, evicting and disrupting running workloads and causing downtime if abused.
    name: AKS agent pool node image upgrade
