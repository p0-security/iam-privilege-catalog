name: AKS fleet update strategies
description: An AKS Fleet Manager update strategy is a reusable template defining how upgrades are grouped, staged, and sequenced across the member clusters of a fleet.
scope: HIGH
notes: Upgrade-orchestration configuration consumed by update runs; affects how production clusters are upgraded but is not data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting an update strategy removes the orchestration template that update runs depend on, disrupting coordinated fleet upgrade operations.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating an update strategy alters the staged grouping/sequencing that governs how upgrades roll out across member production clusters, manipulating operational rollout configuration.
