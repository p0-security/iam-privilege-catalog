name: Cosmos DB MongoDB database
description: A MongoDB API database (logical namespace) within an Azure Cosmos DB account, holding collections of organizational documents and the database-level throughput/configuration.
scope: HIGH
notes: Cosmos DB MongoDB databases are production data stores supporting an organizational function; their configuration governs throughput provisioning and the structure of stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting a MongoDB database irreversibly destroys all collections and documents it contains, removing organizational data (mitigated only by backups).
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Control-plane create/update of a MongoDB database alters the database structure/throughput configuration of a production data store and can provision billable RU/s throughput; it does not by itself read or destroy stored documents.
