name: Cosmos DB MongoDB collection
description: A MongoDB API collection within a Cosmos DB database, holding organizational documents and the collection-level configuration (indexes, shard key, TTL, throughput).
scope: HIGH
notes: Cosmos DB MongoDB collections are production data containers supporting an organizational function; their configuration governs data layout, retention (TTL), and throughput.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting a MongoDB collection irreversibly destroys all documents it holds, removing organizational data (mitigated only by backups).
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Control-plane create/update of a MongoDB collection alters its structure (indexes, shard key, TTL, throughput) of a production data store and can provision billable RU/s; a destructive TTL/index change can also corrupt operational behavior. It does not directly read or delete stored documents.
