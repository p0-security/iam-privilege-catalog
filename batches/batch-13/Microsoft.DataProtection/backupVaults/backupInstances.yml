name: Backup Instance
description: A backup instance in an Azure Data Protection backup vault represents the protection configuration that ties a data source (e.g. a disk, database, blob storage account) to a backup policy, governing which recovery points are created and retained.
scope: HIGH
notes: These are control-plane (management) operations. Backup instances are the recoverability defense and the store of recovery points that mitigate data destruction and ransomware for a single protected workload.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DataProtection
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - destruction:defense
    notes: Deleting a backup instance removes the protection and its associated recovery points, destroying the organization's backup data for that source and removing the recoverability defense against data loss/ransomware.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a backup instance alters protection configuration (data source, policy, source data store); an attacker can misconfigure protection to undermine recoverability, but this control-plane write does not itself read or destroy protected data.
