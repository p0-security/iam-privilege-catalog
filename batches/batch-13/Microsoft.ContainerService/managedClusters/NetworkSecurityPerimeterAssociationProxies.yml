name: AKS managed cluster Network Security Perimeter association
description: The Network Security Perimeter (NSP) association links an AKS managed cluster to a network security perimeter, an isolation/defense boundary that controls which resources can reach the cluster.
scope: HIGH
notes: This association governs a network-isolation defense fronting a production AKS cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - escalation:network
    notes: Delete detaches the cluster from its network security perimeter, removing the network-isolation defense and exposing the cluster to broader network access.
  write:
    risks:
      - destruction:defense
      - escalation:network
      - impact:manipulation
    notes: Create/update can reconfigure or weaken the cluster's network security perimeter (e.g., switch to learning/disabled mode), tearing down the network defense and broadening reachability to the cluster.
