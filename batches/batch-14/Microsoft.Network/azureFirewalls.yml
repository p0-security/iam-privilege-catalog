name: Azure Firewall
description: Azure Firewall is a managed, stateful network firewall appliance that filters and inspects traffic for a virtual network, enforcing network/application/NAT rule collections and threat intelligence.
scope: HIGH
notes: Acts as a network-perimeter defense for a single organizational function; its configuration reveals defensive posture and it can record in-transit traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:network
    notes: Deleting the firewall removes the network-perimeter defense and tears down a network component that filters/routes traffic, exposing protected resources and disrupting service (DoS).
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating the firewall lets an attacker rewrite or relax rule collections and disable threat intelligence, weakening the network defense and altering its operational security configuration.
