name: Cosmos DB table (Table API)
description: A Cosmos DB Table API table, a primary production data store holding organizational entity data within a database account.
scope: HIGH
notes: Production database resource holding organizational data for a single function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting a table destroys the container and all entity data it holds in the production data store.
  write:
    risks:
      - impact:manipulation
    notes: Control-plane create/update of a table provisions or reconfigures the structure/throughput of a production data store, manipulating the operational database resource.
