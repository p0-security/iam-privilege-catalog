name: Kubernetes EndpointSlice objects (Arc-connected cluster)
description: EndpointSlice objects are Kubernetes discovery.k8s.io resources that map Services to their backing pod IP addresses, ports, and topology, defining how in-cluster traffic is routed to service backends. Exposed as Azure Arc connected-cluster data actions.
scope: HIGH
notes: Internal network routing data; reading reveals topology, writing redirects live traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting EndpointSlices removes the service-to-pod endpoint mappings, severing traffic delivery to backing pods and causing denial of service for affected services.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating EndpointSlices rewrites the backend endpoints a service routes to, letting an attacker redirect service traffic to attacker-controlled pods/IPs for interception or hijacking.
