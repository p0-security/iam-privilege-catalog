name: Kubernetes HorizontalPodAutoscalers
description: A Kubernetes HorizontalPodAutoscaler (HPA) is an autoscaling object on an Azure Arc connected cluster that automatically adjusts the replica count of a target workload based on observed metrics.
scope: HIGH
notes: HPA configuration is operational infrastructure metadata (target workload, min/max replicas, metrics) and does not contain credentials or application data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting an HPA removes autoscaling so the workload can no longer scale to meet demand, degrading availability under load and destroying the scaling config object.
  write:
    risks:
      - impact:manipulation
      - impact:dos
      - impact:spend
    notes: "Creating/updating an HPA lets an attacker alter scaling policy: pin/cap replicas to starve a service (DoS) or inflate maxReplicas to drive runaway compute spend, manipulating operational scaling behavior."
