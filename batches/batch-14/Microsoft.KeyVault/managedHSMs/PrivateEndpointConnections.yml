name: Managed HSM private endpoint connection
description: A private endpoint connection links a Managed HSM to a private network endpoint, controlling private-network connectivity to the HSM's control surface.
scope: HIGH
notes: This is a control-plane network configuration object on a critical cryptographic resource, but the object itself only governs connectivity, not key material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting a private endpoint connection removes a network access path to the HSM, destroying a network component and disrupting legitimate private connectivity (DoS).
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Approving or changing a private endpoint connection can expose the HSM over an attacker-controlled private network path (network movement) and alters the connectivity configuration.
