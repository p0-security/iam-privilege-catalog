name: Log Analytics workspace table (DynamicEventCollection)
description: A specific table inside an Azure Monitor Log Analytics workspace; this resource type controls data-plane query access to the DynamicEventCollection table, which stores dynamically collected event telemetry.
scope: MEDIUM
notes: Monitoring/diagnostics asset; MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning dynamically collected event rows, enabling export of the captured event log content.
