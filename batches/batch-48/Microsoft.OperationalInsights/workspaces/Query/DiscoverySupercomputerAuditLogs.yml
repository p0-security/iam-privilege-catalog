name: Log Analytics workspace table data (DiscoverySupercomputerAuditLogs)
description: A specific table within an Azure Log Analytics (Azure Monitor) workspace that stores ingested audit/log records. Querying it returns the actual log contents on the data plane.
scope: MEDIUM
notes: Monitoring/diagnostics asset of MEDIUM sensitivity; log records may contain sensitive operational identifiers and activity details but are not primary production data stores or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning the contents of the DiscoverySupercomputerAuditLogs table, letting an attacker export audit log data that may reveal sensitive operational activity and identifiers.
