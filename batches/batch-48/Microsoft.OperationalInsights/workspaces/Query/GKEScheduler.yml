name: Log Analytics workspace table (GKEScheduler)
description: A Log Analytics workspace data-plane table holding ingested log/telemetry records. This operation reads rows from the GKEScheduler table, which captures Kubernetes (GKE) scheduler activity.
scope: MEDIUM
notes: Log Analytics tables are a monitoring/diagnostics asset; their rows can contain operationally sensitive details (identities, queries, IPs) depending on the source.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports Kubernetes scheduler log records and lets an attacker inventory what scheduler/cluster activity is captured.
