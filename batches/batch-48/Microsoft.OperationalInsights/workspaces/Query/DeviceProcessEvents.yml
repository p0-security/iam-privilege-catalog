name: Log Analytics workspace DeviceProcessEvents table
description: A Microsoft Defender for Endpoint advanced-hunting table (DeviceProcessEvents) surfaced through a Log Analytics workspace, holding process-creation telemetry including command lines, accounts, and file paths.
scope: MEDIUM
notes: Security telemetry; command lines can occasionally contain secrets. Confidential but not a primary production data store, hence MEDIUM asset sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports process-execution telemetry (including command lines that may leak secrets) and reveals running software/tooling on endpoints for reconnaissance.
