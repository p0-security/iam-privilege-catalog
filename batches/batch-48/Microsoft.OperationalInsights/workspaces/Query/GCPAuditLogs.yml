name: Log Analytics workspace table (GCPAuditLogs)
description: A specific log table within an Azure Monitor Log Analytics workspace. Data-plane read returns the ingested log records stored in that table.
scope: MEDIUM
notes: Monitoring/diagnostic data. Log tables can contain operationally sensitive identifiers, host/identity details, and occasionally leaked secrets in console output.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reads ingested GCP audit log records, exporting cross-cloud control-plane/identity activity and enumerating logged GCP operations useful for reconnaissance.
