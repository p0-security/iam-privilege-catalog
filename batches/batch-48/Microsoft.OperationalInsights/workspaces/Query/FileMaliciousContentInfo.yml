name: Log Analytics workspace table (FileMaliciousContentInfo)
description: A Log Analytics workspace table accessed via the data-plane query interface; this table holds ingested FileMaliciousContentInfo records, which are malware/malicious-content detection telemetry. Reading it returns the actual log records.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostics data (MEDIUM tier). Security-detection tables reveal what the organization's defenses have observed.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Exporting malicious-content detection records discloses defensive coverage and threat findings; enumerating the table also reveals what security telemetry is collected.
