name: Log Analytics workspace table (EmailAttachmentInfo)
description: A specific table inside an Azure Monitor Log Analytics workspace; this resource type controls data-plane query access to the EmailAttachmentInfo table (Microsoft Defender for Office 365), which stores email-attachment metadata such as filenames, hashes, and threat verdicts tied to organizational mail.
scope: MEDIUM
notes: Security-monitoring telemetry that exposes communications-related metadata; MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning email-attachment metadata rows, enabling export of Defender for Office 365 attachment telemetry (filenames, hashes, verdicts).
