name: Log Analytics GCPApigee log table
description: A Log Analytics workspace data-plane query permission scoped to the GCPApigee table, which holds ingested Google Cloud Apigee API-gateway logs (request metadata, paths, client detail).
scope: MEDIUM
notes: API traffic telemetry; may contain request details and reveal API endpoints/topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reading this table exports Apigee API-gateway logs that may contain API request metadata and endpoint detail.
