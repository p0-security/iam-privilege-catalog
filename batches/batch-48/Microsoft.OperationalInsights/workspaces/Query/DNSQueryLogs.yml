name: Log Analytics workspace query table (DNSQueryLogs)
description: A specific log table within an Azure Log Analytics workspace recording DNS query events; this data-plane read returns the stored records.
scope: MEDIUM
notes: "Monitoring/diagnostics data (MEDIUM). Highly reconnaissance-valuable: exposes resolved domains, internal hostnames, client IPs, and traffic patterns."
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading this table exports DNS query logs (exfiltration:logs) and reveals internal hostnames, resolved domains, and client IPs that map the network (discovery:network).
