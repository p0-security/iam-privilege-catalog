name: Log Analytics workspace DeviceLogonEvents table
description: A Microsoft Defender for Endpoint advanced-hunting table (DeviceLogonEvents) surfaced through a Log Analytics workspace, holding endpoint authentication/logon telemetry including account names, logon types, source IPs, and success/failure.
scope: MEDIUM
notes: Security telemetry; confidential but not a primary production data store, hence MEDIUM asset sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reading this table exports authentication telemetry and reveals valid account names and sign-in activity, identifying targets for credential compromise.
