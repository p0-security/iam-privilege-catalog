name: Log Analytics workspace table (DSMDataClassificationLogs)
description: A specific table inside an Azure Monitor Log Analytics workspace; this resource type controls data-plane query access to the DSMDataClassificationLogs table, which stores data-classification scan results identifying where sensitive/regulated data resides.
scope: MEDIUM
notes: Monitoring asset whose contents map high-value data targets across the estate; sensitive but still a diagnostics/monitoring table, so MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:data
    notes: Data-plane read returning data-classification scan logs; exports the content and gives an attacker a map of where sensitive/classified data lives for targeting.
