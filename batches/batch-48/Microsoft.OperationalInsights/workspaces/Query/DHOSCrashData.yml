name: Log Analytics workspace table (DHOSCrashData)
description: A specific table inside an Azure Monitor Log Analytics workspace; this resource type controls data-plane query access to the DHOSCrashData table, which stores Windows OS crash/diagnostic telemetry from managed devices.
scope: MEDIUM
notes: Monitoring/diagnostics asset; crash telemetry is confidential operational data but not a primary data store, so MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning OS crash telemetry rows, enabling export of stored diagnostic log content.
