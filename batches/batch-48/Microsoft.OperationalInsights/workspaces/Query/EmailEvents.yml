name: Log Analytics workspace table (EmailEvents)
description: A specific table inside an Azure Monitor Log Analytics workspace; this resource type controls data-plane query access to the EmailEvents table (Microsoft Defender for Office 365), which stores email-flow event metadata (senders, recipients, subjects, URLs, verdicts).
scope: MEDIUM
notes: Security-monitoring telemetry exposing communications metadata useful for recon and targeting; MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning email-flow event rows, enabling export of sender/recipient/subject metadata and mail-flow telemetry.
