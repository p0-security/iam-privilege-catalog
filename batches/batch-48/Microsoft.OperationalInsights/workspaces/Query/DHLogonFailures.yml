name: Log Analytics workspace DHLogonFailures table
description: A Device Health / Desktop Analytics advanced-hunting table (DHLogonFailures) surfaced through a Log Analytics workspace, holding logon-failure telemetry including account names, devices, and failure reasons.
scope: MEDIUM
notes: Security/operational telemetry exposing account names and authentication-failure patterns. Confidential but not a primary production data store, hence MEDIUM asset sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reading this table exports logon-failure telemetry and reveals account names and failed-authentication patterns useful for inferring valid usernames and identifying targets.
