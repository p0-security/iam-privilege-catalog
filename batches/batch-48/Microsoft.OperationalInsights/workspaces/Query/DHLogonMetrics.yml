name: Log Analytics workspace table (DHLogonMetrics)
description: A specific table inside an Azure Monitor Log Analytics workspace; this resource type controls data-plane query access to the DHLogonMetrics table, which stores Desktop Analytics / device-health logon (sign-in) telemetry collected from managed devices.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics assets. Logon telemetry can disclose account/identity usage patterns but is not a primary production data store, so MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning the rows of the DHLogonMetrics table, letting an attacker export device logon telemetry stored in the workspace.
