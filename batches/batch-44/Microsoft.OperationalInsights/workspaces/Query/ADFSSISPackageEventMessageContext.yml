name: Log Analytics workspace query table (ADF SSIS package event message context)
description: A Log Analytics workspace query table holding ingested Azure Data Factory SSIS package event-message context log records. Reading it is a data-plane operation that returns the stored log row content.
scope: MEDIUM
notes: Monitoring/diagnostics data is MEDIUM-sensitivity confidential operational telemetry that may embed sensitive identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns SSIS event-message context rows that can include execution context and embedded data/parameter values, enabling export of potentially sensitive ETL log content.
