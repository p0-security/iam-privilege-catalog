name: Log Analytics table data (ACSCallRecordingIncomingOperations)
description: A single Log Analytics workspace table holding Azure Communication Services call-recording incoming-operations telemetry. A data-plane read returns the actual log rows for this table.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic assets (MEDIUM tier). Records recording-operation metadata and call identifiers, not the recorded media itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports ACS call-recording operation metadata (recording requests/operations, call identifiers); the recorded media is not in this table.
