name: Log Analytics workspace table (ACSCallClosedCaptionsSummary)
description: A Log Analytics workspace query table holding ingested log records for a specific data type (here Azure Communication Services call closed-caption summaries). Reading the table returns the stored log rows via the data plane.
scope: MEDIUM
notes: Monitoring/diagnostics asset. Caption summaries can contain conversation-derived content/metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning Azure Communication Services call closed-caption summary rows, exporting potentially sensitive communication-derived telemetry.
