name: Log Analytics AegDeliveryFailureLogs table
description: A Log Analytics workspace data-plane table holding Azure Event Grid delivery-failure telemetry. Reading it returns the stored delivery-failure log rows.
scope: MEDIUM
notes: Monitoring/diagnostic log data tier; may reveal subscriber endpoints and event details.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read exports Event Grid delivery-failure log rows, which can disclose subscriber endpoints and event payload metadata.
