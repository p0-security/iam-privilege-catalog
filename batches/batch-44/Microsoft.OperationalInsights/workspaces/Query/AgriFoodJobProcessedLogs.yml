name: Log Analytics query table (AgriFoodJobProcessedLogs)
description: A Log Analytics workspace query table holding ingested job-processing log records for an Azure Data Manager for Agriculture (AgriFood) workload. This data-plane permission returns the stored log rows via KQL query.
scope: MEDIUM
notes: Monitoring/diagnostic log data is MEDIUM scope.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading the table exports job-processing log records (exfiltration:logs) and enumerates logged activity (discovery:logs).
