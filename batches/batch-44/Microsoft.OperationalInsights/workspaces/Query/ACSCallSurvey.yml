name: Log Analytics table data (ACSCallSurvey)
description: A single Log Analytics workspace table holding Azure Communication Services call survey (call-quality) telemetry. A data-plane read returns the actual log rows for this table.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic assets (MEDIUM tier). May contain participant and call-session identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports ACS call survey / call-quality records, which may tie to participants and call sessions.
