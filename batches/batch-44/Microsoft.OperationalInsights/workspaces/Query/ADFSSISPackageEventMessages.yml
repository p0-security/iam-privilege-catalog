name: Log Analytics workspace query table (ADF SSIS package event messages)
description: A Log Analytics workspace query table holding ingested Azure Data Factory SSIS package event-message log records. Reading it is a data-plane operation returning the stored log row content.
scope: MEDIUM
notes: Monitoring/diagnostics data is MEDIUM-sensitivity confidential operational telemetry that may embed sensitive identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns SSIS package event messages whose text can include sensitive error/diagnostic content and data references, enabling log exfiltration.
