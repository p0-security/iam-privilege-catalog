name: Log Analytics workspace query table (Azure Digital Twins data history operation)
description: A Log Analytics workspace query table holding ingested Azure Digital Twins data-history operation log records. Reading it is a data-plane operation returning the stored log row content.
scope: MEDIUM
notes: Monitoring/diagnostics data is MEDIUM-sensitivity confidential operational telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns ADT data-history operation rows, exporting digital-twins operational log content.
