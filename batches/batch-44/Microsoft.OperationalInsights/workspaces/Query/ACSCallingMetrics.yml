name: Log Analytics workspace table (ACSCallingMetrics)
description: A queryable table within an Azure Log Analytics workspace that stores Azure Communication Services calling metrics/telemetry. Reading it returns the stored rows via a data-plane KQL query.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostic data at MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns ACS calling-metrics rows, exporting communication usage telemetry.
