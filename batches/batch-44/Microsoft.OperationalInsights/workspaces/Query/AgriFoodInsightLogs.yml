name: Log Analytics query table (AgriFoodInsightLogs)
description: A Log Analytics workspace query table holding ingested log/telemetry records for an Azure Data Manager for Agriculture (AgriFood) insight workload. This data-plane (isDataAction) permission returns the actual stored log rows via KQL query.
scope: MEDIUM
notes: Monitoring/diagnostic log data is MEDIUM scope; contents are application telemetry that may include operational identifiers but not credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading the table exports its stored insight log records (exfiltration:logs) and lets an attacker enumerate the logged events (discovery:logs).
