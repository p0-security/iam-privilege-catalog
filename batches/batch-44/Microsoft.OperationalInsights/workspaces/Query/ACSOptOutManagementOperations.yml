name: Log Analytics workspace table (ACSOptOutManagementOperations)
description: A single named table within an Azure Log Analytics (Operational Insights) workspace, queried via the data plane. This table stores Azure Communication Services opt-out management operation logs.
scope: MEDIUM
notes: These records can include recipient/contact identifiers (e.g. phone/email) and communication metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reading this table exports ACS opt-out management operation records, which may include contact identifiers and communication metadata.
