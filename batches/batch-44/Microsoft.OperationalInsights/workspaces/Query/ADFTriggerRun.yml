name: Log Analytics workspace query table (ADF trigger run)
description: A Log Analytics workspace query table holding ingested Azure Data Factory trigger-run log records. Reading it is a data-plane operation returning the stored log row content.
scope: MEDIUM
notes: Monitoring/diagnostics data is MEDIUM-sensitivity confidential operational telemetry that may include trigger parameters.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns Data Factory trigger-run rows including scheduling parameters and outcomes, enabling export of pipeline orchestration logs.
