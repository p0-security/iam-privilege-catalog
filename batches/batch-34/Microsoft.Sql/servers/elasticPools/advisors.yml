name: Elastic Pool Advisor
description: An elastic pool advisor represents a performance/tuning advisor scoped to an Azure SQL elastic pool (a shared resource pool for multiple databases), along with its auto-execute configuration.
scope: HIGH
notes: Control-plane tuning configuration affecting all databases within a production elastic pool.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Updating the elastic pool advisor's auto-execute status controls whether tuning actions are auto-applied across the pool's databases, manipulating their operational configuration.
