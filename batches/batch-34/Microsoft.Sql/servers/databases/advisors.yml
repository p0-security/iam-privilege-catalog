name: Database Advisor
description: An Azure SQL database advisor represents a performance/tuning advisor (e.g. index recommendations, parameterization) attached to a single database, along with its auto-execute configuration.
scope: HIGH
notes: Control-plane tuning configuration; does not itself expose stored data, but governs automatic application of schema/index changes to a production database.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Updating the advisor's auto-execute status controls whether tuning actions (e.g. automatic index create/drop) are applied automatically to a production database, manipulating its operational configuration and performance.
