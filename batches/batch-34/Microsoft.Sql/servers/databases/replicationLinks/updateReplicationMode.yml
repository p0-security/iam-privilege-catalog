name: Azure SQL database replication links
description: Replication links represent the geo-replication relationship between a primary Azure SQL database and its secondary replica(s), forming the disaster-recovery and availability topology for a single database.
scope: HIGH
notes: These are control-plane DR/availability infrastructure for one database function, not the data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Switching replication between synchronous and asynchronous mode alters the durability/consistency guarantees of the production database's replication, weakening data-protection posture.
