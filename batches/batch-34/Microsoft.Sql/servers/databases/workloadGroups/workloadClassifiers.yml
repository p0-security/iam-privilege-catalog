name: SQL data warehouse workload classifiers
description: A data warehouse workload management workload classifier on an Azure SQL database, which maps incoming queries to workload groups/resource pools to govern query prioritization and resource allocation.
scope: HIGH
notes: Operational performance/governance configuration on a single database; not a data store or security control itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Dropping a classifier removes query-routing/prioritization rules, altering operational resource governance and potentially degrading or starving prioritized workloads.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Setting classifier properties reprioritizes/reroutes queries on a production data warehouse, manipulating operational governance and potentially starving legitimate workloads of resources.
