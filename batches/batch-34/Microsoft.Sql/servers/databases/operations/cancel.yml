name: Azure SQL Database operations
description: Asynchronous management operations on an Azure SQL Database, representing in-flight control-plane actions such as restores, copies, scaling, and configuration changes.
scope: HIGH
notes: Production database management operations support a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Cancelling a pending async operation aborts an in-flight management action (restore/scale/config change), disrupting the expected operational outcome on a production database.
