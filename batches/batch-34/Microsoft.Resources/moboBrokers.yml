name: Mobo broker
description: A Managed-On-Behalf-Of (MOBO) broker is a control-plane resource that mediates a delegated-management relationship, allowing a service provider/resource provider to manage resources within a customer subscription on the customer's behalf.
scope: HIGH
notes: MOBO underpins managed services and managed applications where a publisher manages resources cross-tenant; the broker represents that delegated trust path.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:access
    notes: Deleting a mobo broker tears down the delegated-management infrastructure, destroying the broker resource and severing the authorized operators' delegated access to the managed resources (denial-of-access, DoS-like).
  write:
    risks:
      - escalation:lateral
      - impact:manipulation
    notes: Creating or updating a mobo broker establishes or alters a delegated-management trust path that lets another identity manage resources on the customer's behalf, enabling lateral movement, and manipulates the brokered delegation configuration.
