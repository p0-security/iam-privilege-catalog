name: Application Insights AppServiceAppLogs log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding Azure App Service application stdout/stderr log output.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope. Application logs frequently contain request details, errors, connection strings, and secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports App Service application stdout/stderr logs that commonly contain secrets, connection strings, and sensitive runtime data.
