name: Azure Monitor Log Analytics table (Data Factory SSIS package event message context)
description: A Log Analytics table holding Azure Data Factory SSIS package event-message-context records. This data-plane read returns ETL package execution context telemetry, which may embed operational identifiers or data values.
scope: MEDIUM
notes: Execution-context telemetry can expose data-processing details and package internals of the ETL infrastructure.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports SSIS package event-context telemetry that may contain embedded values and reveals package execution detail.
