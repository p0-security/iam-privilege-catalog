name: Application Insights AppAvailabilityResults log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding availability-test (ping/health-probe) results for a monitored application.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope. May embed monitored endpoint URLs and operational detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports availability-test telemetry, potentially revealing monitored endpoint URLs and probe configurations.
