name: Azure Monitor Log Analytics table (Data Factory activity runs)
description: A Log Analytics table holding Azure Data Factory activity-run records. This data-plane read returns pipeline activity execution telemetry, which can include parameters, source/sink references, and error details.
scope: MEDIUM
notes: ADF execution telemetry can reveal data-pipeline topology, data sources/sinks, and operational parameters useful for reconnaissance of data-integration infrastructure.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports activity-run telemetry that can include pipeline parameters and source references, and inventories the data-pipeline infrastructure.
