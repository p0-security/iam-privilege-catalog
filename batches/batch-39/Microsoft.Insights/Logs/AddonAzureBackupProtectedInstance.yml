name: Azure Monitor Log Analytics table (Azure Backup protected instances)
description: A Log Analytics table holding Azure Backup protected-instance records. This data-plane read returns telemetry inventorying which resource instances are backed up.
scope: MEDIUM
notes: Inventories protected vs. unprotected resources, revealing recovery coverage gaps an attacker can exploit.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports protected-instance telemetry and inventories which resources are backed up, exposing unprotected targets.
