name: Azure AD Domain Services account-logon log table
description: A Log Analytics data-plane table holding Azure AD Domain Services account-logon (authentication) security audit records.
scope: MEDIUM
notes: Monitoring/security telemetry containing sensitive authentication activity (accounts, source hosts, success/failure).
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: This data-plane read exports account-logon audit records, exfiltrating sensitive authentication telemetry and inventorying which accounts authenticate.
