name: Azure Monitor Log Analytics table (Azure Backup policy)
description: A Log Analytics table holding Azure Backup policy records (monitoring data, not live RBAC). This data-plane read returns telemetry describing backup retention and protection policy configuration.
scope: MEDIUM
notes: Discloses recovery retention/schedule configuration that an attacker can use to plan destruction within backup gaps. This is log/monitoring data, not an access-control policy.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports backup-policy telemetry, revealing retention/protection configuration that informs an attacker about recovery defenses.
