name: Application Insights AppPlatformSystemLogs log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding Azure Spring Apps platform/system log data.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope. Platform logs reveal hosting-environment configuration and operations.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
