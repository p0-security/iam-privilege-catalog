name: Log Analytics ADSecurityAssessmentRecommendation table (data plane)
description: Data-plane access to the ADSecurityAssessmentRecommendation table in a Log Analytics workspace, holding Active Directory security assessment findings and recommendations.
scope: MEDIUM
notes: This table directly enumerates identity-security misconfigurations and exploitable weak points in the AD environment.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Reads the ADSecurityAssessmentRecommendation table, exporting concrete AD security misconfiguration findings that directly inform an attacker's escalation path.
