name: Application Insights AppDependencies log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding outbound dependency-call telemetry (DB/HTTP/queue calls) for a monitored application.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope. Reveals downstream service endpoints, hostnames, and call targets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports dependency-call telemetry, exposing internal topology, hostnames, and call targets useful for reconnaissance.
