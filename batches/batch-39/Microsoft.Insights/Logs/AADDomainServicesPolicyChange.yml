name: Azure AD Domain Services policy-change log table
description: A Log Analytics data-plane table holding Azure AD Domain Services policy-change security audit records describing security/group-policy modifications.
scope: MEDIUM
notes: Monitoring/security telemetry revealing the domain's access-control policy posture and changes.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:policy
    notes: This data-plane read exports records of security/group-policy modifications, exfiltrating logs and disclosing access-control policy state attackers can probe for weaknesses.
