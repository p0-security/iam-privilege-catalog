name: Application Insights AppPageViews log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding page-view telemetry for a monitored application.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope. Includes accessed URLs and user/session identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports page-view telemetry, disclosing accessed URLs, user navigation, and session identifiers.
