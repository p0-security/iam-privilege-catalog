name: Application Insights AppCenterError log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding App Center application error/crash telemetry.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope. Crash records can contain stack traces and device/user identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports error/crash telemetry that may contain stack traces and sensitive runtime detail.
