name: Azure Monitor Log Analytics table (Data Factory pipeline runs)
description: A Log Analytics table holding Azure Data Factory pipeline-run records. This data-plane read returns pipeline execution telemetry including run history, parameters, and outcomes.
scope: MEDIUM
notes: Pipeline-run telemetry discloses data-integration workflow structure and parameters, revealing the data-pipeline topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports pipeline-run telemetry including parameters and outcomes, and reveals data-pipeline structure and topology.
