name: Azure Monitor Log Analytics table (Azure Backup storage)
description: A Log Analytics table holding Azure Backup storage records. This data-plane read returns telemetry about backup storage consumption and configuration.
scope: MEDIUM
notes: Reveals backup storage usage/configuration for the protected infrastructure; monitoring data with no direct secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports backup storage consumption telemetry and reveals backup storage infrastructure details.
