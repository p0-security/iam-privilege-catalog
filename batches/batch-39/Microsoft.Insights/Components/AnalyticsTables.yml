name: Application Insights components
description: An Application Insights component is the Azure Monitor resource that ingests, stores, and retains application telemetry (requests, traces, exceptions, dependencies, metrics).
scope: MEDIUM
notes: Monitoring/diagnostics asset whose data underpins detection and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Action:
    risks:
      - impact:manipulation
    notes: A generic action on an analytics table is a control-plane operation that alters table schema/configuration, manipulating how telemetry is structured and stored.
  Delete:
    risks:
      - destruction:logs
      - destruction:metadata
    notes: Deleting an analytics table schema removes the structural definition for a telemetry log table, destroying operational schema metadata and disrupting ingestion/queryability of that log stream.
    name: Application Insights analytics table
  Write:
    risks:
      - impact:manipulation
      - destruction:logs
    notes: Writing an analytics table schema alters the table definition controlling how telemetry is structured and ingested, manipulating monitoring configuration and able to break or distort collection/queryability of that log stream.
    name: Application Insights analytics table
