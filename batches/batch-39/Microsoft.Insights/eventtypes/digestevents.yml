name: Azure Activity Log management digest
description: Returns the aggregated/digested management event records from the subscription Activity Log, a summarized view of control-plane audit activity.
scope: MEDIUM
notes: Exposes summarized audit log content (operations, identities, activity history). Log/audit asset = MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Reads the aggregated management event digest, exporting summarized Activity Log audit content that exposes operational activity and identities in the scope.
