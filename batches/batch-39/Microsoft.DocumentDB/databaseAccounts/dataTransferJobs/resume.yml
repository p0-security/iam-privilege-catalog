name: Container copy jobs
description: Container copy (data transfer) jobs that move/replicate data between Azure Cosmos DB containers, accounts, or external stores within a database account.
scope: MEDIUM
notes: Job definitions reference source and destination containers and govern bulk movement of production database data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Resuming a paused container copy job changes the operational state of a data transfer, driving continued data movement or overriding an operator's intent to keep it paused.
