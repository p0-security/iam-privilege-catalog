name: Azure SQL DB job credential
description: An Azure SQL DB job credential stores the username and (write-only) password the job agent uses to authenticate to target databases when running elastic jobs.
scope: HIGH
notes: The control-plane read does not return the secret password (it is write-only), so reads only expose the identity/username rather than usable secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:access
    notes: Deleting a job credential removes the authentication object jobs depend on, breaking the scheduled automation and denying it authorized access to target databases.
  write:
    risks:
      - persistence:account
      - escalation:lateral
    notes: Creating/updating a job credential lets an attacker plant an attacker-chosen username/password that jobs use to authenticate to target databases, establishing reusable controlled credentials and lateral access.
