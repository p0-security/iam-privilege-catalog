name: Network Security Perimeter access rule
description: A Network Security Perimeter access rule is a firewall-like inbound/outbound rule within an NSP profile that permits or restricts traffic (by IP, subscription, FQDN, etc.) to perimeter-protected PaaS resources.
scope: HIGH
notes: Access rules are the core enforcement of the NSP defense boundary; loosening them opens network paths to otherwise-isolated PaaS services.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting an access rule removes part of the perimeter's enforced traffic controls; removing a restrictive rule loosens the defensive boundary protecting associated resources.
  write:
    risks:
      - destruction:defense
      - escalation:network
      - impact:manipulation
    notes: Creating or updating an access rule lets an attacker add a permissive allow rule for their own IP/subscription/FQDN, punching a hole in the perimeter to reach protected PaaS resources and weakening the defense.
