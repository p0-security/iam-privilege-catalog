name: Network Security Perimeter profile
description: A Network Security Perimeter (NSP) profile is a named collection of access rules and member resources within an NSP, defining the network-isolation policy applied to associated PaaS resources (Storage, Key Vault, SQL, etc.).
scope: HIGH
notes: NSP profiles enforce a network-isolation defense boundary for production PaaS services; weakening them exposes those services to broader network access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a profile tears down the perimeter's enforced access-rule configuration, dismantling the network-isolation defense around associated resources.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating or updating a profile reshapes the perimeter's effective rule grouping/membership, letting an attacker weaken or reconfigure the network-isolation defense protecting PaaS resources.
