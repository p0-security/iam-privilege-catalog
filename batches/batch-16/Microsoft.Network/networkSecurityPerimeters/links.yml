name: Network Security Perimeter link
description: A Network Security Perimeter (NSP) link is the configured association that establishes an approved communication path between two network security perimeters, the logical isolation boundary that controls inbound/outbound network access for Azure PaaS resources.
scope: HIGH
notes: NSP links define the trust/connectivity topology of a network isolation defense; the link is the outbound-initiated side of a cross-perimeter relationship.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - impact:dos
    notes: Deleting a link tears down an approved cross-perimeter association, removing a configured isolation-defense relationship and severing legitimate communication for services that depend on the link.
  write:
    risks:
      - destruction:defense
      - escalation:network
    notes: Creating/updating a link establishes an approved cross-perimeter communication path, weakening the isolation defense and granting network reachability into resources protected by another perimeter.
