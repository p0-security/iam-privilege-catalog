name: AVNM security user rule collections
description: A rule collection within an Azure Virtual Network Manager security user configuration. It groups network security (traffic-filtering allow/deny) rules and scopes them to network groups of managed virtual networks.
scope: HIGH
notes: Security user rules are recommendation-style network security controls (lower precedence than enforced security admin rules) applied centrally across VNets; they act as a network defense for a set of workloads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a rule collection removes a group of centrally managed network security rules acting as a defense, eliminating intended traffic restrictions across the targeted VNets.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating or updating a rule collection lets an attacker alter the scope/membership of centrally managed network security rules, weakening the traffic-filtering defense and manipulating the security configuration across managed VNets.
