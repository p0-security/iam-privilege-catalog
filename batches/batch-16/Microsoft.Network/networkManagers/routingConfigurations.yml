name: Network Manager routing configuration
description: An Azure Virtual Network Manager routing configuration - centrally-managed user-defined routes (UDR-style next-hops / route rules) applied at scale across managed virtual networks.
scope: HIGH
notes: Routing configurations control how traffic is steered across the managed network group, applied to many VNets at once.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the routing configuration removes the route definitions applied across managed VNets, tearing down network routing components and disrupting connectivity to hosted services.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating or updating the routing configuration lets an attacker rewrite routes across managed VNets to redirect/intercept traffic through attacker-controlled next-hops (man-in-the-middle) and reach otherwise-isolated network resources.
