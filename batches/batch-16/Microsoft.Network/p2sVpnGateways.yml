name: Point-to-site VPN gateway
description: A Point-to-Site (P2S) VPN gateway is a virtual-hub network component that provides remote-access VPN connectivity, letting individual clients establish secure tunnels into a virtual network / virtual WAN.
scope: HIGH
notes: Controls remote-access ingress into the private network; compromise can expose or sever connectivity for a single network function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the gateway removes the remote-access network component, severing point-to-site connectivity for all clients (denial of service).
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating the gateway alters remote-access configuration (address pools, auth, routing), which can expose the VNet to attacker-controlled VPN clients and reshape the network ingress path.
