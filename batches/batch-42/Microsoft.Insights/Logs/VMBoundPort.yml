name: Azure Log Analytics table (VMBoundPort)
description: A Log Analytics workspace table accessed via the data plane; this one is the VM Insights / Service Map VMBoundPort table, which records the network ports VMs are listening on.
scope: MEDIUM
notes: Network-exposure telemetry; reveals listening services across the monitored estate.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Returns rows of listening ports per VM, exfiltrating the log content and revealing network/service topology and attack surface.
