name: Upgrade Analytics log tables
description: A Log Analytics table in the Microsoft.Insights Logs data plane belonging to the Upgrade Analytics / Upgrade Readiness feature set, holding ingested device-and-software inventory and upgrade-readiness telemetry collected from organizational Windows endpoints.
scope: MEDIUM
notes: Monitoring/diagnostics telemetry rather than a primary production data store; the rows can reveal fleet-wide software, driver, hardware-posture and usage detail useful for reconnaissance, so sensitivity is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading the UAFeedback table returns upgrade/compatibility feedback telemetry rows, exporting log content and enabling enumeration of feedback records.
