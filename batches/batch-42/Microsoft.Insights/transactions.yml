name: Application Insights Transactions
description: End-to-end Application Insights transaction telemetry (request, dependency, and trace records) for a monitored application.
scope: MEDIUM
notes: Transaction traces frequently contain request URLs, parameters, headers and other sensitive operational detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Reading transactions exports end-to-end request/dependency telemetry that can disclose sensitive request parameters and operational details.
