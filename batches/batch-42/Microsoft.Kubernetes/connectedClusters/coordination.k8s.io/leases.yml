name: Kubernetes coordination leases (Arc-connected cluster)
description: Kubernetes Lease objects in the coordination.k8s.io group on an Azure Arc-connected cluster, used for leader election among controllers and for node-heartbeat liveness.
scope: MEDIUM
notes: Leases hold control-plane coordination state (which controller/component is leader, node liveness), not application data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
    notes: Deleting leases removes leader-election locks and node-heartbeat objects, forcing re-election churn and disrupting controller/node coordination.
  write:
    risks:
      - impact:dos
      - impact:manipulation
    notes: Writing leases lets an attacker hijack or corrupt leader-election locks and node heartbeats, stalling controllers/scheduler and disrupting control-plane coordination.
