name: Key Vault EventGrid subscription
description: An EventGrid subscription (filter) for a key vault routes vault lifecycle event notifications (e.g., key/secret/certificate near-expiry and change events) to a configured endpoint.
scope: MEDIUM
notes: Notification/integration configuration; not key material itself, but controls visibility into vault activity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - destruction:defense
    notes: Deleting the subscription removes the vault's event-notification integration; when that subscription feeds alerting, it also disables event-based detection of malicious vault operations.
  write:
    risks:
      - impact:manipulation
      - collection:data
    notes: Creating/updating a subscription can route vault event notifications to an attacker-controlled endpoint, altering notification config and enabling automated collection of vault activity events.
