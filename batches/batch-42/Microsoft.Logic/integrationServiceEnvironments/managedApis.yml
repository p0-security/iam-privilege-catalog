name: Integration Service Environment managed API
description: A managed API (connector) hosted within an Integration Service Environment, providing the connector definitions and configuration that workflows in the ISE can invoke.
scope: MEDIUM
notes: Supporting integration component whose configuration influences how workflows reach backend services.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a managed API alters the connector configuration workflows depend on, enabling tampering with integration routing/behavior.
