name: Integration Account usage configuration
description: The usage configuration sub-resource of a Logic Apps integration account, which governs usage/quota monitoring settings for the integration account.
scope: MEDIUM
notes: A supporting configuration object on an integration account (EDI/B2B integration); not a primary data store, though it controls operational integration behavior.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting the usage configuration removes a supporting configuration component of the integration account, a limited infrastructure destruction.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating the usage configuration alters operational integration-account settings, enabling configuration manipulation of a supporting resource.
