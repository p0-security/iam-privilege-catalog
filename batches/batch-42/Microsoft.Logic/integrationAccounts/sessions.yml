name: Integration Account Session
description: An Integration Account Session stores stateful B2B/EDI exchange data (e.g., interchange/control-number state) used to correlate and sequence trading-partner message exchanges.
scope: MEDIUM
notes: Holds operational message-exchange state for partner interactions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deletes B2B/EDI session state, destroying operational tracking data (control numbers) and disrupting correct message correlation in dependent workflows.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating session state (e.g., EDI control numbers) lets an attacker tamper with B2B sequencing, potentially causing duplicate or rejected message processing.
