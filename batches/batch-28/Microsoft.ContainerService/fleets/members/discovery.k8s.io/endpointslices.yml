name: AKS Fleet member Kubernetes EndpointSlices
description: Kubernetes EndpointSlices on a member cluster of an AKS Fleet, accessed through the Azure RBAC data plane. EndpointSlices map Services to their backing pod IPs and ports, describing internal service-to-pod network topology.
scope: HIGH
notes: EndpointSlices are network-routing metadata for a single cluster; reading them is reconnaissance, writing them controls in-cluster traffic routing.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting EndpointSlices removes service-to-pod endpoint mappings, breaking traffic routing to backing pods and causing denial of service for affected services.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Writing EndpointSlices reroutes service traffic to attacker-chosen backend endpoints, enabling traffic redirection/interception and reaching backends not normally exposed.
