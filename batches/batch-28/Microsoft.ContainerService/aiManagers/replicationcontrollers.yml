name: AKS ReplicationControllers
description: Kubernetes ReplicationController objects within an AKS aiManagers cluster that maintain a set of running pod replicas from an embedded pod spec.
scope: HIGH
notes: Data-plane (Kubernetes API) objects; they actively schedule and reconcile running workloads under service-account identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a replication controller tears down the running pods it manages, destroying workload infrastructure and denying service to the backed application.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a replication controller continuously schedules attacker-defined pods (arbitrary images, chosen service account), enabling resource hijacking, code execution as cluster identities, and tampering with running workloads.
