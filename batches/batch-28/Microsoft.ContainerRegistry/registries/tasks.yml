name: Container registry tasks
description: ACR tasks are build/run automation definitions (triggers, steps, base images, identity references) that execute container build and command workloads for an Azure Container Registry, forming the registry's CI/build pipeline.
scope: MEDIUM
notes: Tasks frequently run under an assigned managed identity and embed source-control and registry credentials, making them a supply-chain and lateral-movement vector.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a task removes the registry's build/automation pipeline definition, disrupting CI/CD that produces and updates images (DoS-like effect on a supporting function).
  write:
    risks:
      - escalation:lateral
      - impact:hijack
      - impact:manipulation
    scope: HIGH
    notes: Create/update lets an attacker define arbitrary build/run steps that execute as compute under the task's managed identity (lateral pivot), run workloads for hijacking, and poison the build pipeline that produces images.
