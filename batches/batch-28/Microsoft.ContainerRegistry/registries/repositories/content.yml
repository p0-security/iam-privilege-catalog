name: Container registry repository image content
description: "The data-plane image/artifact content of repositories in an Azure Container Registry: the actual container image layers, manifests, and OCI artifacts that downstream Kubernetes clusters and workloads pull and run."
scope: HIGH
notes: Image layers routinely embed proprietary application source/binaries, configuration, and baked-in secrets; controlling content is a supply-chain position over everything that consumes the registry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deleting artifacts removes container images from the registry, destroying deployable build outputs and potentially breaking dependent deployments.
  read:
    risks:
      - exfiltration:data
      - exfiltration:code
    notes: Pulling images is a data-plane read that exports the full container artifacts, which commonly bundle application code, binaries, configuration, and embedded secrets, constituting data and code exfiltration.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    notes: Pushing images lets an attacker overwrite trusted tags with malicious/backdoored content that downstream clusters will pull and execute, enabling supply-chain manipulation and hijacking of compute via the deployed workloads.
