name: ACR private endpoint connection proxy
description: Internal (NRP-only) private-link connection-proxy plumbing that brokers private-endpoint connectivity to a container registry.
scope: HIGH
notes: These proxy objects orchestrate private-link connectivity for a single registry; they are network-control resources, not data stores.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the connection proxy tears down a private-link connectivity component, severing the private path and disrupting authorized private access to the registry (DoS-like).
  write:
    risks:
      - escalation:network
    notes: Creating/updating the connection proxy can establish a private-network path to the registry, enabling an attacker to reach the otherwise-isolated registry over a controlled link.
