name: Virtual Machine Scale Sets
description: An Azure Virtual Machine Scale Set (VMSS) is a group of identical, load-balanced virtual machines managed as a single unit, typically hosting a production compute workload. The control-plane resource holds the VM profile (image, custom-script extensions), networking, scaling rules, and any attached managed identities.
scope: HIGH
notes: Production compute supporting a single organizational function; the VM profile can carry managed identities and extension code, raising its sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - destruction:data
      - impact:dos
    notes: Deleting the entire scale set tears down the compute infrastructure along with the data on its instance disks and takes the hosted production service offline.
  write:
    risks:
      - escalation:lateral
      - impact:hijack
      - impact:spend
      - impact:manipulation
    notes: Create/update controls the entire VM profile, letting an attacker attach a managed identity and inject custom-script/VM extensions that execute code as the instance identity (lateral movement), provision costly compute for hijacking and spend, and rewrite the production workload's operational configuration.
