name: API Management API releases
description: The set of releases of an API; a release marks a particular API revision as current/live and supports rolling back to previous revisions.
scope: HIGH
notes: Deployment-state configuration controlling which API revision serves production traffic for a single function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting releases unpublishes the live API revision(s), disrupting availability of the served API to consumers.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a release changes which revision is published live, letting an attacker swap the served API definition (promote a malicious revision or roll back) to manipulate production behavior.
