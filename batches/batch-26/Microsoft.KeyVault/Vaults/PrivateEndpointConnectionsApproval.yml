name: Key Vault
description: An Azure Key Vault is a managed secrets store holding cryptographic keys, secrets, and certificates and their access/network configuration.
scope: CRITICAL
notes: "Key Vaults are CRITICAL-tier assets: they centralize credentials and cryptographic material relied on across many organizational functions."
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Approving a private endpoint connection wires the vault into an attacker-influenced private network, granting network-level reachability to the secrets store and enabling movement toward it.
