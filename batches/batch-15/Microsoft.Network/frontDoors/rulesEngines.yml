name: Front Door Rules Engine
description: A Front Door (classic) Rules Engine defines request/response routing, header, redirect, and rewrite rules applied at the public-facing CDN/edge layer.
scope: HIGH
notes: Controls how public-facing traffic is steered and transformed at the edge.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting a rules engine removes routing/transform logic from the public-facing Front Door, disrupting and degrading how requests are served.
  write:
    risks:
      - impact:manipulation
      - impact:defacement
    notes: Creating/updating a rules engine rewrites routing/redirect/response rules on a public-facing edge, enabling traffic redirection and defacement of public assets.
