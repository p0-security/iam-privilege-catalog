name: Bastion Host
description: Azure Bastion is a managed PaaS jump host deployed in a VNet that brokers secure browser-based RDP/SSH connectivity to VMs without exposing public IPs on those VMs.
scope: HIGH
notes: A production secure-access entry point into a private network; controlling or observing it affects reachability of all VMs behind it.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Setting the SAS URL destination for Bastion session recording lets an attacker redirect, suppress, or tamper with where session-recording audit data is written, undermining this forensic recording defense.
  read:
    risks:
      - impact:manipulation
      - destruction:logs
    notes: Despite the /read suffix this sets the SAS URL destination for session recordings, letting an attacker redirect or disrupt where privileged-session audit recordings are written, tampering with the recording configuration and undermining the audit trail.
    name: Bastion Host session recording SAS URL
