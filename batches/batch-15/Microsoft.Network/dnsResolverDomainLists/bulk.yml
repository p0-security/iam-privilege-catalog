name: DNS Resolver domain list
description: A DNS Resolver Domain List is the set of allow/block domain entries that back DNS Resolver (DNS security) policy filtering rules.
scope: HIGH
notes: The domain entries are the operational ruleset that drives DNS-based filtering defenses; altering or deleting them directly weakens that protection.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Bulk operations mass add/modify/remove domain entries, enabling wholesale alteration or removal of allow/block rules and broad weakening of the DNS-based filtering defense at scale.
