name: Front Door Web Application Firewall policy
description: A Front Door Web Application Firewall (WAF) policy is the set of managed and custom firewall rules, exclusions, and rate limits that protect public-facing applications fronted by Azure Front Door.
scope: HIGH
notes: This is a perimeter defense control for production web applications; its ruleset is security-relevant access-control configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the WAF policy removes the firewall defense protecting fronted web applications, exposing them to attack traffic the policy would block.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating the policy lets an attacker disable or relax firewall rules (switch to Detection mode, drop blocking rules), defeating the WAF defense while altering its protective configuration.
