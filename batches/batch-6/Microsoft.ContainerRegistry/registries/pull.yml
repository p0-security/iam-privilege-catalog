name: Container registry image content (pull)
description: The data-plane image-pull capability of an Azure Container Registry, allowing download of full container image layers and manifests.
scope: HIGH
notes: Container images frequently bundle proprietary application code, binaries, configuration, and baked-in secrets, making the registry a sensitive production artifact store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:data
      - exfiltration:code
    notes: Pulling images exports full container artifacts, exfiltrating application code as well as embedded secrets, configuration, and sensitive data in image layers.
