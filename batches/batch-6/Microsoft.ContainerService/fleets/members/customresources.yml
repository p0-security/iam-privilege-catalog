name: AKS Fleet member Kubernetes custom resources
description: Arbitrary Kubernetes custom resources (CRD instances) on a member cluster of an AKS Fleet, accessed through the Azure RBAC data plane. Custom resources back operators and controllers (e.g. cert-manager, external-secrets, ingress, service mesh) and often store credentials, certificates, and operational configuration.
scope: HIGH
notes: This permission spans ALL custom resource types in the cluster, so its blast radius depends on which operators are installed; many CRDs hold or reference sensitive material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - impact:dos
    notes: Deleting custom resources removes operator/controller-managed objects, destroying configuration state and disrupting the controllers and services that depend on them.
  read:
    risks:
      - discovery:infra
      - exfiltration:data
    notes: Reading arbitrary custom resources inventories operator/controller configuration and can return sensitive data, since CRDs commonly store credentials, certificates, and secret references.
  write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Writing arbitrary custom resources alters operator/controller-managed state and can drive controllers to provision workloads or grant identities/access, enabling tampering and lateral movement.
