name: Web App site extensions
description: A Web App site extension is an add-on package/component installed into the App Service that runs inside the app's worker process (tooling, runtime plugins, or custom code).
scope: HIGH
notes: Site extensions execute in-process under the app's execution context and managed identity, so they are a high-impact runtime-code surface for a single application.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a site extension removes an installed in-process component, breaking functionality the extension provides and disrupting the running application.
  write:
    risks:
      - escalation:lateral
      - impact:hijack
      - impact:manipulation
    notes: Installing/updating a site extension injects attacker-controlled code that runs in the app's worker process under its managed identity, enabling code execution as the app's identity (lateral movement), abuse of the compute for arbitrary workloads, and tampering with app behavior.
