name: Web App's Sitecontainers
description: "The container definitions backing an App Service Web App (sidecar/multi-container configuration): image references, ports, and runtime settings the production application runs."
scope: HIGH
notes: Configuration of how a single production web app is built and run; can reveal registry/image references.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a web app's sitecontainers removes the container definitions the production app runs in, destroying that runtime infrastructure and disrupting the service.
  Write:
    risks:
      - impact:hijack
      - impact:manipulation
      - escalation:lateral
    notes: Creating/updating sitecontainers lets an attacker point the app at an arbitrary container image, running attacker-controlled workloads (hijack) that execute under the web app's managed identity (lateral movement) and altering the running application's configuration/content.
