name: Web App private endpoint connections
description: Private endpoint connections binding an Azure Web App to private-link network endpoints, including their approval state.
scope: HIGH
notes: Controls which private networks can privately reach the production web app.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deletes a private endpoint connection, severing a private-link binding and disrupting private connectivity for clients depending on it.
  Write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Approves or rejects a private endpoint connection, letting an attacker approve an attacker-controlled endpoint to gain private network access to the app or reject legitimate ones.
