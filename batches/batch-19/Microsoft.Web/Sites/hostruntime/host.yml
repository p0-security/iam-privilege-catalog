name: Function App runtime
description: The Function App runtime control surface, where actions such as syncing triggers and adding, invoking, or deleting functions are performed.
scope: HIGH
notes: Runtime actions execute code as the app's managed identity and can alter or destroy deployed function logic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - impact:manipulation
      - impact:hijack
      - destruction:data
    notes: Adds/invokes/deletes functions and syncs triggers, enabling arbitrary code execution as the app identity, tampering with function logic, hijacking compute, and deleting deployed functions.
