name: Web App Slot publishing credentials policy
description: The policy controlling whether basic-authentication publishing methods (SCM/FTP) are allowed for an Azure Web App deployment slot.
scope: HIGH
notes: This is a security-hardening control governing the deployment-credential attack surface of a deployment slot.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Despite the mislabeled 'List' displayName, the /Write verb sets the slot's policy and can re-enable basic-auth publishing, disabling a hardening defense and opening a credential-based publishing path to the slot.
