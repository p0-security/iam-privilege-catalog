name: App Service Environment networking configuration
description: The networking configuration of an App Service Environment (ASE) defines the network topology, subnets, inbound/outbound IP settings, and connectivity controls of an isolated App Service hosting environment.
scope: HIGH
notes: Network configuration of a single hosting environment; reveals/controls reachability and isolation for the hosted apps.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Write:
    risks:
      - impact:manipulation
      - escalation:network
      - destruction:defense
    notes: Updating the ASE networking configuration can alter routing/exposure, reach additional resources on the network, and weaken or remove network-based defenses protecting hosted apps.
