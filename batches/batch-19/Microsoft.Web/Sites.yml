name: Web App
description: An Azure App Service site (Web App, Function App, or Logic App Standard) is a managed hosting resource that runs an organization's application code, often with an attached managed identity, app settings/connection strings, and a public-facing endpoint.
scope: HIGH
notes: Production application hosting for a single organizational function; can hold secrets in app settings, run code under a managed identity, and serve public traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the Web App destroys the hosting resource for a production application and takes the service offline.
  Write:
    risks:
      - impact:manipulation
      - escalation:lateral
      - impact:defacement
    notes: Create/update lets an attacker alter app config and code source, assign or change the managed identity to run code as a broader identity (lateral movement), and change content served on the public-facing site.
