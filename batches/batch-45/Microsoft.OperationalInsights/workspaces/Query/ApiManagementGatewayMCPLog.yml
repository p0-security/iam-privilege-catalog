name: Log Analytics workspace table (ApiManagementGatewayMCPLog)
description: A Log Analytics workspace query table holding ingested API Management gateway MCP request/response telemetry. Reading it is a data-plane operation returning the stored log rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores of MEDIUM sensitivity; gateway logs can include request payload metadata, headers, and tokens.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Exports API gateway log records that may contain endpoints, headers, and tokens passing through the gateway.
