name: Log Analytics workspace table (AppPageViews)
description: A queryable table within an Azure Log Analytics workspace holding Application Insights page-view telemetry collected from monitored applications.
scope: MEDIUM
notes: Monitoring/diagnostics data; page-view telemetry can contain user/session identifiers, URLs, and usage patterns but is not a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports page-view telemetry that may reveal user behavior, URLs, and identifiers.
