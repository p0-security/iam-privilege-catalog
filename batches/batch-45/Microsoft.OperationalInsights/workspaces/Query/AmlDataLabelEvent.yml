name: Log Analytics AmlDataLabelEvent table
description: A queryable Azure Log Analytics workspace table holding Azure Machine Learning data-labeling activity event telemetry ingested for monitoring.
scope: MEDIUM
notes: Monitoring/diagnostic log data scoped to a single ML function; may reference dataset names and labeling activity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads data-labeling event log records, exporting telemetry that may reference dataset contents.
