name: Log Analytics workspace table (query) data
description: A specific table within a Log Analytics workspace, holding ingested monitoring/diagnostic log records. The query/<table>/read data action returns the actual row contents of that table.
scope: MEDIUM
notes: Log Analytics tables hold ingested telemetry that can contain sensitive operational, identity, and network detail; treated as MEDIUM monitoring-data sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads App Service authentication log rows, which can reveal sign-in events and identity context, constituting log exfiltration.
