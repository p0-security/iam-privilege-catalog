name: Log Analytics AmlOnlineEndpointTrafficLog table
description: A queryable Azure Log Analytics workspace table holding Azure Machine Learning online-endpoint request/response traffic telemetry ingested for monitoring.
scope: MEDIUM
notes: Monitoring/diagnostic log data scoped to a single ML function; may reveal caller identities, request metadata, and usage patterns.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads online-endpoint traffic log records, exporting inference request/response metadata.
