name: Log Analytics workspace query table (AppServiceServerlessSecurityPluginData)
description: A Log Analytics workspace query table is a data-plane view of a specific log table inside an Azure Monitor / Log Analytics workspace. Reading it returns the actual row-level log records ingested into that table.
scope: MEDIUM
notes: App Service serverless security-plugin telemetry contains security findings/events that reveal the defensive posture and detection coverage of protected functions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns App Service serverless security-plugin telemetry records, exporting security log content and revealing what detections/defenses are recording.
