name: Log Analytics AppExceptions table
description: A Log Analytics workspace data-plane table holding Application Insights exception telemetry ingested into Azure Monitor.
scope: MEDIUM
notes: Commonly contains stack traces and error context that may leak code internals and sensitive runtime values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads the AppExceptions table, exporting exception telemetry including stack traces that can reveal application internals.
