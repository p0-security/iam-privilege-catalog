name: Log Analytics query table (AmlComputeClusterEvent)
description: A Log Analytics workspace query table holding Azure Machine Learning compute-cluster event records. This data-plane permission returns the stored event-log rows via KQL query.
scope: MEDIUM
notes: Monitoring/diagnostic log data is MEDIUM scope; may reveal compute configuration and activity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading the table exports AML compute-cluster event records (exfiltration:logs) and enumerates logged cluster activity (discovery:logs).
