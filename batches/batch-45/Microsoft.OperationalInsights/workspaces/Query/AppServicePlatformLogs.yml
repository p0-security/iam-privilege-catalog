name: Log Analytics AppServicePlatformLogs table
description: A Log Analytics workspace data-plane table holding App Service platform/runtime diagnostic log records ingested via diagnostic settings.
scope: MEDIUM
notes: Per-table data-plane read permission on monitoring/diagnostic logs; sensitivity is that of collected operational log content rather than a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads App Service platform/runtime log records, which may disclose operational and configuration details.
