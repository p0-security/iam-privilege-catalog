name: Log Analytics workspace table (AppPlatformIngressLogs)
description: A queryable table within an Azure Log Analytics workspace holding Azure Spring Apps ingress (request-routing) logs.
scope: MEDIUM
notes: Monitoring/diagnostics data; ingress logs can contain request paths, client IPs, and routing detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports ingress/request logs revealing traffic patterns, client IPs, and request paths.
