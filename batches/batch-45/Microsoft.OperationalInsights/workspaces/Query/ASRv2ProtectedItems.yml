name: Log Analytics workspace table data (ASRv2ProtectedItems)
description: A Log Analytics workspace table queried via the data plane; this table (ASRv2ProtectedItems) holds Azure Site Recovery v2 protected-item log records ingested into the Azure Monitor workspace.
scope: MEDIUM
notes: Monitoring/diagnostics data. Reading it exports an inventory of workloads under disaster-recovery protection.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns ASR v2 protected-item log rows enumerating which workloads are under DR protection.
