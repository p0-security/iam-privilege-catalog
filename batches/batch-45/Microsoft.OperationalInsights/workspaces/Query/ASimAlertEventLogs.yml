name: Log Analytics workspace table (ASimAlertEventLogs)
description: A Log Analytics workspace query table holding ASIM-normalized security alert event records. Reading it is a data-plane operation returning the stored alert log rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores of MEDIUM sensitivity; alert-event logs reveal defensive detection coverage.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Exports normalized security alert evidence and reveals which detections are firing, letting an attacker gauge detection coverage of their activity for evasion.
