name: Log Analytics workspace table (AppEnvSessionLifecycleLogs)
description: A single named table within an Azure Log Analytics (Operational Insights) workspace, queried via the data plane. This table stores Azure Container Apps dynamic-session lifecycle (start/stop) event telemetry.
scope: MEDIUM
notes: Lifecycle event telemetry is operational metadata about session activity rather than application payload data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reading this table exports Container Apps session lifecycle event records, disclosing operational telemetry about workload session activity.
