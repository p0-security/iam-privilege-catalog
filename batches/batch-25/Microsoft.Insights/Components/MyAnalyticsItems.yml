name: Application Insights personal analytics item
description: A personal (per-user) Application Insights analytics item is a saved KQL query or function scoped privately to the calling user on an Application Insights component.
scope: LOW
notes: User-scoped saved queries with minimal blast radius beyond the individual user.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:metadata
    notes: Deleting a personal analytics item removes only the caller's own private saved query artifacts, a minimal single-user operation.
  Write:
    risks:
      - impact:manipulation
    notes: Writing a personal analytics item only modifies the caller's own private saved queries, a low-impact manipulation with negligible blast radius.
