name: Database column sensitivity label
description: A data-classification sensitivity label on a database table column, used by SQL Information Protection, auditing, and DLP tooling to mark where sensitive data resides.
scope: MEDIUM
notes: Classification metadata drives data-protection, auditing, and governance decisions but is not the underlying data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:defense
    notes: Disabling sensitivity recommendations suppresses the data-classification detection that flags sensitive columns, weakening a defensive/DLP signal so an attacker can hide sensitive data.
