name: Database column sensitivity label
description: A data-classification sensitivity label on a database table column, used by SQL Information Protection, auditing, and DLP tooling to mark where sensitive data resides.
scope: MEDIUM
notes: Classification metadata drives data-protection, auditing, and governance decisions but is not the underlying data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
      - destruction:defense
    notes: Deleting a column's sensitivity label destroys operational classification metadata and removes the defensive signal that flags sensitive data, weakening DLP/auditing controls.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating a label manipulates classification metadata and can mislabel sensitive columns as benign to evade classification-driven auditing/DLP controls.
