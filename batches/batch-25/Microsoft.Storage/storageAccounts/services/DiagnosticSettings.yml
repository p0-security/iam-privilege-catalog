name: Storage account diagnostic settings
description: Diagnostic settings on a storage account that control which logs and metrics are collected and where they are routed (Log Analytics, Event Hub, storage).
scope: MEDIUM
notes: Detective/monitoring control; tampering blinds incident response but does not directly touch stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Create/update lets an attacker disable log categories or redirect telemetry away from monitoring sinks, suppressing audit logging and removing a detective control.
