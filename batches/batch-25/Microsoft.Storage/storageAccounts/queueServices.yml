name: Storage Queue Services
description: The queue service is the account-level control-plane resource for Azure Storage Queues, holding service-wide settings such as CORS rules, hour/minute metrics, and analytics logging configuration.
scope: MEDIUM
notes: Configuration of a messaging service that carries operational data; service-level settings can affect logging and access signing.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - destruction:logs
    notes: Writing queue service properties alters operational config and can disable/weaken the service-level analytics logging settings, impeding incident response.
