name: Table service diagnostic settings
description: Diagnostic settings on the table service that control which logs and metrics are collected and where they are routed.
scope: MEDIUM
notes: Detective/monitoring control over table data-access telemetry; reading it reveals coverage but exposes no stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Create/update lets an attacker disable or redirect table access/audit log collection, suppressing telemetry and weakening a detective control.
