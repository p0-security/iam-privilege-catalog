name: API Management operation tags
description: Tag associations attached to an API operation on an Azure API Management gateway, used as organizational metadata for grouping, filtering, and documentation.
scope: LOW
notes: Tags are non-sensitive operational metadata labels with no effect on routing, data, or security enforcement.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Detaching a tag from an operation deletes operational metadata associations only.
  write:
    risks:
      - impact:manipulation
    notes: Assigning a tag to an operation modifies only organizational metadata labels with negligible direct impact.
