name: Resource tags
description: Tags are key/value metadata labels applied to Azure resources for organization, cost allocation, and policy/ABAC targeting.
scope: LOW
notes: May reveal operational identifiers (environment, owner) but is non-sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Removes all tags on a resource, destroying operational metadata used for governance, cost tracking, and automation.
  write:
    risks:
      - impact:manipulation
    notes: Replaces/merges/removes tags, manipulating operational metadata that can drive cost allocation, policy targeting, and tag-based access conditions.
