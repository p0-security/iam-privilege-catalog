name: Static Site (free trial)
description: "A free-trial Azure Static Web App: a hosted, public-facing static website (HTML/JS/API) provisioned on the free/trial tier of the Static Web Apps service."
scope: MEDIUM
notes: A low-value trial-tier asset hosting public web content; not a production data store, so MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a free-trial static web app destroys the hosting infrastructure and its served public content, removing the site.
  write:
    risks:
      - impact:manipulation
      - impact:defacement
      - impact:spend
    notes: Creating/updating a free-trial static web app lets an attacker alter the app's configuration and public-facing content (defacement/manipulation) and provision a billable resource.
