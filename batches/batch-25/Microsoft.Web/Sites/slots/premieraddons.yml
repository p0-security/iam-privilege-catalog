name: Web App slot premier add-ons
description: Premier add-ons are partner/marketplace extensions (e.g. monitoring or supporting services) provisioned onto a specific deployment slot of an Azure App Service web app.
scope: MEDIUM
notes: Supporting infrastructure for a single web app function; some add-ons are metered/billable.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a premier add-on removes a supporting extension/component from the slot, akin to a localized denial of service for that add-on functionality.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating/updating a premier add-on alters the slot's supporting configuration and can provision a metered/billable marketplace add-on, incurring spend.
