name: App Service Plan hybrid connection relays
description: A hybrid connection relay on an App Service Plan is an Azure Relay-backed network bridge that lets apps on the plan reach a specific backend TCP endpoint (often on-premises or in a private network) by host and port.
scope: MEDIUM
notes: Configuration discloses the relay namespace and target host/port (network topology); the relay's send/listen keys are credential material retrieved via a separate listKeys action.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the relay removes the network bridge linking the App Service Plan to its backend endpoint, severing connectivity for any dependent app.
