name: Web App slot instance processes
description: The process-explorer view of OS processes running inside a web app slot's worker instance, exposing process details such as command lines, loaded modules, handles, and environment variables.
scope: HIGH
notes: Process detail (notably environment variables and command lines) can incidentally contain sensitive identifiers or secrets, but the operation is fundamentally a runtime inventory read.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
    notes: Killing/deleting a running process on the slot worker instance terminates the executing application, disrupting service availability.
