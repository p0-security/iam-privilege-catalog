name: Web Apps Slots Continuous Web Jobs
description: Continuous WebJobs are long-running background processes (scripts/executables) that run on an App Service deployment slot's compute under the app's identity.
scope: HIGH
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Stopping a continuous WebJob halts a running background workload, disrupting the operation that depends on it.
