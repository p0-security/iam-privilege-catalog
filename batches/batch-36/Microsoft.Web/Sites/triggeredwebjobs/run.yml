name: App Service triggered WebJobs
description: "Triggered (scheduled/on-demand) WebJobs hosted by an App Service web app: deployed scripts/executables that run as background tasks in the app's runtime."
scope: HIGH
notes: WebJobs run in the web app's process and inherit the site's managed identity.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - impact:hijack
    notes: Triggers execution of a WebJob, running code inside the App Service under the site's managed identity (lateral movement to that identity) and consuming the app's compute for the attacker's purposes.
