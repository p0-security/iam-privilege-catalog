name: Static Site private endpoint connection proxies
description: Internal Private Link connection-proxy objects that broker the private-endpoint provisioning handshake for an Azure Static Web App, coordinating private-network connectivity state.
scope: HIGH
notes: These are supporting network-connectivity plumbing sub-resources of a single static site, not data stores or credential holders.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:network
    notes: Deletes the connection proxy, tearing down a private-link connectivity component and disrupting private access to the static site.
  Write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating the connection proxy establishes or alters the private-link path to the static site, enabling private-network movement to reach the service and manipulation of its connectivity configuration.
