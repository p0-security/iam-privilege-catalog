name: Static Site database connections
description: A database connection resource that links an Azure Static Web App to a backend database, powering the site's Data API. It holds the target database binding, an optional managed-identity, and (retrievable separately) the connection string credential.
scope: HIGH
notes: The connection binds a production application to its backing data tier; the show action returns reusable database credentials, making that path credential-sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deletes the database connection linking a Static Web App to its backend database, removing the data-tier binding and breaking the site's data-driven features (denial of service for that function).
  Write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Create/update lets an attacker repoint the site's Data API to an attacker-controlled database or inject a connection string and attach a managed identity used to reach backend data stores.
