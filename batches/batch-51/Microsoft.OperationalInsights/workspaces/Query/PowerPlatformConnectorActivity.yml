name: Log Analytics table data (PowerPlatformConnectorActivity)
description: A single Log Analytics workspace table holding Power Platform connector activity telemetry. A data-plane read returns the actual log rows for this table.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic assets (MEDIUM tier). Content maps which connectors/data sources are invoked and by whom.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports Power Platform connector-usage records, mapping integrations to internal/external data sources.
