name: Log Analytics workspace query table (SecureScoreControls)
description: A specific table in an Azure Log Analytics workspace, queried over the data plane via KQL. This table holds Microsoft Defender for Cloud per-control secure-score results indicating which security controls are satisfied or unmet.
scope: MEDIUM
notes: Enumerates the organization's security-posture weaknesses; security-relevant monitoring data, MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Returns per-control secure-score data, exporting the logs (exfiltration:logs) and revealing which security controls are unimplemented or weak, a roadmap of exploitable security-configuration gaps (discovery:infra).
