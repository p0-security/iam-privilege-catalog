name: Log Analytics SalesforceAuditTrail table
description: A Log Analytics workspace table holding ingested Salesforce audit-trail records (administrative/configuration change events from a connected Salesforce org). It is monitoring data within an Azure Monitor / Log Analytics workspace.
scope: MEDIUM
notes: Third-party SaaS audit content ingested into the workspace; medium sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports Salesforce administrative/config audit records (exfiltration:logs) and reveals which Salesforce activity is captured (discovery:logs).
