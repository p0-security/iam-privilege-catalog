name: Log Analytics StorageMoverJobRunLogs table
description: A Log Analytics workspace table holding Azure Storage Mover migration job-run operational logs (job status, paths, timing). Reading it returns the stored log rows.
scope: MEDIUM
notes: Monitoring data is MEDIUM scope; may reveal source/target paths and migration detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Exports storage-migration job-run logs that disclose migration jobs, status, and operational detail.
