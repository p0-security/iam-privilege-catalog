name: Log Analytics workspace query table (SecurityAlert)
description: A specific table in an Azure Log Analytics workspace, queried over the data plane via KQL. This table holds Microsoft Defender / Sentinel security alert (detection) records.
scope: MEDIUM
notes: Security detection telemetry; reveals whether attacker activity has been observed. MEDIUM sensitivity per the catalog's tiering of security telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns fired security alerts, exporting the alert content (exfiltration:logs) and letting an attacker learn which of their activities were detected and where monitoring blind spots exist, aiding evasion (discovery:logs).
