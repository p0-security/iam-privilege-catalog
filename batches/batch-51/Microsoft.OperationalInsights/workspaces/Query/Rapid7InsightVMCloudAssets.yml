name: Log Analytics workspace table (Rapid7InsightVMCloudAssets)
description: A Log Analytics workspace query table holding ingested Rapid7 InsightVM cloud-asset inventory and vulnerability-scan records. Reading it is a data-plane operation returning the stored rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores of MEDIUM sensitivity; an asset/vulnerability inventory directly aids targeting of infrastructure.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Exports a vulnerability-scanner inventory of cloud assets, both exfiltrating the telemetry and enumerating infrastructure resources and weak points for targeting.
