name: Log Analytics workspace query table (PurviewDataSensitivityLogs)
description: A specific table in an Azure Log Analytics workspace, queried over the data plane via KQL. This table holds Microsoft Purview data-sensitivity classification results indicating where sensitive/regulated data resides.
scope: MEDIUM
notes: Maps the location of high-value data across the estate; security-relevant monitoring data, MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:data
    notes: Returns Purview data-sensitivity classification logs, exporting the records (exfiltration:logs) and disclosing which data stores hold sensitive/classified data, providing a targeting map for later exfiltration (discovery:data).
