name: Log Analytics StorageCacheOperationEvents table
description: A Log Analytics workspace table holding Azure HPC Cache operation event records ingested into Azure Monitor.
scope: MEDIUM
notes: Operational telemetry describing cache activity and configuration changes for a single storage-cache service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Read returns HPC/Storage Cache operation event rows, exporting operational log content describing cache activity and configuration changes.
