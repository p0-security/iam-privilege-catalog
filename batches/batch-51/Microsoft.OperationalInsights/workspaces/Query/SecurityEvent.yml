name: Log Analytics SecurityEvent table
description: A Log Analytics query data action over the SecurityEvent table, which stores collected Windows security event log records (logons, process creation, account/audit activity with hostnames, usernames, IPs).
scope: MEDIUM
notes: Raw security telemetry that can contain sensitive authentication and host detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports raw Windows security event logs, exposing sensitive logon/account/host activity and revealing what is being audited.
