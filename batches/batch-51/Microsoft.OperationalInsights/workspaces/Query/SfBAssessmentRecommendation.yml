name: Log Analytics SfBAssessmentRecommendation table
description: A Log Analytics workspace table holding Skype for Business (on-premises) offline-assessment recommendation records ingested into Azure Monitor.
scope: MEDIUM
notes: Assessment-recommendation logs surface configuration posture and best-practice/security findings about the assessed environment; confidential operational data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns the ingested SfB assessment recommendation rows, exporting log content that reveals on-prem Skype/Lync infrastructure configuration weaknesses useful for recon.
