name: Log Analytics workspace query table (PurviewSecurityLogs)
description: A specific table in an Azure Log Analytics workspace, queried over the data plane via KQL. This table holds Microsoft Purview security/governance event telemetry.
scope: MEDIUM
notes: Security-relevant monitoring data; MEDIUM sensitivity per the scope guide.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns Purview security/governance event records, exporting security telemetry from the data-governance estate.
