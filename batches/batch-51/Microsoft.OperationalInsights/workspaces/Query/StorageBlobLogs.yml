name: Log Analytics StorageBlobLogs table
description: A Log Analytics workspace table holding Azure Storage blob access log records (request URIs, accessed object paths, requester IPs, auth details) ingested into Azure Monitor.
scope: MEDIUM
notes: Access logs of a data store; expose blob/container names and access patterns indicating where sensitive data resides.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:data
    notes: Read returns Storage blob access log rows, exporting log content that exposes blob/container names, requester identities, and access patterns useful for data inventory.
