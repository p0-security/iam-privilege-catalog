name: Log Analytics workspace Syslog table
description: A data-plane table within an Azure Log Analytics (Operational Insights) workspace holding ingested Linux/Unix syslog records collected from monitored hosts.
scope: MEDIUM
notes: Monitoring/diagnostics asset; log content may contain operationally sensitive host and event details.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Querying the Syslog table returns ingested system log rows, allowing an attacker to export collected host operational logs.
