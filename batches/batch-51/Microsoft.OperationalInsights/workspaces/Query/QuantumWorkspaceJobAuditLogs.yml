name: Log Analytics QuantumWorkspaceJobAuditLogs table
description: A Log Analytics workspace table holding ingested Azure Quantum workspace job audit-log records. It is monitoring data within an Azure Monitor / Log Analytics workspace.
scope: MEDIUM
notes: Monitoring/diagnostic data store; sensitivity is medium.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports Quantum workspace job audit records (exfiltration:logs) and enumerates the logged job activity for reconnaissance (discovery:logs).
