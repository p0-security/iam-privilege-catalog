name: Log Analytics StorageCacheUpgradeEvents table
description: A Log Analytics workspace table holding Azure HPC Cache upgrade event records ingested into Azure Monitor.
scope: MEDIUM
notes: Low-sensitivity operational/maintenance telemetry about cache software version and upgrade activity for a single service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Read returns Storage Cache upgrade event rows, exporting operational/maintenance log content about cache version and upgrade activity (low recon value).
