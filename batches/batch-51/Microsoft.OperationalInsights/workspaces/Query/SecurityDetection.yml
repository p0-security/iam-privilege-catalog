name: Log Analytics SecurityDetection table
description: A Log Analytics query data action over the SecurityDetection table, which stores security detection/alert records produced by Defender/Sentinel detections.
scope: MEDIUM
notes: Security detection telemetry; reading it reveals defensive coverage useful for evasion.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exposes which detections have fired, letting an attacker learn detection coverage to tune evasion and export the underlying detection records.
