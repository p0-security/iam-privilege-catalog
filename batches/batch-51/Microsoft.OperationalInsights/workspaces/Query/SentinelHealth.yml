name: Log Analytics SentinelHealth table
description: A Log Analytics query data action over the SentinelHealth table, which stores Microsoft Sentinel data-connector and automation/rule health-status telemetry.
scope: MEDIUM
notes: SIEM operational health telemetry; reveals monitoring pipeline state and ingestion gaps.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table reveals connector/automation health and ingestion gaps, letting an attacker identify monitoring blind spots to operate undetected.
