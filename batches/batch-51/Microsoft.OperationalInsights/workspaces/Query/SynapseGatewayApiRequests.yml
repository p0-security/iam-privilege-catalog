name: Log Analytics workspace query table (Synapse diagnostics)
description: A Log Analytics workspace query table holding Synapse Analytics diagnostic/telemetry log records ingested into Azure Monitor. Reading it returns the stored log content for that table.
scope: MEDIUM
notes: Monitoring/diagnostic data plane; sensitivity is MEDIUM as logs can contain operational identifiers, query text, and pipeline parameters but are not a primary production data store or control-plane asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads Synapse gateway API request logs, exporting request telemetry that can reveal endpoints, callers, and request metadata.
