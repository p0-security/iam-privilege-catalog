name: Virtual Machine Scale Sets
description: An Azure Virtual Machine Scale Set (VMSS) is a group of identical, load-balanced virtual machines managed as a single unit, typically hosting a production compute workload. The control-plane resource holds the VM profile (image, custom-script extensions), networking, scaling rules, and any attached managed identities.
scope: HIGH
notes: Production compute supporting a single organizational function; the VM profile can carry managed identities and extension code, raising its sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Cancelling an in-progress rolling upgrade halts the orchestrated rollout mid-flight, leaving instances in a mixed/inconsistent model state and interfering with the intended deployment process.
