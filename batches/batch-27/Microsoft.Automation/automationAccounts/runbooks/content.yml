name: Azure Automation runbook content
description: The published script content (source code) of an Azure Automation runbook, returned verbatim (e.g. text/powershell) by the get-content endpoint.
scope: HIGH
notes: Runbook source frequently embeds hard-coded credentials, connection strings, and sensitive automation logic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:code
    notes: Returns the full published runbook script source, exfiltrating organizational automation code (which may also reveal hard-coded secrets and logic).
