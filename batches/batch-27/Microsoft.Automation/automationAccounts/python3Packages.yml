name: Automation Python 3 package
description: An imported Python 3 module/package available to runbooks in an Azure Automation account.
scope: MEDIUM
notes: Runbook runtime dependency; reading exposes inventory metadata, while writing injects code executed under the account's managed identity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deleting a Python 3 package removes a runbook dependency artifact, which can break automation jobs that import it.
  write:
    risks:
      - escalation:lateral
      - impact:manipulation
    scope: HIGH
    notes: Importing/updating a Python 3 package plants attacker-controlled code that runbooks load and execute under the Automation account's managed identity, enabling code execution as that identity and supply-chain tampering.
