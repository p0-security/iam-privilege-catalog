name: API Management workspace named values
description: API Management named values are reusable key/value pairs (plain, secret, or Key Vault-referenced) consumed at runtime by gateway policies, commonly holding backend credentials, API keys, and connection strings.
scope: HIGH
notes: Secret-typed named values store credential material used by API policies; the actual secret is only returned by the dedicated listValue action, while read/list returns masked metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Re-fetches a named value from Key Vault and overwrites the stored value used by policies, altering operational configuration without returning the secret to the caller.
