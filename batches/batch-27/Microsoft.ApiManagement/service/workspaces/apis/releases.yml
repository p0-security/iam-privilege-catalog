name: API Management workspace API releases
description: API releases within an APIM workspace; a release is created when an API revision is made current and is also used to roll back to previous revisions, controlling which revision the gateway serves.
scope: HIGH
notes: Releases govern which API revision is live for a published (potentially public-facing) API supporting a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Removes all releases of an API (or a specific release), unpublishing the current revision and taking the live API out of service.
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates an API release to make a chosen revision current, letting an attacker swap the live API behavior to a malicious or stale revision served to consumers.
