name: API Management AI gateway tool server OAuth2 endpoints
description: "A tool server endpoint's OAuth2 dance action manages the operator-driven OAuth 2.0 Authorization Code flow for a tool server endpoint: it can mint PKCE state and return the IdP authorize/redirect URLs (connect) or clear the persisted refresh_token and bump the OAuth2 configVersion (disconnect)."
scope: HIGH
notes: Controls the delegated-identity connection state between a gateway tool endpoint and an external IdP; abuse can bind or sever the endpoint's authenticated backend access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - impact:dos
    notes: The connect path drives an OAuth2 authorization-code flow that can bind tokens/identity to the endpoint, a step toward acquiring delegated access to a downstream identity (lateral movement); the disconnect path clears the persisted refresh_token, severing the endpoint's authenticated integration (denial of service).
