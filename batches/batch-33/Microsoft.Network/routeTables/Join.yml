name: Azure Route Table
description: An Azure route table holds user-defined routes (UDRs) that control how traffic is forwarded within a virtual network, including next-hop overrides for subnets.
scope: HIGH
notes: Controls traffic steering for production network functions; misuse can redirect, intercept, or blackhole traffic for the subnets it is associated with.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Joining (associating) a route table to a subnet applies its routes to that subnet, letting an attacker alter traffic flow and extend reach to other resources on the network path.
