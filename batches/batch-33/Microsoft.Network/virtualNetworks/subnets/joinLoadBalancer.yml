name: Virtual network subnet
description: A subnet is a segment of a virtual network's address space, with associated NSG/route-table bindings, service endpoints and delegations that govern connectivity for resources placed in it.
scope: HIGH
notes: Subnets are core production network components supporting a single organizational function; their configuration governs segmentation and reachability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Joins a load balancer to the subnet, wiring a traffic-distribution endpoint into the network to expose or reach resources on that subnet.
