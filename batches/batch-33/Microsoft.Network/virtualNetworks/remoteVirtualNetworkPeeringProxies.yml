name: Virtual Network peering proxy
description: An internal proxy representation of a virtual network peering relationship, describing how a VNet is connected to a remote VNet.
scope: HIGH
notes: Control-plane resource describing cross-VNet connectivity; supports a single networked function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the peering proxy tears down a VNet peering relationship, removing connectivity between VNets and causing DoS for services that depend on the peered path.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating or updating the peering proxy establishes or alters cross-VNet peering connectivity, bridging networks to reach resources on a peered VNet and mutating production network configuration.
