name: Virtual WAN
description: A Virtual WAN is the top-level Azure networking construct that aggregates and interconnects virtual hubs, VNets, site-to-site/point-to-site VPN, and ExpressRoute connectivity into a managed SD-WAN backbone.
scope: HIGH
notes: Acts as the connectivity fabric for a single organizational network function; compromise affects routing and reachability across all attached hubs and sites.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a Virtual WAN tears down the top-level network construct interconnecting hubs/sites/VPNs, removing network components and causing DoS for dependent connectivity.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating or updating a Virtual WAN alters core network backbone configuration and can reshape/extend connectivity to reach additional networked resources.
