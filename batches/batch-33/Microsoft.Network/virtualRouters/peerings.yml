name: Virtual router peering
description: A VirtualRouterPeering defines a BGP peering relationship on an Azure Virtual Router/Route Server, controlling route exchange and connectivity within the network.
scope: HIGH
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the peering tears down a BGP route exchange, removing routes and disrupting network connectivity.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating a BGP peering lets an attacker inject or alter route advertisements, redirecting traffic and extending reachability to additional networked resources.
