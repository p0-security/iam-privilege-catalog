name: Log Analytics UrlClickEvents table
description: A Log Analytics workspace data-plane query against the UrlClickEvents table, Microsoft Defender for Office 365 Safe Links telemetry recording users clicking URLs in email/Teams.
scope: MEDIUM
notes: Security telemetry containing user identities (UPNs), source IPs, clicked URLs, timestamps, and verdicts; reveals user behavior.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reading the table exports Safe Links click records tying user identities to URLs they clicked, exposing user activity and enumerable account identities.
