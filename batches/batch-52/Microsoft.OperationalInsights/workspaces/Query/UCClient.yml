name: Log Analytics UCClient table
description: A Log Analytics workspace data-plane query against the UCClient table, a Windows Update for Business / Update Compliance device-inventory table (device IDs, OS build, edition, update state).
scope: MEDIUM
notes: Monitoring/diagnostics data; enumerates the managed endpoint fleet.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading the table exports per-device client telemetry and inventories managed endpoints and their OS/build state.
