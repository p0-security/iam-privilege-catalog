name: Log Analytics UserPeerAnalytics table
description: A Log Analytics workspace data-plane query against the UserPeerAnalytics table, a Microsoft Sentinel UEBA table mapping users to behavioral peer groups and rankings.
scope: MEDIUM
notes: Security analytics exposing identity relationships useful for targeting and lateral-movement planning.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reading the table exports user peer-group/relationship analytics, inventorying account identities and their organizational relationships for targeting.
