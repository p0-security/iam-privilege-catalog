name: Log Analytics WVDConnections table
description: A Log Analytics workspace table holding Azure Virtual Desktop connection records (user names, session times, client/host details, client IPs). Reading it is a data-plane query over collected monitoring logs.
scope: MEDIUM
notes: Connection logs expose user identities and access patterns.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Exports AVD connection records containing user names and session activity, enabling account enumeration of VDI users.
