name: Log Analytics WindowsEvent table
description: A Log Analytics workspace table holding ingested Windows Event Log records (system, security, application channels). Reading it is a data-plane query over collected monitoring logs.
scope: MEDIUM
notes: Event logs routinely contain logon/authentication events and account names.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Exports Windows event records that commonly include logon activity and account names, enabling identity reconnaissance.
