name: Recovery Services resource provider registration
description: Subscription-level registration/unregistration toggle for the Microsoft.RecoveryServices resource provider, which enables the backup and disaster-recovery (Recovery Services Vault) service for a subscription.
scope: MEDIUM
notes: Provider registration is an administrative enablement control; it does not by itself touch data, identity, or running services.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Unregistering the provider can disrupt the subscription's backup/recovery protection function, a denial-of-service against that service. (Azure blocks unregistration while resources exist, somewhat limiting the effect.)
