name: Backup jobs
description: Backup jobs are the records and execution of backup/restore operations run by a Recovery Services vault, representing protection activity against protected items.
scope: MEDIUM
notes: Job records expose operational metadata (schedules, status, targets) about backup activity, not backed-up data contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:spend
    notes: Retrying backup jobs re-triggers execution of existing jobs, whose practical abuse in isolation is re-running metered backup work to incur modest unnecessary spend; it grants no data access or destructive capability.
