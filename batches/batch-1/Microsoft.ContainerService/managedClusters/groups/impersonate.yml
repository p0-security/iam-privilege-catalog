name: Kubernetes group impersonation (AKS)
description: The Kubernetes group-impersonation capability on an AKS managed cluster, allowing the API caller to assert membership in arbitrary groups when issuing requests.
scope: CRITICAL
notes: Asserting membership in privileged groups (e.g. system:masters) inherits all RBAC bound to those groups — equivalent to broad cluster takeover.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating groups lets the attacker assume membership in any group (e.g. system:masters), inheriting the aggregated RBAC privileges of that group for lateral movement and privilege escalation.
