name: Kubernetes Roles (AKS)
description: In-cluster Kubernetes RBAC Role (and ClusterRole) objects that define permission rule sets within an AKS managed cluster; subjects gain these permissions when bound via RoleBindings.
scope: CRITICAL
notes: Roles define the permission surface of the cluster's RBAC; crafting/expanding a role and binding it grants control over cluster resources, workloads, and data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
    notes: The Kubernetes escalate verb explicitly bypasses RBAC privilege-escalation prevention, allowing creation/update of roles with permissions exceeding the caller's own — a deliberate privilege-escalation primitive.
