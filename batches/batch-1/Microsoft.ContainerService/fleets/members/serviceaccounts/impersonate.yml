name: Kubernetes service accounts (Fleet member)
description: Kubernetes ServiceAccount objects in a namespace of an AKS Fleet member cluster. They represent in-cluster workload identities that pods authenticate as and that can be bound to RBAC roles and cloud (workload-identity) credentials.
scope: CRITICAL
notes: ServiceAccounts are identity objects; creating, deleting, or impersonating them directly affects who can act in the cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating a ServiceAccount lets an attacker act as that in-cluster identity and inherit its (potentially broader) RBAC, the canonical lateral-movement and privilege-escalation primitive.
