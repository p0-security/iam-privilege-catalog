name: Kubernetes ClusterRoles
description: A ClusterRole is a cluster-scoped Kubernetes RBAC object that defines a named set of permissions (verbs over API resources) that can be bound to subjects cluster-wide via ClusterRoleBindings.
scope: CRITICAL
notes: ClusterRoles define the permission sets behind every cluster-wide grant (the analog of Azure roleDefinitions); they can encode cluster-admin, so the asset is cluster-wide access-control policy.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
    notes: The Kubernetes 'bind' verb authorizes a subject to create bindings referencing a ClusterRole, letting an attacker grant that role's (potentially cluster-admin) permissions to a controlled identity for cluster-wide privilege escalation.
