name: Microsoft.Storage provider registration
description: A control-plane operation on the Microsoft.Storage resource provider that registers a subscription with the provider.
scope: MEDIUM
notes: An idempotent prerequisite enablement step; grants no data access and does not alter access-control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Unregistering the Storage provider can block creation and management-plane operations of storage accounts subscription-wide, a denial-of-service against a widely-used supporting service.
