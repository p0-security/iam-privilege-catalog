name: Database blob audit records
description: The blob audit records for an Azure SQL Database, containing the captured audit log entries that record executed statements and access activity against the database.
scope: MEDIUM
notes: Audit records can contain query text, identifiers, and access patterns that reveal sensitive operational detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Retrieving the actual audit records returns log content (exfiltration:logs) and enumerates logged activity (discovery:logs), exposing query/access history.
