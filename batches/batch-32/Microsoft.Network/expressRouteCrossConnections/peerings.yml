name: Express Route Cross Connection Peering
description: An ExpressRoute Cross Connection Peering is the BGP routing/peering configuration on an ExpressRoute cross connection (VLAN IDs, peer ASNs, advertised address prefixes) that controls how traffic is routed over the private interconnect.
scope: HIGH
notes: Controls routing on a production private circuit; changes can redirect or sever hybrid traffic for a single connectivity function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a peering removes the BGP routing relationship on the private circuit, severing the routed path and disrupting traffic that depends on it (DoS implied by network destruction).
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating a peering changes BGP routing on the private circuit, manipulating route advertisements and potentially redirecting or extending reachability across the connected network.
