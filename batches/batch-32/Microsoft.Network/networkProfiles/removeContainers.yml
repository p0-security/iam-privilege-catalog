name: Network Profile
description: A Network Profile defines container networking configuration in Azure, specifying how container groups (e.g. Azure Container Instances) attach to virtual network subnets via container network interface (CNI) configurations.
scope: HIGH
notes: Supports a single networking function (container workload connectivity); its configuration governs which subnets and NICs containers bind to.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Removing containers from a network profile detaches workloads from their network configuration, altering operational network membership and disrupting their connectivity.
