name: NAT gateway
description: A NAT Gateway provides outbound (egress) internet connectivity for subnets, mapping their traffic through associated public IPs/prefixes.
scope: HIGH
notes: Production network egress infrastructure supporting a single function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Joining attaches a subnet/resource to the NAT gateway, changing egress routing and granting/altering outbound network reachability for resources on that network.
