name: ExpressRoute Ports authorizations
description: An ExpressRoute Ports authorization is a grant on a dedicated ExpressRoute port that permits an ExpressRoute circuit to be linked to that port; it carries an authorization key used to redeem the link.
scope: HIGH
notes: "The authorization key is effectively a network-access credential: holding it lets a party attach a circuit and gain access onto the organization's private ExpressRoute connectivity."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deletes the authorization, tearing down the connectivity grant for a linked circuit and disrupting the private network connection (DoS to the dependent link).
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating an authorization mints a connectivity grant that lets an attacker-controlled circuit link to the port and reach the connected network, while altering connectivity configuration.
