name: Soft-deleted Managed HSM
description: A soft-deleted Managed HSM is a deleted HSM instance retained during the soft-delete recovery window; purging it permanently destroys the HSM and all its cryptographic key material.
scope: CRITICAL
notes: Purge bypasses the soft-delete safety net, irreversibly destroying HSM-resident keys and rendering all data encrypted under them unrecoverable.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:crypto
      - destruction:infra
    notes: Purging a soft-deleted HSM permanently and irrecoverably destroys the HSM and all its cryptographic keys, defeating soft-delete recovery.
