name: Key Vault Network Security Perimeter association proxy
description: The association proxy that binds a Key Vault into a Network Security Perimeter (NSP) of the Microsoft.Network provider, enforcing a network-isolation boundary around the vault.
scope: CRITICAL
notes: The protected asset is a Key Vault, which stores cryptographic keys, secrets, and certificates; the NSP association is a network defense control around that critical secret store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the NSP association proxy detaches the vault from its network security perimeter, removing the network-isolation defense that restricts who can reach the secret store.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Changing the association state (e.g., to a Learning/disabled enforcement mode) weakens or disables the network-perimeter defense protecting the vault and alters its network access-control configuration.
