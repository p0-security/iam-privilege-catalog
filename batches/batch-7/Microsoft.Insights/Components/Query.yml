name: Application Insights query (logs)
description: The Query data-plane endpoint runs arbitrary analytics queries against the full Application Insights log/telemetry store.
scope: MEDIUM
notes: Arbitrary queries can extract any stored telemetry, which may include PII, request payloads, identifiers, and tokens. isDataAction read.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - exfiltration:data
    notes: Runs arbitrary queries over the entire log store, enabling broad export of telemetry that may contain sensitive application and user data.
