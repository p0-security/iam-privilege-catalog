name: Log Analytics workspace query (Analytics)
description: The analytics/query action runs KQL search queries against the data ingested into a Log Analytics workspace, returning the actual log and telemetry records.
scope: MEDIUM
notes: Workspace logs frequently contain security events, audit trails, and sensitive operational data; querying is the primary data-access path.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:logs
      - exfiltration:data
    notes: Executing a KQL search returns ingested log/telemetry records, enabling broad export of logs that commonly include security, audit, and sensitive organizational data.
