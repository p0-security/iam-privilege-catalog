name: Logic App workflow run action scope repetition
description: A workflow run action scope repetition is a single iteration of a scoped action (e.g. For_each/Until scope) within a Logic App run, including that scoped iteration's inputs and outputs.
scope: MEDIUM
notes: Scoped per-iteration inputs/outputs carry the sensitive data the workflow processed within that scope.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:data
    notes: Reading a scope repetition exposes the inputs/outputs of that scoped iteration, revealing the sensitive data processed within the scope.
