name: API Management email templates
description: Email templates in an Azure API Management service define the content and structure of automated notification emails the service sends to developers, subscribers, and publishers.
scope: LOW
notes: Low-sensitivity operational messaging configuration; not public-facing web content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
    notes: Resetting an email template to its built-in default discards customized notification content, altering operational messaging rather than destroying organizational data.
  write:
    risks:
      - impact:manipulation
    scope: MEDIUM
    notes: Updating an email template lets an attacker alter the content of automated emails sent to developers/subscribers (e.g. injecting phishing links), manipulating trusted outbound communications.
