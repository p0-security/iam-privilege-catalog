name: Connector Gateway
description: A Connector Gateway is a Microsoft.Web integration resource that bridges cloud services (Logic Apps, Power Platform) to backend/on-premises data sources, brokering credentialed connections and connector definitions.
scope: MEDIUM
notes: Supporting integration infrastructure; the gateway itself is a connectivity bridge rather than a primary data store, but the connections it brokers can carry credentials to backend systems.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: An action on an MCP server config alters or invokes the gateway's MCP tool/data-server configuration, manipulating the operational integration the gateway brokers.
  delete:
    risks:
      - destruction:infra
    notes: Deleting an MCP server config removes integration infrastructure the gateway relies on, severing connectivity and disrupting dependent workflows.
    name: Connector Gateway MCP server config
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating an MCP server config lets an attacker repoint the gateway at an attacker-controlled or malicious MCP endpoint, manipulating the integration's operational behavior.
    name: Connector Gateway MCP server config
