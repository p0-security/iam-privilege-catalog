name: Custom API connectors
description: A Custom API (custom connector) is a Microsoft.Web integration resource that defines a reusable connector — backend host/endpoint, swagger/API definition, and auth references — used by Logic Apps and Power Platform flows to call an external or internal API.
scope: MEDIUM
notes: Supporting integration infrastructure for a single application function; its definition references backend endpoints and auth configuration but the control plane does not return stored secret values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
    notes: Deleting the connector removes integration infrastructure, breaking dependent Logic Apps/flows in a localized denial-of-service fashion.
  Write:
    risks:
      - impact:manipulation
    notes: Create/update lets an attacker alter the connector definition (repoint backend host/endpoint or rewrite the API/auth), manipulating how dependent Logic Apps and flows reach their backends.
