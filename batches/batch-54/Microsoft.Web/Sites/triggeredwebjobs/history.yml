name: Web App triggered WebJobs history
description: Triggered WebJobs history holds the execution records and captured output logs of an App Service's on-demand/scheduled background jobs.
scope: MEDIUM
notes: Job output logs can contain sensitive operational details or data emitted by the jobs.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Reading triggered WebJob run history returns execution records and captured job output logs, inventorying past runs and potentially exposing sensitive data emitted into those logs.
