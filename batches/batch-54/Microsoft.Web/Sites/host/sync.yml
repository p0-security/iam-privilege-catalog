name: Web Apps Functions host
description: The Azure Functions host runtime for a function app, exposing operational actions such as syncing trigger definitions and reading sync status.
scope: MEDIUM
notes: Host-level operational control plane for a function app; affects which triggers the runtime activates.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Forcing a function-trigger sync makes the host reload and re-register trigger bindings, altering the app's active operational trigger state.
