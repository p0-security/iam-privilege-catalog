name: Subscription lifecycle control
description: A control-plane operation on the Microsoft.Subscription provider that manages a subscription's lifecycle (cancel/rename/reactivate). A subscription is the tenant-wide billing and resource container holding all of an organization's hosted resources.
scope: MEDIUM
notes: Subscription-scoped controls affect a significant fraction of organizational functions, hence CRITICAL asset sensitivity for destructive lifecycle actions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Subscription
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Renames the subscription display name, altering operational identifying metadata that can confuse operators or evade name-based monitoring, but does not affect underlying resources or data.
