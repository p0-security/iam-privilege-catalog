name: Log Analytics CloudProcessEvents table
description: A Log Analytics workspace table holding cloud/endpoint process-execution telemetry (process trees, command lines, arguments). It is security monitoring data within an Azure Monitor / Microsoft Sentinel workspace.
scope: MEDIUM
notes: Process telemetry can embed command lines containing credentials or sensitive runtime detail; medium sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports process-execution telemetry that can include command lines with sensitive data (exfiltration:logs) and reveals what endpoint/process activity is monitored (discovery:logs).
