name: Log Analytics workspace table data (DatabricksTables)
description: A per-table data-plane query permission on a Log Analytics workspace; this one returns rows of the DatabricksTables table, which holds Azure Databricks audit/operational/diagnostic telemetry ingested into the workspace.
scope: MEDIUM
notes: Data-platform audit/operational telemetry that may reveal jobs, user actions, and resources; monitoring/log-data sensitivity tier.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reads ingested Databricks audit/operational log rows, exporting the stored telemetry and enumerating logged platform activity; no single specific discovery dominates, so generic discovery:logs applies.
