name: Log Analytics workspace table (ContainerInstanceLog)
description: A per-table data-plane read permission on an Azure Log Analytics workspace, scoped to a single named table. ContainerInstanceLog holds Azure Container Instances stdout/stderr application log output.
scope: MEDIUM
notes: Container stdout/stderr captured into logs frequently contains application output and inadvertently logged secrets, but access is still read-only monitoring data confined to one table.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports container stdout/stderr output that may contain secrets, credentials, or sensitive application data printed to logs.
