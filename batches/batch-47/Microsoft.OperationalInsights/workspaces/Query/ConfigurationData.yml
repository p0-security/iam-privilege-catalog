name: Log Analytics ConfigurationData table
description: A Log Analytics workspace data table holding ConfigurationData records — Change Tracking inventory snapshots of installed software, services, files, and configuration state on monitored machines.
scope: MEDIUM
notes: Provides a detailed host configuration/software inventory useful for attack planning; MEDIUM sensitivity as monitoring data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reads Change Tracking inventory snapshots, exporting records and disclosing detailed installed-software and host configuration inventory.
