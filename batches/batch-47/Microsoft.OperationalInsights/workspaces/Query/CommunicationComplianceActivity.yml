name: Log Analytics CommunicationComplianceActivity table
description: A Log Analytics workspace query table holding Microsoft Purview communication-compliance activity records ingested into Azure Monitor.
scope: MEDIUM
notes: Compliance/insider-risk monitoring telemetry; contents can include sensitive employee-communication and policy-violation records.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read of the CommunicationComplianceActivity table exports sensitive compliance-monitoring records of user communications.
