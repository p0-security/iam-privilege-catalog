name: Log Analytics workspace table (DatabricksCloudStorageMetadata)
description: A Log Analytics workspace query table holding ingested log records for a specific data type (here Azure Databricks cloud storage metadata logs). Reading the table returns the stored log rows via the data plane.
scope: MEDIUM
notes: Monitoring/diagnostics asset. Records can reveal storage account names, paths, and data-layout metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning Databricks cloud-storage metadata rows, exporting log records that disclose storage paths/identifiers useful for targeting data stores.
