name: Log Analytics CloudStorageAggregatedEvents table
description: A Log Analytics workspace table holding aggregated cloud-storage access-event records (storage activity patterns, object/path detail). It is security monitoring data within an Azure Monitor / Microsoft Sentinel workspace.
scope: MEDIUM
notes: Monitoring/diagnostic data store; medium sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports aggregated storage-access telemetry revealing data-access patterns and potentially object/path detail (exfiltration:logs), and enumerates the logged storage activity (discovery:logs).
