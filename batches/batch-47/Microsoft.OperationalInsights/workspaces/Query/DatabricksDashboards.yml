name: Log Analytics workspace table (DatabricksDashboards)
description: A Log Analytics workspace query table holding ingested log records for a specific data type (here Azure Databricks dashboards activity logs). Reading the table returns the stored log rows via the data plane.
scope: MEDIUM
notes: Monitoring/diagnostics asset. Records reveal dashboard usage and analytics activity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning Databricks dashboard activity rows, exporting analytics-usage telemetry from the workspace.
