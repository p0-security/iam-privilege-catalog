name: Log Analytics CloudAuditEvents table
description: A Log Analytics workspace table holding cloud control-plane audit-event records (management activity, principals, resource changes). It is security/audit monitoring data within an Azure Monitor / Microsoft Sentinel workspace.
scope: MEDIUM
notes: Control-plane audit content; medium sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports control-plane audit records revealing administrative actions and resource changes (exfiltration:logs) and lets an attacker confirm what management activity is captured (discovery:logs).
