name: Databricks diagnostic log table (Log Analytics)
description: A Log Analytics workspace table that stores diagnostic/audit log records emitted by Azure Databricks (here, SQL access-control / permission-change events). Reading it is a data-plane query returning ingested log content.
scope: MEDIUM
notes: Monitoring/diagnostics data sits in the MEDIUM sensitivity tier; permission-change logs expose who holds which SQL privileges, useful for finding weak points. This is logged history, not the live RBAC state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:policy
    notes: Reading this table exports SQL grant/revoke/ACL-change audit records, both exfiltrating log content and letting an attacker inventory who holds which privileges to find weak points.
