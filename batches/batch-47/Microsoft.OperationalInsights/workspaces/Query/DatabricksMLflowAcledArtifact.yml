name: Databricks diagnostic log table (Log Analytics)
description: A Log Analytics workspace table that stores diagnostic/audit log records emitted by Azure Databricks (here, MLflow ACL'd-artifact access activity). Reading it is a data-plane query returning ingested log content.
scope: MEDIUM
notes: Monitoring/diagnostics data sits in the MEDIUM sensitivity tier; log records can carry sensitive operational details but are not the underlying resources or credentials themselves.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reading this table exports MLflow ACL'd-artifact access logs, exposing telemetry about which ML artifacts were accessed and by whom.
