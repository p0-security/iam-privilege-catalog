  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads CEF security-device logs, exporting sensitive security event data that also reveals network traffic and defensive monitoring coverage.
