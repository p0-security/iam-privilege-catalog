name: Log Analytics CommonSecurityLog table
description: A Log Analytics workspace data table holding CommonSecurityLog records — CEF-format logs ingested from security appliances such as firewalls, proxies, and IDS/IPS.
scope: MEDIUM
notes: Security-device telemetry with source/destination addresses and event detail; reveals network and defensive posture, so the asset is MEDIUM sensitivity.
links:
