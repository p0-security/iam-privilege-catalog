name: Kubernetes HorizontalPodAutoscalers
description: Kubernetes HorizontalPodAutoscaler objects in an AKS fleet that define automatic scaling of workloads (target deployment, min/max replicas, and metric thresholds).
scope: MEDIUM
notes: "Autoscaling config is supporting operational infrastructure: it controls capacity for application workloads but holds no data or credentials itself."
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting an HPA removes autoscaling for its target, leaving the workload unable to scale to demand and degrading the service it supports.
  write:
    risks:
      - impact:dos
      - impact:manipulation
      - impact:hijack
      - impact:spend
    notes: "Creating/updating an HPA alters scaling behavior: forcing min replicas to zero denies service, while inflating max replicas consumes compute for hijacking and drives up spend; both manipulate operational config."
