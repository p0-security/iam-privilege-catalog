name: Kubernetes resource quotas (Fleet member)
description: Kubernetes ResourceQuota objects in a namespace of an AKS Fleet member cluster. They define aggregate resource consumption limits (CPU, memory, object counts) enforced per namespace.
scope: MEDIUM
notes: Quotas are operational guardrails, not data; their main sensitivity is that removing/relaxing them lets workloads consume unbounded cluster capacity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:hijack
    notes: Deleting a ResourceQuota removes the cap limiting namespace resource consumption, enabling unbounded scheduling of attacker workloads (e.g. cryptomining) within the cluster.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    notes: "Creating/updating a ResourceQuota alters operational namespace limits: raising/removing caps frees capacity for attacker workloads (hijack); tightening to zero can block scheduling (manipulation)."
