name: Kubernetes StorageClasses (AKS fleet member)
description: Cluster-scoped Kubernetes StorageClass objects in an AKS Fleet member, which define dynamic volume provisioning configuration (provisioner, backend parameters, reclaim policy, volume binding mode) used to satisfy PersistentVolumeClaims.
scope: MEDIUM
notes: Storage subsystem configuration (data-plane/isDataAction) — supporting infrastructure, not the primary production data store and not secret material; StorageClass parameters may reference secret names but never return secret values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting StorageClasses removes provisioning definitions so new PersistentVolumeClaims can no longer be satisfied; already-provisioned volumes keep working, so the impact is to future provisioning rather than immediate workload disruption.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating StorageClasses alters dynamic provisioning behavior (provisioner, parameters, reclaim policy) for future volumes across the cluster, manipulating operational storage configuration.
