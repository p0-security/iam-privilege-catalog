name: Kubernetes CSI storage capacities (fleet member)
description: CSIStorageCapacity objects are Kubernetes data-plane resources that advertise the storage capacity available per topology segment for a CSI driver, used by the kube-scheduler to make volume-aware pod placement decisions on a fleet member cluster.
scope: MEDIUM
notes: These are operational scheduling-hint objects regenerated by CSI drivers; they contain no secret material and only describe storage capacity/topology metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Deleting CSIStorageCapacity objects removes operational scheduling metadata used by the scheduler; the objects are regenerated by CSI drivers, so the impact is metadata destruction rather than loss of persistent data.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating CSIStorageCapacity objects lets an attacker falsify reported storage capacity, manipulating the scheduler's volume placement decisions; it touches only supporting scheduling metadata, not primary data.
