name: Kubernetes leases (coordination.k8s.io)
description: Kubernetes Lease objects in the coordination.k8s.io API group within a Fleet member cluster. Leases are lightweight coordination primitives used for leader-election among controllers and for node/kubelet heartbeats.
scope: MEDIUM
notes: Leases hold no sensitive data; their value to an attacker is control-plane coordination state (reconnaissance) and the ability to disrupt leader-election/heartbeats (availability).
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
    notes: Deleting leases removes leader-election locks and heartbeat objects, forcing re-election churn or stalling controllers and degrading cluster availability.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Writing leases lets an attacker tamper with leader-election records or falsify heartbeats, hijacking/stalling controller leadership and disrupting cluster coordination.
