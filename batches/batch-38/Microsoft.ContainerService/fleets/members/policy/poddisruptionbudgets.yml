name: AKS fleet member PodDisruptionBudgets
description: PodDisruptionBudget (PDB) objects on an AKS fleet member cluster, accessed via the managed control-plane passthrough. PDBs are availability-policy objects that constrain how many pods of a workload may be voluntarily disrupted (e.g. during node drains/upgrades).
scope: MEDIUM
notes: PDBs are workload availability/resilience configuration for a single cluster's services; manipulating them affects service availability and maintenance operations.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:dos
    notes: Deleting PDBs removes the availability-protection policy guarding workloads, so node drains/evictions can take down all replicas of a service simultaneously, enabling denial of service.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: "Creating/updating PDBs alters availability policy: an attacker can set minAvailable equal to replica count to block all evictions/drains (wedging node maintenance and upgrades) or weaken protections, manipulating operational config and degrading service operations."
