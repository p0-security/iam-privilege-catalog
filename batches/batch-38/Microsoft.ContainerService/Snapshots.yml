name: AKS node pool snapshots
description: An AKS node pool snapshot captures the configuration of an agent (node) pool — VM size, OS type, Kubernetes/orchestrator version, and node labels — so it can be used as a baseline to seed new node pools.
scope: MEDIUM
notes: Captures node-pool configuration metadata only, not workload disk contents or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Delete destroys a saved node-pool configuration baseline used for reproducible provisioning/recovery.
  write:
    risks:
      - impact:manipulation
    notes: Create writes a node-pool configuration artifact that can stage/alter baselines later used to provision node pools; in isolation it does not run workloads or grant identity access.
