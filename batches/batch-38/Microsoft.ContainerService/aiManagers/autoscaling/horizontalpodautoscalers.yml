name: Kubernetes HorizontalPodAutoscalers (AKS AI managers)
description: HorizontalPodAutoscalers are Kubernetes autoscaling objects that automatically adjust a target workload's replica count between configured min/max bounds based on observed metrics.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
    notes: Deleting an HPA removes autoscaling from its target workload, leaving it unable to scale to meet demand and degrading availability under load; the underlying workload itself is not destroyed.
  write:
    risks:
      - impact:manipulation
      - impact:dos
      - impact:spend
    notes: Creating/updating an HPA lets an attacker alter scaling policy to pin replicas low (starving a service for DoS), force/raise max replicas to provision excess compute (spend/consumption), and manipulate operational scaling behavior.
