name: AKS CSIStorageCapacity objects (Kubernetes storage)
description: Kubernetes CSIStorageCapacity objects within an AKS AI Manager, reporting available storage capacity per storage class and topology segment for capacity-aware scheduling.
scope: MEDIUM
notes: Data-plane (Kubernetes) scheduling-hint objects; they hold capacity metadata, not organizational data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting CSIStorageCapacity objects strips the scheduler's capacity view, blocking capacity-aware volume provisioning and disrupting stateful workloads.
  write:
    risks:
      - impact:manipulation
    notes: Writing CSIStorageCapacity objects falsifies reported capacity, manipulating the scheduler's capacity-aware volume placement decisions.
