name: Cross-tenant vault mapping credentials
description: "Recovery Services vault credentials for cross-tenant vault mappings: downloadable credential material that authenticates and registers an agent or identity to a backup vault across tenant trust boundaries."
scope: CRITICAL
notes: Vault credentials are usable identity/authentication material; cross-tenant variants enable access into another tenant's recovery vault and its backed-up data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: This generate/action produces and returns the cross-tenant vault credential material, exporting usable credentials (exfiltration:crypto) that enable authentication and lateral movement into another tenant's backup vault (escalation:lateral).
