name: Container App
description: An Azure Container App is a serverless container hosting resource that runs application workloads, with configuration covering the container image, ingress, scaling, environment variables, secrets, and assigned managed identities.
scope: CRITICAL
notes: Production compute supporting a single application function; can hold secrets and managed identities that authenticate to backing services.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: This listSecrets action returns the app's secret values in cleartext, directly exfiltrating credential material and enabling lateral movement into the services those credentials authenticate to.
