name: Logic Apps API connection
description: A managed API connection (Logic Apps / connector instance) that stores the configuration and authentication binding linking workflows to a backend service.
scope: CRITICAL
notes: Connections embed reusable backend credentials/OAuth tokens; secret material is exposed only via dedicated listsecrets/listconnectionkeys actions, while the resource itself supports a single integration function.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the connection's stored secrets (backend passwords, OAuth tokens, connection strings), exporting reusable credentials that grant direct authenticated access to the connected system.
