name: Azure Automation Account
description: An Azure Automation account is the top-level container for runbooks, schedules, assets (variables, credentials, certificates), DSC/hybrid-worker registration, and an optional managed/Run As identity used to execute automation across the subscription.
scope: CRITICAL
notes: The account's managed/Run As identity often holds broad subscription roles, and the account holds runbook code and secret assets, making it a high-value automation control point.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the account's primary/secondary registration keys (credential material used to enroll DSC nodes and hybrid runbook workers); an attacker can register a rogue worker and execute code under the account, so this is cryptographic exfiltration enabling lateral movement.
