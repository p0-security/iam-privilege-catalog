name: Log Analytics workspace table (OEPAuditLogs)
description: A specific table within an Azure Monitor / Log Analytics workspace holding ingested log records, queried via the data plane (KQL). This table stores Azure Data Manager for Energy (OSDU/OEP) platform audit log records.
scope: MEDIUM
notes: Log Analytics monitoring/audit data is a confidential asset whose exposure aids reconnaissance and detection evasion, but it is not a primary production data store; scope is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports platform audit records disclosing user actions and accessed resources useful for reconnaissance.
