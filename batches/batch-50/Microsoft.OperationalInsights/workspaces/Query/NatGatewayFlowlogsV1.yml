name: Log Analytics workspace table (NatGatewayFlowlogsV1)
description: A queryable table within an Azure Log Analytics workspace that stores NAT gateway flow-log records (IPs, ports, traffic flows). Reading it returns the stored rows via a data-plane KQL query.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostic data at MEDIUM sensitivity; flow logs reveal network topology and connections.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Returns NAT gateway flow-log rows, exporting network flow telemetry and revealing IPs/connection topology.
