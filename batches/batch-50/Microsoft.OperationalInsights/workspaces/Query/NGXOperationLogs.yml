name: Log Analytics workspace table (NGXOperationLogs)
description: A Log Analytics workspace query table holding ingested log records for a specific data type (here NGINX-for-Azure operation logs). Reading the table returns the stored log rows via the data plane.
scope: MEDIUM
notes: Monitoring/diagnostics asset. Operation logs may contain operational and configuration detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning NGINX-for-Azure operation-log rows, exporting operational telemetry from the workspace.
