name: Log Analytics workspace table (OEWExperimentScorecards)
description: A queryable table within an Azure Log Analytics workspace that stores Online Experimentation Workspace scorecard telemetry. Reading it returns the stored rows via a data-plane KQL query.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostic data at MEDIUM sensitivity; experiment data can include confidential product metrics.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns experiment scorecard rows, exporting experimentation result telemetry.
