name: Log Analytics NTAIpDetails table
description: A Log Analytics workspace table holding Network Traffic Analytics per-IP detail records (IP addresses, traffic endpoints). Reading it returns the stored log rows.
scope: MEDIUM
notes: Monitoring data is MEDIUM scope; inventories IP addresses and network endpoints.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Exports per-IP network-flow telemetry and inventories IP addresses/endpoints for network reconnaissance.
