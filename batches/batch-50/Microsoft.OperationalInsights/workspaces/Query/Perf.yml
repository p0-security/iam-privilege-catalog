name: Log Analytics Perf table
description: A Log Analytics workspace query table holding the Perf performance-counter log, recording CPU/memory/disk/network counters from monitored hosts and VMs.
scope: MEDIUM
notes: Host monitoring telemetry; MEDIUM sensitivity but reveals host inventory and resource utilization.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Read returns performance-counter telemetry from monitored hosts, exporting log data that also reveals infrastructure inventory and resource utilization.
