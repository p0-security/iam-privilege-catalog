name: Log Analytics NWConnectionMonitorPathResult table
description: A Log Analytics workspace query table holding Azure Network Watcher Connection Monitor path results, recording hop-by-hop network path telemetry between monitored endpoints.
scope: MEDIUM
notes: Network monitoring telemetry; MEDIUM sensitivity but maps routes, hops, and topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Read returns path-hop monitoring results, exporting telemetry that maps network routes and intermediate hops.
