name: Log Analytics OEPElasticsearch table
description: A Log Analytics workspace query table holding Azure Data Manager for Energy Elasticsearch logs, recording operational telemetry for the platform's search service.
scope: MEDIUM
notes: Operational application log data for a single platform function; MEDIUM sensitivity, may contain query content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Read returns Elasticsearch log records, exporting operational/search-service telemetry that may contain query content.
