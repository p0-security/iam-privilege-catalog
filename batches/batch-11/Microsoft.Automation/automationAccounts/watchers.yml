name: Azure Automation watcher job
description: An Azure Automation watcher is a scheduled job that repeatedly invokes a watcher runbook (PowerShell) inside the Automation sandbox to monitor for a condition and trigger action runbooks; the code executes under the Automation account's Run As / managed identity.
scope: HIGH
notes: Watcher jobs run attacker-supplied/referenced runbook code as the Automation account's identity, which is frequently granted broad subscription roles.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deletes the watcher, removing automation infrastructure and halting the monitoring/automation function it provides.
  write:
    risks:
      - escalation:lateral
      - impact:hijack
      - impact:manipulation
    notes: Creating/updating a watcher configures recurring runbook execution under the account's managed identity, enabling code execution as that identity (lateral movement), running attacker workloads (hijack), and altering automation config.
