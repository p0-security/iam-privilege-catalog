name: Container registry policies
description: The security and lifecycle policies of an Azure Container Registry (e.g. quarantine/vulnerability-scan gate, content trust, retention, export).
scope: HIGH
notes: These policies are supply-chain defenses; reading reveals the security posture and writing can disable image-validation controls.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Updating registry policies lets an attacker disable defenses such as the quarantine vulnerability-scan gate and content-trust enforcement, weakening supply-chain protections and altering security configuration.
