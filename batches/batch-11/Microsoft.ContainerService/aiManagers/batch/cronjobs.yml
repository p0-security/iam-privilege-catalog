name: Kubernetes CronJobs
description: Kubernetes CronJob objects (batch/v1) that define containerized workloads scheduled to run on a recurring basis within an AKS/managed cluster namespace.
scope: HIGH
notes: CronJobs run arbitrary containers that can mount service-account tokens and secrets, so write access grants code execution and identity abuse within the cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting cronjobs removes scheduled workloads, disrupting recurring operational tasks (e.g. backups/maintenance) and tearing down workload infrastructure.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
      - impact:spend
    notes: Creating/updating cronjobs lets an attacker schedule arbitrary containers (cryptomining/botnet) that run with a pod service-account identity and can mount secrets, enabling resource hijacking, lateral movement, workload tampering, and recurring compute spend.
