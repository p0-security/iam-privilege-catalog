name: Tenant subscription policy
description: The tenant-wide subscription policy governing who may create, transfer in/out, or leave the tenant with subscriptions.
scope: CRITICAL
notes: A tenant-scoped governance guardrail; weakening it enables tenant-wide subscription abuse.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Subscription
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating the tenant subscription policy alters tenant-wide governance controls, letting an attacker weaken or disable the guardrails (e.g. blocking subscription transfer/leave) that would otherwise constrain abuse.
