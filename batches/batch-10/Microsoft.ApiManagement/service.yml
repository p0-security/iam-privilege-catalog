name: API Management service
description: An Azure API Management (APIM) service instance is a managed API gateway that fronts, secures, and routes traffic to a business function's backend APIs, holding gateway policies, named-value secrets, certificates, custom domains, and developer/subscription identities.
scope: HIGH
notes: The gateway sits on the public-facing path of an organizational function's APIs and can hold credential material (named values, certificates, subscription keys) and a managed identity; treat it as a single-function production service of HIGH sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the service tears down the gateway and takes down every API it fronts, both destroying infrastructure and denying service.
  write:
    risks:
      - impact:manipulation
      - escalation:lateral
      - impact:spend
    notes: Create/update of the service lets an attacker reconfigure the gateway (policies, backends, networking) of a production API surface, assign/use a managed identity for lateral movement, and provision a costly metered SKU.
