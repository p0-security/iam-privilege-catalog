name: APIM Credential Manager authorization permission
description: An access-control grant on an API Management Credential Manager authorization, specifying which Azure AD principals or managed identities are permitted to use a stored OAuth credential/connection.
scope: HIGH
notes: Permissions govern who may leverage stored third-party OAuth credentials/connections through the gateway; manipulating them controls access to those backing credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deleting an authorization permission removes an access-control grant on a stored credential, destroying policy data and revoking other principals' authorized use of the connection.
  write:
    risks:
      - escalation:privilege
      - escalation:lateral
    notes: Creating a permission grants a chosen principal the right to use a stored OAuth credential/connection, adding privileges to a controlled identity and enabling lateral movement to the backend the credential authorizes.
