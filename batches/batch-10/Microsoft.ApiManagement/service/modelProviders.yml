name: API Management model providers
description: Model provider registrations on an Azure API Management AI gateway that define upstream LLM backend integrations (provider endpoints, routing, and credential configuration) the gateway routes inference traffic through.
scope: HIGH
notes: Provider credential material is exposed only via the separate listCredentials action, which per its description returns metadata rather than secret values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a model provider removes a configured upstream LLM integration, disrupting inference traffic routed through it (a targeted DoS-like infrastructure removal).
  write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Creating/updating a model provider lets an attacker repoint the gateway to an attacker-controlled LLM endpoint or plant/alter provider credentials, manipulating operational inference routing and enabling the gateway to call out as a configured identity (lateral movement).
