name: Microsoft Sentinel content packages
description: Content Packages are installed Microsoft Sentinel solution bundles containing detection content such as analytics rules, hunting queries, playbooks, parsers and connectors deployed in a workspace.
scope: MEDIUM
notes: Reading is read-only enumeration of which detection content/solutions are deployed (configuration inventory).
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting installed Content Packages removes bundled detection content (analytics rules, hunting queries, playbooks), disabling SIEM defensive coverage to aid evasion.
  write:
    risks:
      - impact:manipulation
    notes: Installing Content Packages adds or overwrites Sentinel solution content (analytics rules, playbooks, connectors), altering detection/automation configuration and potentially introducing attacker-controlled content.
