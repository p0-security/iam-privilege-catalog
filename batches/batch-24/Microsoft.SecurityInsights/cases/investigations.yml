name: Microsoft Sentinel case investigations
description: Case investigations are the Microsoft Sentinel investigation graph and metadata tying an incident's alerts to correlated entities, timelines, and analyst findings.
scope: MEDIUM
notes: Reveals the depth of the SOC's understanding of an incident.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Updating investigation metadata lets an attacker alter the record of an active incident investigation to misdirect or suppress the defensive response.
