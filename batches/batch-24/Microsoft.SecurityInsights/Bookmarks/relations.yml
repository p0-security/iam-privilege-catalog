name: Microsoft Sentinel bookmark relations
description: Microsoft Sentinel bookmark relations — the analyst-curated links connecting saved hunting/investigation bookmarks to incidents and entities.
scope: MEDIUM
notes: These are incident-investigation artifacts; exposing or tampering with them reveals or disrupts active SOC investigations.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
    notes: Deleting a bookmark relation removes investigation artifacts tying evidence to incidents/entities, disrupting incident response and forensic reconstruction.
  write:
    risks:
      - impact:manipulation
    notes: Updating a relation tampers with investigation linkage data, corrupting or misdirecting the analyst's view of an active incident.
