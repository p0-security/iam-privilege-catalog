name: Microsoft Sentinel workspace manager assignments
description: Microsoft Sentinel workspace manager assignments define which centrally-managed security content/configuration is pushed to which member Sentinel workspaces from a central manager workspace.
scope: MEDIUM
notes: Assignments govern fleet-wide distribution of detection content; manipulation affects defensive posture across many member workspaces.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting workspace manager assignments removes the centrally-pushed security content from member workspaces, degrading detection coverage across the managed fleet and aiding evasion.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating workspace manager assignments pushes (or alters) centrally-managed security content across member workspaces, letting an attacker manipulate or weaken detection content fleet-wide.
