name: Database column sensitivity label
description: A data-classification sensitivity label applied to a column in a managed-instance database, marking the column's information type and sensitivity rank (e.g., PII, financial) for auditing and DLP/protection controls.
scope: MEDIUM
notes: Sensitivity labels drive classification-based auditing and data-protection defenses; tampering with them weakens detection of access to sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
      - destruction:defense
    notes: Deleting a column's sensitivity label removes the data-classification metadata that feeds auditing/DLP controls, both destroying classification metadata and weakening the detection defense over sensitive columns.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/overwriting a column's sensitivity label can falsify or mislabel the data-classification metadata that drives auditing/DLP, tampering with classification state and weakening detection defenses.
