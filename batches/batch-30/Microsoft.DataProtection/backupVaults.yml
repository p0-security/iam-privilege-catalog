name: Backup vaults
description: A Backup Vault is the Azure DataProtection resource container that holds backup instances, policies, and recovery points for protected workloads.
scope: HIGH
notes: The vault and its contained recovery points are the recovery mechanism that mitigates data loss and ransomware.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DataProtection
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - destruction:infra
    notes: Deleting a backup vault destroys the vault and all recovery points/backups it contains, eliminating the organization's recovery capability and the backup infrastructure itself.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a backup vault provisions or reconfigures the backup container resource (e.g. redundancy, soft-delete, identity settings), altering the protection posture.
