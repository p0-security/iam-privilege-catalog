name: Managed Cassandra cluster
description: A managed Apache Cassandra cluster hosted by Azure Cosmos DB (the control-plane resource that hosts a production NoSQL database and its data nodes).
scope: HIGH
notes: A production database service supporting a single organizational function; its hosted data is sensitive, but control-plane operations on the cluster do not directly read the stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Requesting a keyspace repair triggers a resource-intensive anti-entropy/reconciliation maintenance operation that consumes cluster resources and rewrites replica state, allowing disruption of operational performance.
