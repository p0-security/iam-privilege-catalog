name: MongoDB database throughput setting
description: A throughput (RU/s) capacity configuration for a Cosmos DB MongoDB-API database. It is a control-plane setting that governs provisioned request-unit capacity and the associated metered cost for a production data store, but does not itself expose the stored data.
scope: HIGH
notes: Throughput controls availability and billing of a production database; it is capacity/cost configuration, not the data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
      - impact:manipulation
    notes: Redistributing RU/s across physical partitions can starve specific (hot) partitions of capacity (dos) and reconfigures operational capacity allocation (manipulation), without changing total provisioned throughput.
