name: Garnet cluster cache data
description: Garnet is a Redis-compatible in-memory cache/data store offered under Azure Cosmos DB (Microsoft.DocumentDB). These ACL-scoped data-plane operations read, write, and delete keys/values held in the cluster.
scope: HIGH
notes: Production cache data stores typically hold session state, application data, and sometimes sensitive values; access is scoped to a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: HINCRBY mutates a hash field's integer value, letting an attacker tamper with stored operational data such as counters.
