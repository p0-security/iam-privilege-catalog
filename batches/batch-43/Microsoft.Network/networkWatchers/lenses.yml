name: Network Watcher Lens
description: A Network Watcher Lens is a network traffic monitoring/capture resource that observes and records traffic flowing through a specified endpoint, part of Azure's network diagnostics tooling.
scope: MEDIUM
notes: Monitoring/diagnostic resource; captured traffic can contain sensitive in-transit data, but the asset is a supporting observability component rather than a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a Lens removes a network-traffic monitoring mechanism, eliminating defensive visibility into the endpoint and impairing incident response.
  write:
    risks:
      - collection:data
      - impact:manipulation
    notes: Creating/configuring a Lens establishes automated network-traffic capture on a chosen endpoint and lets an attacker alter monitoring configuration to collect organizational network data.
