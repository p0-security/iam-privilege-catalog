name: Connection Analyzer
description: A Network Watcher connectivity diagnostic resource (connection monitor/analyzer) that defines source/destination tests and collects reachability telemetry between network endpoints.
scope: MEDIUM
notes: Supporting network monitoring/diagnostics asset, not an enforced security control or production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deletes a network connectivity diagnostic resource, removing a supporting monitoring/observability component.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the analyzer alters network-diagnostic configuration on a supporting monitoring resource; no data access or escalation in isolation.
