name: Internet Analyzer test
description: An Internet Analyzer (networkExperimentProfiles) test is a network performance-measurement experiment that measures client latency to a set of endpoints/origins. It is a supporting diagnostic resource, not production traffic infrastructure.
scope: MEDIUM
notes: Non-production measurement tooling; exposes only network performance telemetry and test configuration, no organizational data, secrets, or identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a test removes a supporting measurement/diagnostic resource, a low-blast-radius deletion with no service-hosting role.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a test alters measurement configuration on a supporting diagnostic resource; no production traffic, data, or identity impact.
