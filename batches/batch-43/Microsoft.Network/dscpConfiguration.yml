name: DSCP (QoS) configuration
description: A DSCP configuration defines Quality-of-Service (QoS) traffic-marking and prioritization policy applied to network interfaces.
scope: MEDIUM
notes: Supporting traffic-shaping/QoS resource; low operational sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating the DSCP configuration alters network traffic-prioritization settings, manipulating operational network behavior.
