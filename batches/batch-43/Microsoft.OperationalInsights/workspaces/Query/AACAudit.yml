name: Log Analytics AACAudit table data
description: AACAudit is a Log Analytics data-plane table holding ingested audit log records (Azure App Configuration / API gateway audit events) queryable within the workspace.
scope: MEDIUM
notes: Data-plane access to ingested audit logs, which can contain sensitive operational and identity details.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: This data action reads actual records from the AACAudit table, allowing an attacker to export ingested audit log data that may contain sensitive operational and identity information.
