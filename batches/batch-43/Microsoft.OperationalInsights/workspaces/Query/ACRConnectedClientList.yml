name: Log Analytics workspace table (ACRConnectedClientList)
description: A specific table within an Azure Monitor Log Analytics workspace. Data-plane read access returns the ingested log records stored in that table for querying.
scope: MEDIUM
notes: Per-table data-plane permission scoped to one log stream within a workspace; sensitivity depends on the source service but is monitoring/diagnostics telemetry that may contain operational PII.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns Azure Container Registry connected-client log records, exporting telemetry that inventories clients connecting to the registry.
