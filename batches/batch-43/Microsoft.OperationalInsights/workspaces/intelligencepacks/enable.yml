name: Log Analytics intelligence pack
description: An intelligence pack (solution) is a packaged monitoring/analytics capability that can be enabled or disabled on a Log Analytics workspace, some of which provide security detection.
scope: MEDIUM
notes: Feature/solution toggle for the workspace; some packs are security-relevant detection solutions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Enabling an intelligence pack changes the workspace's solution configuration and can drive additional metered data ingestion and cost.
