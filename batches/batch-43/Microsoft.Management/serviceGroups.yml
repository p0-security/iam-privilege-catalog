name: Service groups
description: A service group is a tenant-level organizational grouping construct used to logically group resources for observability and management, independent of the RBAC/policy-inheriting management group hierarchy.
scope: MEDIUM
notes: Service groups organize resources operationally but do not drive RBAC/policy inheritance the way management groups do.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Management
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Deleting a service group removes an organizational grouping construct used operationally for resource scoping/observability, destroying structural metadata without affecting the underlying resources, data, or RBAC inheritance.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a service group alters the organizational grouping/metadata used for resource scoping and observability, with no direct data or identity access in isolation.
