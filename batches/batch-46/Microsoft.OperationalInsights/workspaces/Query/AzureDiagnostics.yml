name: Log Analytics workspace table (AzureDiagnostics)
description: A specific table in an Azure Log Analytics (Azure Monitor) workspace queried via the data plane. AzureDiagnostics is the catch-all diagnostic-log table aggregating resource diagnostic logs from many Azure services.
scope: MEDIUM
notes: Log Analytics monitoring/diagnostic data is MEDIUM-sensitivity; catch-all tables can contain request details, identifiers, and operational specifics from many resources.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this catch-all table exports diagnostic log content from many Azure resources (exfiltration:logs) and enumerates what activity is logged (discovery:logs).
