name: Log Analytics workspace table data (AWSNetworkFirewallTls)
description: A per-table data-plane query permission on a Log Analytics workspace; this one returns rows of the AWSNetworkFirewallTls table, which holds AWS Network Firewall TLS inspection logs ingested into the workspace.
scope: MEDIUM
notes: TLS inspection telemetry exposing SNI/endpoints and encrypted-session metadata; monitoring/log-data sensitivity tier.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reads AWS Network Firewall TLS inspection log rows, exporting the log content and revealing TLS endpoints, SNI, and encrypted-traffic destinations and patterns.
