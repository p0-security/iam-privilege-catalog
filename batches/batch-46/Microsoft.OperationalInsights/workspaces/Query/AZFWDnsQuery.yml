name: Azure Firewall DNS-query log table (Log Analytics)
description: A Log Analytics workspace query data-plane permission scoped to the AZFWDnsQuery table, which stores Azure Firewall DNS-proxy query telemetry ingested into the workspace.
scope: MEDIUM
notes: DNS-query logs expose internal hostnames, resolved domains, and source clients that map the organization's network and communication patterns.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - discovery:network
    notes: Exports DNS resolution records revealing internal naming, queried FQDNs, and host-to-destination mappings useful for network reconnaissance.
