name: Log Analytics workspace table (AzureMetrics)
description: A specific table in an Azure Log Analytics (Azure Monitor) workspace, queried via the data plane, holding platform metric/telemetry data points.
scope: MEDIUM
notes: Numeric performance telemetry rather than message content; MEDIUM monitoring-data sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading returns collected platform metric telemetry (exfiltration:logs) and inventories the metrics recorded (discovery:logs); content is numeric telemetry, lowering practical sensitivity.
