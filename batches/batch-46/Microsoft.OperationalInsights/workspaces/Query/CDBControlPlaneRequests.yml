name: Log Analytics workspace table (CDBControlPlaneRequests)
description: A specific table in an Azure Log Analytics (Azure Monitor) workspace, queried via the data plane, holding Azure Cosmos DB control-plane (management-operation) request log records.
scope: MEDIUM
notes: Management-operation log telemetry revealing how database accounts are administered; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports Cosmos DB control-plane request log content (exfiltration:logs) and inventories the logged management activity (discovery:logs).
