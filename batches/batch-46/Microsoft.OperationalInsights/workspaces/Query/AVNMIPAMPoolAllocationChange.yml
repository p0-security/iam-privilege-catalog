name: Log Analytics workspace query table (AVNMIPAMPoolAllocationChange)
description: A specific log table within an Azure Log Analytics workspace recording Azure Virtual Network Manager IPAM pool allocation-change events; this data-plane read returns the stored records.
scope: MEDIUM
notes: Monitoring/diagnostics data (MEDIUM). Content reveals IP address-space allocation, which has network-reconnaissance value.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading this table exports IPAM allocation-change logs (exfiltration:logs) and discloses the organization's IP address-space layout and network topology (discovery:network).
