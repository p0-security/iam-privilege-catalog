name: Log Analytics workspace table (CDBCassandraRequests)
description: A specific table in an Azure Log Analytics (Azure Monitor) workspace, queried via the data plane, holding Azure Cosmos DB Cassandra-API request log records.
scope: MEDIUM
notes: Per-request log telemetry exposing operations, identifiers, and access patterns against a database; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports Cosmos DB Cassandra-API request log records (exfiltration:logs) and enumerates the logged data-access activity (discovery:logs).
