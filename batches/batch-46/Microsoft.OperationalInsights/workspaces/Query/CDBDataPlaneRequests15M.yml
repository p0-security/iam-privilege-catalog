name: Log Analytics workspace table data (CDBDataPlaneRequests15M)
description: A Log Analytics workspace table queried via the data plane; this table (CDBDataPlaneRequests15M) holds 15-minute-aggregated Azure Cosmos DB data-plane request log records ingested into the Azure Monitor workspace.
scope: MEDIUM
notes: Monitoring/diagnostics data. Reading it exports Cosmos DB request telemetry revealing database access patterns.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns aggregated Cosmos DB data-plane request log rows, exposing database access-pattern telemetry.
