name: Log Analytics workspace table (AZMSOperationalLogs)
description: A Log Analytics workspace query table holding Azure Messaging Services operational/management event logs. Reading it returns the stored operational records via the data plane.
scope: MEDIUM
notes: Operational diagnostic data that may reveal configuration changes; MEDIUM-sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports messaging operational/management event log content (exfiltration:logs) and inventories namespace activity logged (discovery:logs).
