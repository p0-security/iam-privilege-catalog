name: Log Analytics workspace table (AWSEKSLogs)
description: A Log Analytics workspace query table holding ingested AWS EKS Kubernetes cluster logs. Reading it is a data-plane operation returning the stored log rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores of MEDIUM sensitivity; ingested cluster logs can reveal workload/control-plane activity, identities, and configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Exports AWS EKS cluster logs that can embed control-plane/operational detail, identities, and configuration of Kubernetes workloads.
