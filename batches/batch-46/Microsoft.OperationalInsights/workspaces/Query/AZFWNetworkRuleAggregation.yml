name: Azure Firewall network-rule aggregation log table (Log Analytics)
description: A Log Analytics workspace query data-plane permission scoped to the AZFWNetworkRuleAggregation table, which stores aggregated Azure Firewall network-rule (L3/L4) traffic telemetry ingested into the workspace.
scope: MEDIUM
notes: Aggregated network-rule logs summarize permitted/denied flows and reveal communication patterns and firewall rule coverage.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - discovery:network
    notes: Exports summarized L3/L4 traffic flow records exposing network communication patterns and rule configuration.
