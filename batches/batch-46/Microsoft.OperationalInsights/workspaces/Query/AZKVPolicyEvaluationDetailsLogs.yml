name: Log Analytics table data (AZKVPolicyEvaluationDetailsLogs)
description: A single Log Analytics workspace table holding Azure Key Vault policy-evaluation detail telemetry. A data-plane read returns the actual log rows for this table.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic assets (MEDIUM tier). Policy-evaluation content reveals Key Vault access/compliance policy decisions and outcomes.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports Key Vault policy-evaluation records, revealing access-control posture and enforcement outcomes.
