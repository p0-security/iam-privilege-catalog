name: Notebook workspace
description: A managed Jupyter notebook workspace (hosted compute environment) attached to a Cosmos DB account, used to run notebooks against the account's data.
scope: MEDIUM
notes: Supporting compute asset; can run arbitrary code/workloads and incur metered spend.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deletes the notebook workspace, removing the supporting compute environment and any notebooks/state it hosts.
  write:
    risks:
      - impact:hijack
      - impact:spend
    notes: Creating/updating a notebook workspace provisions a managed compute environment an attacker can use to run arbitrary workloads, enabling resource hijacking and incurring spend.
