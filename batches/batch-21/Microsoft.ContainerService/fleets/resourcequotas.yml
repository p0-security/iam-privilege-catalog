name: Kubernetes resource quotas (fleet)
description: Kubernetes ResourceQuota objects within an AKS fleet namespace, which define and enforce aggregate resource consumption limits (CPU, memory, object counts) for a namespace.
scope: MEDIUM
notes: Operational capacity-governance configuration; not sensitive data nor credentials, but controls the shared cluster resource pool.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:consumption
    notes: Deleting a ResourceQuota removes the enforcement policy capping namespace resource consumption, lifting limits and enabling unbounded resource use across the namespace.
  write:
    risks:
      - impact:manipulation
      - impact:consumption
    notes: Creating/updating ResourceQuotas alters operational namespace limits; an attacker can loosen quotas to exhaust the limited resource pool or tighten them to starve legitimate workloads.
