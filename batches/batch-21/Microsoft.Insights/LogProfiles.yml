name: Azure Monitor Activity Log profile
description: A Log Profile is the (legacy) subscription-level configuration that controls archival, retention, and export of the Azure Activity Log (the subscription's control-plane audit trail) to storage, Event Hub, or Log Analytics.
scope: MEDIUM
notes: Controls subscription audit-log collection; tampering directly impairs detection and incident response across the whole subscription.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting the profile halts archival/export of subscription Activity Log events, destroying log collection and disabling a detection mechanism.
  Write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating/updating the profile lets an attacker reduce retention, drop categories, or redirect/disable export of the subscription Activity Log, weakening the audit trail to evade detection.
