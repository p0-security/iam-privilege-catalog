name: Azure metric alert rules
description: Metric alerts in Azure Monitor evaluate metric criteria across scoped resources and fire action groups (notifications, automation) when criteria are met. They are a detection and alerting mechanism.
scope: MEDIUM
notes: Monitoring/alerting configuration is MEDIUM-sensitivity supporting infrastructure; tampering weakens detection but does not itself touch production data or identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:defense
    notes: Deleting a metric alert removes a detection/alerting mechanism, preventing notification on the monitored condition and hindering incident response.
  Write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating or updating a metric alert lets an attacker alter criteria/scopes or break action groups to disable detection, and is a write to operational monitoring config.
