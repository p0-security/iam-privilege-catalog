name: Log Analytics workspace tables
description: A Log Analytics workspace table defines the schema, plan, and retention for a stream of ingested log/telemetry records within a Log Analytics workspace.
scope: MEDIUM
notes: Tables govern monitoring/diagnostic log storage; their configuration controls log retention and availability for detection and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:logs
      - destruction:defense
    notes: This action purges ingested log records from a workspace table, directly destroying collected logs/evidence and crippling detection and incident response.
