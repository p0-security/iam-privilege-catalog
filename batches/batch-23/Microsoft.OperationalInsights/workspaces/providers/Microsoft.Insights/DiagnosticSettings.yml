name: Log Analytics workspace diagnostic settings
description: A diagnostic setting controls which platform logs and metrics for the resource are collected and where they are routed (workspace, storage, event hub).
scope: MEDIUM
notes: Diagnostic settings are the on/off switch and routing for audit/diagnostic logging; tampering directly affects detection and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Writing the diagnostic setting lets an attacker disable or reroute log/metric collection, blinding monitoring and defeating incident response.
