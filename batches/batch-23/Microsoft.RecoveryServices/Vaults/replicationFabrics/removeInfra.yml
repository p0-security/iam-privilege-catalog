name: ASR replication fabrics
description: An Azure Site Recovery replication fabric is a disaster-recovery infrastructure container within a Recovery Services vault representing a source or target site/environment (e.g. on-prem, Azure region) used to orchestrate replication and failover.
scope: MEDIUM
notes: Supporting disaster-recovery/business-continuity infrastructure; control-plane configuration rather than the protected production data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:infra
      - impact:dos
    notes: Removes the underlying infrastructure components associated with the fabric, destroying DR replication infrastructure and disrupting recovery capability.
