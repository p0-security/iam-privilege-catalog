name: Site Recovery protection container mappings
description: Azure Site Recovery protection container mappings are disaster-recovery configuration objects that bind a source protection container to a target container and an associated replication policy.
scope: MEDIUM
notes: These are DR configuration associations within a Recovery Services vault; their sensitivity derives from disaster-recovery readiness, not from hosting production data directly.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a container mapping removes the replication configuration linking source and target containers, disrupting DR protection and failover capability.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a container mapping alters which replication policy and target govern protected workloads, manipulating DR protection configuration.
