name: Defender for Storage settings
description: Microsoft Defender for Cloud's threat-protection configuration for Azure Storage accounts at a given scope, controlling malware scanning, sensitive-data threat detection, and on-upload protection.
scope: MEDIUM
notes: A Defender for Cloud security-tooling/posture resource; sensitivity is that of a monitoring/defense control rather than primary production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the settings tears down storage threat protection at the scope, disabling detection of malicious storage activity.
  write:
    risks:
      - destruction:defense
    notes: Updating the settings lets an attacker disable malware scanning and threat detection on storage, removing a defense so subsequent data abuse goes undetected.
