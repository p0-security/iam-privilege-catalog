name: Microsoft Security private endpoint connection proxy
description: An internal private-endpoint connection proxy object that binds a private endpoint to the Microsoft Security (Defender for Cloud / Sentinel) service over Azure Private Link. Marked NRP-only (network resource provider plumbing).
scope: MEDIUM
notes: Supporting connectivity plumbing for the security service; touches network-path configuration, not data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the proxy tears down a private-link connectivity component, disrupting private access to the security service.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating the connection proxy establishes or alters the private-link binding, potentially exposing the service to an attacker-influenced private network (escalation:network) and mutating connectivity configuration (impact:manipulation).
