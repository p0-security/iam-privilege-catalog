name: API Management quota counters
description: Quota counter state for API Management rate-limit/usage policies, tracking consumed quota against configured limits.
scope: MEDIUM
notes: Non-sensitive operational throttling/usage state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Sets/resets a quota counter, letting an attacker zero out consumed quota to bypass rate-limiting and over-consume metered API capacity, or disrupt legitimate throttling.
