name: API Management certificates
description: API Management certificates are stored certificate entities (uploaded PFX or Key Vault references) used for mutual-TLS / client-certificate authentication from the gateway to backend services.
scope: MEDIUM
notes: The stored certificate is a credential the gateway presents to backends; control-plane reads expose only metadata, but write/delete affect backend trust material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Refreshes the certificate by re-fetching it from Key Vault, overwriting the in-use backend-auth credential material; the action does not return the secret to the caller, so it is configuration manipulation of the gateway's auth state rather than exfiltration.
