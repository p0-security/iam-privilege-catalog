name: API Management API schemas
description: Schema configuration (data contracts such as OpenAPI/WSDL/JSON definitions) associated with an API defined in an Azure API Management service. Governs how the gateway validates and shapes request/response payloads.
scope: MEDIUM
notes: API Management is a supporting gateway/middleware service; schema config is operational configuration of a single API, not the backend data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
    notes: Deleting the schema removes the API's contract/validation definition, disrupting and altering how the gateway processes requests.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the API schema alters the API's contract and validation behavior, manipulating how the gateway accepts and processes requests.
