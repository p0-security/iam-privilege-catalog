name: Azure Attestation provider
description: An Azure Attestation provider, the control-plane resource for a service that validates trusted-execution-environment (TEE)/enclave evidence used to gate trust decisions in confidential computing.
scope: MEDIUM
notes: Attestation supports a single security/trust function; the control plane manages service configuration and policy, not secret material directly.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Attestation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the attestation provider destroys the service that validates TEE/enclave evidence, denying attestation to any workload that depends on it.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating an attestation provider lets an attacker alter the trust/policy configuration of the service that validates enclave evidence, manipulating which attestations are accepted.
