name: Azure Attestation provider
description: An Azure Attestation provider, the control-plane resource for a service that validates trusted-execution-environment (TEE)/enclave evidence used to gate trust decisions in confidential computing.
scope: MEDIUM
notes: Attestation supports a single security/trust function; the control plane manages service configuration and policy, not secret material directly.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Attestation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Approving a private endpoint connection attaches a (potentially attacker-controlled) private endpoint to the attestation provider, granting private-network access to the service.
