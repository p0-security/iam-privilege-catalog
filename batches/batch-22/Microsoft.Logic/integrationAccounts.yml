name: Integration Account
description: "A Logic Apps Integration Account: a container for B2B/EDI artifacts (partners, agreements, schemas, maps, certificates) that supports enterprise integration workflows."
scope: MEDIUM
notes: Supporting integration resource scoped to a single integration function; can hold certificate/key references and access keys, but is not a primary org-wide data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - destruction:data
    notes: Deleting the integration account destroys the supporting resource and all contained B2B artifacts (partners, agreements, schemas, maps, certificates), breaking dependent workflows (DoS-like).
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating or updating the integration account lets an attacker alter B2B/EDI configuration (SKU/settings) that dependent Logic Apps rely on, and provision a billable tier incurring cost.
