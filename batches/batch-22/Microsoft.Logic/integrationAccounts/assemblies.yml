name: Integration Account Assembly
description: An Integration Account Assembly is a custom compiled .NET DLL uploaded to a Logic Apps integration account, referenced and executed by transformation maps and integration workflows.
scope: MEDIUM
notes: Holds proprietary executable custom code that runs inside the integration runtime.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deletes an uploaded assembly artifact, removing custom code and breaking dependent maps/workflows.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
      - escalation:lateral
    notes: Uploading or overwriting a .NET assembly injects attacker-controlled code that executes within the integration runtime, enabling tampering with message processing, running attacker workloads, and code execution in the resource's identity context.
