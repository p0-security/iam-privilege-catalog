name: Azure Firewall diagnostic settings
description: The Azure Monitor diagnostic settings attached to an Azure Firewall, controlling which log/metric categories are collected and where they are routed.
scope: MEDIUM
notes: Diagnostic/monitoring configuration for a security-relevant network device; controls detective telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating or updating the diagnostic setting lets an attacker disable categories or redirect firewall log/metric collection away from monitoring sinks, suppressing telemetry and removing a detective control.
