name: Network Watcher flow log
description: A Network Watcher flow log resource that captures NSG/VNet network traffic flow records to a storage destination for monitoring and traffic analytics.
scope: MEDIUM
notes: A network-traffic detection and forensic data source; disabling it removes visibility used for intrusion detection and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting a flow log stops collection of NSG/VNet traffic logs, destroying audit data and removing a network monitoring defense to evade detection and disrupt incident response.
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating or updating a flow log lets an attacker disable it or alter its retention/destination, weakening network traffic visibility used for intrusion detection and incident response.
