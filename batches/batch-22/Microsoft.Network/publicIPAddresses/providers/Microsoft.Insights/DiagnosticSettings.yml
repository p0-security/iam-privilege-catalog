name: Public IP Address diagnostic settings
description: The Azure Monitor diagnostic settings attached to a Public IP Address, controlling which log categories and metrics are collected and where they are routed (Log Analytics, storage, event hub).
scope: MEDIUM
notes: Monitoring/diagnostics configuration; sensitivity is low for reads but write access enables evasion.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating/updating diagnostic settings lets an attacker disable or redirect log/metric collection for the Public IP, blinding detection and incident response.
