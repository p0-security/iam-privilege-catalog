name: DNS Resolver Policy diagnostic settings
description: The diagnostic settings of a DNS Resolver Policy, defining which log/metric categories are collected and where they are routed (Log Analytics, storage, event hub).
scope: MEDIUM
notes: Controls log/metric export for the policy; central to audit and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating/updating diagnostic settings lets an attacker disable log categories or redirect telemetry away from monitoring sinks, suppressing audit logging and weakening a detective control.
