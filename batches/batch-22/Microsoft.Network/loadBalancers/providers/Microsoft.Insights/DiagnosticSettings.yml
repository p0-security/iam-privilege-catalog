name: Load Balancer diagnostic settings
description: Azure Monitor diagnostic settings attached to a Load Balancer, controlling which load balancer logs/metrics are collected and to which destinations they are routed.
scope: MEDIUM
notes: These settings govern monitoring/detective telemetry for the load balancer; weakening them undermines incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Create/update lets an attacker disable or redirect load balancer log/metric collection, suppressing audit telemetry and weakening detection.
