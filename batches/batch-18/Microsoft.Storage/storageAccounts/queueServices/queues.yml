name: Storage Queue Service Queues
description: A storage queue is a named message container within the queue service that holds messages (work items) for asynchronous producer/consumer processing.
scope: HIGH
notes: Queues carry in-flight operational data and may drive downstream automation; their stored access policies back SAS-token access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting a queue destroys all messages it contains, an irreversible loss of organizational data in transit and disruption of downstream consumers.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a queue (and its metadata) alters the operational queue configuration of the messaging resource.
