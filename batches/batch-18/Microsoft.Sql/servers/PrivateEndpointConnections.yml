name: Azure SQL Database private endpoint connection
description: A private endpoint connection binds an Azure Private Link private endpoint to a production Azure SQL Database server, governing which private networks can reach the database over Private Link and tracking its approval state.
scope: HIGH
notes: Controls private-network reachability of a production database holding a single organizational function's data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deletes a private endpoint connection, tearing down the private-link path to the production SQL server and disrupting private access for dependent clients (implied DoS).
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Approves or rejects a private endpoint connection, letting an attacker approve an attacker-controlled endpoint to reach the database over a private network, or reject/alter legitimate connection state.
