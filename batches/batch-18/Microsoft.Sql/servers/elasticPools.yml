name: Azure SQL Database elastic pool
description: An Azure SQL Database elastic pool is a shared compute and storage resource on a SQL server that hosts and allocates capacity across multiple production databases.
scope: HIGH
notes: Backs production databases supporting an organizational function; configuration changes or destruction affect every database in the pool.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the pool tears down the shared compute infrastructure backing its databases, disrupting service for the function they support.
  write:
    risks:
      - impact:manipulation
      - impact:dos
      - impact:spend
    notes: "Creating/updating a pool alters production database compute config: capacity reduction throttles/degrades the databases (DoS), scale-up drives cost, and it manipulates operational configuration."
