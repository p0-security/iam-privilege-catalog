name: Server firewall rule
description: An Azure SQL server firewall rule defines the IP address ranges permitted to connect to a logical SQL server, acting as the network access-control boundary in front of the databases it hosts.
scope: HIGH
notes: Firewall rules are the primary network defense for an internet-reachable production database server; loosening them directly exposes the data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a firewall rule removes a network-firewall defense protecting the server; in isolation it disables an access-restriction control.
  write:
    risks:
      - destruction:defense
      - escalation:network
    notes: Creating or overwriting a firewall rule lets an attacker open the server to arbitrary IP ranges (e.g. 0.0.0.0-255.255.255.255), defeating the network defense and exposing the database to attacker-controlled networks.
