name: Azure SQL database replication links
description: Replication links represent the geo-replication relationship between a primary Azure SQL database and its secondary replica(s), forming the disaster-recovery and availability topology for a single database.
scope: HIGH
notes: These are control-plane DR/availability infrastructure for one database function, not the data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a replication link tears down the geo-replication relationship, destroying DR infrastructure and undermining availability/failover protection for the database.
  write:
    risks:
      - impact:manipulation
    notes: Updating the replication link type alters the geo-replication configuration of a production database, manipulating its operational data-protection setup.
