name: Cosmos DB throughput pool accounts
description: A throughput pool account is the association binding a Cosmos DB (DocumentDB) account to a shared provisioned-throughput pool, controlling how pooled RU/s capacity is allocated to that production database account.
scope: HIGH
notes: Capacity-management construct over production database accounts; misconfiguration affects throughput available to a live data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - impact:dos
      - impact:spend
    notes: This write verb includes create/update/delete of an account's pool membership, letting an attacker reconfigure capacity allocation (manipulation), remove/shrink an account's pooled throughput to starve a production database (dos), and provision additional pooled RU/s for cost (spend).
