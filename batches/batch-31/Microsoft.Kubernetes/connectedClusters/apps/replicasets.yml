name: Kubernetes ReplicaSets (Azure Arc connected cluster)
description: "ReplicaSets are Kubernetes workload controllers that maintain a stable set of replica pods (typically managed by a Deployment) on an Azure Arc-connected cluster. The object holds the pod template: container images, replica counts, environment variables, volume/secret mounts and service-account binding."
scope: HIGH
notes: Lower-level pod-replication controller backing Deployments; can be written directly to schedule pods.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a ReplicaSet (or DeleteCollection) removes the pods it maintains, destroying running infrastructure and disrupting the backed service.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a ReplicaSet directly schedules attacker-controlled pods (resource hijack) under a chosen service account with mounted tokens/secrets (lateral movement), and alters running workload state.
