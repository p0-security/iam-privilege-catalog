name: Kubernetes IngressClasses (Arc connected cluster)
description: IngressClass objects are Kubernetes networking resources that bind Ingress resources to a specific ingress controller and its parameters, governing how external/L7 traffic is routed to cluster services. Surfaced via Azure Arc on a connected cluster.
scope: HIGH
notes: Controls the inbound traffic path to hosted services; tampering can redirect, expose, or break service routing.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting IngressClasses removes the controller binding ingress resources depend on, breaking inbound L7 routing and denying service to fronted applications.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating IngressClasses repoints which controller/parameters handle ingress, letting an attacker redirect or intercept inbound service traffic and broaden network exposure of cluster-hosted services.
