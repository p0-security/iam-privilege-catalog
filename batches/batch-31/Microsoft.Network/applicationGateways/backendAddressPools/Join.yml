name: Application Gateway backend address pool
description: An Application Gateway backend address pool is the set of backend targets (NICs, IPs, FQDNs) that an Azure Application Gateway load-balances traffic to. It is part of a production L7 network/load-balancing resource.
scope: HIGH
notes: Backend pool membership determines which resources sit behind the gateway's front-end and receive its routed traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Joining a resource into the backend address pool wires an attacker-controlled endpoint into the gateway's traffic path, granting network reachability behind the front-end (network movement).
