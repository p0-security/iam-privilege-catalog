name: DNS Private Resolver inbound endpoint
description: A DNS Resolver inbound endpoint is the IP listener bound to a subnet that receives inbound DNS queries into the virtual network for the private resolver.
scope: HIGH
notes: Defines the DNS ingress point for a single network function; manipulation or removal affects name-resolution into the VNet.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: The join action binds the inbound endpoint to a subnet/VNet, letting an attacker place a DNS ingress point inside the network to gain access to additional network resources.
