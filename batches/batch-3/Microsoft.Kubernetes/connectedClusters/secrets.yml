name: Kubernetes secrets
description: Kubernetes Secret objects in an Azure Arc-connected cluster. Secrets store sensitive credential material such as service-account tokens, passwords, TLS private keys, registry credentials, and connection strings used by workloads.
scope: CRITICAL
notes: Secret reads return raw credential material in cleartext, making this resource type a primary target for credential theft, identity takeover, and lateral movement.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:dos
    notes: Deleting secrets destroys cryptographic/credential material (keys, tokens, certificates) and breaks the workloads that mount them, causing denial of service.
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
      - takeover:account
    notes: Data-plane read returns the actual secret material (service-account tokens, keys, passwords, connection strings), enabling credential exfiltration, lateral movement via the disclosed identities, and account takeover.
  write:
    risks:
      - persistence:account
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating secrets lets an attacker plant or overwrite credential material consumed by workloads, establishing persistent attacker-controlled credentials, enabling lateral movement, and poisoning trusted secrets.
