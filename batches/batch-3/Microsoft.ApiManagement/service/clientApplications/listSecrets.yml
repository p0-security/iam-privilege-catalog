name: API Management client applications
description: A client application is a registered OAuth application identity that consumes/authenticates to APIs published through API Management.
scope: CRITICAL
notes: These registrations are credential-bearing application identities; their secrets grant authenticated API access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - takeover:account
      - escalation:lateral
    notes: This action returns the client application's secret credentials, allowing an attacker to export usable credential material and impersonate the application to authenticate to protected APIs.
