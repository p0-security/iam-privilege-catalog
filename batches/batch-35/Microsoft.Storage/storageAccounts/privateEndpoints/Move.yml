name: Storage account private endpoint
description: A private endpoint provides private-link network connectivity to a storage account over a private IP, controlling which network can reach the data store privately.
scope: HIGH
notes: Private endpoints are the network connectivity path to a production data store; relocating one changes reachability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Moving the private endpoint relocates the private-link connectivity component, altering the account's network topology and potentially redirecting private reachability toward an attacker-influenced network.
