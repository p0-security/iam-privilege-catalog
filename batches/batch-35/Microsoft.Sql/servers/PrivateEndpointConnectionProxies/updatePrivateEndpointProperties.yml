name: Azure SQL Database private endpoint connection proxy
description: A private endpoint connection proxy is the server-side Private Link plumbing component (managed via NRP) that mediates and configures private endpoint connectivity to an Azure SQL Database server.
scope: HIGH
notes: Controls the private-link binding configuration governing which networks reach a production database.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: NRP backfill action that writes/modifies properties on the connection proxy, altering the private-link connectivity configuration of the SQL server.
