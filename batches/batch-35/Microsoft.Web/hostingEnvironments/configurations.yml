name: App Service Environment configurations
description: The configuration of an App Service Environment (ASE), an isolated, dedicated App Service hosting environment including its networking, scaling, and platform settings.
scope: HIGH
notes: Supporting/isolation infrastructure shared by all apps it hosts; configuration includes network topology details.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Updating ASE configuration alters the networking/platform settings of the shared isolated environment that backs all hosted apps, enabling operational manipulation and potential disruption of all hosted workloads.
