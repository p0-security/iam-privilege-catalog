name: Web App configuration
description: The configuration sub-resource of an App Service Web App, holding the app's runtime/site settings, app settings, and connection strings.
scope: HIGH
notes: The control-plane Read masks secret values; the security-sensitive settings (publishing credentials, connection strings) are returned only by the separate list/Action.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Updating the Web App's configuration lets an attacker alter app settings, connection strings, and startup/runtime config, manipulating operational config and injecting code that runs as the app's managed identity or repointing it to attacker-controlled backends.
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the Web App's configuration removes operational settings the production application depends on, destroying the config resource and disrupting the hosted service.
