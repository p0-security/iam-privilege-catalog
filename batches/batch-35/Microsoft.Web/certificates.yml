name: App Service Certificate
description: An App Service Certificate is a TLS/SSL certificate resource managed under Microsoft.Web and bound to web apps and custom domains for HTTPS.
scope: HIGH
notes: Control-plane certificate resource exposing TLS metadata (thumbprint, subject, expiry); the control-plane read does not return exportable private-key material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:crypto
      - impact:dos
    notes: Deleting a certificate destroys the cryptographic material bound to apps/custom domains, breaking TLS/HTTPS and disrupting the dependent web services.
  Write:
    risks:
      - impact:manipulation
      - impact:defacement
    notes: Adding or replacing a certificate lets an attacker substitute an attacker-controlled TLS cert bound to a public-facing app/custom domain, manipulating the HTTPS configuration and enabling interception/impersonation of the public-facing endpoint.
