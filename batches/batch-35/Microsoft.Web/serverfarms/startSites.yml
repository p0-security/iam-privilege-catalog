name: App Service Plan
description: An App Service Plan (serverfarm) is the compute hosting tier (region, OS, SKU/pricing tier, instance count) that runs one or more Azure App Service web apps, function apps, and API apps.
scope: HIGH
notes: Production compute supporting the web applications hosted on it; the asset itself holds no data plane but its lifecycle and scale directly govern the availability and cost of every app on the plan.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Action:
    risks:
      - impact:hijack
      - impact:spend
    notes: Starting all apps in the plan resumes execution of workloads on the plan's compute, which an attacker can use to run code and consume metered compute.
