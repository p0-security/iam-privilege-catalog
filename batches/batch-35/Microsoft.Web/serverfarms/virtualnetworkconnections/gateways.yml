name: App Service Plan VNet connection gateways
description: The VNet-integration gateway configuration of an App Service Plan, defining how hosted apps connect into a virtual network.
scope: HIGH
notes: Controls private-network connectivity; misconfiguration can expose hosted apps to additional networked resources.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Updating the VNet integration gateway alters the plan's network connectivity, letting an attacker reconfigure routing and pivot to additional resources on the connected virtual network.
