name: Log Analytics Operation table
description: A Log Analytics workspace table holding internal operational/health and ingestion events for the workspace and its agents.
scope: MEDIUM
notes: Low-value operational diagnostics about the logging system itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reads workspace operational/ingestion events, exporting log content and inventorying logging/ingestion activity.
