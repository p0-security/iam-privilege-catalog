name: Log Analytics TSIIngress table
description: A Log Analytics workspace table holding Azure Time Series Insights ingress telemetry/operational records.
scope: MEDIUM
notes: Operational ingestion/telemetry data for a single service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read exports the TSI ingress telemetry content (exfiltration:logs) and enumerates the logged ingestion activity (discovery:logs).
