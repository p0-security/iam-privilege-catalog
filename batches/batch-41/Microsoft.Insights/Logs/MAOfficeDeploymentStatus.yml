name: Log Analytics MAOfficeDeploymentStatus table
description: A Log Analytics / Azure Monitor table holding Microsoft Managed Desktop / Desktop Analytics telemetry. The MAOfficeDeploymentStatus table records the Office deployment/rollout state of managed devices.
scope: MEDIUM
notes: Monitoring/diagnostics data tier. Reveals which Office builds are deployed across endpoints, useful for software-posture reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns Office deployment-status rows, exporting log content and inventorying which Office versions/builds are rolled out across the device estate.
