name: Log Analytics SigninLogs table
description: A Log Analytics workspace table holding Microsoft Entra ID (Azure AD) sign-in audit logs including user principals, source IPs, devices, and MFA/conditional-access outcomes.
scope: MEDIUM
notes: Identity authentication telemetry; more sensitive than generic diagnostics, but still log data ingested into the workspace.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reading exports sign-in records (exfiltration:logs) and enumerates directory accounts/identities, IPs, and auth patterns as compromise targets (discovery:account).
