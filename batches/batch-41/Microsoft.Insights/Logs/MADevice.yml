name: Log Analytics MADevice table (Azure Migrate)
description: "A Log Analytics (Azure Monitor) table holding Azure Migrate device-inventory telemetry: discovered devices/machines and their attributes."
scope: MEDIUM
notes: Monitoring/assessment data plane; device inventory provides targets for compromise.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns the discovered-device inventory, exporting log data (exfiltration:logs) and enumerating organizational devices/hosts as targets (discovery:infra).
