name: Log Analytics StorageBlobLogs table
description: A Log Analytics workspace table holding Azure Storage blob access/diagnostic logs (request paths, operations, caller identities, IPs, potentially SAS URIs).
scope: MEDIUM
notes: Diagnostic access-log data; reveals storage access patterns and object paths.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:data
    notes: Reading exports blob access-log records (exfiltration:logs) and reveals blob object paths/names and access patterns useful for inventorying stored data (discovery:data).
