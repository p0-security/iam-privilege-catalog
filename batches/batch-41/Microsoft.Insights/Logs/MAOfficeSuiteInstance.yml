name: Log Analytics MAOfficeSuiteInstance table
description: A Log Analytics / Azure Monitor table holding Microsoft Managed Desktop / Desktop Analytics telemetry. The MAOfficeSuiteInstance table records per-instance/per-device Office suite installation telemetry.
scope: MEDIUM
notes: Monitoring/diagnostics data tier. Maps which endpoints run which Office suites.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns per-instance Office-suite rows, exporting log content and inventorying Office installations on individual devices.
