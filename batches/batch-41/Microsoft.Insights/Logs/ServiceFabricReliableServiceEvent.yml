name: Log Analytics ServiceFabricReliableServiceEvent table
description: A Log Analytics workspace table holding Service Fabric reliable-service application runtime event records.
scope: MEDIUM
notes: May surface operationally sensitive application/service data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports reliable-service runtime telemetry (exfiltration:logs) and enables inventory of service activity (discovery:logs).
