name: Log Analytics MAWindowsBuildInfo table
description: A Log Analytics / Azure Monitor table holding Microsoft Managed Desktop / Desktop Analytics telemetry. The MAWindowsBuildInfo table records per-device Windows OS build/version information.
scope: MEDIUM
notes: Monitoring/diagnostics data tier. OS build levels reveal patch posture useful for vulnerability targeting.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns Windows build-info rows, exporting log content and inventorying OS build/version levels and patch posture across endpoints.
