name: Log Analytics MAWindowsCurrencyAssessmentDailyCounts table
description: A Log Analytics / Azure Monitor table holding Microsoft Managed Desktop / Desktop Analytics telemetry. The MAWindowsCurrencyAssessmentDailyCounts table records aggregated daily counts of Windows update-currency assessment.
scope: MEDIUM
notes: Monitoring/diagnostics data tier. Aggregated counts reveal fleet-wide Windows update trends with less per-device detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns aggregated daily-count rows, exporting log content and revealing the fleet-wide Windows update-state distribution over time.
