name: Log Analytics MAProposedPilotDevices table
description: A Log Analytics / Azure Monitor table holding Microsoft Managed Desktop / Desktop Analytics telemetry. The MAProposedPilotDevices table records the list of devices proposed for deployment pilot rings.
scope: MEDIUM
notes: Monitoring/diagnostics data tier. Contains specific device identifiers, exposing candidate endpoints in the fleet.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns proposed-pilot-device rows, exporting log content and inventorying specific candidate devices/identifiers for targeting.
