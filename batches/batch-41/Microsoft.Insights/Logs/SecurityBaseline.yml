name: Log Analytics SecurityBaseline table
description: A Log Analytics workspace table holding hosts' compliance results against security configuration baselines.
scope: MEDIUM
notes: Discloses misconfigurations and hardening gaps across hosts, providing a roadmap of weak points.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reads baseline-compliance results, exporting log data and revealing which hosts are misconfigured or non-compliant as exploitable targets.
