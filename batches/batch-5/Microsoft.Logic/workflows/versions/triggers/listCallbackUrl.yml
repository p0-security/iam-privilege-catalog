name: Logic App workflow trigger callback URL
description: The callback URL for a Logic App workflow trigger, containing an embedded SAS signature that authorizes invoking (firing) the workflow trigger without further authentication.
scope: HIGH
notes: "The callback URL is credential-equivalent: anyone holding it can invoke the workflow, which then runs under the Logic App's identity and connections."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the trigger callback URL with embedded SAS signature; an attacker can use it to invoke the workflow unauthenticated, driving it under the Logic App's identity/connections.
