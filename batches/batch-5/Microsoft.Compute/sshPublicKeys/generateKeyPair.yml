name: Azure SSH public key resource
description: An sshPublicKeys resource is a stored, reusable SSH public key object in Azure Compute that can be referenced when provisioning VMs.
scope: HIGH
notes: The resource holds only the non-secret public key component; it is not bound to a running VM and contains no private credential material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: This action generates and RETURNS a new SSH private/public key pair, handing the caller usable private credential material that can authenticate to any VM provisioned with the corresponding public key.
