name: Log Analytics HDInsight query table (Hive query app stats)
description: A Log Analytics workspace query-scoped table holding HDInsight Hive query application-statistics records ingested via diagnostic settings. The data-plane read returns the stored rows.
scope: MEDIUM
notes: Monitoring/diagnostics asset tier. Can include query/application identifiers and execution detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Reading this table exports Hive query application statistics (which can reveal submitted query/application detail) and lets the holder inventory the logged workload.
