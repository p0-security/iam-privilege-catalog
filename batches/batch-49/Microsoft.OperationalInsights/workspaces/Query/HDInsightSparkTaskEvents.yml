name: Log Analytics workspace HDInsightSparkTaskEvents table
description: A Log Analytics workspace query table holding HDInsight Spark task-level execution event records ingested from an Azure HDInsight Spark cluster.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry for a single analytics workload; log content may embed operational details.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports per-task Spark execution log records.
