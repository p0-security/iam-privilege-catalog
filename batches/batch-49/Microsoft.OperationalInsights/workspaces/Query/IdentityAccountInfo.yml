name: Log Analytics IdentityAccountInfo table
description: A Log Analytics workspace table holding identity/account inventory records (UPNs, account attributes, group/directory context). It is security monitoring data within an Azure Monitor / Microsoft Sentinel workspace.
scope: MEDIUM
notes: A roster of identity/account attributes; directly yields targetable accounts.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Read exports the identity/account roster content (exfiltration:logs) and directly inventories user/service accounts and their attributes as compromise targets (discovery:account).
