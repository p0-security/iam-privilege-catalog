name: Log Analytics workspace query table (HDInsightKafkaServerLog)
description: A Log Analytics workspace query table is a data-plane view of a specific log table inside an Azure Monitor / Log Analytics workspace. Reading it returns the actual row-level log records ingested into that table.
scope: MEDIUM
notes: HDInsight Kafka broker server logs are cluster operational/diagnostic logs that may reveal topology, topic/configuration details, and error data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns HDInsight Kafka broker server log records, exporting cluster operational log content that can leak topics, brokers, configuration, and errors.
