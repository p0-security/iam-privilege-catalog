name: Log Analytics workspace query table (MAOfficeAppInstance)
description: A Log Analytics workspace query table in the Microsoft Managed Desktop / device-readiness assessment (MA*) family. These tables hold ingested monitoring telemetry describing managed-device update readiness, driver/Office/Windows inventory, and patch currency.
scope: MEDIUM
notes: Monitoring/diagnostics data tier. Content is log/telemetry rows that double as an inventory of the device and software estate; reads are data-plane (isDataAction).
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read of the MAOfficeAppInstance table exports per-instance Office application telemetry (exfiltration:logs) and inventories Office app installations (discovery:infra).
