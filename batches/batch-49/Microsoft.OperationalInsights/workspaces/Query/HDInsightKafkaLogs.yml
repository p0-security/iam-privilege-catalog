name: Log Analytics HDInsight query table (Kafka logs)
description: A Log Analytics workspace query-scoped table holding HDInsight Kafka broker operational log records ingested via diagnostic settings. The data-plane read returns the stored rows.
scope: MEDIUM
notes: Monitoring/diagnostics asset tier. Broker logs may contain topic names and operational/message-flow detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Reading this table exports Kafka broker log content and lets the holder inventory the logged streaming activity.
