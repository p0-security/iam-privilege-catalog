name: Log Analytics KubePVInventory table
description: A log table in a Log Analytics workspace storing the Kubernetes/AKS persistent-volume inventory (capacity, storage class, claims) collected by Container Insights.
scope: MEDIUM
notes: Explicit storage-infrastructure inventory of the cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading the table exfiltrates persistent-volume inventory telemetry and inventories the cluster's storage infrastructure and mounts.
