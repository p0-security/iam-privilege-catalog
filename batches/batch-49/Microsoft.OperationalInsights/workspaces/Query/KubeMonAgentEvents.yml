name: Log Analytics KubeMonAgentEvents table
description: A log table in a Log Analytics workspace storing Container Insights monitoring-agent diagnostic event telemetry from Kubernetes clusters.
scope: MEDIUM
notes: Agent-pipeline diagnostics with limited reconnaissance value.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reading the table exfiltrates monitoring-agent diagnostic telemetry about the cluster's monitoring pipeline.
