name: Log Analytics workspace table (LAJobLogs)
description: A Log Analytics workspace data-plane table holding ingested log/telemetry records. This operation reads rows from the LAJobLogs table, which records Log Analytics search/summary job execution.
scope: MEDIUM
notes: Log Analytics tables are a monitoring/diagnostics asset; their rows can contain operationally sensitive details (identities, queries, IPs) depending on the source.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports Log Analytics job-execution records and reveals what analytics jobs run in the workspace.
