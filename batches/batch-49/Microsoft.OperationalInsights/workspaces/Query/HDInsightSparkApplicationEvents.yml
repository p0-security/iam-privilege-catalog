name: Log Analytics HDInsight query table (Spark application events)
description: A Log Analytics workspace query-scoped table holding HDInsight Spark application-event log records ingested via diagnostic settings. The data-plane read returns the stored rows.
scope: MEDIUM
notes: Monitoring/diagnostics asset tier. Application-event logs can include job parameters and execution context.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Reading this table exports Spark application/job event telemetry and lets the holder inventory the logged job-execution activity.
