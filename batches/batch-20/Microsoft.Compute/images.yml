name: Compute managed images
description: "Custom managed VM images: reusable disk templates (source blob/disk references, OS type) used to provision virtual machines."
scope: MEDIUM
notes: A deployment artifact for a single function rather than primary production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deletes a VM image template, destroying a reusable deployment artifact downstream provisioning may depend on.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating/updating an image lets an attacker register or backdoor a base image that future VM deployments boot from (supply-chain manipulation) and provisions a chargeable stored artifact.
