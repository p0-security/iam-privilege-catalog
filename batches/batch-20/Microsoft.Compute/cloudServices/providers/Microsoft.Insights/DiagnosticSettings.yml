name: Cloud Service diagnostic settings
description: Diagnostic settings define which logs/metrics are collected for a Cloud Service and where they are routed (Log Analytics, storage, Event Hub).
scope: MEDIUM
notes: A detective control; its configuration reveals monitoring coverage relevant to evasion.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating/updating the diagnostic setting lets an attacker disable or redirect log/metric collection, blinding incident response and removing a detective control.
