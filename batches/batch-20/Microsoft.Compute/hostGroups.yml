name: Dedicated host groups
description: A dedicated host group is a control-plane resource that represents a collection of dedicated physical hosts (reserved single-tenant hardware) and their placement properties (zones, fault domains) used for VM placement.
scope: MEDIUM
notes: Container/grouping resource; sensitivity stems from the reserved hardware capacity it organizes rather than any data it holds.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting the host group removes the dedicated-host placement container (only permitted when empty), disrupting placement for dependent hosts/VMs.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating/updating a host group provisions a billable dedicated-capacity container and alters placement configuration, incurring spend and config manipulation.
