name: Container registry webhooks
description: A webhook on an Azure Container Registry that fires HTTP callbacks to a configured service URI when registry events occur (image push, delete, quarantine, chart push/delete).
scope: MEDIUM
notes: Supporting integration/notification plumbing for a registry; the callback configuration can embed authentication secrets in custom headers, but the webhook itself does not hold image artifacts.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a webhook removes the registry's event-notification component, disrupting downstream CI/CD or alerting automation that depends on registry events.
  write:
    risks:
      - impact:manipulation
      - exfiltration:metadata
    notes: Creating/updating a webhook alters the registry's notification config and can repoint image push/delete event notifications (containing image/tag metadata) to an attacker-controlled callback URI.
