name: Container registry pipeline runs
description: A pipeline run is a container registry sub-resource representing a single execution of an import or export pipeline, which moves artifacts between the registry and external Azure Storage.
scope: MEDIUM
notes: Pipeline runs are the execution vehicle for the registry's artifact import/export data movement.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a pipeline run removes the execution record/resource for an import/export job; primarily destroys operational run state and can obscure prior transfer activity.
  write:
    risks:
      - impact:manipulation
      - exfiltration:code
    scope: HIGH
    notes: "Creating a run actually executes the transfer: an import injects attacker-supplied artifacts into the registry (manipulation), while an export copies container images (packaged code/artifacts) out to attacker-reachable storage (exfiltration)."
