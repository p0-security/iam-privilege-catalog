name: API Management AI gateway models
description: An API Management AI gateway model is a control-plane configuration entry under a model provider that defines an individual model exposed/routed by the gateway.
scope: MEDIUM
notes: Non-secret model routing configuration scoped to a single gateway/workspace; sensitivity is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a model removes an AI gateway routing target, disrupting dependent consumers of that model.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a model under a provider alters AI gateway model routing/operational configuration, letting an attacker tamper with which models serve requests and how they are processed.
