name: Kubernetes CSIDrivers (AKS)
description: Cluster-scoped Kubernetes CSIDriver registration objects in an AKS-managed cluster that declare installed Container Storage Interface drivers and their behavior flags (attachRequired, podInfoOnMount, fsGroupPolicy, lifecycle modes).
scope: MEDIUM
notes: Cluster-wide storage-driver registration; behavior flags are security-relevant but the object is supporting infra config, not a primary data/identity asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting CSIDriver registrations deregisters storage drivers cluster-wide, breaking volume provisioning, attachment, and mounting for every workload that depends on that driver.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating CSIDriver objects alters cluster-wide driver behavior (e.g. podInfoOnMount, fsGroupPolicy, attachRequired), changing how every volume for that driver is mounted and potentially weakening volume security controls.
