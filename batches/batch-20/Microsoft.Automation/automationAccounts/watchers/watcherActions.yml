name: Azure Automation watcher job actions
description: Azure Automation watcher job actions configure the runbook code a watcher executes on a recurring schedule, running in the Automation account's context (including its Run As / managed identity, often on Hybrid Runbook Workers).
scope: MEDIUM
notes: Because watcher actions drive runbook execution under the account's identity, control over them is effectively control over code execution as that identity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting a watcher action removes a configured automation component, destroying that automation infrastructure and disrupting the watcher-driven workflow it powers.
  write:
    risks:
      - escalation:lateral
      - impact:hijack
      - impact:manipulation
    scope: HIGH
    notes: Creating watcher job actions lets an attacker run arbitrary runbook code on a schedule under the Automation account's identity, enabling code execution as that identity (lateral movement), hijacking compute to run workloads, and altering automation behavior.
