name: AKS agent (node) pools
description: An AKS managed-cluster agent pool — the worker-node compute (VMSS-backed VMs) of an Azure Kubernetes Service cluster, including VM size, count, OS image, version, networking, and node identity configuration.
scope: HIGH
notes: Provides the production compute that runs the cluster's container workloads for a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting specific machines removes individual worker-node VMs from the pool, destroying that compute and evicting the workloads running on those nodes.
