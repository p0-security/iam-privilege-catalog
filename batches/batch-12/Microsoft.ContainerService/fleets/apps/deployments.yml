name: Kubernetes Deployments (Fleet)
description: A Kubernetes Deployment is a workload controller managing replicated stateless application pods, propagated across Azure Kubernetes Fleet Manager member clusters.
scope: HIGH
notes: Workload controllers run arbitrary containers under pod service-account identities and can mount secrets, making them a high-value target on production clusters.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting Deployments removes the controllers managing application pods across the fleet, destroying running infrastructure and causing denial of service to the backed application functions.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating Deployments lets an attacker run arbitrary containers (workload hijack), assume pod service-account identities and mount secrets for lateral movement, and alter running application configuration.
