name: Kubernetes PodSecurityPolicies (AKS Fleet member)
description: Kubernetes PodSecurityPolicy objects on a member cluster of an AKS Fleet. PSPs are admission-control rules that constrain which pod security capabilities (privileged, hostPath/hostNetwork mounts, runAsRoot, capabilities) workloads may request.
scope: HIGH
notes: PSPs are a cluster security-enforcement defense gating container-to-node escape; loosening or removing them enables privileged workloads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:policy
    notes: Deleting a PSP removes a pod-admission security control, allowing previously-blocked privileged/host-mounting pods to be scheduled and tearing down the enforcing security policy.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating a PSP lets an attacker weaken or replace pod admission controls (e.g. permit privileged/hostPath/hostNetwork pods), disabling a security defense and altering the cluster's protective configuration.
