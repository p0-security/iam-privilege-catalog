name: Kubernetes Endpoints
description: Kubernetes Endpoints objects within a Fleet member cluster. Endpoints record the backend pod IP:port targets that back each Service, defining how in-cluster traffic is routed.
scope: HIGH
notes: "Endpoints expose internal network topology and are a routing control point: read enables reconnaissance, write enables traffic redirection/interception."
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting Endpoints removes the backend targets behind Services, severing service-to-pod routing and causing denial of service for the fronted workloads.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Writing Endpoints repoints a Service's backends to attacker-controlled IPs/ports, enabling traffic redirection/MITM interception and reach to additional in-cluster network resources.
