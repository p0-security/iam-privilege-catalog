name: AKS fleet member cluster DaemonSets
description: Kubernetes DaemonSet workload controllers inside an AKS fleet member cluster, accessed via the Azure data plane. A DaemonSet ensures a copy of a pod (often node-level agents like CNI, logging, or monitoring) runs on every node.
scope: HIGH
notes: Data-plane access to in-cluster workloads in a production AKS cluster; controls what containers run on cluster nodes.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting DaemonSets (incl. DeletesCollection) tears down per-node workloads such as CNI/logging/monitoring agents, destroying running infrastructure and disrupting cluster operations.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a DaemonSet schedules attacker-controlled containers on every node (resource hijacking), can mount host paths or assume pod service-account/node identities for lateral movement, and alters running workload configuration.
