name: Kubernetes PodSecurityPolicies
description: Kubernetes PodSecurityPolicy objects within an AKS fleet member cluster. PSPs are admission-control resources that constrain the security context of pods (privileged mode, host namespaces, hostPath volumes, capabilities).
scope: HIGH
notes: PSPs act as a cluster security defense; weakening or removing them enables privileged pods and node-level compromise. PSP is deprecated in modern Kubernetes but where present functions as a security guardrail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:policy
    notes: Deleting PSPs removes the admission-control security policy that constrains pod privileges, disabling a defense and tearing down access-control policy that would otherwise deny privileged pods.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating a PSP lets an attacker loosen pod security constraints (permit privileged/hostPath/host-namespace pods), disabling a security defense and altering security configuration.
