name: Kubernetes persistent volumes (AKS Fleet)
description: PersistentVolumes are cluster-scoped Kubernetes objects that represent provisioned storage backed by cloud disks, file shares, NFS or CSI drivers, available to workloads in AKS Fleet-managed clusters.
scope: HIGH
notes: PV specs expose backend storage references and can be redefined to point at attacker-chosen or existing storage backends.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - impact:dos
    notes: Deleting PVs removes the storage objects backing stateful workloads and, depending on reclaim policy, destroys the underlying persisted data while breaking all workloads bound to them.
  write:
    risks:
      - impact:manipulation
      - escalation:data
    notes: Creating/updating PVs lets an attacker define cluster-scoped volumes pointing at arbitrary or existing backend storage and rebind them to claims, manipulating the storage layer and exposing underlying data to controlled pods.
