name: Fleet ResourceOverrideSnapshot
description: A Kubernetes Fleet Manager ResourceOverrideSnapshot is an immutable, controller-managed, point-in-time capture of a namespaced ResourceOverride policy used by the placement controllers when propagating resources to member clusters.
scope: HIGH
notes: Override configuration governs fleet-wide multi-cluster deployment behavior; it is sensitive supporting infrastructure config but contains no credentials or workload data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
      - destruction:artifact
    notes: Deleting a versioned override snapshot removes a controller-tracked override-policy artifact, disrupting override versioning and altering how namespaced resources are reconciled and propagated across member clusters.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the snapshot tampers with the versioned override configuration the placement engine reconciles from, manipulating how namespaced resources are mutated when propagated to member clusters.
