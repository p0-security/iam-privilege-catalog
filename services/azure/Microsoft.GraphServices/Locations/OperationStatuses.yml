name: GraphServices async operation status
description: A transient async operation-status tracking resource used by the Microsoft.GraphServices provider to report the progress/result of long-running operations.
scope: LOW
notes: Inert operation-status polling primitive with no tenant resource or data exposure.
links:
  - https://azure.permissions.cloud/iam/Microsoft.GraphServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the status of an asynchronous provider operation; an inert read that discloses no sensitive resources or configuration.
  write:
    risks: []
    notes: Internal write to async operation-status tracking state, a provider bookkeeping no-op conferring no meaningful standalone attacker capability.
