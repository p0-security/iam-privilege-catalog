name: Microsoft.GraphServices resource provider registration
description: Subscription-level registration/unregistration actions for the Microsoft.GraphServices resource provider (Microsoft Graph billing/account resource).
scope: MEDIUM
notes: Provider registration is an enablement gate; unregistration can disrupt dependent GraphServices functionality.
links:
  - https://azure.permissions.cloud/iam/Microsoft.GraphServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Unregistering the GraphServices provider can disable the provider for the subscription, disrupting dependent functionality, a denial-of-service effect.
