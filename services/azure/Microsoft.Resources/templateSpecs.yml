name: Azure template specs
description: Template Specs are Azure resources that store reusable ARM/Bicep infrastructure-as-code templates in a subscription or resource group for repeatable deployments.
scope: MEDIUM
notes: The template body itself lives in the child templateSpecs/versions resource; the spec resource holds metadata and groups versions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deletes a template spec (and its versions), destroying a stored reusable IaC artifact without affecting any deployed infrastructure.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Gets or lists template specs, letting an attacker inventory the organization's stored infrastructure-as-code definitions as reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates a template spec, letting an attacker tamper with a shared, reusable IaC artifact that operators may later deploy; the write itself provisions no live resources.
