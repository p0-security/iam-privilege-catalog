name: Azure resources inventory
description: Provides a filterable listing of deployed Azure resources and their configuration across the queried scope.
scope: LOW
notes: Control-plane read of resource configuration metadata; does not return data-plane contents or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Broad read-only inventory of deployed infrastructure configuration for reconnaissance and target selection.
