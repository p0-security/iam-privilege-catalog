name: Deployment scripts
description: Deployment scripts are Azure resources that run arbitrary PowerShell/CLI code in an automatically provisioned container instance (with backing storage) under an attached managed identity during ARM deployments.
scope: MEDIUM
notes: Configuration exposes embedded script content, the attached identity, and storage references; the execution engine can run as a managed identity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - destruction:logs
    notes: Deletes a deployment script and its backing container/storage, also removing the associated execution logs/output artifacts.
  read:
    risks:
      - discovery:infra
      - discovery:code
    notes: Gets/lists deployment scripts, exposing the provisioning configuration and embedded inline script source/arguments.
  write:
    risks:
      - escalation:lateral
      - impact:hijack
      - impact:spend
    scope: HIGH
    notes: Creates/updates a deployment script, executing attacker-supplied code in a provisioned container under an attached managed identity — lateral movement to that identity plus compute hijacking and spend.
