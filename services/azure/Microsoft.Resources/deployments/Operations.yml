name: ARM deployment operation
description: A deployment operation is the per-resource sub-record of an ARM deployment, describing the individual provisioning action taken against each resource in the template.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading deployment operations at management-group/tenant scope reveals per-resource provisioning steps and target resource details, providing infrastructure reconnaissance.
