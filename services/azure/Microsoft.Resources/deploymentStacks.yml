name: Azure deployment stacks
description: Deployment Stacks are Azure resources that manage a collection of resources deployed from a template as a single governed unit, with denySettings that apply deny-assignment-like protections to the managed resources.
scope: HIGH
notes: A stack can span an entire resource group, subscription, or management group, can deploy role assignments and managed identities, and can enforce locks on its managed resources, making it a high-leverage control-plane asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deletes a deployment stack and, depending on delete mode, can cascade-delete all of its managed resources, destroying infrastructure and disrupting the services it hosts.
  read:
    risks:
      - discovery:infra
      - discovery:policy
    scope: MEDIUM
    notes: Gets or lists deployment stacks, revealing the managed-resource inventory, the backing template reference, and the denySettings (access-control lock configuration) for reconnaissance of protections to bypass.
  write:
    risks:
      - impact:manipulation
      - escalation:lateral
      - escalation:privilege
      - impact:hijack
      - impact:spend
      - impact:access
    notes: "Creates or updates a deployment stack, deploying arbitrary ARM resources at stack scope: it can provision/run costly compute (hijack, spend), assign and run as managed identities (lateral movement), create role assignments (privilege escalation), broadly alter infrastructure config (manipulation), and apply denySettings that lock other principals out of managed resources (denial-of-access)."
