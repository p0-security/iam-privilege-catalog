name: Resource providers (tenant)
description: Represents the Azure resource providers (services) and their registration state visible to the caller.
scope: LOW
notes: Read-only metadata about which Azure services are available/registered; no sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Enumerates available resource providers, low-sensitivity infrastructure reconnaissance.
