name: Mobo service operation status
description: The Mobo service operation status is the asynchronous-operation progress/result record for a previously issued Managed-On-Behalf-Of service request.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reading the async operation status is an inert status-polling endpoint that returns only operation progress and exposes no sensitive configuration, data, or attacker capability in isolation.
