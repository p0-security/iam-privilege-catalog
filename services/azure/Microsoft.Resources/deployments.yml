name: ARM deployment
description: An Azure Resource Manager (ARM) deployment is a control-plane record of a template-based provisioning operation at management-group or tenant scope, capturing which resources were deployed and their configuration.
scope: LOW
notes: The deployment record itself is metadata/history; the dangerous capability is the write path, which executes an arbitrary template that can provision any resource type including role assignments, managed identities, and compute.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Deleting a deployment removes only the deployment history record, not the underlying provisioned resources, destroying operational deployment metadata and obscuring prior change activity.
  read:
    risks:
      - discovery:infra
    notes: Getting or listing deployments enumerates what infrastructure was provisioned and its deployment configuration, providing infrastructure reconnaissance.
  write:
    risks:
      - escalation:privilege
      - escalation:lateral
      - impact:manipulation
      - impact:hijack
      - impact:spend
    scope: CRITICAL
    notes: Creating/updating an ARM deployment executes an arbitrary template that can create role assignments (privilege escalation), assign and act as managed identities (lateral movement), rewrite configuration (manipulation), and provision costly compute (hijack/spend).
