name: Azure resource changes
description: Changes are read-only records of historical configuration changes to Azure resources, surfaced by the Change Analysis / resource change history feature.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Gets or lists resource change history, letting an attacker inventory infrastructure configuration and how it has been modified over time for reconnaissance.
