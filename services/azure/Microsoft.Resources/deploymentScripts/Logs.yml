name: Deployment script logs
description: Deployment script logs capture the stdout/stderr execution output of a deployment script's run.
scope: MEDIUM
notes: Output frequently contains secrets, connection strings, tokens, or other sensitive values surfaced during provisioning.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads deployment script execution logs, exporting output that often contains secrets or sensitive provisioning data.
