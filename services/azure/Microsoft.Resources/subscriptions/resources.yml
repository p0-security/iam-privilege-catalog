name: Subscription resources inventory
description: Provides a listing of the resources contained within a specific subscription and their configuration.
scope: LOW
notes: Control-plane read of resource configuration; no data-plane contents or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only inventory of a subscription's infrastructure configuration for reconnaissance.
