name: Resource Group
description: A resource group is an organizational container in an Azure subscription that holds related resources (compute, storage, networks, databases) for lifecycle and access management.
scope: LOW
notes: Resource groups are management-plane containers; their sensitivity derives from the resources they hold and from the cascading effect that group-level operations (especially delete) have on all contained resources.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:infra
    notes: A read-only dry-run that validates move feasibility, returning resource/configuration feasibility information without making any change; leaks infrastructure inventory details only.
