name: Resource Group
description: A resource group is an organizational container in an Azure subscription that holds related resources (compute, storage, networks, databases) for lifecycle and access management.
scope: HIGH
notes: Resource groups are management-plane containers; their sensitivity derives from the resources they hold and from the cascading effect that group-level operations (especially delete) have on all contained resources.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - destruction:data
      - impact:dos
    notes: Deletes a resource group and ALL contained resources, cascading into destruction of infrastructure and any data those resources hold and causing denial of service for hosted functions.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Gets or lists resource groups, letting an attacker inventory the subscription's resource-group structure for reconnaissance.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    scope: MEDIUM
    notes: Creating or updating a resource group alters subscription-level organizational configuration (containers, tags, locks) and provisions new containers, enabling resource sprawl; it does not by itself provision compute or grant access.
