name: Azure subscriptions
description: Represents the Azure subscriptions (billing/management boundaries) the caller can see.
scope: LOW
notes: Read endpoint returns subscription IDs/display names/state, not data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only enumeration of the subscription estate for reconnaissance.
