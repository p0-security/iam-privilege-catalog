name: Subscription resource-provider registrations
description: Subscription Registrations represent the registration state of a resource-provider namespace for a subscription (whether a given provider is registered/enabled).
scope: LOW
notes: This is administrative provider-state metadata with very low sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Resources
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads which resource-provider namespaces are registered for a subscription, a low-signal reconnaissance check of enabled provider capabilities.
