name: API Management usage reports
description: Aggregated usage and analytics reports for the API Management service, grouped by time, region, developer, product, API, operation, subscription, and request.
scope: MEDIUM
notes: Exposes operational/usage analytics about API traffic and consumers; confidential but not primary production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Reading aggregated usage reports lets an attacker inventory API usage patterns, consumers, and subscriptions to profile targets.
