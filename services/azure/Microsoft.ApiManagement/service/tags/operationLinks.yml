name: APIM Tag-operation links
description: Tag-operation links are association records in an Azure API Management service that connect organizational tags to API operations, used to group and filter operations.
scope: MEDIUM
notes: These are non-sensitive organizational/categorization metadata; they do not control access or contain secrets or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Deleting a tag-operation link removes operational tagging/categorization metadata associating tags with API operations, without destroying the operation itself.
  read:
    risks:
      - discovery:metadata
    scope: LOW
    notes: Read/list of tag-to-operation association records only enumerates organizational tagging metadata, enabling inventory of how API operations are categorized.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a tag-operation link alters organizational grouping/categorization metadata for API operations without changing access control or data.
