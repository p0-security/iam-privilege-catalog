name: API Management certificates
description: An API Management certificate is a control-plane certificate object stored in an APIM service instance used to authenticate the gateway to backend services (client/mutual-TLS) and to validate backend identities. The private key material is held by the service and is not returned by control-plane reads.
scope: HIGH
notes: These certificates are credential/trust material for a single organizational function (the API gateway and its backends); compromise enables impersonation or MITM of backend connections, but control-plane reads expose only metadata, not private keys.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Re-fetches the certificate from Key Vault into the service, mutating the active backend-auth certificate state without returning secret material to the caller, so it only alters operational configuration.
