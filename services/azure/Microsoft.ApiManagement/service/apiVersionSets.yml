name: API Management API version sets
description: API Version Sets group related versions of an API in an API Management service, defining versioning configuration for how API versions are exposed and routed.
scope: MEDIUM
notes: Control-plane configuration of a single API gateway function; version sets themselves contain no secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deletes a version set, removing gateway versioning configuration and potentially disrupting versioned API routing/availability.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Lists/gets API version set configuration, enabling reconnaissance of API versioning structure.
  write:
    risks:
      - impact:manipulation
    notes: Creates/updates version set configuration, allowing an attacker to alter how API versions are organized and routed on the gateway.
