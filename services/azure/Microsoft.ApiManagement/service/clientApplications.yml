name: API Management client applications
description: A client application is a registered OAuth application identity that consumes/authenticates to APIs published through API Management.
scope: HIGH
notes: These registrations are credential-bearing application identities; their secrets grant authenticated API access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:account
      - impact:access
    notes: Deleting a client application removes a registered application identity (destruction:account) and revokes a legitimate consumer's authorized API access (impact:access).
  read:
    risks:
      - discovery:account
    scope: MEDIUM
    notes: Listing/getting client application registrations enumerates the application identities that authenticate to the APIs, providing targets for compromise (does not return secrets).
  write:
    risks:
      - persistence:account
      - impact:manipulation
    notes: Registering or updating a client application creates/modifies a credential-bearing application identity, enabling attacker-controlled persistent API access and tampering with app trust/config.
