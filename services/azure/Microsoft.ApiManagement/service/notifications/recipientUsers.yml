name: API Management notification recipient users
description: The list of API Management portal users subscribed to a specific publisher notification. It is operational alert-routing configuration mapping notifications to user accounts.
scope: MEDIUM
notes: Low-sensitivity routing metadata that controls which user accounts receive operational/security notices about the service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Removes a user from notification recipients so operational/security alerts no longer reach legitimate operators, suppressing alerting and reducing visibility.
  read:
    risks:
      - discovery:account
    scope: LOW
    notes: Enumerates the API Management user accounts subscribed to a notification, a low-sensitivity inventory of identities as potential targets.
  write:
    risks:
      - impact:manipulation
    notes: Adds a user to the recipient list, altering who receives operational/security notifications so an attacker can redirect or capture alerts.
