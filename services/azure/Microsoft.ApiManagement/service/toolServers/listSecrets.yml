name: API Management tool servers
description: Tool server registrations on an Azure API Management AI gateway that define backend MCP/tool integrations (endpoints, namespaces, header/OAuth2 configuration) the gateway brokers for agent tool calls.
scope: CRITICAL
notes: The configuration holds backend credential material (header values, OAuth2 client secrets, OpenAPI spec), but secret values are exposed only via the separate listSecrets action.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Per its description this action explicitly returns the secret subtrees (header values, oauth2.clientSecret, OpenAPI spec content) for every endpoint, exporting reusable credential material an attacker can replay to authenticate to the backend tool servers as the gateway.
