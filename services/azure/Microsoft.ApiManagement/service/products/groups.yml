name: APIM product developer-group associations
description: The set of APIM developer groups associated with a product, controlling which groups of developer-portal users can view and subscribe to the product's APIs.
scope: MEDIUM
notes: This is developer-portal visibility/subscription gating, not Azure RBAC; it governs which API consumers can reach a product through the gateway.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:access
    notes: Removing a group's association revokes that group's developers' authorized visibility/subscription access to the product's APIs, denying legitimate consumers.
  read:
    risks:
      - discovery:policy
    scope: LOW
    notes: Lists which developer groups are authorized to consume the product, enumerating the access-control mapping to find weak points.
  write:
    risks:
      - escalation:privilege
      - impact:manipulation
    notes: Associating a group with a product broadens which developers can see and subscribe to the product's APIs, expanding access entitlements and altering the access-control configuration.
