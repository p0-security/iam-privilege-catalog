name: APIM product tags
description: Descriptive tag labels associated with an APIM product, used for categorization, grouping, and filtering of products and APIs.
scope: LOW
notes: Purely operational/organizational metadata with no security or access significance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Detaching a tag from a product deletes operational categorization metadata.
  write:
    risks:
      - impact:manipulation
    notes: Assigning a tag to a product alters operational categorization metadata; no data or access capability.
