name: API Management product subscriptions
description: Represents subscriptions to an API Management product. A subscription ties a subscriber/account to a product and governs access via subscription keys, though the secret keys are retrieved through a separate listSecrets action.
scope: MEDIUM
notes: Subscription objects identify consuming accounts/identities; the list operation returns metadata only, not the secret subscription keys.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:account
    notes: Listing product subscriptions enumerates the subscriber accounts/identities and subscription state without returning the secret subscription keys, providing account reconnaissance for targeting.
