name: Schemas associated with the API
description: API schemas in Azure API Management hold the request/response type definitions and data contract used to validate and shape calls to an API.
scope: MEDIUM
notes: Defines the API's data contract/validation; not a data store and contains no secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
    notes: Deleting the API schema removes the request/response validation definition, altering gateway request handling and potentially breaking schema-dependent policies.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reads the API schema definitions, exposing the API's data-structure/contract for crafting requests; read-only reconnaissance returning no organizational data or secrets.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the API schema alters the validation contract the gateway enforces, changing how requests are validated/processed and potentially weakening input validation.
