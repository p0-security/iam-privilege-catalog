name: API Management API diagnostics
description: Diagnostic (logging/tracing) configuration for an individual API within an Azure API Management service, controlling what request/response telemetry is collected and where it is sent.
scope: MEDIUM
notes: These are monitoring/observability settings; tampering weakens detection but does not directly expose data plane payloads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deletes the API's diagnostic configuration, disabling log/telemetry collection for that API and disrupting incident response.
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creates/updates the API diagnostic, letting an attacker reduce sampling, disable verbose logging, or redirect telemetry to weaken observability and evade detection.
