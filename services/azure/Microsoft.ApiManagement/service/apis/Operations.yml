name: API Management API operations
description: An individual operation (endpoint/method and its request/response contract) defined under an API on an Azure API Management gateway.
scope: HIGH
notes: Operations define the concrete routes and methods the gateway exposes and how requests map to backends.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting an operation removes an exposed endpoint from the published API, disrupting consumers that depend on it.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Lists/gets the operations of an API, enumerating the individual exposed endpoints and methods for reconnaissance of the API surface.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating an operation alters the gateway's exposed endpoint and routing configuration for a published API, manipulating how requests are handled.
