name: API MCP tools
description: API Management MCP tools define how a managed API's backend operations are exposed as Model Context Protocol (MCP) tools that AI agents/clients can invoke through the APIM gateway.
scope: HIGH
notes: Control-plane configuration of an AI gateway fronting a production API; tool definitions govern routing and what operations are exposed to LLM agents, but backend credentials are stored separately as named-value secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting an MCP tool removes gateway configuration that exposes an API operation, disrupting dependent AI/agent integrations (DoS-like loss of gateway functionality).
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating an MCP tool alters which backend operations the gateway exposes and how requests are routed, letting an attacker redirect or poison tool definitions consumed by LLM agents on a production API.
