name: Tags descriptions
description: Tag descriptions in Azure API Management are descriptive metadata/labels defined at the API level (swagger-style) used to categorize and document APIs and their operations.
scope: LOW
notes: Non-sensitive organizational labeling/documentation metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Deletes a tag description, removing non-sensitive descriptive/labeling metadata associated with the API.
  read:
    risks:
      - discovery:metadata
    notes: Lists/gets tag descriptions scoped to an API, returning only descriptive organizational metadata for low-value reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a tag description modifies non-sensitive descriptive metadata used for organizing/documenting the API; low-impact manipulation with no data or access-control effect.
