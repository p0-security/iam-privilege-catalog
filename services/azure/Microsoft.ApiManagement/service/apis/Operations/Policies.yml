name: API Management API operation policies
description: The policy configuration (XML) applied at the API operation level on an Azure API Management gateway, controlling inbound/outbound request processing such as authentication, authorization, rate limiting, IP filtering, and backend routing.
scope: HIGH
notes: APIM operation policy XML acts as the gateway's enforcement layer and frequently references or embeds secret material (named-value references, authorization headers, backend credentials, tokens).
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Deleting an operation policy removes the enforced controls (auth validation, rate limiting, IP restrictions) protecting that endpoint, disabling defenses and altering how requests are processed.
  read:
    risks:
      - discovery:policy
      - exfiltration:crypto
    notes: Reading operation-level policy XML reveals the gateway's enforcement controls (auth, rate limits, IP filters) for reconnaissance of weak points, and the policy XML can disclose embedded secrets/credentials (named values, authorization headers, tokens).
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Setting an operation policy lets an attacker strip authentication/IP-filtering/rate-limit enforcement and rewrite request/response handling to reroute backend traffic, both disabling defenses and manipulating gateway behavior.
