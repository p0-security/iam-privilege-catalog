name: API Management API/tag associations
description: Tag associations linking an API (or its operations) to organizational tags within an Azure API Management service. They are operational metadata used for grouping, filtering, and reporting.
scope: LOW
notes: Tags carry no secret material or service-control capability; their sensitivity is limited to operational organization.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Detaches a tag from an API, deleting operational metadata associations used for grouping and reporting.
  read:
    risks:
      - discovery:metadata
    notes: Lists/gets the tags associated with an API, a read-only inventory of operational metadata associations.
  write:
    risks:
      - impact:manipulation
    notes: Assigns a tag to an API, altering operational metadata/grouping but exposing no data and granting no access.
