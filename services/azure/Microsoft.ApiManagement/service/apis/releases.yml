name: API releases
description: An API release in Azure API Management records which revision of an API is the current/live one served by the gateway; releases are also used as rollback points to previous revisions.
scope: HIGH
notes: Controls which version of a gateway-fronted API is published to consumers, so it governs operational behavior of a single API surface.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Removes all releases of an API (or a specific release), withdrawing the current published-revision binding; this changes/withdraws which revision the gateway serves and can take the live API offline.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Lists/gets API release records, enumerating which revisions are current and the rollback history; read-only reconnaissance of API deployment state with no secret or data-plane disclosure.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a release promotes a chosen (possibly backdoored or rolled-back) API revision to be the current live version served to consumers, letting an attacker control which API logic runs in production.
