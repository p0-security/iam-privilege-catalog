name: API Management models (service-wide)
description: Aggregate read endpoint listing all model definitions across every model provider configured on an API Management AI gateway service instance.
scope: LOW
notes: Non-sensitive routing/catalog inventory.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only enumeration of all models across all providers, giving an attacker a broad inventory of the gateway's model catalog (non-sensitive configuration).
