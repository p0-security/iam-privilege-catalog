name: API Management named values
description: Named values are key/value constants (some flagged secret or backed by Key Vault) referenced across all API configurations and policies in an API Management instance.
scope: MEDIUM
notes: May hold or reference credentials and backend URLs; secret-flagged values are masked on GET and require the listValue action to reveal.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Re-fetches a named value from Key Vault and updates the stored value used by policies; alters operational configuration but does not return secret material to the caller.
