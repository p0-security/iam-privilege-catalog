name: API Management tenant settings
description: "The tenant resource of an Azure API Management service represents service-wide configuration: the global (tenant) policy applied to all API traffic, tenant access (git/management) settings, and the configuration git repository used to manage the whole service."
scope: HIGH
notes: Controls that govern every API in the service instance; the tenant access keys themselves are credential material that grant administrative access to the configuration repository.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - destruction:defense
    notes: Removes the global tenant policy configuration, deleting the service-wide policy that may enforce authentication/authorization and protective controls (rate limiting, IP filtering) for all API traffic.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Sets the service-wide global policy (and tenant access settings) that govern auth, CORS, IP filtering, and rate limiting for all APIs, letting an attacker alter operational request handling and disable security-enforcing policies.
