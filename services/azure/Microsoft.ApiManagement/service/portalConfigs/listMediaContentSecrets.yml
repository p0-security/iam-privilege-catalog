name: APIM developer portal config
description: Configuration of the API Management developer portal (a public-facing site), including sign-in/sign-up, delegation, CORS, and CSP settings.
scope: CRITICAL
notes: The developer portal is an externally visible asset; its config controls public access and delegated-authentication behavior.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
    notes: Returns the media content blob container URI including its SAS token, credential material granting direct out-of-band read/write access to the portal's backing storage container.
