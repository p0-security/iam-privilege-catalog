name: API Management git sync status
description: The sync-state resource reports the status of the last git synchronization between the API Management configuration repository and the live service.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns the status of the last git synchronization, exposing low-sensitivity operational metadata about the service's configuration sync state.
