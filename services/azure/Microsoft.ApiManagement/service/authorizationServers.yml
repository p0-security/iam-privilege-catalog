name: API Management OAuth authorization servers
description: An API Management OAuth authorization server is the control-plane configuration describing an OAuth 2.0 provider used to authorize APIs and the developer portal (token/authorization endpoints, grant types, scopes, client ID, and a stored client secret).
scope: HIGH
notes: This configuration governs API authentication for a single function; its stored client secret is a credential, but it is only returned by the dedicated listSecrets action, not by the standard read.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deletes an authorization server, removing the OAuth configuration that protected APIs and the developer portal depend on, tearing down the auth integration and disrupting OAuth-protected access.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Lists or gets authorization server details explicitly WITHOUT secrets, returning OAuth endpoints, grant types, scopes, and client IDs, enabling reconnaissance of the auth integration but not credential exfiltration.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating an authorization server lets an attacker repoint token/authorization endpoints, alter scopes/grant types, or inject attacker-controlled client credentials, tampering with the OAuth flow that protects the gateway's APIs.
