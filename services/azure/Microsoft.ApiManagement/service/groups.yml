name: API Management groups
description: API Management groups are authorization constructs that bind users/developers to product and API access; group membership governs which products and APIs a developer can subscribe to and use.
scope: MEDIUM
notes: Groups are the access-control grouping layer of the developer-facing surface; manipulating them changes who can access which APIs/products.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deletes a group used for product/API authorization, destroying the access-control grouping and revoking legitimate members' access to the products/APIs they relied on.
  read:
    risks:
      - discovery:policy
    scope: LOW
    notes: Lists/gets groups, inventorying the authorization grouping structure that controls which users access which products and APIs, revealing access-control weak points.
  write:
    risks:
      - escalation:privilege
      - impact:manipulation
    notes: Creates or updates groups that gate user access to products/APIs, letting an attacker grant broader API access by altering the authorization grouping (escalation) and manipulate the access-control configuration.
