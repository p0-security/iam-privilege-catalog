name: API Management model providers
description: Model provider registrations on an Azure API Management AI gateway that define upstream LLM backend integrations (provider endpoints, routing, and credential configuration) the gateway routes inference traffic through.
scope: MEDIUM
notes: Provider credential material is exposed only via the separate listCredentials action, which per its description returns metadata rather than secret values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:infra
    notes: Per its ground-truth description this action returns only credential metadata for a model provider (not the secret value itself), so it surfaces what credential/identity backs the provider for reconnaissance rather than exporting usable secret material.
