name: API Management models (under provider)
description: Model definitions registered under a model provider on an API Management AI gateway, mapping published/logical model names to upstream provider deployments for routing.
scope: MEDIUM
notes: Non-sensitive routing/catalog configuration; holds no credential material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a model definition removes a routable model entry from the gateway catalog, disrupting consumers that route to that model (a localized DoS-like effect).
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Read-only enumeration of model definitions under a provider, letting an attacker inventory the gateway's configured model catalog (non-sensitive configuration).
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a model definition alters the gateway's model catalog/routing (e.g. remapping a published model name to a different upstream deployment), manipulating operational configuration without handling credentials.
