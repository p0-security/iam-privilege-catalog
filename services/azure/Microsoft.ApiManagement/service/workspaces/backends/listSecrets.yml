name: APIM workspace backend
description: An API Management workspace backend defines an upstream/target service (URL, protocol, credentials, TLS settings) that the API gateway proxies requests to.
scope: CRITICAL
notes: Backends sit behind the gateway and often reference internal services and the credentials used to authenticate to them; controlling a backend lets an attacker influence proxied production traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the backend's stored secret material (credentials/authorization headers/connection secrets used to authenticate to the upstream service), enabling credential exfiltration and reuse to pivot laterally into the backing service.
