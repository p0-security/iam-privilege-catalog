name: API Management workspaces
description: API Management workspaces are logical sub-environments within an API Management service that group and isolate APIs, products, policies, and named values for a team or organizational function.
scope: MEDIUM
notes: Workspaces front backend services and host policy configuration (including secret-bearing named values), so control over them affects how a single organizational function's APIs are served.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Joins a service workspace; described as 'Not Alertable' and is a non-alertable membership/scoping no-op that grants no data access, config change, or escalation in isolation.
