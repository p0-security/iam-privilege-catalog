name: API Management AI gateway model providers
description: An API Management workspace model provider is a control-plane configuration object that defines a backend LLM/AI provider connection (provider kind, endpoint, and credential references) fronted by the API Management AI gateway.
scope: MEDIUM
notes: Supporting AI-integration configuration for a single gateway/workspace; sensitivity is MEDIUM. The control plane holds connection configuration but, except for the dedicated listCredentials action, does not surface secret values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a model provider removes the AI gateway backend connection, disrupting dependent model routing in a DoS-like fashion.
  read:
    risks:
      - discovery:infra
    notes: Control-plane read lists/gets model provider configuration, enabling reconnaissance of the AI gateway's backend provider infrastructure without returning secret values.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a model provider alters AI gateway backend routing configuration, letting an attacker repoint model traffic to an attacker-controlled or costly endpoint and tamper with operational config.
