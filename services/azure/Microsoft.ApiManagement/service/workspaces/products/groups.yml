name: APIM workspace product-group associations
description: The association binding APIM developer groups to a product within a workspace; membership in an associated group grants developers access to consume the product's APIs through the developer portal.
scope: MEDIUM
notes: These are API Management developer-portal authorization constructs, not Azure RBAC identities; their blast radius is scoped to API/product consumption within the APIM service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:access
      - destruction:policy
    notes: Deleting the group-product association revokes API access for all members of that group and tears down an access-control binding, denying authorized developers their access.
  read:
    risks:
      - discovery:policy
    scope: LOW
    notes: Lists the developer groups associated with a product, disclosing the access-control mapping that gates the product's APIs for reconnaissance of weak points.
  write:
    risks:
      - escalation:privilege
      - impact:manipulation
    notes: Associating a group with a product grants all of that group's members access to the product's APIs, broadening entitlements and altering the gateway access-control configuration.
