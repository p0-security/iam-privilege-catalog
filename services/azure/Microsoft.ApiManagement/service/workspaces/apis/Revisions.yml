name: APIM API revisions
description: Revisions (versioned configuration snapshots) of an API defined within an API Management workspace. Listing them enumerates the API's revision/version history configuration.
scope: LOW
notes: Revision listing exposes configuration inventory, not backend data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists all revisions of an API, inventorying API configuration versions; read-only reconnaissance.
