name: API policies configuration
description: The policy configuration (XML pipeline of inbound/backend/outbound rules) applied at the whole API level, controlling authentication, authorization, IP filtering, rate limiting, request/response transformation, and backend routing for all of the API's operations.
scope: HIGH
notes: APIM policies are the gateway's security and traffic-control enforcement layer for an API; they are processing policies, not Azure IAM/RBAC.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Deleting the API-level policy strips the enforced security controls (auth, IP filtering, rate limiting, validation) protecting every operation of the API and reverts request handling to default, weakening defenses and altering operational behavior.
  read:
    risks:
      - discovery:policy
      - discovery:infra
    notes: Reading the API-level policy reveals the security controls and backend routing enforced across all operations of the API, exposing weak points and backend topology for reconnaissance.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
      - exfiltration:data
    notes: Setting the API-level policy lets an attacker disable security controls (auth, JWT validation, IP filtering, rate limiting) across every operation, rewrite request handling and backend routing, and inject logging/forwarding that mirrors all traffic flowing through the API to an attacker sink.
