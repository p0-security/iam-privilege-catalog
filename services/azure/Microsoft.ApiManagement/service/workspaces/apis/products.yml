name: APIM API-product associations
description: The set of products an API belongs to within an API Management workspace. Products bundle APIs for subscription and access-control purposes.
scope: LOW
notes: Read-only enumeration exposes only association configuration, no secrets or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists the products an API is part of, enumerating API/product association configuration.
