name: APIM API tag associations
description: Associations between tags and an API within an API Management workspace. Tags are non-sensitive organizational metadata used to group, filter, and categorize APIs.
scope: LOW
notes: Tags carry no secrets or backend data; their main value to an attacker is reconnaissance or minor operational disruption of tag-based grouping.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Detaches a tag from an API, deleting operationally-used metadata associations.
  read:
    risks:
      - discovery:metadata
    notes: Lists/gets tags associated with an API, enabling inventory of metadata tags only.
  write:
    risks:
      - impact:manipulation
    notes: Assigning a tag to an API alters operational metadata associations, a low-impact configuration write.
