name: API Management AI gateway tool servers
description: An API Management workspace tool server is a control-plane configuration object defining a backend tool integration (endpoints, headers, OAuth2/OpenAPI spec settings) that the AI gateway can invoke on behalf of agents.
scope: CRITICAL
notes: Supporting AI-integration configuration scoped to a single gateway/workspace; sensitivity is MEDIUM at the control plane, but the resource backs the CRITICAL-tier listSecrets action that returns endpoint credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the secret subtrees (endpoint header values, oauth2.clientSecret, and spec contentBase64) for each endpoint, exporting usable credential material that an attacker can reuse to authenticate to the connected tool/IdP backends and pivot to those identities.
