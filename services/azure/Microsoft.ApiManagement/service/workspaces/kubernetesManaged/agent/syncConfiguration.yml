name: API Management Kubernetes-managed workspaces
description: A Kubernetes-managed workspace is an API Management workspace whose gateway configuration is synced from Kubernetes clusters via an agent (data plane).
scope: HIGH
notes: Synced configuration determines the operational gateway/API behavior served from the cluster for a single function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: This data action syncs/pushes configuration from Kubernetes clusters into the managed workspace, altering the operational gateway configuration data.
