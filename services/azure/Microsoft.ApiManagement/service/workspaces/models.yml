name: API Management models (workspace-scoped)
description: Aggregate read endpoint listing all model definitions across every model provider within a single workspace scope of an API Management AI gateway service instance.
scope: LOW
notes: Non-sensitive routing/catalog inventory scoped to a workspace.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only enumeration of all models across providers within a workspace, giving an attacker a workspace-scoped inventory of the gateway's model catalog (non-sensitive configuration).
