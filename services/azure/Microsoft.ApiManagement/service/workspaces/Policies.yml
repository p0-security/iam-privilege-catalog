name: APIM workspace policy configuration
description: "Workspace-level policy configuration in Azure API Management: the APIM policy XML pipeline (authentication/JWT validation, IP filtering, rate limiting, request/response transforms) enforced across all APIs in a workspace."
scope: HIGH
notes: Workspace policies apply gateway security/access-control enforcement at broad scope across every API in the workspace; reading exposes enforcement gaps, writing/deleting weakens defenses across the workspace.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the workspace policy removes the gateway's enforced auth/IP-filter/rate-limit controls applied across all APIs in the workspace, weakening defenses broadly.
  read:
    risks:
      - discovery:infra
      - discovery:policy
    scope: MEDIUM
    notes: Get/list of the workspace-level policy configuration discloses the enforced request-processing and security rules applied across all APIs in the workspace, exposing the broad enforcement posture and weak points.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Setting the workspace policy applies across every API in the workspace, letting an attacker disable authentication/IP-filtering/rate-limit defenses and rewrite or reroute request/response traffic at broad gateway scope.
