name: APIM workspace backend
description: An API Management workspace backend defines an upstream/target service (URL, protocol, credentials, TLS settings) that the API gateway proxies requests to.
scope: HIGH
notes: Backends sit behind the gateway and often reference internal services and the credentials used to authenticate to them; controlling a backend lets an attacker influence proxied production traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a backend removes the upstream routing target that APIs depend on, breaking the affected API paths and causing denial of service for that function.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Reading/listing backend definitions inventories the upstream service endpoints/URLs APIM proxies to, mapping internal infrastructure. The standard GET returns configuration but not the backend secret material (exposed only via the separate listSecrets action).
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating a backend lets an attacker repoint API traffic to an attacker-controlled upstream (intercepting/manipulating proxied requests and any credentials passed through) or define a new backend URL reaching internal VNet endpoints behind the gateway.
