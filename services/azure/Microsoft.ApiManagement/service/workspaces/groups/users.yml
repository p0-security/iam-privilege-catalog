name: APIM workspace group users
description: The membership linking developer-portal user accounts to an APIM workspace group; membership confers the group's product/API access on the user.
scope: MEDIUM
notes: These are API Management developer-portal authorization constructs, not Azure RBAC identities; their blast radius is scoped to API/product consumption within the APIM service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:access
    notes: Removes a user from a group, revoking the product/API access that membership conferred and denying that developer their authorized access.
  read:
    risks:
      - discovery:account
    scope: LOW
    notes: Lists the user entities belonging to a group, inventorying developer-portal accounts and their group memberships as targets for compromise.
  write:
    risks:
      - escalation:privilege
      - impact:manipulation
    notes: Adds an existing user to a group, granting that (possibly attacker-controlled) developer account all the product/API access the group confers, escalating its effective privileges.
