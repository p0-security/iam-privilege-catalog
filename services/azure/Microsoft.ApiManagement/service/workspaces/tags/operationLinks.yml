name: APIM workspace Tag-operation links
description: Tag-operation links are association records within an API Management workspace that map tags to specific API operations for categorization and filtering.
scope: LOW
notes: Non-sensitive relationship metadata; modifying or reading it does not alter the operations themselves or expose their behavior or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Deletes a tag-operation link, removing association metadata without affecting the underlying API operations or tags.
  read:
    risks:
      - discovery:metadata
    notes: Lists or gets tag-to-operation association links, enumerating relationship metadata for reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates a tag-operation link, altering association metadata that categorizes API operations without modifying the operations themselves.
