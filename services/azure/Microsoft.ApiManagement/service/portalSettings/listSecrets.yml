name: APIM portal settings
description: Developer portal settings for an Azure API Management service, controlling sign-in, sign-up, and delegation behavior of the portal.
scope: CRITICAL
notes: These settings shape portal authentication and user-onboarding flows; the delegation validation key is a signing secret.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
    notes: Returns the portal delegation validation key (a signing secret), enabling an attacker to forge trusted delegated sign-in/sign-up requests.
