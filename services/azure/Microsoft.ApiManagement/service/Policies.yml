name: API Management tenant (global) policies
description: "The global (tenant-wide) policy configuration of an Azure API Management service: XML processing rules applied to all API traffic, governing authentication, authorization, rate limiting, IP filtering, header/body transformation, and backend routing."
scope: HIGH
notes: These are request-processing/security-enforcement policies (not IAM/RBAC access-control policies); they gate every API the service exposes and may reference named values/secrets, making the configuration sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Deletes the global policy configuration, removing service-wide enforcement (auth, throttling, IP filters) and altering request handling across all APIs.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Sets the global policy applied to all APIs, letting an attacker strip authentication/IP-filter/rate-limit defenses and rewrite request/response handling (including redirecting backends) service-wide.
