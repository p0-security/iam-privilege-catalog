name: API Management user subscription keys
description: The subscription/API access keys (primary and secondary) associated with an API Management developer/user identity. These keys authenticate API calls made as that user.
scope: CRITICAL
notes: These are live, reusable credentials; possession grants the user's authenticated access to the published APIs.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:crypto
      - takeover:account
      - escalation:lateral
    notes: Returns the user's subscription keys (credential material), enabling credential exfiltration and impersonation of that user's authenticated API access.
