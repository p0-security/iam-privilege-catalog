name: APIM user group memberships
description: The list of developer-portal groups assigned to a given user, describing that account's access-control group memberships within the API Management service.
scope: MEDIUM
notes: Reveals the authorization structure (which groups, and thus which products/APIs, an account can reach).
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Lists the groups a user belongs to, exposing the access-control/authorization structure that gates product/API access.
