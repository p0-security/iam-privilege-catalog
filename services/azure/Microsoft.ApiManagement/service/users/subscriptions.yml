name: APIM user subscriptions
description: The collection of API product subscriptions belonging to a specific developer-portal user, recording which products/APIs that account is entitled to consume.
scope: MEDIUM
notes: This list returns subscription metadata only; retrieving the subscription's secret keys requires a separate listSecrets action.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists a user's product subscriptions, inventorying which APIs/products the account can call (metadata, not the keys themselves).
