name: API Management credential-manager authorization provider
description: An AuthorizationProvider (credential manager) defines an OAuth 2.0 credential-provider connection configuration (identity provider, client id, scopes, grant type) used by APIM to broker tokens to backend SaaS/OAuth APIs.
scope: HIGH
notes: Provider configuration may reference a client secret, but read operations do not return secret material; the stored access/refresh tokens live in child Authorization records and are write-only (usable only at runtime via the get-authorization-context policy).
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting an authorization provider removes the credential-provider integration and cascades to delete all its child connections and access policies (confirmed by docs), breaking every API/policy that depends on it for backend authorization.
  write:
    risks:
      - impact:manipulation
      - persistence:account
    notes: Creating/updating an authorization provider lets an attacker wire up an attacker-controlled OAuth credential-provider configuration (client id/secret, identity provider) as a foothold for brokering token access to backends and altering integration config.
