name: API Management OpenID Connect providers
description: OpenID Connect identity provider registrations used by API Management to authenticate API consumers and the developer portal. They define the auth trust (issuer, client ID) and hold a client secret.
scope: CRITICAL
notes: Authentication/authorization configuration that gates API access; the associated client secret is a credential.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the OIDC provider client secret, exporting credential material that can be reused to impersonate the API Management relying party against the configured identity provider and move laterally into that trust relationship.
