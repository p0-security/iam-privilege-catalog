name: API Management developer portal revisions
description: Versioned revisions of the API Management developer portal, the public-facing site where API consumers discover, view, and try the organization's APIs.
scope: HIGH
notes: The published revision controls public-facing content; write access can deface the org's public API portal.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:defacement
      - impact:manipulation
    notes: Creating a revision or making one current publishes attacker-controlled content to the public-facing developer portal, enabling defacement of the org's public API portal and manipulation of the configuration consumers see.
