name: APIM product subscriptions
description: APIM product subscriptions, which bind a user/principal to a product and carry the primary/secondary subscription keys used to authenticate calls to the product's APIs through the gateway.
scope: HIGH
notes: Subscription keys are bearer credentials granting authorized access to backend APIs; the subscription entity itself (without keys) is access-grant configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:access
      - impact:dos
    notes: Deleting a subscription immediately revokes the associated keys, cutting off legitimate consumers' authorized access to the product's APIs and disrupting dependent integrations.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Lists/gets subscription entities explicitly WITHOUT keys, inventorying who is subscribed to which products; exposes no credential material.
  write:
    risks:
      - escalation:privilege
      - persistence:account
      - impact:manipulation
    notes: Creating/updating a subscription provisions a keyed access credential for a chosen user to a product, granting (and persisting) authorized access to the product's protected APIs and altering subscription state.
