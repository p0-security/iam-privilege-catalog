name: API Management tenant access keys
description: The API Management tenant access keys (primary/secondary) authenticate direct access to the service's legacy Management REST endpoint and the Git configuration repository, which control the entire APIM service configuration (APIs, policies, named values).
scope: CRITICAL
notes: These keys grant broad management-plane access to a single APIM service instance; possession is equivalent to administrative control of the gateway. The /read action exposes the listSecrets path, which returns the live key values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:access
      - persistence:account
    notes: Regenerating the secondary key invalidates the existing secondary credential (denying clients relying on it) and mints a new attacker-controllable value for persistent management access. The REST operation returns 204 No Content and does not disclose the new key.
