name: API Management API-associated products
description: A product in API Management groups one or more APIs for publication to consumers with associated subscription terms; this resource lists the products an API belongs to.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists the products an API is part of, a read-only inventory of API-to-product grouping configuration with no sensitive content.
