name: API Management operation tags
description: Tags associated with an API Management operation are organizational metadata labels used for grouping, filtering, and discovery of operations.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Detaches a tag from an operation, deleting organizational grouping metadata with no effect on API logic or data.
  read:
    risks:
      - discovery:metadata
    notes: Lists or gets tags on an operation, enumerating non-sensitive organizational metadata labels.
  write:
    risks:
      - impact:manipulation
    notes: Associates a tag with an operation, altering organizational grouping metadata with no impact on API logic, policy, or data.
