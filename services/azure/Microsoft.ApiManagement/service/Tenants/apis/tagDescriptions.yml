name: API Management tag descriptions
description: Descriptive metadata (tag descriptions) defined at the API level in Azure API Management, documenting tags that may be assigned to API operations.
scope: LOW
notes: Non-sensitive organizational labeling/documentation metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Deleting a tag description removes descriptive labeling metadata associated with the API.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a tag description alters descriptive labeling metadata on the API, a low-impact manipulation.
