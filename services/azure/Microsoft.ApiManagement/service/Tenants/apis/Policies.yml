name: API Management API policies configuration
description: API policy configuration is the XML policy document applied at the API level in API Management, defining request/response processing (authentication, IP filtering, rate limiting, backend routing) across all operations of the API.
scope: HIGH
notes: Policies are the gateway's security-enforcement layer applied API-wide; they reference secrets indirectly via named-value placeholders ({{...}}) rather than embedding resolved secret values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Deletes the API-level policy, stripping enforced auth/IP-filter/rate-limit controls across the entire API and reverting it to unprotected default processing.
  read:
    risks:
      - discovery:policy
    scope: MEDIUM
    notes: Reads the API-level policy XML, disclosing the security/access-control enforcement applied across the whole API and exposing weak points.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Sets the API-level policy, letting an attacker disable auth/IP-filter/rate-limit defenses and rewrite request/response handling or reroute backends across every operation of the API.
