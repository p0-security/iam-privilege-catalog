name: API Management API operations
description: An API operation in Azure API Management defines a single exposed endpoint (HTTP method, URL template, parameters, request/response shape) within an API published on the gateway.
scope: HIGH
notes: The gateway fronts production backend services; the operation set defines the routable attack surface of an API.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deletes an API operation, removing an exposed endpoint and disrupting the API function for consumers (DoS-like effect captured by destruction:infra).
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates an API operation, altering the published endpoint contract and routing/transform behavior of a production gateway-fronted service.
