name: API Management API revisions
description: The set of revisions (versioned working copies) of an API published through an API Management service.
scope: HIGH
notes: Configuration/version history of a single API; supports a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Removing all revisions of an API destroys its definition configuration and takes the published API offline, disrupting the gateway service for that function.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Lists all revisions of an API, inventorying its versioned definition configuration for reconnaissance.
