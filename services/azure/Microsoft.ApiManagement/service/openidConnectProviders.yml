name: API Management OpenID Connect providers
description: OpenID Connect identity provider registrations used by API Management to authenticate API consumers and the developer portal. They define the auth trust (issuer, client ID) and hold a client secret.
scope: HIGH
notes: Authentication/authorization configuration that gates API access; the associated client secret is a credential.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deletes an OIDC provider, removing an authentication mechanism that gates API access and breaking authorization for dependent APIs.
  read:
    risks:
      - discovery:policy
    scope: MEDIUM
    notes: Reads OIDC provider configuration explicitly without secrets, disclosing the authentication/authorization setup so an attacker can locate weak points in the API's identity controls.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creates or updates an OIDC provider, letting an attacker repoint authentication at an attacker-controlled IdP or weaken token validation, manipulating and undermining the authentication defense protecting APIs.
