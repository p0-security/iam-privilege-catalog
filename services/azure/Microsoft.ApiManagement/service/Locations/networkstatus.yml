name: API Management network status by location
description: Reports the per-location network access/connectivity status of the resources the API Management service depends on.
scope: LOW
notes: Read-only per-region network connectivity diagnostic for the service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading per-location network access status enumerates the service's regional network connectivity and dependencies for reconnaissance.
