name: APIM diagnostics
description: Diagnostic configurations for an Azure API Management service, controlling request logging, tracing, and telemetry sampling.
scope: MEDIUM
notes: Diagnostic settings govern observability and audit visibility for the service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting a diagnostic disables log/telemetry collection for the service, disrupting incident response and aiding evasion.
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating/updating diagnostics lets an attacker reduce sampling or disable logging/tracing, undermining incident response and evading detection.
