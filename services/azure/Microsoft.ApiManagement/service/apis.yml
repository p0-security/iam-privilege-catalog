name: API Management APIs
description: An API definition published on an Azure API Management gateway, defining the exposed paths, schemas, backend service URLs, and routing for a fronted service.
scope: HIGH
notes: API Management fronts production-facing services; its API configuration governs how external traffic is routed to backends and which security policies apply.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting an API removes the published gateway endpoint, destroying that configuration and denying service to consumers of the API.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Lists/gets API definitions including paths and backend configuration, enabling reconnaissance of the gateway's exposed API surface without returning secret material.
  write:
    risks:
      - impact:manipulation
      - impact:defacement
    notes: Creating/updating an API alters the gateway's published configuration (backend URLs, exposed paths, schemas), letting an attacker reroute traffic to attacker backends and alter the public-facing API surface.
