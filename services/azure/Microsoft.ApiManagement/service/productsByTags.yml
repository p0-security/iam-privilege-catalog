name: API Management product-tag associations
description: Read-only listing of which API Management products are associated with which tags. Represents product inventory/organizational metadata of the API gateway.
scope: LOW
notes: Control-plane reconnaissance surface; reveals product configuration inventory but no secrets or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists products grouped by tag, enabling reconnaissance of the gateway's product catalog.
