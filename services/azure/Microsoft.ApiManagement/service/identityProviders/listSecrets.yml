name: APIM identity providers
description: Identity provider configurations for an Azure API Management service, defining the external/federated authentication sources (AAD, OAuth, social logins) used to authenticate to the developer portal.
scope: CRITICAL
notes: These configurations govern who can authenticate to the API Management portal and management surface; their secrets are usable IdP credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the IdP client secrets (OAuth/AAD app credentials), letting an attacker export usable credential material and impersonate the federated identity integration to pivot.
