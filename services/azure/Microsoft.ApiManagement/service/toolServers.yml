name: API Management tool servers
description: Tool server registrations on an Azure API Management AI gateway that define backend MCP/tool integrations (endpoints, namespaces, header/OAuth2 configuration) the gateway brokers for agent tool calls.
scope: HIGH
notes: The configuration holds backend credential material (header values, OAuth2 client secrets, OpenAPI spec), but secret values are exposed only via the separate listSecrets action.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ApiManagement
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a tool server removes a configured backend integration, disrupting the AI gateway's tool-calling function that depends on it (a targeted DoS-like infrastructure removal).
  write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Creating/updating a tool server lets an attacker repoint the gateway to attacker-controlled backends or inject endpoint/header/OAuth credential material, manipulating operational routing and enabling the gateway to call out as a configured identity (lateral movement).
