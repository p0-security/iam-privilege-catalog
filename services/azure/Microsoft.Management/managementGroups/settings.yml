name: Management group hierarchy settings
description: Tenant-level governance settings on the root management group, including the default management group for new subscriptions and whether RBAC authorization is required to create new management groups.
scope: CRITICAL
notes: These settings are tenant-wide guardrails controlling subscription placement and management-group creation authorization.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Management
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Deleting hierarchy settings reverts tenant-wide guardrails (require-authorization-for-group-creation, default group) to permissive defaults, removing an enforced governance defense and altering inheritance for new groups/subscriptions.
  read:
    risks:
      - discovery:policy
    scope: LOW
    notes: Reading hierarchy settings reveals governance configuration (default group, requireAuthorizationForGroupCreation), exposing access-control guardrails and weak points an attacker can target.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating hierarchy settings can disable requireAuthorizationForGroupCreation (an RBAC guardrail) and redirect the default management group, weakening a tenant-wide governance defense and manipulating governance config.
