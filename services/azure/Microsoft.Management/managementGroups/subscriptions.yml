name: Management group subscription associations
description: The association between an Azure subscription and a management group, which determines the subscription's place in the tenant governance hierarchy and the RBAC/policy assignments it inherits.
scope: HIGH
notes: Management groups are tenant-wide governance containers; their subscription membership controls which inherited access-control and policy assignments cascade down.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Management
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
      - destruction:policy
    notes: De-associating a subscription from its management group strips all inherited RBAC role assignments and deny/policy assignments that were governing it, removing access-control enforcement (destruction:policy) and disrupting the governance hierarchy.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Lists the subscriptions under a management group, enumerating the tenant's subscription/organizational hierarchy for reconnaissance. Read-only with no sensitive content disclosure.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Associating a subscription into a management group re-parents it under a different RBAC/policy inheritance tree, manipulating governance and potentially moving the subscription out from under restrictive deny/security policies into a weaker group.
