name: Management groups
description: Management groups are tenant-scope governance containers above subscriptions that organize the subscription hierarchy and provide the scopes through which Azure Policy and RBAC role assignments are inherited.
scope: CRITICAL
notes: The management-group hierarchy defines tenant-wide governance structure; control over it has org-wide blast radius.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Management
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:access
    notes: Deleting a management group destroys a tenant-wide governance container and removes the RBAC role assignments, policies, and locks scoped to it, disrupting governance (DoS-like) and denying authorized operational access that depended on that scope.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Listing management groups enumerates the tenant's governance/subscription hierarchy, providing infrastructure and organizational-topology reconnaissance useful for targeting.
  write:
    risks:
      - escalation:privilege
      - impact:manipulation
    notes: Creating or updating a management group can re-parent subscriptions/groups and restructure the hierarchy, altering which RBAC role assignments and Azure Policy are inherited — enabling privilege escalation and weakening of inherited controls (manipulation of org-wide governance).
