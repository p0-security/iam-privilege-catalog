name: Service Group async operation results
description: An operation-status/result endpoint for asynchronous Service Group management operations under Microsoft.Management.
scope: LOW
notes: Returns only operation progress/completion state, not organizational data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Management
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling the result of an async service-group operation returns only progress/state metadata and grants no meaningful attacker capability in isolation.
