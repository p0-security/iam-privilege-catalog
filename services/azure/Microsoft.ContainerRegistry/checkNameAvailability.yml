name: Container Registry name availability check
description: A stateless control-plane utility on the Microsoft.ContainerRegistry provider that checks whether a proposed registry name is available for use.
scope: LOW
notes: Returns only a yes/no availability verdict for a globally-namespaced name; discloses no organizational inventory.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Name-availability validation that returns only whether a global registry name is taken; exposes no organizational resources and is inert in isolation.
