name: ACR package archive version
description: An Archive version is a control-plane resource representing a specific version of a package archive in an Azure Container Registry. It is the versioned unit of a stored supply-chain artifact.
scope: MEDIUM
notes: Versions are artifact resources; deleting them is artifact destruction and writing them is supply-chain manipulation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deletes an Archive version, destroying a specific stored versioned artifact.
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates an Archive version, allowing an attacker to insert or alter a specific versioned artifact in the registry.
