name: Container registry policies
description: The security and lifecycle policies of an Azure Container Registry (e.g. quarantine/vulnerability-scan gate, content trust, retention, export).
scope: MEDIUM
notes: These policies are supply-chain defenses; reading reveals the security posture and writing can disable image-validation controls.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Lists the registry's policies (quarantine, content trust, retention, export), letting an attacker read the security configuration to find weak points before tampering.
