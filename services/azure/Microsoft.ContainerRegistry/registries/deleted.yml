name: Container registry deleted artifacts
description: The deleted-artifacts sub-resource exposes soft-deleted images/manifests/artifacts in a container registry that are retained and recoverable during the deletion-retention window.
scope: LOW
notes: Represents recoverable artifact objects (stored data) pending purge.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Listing soft-deleted artifacts enumerates which images/manifests are recoverable, an inventory of stored artifact objects.
