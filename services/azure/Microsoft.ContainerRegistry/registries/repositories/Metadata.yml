name: Container registry repository metadata
description: "The data-plane metadata of a repository in an Azure Container Registry: tags, manifest digests/attributes, timestamps, and write/read/delete-enabled flags that describe and govern the stored images."
scope: MEDIUM
notes: Metadata reveals the artifact inventory and operational identifiers and, when writable, governs how consumers resolve tags to images.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Deleting repository metadata removes tags and manifest descriptors used operationally to locate and resolve images, disrupting reference resolution and deployments.
  read:
    risks:
      - exfiltration:metadata
    scope: LOW
    notes: Reading repository metadata returns tags, manifest digests, and descriptive attributes, exposing object metadata and the artifact inventory beyond mere name enumeration.
  write:
    risks:
      - impact:manipulation
    notes: Updating repository metadata can retag images and alter attributes/enable flags (e.g., quarantine, read/write/delete state), manipulating which artifacts consumers resolve and relaxing artifact governance.
