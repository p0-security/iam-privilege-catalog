name: ACR private endpoint connection async operation status
description: The async operation status sub-resource for an Azure Container Registry private endpoint connection. It reports only the progress/state of an in-flight private-endpoint-connection management operation.
scope: LOW
notes: Status-polling endpoints expose only operation progress, never configuration, data, or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling the async status of a private endpoint connection change returns only operation progress and grants no actionable capability in isolation.
