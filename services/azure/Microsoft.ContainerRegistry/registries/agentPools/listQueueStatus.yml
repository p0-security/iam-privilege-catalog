name: Container registry agent pools
description: Dedicated managed build-compute pools (VM size, count, tier) that execute ACR Tasks (image build/run workloads) for a container registry.
scope: LOW
notes: Supporting build infrastructure of the registry; control-plane configuration that does not contain registry image data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:infra
    notes: Returns the build-queue status (queued/running counts) for an agent pool, a low-value reconnaissance read of build-infrastructure operational state.
