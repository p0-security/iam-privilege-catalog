name: Container registry task runs
description: The ACR Tasks run records of an Azure Container Registry, representing build/task execution jobs and their properties, status, and logs.
scope: MEDIUM
notes: Run records are build-pipeline operational metadata; some run-scoped actions (log SAS URLs) expose credential and log material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Updating a run mutates ACR task run records (e.g. archive flag/properties), allowing manipulation of build-pipeline operational metadata and history.
