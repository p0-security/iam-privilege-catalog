name: Container registry artifacts
description: Registry artifacts are the container images and OCI packages stored in an Azure Container Registry that are pulled for deployment.
scope: MEDIUM
notes: Loss of artifacts can break dependent deployments; images can usually be rebuilt or re-pushed, limiting permanence of the impact.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deletes a container image/package from the registry, destroying a stored deployment artifact and potentially breaking dependent deployments.
