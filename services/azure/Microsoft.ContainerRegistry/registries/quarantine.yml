name: Container registry quarantined images
description: Quarantined images are container images held in a gated, not-yet-validated state in an Azure Container Registry pending security scanning/content-trust approval before they may be pulled normally.
scope: HIGH
notes: The quarantine gate is a defense control; reading/modifying it bypasses image vetting and can expose unvetted artifact content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:data
    notes: Pulls quarantined images, exporting the image content/layers (which may contain sensitive code and data) before they have passed the security gate.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Modifies quarantine state, letting an attacker mark a malicious/unscanned image as passed, bypassing the quarantine security gate so a poisoned image becomes pullable into production.
