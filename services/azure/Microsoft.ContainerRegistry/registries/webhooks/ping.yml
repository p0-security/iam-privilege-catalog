name: Container registry webhooks
description: A webhook on an Azure Container Registry that fires HTTP callbacks to a configured service URI when registry events occur (image push, delete, quarantine, chart push/delete).
scope: LOW
notes: Supporting integration/notification plumbing for a registry; the callback configuration can embed authentication secrets in custom headers, but the webhook itself does not hold image artifacts.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Triggering a test ping to the already-configured endpoint performs no read/write/delete of organizational assets and grants no meaningful attacker capability in isolation.
