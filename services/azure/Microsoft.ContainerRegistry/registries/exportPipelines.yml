name: Container registry export pipelines
description: Export pipeline resources that configure automated copy of container registry artifacts out to a target storage account (with an associated managed identity and key-vault SAS reference).
scope: MEDIUM
notes: Control-plane configuration of the registry's content-export workflow; the pipeline binds a managed identity and points at an external storage target.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deletes an export pipeline, removing the configured artifact-export infrastructure and disrupting legitimate replication/export workflows.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Gets or lists export pipeline configuration, inventorying the registry's artifact-export infrastructure and its target storage configuration.
  write:
    risks:
      - exfiltration:data
      - exfiltration:code
      - escalation:lateral
      - impact:manipulation
    scope: HIGH
    notes: Creates or updates an export pipeline, configuring automated export of registry artifacts (container images containing application code/binaries) to attacker-chosen storage and binding a managed identity to operate the transfer.
