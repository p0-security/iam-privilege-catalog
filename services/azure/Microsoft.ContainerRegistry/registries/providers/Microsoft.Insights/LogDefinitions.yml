name: Container registry log definitions
description: Log definitions enumerate the diagnostic log categories that Microsoft.ContainerRegistry can emit via Azure Monitor.
scope: LOW
notes: This is metadata about logging capability, not the log content itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reads the available log categories for the registry, disclosing which log types exist (logs reconnaissance) without exposing any log content.
