name: Container registry credential sets
description: A credential set on an Azure Container Registry stores the configuration used to authenticate to an upstream registry for pull-through cache rules, referencing Key Vault secret URIs for the upstream credentials and binding a (typically user-assigned) managed identity.
scope: MEDIUM
notes: Reading exposes auth wiring and the identity binding but not the raw secret values, which are held in Key Vault; writing can repoint authentication and bind an attacker-influenced identity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a credential set removes the authentication configuration that cache rules depend on, breaking upstream pull-through caching as a DoS-like disruption of supporting infrastructure.
  write:
    risks:
      - escalation:lateral
      - persistence:account
      - impact:manipulation
    notes: Creating/updating a credential set binds a managed identity and points upstream authentication at attacker-chosen Key Vault secrets, enabling identity-backed lateral access, persistent control over the credential configuration, and manipulation of the registry's pull pipeline.
