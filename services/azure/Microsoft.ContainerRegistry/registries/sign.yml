name: Container registry content-trust signing metadata
description: The content-trust (Notary) signing metadata of an Azure Container Registry, used to attest image authenticity and integrity.
scope: HIGH
notes: Content trust is a supply-chain integrity defense; the ability to write signing metadata subverts image-signature verification.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Writing content-trust metadata lets an attacker sign malicious images as trusted or tamper with trust data, subverting the content-trust verification defense that gates which images are accepted.
