name: Microsoft.ContainerRegistry provider registration
description: A control-plane action on the Microsoft.ContainerRegistry resource provider that registers (or unregisters) a subscription with the provider.
scope: LOW
notes: An idempotent prerequisite enablement toggle; registration grants no data access and does not alter access-control, while unregistration is typically blocked while registries still exist.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Provider-registration no-op that enables creation of container registries for a subscription but confers no attacker-relevant capability in isolation; later registry creation requires separate write permissions.
