name: Container registry VNet/subnet deletion notification
description: An internal resource-provider notification callback by which Azure informs Microsoft.ContainerRegistry that a virtual network or subnet is being deleted elsewhere.
scope: LOW
notes: Platform plumbing hook; despite the 'delete' wording it performs no deletion and grants no attacker-meaningful capability in isolation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerRegistry
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Inert cross-RP notification that performs no state change against the registry or network; confers no standalone attacker capability.
