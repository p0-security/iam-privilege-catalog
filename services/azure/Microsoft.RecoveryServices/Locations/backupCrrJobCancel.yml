name: Recovery Services backup recovery points (location)
description: Location-scoped Recovery Services backup operations that operate on a vault's protected backup recovery points and cross-region restore workflow in the secondary (paired) region.
scope: MEDIUM
notes: Backup recovery points contain copies of protected organizational data (VM disks, files, databases); the cross-region restore surface can surface that data into a secondary region.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: The operation name (backupCrrJobCancel) indicates cancelling an in-progress cross-region restore job, letting an attacker disrupt a legitimate disaster-recovery/restore operation.
