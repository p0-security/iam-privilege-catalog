name: Soft-deleted Recovery Services vaults
description: A soft-deleted Recovery Services vault is a recoverable record of a deleted backup/disaster-recovery vault retained in a region for potential undelete.
scope: MEDIUM
notes: Exposes metadata about deleted backup/DR infrastructure; does not return protected backup data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Getting a soft-deleted vault object enumerates deleted backup/DR vault metadata and configuration, a reconnaissance capability.
