name: Operation status
description: Operation status is the progress/result of a previously submitted asynchronous Recovery Services operation, keyed by region and operation id.
scope: LOW
notes: Returns only async operation progress metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the status of an async operation; an inert status read carrying no meaningful attacker capability.
