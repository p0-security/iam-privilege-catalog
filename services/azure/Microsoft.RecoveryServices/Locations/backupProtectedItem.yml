name: Azure Backup protected items
description: Azure Backup protected items represent resources (VMs, databases, file shares, etc.) enrolled for backup in a Recovery Services vault, governed by a backup policy. This location-scoped operation creates/registers a protected item, altering backup protection configuration.
scope: MEDIUM
notes: Controls backup coverage of organizational resources; misconfiguration affects recoverability and can incur backup storage cost.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Creating a backup protected item enrolls a resource into a backup policy, altering the organization's backup/recovery configuration.
