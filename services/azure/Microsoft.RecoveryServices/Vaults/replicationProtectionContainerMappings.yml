name: Site Recovery protection container mappings
description: Azure Site Recovery protection container mappings define the replication relationship between a source protection container and a target container within a Recovery Services vault.
scope: LOW
notes: Control-plane configuration metadata for disaster-recovery topology; reads do not expose replicated data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only enumeration of replication container mappings reveals DR replication topology configuration.
