name: Recovery Services backup tiering cost operation status
description: Async operation-status endpoint that returns the status of a tiering-cost operation against a Recovery Services vault.
scope: LOW
notes: Status polling endpoint exposes only operation-progress metadata, not cost figures.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the progress status of a tiering-cost operation; an inert async status poll with no standalone attacker capability.
