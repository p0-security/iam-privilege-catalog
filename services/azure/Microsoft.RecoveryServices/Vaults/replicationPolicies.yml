name: Azure Site Recovery replication policies
description: ASR replication policies define disaster-recovery parameters such as RPO, recovery-point retention, app-consistent snapshot frequency, and replication frequency for protected items in a Recovery Services vault.
scope: HIGH
notes: These are DR configuration policies, NOT IAM/access-control policies; reading or modifying them affects recoverability posture, not authorization.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a replication policy removes the DR configuration governing protection, destroying recovery settings and undermining the ability to recover associated protected workloads.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Read-only enumeration of DR policy settings (RPO/retention/frequency); reconnaissance of recovery configuration, explicitly not access-control policy so discovery:policy does not apply.
  write:
    risks:
      - impact:manipulation
    scope: MEDIUM
    notes: Creating or updating replication policies alters RPO/retention/frequency settings, allowing an attacker to weaken the recovery posture (e.g., shorten retention) of protected workloads.
