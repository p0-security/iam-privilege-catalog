name: Backup jobs
description: Backup jobs are the records and execution of backup/restore operations run by a Recovery Services vault, representing protection activity against protected items.
scope: MEDIUM
notes: Job records expose operational metadata (schedules, status, targets) about backup activity, not backed-up data contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Cancelling running backup/restore jobs disrupts backup operations, leaving protected items without fresh recovery points and impeding recovery, a denial-of-service against the backup function.
