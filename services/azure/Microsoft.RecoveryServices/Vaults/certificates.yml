name: Recovery Services vault credential certificate
description: The vault resource/credential certificate is the authentication trust material used by backup agents and registered clients to authenticate to the Recovery Services vault backend.
scope: CRITICAL
notes: Controls the credential trust used to authenticate to vault backup/replication backend operations.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - persistence:account
      - escalation:lateral
    notes: Updating the credential certificate installs attacker-controlled authentication material, letting an attacker enroll their own credential for persistent, reusable authenticated access to the vault backend.
