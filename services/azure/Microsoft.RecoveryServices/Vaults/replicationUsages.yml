name: Vault replication usages
description: Vault replication usages are aggregate usage/quota statistics (counts of protected entities, capacity) for the replication features of a Recovery Services vault.
scope: LOW
notes: Aggregate summary metadata only.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads aggregate replication usage counts/quotas, low-sensitivity infrastructure inventory.
