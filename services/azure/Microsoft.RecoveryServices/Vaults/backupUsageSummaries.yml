name: Recovery Services backup usage summaries
description: Read-only summary counts of Protected Items and Protected Servers in a Recovery Services Vault.
scope: LOW
notes: Returns aggregate inventory of what is backed up, not the contents of any backup.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns summaries of protected items and protected servers, letting an attacker inventory which workloads are backed up by the vault.
