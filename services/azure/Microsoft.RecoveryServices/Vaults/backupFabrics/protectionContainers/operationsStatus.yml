name: Protection container operation status
description: Async long-running-operation status endpoint for operations performed on a backup protection container in a Recovery Services vault.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
