name: Backup workload items
description: Workload items are the individual backup-eligible/protected sub-resources (e.g. databases, file shares, application instances) enumerated inside a registered protection container.
scope: MEDIUM
notes: Listing enumerates the data-object inventory (which databases/shares exist) but does not return their contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Listing all items in a container enumerates the specific data objects (databases, file shares) inside the container, providing a data-object inventory for targeting.
