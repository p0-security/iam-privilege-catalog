name: Backup protected items
description: A protected item is a workload (VM, database, file share, etc.) registered for backup within a Recovery Services vault, along with its backup protection configuration and recovery points.
scope: HIGH
notes: Backup recovery points are the organization's last line of defense against ransomware and data loss; controlling them affects recoverability of a single workload/function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deletes a protected item and stops protection, removing its backup recovery points and destroying the recovery copies that would otherwise mitigate a ransomware or data-destruction attack.
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates a protected item's protection configuration (policy/retention/schedule), letting an attacker weaken or alter the backup posture of a workload.
