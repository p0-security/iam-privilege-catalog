name: Backup recovery points
description: Recovery points are point-in-time backup snapshots of protected items (VMs, databases, file shares) stored within a Recovery Services vault.
scope: MEDIUM
notes: Recovery points hold full copies of production organizational data; access to them is equivalent to access to the source data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Listing recovery points enumerates available backup snapshots and their timestamps for protected items without returning the underlying data contents.
  write:
    risks:
      - impact:manipulation
    scope: HIGH
    notes: Updating a recovery point modifies backup snapshot metadata/retention attributes, manipulating the operational backup state and potentially affecting recoverability.
