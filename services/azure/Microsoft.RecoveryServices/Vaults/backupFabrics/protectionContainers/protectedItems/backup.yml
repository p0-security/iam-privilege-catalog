name: Backup protected items
description: A protected item is a workload (VM, database, file share, etc.) registered for backup within a Recovery Services vault, along with its backup protection configuration and recovery points.
scope: MEDIUM
notes: Backup recovery points are the organization's last line of defense against ransomware and data loss; controlling them affects recoverability of a single workload/function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:spend
    notes: Triggers an on-demand backup job for an already-protected item; in isolation it only consumes vault storage/compute and incurs metered backup cost, with no data destruction or exfiltration.
