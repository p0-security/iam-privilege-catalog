name: Recovery Services backup recovery points
description: Recovery points (backup snapshots) of protected items managed under a Recovery Services vault's backup fabric, representing point-in-time copies of organizational data.
scope: LOW
notes: Recovery points and the restore machinery around them ultimately gate access to backed-up production data; enumeration is reconnaissance while restore is full data access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:infra
    notes: Refreshes/re-enumerates the list of backup containers, providing an inventory of protectable infrastructure resources registered to the vault.
