name: Backup protected-item operation results
description: A read-only endpoint that returns the result/status of an operation performed on backup protected items within a Recovery Services vault.
scope: LOW
notes: Returns operational status/metadata about backup operations, not the backup data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns the result/status of an operation on protected items; an operation-status read that discloses no backup data or credentials.
