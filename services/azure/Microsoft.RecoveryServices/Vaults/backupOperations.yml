name: Backup operation status
description: Backup operation status is the in-flight progress/state of an asynchronous backup operation within a Recovery Services vault, used for polling long-running calls.
scope: LOW
notes: Trivial operation-status bookkeeping with negligible sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns the status of an in-progress backup operation for async polling, exposing only operation-state metadata.
