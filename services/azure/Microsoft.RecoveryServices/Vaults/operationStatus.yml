name: Recovery Services vault operation status
description: Async operation-status endpoint that returns the status of a given operation against a Recovery Services vault.
scope: LOW
notes: Status polling endpoints expose only operation-progress metadata, not vault data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the status of a given operation; an inert async status read with no standalone attacker capability.
