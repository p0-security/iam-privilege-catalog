name: Recovery Services vault operation results
description: Async operation-result endpoint that returns the status and result of an asynchronously submitted operation against a Recovery Services vault.
scope: LOW
notes: Status/result polling endpoints expose only operation-completion metadata, not vault data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the result/status of an asynchronously submitted operation; an inert status read with no standalone attacker capability.
