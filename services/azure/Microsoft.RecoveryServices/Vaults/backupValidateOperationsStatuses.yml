name: Recovery Services backup operation validation status
description: Async operation-status endpoint that returns the validation status of a submitted backup operation on a protected item within a Recovery Services vault.
scope: LOW
notes: Status/polling endpoints expose only transient operation-progress metadata, not backup contents or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the validation/progress status of a backup operation; an inert async status poll with no standalone attacker capability.
