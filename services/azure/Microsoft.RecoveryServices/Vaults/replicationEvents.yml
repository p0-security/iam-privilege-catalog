name: Site Recovery replication events
description: "Azure Site Recovery replication events within a Recovery Services vault: operational event/log records describing replication and failover health and activity."
scope: LOW
notes: Event records reveal the state and history of the DR replication pipeline; primarily reconnaissance value.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reads Site Recovery replication events (operational event/log records), enumerating replication health and activity history for reconnaissance.
