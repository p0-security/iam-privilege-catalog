name: Recovery Services vault monitoring configuration
description: The notification/monitoring configuration of a Recovery Services vault, controlling e-mail alerting for backup and restore events.
scope: LOW
notes: "A detective control: notification settings determine whether operators are alerted to backup tampering or restore activity."
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the vault notification configuration only inventories non-sensitive operational alerting settings (who is notified and on what events).
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    scope: MEDIUM
    notes: Reconfiguring e-mail notifications lets an attacker suppress or reroute alerts about malicious backup/restore activity, weakening a detective control, and alters operational monitoring config.
