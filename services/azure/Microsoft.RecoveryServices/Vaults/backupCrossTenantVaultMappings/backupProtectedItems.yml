name: Cross-tenant backup protected items (vault-wide list)
description: The vault-wide list of all backup protected items, enumerated through a cross-tenant vault mapping. It inventories every resource enrolled for backup protection in the mapped vault.
scope: MEDIUM
notes: Reveals the full inventory of backed-up workloads but not the backup data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns the full list of protected items, letting an attacker inventory exactly which workloads are backed up across the tenant boundary.
