name: Cross-tenant backup jobs
description: Backup jobs are records of backup and restore operations executed in the vault, listed here through a cross-tenant vault mapping. They expose operational activity metadata such as job type, status, and protected resource references.
scope: LOW
notes: Job records are operational metadata; they do not contain backed-up data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Listing backup jobs reveals backup/restore operational activity and protected-resource references, providing infrastructure reconnaissance.
