name: Cross-tenant backup validate-operation status
description: The asynchronous status record of a backup validate-operation (dry-run), accessed through a cross-tenant vault mapping. It returns only the progress/status of the validation.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling validate-operation status is an inert async status read exposing no sensitive data or actionable capability.
