name: Cross-tenant backup protected items
description: A backup protected item represents a specific resource (VM, database, file share, etc.) enrolled for backup, accessed here through a cross-tenant vault mapping. Reading it returns the item's backup configuration, policy, and protection state.
scope: MEDIUM
notes: Protected-item metadata reveals which production workloads are backed up and how, but does not itself contain the backed-up data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns configuration details of a protected item, letting an attacker inventory which resources are backed up and their backup settings across the tenant boundary.
