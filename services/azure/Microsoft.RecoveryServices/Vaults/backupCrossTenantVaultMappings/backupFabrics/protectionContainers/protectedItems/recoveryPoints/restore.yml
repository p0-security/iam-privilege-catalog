name: Cross-tenant backup recovery points
description: A recovery point is a stored backup snapshot of a protected item at a point in time, enumerated here through a cross-tenant vault mapping. The list reveals which restorable backup copies of organizational data exist and their timestamps.
scope: HIGH
notes: Recovery points are the actual backup data copies; their restore exposes the underlying organizational data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:data
      - impact:manipulation
      - impact:spend
    notes: Restoring a recovery point reconstitutes the full backed-up data (potentially to an attacker-chosen target across the tenant boundary, exfiltrating it), can overwrite live data via original-location restore (manipulation), and provisions billable restore infrastructure (spend).
