name: Recovery Services Providers (Site Recovery)
description: Recovery Services Providers are the Azure Site Recovery replication agents registered against a replication fabric within a Recovery Services vault. They connect source infrastructure (machines/fabrics) to the vault and govern disaster-recovery replication and failover for protected workloads.
scope: MEDIUM
notes: Supporting disaster-recovery infrastructure for a set of protected workloads; compromise affects business-continuity/DR capability rather than the live production data plane directly.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a provider destroys the registered replication agent, dismantling DR infrastructure and halting replication/failover protection for the workloads it serves.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a provider registration alters the DR replication agent configuration tying fabrics to the vault, letting an attacker tamper with how/whether protected workloads replicate.
