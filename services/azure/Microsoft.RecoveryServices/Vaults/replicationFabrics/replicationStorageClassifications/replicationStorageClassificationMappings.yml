name: Site Recovery storage classification mappings
description: Azure Site Recovery storage classification mappings define how source storage classifications map to target storage in the disaster-recovery (ASR) replication fabric of a Recovery Services vault.
scope: MEDIUM
notes: Supporting disaster-recovery replication configuration; tied to protection of production workloads but not itself a data store or credential.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting mappings removes DR replication configuration, impairing the disaster-recovery pipeline for protected items.
  read:
    risks:
      - discovery:infra
    notes: Read-only enumeration of replication storage classification mappings exposes DR replication topology for reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating mappings alters DR replication configuration, letting an attacker misdirect or misconfigure where replicated data lands.
