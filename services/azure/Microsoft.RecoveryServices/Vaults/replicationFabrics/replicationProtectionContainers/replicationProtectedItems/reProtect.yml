name: Site Recovery protected items
description: Azure Site Recovery protected items represent production VMs/workloads enrolled in disaster-recovery replication within a Recovery Services vault, including their source/target configuration, disks, recovery points, and replication state.
scope: HIGH
notes: These items govern the disaster-recovery posture of production workloads; manipulating them can disrupt running services, spin up clone compute from replicated data, and destroy recovery capability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Re-protect reverses the replication direction after a failover, reconfiguring which site is source vs target; it can overwrite the original-site data with recovery-site state, manipulating the DR posture.
