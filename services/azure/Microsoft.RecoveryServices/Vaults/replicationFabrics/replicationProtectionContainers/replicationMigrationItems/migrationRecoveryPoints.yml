name: Azure Site Recovery migration recovery points
description: Migration recovery points are the available point-in-time snapshots for an ASR migration item that can be used as the source for a migrate or test-migrate operation. Reading them lists the recovery-point inventory and metadata for a replicating workload.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading migration recovery points enumerates the available restore points and their metadata for a migration item; it inventories DR state rather than returning the underlying disk data.
