name: Protection Container Mappings operation results
description: An async operation-result tracking sub-resource for Site Recovery protection container mappings within a Recovery Services vault. It reports the status of a long-running operation on those mappings.
scope: LOW
notes: Pure operation-status polling endpoint.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only transient async operation state; no actionable data or capability in isolation.
