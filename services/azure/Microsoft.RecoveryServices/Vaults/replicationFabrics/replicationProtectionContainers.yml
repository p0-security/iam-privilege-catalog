name: Site Recovery replication protection container
description: A Site Recovery protection container groups the replicated (protected) items within a fabric and holds the container mappings that define how source workloads map to their recovery targets.
scope: HIGH
notes: The container is the grouping layer between a fabric and its protected items; reconfiguring or removing it disrupts the protection of the workloads it holds, but it does not itself store recovery data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a protection container changes the mapping that governs how source workloads replicate to their targets, which can misdirect or weaken the protection of the contained items.
