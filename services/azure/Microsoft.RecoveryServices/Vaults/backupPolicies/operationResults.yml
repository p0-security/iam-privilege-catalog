name: Backup policy operation results
description: Asynchronous operation-result endpoint for backup policy operations in a Recovery Services vault, returning the outcome of a policy change operation.
scope: LOW
notes: Status-polling endpoint exposing only operation outcome metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reading the result of an async policy operation returns only completion/outcome metadata, granting no meaningful attacker capability in isolation.
