name: Backup policy operation status
description: Asynchronous operation-status endpoint for backup policy operations in a Recovery Services vault, returning the progress state of a policy operation.
scope: LOW
notes: Status-polling endpoint exposing only operation progress state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reading the status of an async policy operation returns only progress state, an inert poll with no meaningful attacker capability.
