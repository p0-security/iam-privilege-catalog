name: Vault Replication Health operation results
description: An async operation-result tracking sub-resource of a Recovery Services vault's Site Recovery (replication) feature. It reports the status/result of a previously initiated long-running operation on vault replication health.
scope: LOW
notes: Pure operation-status polling endpoint; carries no resource configuration or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the status/result of an in-progress async operation; grants no meaningful reconnaissance or capability in isolation.
