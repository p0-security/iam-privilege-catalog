name: Azure Site Recovery recovery plans
description: Azure Site Recovery recovery plans are disaster-recovery orchestration definitions inside a Recovery Services vault that group replicated items (VMs/workloads), set failover ordering, and attach custom scripts/runbooks.
scope: HIGH
notes: Recovery plans govern DR/failover for protected production workloads; abuse can disrupt availability or sabotage recovery, but the plan object itself is orchestration config rather than a primary data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Committing a failover finalizes the cutover to the recovery side and discards the ability to revert, cementing the disruption to production workloads.
