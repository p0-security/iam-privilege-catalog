name: Vault private endpoint connection proxies
description: Private endpoint connection proxies for a Recovery Services vault — the connectivity helper objects that establish/manage the vault's private endpoint (Private Link) network path for backup and replication services.
scope: LOW
notes: Controls private network connectivity to a vault that protects organizational backup/recovery data for a service. The displayName/description on several of these operations are mislabeled copy-paste artifacts; classification follows the verb.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: A pre-flight validation action that only checks a proxy request without mutating state or disclosing sensitive data; no actionable capability in isolation.
