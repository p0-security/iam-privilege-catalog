name: Site Recovery migration items
description: Migration items represent workloads being migrated/replicated (e.g. via Azure Migrate/ASR) through a Recovery Services vault.
scope: LOW
notes: Control-plane read returns migration configuration, not the workload data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Enumerates workloads under migration/replication and their configuration, infrastructure reconnaissance.
