name: Site Recovery registered vCenters
description: Registered vCenter servers are on-premises VMware vCenter instances connected to a Recovery Services vault for discovery and replication.
scope: LOW
notes: Read returns vCenter registration/connection metadata; no credentials are exposed.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Enumerates registered vCenter servers, revealing connected on-prem virtualization infrastructure topology.
