name: Vault private endpoint connections operation status
description: A sub-resource of a Recovery Services vault's private endpoint connections that reports the status of an async operation on a private endpoint connection.
scope: LOW
notes: Pure operation-status polling endpoint.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the operation status for a private endpoint connection; an inert status poll with no sensitive disclosure or state change.
