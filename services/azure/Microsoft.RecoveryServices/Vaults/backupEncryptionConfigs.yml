name: Vault backup encryption config
description: The backup resource encryption configuration of a Recovery Services vault, describing how vault backups are encrypted at rest (e.g. customer-managed key reference / Key Vault key URI and identity settings).
scope: HIGH
notes: Holds encryption-configuration metadata, not the key material itself; the configuration governs protection of backup data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - impact:encryption
    notes: Updating the encryption config lets an attacker swap the customer-managed key protecting backups, manipulating the vault's protection posture and enabling encryption of backups under an attacker-controlled key (ransom vector).
