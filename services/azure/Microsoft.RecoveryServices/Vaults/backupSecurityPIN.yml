name: Recovery Services vault
description: An Azure Recovery Services vault is the control-plane resource that stores and manages backups and recovery points for VMs, databases, files, and other workloads, serving as the organization's disaster-recovery and ransomware-resilience backstop.
scope: CRITICAL
notes: The vault itself guards organization-wide recovery data; control-plane reads expose only configuration metadata, while delete/security-PIN operations are far more sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - destruction:defense
    notes: Returns the vault Security PIN, the credential required to authorize critical/destructive backup operations (stop protection with delete data, shorten retention, disable soft-delete), so obtaining it exfiltrates credential material and defeats the vault's last-line defense control.
