name: Recovery Services vault log definitions
description: The set of available Azure Backup log category definitions emitted by a Recovery Services vault.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Enumerates the available backup log categories/types for the vault; returns log schema, not log content.
