name: Site Recovery replication protection intents
description: Azure Site Recovery replication protection intent configuration that declares which workloads should be enrolled into disaster-recovery replication and how.
scope: HIGH
notes: Reveals/controls the DR posture for protected workloads of an organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Creates/updates replication protection intent, altering disaster-recovery replication configuration for protected workloads.
