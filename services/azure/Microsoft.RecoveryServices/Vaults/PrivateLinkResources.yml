name: Recovery Services vault private link resources
description: Private link resource definitions for a Recovery Services vault, describing the private-endpoint connectivity options/sub-resources available for the vault.
scope: LOW
notes: Reveals private-endpoint network topology relevant to connectivity, not data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.RecoveryServices
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Returns the vault's private link resources, inventorying private-endpoint network connectivity configuration (network reconnaissance).
