name: Managed HSM private endpoint connection proxy
description: The connection-proxy object that brokers a Microsoft.Network Private Endpoint connection to a Managed HSM, used internally during private-endpoint provisioning and lifecycle.
scope: LOW
notes: Governs private network reachability to the HSM; write/delete affect connectivity, read only inventories it.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Internal pre-flight validation step in private-endpoint provisioning that neither returns sensitive data nor changes state, so it grants no meaningful attacker capability in isolation.
