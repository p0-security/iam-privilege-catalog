name: Key Vault metric definitions
description: Metric definitions enumerate the monitoring/telemetry metric schema available for a key vault via Azure Monitor.
scope: LOW
notes: Read-only monitoring metadata; exposes only which metrics exist, not metric values or vault secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Lists available metric definitions for a vault, exposing only the monitoring/telemetry schema.
