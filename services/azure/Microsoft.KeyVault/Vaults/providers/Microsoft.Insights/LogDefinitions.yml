name: Key Vault log definition
description: The set of available diagnostic log categories (log definitions) exposed by a Key Vault for monitoring configuration.
scope: LOW
notes: Read-only logging metadata; lists which log categories exist and contains no secret or log content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Returns only the list of available log categories for the vault, a read-only enumeration of logging metadata with no access to secrets or log contents.
