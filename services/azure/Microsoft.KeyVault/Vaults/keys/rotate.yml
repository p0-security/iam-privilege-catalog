name: Key Vault key
description: A cryptographic key stored in an Azure Key Vault, used for encryption, decryption, signing, verification, and key wrapping operations by applications and services.
scope: CRITICAL
notes: Keys are cryptographic material that frequently protect other credentials or data at rest; access to or use of them typically yields broad downstream impact, so the asset is inherently CRITICAL.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
      - persistence:account
    notes: Creates a new version of an existing key using the same parameters, letting an attacker force an out-of-cycle rotation to a new key version they can then further manipulate (e.g. import/backup timing), or disrupt applications pinned to a specific key version.
