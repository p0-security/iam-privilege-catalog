name: Key Vault key version
description: A Key Vault key version is a specific version of a cryptographic key stored in a Key Vault. This management-plane read lists key versions and returns their public attributes/metadata (identifiers, state, public key material), not the exportable private key bytes.
scope: CRITICAL
notes: Keys are CRITICAL-tier assets; however this read returns only version inventory/metadata, not private key material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists key versions or reads a version's metadata and public properties, enabling enumeration of the vault's cryptographic key inventory; it does not return private key material.
