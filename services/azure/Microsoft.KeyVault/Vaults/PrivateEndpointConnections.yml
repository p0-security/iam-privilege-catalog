name: Key Vault private endpoint connection
description: A private endpoint connection binds an Azure Key Vault to a Microsoft.Network private endpoint, controlling private-network reachability to the vault.
scope: HIGH
notes: This is network connectivity configuration for the vault; it governs how the vault is reachable over private link but does not itself hold secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the private endpoint connection removes a private network access path to the vault, disrupting clients that depend on private link (DoS-like effect).
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading the connection state only enumerates which private endpoints are bound to the vault and their approval status, i.e. network reconnaissance of the vault's private-link topology.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Approving/changing a private endpoint connection can expose the secret-bearing vault to an attacker-controlled private network path (network movement) and alters the vault's connectivity configuration.
