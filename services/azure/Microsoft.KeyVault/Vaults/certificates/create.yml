name: Key Vault certificate
description: A certificate stored in an Azure Key Vault, holding a private key plus a public identity used by applications and TLS endpoints for authentication and encryption.
scope: CRITICAL
notes: Certificates bundle a private key with a trusted public identity; planting or exporting one typically yields impersonation or downstream identity access, so the asset is inherently CRITICAL.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
      - persistence:account
    notes: Creates a new certificate, or a new version of an existing certificate, letting an attacker have the vault generate a certificate under a trusted identity that a dependent application or TLS endpoint will subsequently present and trust for impersonation.
