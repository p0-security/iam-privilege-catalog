name: Key Vault secret
description: A secret stored in an Azure Key Vault, typically holding credentials such as passwords, connection strings, API keys, or tokens used by applications and services.
scope: CRITICAL
notes: Secrets are credential-bearing material; access to them frequently yields downstream identity access, so the asset is inherently CRITICAL.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
    notes: Deletes a secret and all its versions, destroying secret/credential material (recoverable only while soft-delete retention holds).
  read:
    risks:
      - discovery:data
    notes: Control-plane read returns secret properties/metadata but explicitly not the value, so it only inventories which secrets exist as reconnaissance toward credential targets.
  write:
    risks:
      - impact:manipulation
      - persistence:account
    notes: Creating or overwriting a secret value lets an attacker poison credentials consumed by downstream services (manipulation) and plant attacker-controlled credential material for persistence.
