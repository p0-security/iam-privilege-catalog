name: Key Vault private endpoint connection proxy
description: A private endpoint connection proxy mediates the connection state between a key vault and a Microsoft.Network Private Endpoint resource.
scope: LOW
notes: Controls private-network connectivity to the vault; write/delete affect network exposure of a critical key store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: A pre-flight validation/consistency check of a connection proxy that neither mutates state nor discloses sensitive data.
