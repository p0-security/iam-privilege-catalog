name: Key Vault secret
description: A secret stored in an Azure Key Vault, typically holding credentials such as passwords, connection strings, API keys, or tokens used by applications and services.
scope: CRITICAL
notes: Secrets are credential-bearing material; access to them frequently yields downstream identity access, so the asset is inherently CRITICAL.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
      - takeover:account
    notes: Returns the actual secret value (password, connection string, token), exporting credential material that typically yields usable identity access and lateral movement into the systems the secret protects.
