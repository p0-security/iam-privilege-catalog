name: Key Vault managed storage account
description: A Key Vault managed storage account is a vault object that links Key Vault to an Azure Storage account so the vault manages (and auto-regenerates) the storage account's access keys and issues SAS tokens on its behalf. The object holds the storage account resource ID, the active key name, and the auto-regeneration period.
scope: CRITICAL
notes: This is a deprecated Key Vault feature that nonetheless mediates storage-account credentials; objects here govern credential issuance for the backing storage account, making the asset credential-management-sensitive (CRITICAL).
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:access
    notes: Deletes the managed storage account definition (and its SAS definitions/issuance state), removing the vault-managed credential object and denying applications that rely on the vault to mint storage credentials. The underlying storage account and its data remain intact.
  read:
    risks:
      - discovery:infra
    notes: Reads the managed storage account definition (storage account resource ID, active key name, regeneration period); it does not return the storage key or a live SAS token, so it is reconnaissance of credential-management configuration.
