name: Key Vault Network Security Perimeter configuration
description: The Network Security Perimeter configuration stored in a Key Vault, describing the NSP membership and network access rules enforced around the vault.
scope: CRITICAL
notes: Describes the network-isolation posture of a Key Vault, a critical store of keys, secrets, and certificates.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Reconcile only re-synchronizes the vault's stored NSP configuration with the authoritative Microsoft.Network (NRP) copy; it pulls/refreshes state rather than letting the caller set arbitrary configuration, granting no meaningful standalone attacker capability.
