name: Key Vault
description: An Azure Key Vault is a managed secrets store holding cryptographic keys, secrets, and certificates and their access/network configuration.
scope: CRITICAL
notes: "Key Vaults are CRITICAL-tier assets: they centralize credentials and cryptographic material relied on across many organizational functions."
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Enables access to vault secrets during Azure resource deployment, letting an attacker reference and surface secret/credential material into a deployment context and reuse it to pivot to other identities and resources.
