name: Key Vault certificate
description: An Azure Key Vault certificate is a managed X.509 certificate object that bundles a private key, the certificate (public) material, and an issuance/lifecycle policy. It is a credential used by applications and services for TLS, signing, and authentication.
scope: CRITICAL
notes: Certificates contain private key material; compromise enables impersonation/MITM of dependent services. Vaults are CRITICAL-sensitivity assets per the scope guide.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Lists certificates in the vault or gets information about a certificate; returns the public portion and metadata only, not the private key, so exposure is limited to asset inventory and configuration.
  delete:
    risks:
      - destruction:crypto
    notes: Deletes a certificate and all its versions, destroying the stored private key and certificate material (recoverable only while soft-delete retention holds).
