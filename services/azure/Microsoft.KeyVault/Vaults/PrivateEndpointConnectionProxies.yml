name: Key Vault private endpoint connection proxy
description: A private endpoint connection proxy mediates the connection state between a key vault and a Microsoft.Network Private Endpoint resource.
scope: HIGH
notes: Controls private-network connectivity to the vault; write/delete affect network exposure of a critical key store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the proxy removes a private network connectivity path to the vault, disrupting legitimate private access (DoS-like).
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reads the proxy's connection state, inventorying the vault's private network connectivity configuration.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Changing the proxy state can approve/establish private connectivity to the vault, exposing the key store to an attacker-reachable network and altering its connection configuration.
