name: Key Vault managed storage account SAS definition
description: A SAS definition is a template under a Key Vault managed storage account that specifies the type, permissions, and validity of the Shared Access Signature tokens the vault mints for the backing storage account; the resulting tokens are exposed as vault secrets.
scope: CRITICAL
notes: Controlling a SAS definition controls what delegated access tokens the vault issues for the underlying storage account's data, making it a CRITICAL credential-issuance asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - impact:manipulation
      - persistence:account
    notes: Creates or updates a SAS definition, letting an attacker mint a SAS template with attacker-chosen permissions and validity over the backing storage account, establishing a durable self-service credential and a path to the underlying storage data.
