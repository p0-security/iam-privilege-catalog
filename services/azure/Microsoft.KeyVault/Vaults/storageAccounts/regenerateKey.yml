name: Key Vault managed storage account
description: A Key Vault managed storage account is a vault object that links Key Vault to an Azure Storage account so the vault manages (and auto-regenerates) the storage account's access keys and issues SAS tokens on its behalf. The object holds the storage account resource ID, the active key name, and the auto-regeneration period.
scope: CRITICAL
notes: This is a deprecated Key Vault feature that nonetheless mediates storage-account credentials; objects here govern credential issuance for the backing storage account, making the asset credential-management-sensitive (CRITICAL).
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:access
      - impact:dos
    notes: Regenerates the backing storage account's access key, invalidating the currently active key and any SAS tokens derived from it, locking out legitimate consumers still relying on the prior credential.
