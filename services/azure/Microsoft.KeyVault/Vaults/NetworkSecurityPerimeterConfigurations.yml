name: Key Vault Network Security Perimeter configuration
description: The Network Security Perimeter configuration stored in a Key Vault, describing the NSP membership and network access rules enforced around the vault.
scope: CRITICAL
notes: Describes the network-isolation posture of a Key Vault, a critical store of keys, secrets, and certificates.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading the stored NSP configuration inventories the vault's network-perimeter rules and membership, useful reconnaissance for finding gaps in the network defense around the secret store.
