name: Azure Key Vault keys
description: A cryptographic key stored in an Azure Key Vault (software- or HSM-protected). These keys are used for encryption, decryption, signing, key wrapping, and as customer-managed encryption keys (CMK) protecting downstream services and data.
scope: CRITICAL
notes: "Key Vault keys are among the most sensitive assets in a cloud tenant: they underpin envelope encryption, disk/storage/database encryption, and code/token signing. Private key material is non-exportable via normal reads, so the headline risk varies sharply by operation (read vs. crypto-oracle vs. export)."
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:dos
    notes: Deletes a key and all its versions; loss of an active key destroys cryptographic material and renders data encrypted under it inaccessible, disrupting dependent services (soft-delete may allow recovery).
  read:
    risks:
      - discovery:data
    notes: Lists keys and reads current-version metadata/public material but never returns private key bytes, so it only enables inventory of the vault's cryptographic objects.
  write:
    risks:
      - impact:manipulation
    notes: Control-plane create-if-not-exist of a first key version; it cannot modify or overwrite existing keys, so it only introduces new attacker-controlled key material into the vault configuration.
