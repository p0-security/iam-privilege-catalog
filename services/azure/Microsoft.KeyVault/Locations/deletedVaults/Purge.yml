name: Soft-deleted Key Vault
description: A soft-deleted Key Vault resource retained during the recovery/purge window; this control-plane view exposes the deleted vault's properties and recovery metadata, not its contained secret material.
scope: CRITICAL
notes: Read-only enumeration returns vault configuration metadata only; the keys/secrets/certificates themselves are not disclosed.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:crypto
      - destruction:infra
    notes: Purges a soft-deleted vault, permanently and irrecoverably destroying the vault along with all its keys, secrets, and certificates, bypassing the soft-delete recovery window.
