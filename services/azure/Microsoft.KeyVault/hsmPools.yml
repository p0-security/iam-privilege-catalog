name: Managed HSM pool
description: An HSM pool (Managed HSM) is a dedicated, hardware-security-module-backed cluster that hosts and protects organizational cryptographic keys.
scope: CRITICAL
notes: As the backing store for keys/HSM-protected secrets, this is a tenant-critical cryptographic asset; compromise affects every workload that relies on those keys.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - destruction:infra
    notes: Deleting an HSM pool destroys the infrastructure hosting cryptographic keys, irreversibly removing both the crypto material it backs and the underlying key-management infrastructure (DoS to dependents).
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Create/update alters the configuration of the cryptographic key host and can provision a costly dedicated-HSM resource.
