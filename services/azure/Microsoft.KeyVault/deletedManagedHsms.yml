name: Soft-deleted Managed HSM
description: A soft-deleted Managed HSM is a deleted HSM instance retained during the soft-delete recovery window, exposing the deleted resource's properties/metadata.
scope: MEDIUM
notes: Reading exposes only deleted-instance configuration metadata, not protected key material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Viewing properties of a soft-deleted HSM only inventories the deleted resource's configuration, infrastructure reconnaissance.
