name: Managed HSM pool
description: An HSM pool (Managed HSM) is a dedicated, hardware-security-module-backed cluster that hosts and protects organizational cryptographic keys.
scope: CRITICAL
notes: As the backing store for keys/HSM-protected secrets, this is a tenant-critical cryptographic asset; compromise affects every workload that relies on those keys.
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Joining a key vault to an HSM pool alters the cryptographic backing/trust topology of the vault, a control-plane manipulation of how vault keys are provisioned.
