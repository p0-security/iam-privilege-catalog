name: Key Vault
description: An Azure Key Vault is a managed secrets store holding cryptographic keys, secrets, and certificates and their access/network configuration.
scope: CRITICAL
notes: "Key Vaults are CRITICAL-tier assets: they centralize credentials and cryptographic material relied on across many organizational functions."
links:
  - https://azure.permissions.cloud/iam/Microsoft.KeyVault
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:dos
    notes: Deleting a key vault destroys the keys, secrets, and certificates it contains (cryptographic destruction) and removes a service that dependent production workloads rely on (denial of service).
  write:
    risks:
      - escalation:privilege
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating a vault lets an attacker rewrite access policies (or switch to RBAC) to grant themselves data-plane access to keys and secrets (escalation), relax network ACLs/firewall and protection settings (defense destruction), and alter operational configuration (manipulation).
