name: Domain Service outbound network dependency endpoints
description: A read-only listing of the network endpoints (FQDNs/IPs/ports) that a Microsoft Entra Domain Services managed domain requires for its outbound dependencies.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.AAD
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Returns the outbound dependency endpoints of the managed domain, inventorying network topology and required connectivity as reconnaissance.
