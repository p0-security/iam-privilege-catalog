name: Domain Services diagnostic log definitions
description: Returns the available diagnostic log categories/definitions for an Azure AD Domain Services managed domain (metadata about what logging exists).
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.AAD
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Lists which diagnostic log categories exist for the domain service, low-value logging-coverage reconnaissance without access to log content.
