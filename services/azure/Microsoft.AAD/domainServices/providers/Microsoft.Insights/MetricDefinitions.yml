name: Domain Service metric definitions
description: A read-only listing of the Azure Monitor metric definitions (the catalog of metric types/schema) available for a Microsoft Entra Domain Services resource.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.AAD
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
