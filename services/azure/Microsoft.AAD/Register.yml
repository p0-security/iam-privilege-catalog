name: Domain Services resource provider registration
description: Subscription-level registration/unregistration actions for the Microsoft.AAD (Azure AD Domain Services) resource provider.
scope: LOW
notes: Provider registration is an enablement gate; unregistration can tear down the managed domain service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.AAD
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Subscription registration for the Domain Services provider is an inert enablement no-op granting no attacker capability.
