name: Azure AD Domain Services managed domain
description: An Azure AD Domain Services managed domain provides managed AD domain controllers offering LDAP, Kerberos, NTLM, group policy and domain-join for an organization's directory-dependent workloads.
scope: HIGH
notes: Backs authentication and directory services for the workloads relying on it; a sensitive identity service supporting an organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.AAD
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the managed domain tears down the domain controllers, destroying directory infrastructure and denying authentication to every workload relying on LDAP/Kerberos/NTLM.
  read:
    risks:
      - discovery:infra
    notes: Reading the managed domain configuration (domain name, SKU, network/replica sets, security settings, sync scope) inventories the directory-services infrastructure without returning secret material.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Writing the managed domain config can alter security posture (e.g. enabling legacy NTLM/insecure ciphers, disabling secure LDAP/signing, changing sync), manipulating the directory service and weakening its authentication defenses.
