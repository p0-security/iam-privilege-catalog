name: Subscription change-tenant status
description: An operation-status endpoint reporting the progress/state of a subscription tenant-change (transfer) operation.
scope: LOW
notes: Returns only transfer progress/state metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Subscription
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the change-tenant status reveals only the progress/state of a subscription tenant-transfer, a low-value infrastructure reconnaissance read.
