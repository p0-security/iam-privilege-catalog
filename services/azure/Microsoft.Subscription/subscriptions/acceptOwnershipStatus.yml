name: Subscription accept-ownership status
description: An operation-status endpoint reporting the progress/state of a subscription ownership-acceptance (transfer) flow.
scope: LOW
notes: Returns only transition-state metadata about an ownership transfer.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Subscription
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the accept-ownership status reveals only the progress/state of a subscription ownership-transfer, a low-value infrastructure reconnaissance read.
