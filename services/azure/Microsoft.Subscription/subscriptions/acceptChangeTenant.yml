name: Subscription ownership acceptance
description: An action that completes an ownership/billing-transfer of an entire Azure subscription, making the accepting principal the subscription owner.
scope: CRITICAL
notes: Subscription-wide control affecting all contained resources and identities; tenant-scope sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Subscription
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
      - escalation:lateral
      - impact:access
    notes: Accepting a tenant change moves the subscription into an attacker-controlled directory (escalation:privilege) granting control over all its resources/identities (escalation:lateral), while severing the original tenant's RBAC so legitimate principals lose access (impact:access).
