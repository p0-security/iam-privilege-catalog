name: Subscription ownership acceptance
description: An action that completes an ownership/billing-transfer of an entire Azure subscription, making the accepting principal the subscription owner.
scope: CRITICAL
notes: Subscription-wide control affecting all contained resources and identities; tenant-scope sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Subscription
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
      - escalation:lateral
      - impact:spend
    notes: Accepting ownership grants the attacker owner-level control over an entire subscription (escalation:privilege), lateral access to all its resources and identities (escalation:lateral), and shifts billing responsibility enabling attacker-incurred spend (impact:spend).
