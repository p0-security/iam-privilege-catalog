name: Subscription aliases
description: A subscription alias is the provisioning resource used to programmatically create or link an Azure subscription under a billing account.
scope: HIGH
notes: A tenant/billing-control surface; creating one provisions a new billable subscription and the creator typically becomes its owner.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Subscription
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a subscription alias removes the alias/provisioning resource that maps and manages the subscription, a destructive control-plane action on subscription infrastructure.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading a subscription alias enumerates the alias-to-subscription/billing provisioning configuration, providing infrastructure reconnaissance.
  write:
    risks:
      - impact:spend
      - impact:hijack
    scope: CRITICAL
    notes: Creating a subscription alias provisions a new billable subscription, letting an attacker stand up costly infrastructure/workloads under the tenant's billing (spend) and run workloads on it (hijack).
