name: Subscription change-tenant request
description: A request resource that moves a subscription (and all its resources) from one Microsoft Entra (Azure AD) tenant to another.
scope: CRITICAL
notes: "Tenant-wide control surface: transferring a subscription severs the original tenant's RBAC/governance over it."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Subscription
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:access
      - escalation:lateral
      - impact:manipulation
    notes: Initiating a change-tenant request moves the subscription out of the org's Entra tenant, severing existing RBAC/access for authorized operators (impact:access) and shifting its resources under attacker-controlled directory boundaries (escalation:lateral), altering the subscription's tenant association (impact:manipulation).
