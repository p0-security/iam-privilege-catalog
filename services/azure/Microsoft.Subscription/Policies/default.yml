name: Tenant subscription policy
description: The tenant-wide subscription policy governing who may create, transfer in/out, or leave the tenant with subscriptions.
scope: MEDIUM
notes: A tenant-scoped governance guardrail; weakening it enables tenant-wide subscription abuse.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Subscription
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading the default tenant policy discloses the tenant's subscription-governance access controls, helping an attacker identify weak points.
