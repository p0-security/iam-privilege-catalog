name: Defender data scanners
description: Microsoft Defender for Cloud Data Security Posture Management scanner configuration that drives agentless sensitive-data discovery across data stores at a given scope.
scope: MEDIUM
notes: A Defender for Cloud detection/posture control; not the scanned data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting scanners removes the sensitive-data discovery defense, disabling detection of exposed sensitive data.
  read:
    risks:
      - discovery:policy
    notes: Reading scanner configuration exposes the sensitive-data scanning posture and coverage, helping an attacker locate unmonitored data stores.
  write:
    risks:
      - destruction:defense
    notes: Creating or updating scanners lets an attacker reconfigure or disable agentless sensitive-data discovery, weakening detection of exposed data.
