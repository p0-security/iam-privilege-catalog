name: Defender for IoT settings
description: Defender for IoT settings hold the subscription/tenant-wide configuration and plan for the Microsoft Defender for IoT security service.
scope: MEDIUM
notes: Configuration of a defensive security service; reading or altering it exposes or weakens the overall IoT threat-protection posture.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the settings tears down the subscription-wide Defender for IoT configuration, disabling the threat-protection defense.
  read:
    risks:
      - discovery:infra
    notes: Reading Defender for IoT settings inventories the subscription-wide security configuration and posture, reconnaissance of the defensive deployment.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating or updating the settings lets an attacker reconfigure or weaken the subscription-wide IoT threat-protection defense.
