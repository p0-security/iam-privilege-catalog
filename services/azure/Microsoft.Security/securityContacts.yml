name: Defender for Cloud security contact
description: The security contact configuration specifying the email addresses/recipients that receive Defender for Cloud security alert notifications.
scope: MEDIUM
notes: Controls who is notified when security alerts fire.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the security contact removes the alert-notification recipient, stopping alert delivery and degrading incident response.
  write:
    risks:
      - destruction:defense
    notes: Updating the contact can disable or redirect alert notifications away from defenders, suppressing the alerting defense so intrusions go unnoticed.
