name: Resource security health statuses
description: "Defender for Cloud resource security health statuses: the per-resource security state (healthy/unhealthy/vulnerable) across Azure resources."
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading health statuses inventories which resources are unhealthy or misconfigured, enabling reconnaissance to select vulnerable targets.
