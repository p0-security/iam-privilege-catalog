name: IoT aggregated security alerts
description: Aggregated IoT security alerts are the detection findings produced by the IoT security solution, grouping detected suspicious or malicious device activity. They represent security telemetry/log output.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:defense
    notes: Dismissing aggregated alerts suppresses detection findings about attacker activity, aiding defense evasion and disrupting incident response.
