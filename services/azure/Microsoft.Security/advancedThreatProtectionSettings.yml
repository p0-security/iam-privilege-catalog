name: Advanced Threat Protection settings
description: Advanced Threat Protection settings are the per-resource toggle controlling whether Microsoft Defender threat detection/alerting is enabled on a resource (e.g. SQL, Storage).
scope: MEDIUM
notes: A resource-scoped defensive monitoring control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading ATP settings reveals whether threat protection is enabled on a resource, letting an attacker identify monitored versus blind targets before acting.
  write:
    risks:
      - destruction:defense
    notes: Updating ATP settings lets an attacker disable threat protection/detection on a resource, removing a defensive monitoring mechanism to evade detection.
