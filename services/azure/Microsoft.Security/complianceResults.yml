name: Defender for Cloud compliance results
description: Per-resource compliance/security assessment results indicating which security controls a resource passes or fails.
scope: LOW
notes: Read-only posture data exposing misconfigurations.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading compliance results reveals which resources fail security controls, giving an attacker a map of misconfigurations and weak points to target.
