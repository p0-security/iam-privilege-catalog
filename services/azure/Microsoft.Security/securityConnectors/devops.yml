name: Defender for Cloud DevOps configuration
description: A DevOps configuration (securityConnectors/devops) is the connector resource that links Defender for Cloud to a DevOps platform (Azure DevOps, GitHub, GitLab) via a user token, controlling source-code security scanning; its listAvailable actions enumerate orgs/owners/groups reachable by that token.
scope: MEDIUM
notes: "Sensitivity is moderate: the listAvailable actions can enumerate the source-code hosting estate (orgs/owners/groups) reachable through the connector's stored token."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the DevOps connector removes Defender for Cloud security scanning of the connected DevOps environment, disabling that defense mechanism.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating the DevOps configuration lets an attacker reconfigure or disable Defender for Cloud DevOps security scanning, weakening code-security monitoring while tampering with operational config.
