name: Defender for DevOps monitored GitLab group
description: A Microsoft Defender for Cloud security-connector resource representing a GitLab group onboarded to DevOps security posture monitoring.
scope: LOW
notes: Control-plane onboarding metadata identifying which GitLab groups are connected; read-only inventory of connector configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns a monitored GitLab group resource, enabling inventory of which GitLab groups are onboarded to the connector.
