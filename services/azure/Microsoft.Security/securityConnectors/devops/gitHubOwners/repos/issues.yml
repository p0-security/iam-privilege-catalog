name: Defender for DevOps monitored GitHub repository
description: A Microsoft Defender for Cloud security-connector resource representing a GitHub repository onboarded to DevOps security posture monitoring, including the ability to file issues into the connected repository for assessments.
scope: MEDIUM
notes: The issue-creation action writes attacker-controllable content into the customer's external GitHub repository via the connector.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Creates a GitHub issue in the connected repository, letting an attacker inject content/noise into the organization's repo issue tracker.
