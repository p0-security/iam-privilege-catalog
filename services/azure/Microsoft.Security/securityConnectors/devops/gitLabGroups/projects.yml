name: Defender for DevOps monitored GitLab project
description: A Microsoft Defender for Cloud security-connector resource representing a GitLab project onboarded to DevOps security posture monitoring. It is the connector's tracking/configuration object, not the project's source code.
scope: LOW
notes: Control-plane onboarding metadata; read-only inventory of which projects are monitored, not code contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns a monitored GitLab project connector resource, enabling inventory of which projects are onboarded to security monitoring.
