name: Defender for Cloud monitored Azure DevOps project
description: A monitored Azure DevOps project is a grandchild resource of a DevOps security connector representing an Azure DevOps project onboarded into Defender for Cloud DevOps security scanning, holding its per-project monitoring configuration.
scope: MEDIUM
notes: "Sensitivity is moderate: these resources control per-project DevOps security-posture coverage and reveal which code projects are monitored."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating the monitored project config lets an attacker change which projects are scanned or disable per-project monitoring, weakening DevOps defense coverage while tampering with config.
