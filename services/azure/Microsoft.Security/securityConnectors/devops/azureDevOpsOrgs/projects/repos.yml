name: Defender for DevOps monitored Azure DevOps repository
description: A Microsoft Defender for Cloud security-connector resource representing an Azure DevOps repository onboarded to DevOps security posture monitoring. It is the connector's tracking/configuration object, not the repository's source code.
scope: MEDIUM
notes: Control-plane security-posture configuration for DevOps onboarding; manipulating it affects monitoring scope but does not expose source code or grant code-plane access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates the monitored-repo connector object, letting an attacker alter which repositories are tracked for security scanning (monitoring-config manipulation).
