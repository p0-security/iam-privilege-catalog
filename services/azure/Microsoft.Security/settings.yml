name: Defender for Cloud settings
description: Scope-level Microsoft Defender for Cloud settings, including integration toggles such as Microsoft Defender for Cloud Apps (MCAS) and WDATP/Defender for Endpoint data sharing.
scope: MEDIUM
notes: These toggles govern which detection integrations and data feeds are active; disabling them reduces detection coverage rather than touching production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Turning off integration settings (e.g. MCAS/WDATP data sharing) severs detection data feeds, degrading threat coverage and altering the effective security configuration.
