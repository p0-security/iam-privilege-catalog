name: Secure Score
description: Microsoft Defender for Cloud Secure Score is the calculated aggregate security-posture metric for a subscription, reflecting how well security recommendations are satisfied.
scope: LOW
notes: Reveals where the environment is under-protected, guiding an attacker toward weak points.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading the calculated secure score discloses the subscription's aggregate security posture and weaknesses, aiding reconnaissance of poorly defended areas.
