name: Security governance rules
description: Governance rules that automate how Defender for Cloud security-posture findings are assigned, prioritized, and escalated for remediation.
scope: MEDIUM
notes: Security-posture management configuration; reveals the org's defensive remediation logic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating governance rules lets an attacker rewrite remediation enforcement (exemptions, grace periods), manipulating and weakening the defensive posture-management process.
