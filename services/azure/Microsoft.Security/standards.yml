name: Defender for Cloud security standards
description: Microsoft Defender for Cloud security standards, which define sets of security/compliance assessments and controls evaluated against resources at a scope.
scope: MEDIUM
notes: CSPM compliance baselines; control the detection of misconfigurations rather than access control or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a security standard removes a defined set of security/compliance controls, eliminating that defensive assessment mechanism.
  read:
    risks:
      - discovery:policy
    notes: Reading security standards enumerates the defined security/compliance control sets, exposing which controls are assessed and where coverage gaps exist.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating a security standard lets an attacker redefine or hollow out the control set evaluated by Defender, weakening detection coverage and tampering with the security baseline.
