name: Defender for Cloud data location
description: Returns the home region/location where Defender for Cloud stores the scope's security data.
scope: LOW
notes: Non-sensitive deployment-location metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Returns only the security-data home region, a benign low-sensitivity metadata read.
