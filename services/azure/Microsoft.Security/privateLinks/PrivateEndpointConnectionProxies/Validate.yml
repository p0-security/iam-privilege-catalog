name: Microsoft Security private endpoint connection proxy
description: An internal private-endpoint connection proxy object that binds a private endpoint to the Microsoft Security (Defender for Cloud / Sentinel) service over Azure Private Link. Marked NRP-only (network resource provider plumbing).
scope: LOW
notes: Supporting connectivity plumbing for the security service; touches network-path configuration, not data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Pre-flight validation of a proposed proxy object before creation persists no state and returns no sensitive data, granting no meaningful capability in isolation.
