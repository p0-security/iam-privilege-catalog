name: Security statuses summaries
description: Aggregated Microsoft Defender for Cloud security posture/status summaries for a scope, reporting the security and compliance state of resources.
scope: LOW
notes: Read-only aggregate posture data; reveals security state but contains no secrets or production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the posture summary lets an attacker inventory which resources are misconfigured or insecure as reconnaissance for targeting.
