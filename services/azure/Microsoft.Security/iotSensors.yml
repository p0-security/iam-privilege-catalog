name: Defender for IoT sensors
description: Defender for IoT network monitoring sensors are appliances that passively monitor OT/IoT network traffic for threats and feed detections into Microsoft Defender for IoT.
scope: MEDIUM
notes: These are defensive security-monitoring components; tampering with them affects threat-detection coverage rather than primary production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a sensor removes a threat-detection component, blinding monitoring of the OT/IoT network.
  read:
    risks:
      - discovery:infra
    notes: Read/get of sensor configuration lets an attacker inventory the deployed defensive sensors and their settings, reconnaissance of the security monitoring infrastructure.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating or updating a sensor lets an attacker alter the configuration of a threat-detection component, weakening or misconfiguring the OT/IoT monitoring defense.
