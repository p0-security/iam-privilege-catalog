name: Defender for Cloud security operators
description: SecurityOperators are managed-identity bindings that enable Microsoft Defender for Cloud security plans (e.g. CSPM/agentless scanning) at a scope by associating a security operator identity with the requisite RBAC roles.
scope: HIGH
notes: The operator is a privileged security-plane identity, so creating/deleting it affects both privilege posture and defensive coverage.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the security operator removes the identity that drives a Defender for Cloud security plan, disabling that defense mechanism's coverage at the scope.
  read:
    risks:
      - discovery:policy
    scope: MEDIUM
    notes: Reading the security operators enumerates which managed identities/RBAC bindings enable Defender for Cloud at the scope, exposing access-control posture of the security tooling.
  write:
    risks:
      - escalation:lateral
      - escalation:privilege
      - destruction:defense
    notes: Creating/updating a security operator provisions and binds a managed identity with security-plane RBAC at the scope, granting an attacker a privileged identity to act through (lateral/privilege) and the ability to repoint or weaken Defender enforcement.
