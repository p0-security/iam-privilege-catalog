name: Custom security recommendations
description: Customer-defined Microsoft Defender for Cloud recommendations that evaluate resources against organization-specific security checks and surface findings for the scope.
scope: MEDIUM
notes: These are custom detection checks; removing or altering them reduces detection coverage rather than affecting production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Editing a custom recommendation can loosen its logic so the attacker's misconfiguration no longer triggers a finding, manipulating what the posture surface reports.
  delete:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Deleting a custom recommendation removes an organization-defined detection check entirely, eliminating coverage for the condition it monitored.
