name: Defender for Endpoint onboarding
description: The Microsoft Defender for Endpoint (MDE) onboarding script/package for the tenant, which embeds a tenant-specific onboarding key used to enroll machines into the organization's Defender tenant.
scope: MEDIUM
notes: The onboarding package contains sensitive provisioning material (an embedded onboarding secret/blob), not merely read-only posture metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:crypto
      - discovery:infra
    notes: Returns the MDE onboarding script containing the tenant onboarding key/blob, exfiltrating sensitive defense-provisioning material and also revealing EDR deployment configuration.
