name: Adaptive Network Hardening
description: Adaptive Network Hardening is a Defender for Cloud feature that learns traffic patterns to a protected resource and recommends Network Security Group (NSG) rules to restrict exposure.
scope: HIGH
notes: Reading recommendations exposes network exposure and the defensive NSG posture of protected resources; enforcement writes real NSG rules on production networks.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
      - destruction:defense
      - impact:dos
    notes: Enforcing arbitrary traffic hardening rules creates/modifies security rules directly on target production NSGs, letting an attacker rewrite the network firewall to block legitimate traffic (DoS) or alter network defenses.
