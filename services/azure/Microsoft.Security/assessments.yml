name: Security assessments
description: Security Assessments are Microsoft Defender for Cloud findings that report the health/compliance state of resources against security recommendations across a subscription.
scope: MEDIUM
notes: Findings enumerate misconfigurations and vulnerable resources; write access lets an attacker forge healthy states to mask compromise.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating or updating assessment results lets an attacker inject false 'healthy' findings or suppress real ones, manipulating posture telemetry to hide activity from Defender for Cloud.
