name: Defender for Cloud web application firewalls
description: A Defender for Cloud web application firewalls resource is the control-plane inventory record of WAFs tracked by Microsoft Defender for Cloud, representing the web-application-layer defenses protecting front-end services.
scope: MEDIUM
notes: Represents supporting security infrastructure; reflects the WAF protection posture rather than the underlying WAF policy engine.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a web application firewall removes a web-application-layer defensive control, exposing the protected service to attack traffic.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating or updating a WAF record lets an attacker alter or weaken the represented web-application firewall defense, manipulating the protective posture guarding web-facing services.
