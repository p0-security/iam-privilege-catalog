name: Defender for Cloud security solutions
description: Defender for Cloud security solutions are registrations/integrations of deployed security products (e.g. partner solutions, agents) that protect resources in the environment.
scope: MEDIUM
notes: Inventory of these reveals the defensive tooling footprint.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a security solution removes a registered defensive tool/integration, disabling a defense mechanism and disrupting detection.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating a security solution lets an attacker alter or misconfigure deployed defensive tooling integration, weakening protection and monitoring.
