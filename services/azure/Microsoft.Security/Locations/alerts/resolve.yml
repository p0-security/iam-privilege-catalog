name: Security alerts
description: Microsoft Defender for Cloud security alerts — the detection findings raised against resources in the environment.
scope: MEDIUM
notes: Alert contents reveal what defenders have detected and the lifecycle/state of those detections.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:defense
    notes: Resolving (closing out) a security alert clears an active detection so responders stop investigating, undermining incident response (defense evasion).
