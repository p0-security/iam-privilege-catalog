name: Just-in-time network access policies
description: Microsoft Defender for Cloud just-in-time (JIT) network access policies — controls that keep VM management ports (e.g. RDP/SSH) locked down and gate temporary inbound access by port, source, and duration.
scope: HIGH
notes: These policies are a network defense / access-control mechanism guarding inbound reach to production VMs.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Initiating a JIT request opens the gated management ports (e.g. RDP/SSH) on protected VMs for a chosen source, granting on-demand network reach to otherwise locked-down hosts.
