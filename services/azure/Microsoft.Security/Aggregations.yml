name: Microsoft Defender for Cloud subscription registration
description: Provider-level enablement actions that register or unregister a subscription with Microsoft Defender for Cloud (Azure Security Center), the cloud security posture management and threat-protection service.
scope: LOW
notes: These toggle the security product on/off for the whole subscription scope.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:infra
    notes: Returns summarized security posture data, enabling read-only reconnaissance of the environment's security state and weak points.
  read:
    risks:
      - discovery:infra
    notes: Reading aggregations returns summarized security/posture statistics, providing read-only reconnaissance of the environment's security state.
    name: Defender security aggregations
    parent:
      description: Aggregated/summary Microsoft Defender for Cloud security posture statistics for resources in scope.
      notes: Read-only summary data; no secret material exposed.
