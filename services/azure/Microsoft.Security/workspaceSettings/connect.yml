name: Defender for Cloud workspace settings
description: Configuration that determines which Log Analytics workspace Defender for Cloud routes its security telemetry and agent data to.
scope: MEDIUM
notes: Controls the destination of security monitoring/log collection.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Reconnecting VMs from system workspaces re-routes where machines send security telemetry, allowing disruption of agent-to-workspace log flow and degradation of monitoring.
