name: Security assessment metadata
description: Assessment Metadata defines the catalog of security-assessment definitions/types (id, display name, severity, category, description) that drive Defender for Cloud evaluations.
scope: MEDIUM
notes: This is schema/definition-level metadata of the assessment framework, not actual findings or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating or updating custom assessment metadata lets an attacker alter the definitions (severity, logic) that drive security evaluations, distorting or weakening the detection framework.
