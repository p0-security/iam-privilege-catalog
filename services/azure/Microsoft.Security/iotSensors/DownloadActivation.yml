name: Defender for IoT sensors
description: Defender for IoT network monitoring sensors are appliances that passively monitor OT/IoT network traffic for threats and feed detections into Microsoft Defender for IoT.
scope: MEDIUM
notes: These are defensive security-monitoring components; tampering with them affects threat-detection coverage rather than primary production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Security
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
    notes: Downloads the sensor activation/license file, returning credential-like onboarding material that authorizes a sensor; exporting it is exfiltration of secret material.
