name: Azure Monitor activity log alerts
description: Activity Log Alerts are Azure Monitor rules that fire notifications when matching control-plane (Activity Log) events occur, such as resource changes, service health events, or administrative operations.
scope: LOW
notes: These are detective/alerting controls. They contain no organizational data themselves; their value to an attacker is in suppressing or learning detection coverage. Monitoring asset = MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Action:
    risks: []
    notes: This is the platform-internal event marker emitted when an activity log alert fires; it is not a caller-invokable operation and grants no attacker capability in isolation.
