name: Data collection endpoint NSP association proxy
description: A proxy resource that binds an Azure Monitor data collection endpoint to a Network Security Perimeter, expressing the endpoint's perimeter membership and access mode for network isolation of monitoring ingestion.
scope: MEDIUM
notes: Controls the network-isolation defense boundary around a monitoring ingestion endpoint; the asset is supporting monitoring infrastructure configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:defense
    notes: Deleting the NSP association detaches the data collection endpoint from its network security perimeter, tearing down the network-isolation defense boundary that otherwise restricts access to the endpoint.
  Read:
    risks:
      - discovery:network
    notes: Reading the NSP association proxy enumerates which network security perimeter the data collection endpoint is bound to, revealing the network-isolation boundary configuration for reconnaissance.
  Write:
    risks:
      - destruction:defense
      - escalation:network
    notes: Creating or updating the NSP association can re-bind the endpoint to a different perimeter or weaken the access/enforcement mode, degrading the network-isolation defense and potentially re-exposing the endpoint to broader network reach.
