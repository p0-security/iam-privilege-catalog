name: Application Insights Topology
description: The Application Insights application map / topology describing monitored service components and their inter-service dependencies.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:infra
      - discovery:network
    notes: Reading the topology inventories the application's components and their dependency/network relationships, useful for reconnaissance of how monitored services are wired together.
