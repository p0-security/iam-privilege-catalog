name: Resource diagnostic settings
description: Resource diagnostic settings control which platform logs and metrics a resource emits and where they are routed (Log Analytics, Storage, Event Hub).
scope: MEDIUM
notes: These govern the telemetry pipeline that detection and incident response depend on. Tampering blinds defenders. Monitoring/diagnostics asset = MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting a diagnostic setting halts forwarding of that resource's logs and metrics to its sinks, destroying log collection and removing a detection mechanism, disrupting incident response.
  Read:
    risks:
      - discovery:logs
    scope: LOW
    notes: Reading a diagnostic setting reveals which log/metric categories are collected and their destinations, exposing logging coverage and blind spots to inform evasion. No log content is disclosed.
  Write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating or updating a diagnostic setting lets an attacker disable, narrow, or redirect a resource's log/metric collection (turn off categories or point logs to a sink they control), suppressing telemetry and the defenses that depend on it.
