name: Application Insights component metrics
description: The metrics resource returns the actual aggregated Azure Monitor metric values (request rates, failure counts, durations, usage) for the Application Insights component.
scope: MEDIUM
notes: Aggregated operational telemetry useful for reconnaissance of the monitored application's behavior; does not return raw log records or stored application data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:infra
    notes: Reading metric values returns aggregated operational telemetry revealing the monitored application's activity and usage patterns, infrastructure reconnaissance rather than log content.
