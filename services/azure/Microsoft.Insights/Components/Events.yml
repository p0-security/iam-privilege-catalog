name: Application Insights events (telemetry)
description: The Events data-plane endpoint returns stored Application Insights telemetry records (requests, dependencies, exceptions, traces, custom events) via OData query.
scope: MEDIUM
notes: "Telemetry routinely contains sensitive data: request URLs/parameters, user identifiers, exception details, and sometimes PII or tokens. isDataAction read."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - exfiltration:data
    notes: Data-plane read that exports raw telemetry/log records which frequently contain sensitive request and user data, enabling log and data exfiltration.
