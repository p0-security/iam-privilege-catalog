name: Application Insights favorites
description: An Application Insights favorite is a saved query/dashboard view (UI shortcut) stored on the component.
scope: LOW
notes: Operational UI convenience metadata with negligible security sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:metadata
    notes: Deleting a favorite removes a saved query/view, destroying operational UI metadata with negligible impact on telemetry.
  Read:
    risks:
      - discovery:metadata
    notes: Reading a favorite only exposes saved query/dashboard view metadata, low-sensitivity reconnaissance.
  Write:
    risks:
      - impact:manipulation
    notes: Writing a favorite alters saved query/dashboard metadata, a minor manipulation of operational UI configuration.
