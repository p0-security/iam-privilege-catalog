name: Application Insights component token
description: GetToken returns a read access token (bearer credential) scoped to the Application Insights component's telemetry data plane.
scope: CRITICAL
notes: The returned token is reusable credential material granting query access to the component's telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns a usable access token for the component, exporting credential material an attacker can replay to read the telemetry data plane as that identity.
