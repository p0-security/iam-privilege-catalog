name: Application Insights current billing features
description: The current billing features of an Application Insights component, including the daily data ingestion cap and pricing-feature configuration.
scope: LOW
notes: Exposes cost/quota configuration (data caps, pricing features); low-sensitivity financial metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:finance
    notes: Reads current billing features (data cap, pricing tier), revealing the component's financial/quota configuration.
  Write:
    risks:
      - impact:spend
      - impact:manipulation
    scope: MEDIUM
    notes: Raising/removing the daily data cap or changing the pricing plan inflates metered ingestion spend; lowering the cap throttles/drops telemetry, altering operational monitoring throttling configuration.
