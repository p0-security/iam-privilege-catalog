name: Application Insights component quota status
description: The quota status of an Application Insights component reports its current ingestion quota consumption and throttling/cap state.
scope: LOW
notes: Low-sensitivity operational status of a monitoring resource.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:infra
    notes: Reading quota status only enumerates the component's current ingestion/cap consumption state, low-sensitivity infrastructure reconnaissance.
