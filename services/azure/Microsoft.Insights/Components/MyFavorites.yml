name: Application Insights personal favorites
description: User-specific saved favorites (bookmarked queries, views, and dashboards) within an Application Insights component, a UI personalization artifact.
scope: LOW
notes: Carries no organizational data, secrets, or access-control information; at most reveals the names of views a user finds useful.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:metadata
    notes: Reading a user's saved favorites only enumerates non-sensitive saved-view metadata, a trivial reconnaissance signal.
