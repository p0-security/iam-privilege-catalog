name: Application Insights webtest locations
description: The static list of Azure geographic locations from which Application Insights webtests (synthetic availability monitors) can be run.
scope: LOW
notes: Essentially static, non-sensitive provider reference data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:infra
    notes: Returns only the static set of available test-runner regions, near-inert infrastructure reconnaissance.
