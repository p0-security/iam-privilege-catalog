name: Application Insights linked storage account
description: The configuration binding an Application Insights component to a storage account used to hold detailed Profiler and Snapshot Debugger telemetry/diagnostic captures.
scope: MEDIUM
notes: Monitoring/diagnostics supporting-infrastructure tier; the binding governs where sensitive diagnostic captures are stored but is not itself a primary data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Write:
    risks:
      - impact:manipulation
    notes: Creating or modifying the linked storage binding repoints where Profiler/Snapshot diagnostic data is written, letting an attacker tamper with or redirect the monitoring artifact destination for a single component.
