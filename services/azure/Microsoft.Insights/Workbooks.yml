name: Azure Monitor workbooks
description: "Azure Monitor workbooks: saved interactive documents combining KQL queries, parameters, and visualizations used for operational monitoring and reporting."
scope: MEDIUM
notes: Operational dashboards/queries; tampering can mislead operators or hide indicators.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:artifact
    notes: Deletes a workbook, destroying a saved monitoring/visualization artifact (queries and dashboards) used operationally.
  Read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reads a workbook definition, exposing embedded KQL queries and monitored resource references that reveal infrastructure layout and monitoring posture.
  Write:
    risks:
      - impact:manipulation
    notes: Creating/updating a workbook lets an attacker alter saved monitoring queries and visualizations, manipulating operational dashboards (e.g. to hide malicious activity).
