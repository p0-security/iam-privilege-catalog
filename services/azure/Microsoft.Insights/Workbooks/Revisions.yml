name: Workbooks
description: Azure Monitor workbooks and their saved revisions — monitoring dashboards/reports containing visualizations and embedded queries.
scope: LOW
notes: Workbook content can reveal monitored resources and query logic but is low-sensitivity, read-only configuration metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:infra
    notes: Reading prior workbook revisions exposes saved queries and visualization definitions that inventory how the environment is monitored and which resources are referenced.
