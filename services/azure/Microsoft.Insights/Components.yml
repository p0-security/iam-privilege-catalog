name: Application Insights components
description: An Application Insights component is the Azure Monitor resource that ingests, stores, and retains application telemetry (requests, traces, exceptions, dependencies, metrics).
scope: MEDIUM
notes: Monitoring/diagnostics asset whose data underpins detection and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:logs
      - destruction:infra
    notes: Deleting the component tears down the monitoring resource and its retained telemetry, removing logs (evasion) and destroying diagnostic infrastructure.
  Read:
    risks:
      - discovery:infra
    notes: Reading component configuration enumerates the monitoring resource's settings; the returned instrumentation key is a write-only ingestion identifier, not a data-read credential, so this is reconnaissance only.
  Write:
    risks:
      - impact:manipulation
      - destruction:logs
    notes: Writing component configuration lets an attacker alter sampling, retention, and the daily ingestion cap to suppress or disable telemetry collection, manipulating monitoring config and blinding detection.
