name: Azure Monitor pricing-model migration state
description: Subscription-level Azure Monitor pricing-model migration metadata (the date/state of migration between monitoring billing models).
scope: MEDIUM
notes: Billing/pricing-model configuration metadata for the monitoring service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Action:
    risks:
      - impact:dos
      - destruction:defense
    notes: Unregistering the Microsoft.Insights provider can disable Azure Monitor functionality subscription-wide, disrupting monitoring/alerting (DoS) and tearing down telemetry-based detection (defense destruction).
