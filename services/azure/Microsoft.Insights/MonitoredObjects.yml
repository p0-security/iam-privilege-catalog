name: Azure Monitor monitored object
description: A monitored object is an Azure Monitor association resource that scopes data collection rules to a set of targeted entities (e.g. AAD-scoped objects/machines), driving which resources feed telemetry into Azure Monitor.
scope: MEDIUM
notes: Controls which entities are monitored; tampering can curtail log/telemetry collection. Supporting monitoring infrastructure configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting a monitored object removes the association that drives telemetry/log collection for the targeted scope, halting log gathering and weakening monitoring-based detection and incident response.
  Read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading a monitored object enumerates the targeting scope and data-collection-rule associations, revealing the monitoring topology as reconnaissance.
  Write:
    risks:
      - impact:manipulation
      - destruction:logs
    notes: Creating or updating a monitored object changes which entities are associated with data collection rules, letting an attacker manipulate the monitoring scope and curtail or redirect telemetry/log collection.
