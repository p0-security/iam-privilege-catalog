name: Tenant action group
description: A tenant-scoped Azure Monitor action group defining notification and automation targets (email/SMS/webhook/runbook/etc.) that Azure Monitor alert rules fire into across the tenant.
scope: MEDIUM
notes: Action groups are the alert-delivery layer of Azure Monitor; tampering with them affects whether and how operational and security alerts reach responders tenant-wide.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:defense
    notes: Deleting a tenant action group removes the notification/automation target that alert rules fire into, silencing tenant-wide alert delivery and disrupting incident detection and response.
  Read:
    risks:
      - discovery:infra
    notes: Reading a tenant action group inventories the alert notification/automation configuration (receivers, webhook URLs, runbook targets), providing reconnaissance of the tenant's monitoring/alerting posture without returning secret material.
  Write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating or updating a tenant action group lets an attacker alter alert notification/automation routing (redirect, suppress, or repoint receivers and webhooks/runbooks), manipulating monitoring configuration and degrading the tenant-wide alerting/incident-response defense.
