name: Log Analytics ProtectionStatus table
description: A Log Analytics workspace table holding endpoint antimalware/protection status for monitored hosts.
scope: MEDIUM
notes: Reveals defensive posture and which hosts lack protection; useful for evasion and target selection.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reads protection-status records, exporting log data and disclosing which hosts are unprotected or weakly defended, mapping exploitable weak points.
