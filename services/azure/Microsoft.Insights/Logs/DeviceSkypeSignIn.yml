name: Log Analytics DeviceSkypeSignIn table
description: A Log Analytics table (DeviceSkypeSignIn) in an Azure Monitor workspace that stores collected Skype/Teams device sign-in event telemetry log records.
scope: MEDIUM
notes: "Monitoring/diagnostics data: confidential operational telemetry, not core production data, hence MEDIUM scope."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Data-plane read returns sign-in event rows that expose user account/identity and authentication activity, enabling both log export and account enumeration for targeting.
