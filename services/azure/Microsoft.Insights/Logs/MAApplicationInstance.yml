name: Log Analytics MAApplicationInstance table (Azure Migrate)
description: "A Log Analytics (Azure Monitor) table holding Azure Migrate per-instance application telemetry: deployed application instances and their host mappings."
scope: MEDIUM
notes: Monitoring/assessment data plane; enumerates application deployments and hosts.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns per-instance application records, exporting log data (exfiltration:logs) and enumerating application instances and their hosts (discovery:infra).
