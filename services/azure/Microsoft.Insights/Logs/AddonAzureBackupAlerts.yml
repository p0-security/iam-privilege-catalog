name: Azure Monitor Log Analytics table (Azure Backup alerts)
description: A Log Analytics table holding Azure Backup alert records. This data-plane read returns backup-operations monitoring telemetry describing alert/health events for the backup environment.
scope: MEDIUM
notes: Backup telemetry reveals recovery posture and protection coverage, useful reconnaissance for an attacker planning to defeat backups before destruction.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports backup alert telemetry and reveals backup infrastructure health and protection posture.
