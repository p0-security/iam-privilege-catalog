name: Log Analytics SharePointOnlineAssessmentRecommendation table
description: A Log Analytics workspace table holding SharePoint Online configuration/health assessment recommendation findings.
scope: MEDIUM
notes: Findings disclose configuration weaknesses and posture gaps.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports assessment recommendation content (exfiltration:logs) and surfaces misconfigurations an attacker could exploit (discovery:logs).
