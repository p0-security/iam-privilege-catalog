name: Log Analytics DHLogonMetrics table
description: A Log Analytics workspace data-plane table holding ingested Desktop Analytics device-health logon-metrics telemetry (user/device sign-in activity).
scope: MEDIUM
notes: Monitoring/diagnostic data, not a primary production data store; sensitivity is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
