name: Log Analytics FunctionAppLogs table
description: A Log Analytics workspace table holding ingested Azure Functions application/execution log records. Reading it is a data-plane operation that returns the stored log rows.
scope: MEDIUM
notes: Application runtime logs that frequently contain stack traces, parameters, and occasionally secrets inadvertently logged to output.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Returns Function app execution logs that can leak application behavior, parameters, and sensitive values printed to log output.
