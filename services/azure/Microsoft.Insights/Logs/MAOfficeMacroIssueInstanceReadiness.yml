name: Log Analytics MAOfficeMacroIssueInstanceReadiness table
description: A Log Analytics / Azure Monitor table holding Microsoft Managed Desktop / Desktop Analytics telemetry. The MAOfficeMacroIssueInstanceReadiness table records per-instance Office macro-issue readiness state across managed devices.
scope: MEDIUM
notes: Monitoring/diagnostics data tier. Per-instance readiness reveals which devices have unresolved macro issues.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns per-instance macro-issue readiness rows, exporting log content and inventorying device-level macro remediation state.
