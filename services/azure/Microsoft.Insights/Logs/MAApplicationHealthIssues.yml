name: Log Analytics MAApplicationHealthIssues table (Azure Migrate)
description: "A Log Analytics (Azure Monitor) table holding Azure Migrate application health-issue telemetry: detected application faults, weaknesses, and misconfigurations."
scope: MEDIUM
notes: Monitoring/assessment data plane; surfaces application weaknesses useful for attack planning.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns application health-issue records, exporting log data (exfiltration:logs) and revealing application weaknesses and inventory (discovery:infra).
