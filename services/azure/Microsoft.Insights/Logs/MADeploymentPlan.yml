name: Log Analytics MADeploymentPlan table (Azure Migrate)
description: "A Log Analytics (Azure Monitor) table holding Azure Migrate deployment-plan telemetry: planned migration/deployment topology, dependencies, and target infrastructure layout."
scope: MEDIUM
notes: Monitoring/assessment data plane; deployment plans reveal intended infrastructure topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns deployment-plan records, exporting log data (exfiltration:logs) and disclosing planned infrastructure topology and dependencies (discovery:infra).
