name: App Service console logs table
description: A Log Analytics / Azure Monitor table holding App Service console (stdout/stderr) output emitted by hosted apps. This is a monitoring/diagnostics data-plane asset.
scope: MEDIUM
notes: Console output frequently leaks secrets, tokens, connection strings, and stack traces printed at runtime.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Read of the AppServiceConsoleLogs table exports application console output, which may contain secrets or sensitive runtime data.
