name: Log Analytics table data (Azure Data Share logs)
description: A Log Analytics workspace table (MicrosoftDataShareShareLog) holding Azure Data Share share-management/operation activity logs in Azure Monitor.
scope: MEDIUM
notes: Monitoring telemetry exposing share configuration, partners, and dataset identifiers; maps the org's data-sharing topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports share-operation log records (exfiltration:logs) and enumerates configured shares and sharing relationships (discovery:logs).
