name: Audit logs table
description: A Log Analytics / Azure Monitor table holding directory/identity audit log records (Entra ID / Azure AD administrative and configuration-change events). This is a monitoring/diagnostics data-plane asset.
scope: MEDIUM
notes: Audit records reveal identities, privileged operations, and access-control changes of high reconnaissance value.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read of the AuditLogs table exports identity/admin audit records useful for reconnaissance of accounts and privileged operations.
