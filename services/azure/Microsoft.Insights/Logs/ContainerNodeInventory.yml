name: Log Analytics ContainerNodeInventory table
description: The ContainerNodeInventory table holds container host/node inventory log records (OS, Docker/runtime version, node configuration) ingested into a Log Analytics workspace.
scope: MEDIUM
notes: Monitoring/diagnostic inventory telemetry that describes container host infrastructure.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Reading the table exports container host/node inventory log content; the inventory aids recon but the read itself is log-data export.
