name: Log Analytics DeviceCleanup table
description: A Log Analytics table (DeviceCleanup) in an Azure Monitor workspace that stores collected device maintenance/cleanup telemetry log records.
scope: MEDIUM
notes: "Monitoring/diagnostics data: confidential operational telemetry, not core production data, hence MEDIUM scope."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns the contents of the DeviceCleanup table, allowing export of device maintenance telemetry log data.
