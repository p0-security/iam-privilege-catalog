name: Log Analytics SucceededIngestion table
description: A Log Analytics workspace table holding operational ingestion-status records indicating which data sources/tables successfully ingested data and when.
scope: MEDIUM
notes: Operational pipeline telemetry; low-sensitivity content, mainly reveals the logging pipeline's coverage.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:logs
    notes: Reading enumerates which data sources/tables are ingesting and when, providing reconnaissance of the logging pipeline's coverage rather than exposing sensitive log content (discovery:logs).
