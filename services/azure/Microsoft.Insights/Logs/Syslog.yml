name: Log Analytics Syslog table
description: A Log Analytics workspace table holding Linux/Unix syslog records (auth, sudo, sshd, daemon and application messages) from monitored hosts.
scope: MEDIUM
notes: Commonly contains authentication events, hostnames, and other sensitive operational data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports collected syslog content (exfiltration:logs) and reveals host activity and monitoring coverage (discovery:logs).
