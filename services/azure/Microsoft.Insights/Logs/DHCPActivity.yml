name: Log Analytics DHCPActivity table
description: A Log Analytics workspace table holding ingested DHCP lease/network activity log records. Reading it is a data-plane operation that returns the stored log rows.
scope: MEDIUM
notes: Network telemetry containing host IP/MAC lease assignments useful for topology reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Returns DHCP lease records revealing host-to-IP/MAC mappings and internal network topology, both exportable log content and network reconnaissance.
