name: Log Analytics MAWindowsDeploymentStatus table
description: A Log Analytics workspace table holding Monitoring/Migration Agent Windows deployment-status telemetry collected from monitored hosts.
scope: MEDIUM
notes: Monitoring/diagnostics data plane; medium sensitivity operational telemetry, not a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reads agent deployment-status records, exporting the log content and revealing an inventory of Windows hosts and their agent deployment state.
