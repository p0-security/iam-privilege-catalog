name: Log Analytics table data (M365 Apps Admin Center telemetry)
description: A Log Analytics workspace table (MAOfficeMacroGlobalHealth) holding aggregate Microsoft 365 Office macro-health telemetry in Azure Monitor.
scope: MEDIUM
notes: Monitoring/diagnostics-tier aggregate telemetry; not primary production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports the aggregated macro-health log content (exfiltration:logs) and enumerates fleet-wide macro-health activity (discovery:logs).
