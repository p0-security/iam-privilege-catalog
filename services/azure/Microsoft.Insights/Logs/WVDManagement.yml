name: Azure Log Analytics table (WVDManagement)
description: A Log Analytics workspace table accessed via the data plane; this one is the Azure Virtual Desktop WVDManagement table, which records management/control activity on host pools and hosts.
scope: MEDIUM
notes: AVD management-activity telemetry; reveals administrative operations and deployment configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Returns AVD management-operation rows, exfiltrating the log content and revealing host-pool/infrastructure configuration activity.
