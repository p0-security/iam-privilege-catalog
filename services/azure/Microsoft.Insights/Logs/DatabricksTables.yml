name: Log Analytics DatabricksTables table
description: A Log Analytics workspace table holding ingested Azure Databricks table-operation diagnostic log records. Reading it is a data-plane operation that returns the stored log rows.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry for a single analytics workload; may inventory data-table names and access events.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Returns table-operation logs, exposing data-asset names and schema/access activity within the Databricks environment.
