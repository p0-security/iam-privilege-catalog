name: Log Analytics AlertHistory table (data plane)
description: Data-plane access to the AlertHistory table in a Log Analytics workspace, holding the historical record of fired alerts.
scope: MEDIUM
notes: Historical alert records reveal detection coverage and prior incident-response activity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Reads the AlertHistory table, exporting the historical record of fired alerts so an attacker can assess detection coverage and prior incidents.
