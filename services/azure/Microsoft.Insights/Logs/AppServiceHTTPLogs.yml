name: App Service HTTP logs table
description: A Log Analytics / Azure Monitor table holding App Service HTTP access logs (request URLs, query strings, client IPs, status). This is a monitoring/diagnostics data-plane asset.
scope: MEDIUM
notes: HTTP request logs can leak tokens, credentials, or PII embedded in URLs/query strings.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Read of the AppServiceHTTPLogs table exports request logs that may contain tokens or identifiers passed in query strings.
