name: Log Analytics IntuneOperationalLogs table
description: A Log Analytics workspace table holding Microsoft Intune operational log records (device-management operational events). This is a data-plane log table within Azure Monitor Log Analytics.
scope: MEDIUM
notes: Monitoring/diagnostic data; operational events may reveal account and infrastructure detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read returns Intune operational telemetry, exporting and enumerating device-management events.
