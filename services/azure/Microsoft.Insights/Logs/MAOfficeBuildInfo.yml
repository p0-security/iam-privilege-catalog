name: Log Analytics MAOfficeBuildInfo table
description: A Log Analytics table holding Microsoft 365 Apps Office build/version telemetry collected by Azure Monitor.
scope: MEDIUM
notes: Monitoring/diagnostic data tier; rows reveal exact Office build/version inventory, useful for targeting unpatched versions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read exports Office build/version records, revealing exact build inventory that aids fingerprinting and targeting of vulnerable versions.
