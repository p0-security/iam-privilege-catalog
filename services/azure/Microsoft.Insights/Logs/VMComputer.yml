name: Azure Log Analytics table (VMComputer)
description: A Log Analytics workspace table accessed via the data plane; this one is the VM Insights / Service Map VMComputer table, which inventories monitored machines (hostname, OS, configuration).
scope: MEDIUM
notes: Compute-inventory telemetry; reveals the monitored host estate and its configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Returns machine-inventory rows, exfiltrating the log content and enumerating compute infrastructure and its configuration.
