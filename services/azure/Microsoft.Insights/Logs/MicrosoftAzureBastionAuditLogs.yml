name: Log Analytics table data (Azure Bastion audit logs)
description: A Log Analytics workspace table (MicrosoftAzureBastionAuditLogs) holding Azure Bastion remote-session audit records in Azure Monitor.
scope: MEDIUM
notes: Audit/monitoring telemetry revealing who connected to which VMs/hosts and when; useful for recon of administrative access patterns.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports Bastion session/connection audit records (exfiltration:logs) and enumerates remote-access history and admin targets (discovery:logs).
