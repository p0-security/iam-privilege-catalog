name: Azure Log Analytics table (UserAccessAnalytics)
description: A Log Analytics workspace table accessed via the data plane; this one is the Microsoft Sentinel UEBA UserAccessAnalytics table, which records user-to-resource access behavior and entitlement analytics.
scope: MEDIUM
notes: Identity/access-behavior telemetry; reading it exposes which accounts touch which resources, useful for targeting and lateral-movement planning.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Returns log rows mapping users to the resources/entitlements they access, exfiltrating the log content and inventorying accounts and their access footprint.
