name: Azure Monitor Log Analytics table (Data Factory SSIS integration runtime logs)
description: A Log Analytics table holding Azure Data Factory SSIS integration-runtime log records. This data-plane read returns operational telemetry about the SSIS runtime environment.
scope: MEDIUM
notes: SSIS runtime telemetry reveals data-integration runtime configuration and operational state for reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports SSIS integration-runtime telemetry and reveals the data-integration runtime configuration and operations.
