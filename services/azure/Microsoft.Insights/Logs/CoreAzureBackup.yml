name: Log Analytics CoreAzureBackup table
description: The CoreAzureBackup table holds Azure Backup operational log records (protected items, vaults, backup job status) ingested into a Log Analytics workspace.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry describing backup posture and activity; does not grant access to the backups themselves.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Reading the table exports Azure Backup operational log content, revealing what is backed up and on what cadence.
