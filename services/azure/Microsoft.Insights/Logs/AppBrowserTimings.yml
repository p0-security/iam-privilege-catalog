name: Application Insights AppBrowserTimings log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding client-side browser performance timing data for a monitored application.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope. May include page URLs and user-session context.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports browser page-load timing telemetry, disclosing application URLs and user-facing endpoints.
