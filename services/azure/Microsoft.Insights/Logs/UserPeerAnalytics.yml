name: Azure Log Analytics table (UserPeerAnalytics)
description: A Log Analytics workspace table accessed via the data plane; this one is the Microsoft Sentinel UEBA UserPeerAnalytics table, which clusters users into peer groups based on behavioral analytics.
scope: MEDIUM
notes: Identity-relationship telemetry; reveals organizational groupings of accounts useful for targeting.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Returns log rows clustering users into peer groups, exfiltrating the log content and enumerating accounts and their relationships for reconnaissance.
