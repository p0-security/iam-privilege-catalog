name: Log Analytics UAUpgradedComputer table
description: A Log Analytics (Azure Monitor) workspace table holding Update Management telemetry about computers that have been upgraded/assessed. It is monitoring/diagnostic log data.
scope: MEDIUM
notes: Update-assessment telemetry can inventory hosts and their patch/upgrade state, aiding target selection, but is monitoring data rather than a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports stored update-assessment log rows for upgraded machines.
