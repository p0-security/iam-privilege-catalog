name: Application Insights AppPlatformLogsforSpring log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding Azure Spring Apps application log output.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope. Application logs commonly contain runtime output, request details, and occasionally secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports Spring Apps application logs that may contain sensitive runtime output and secrets.
