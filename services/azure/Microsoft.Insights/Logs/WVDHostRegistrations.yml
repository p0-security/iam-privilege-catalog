name: Azure Log Analytics table (WVDHostRegistrations)
description: A Log Analytics workspace table accessed via the data plane; this one is the Azure Virtual Desktop WVDHostRegistrations table, which records session-host registration events to host pools.
scope: MEDIUM
notes: AVD host-inventory telemetry; reveals session-host pool infrastructure.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Returns session-host registration rows, exfiltrating the log content and inventorying AVD session-host pool infrastructure.
