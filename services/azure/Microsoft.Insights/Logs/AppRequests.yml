name: Application Insights AppRequests log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding incoming HTTP request telemetry for a monitored application.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope. Records include request URLs, query parameters, client IPs, and response codes that may contain tokens or PII.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports incoming HTTP request telemetry, exposing URLs, query parameters, and client details that may carry tokens or PII.
