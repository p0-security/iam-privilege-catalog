name: Azure AD managed-identity sign-in log table
description: A Log Analytics data-plane table holding Azure AD managed-identity (service principal) sign-in audit records.
scope: MEDIUM
notes: Monitoring/security telemetry revealing which managed identities authenticate to which resources, aiding identity-targeting and lateral-movement reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: This data-plane read exports managed-identity sign-in records, exfiltrating logs and enumerating which identities exist and what resources they access.
