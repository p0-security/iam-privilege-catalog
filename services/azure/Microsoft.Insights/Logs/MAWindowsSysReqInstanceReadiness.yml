name: Log Analytics MAWindowsSysReqInstanceReadiness table
description: A Log Analytics workspace table holding per-instance Windows system-requirement / readiness telemetry for the monitoring/migration agent.
scope: MEDIUM
notes: Monitoring/diagnostics data plane; medium sensitivity operational telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reads per-host system-requirement readiness records, exporting log data and disclosing host configuration and inventory.
