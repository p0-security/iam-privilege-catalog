name: Log Analytics DatabricksJobs table
description: A Log Analytics workspace table holding ingested Azure Databricks job-execution diagnostic log records. Reading it is a data-plane operation that returns the stored log rows.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry for a single analytics workload.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Returns Databricks job-run logs, exposing job definitions, parameters, and execution activity of data pipelines.
