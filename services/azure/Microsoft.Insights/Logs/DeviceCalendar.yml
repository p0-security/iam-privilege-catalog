name: Log Analytics DeviceCalendar table
description: A Log Analytics table (DeviceCalendar) in an Azure Monitor workspace that stores collected device calendar telemetry log records.
scope: MEDIUM
notes: "Monitoring/diagnostics data: confidential operational telemetry, not core production data, hence MEDIUM scope."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns the contents of the DeviceCalendar table, allowing export of device calendar/scheduling telemetry log data.
