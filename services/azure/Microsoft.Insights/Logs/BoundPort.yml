name: Log Analytics BoundPort table
description: A Log Analytics workspace table (Service Map / VM Insights) recording listening ports and network bindings of monitored machines. This is a data-plane read.
scope: MEDIUM
notes: Discloses open ports and reachable services per host, aiding attack-surface mapping; monitoring data, scope MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reveals which ports/services monitored hosts are listening on, enabling network/service reconnaissance for targeting and lateral movement.
