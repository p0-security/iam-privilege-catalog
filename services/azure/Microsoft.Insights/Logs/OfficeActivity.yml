name: Log Analytics OfficeActivity table
description: A Log Analytics workspace table holding Microsoft 365 / Office 365 unified audit logs (Exchange, SharePoint, Teams, Azure AD user/admin/mailbox activity).
scope: MEDIUM
notes: Audit data containing user identities, IPs, and activity records; more sensitive than generic telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reads O365 audit records exposing user/admin/mailbox activity and identities, exporting sensitive audit data and enabling account enumeration.
