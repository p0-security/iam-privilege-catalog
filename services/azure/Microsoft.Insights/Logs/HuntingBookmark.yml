name: Log Analytics HuntingBookmark table
description: A Log Analytics workspace table holding Microsoft Sentinel threat-hunting bookmark records. Reading it is a data-plane operation that returns the stored rows.
scope: MEDIUM
notes: Defensive security-investigation data revealing what analysts are tracking and which threats they have flagged; valuable for evasion.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns Sentinel hunting bookmarks, exposing defenders' investigation focus and flagged evidence so an attacker can learn detection coverage and evade ongoing hunts.
