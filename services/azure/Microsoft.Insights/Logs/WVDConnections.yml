name: Azure Log Analytics table (WVDConnections)
description: A Log Analytics workspace table accessed via the data plane; this one is the Azure Virtual Desktop WVDConnections table, which records user session-connection events (user, client, gateway, timing).
scope: MEDIUM
notes: AVD connection telemetry; exposes connecting user identities and client/source details.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Returns AVD connection rows including user names and client/source info, exfiltrating the log content and inventorying user accounts and their connection patterns.
