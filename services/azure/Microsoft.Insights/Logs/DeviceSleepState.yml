name: Log Analytics DeviceSleepState table
description: A Log Analytics table (DeviceSleepState) in an Azure Monitor workspace that stores collected device power/sleep-state telemetry log records.
scope: MEDIUM
notes: "Monitoring/diagnostics data: confidential operational telemetry, not core production data, hence MEDIUM scope."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns the DeviceSleepState table, allowing export of device power-state telemetry revealing usage patterns.
