name: Azure Monitor Log Analytics table (Azure Backup jobs)
description: A Log Analytics table holding Azure Backup job records. This data-plane read returns telemetry about backup job execution, schedules, and outcomes for protected resources.
scope: MEDIUM
notes: Backup job telemetry reveals backup schedules and which resources are protected, aiding reconnaissance before data destruction.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports backup job activity telemetry and reveals backup schedules and protected-resource infrastructure.
