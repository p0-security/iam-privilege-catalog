name: Log Analytics DeviceHeartbeat table
description: A Log Analytics table (DeviceHeartbeat) in an Azure Monitor workspace that stores collected device heartbeat/liveness telemetry log records.
scope: MEDIUM
notes: "Monitoring/diagnostics data: confidential operational telemetry, not core production data, hence MEDIUM scope."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns the DeviceHeartbeat table, allowing export of device presence/liveness telemetry.
