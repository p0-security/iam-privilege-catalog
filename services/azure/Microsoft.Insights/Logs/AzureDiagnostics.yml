name: Log Analytics AzureDiagnostics table
description: The AzureDiagnostics table is a catch-all Log Analytics table that centrally aggregates resource diagnostic log records emitted by many different Azure resource types into a single workspace table.
scope: MEDIUM
notes: Diagnostic/monitoring data; because it is a shared catch-all sink it can contain operational identifiers, request parameters, and configuration details spanning the environment.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns ingested diagnostic log rows across many resource types, letting an attacker export potentially sensitive operational log content.
