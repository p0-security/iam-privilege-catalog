name: Log Analytics ServiceFabricReliableActorEvent table
description: A Log Analytics workspace table holding Service Fabric reliable-actor application runtime event records.
scope: MEDIUM
notes: May surface operationally sensitive application data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports reliable-actor runtime telemetry (exfiltration:logs) and enables inventory of application activity (discovery:logs).
