name: Log Analytics Update table
description: A Log Analytics workspace table containing per-machine Update Management records (installed/missing patches and update compliance). Monitoring/diagnostic log data.
scope: MEDIUM
notes: Reveals unpatched/vulnerable hosts useful for targeting, but is telemetry rather than primary production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Read exports missing/installed-patch log records, exposing exploitable unpatched systems.
