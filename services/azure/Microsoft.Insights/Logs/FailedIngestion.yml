name: Log Analytics FailedIngestion table
description: A Log Analytics workspace table holding records about data that failed to ingest, including error reasons and rejected-payload fragments. Reading it is a data-plane operation that returns the stored rows.
scope: MEDIUM
notes: Operational telemetry about the logging pipeline; error payloads can contain fragments of source data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns ingestion-failure records whose error payloads can leak fragments of source data and reveal logging-pipeline gaps and status.
