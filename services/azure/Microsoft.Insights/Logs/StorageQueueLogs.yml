name: Log Analytics StorageQueueLogs table
description: A Log Analytics workspace table holding Azure Storage Queue access/diagnostic logs (queue operations, caller identities, IPs).
scope: MEDIUM
notes: Diagnostic access-log data; reveals queue access patterns.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports queue access-log records (exfiltration:logs) and enumerates logged queue operations and access patterns (discovery:logs).
