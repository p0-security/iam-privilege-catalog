name: Log Analytics MADeviceNRT table
description: A Log Analytics workspace table holding near-real-time managed-device telemetry records. This is a data-plane log table within Azure Monitor Log Analytics.
scope: MEDIUM
notes: Monitoring/diagnostic data; device telemetry exposes endpoint identities and state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read returns near-real-time managed-device telemetry, exporting and enumerating device records.
