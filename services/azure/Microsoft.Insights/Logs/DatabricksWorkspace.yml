name: Log Analytics DatabricksWorkspace table
description: A Log Analytics workspace table holding ingested Azure Databricks workspace-level diagnostic log records (logins, configuration/administrative events). Reading it is a data-plane operation that returns the stored log rows.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry for a single analytics workload.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Returns workspace-level activity logs, exposing logins, configuration changes, and administrative events.
