name: Log Analytics MADevicePnPHealthAlternativeVersions table (Azure Migrate)
description: "A Log Analytics (Azure Monitor) table holding Azure Migrate device PnP alternative-version health telemetry: device driver/firmware version and health details."
scope: MEDIUM
notes: Monitoring/assessment data plane; driver/firmware version inventory aids vulnerability targeting.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns alternative-version device PnP health records, exporting log data (exfiltration:logs) and disclosing driver/firmware version inventory for targeting (discovery:infra).
