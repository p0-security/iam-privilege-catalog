name: Log Analytics SfBAssessmentRecommendation table
description: A Log Analytics workspace table holding Skype for Business (on-premises) configuration/health assessment recommendation findings.
scope: MEDIUM
notes: Findings disclose configuration weaknesses and remediation gaps.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports assessment recommendation content (exfiltration:logs) and lets an attacker inventory environment misconfigurations as targets (discovery:logs).
