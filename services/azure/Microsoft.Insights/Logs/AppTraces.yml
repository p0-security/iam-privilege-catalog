name: App traces table
description: A Log Analytics / Azure Monitor table holding Application Insights trace/telemetry log records. This is a monitoring/diagnostics data-plane asset.
scope: MEDIUM
notes: Trace logs frequently embed request parameters, identifiers, and occasionally secrets from application instrumentation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Read of the AppTraces table exports detailed application trace telemetry that may include sensitive parameters or secrets.
