name: Log Analytics table data (Azure Data Share logs)
description: A Log Analytics workspace table (MicrosoftDataShareSentSnapshotLog) holding Azure Data Share outbound (sent) snapshot activity logs in Azure Monitor.
scope: MEDIUM
notes: Monitoring telemetry exposing outbound data-sharing activity, recipients, and dataset identifiers; reveals data-flow relationships, not the shared data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports outbound data-sharing snapshot log records (exfiltration:logs) and enumerates what is shared and with whom (discovery:logs).
