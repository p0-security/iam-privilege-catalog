name: Log Analytics ContainerLog table
description: A Log Analytics workspace table containing stdout/stderr application log output captured from containers. This is a data-plane read.
scope: MEDIUM
notes: Container stdout/stderr frequently contains secrets, tokens, and sensitive application data emitted at runtime; monitoring log data, scope MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Exports container stdout/stderr log output, which commonly leaks secrets, tokens, and sensitive application data captured in logs.
