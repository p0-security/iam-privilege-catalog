name: Log Analytics MAOfficeCurrencyAssessmentDailyCounts table
description: A Log Analytics / Azure Monitor table holding Microsoft Managed Desktop / Desktop Analytics telemetry. The MAOfficeCurrencyAssessmentDailyCounts table records aggregated daily counts of Office update-currency assessment across the fleet.
scope: MEDIUM
notes: Monitoring/diagnostics data tier. Aggregated counts reveal fleet-wide Office currency trends but contain less per-device detail than the raw assessment table.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns aggregated daily-count rows, exporting log content and revealing the fleet-wide Office update-currency distribution over time.
