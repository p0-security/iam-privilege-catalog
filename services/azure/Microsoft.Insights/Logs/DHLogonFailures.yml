name: Log Analytics DHLogonFailures table
description: A Log Analytics table (DHLogonFailures) in an Azure Monitor workspace that stores collected device-health logon-failure telemetry log records.
scope: MEDIUM
notes: "Monitoring/diagnostics data: confidential operational telemetry, not core production data, hence MEDIUM scope."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Data-plane read returns logon-failure rows that reveal account names and failed authentication activity, enabling both log export and account enumeration for targeting.
