name: Log Analytics table data (M365 Apps Admin Center telemetry)
description: A Log Analytics workspace table (MAOfficeMacroErrorNRT) holding Microsoft 365 Office macro-error telemetry in Azure Monitor.
scope: MEDIUM
notes: Monitoring/diagnostics-tier telemetry about macro/document activity; not primary production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports the macro-error log records (exfiltration:logs) and enumerates captured macro activity (discovery:logs).
