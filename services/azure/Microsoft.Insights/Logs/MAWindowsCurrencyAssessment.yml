name: Log Analytics MAWindowsCurrencyAssessment table
description: A Log Analytics / Azure Monitor table holding Microsoft Managed Desktop / Desktop Analytics telemetry. The MAWindowsCurrencyAssessment table records per-device Windows update-currency assessment data.
scope: MEDIUM
notes: Monitoring/diagnostics data tier. Reveals which Windows endpoints are out of date / unpatched, useful for targeting.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns Windows currency-assessment rows, exporting log content and inventorying the patch/currency posture of the Windows fleet.
