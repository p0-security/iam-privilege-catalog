name: Azure AD Domain Services account-management log table
description: A Log Analytics data-plane table holding Azure AD Domain Services account-management security audit records (account creation/modification/deletion and group-membership changes).
scope: MEDIUM
notes: Monitoring/security telemetry revealing the directory's account lifecycle and inventory.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: This data-plane read exports account create/modify/delete and group-membership audit events, exfiltrating logs and revealing the directory's account inventory.
