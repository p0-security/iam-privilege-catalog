name: Log Analytics MAOfficeAddinInstance table
description: A Log Analytics table holding Microsoft 365 Apps per-instance Office add-in telemetry collected by Azure Monitor.
scope: MEDIUM
notes: Monitoring/diagnostic data tier; rows enumerate add-in instances across machines.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read exports per-instance Office add-in records and inventories add-in deployments across devices.
