name: Log Analytics AzureActivity table
description: A Log Analytics workspace table holding Azure subscription control-plane activity (audit) log records — who performed which management operations on which resources, including caller identities. This is a data-plane read.
scope: MEDIUM
notes: Audit records reveal administrative and RBAC/policy activity useful for reconnaissance, but the asset is collected monitoring/audit log data; scope MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:policy
    notes: Exports the control-plane audit trail, revealing who performed which management and role/policy operations — discovery:policy because the records expose access-control activity and operators.
