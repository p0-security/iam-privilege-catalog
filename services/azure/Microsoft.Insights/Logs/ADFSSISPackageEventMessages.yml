name: Azure Monitor Log Analytics table (Data Factory SSIS package event messages)
description: A Log Analytics table holding Azure Data Factory SSIS package event-message records. This data-plane read returns ETL package event/error messages, which may contain sensitive operational values or connection context.
scope: MEDIUM
notes: Event messages/errors can leak embedded values and disclose package operation details of the ETL infrastructure.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports SSIS package event messages that may leak operational/data-handling context and reveals package behavior.
