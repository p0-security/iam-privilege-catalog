name: Log Analytics MAOfficeCurrencyAssessment table
description: A Log Analytics / Azure Monitor table holding Microsoft Managed Desktop / Desktop Analytics telemetry. The MAOfficeCurrencyAssessment table records per-device Office version/update-currency assessment data across the managed device fleet.
scope: MEDIUM
notes: Monitoring/diagnostics data tier. Rows describe software and OS posture of organizational endpoints, useful for reconnaissance but not directly granting access to production systems or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns rows of Office currency-assessment telemetry, exporting log content and inventorying the Office software estate (versions/update posture) for targeting.
