name: Azure Log Analytics table (VMConnection)
description: A Log Analytics workspace table accessed via the data plane; this one is the VM Insights / Service Map VMConnection table, which records network connections (source/destination/ports) between monitored hosts.
scope: MEDIUM
notes: Network-flow telemetry; maps host-to-host communication and topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Returns connection-flow rows between hosts, exfiltrating the log content and revealing network topology and communication patterns.
