name: Log Analytics KubeEvents table
description: A Log Analytics workspace table holding Kubernetes (AKS) cluster event records (scheduling, errors, deployments). This is a data-plane log table within Azure Monitor Log Analytics.
scope: MEDIUM
notes: Monitoring/diagnostic data; event records reveal workload names, namespaces, and cluster activity useful for reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read returns Kubernetes cluster event records, exporting and enumerating workload/cluster activity.
