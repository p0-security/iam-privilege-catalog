name: Log Analytics Heartbeat table
description: A Log Analytics workspace data-plane table holding monitored-agent heartbeat records (computer names, IPs, OS, agent versions).
scope: MEDIUM
notes: Monitoring data that inventories which hosts/agents report telemetry; sensitivity is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read exports agent heartbeat records that inventory monitored machines and their identifiers, aiding infrastructure reconnaissance.
