name: Log Analytics MADevicePnPHealth table (Azure Migrate)
description: "A Log Analytics (Azure Monitor) table holding Azure Migrate device plug-and-play health telemetry: device hardware/driver inventory and health state."
scope: MEDIUM
notes: Monitoring/assessment data plane; discloses device hardware/driver inventory.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns device PnP health records, exporting log data (exfiltration:logs) and disclosing device hardware/driver inventory and health (discovery:infra).
