name: Log Analytics ThreatIntelligenceIndicator table
description: A Log Analytics workspace table holding Microsoft Sentinel threat-intelligence indicators (IOCs) representing the organization's detection coverage.
scope: MEDIUM
notes: Security/detection-content data; reveals which indicators defenders track.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports the stored IOC/threat-intel records (exfiltration:logs) and reveals which indicators/detections are in place so an attacker can evade them (discovery:logs).
