name: Log Analytics MAOfficeAppInstance table
description: A Log Analytics table holding Microsoft 365 Apps per-instance Office application telemetry collected by Azure Monitor.
scope: MEDIUM
notes: Monitoring/diagnostic data tier; rows enumerate Office app instances across devices.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read exports per-instance Office app records and inventories app deployments across devices.
