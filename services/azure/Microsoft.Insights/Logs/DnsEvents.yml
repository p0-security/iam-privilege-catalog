name: Log Analytics DnsEvents table
description: A Log Analytics workspace data-plane table holding ingested DNS query/event logs (resolved domains, client lookups).
scope: MEDIUM
notes: Monitoring data that reveals internal hostnames and network activity; sensitivity is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Data-plane read exports DNS query logs revealing internal hostnames, resolved domains, and network topology useful for reconnaissance.
