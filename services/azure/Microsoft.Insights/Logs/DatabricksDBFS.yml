name: Log Analytics DatabricksDBFS table
description: The DatabricksDBFS table holds Azure Databricks File System (DBFS) access log records (file paths and operations) ingested into a Log Analytics workspace.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry describing DBFS access activity; does not grant access to the underlying files themselves.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Reading the table exports DBFS access log content, disclosing file paths and data-access patterns within Databricks.
