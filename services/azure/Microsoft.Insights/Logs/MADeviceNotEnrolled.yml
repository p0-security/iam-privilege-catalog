name: Log Analytics MADeviceNotEnrolled table
description: A Log Analytics workspace table holding managed-apps device records for devices not enrolled in management. This is a data-plane log table within Azure Monitor Log Analytics.
scope: MEDIUM
notes: Monitoring/diagnostic data; identifies unmanaged endpoints and device-coverage gaps useful for targeting.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read returns not-enrolled device telemetry, exporting and enumerating device-coverage gaps.
