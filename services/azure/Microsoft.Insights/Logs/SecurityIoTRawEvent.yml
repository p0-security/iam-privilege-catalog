name: Log Analytics SecurityIoTRawEvent table
description: A Log Analytics workspace table holding raw Defender for IoT security event telemetry collected from IoT devices and sensors.
scope: MEDIUM
notes: Monitoring/security-log data; sensitivity is MEDIUM but content reveals device security posture.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read returns the raw IoT security event records (exfiltration:logs) and enumerates the logged security telemetry (discovery:logs).
