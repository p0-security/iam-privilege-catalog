name: Log Analytics KubePodInventory table
description: "A Log Analytics (Azure Monitor) table holding Container Insights KubePodInventory telemetry: Kubernetes pod/container inventory records including pod names, namespaces, container images, node mappings, and status."
scope: MEDIUM
notes: Monitoring/diagnostic data plane; not a primary production data store, but pod inventory can disclose cluster topology and sensitive workload identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns ingested Kubernetes pod inventory, exporting monitoring log data (exfiltration:logs) and disclosing cluster container infrastructure topology for reconnaissance (discovery:infra).
