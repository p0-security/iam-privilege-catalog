name: Application Insights AppExceptions log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding application exception telemetry (stack traces, error context) for a monitored application.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope. Stack traces and parameters frequently leak internal paths, code structure, and occasionally secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports exception telemetry whose stack traces and parameters often leak sensitive internals and secrets.
