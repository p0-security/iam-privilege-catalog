name: Log Analytics KubeServices table
description: A Log Analytics workspace table holding Kubernetes (AKS) service inventory records (service topology/configuration). This is a data-plane log table within Azure Monitor Log Analytics.
scope: MEDIUM
notes: Monitoring/diagnostic data; service inventory reveals cluster topology useful for reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read returns Kubernetes service inventory records, exporting and enumerating cluster service topology.
