name: Log Analytics MADriverReadiness table
description: A Log Analytics table holding Microsoft 365 Apps / Managed Desktop driver-readiness telemetry collected by Azure Monitor.
scope: MEDIUM
notes: Monitoring/diagnostic data tier; rows inventory installed drivers, useful for targeting vulnerable-driver attacks.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read exports driver-readiness telemetry and enumerates installed driver inventory across devices.
