name: Application Insights AppEvents log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding custom application event telemetry for a monitored application.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope. Custom events may carry business and user-context properties.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports custom event telemetry that may include user identifiers and business-context data.
