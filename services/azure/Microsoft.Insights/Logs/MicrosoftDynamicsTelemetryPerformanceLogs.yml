name: Log Analytics table data (Dynamics 365 telemetry)
description: A Log Analytics workspace table (MicrosoftDynamicsTelemetryPerformanceLogs) holding Dynamics 365 application performance telemetry in Azure Monitor.
scope: MEDIUM
notes: Monitoring/diagnostics-tier performance telemetry; not primary business data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports Dynamics performance telemetry log records (exfiltration:logs) and enumerates logged performance/usage activity (discovery:logs).
