name: App system events table
description: A Log Analytics / Azure Monitor table holding application system-event log records. This is a monitoring/diagnostics data-plane asset.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Read of the AppSystemEvents table exports system-level event log records that may contain operational detail.
