name: Application Insights AppPerformanceCounters log table
description: A Log Analytics / Application Insights telemetry table (data plane) holding host/process performance-counter telemetry for a monitored application.
scope: MEDIUM
notes: Monitoring/diagnostics data; per-application scope.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports performance-counter telemetry, disclosing host/process resource configuration and load characteristics.
