name: Azure Log Analytics table (VMProcess)
description: A Log Analytics workspace table accessed via the data plane; this one is the VM Insights / Service Map VMProcess table, which records processes running on monitored machines.
scope: MEDIUM
notes: Process-inventory telemetry; reveals running software, services, and potentially command lines.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Returns running-process rows from monitored VMs, exfiltrating the log content and inventorying software/workloads on infrastructure.
