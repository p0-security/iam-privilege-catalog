name: Log Analytics SQLQueryPerformance table
description: A Log Analytics workspace table holding SQL query performance telemetry, which can include query text and schema/table references.
scope: MEDIUM
notes: Captured query text can leak schema, access patterns, and embedded literals.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Read exports query-performance telemetry that may reveal query text/schema (exfiltration:logs) and lets an attacker inventory logged DB activity and structure (discovery:logs).
