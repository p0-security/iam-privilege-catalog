name: Log Analytics SignalRServiceDiagnosticLogs table
description: A Log Analytics workspace table holding Azure SignalR Service diagnostic logs (connectivity and messaging events).
scope: MEDIUM
notes: Diagnostic/monitoring data for a single service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read returns SignalR diagnostic log content (exfiltration:logs) and enumerates the logged connection/messaging activity (discovery:logs).
