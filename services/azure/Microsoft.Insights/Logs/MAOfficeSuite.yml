name: Log Analytics MAOfficeSuite table
description: A Log Analytics / Azure Monitor table holding Microsoft Managed Desktop / Desktop Analytics telemetry. The MAOfficeSuite table records installed Office suite/software inventory telemetry across managed devices.
scope: MEDIUM
notes: Monitoring/diagnostics data tier. Directly enumerates the org's Office software footprint.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns Office-suite inventory rows, exporting log content and inventorying installed Office editions across the device estate.
