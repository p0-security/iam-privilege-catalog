name: Log Analytics MAApplicationHealth table (Azure Migrate)
description: "A Log Analytics (Azure Monitor) table holding Azure Migrate application-health telemetry: state, configuration, and assessment posture of discovered applications."
scope: MEDIUM
notes: Monitoring/assessment data plane; reveals application inventory and operational state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns application-health records, exporting log data (exfiltration:logs) and disclosing application inventory and posture (discovery:infra).
