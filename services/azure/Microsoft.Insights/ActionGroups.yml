name: Azure Monitor action groups
description: An action group is a reusable set of notification and automation targets (email, SMS, push, voice, webhooks, Logic Apps, Azure Functions, Automation runbooks, ITSM) that alert rules invoke when they fire.
scope: MEDIUM
notes: Action groups are the incident-response delivery pipeline for Azure Monitor alerts; tampering with them suppresses or misdirects detection notifications.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:defense
    notes: Deleting an action group removes the notification/automation targets that alert rules fire to, silently disabling alert delivery and impairing incident response.
  Read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading an action group inventories its notification configuration (recipients, webhook URLs, runbook/automation targets), enabling reconnaissance of the incident-response wiring and potentially leaking webhook endpoints.
  Write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating an action group lets an attacker redirect, disable, or break the notification/automation targets alerts fire to, suppressing incident-response alerting while manipulating its configuration.
