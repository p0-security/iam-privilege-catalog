name: Azure Monitor metrics
description: Azure Monitor metrics are time-series telemetry (numeric performance/utilization counters) collected from Azure resources, used for dashboards, alerting, and autoscale.
scope: MEDIUM
notes: "Monitoring/observability data: supporting infrastructure rather than primary organizational data."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Nested-provider-path variant of reading metric values; exports monitoring telemetry revealing a resource's operational behavior.
