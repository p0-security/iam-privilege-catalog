name: Webtest metrics
description: The actual metric values (availability, response-time, and related telemetry) produced by an Application Insights webtest probing a monitored endpoint.
scope: MEDIUM
notes: Low-sensitivity operational monitoring data that can reveal endpoint behavior and outage patterns.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
    notes: Returns actual webtest telemetry values (availability/response times), exporting monitoring data about the tested endpoint rather than just enumerating definitions.
