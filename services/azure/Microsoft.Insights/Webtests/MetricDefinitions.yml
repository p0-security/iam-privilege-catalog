name: Webtest metric definitions
description: The schema of available metrics (metric names and dimensions) emitted by an Application Insights webtest, such as availability and response time.
scope: LOW
notes: Exposes only the metric catalog, not actual telemetry values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:logs
    notes: Enumerates which availability/telemetry metrics the webtest emits, monitoring schema reconnaissance with no actual data returned.
