name: Azure autoscale settings
description: An autoscale setting defines the elastic scaling rules (min/max/default instance counts, metric-based and scheduled triggers) bound to a target compute resource such as a VM scale set, App Service plan, or AKS node pool.
scope: LOW
notes: Monitoring/autoscale configuration is supporting infrastructure; abusing it affects the availability and cost of a single backed service rather than directly exposing sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Action:
    risks: []
    notes: Platform-emitted predictive-autoscale event marker recording that a predictive scale-up was initiated; an audit/telemetry signal with no attacker-actionable capability.
