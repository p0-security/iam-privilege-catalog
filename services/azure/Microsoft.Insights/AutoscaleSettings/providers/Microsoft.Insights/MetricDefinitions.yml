name: Azure metric definitions
description: Metric definitions enumerate the available metric names, namespaces, dimensions, and aggregation schema exposed for a resource (here, scoped via the autoscale setting); it is monitoring schema metadata, not the metric values themselves.
scope: LOW
notes: Read-only monitoring metadata of low sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:metadata
    notes: Reading metric definitions enumerates the available metric schema/namespaces for the resource, a benign metadata reconnaissance capability.
