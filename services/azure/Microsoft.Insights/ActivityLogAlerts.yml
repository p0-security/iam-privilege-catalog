name: Azure Monitor activity log alerts
description: Activity Log Alerts are Azure Monitor rules that fire notifications when matching control-plane (Activity Log) events occur, such as resource changes, service health events, or administrative operations.
scope: MEDIUM
notes: These are detective/alerting controls. They contain no organizational data themselves; their value to an attacker is in suppressing or learning detection coverage. Monitoring asset = MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:defense
    notes: Deleting an activity log alert removes a detection rule that would otherwise notify defenders of suspicious management-plane events, allowing the attacker to operate without triggering notifications.
  Read:
    risks:
      - discovery:logs
    scope: LOW
    notes: Reading an activity log alert inventories which control-plane conditions are monitored and where notifications go, revealing detection coverage and blind spots to plan evasion.
  Write:
    risks:
      - destruction:defense
    notes: Creating or updating an activity log alert lets an attacker neuter or re-scope a detection rule (remove conditions, redirect/empty the action group) so suspicious control-plane activity no longer triggers alerts, disabling a defensive alerting control.
