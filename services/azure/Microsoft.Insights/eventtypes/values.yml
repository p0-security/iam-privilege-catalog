name: Azure Activity Log events
description: The Activity Log is the subscription-scoped control-plane audit log recording management operations (who did what, on which resource, when, from which IP) across Azure resources.
scope: MEDIUM
notes: Reading it exports actual audit records that can reveal principals, IPs, resource IDs, and operational history. Log/audit asset = MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reads the actual Activity Log events for the scope, exporting control-plane audit records that may contain sensitive operational details and identities, and enabling broad reconnaissance of the environment.
