name: Data collection rules
description: A data collection rule (DCR) defines what telemetry/logs are collected from monitored resources, how they are transformed, and where they are routed. It is the control-plane configuration of the Azure Monitor ingestion pipeline.
scope: MEDIUM
notes: Controls monitoring/detection coverage; weakening it creates audit blind spots but does not expose primary organizational data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting a DCR halts the telemetry/log collection it governs, blinding incident response and removing a detective control.
  Read:
    risks:
      - discovery:logs
    notes: Reading a DCR inventories what telemetry is collected and where it is routed, exposing monitoring coverage and gaps for evasion planning.
  Write:
    risks:
      - destruction:logs
      - destruction:defense
      - impact:manipulation
    notes: Creating or updating a DCR lets an attacker reduce, redirect, or disable telemetry/log collection (suppressing the audit trail) and alter the collection/transform pipeline configuration.
