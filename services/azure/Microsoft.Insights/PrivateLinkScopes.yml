name: Azure Monitor Private Link Scope
description: An Azure Monitor Private Link Scope (AMPLS) is a control-plane resource that defines a private-network connectivity boundary binding Azure Monitor resources (Log Analytics workspaces, Application Insights components) to private endpoints and governs their ingestion/query network access modes.
scope: MEDIUM
notes: This is monitoring/diagnostics network-isolation configuration, not the telemetry data itself; the asset sits at the supporting-infrastructure sensitivity tier.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:network
    notes: Deleting the AMPLS removes the private-link construct fronting Azure Monitor resources, severing private connectivity for connected consumers.
  Read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading the AMPLS returns its private-connectivity configuration, access modes, and which resources/endpoints are linked, providing read-only network reconnaissance.
  Write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating or updating the AMPLS alters network access modes and the private-connectivity surface for monitoring resources, manipulating the configuration and potentially opening a private-network path toward Azure Monitor data.
