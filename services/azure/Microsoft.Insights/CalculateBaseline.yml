name: Metric baseline
description: An Azure Monitor action that computes a metric baseline (expected value ranges) from supplied metric values for a resource.
scope: LOW
notes: Returns derived aggregate non-sensitive telemetry only.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:infra
    notes: Computes a baseline over metric values, returning derived performance statistics that inventory resource behavior.
