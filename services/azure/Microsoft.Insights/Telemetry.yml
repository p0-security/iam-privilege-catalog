name: Telemetry
description: The Application Insights / Azure Monitor telemetry data store; this data-plane action ingests telemetry records into it.
scope: MEDIUM
notes: Operational monitoring data used for dashboards, alerts and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Write:
    risks:
      - impact:manipulation
    notes: This data action injects telemetry into the monitoring store, letting an attacker insert false or noise telemetry to pollute dashboards/alerts and evade or distract detection.
