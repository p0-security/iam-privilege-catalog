name: Data collection rule ingestion endpoint
description: The data-plane ingestion endpoint of a data collection rule, accepting telemetry/log records pushed into the Azure Monitor pipeline. Data sent here lands in the configured destination tables.
scope: MEDIUM
notes: Allows writing into the monitoring data store; abuse pollutes logs/telemetry rather than exposing primary data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Write:
    risks:
      - impact:manipulation
    notes: This data action sends arbitrary data into the DCR ingestion endpoint, letting an attacker inject or flood forged telemetry/log records to poison monitoring data and mislead detection.
