name: Azure metric alert status
description: Metric alert status reports the current fired/resolved evaluation state of a metric alert rule. It is read-only operational monitoring state.
scope: LOW
notes: Status is low-sensitivity operational telemetry derived from the parent alert rule.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:logs
    notes: Reading metric alert status returns the current fired/resolved state, letting an attacker confirm whether their activity has tripped a monitored condition.
