name: Log Analytics logs (data plane)
description: Data-plane access to the content of all tables in a Log Analytics workspace, the central store of ingested logs and telemetry from across the monitored environment.
scope: MEDIUM
notes: A workspace aggregates operational, security, and identity telemetry from many sources, so broad read access can expose sensitive data well beyond ordinary logs.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - exfiltration:logs
      - exfiltration:data
    notes: Data-plane read of ALL Log Analytics tables, enabling wholesale export of collected telemetry that can contain sensitive operational, security, and identity data across the entire workspace.
