name: Activity Log event categories
description: A static catalog listing the available Activity Log event-category names (Administrative, Security, ServiceHealth, Alert, etc.) supported by Azure Monitor.
scope: LOW
notes: Returns only the fixed taxonomy of log category names, not any organizational data. Low-sensitivity metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:logs
    notes: Returns the static list of Activity Log event categories, a low-value enumeration of the log taxonomy that exposes no organizational data.
