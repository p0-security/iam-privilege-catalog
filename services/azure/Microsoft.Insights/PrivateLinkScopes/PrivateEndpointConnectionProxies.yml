name: Azure Monitor Private Link Scope private endpoint connection proxy
description: An internal, platform-mediated proxy resource that Azure Monitor uses to orchestrate the private endpoint connection approval handshake between an Azure Monitor Private Link Scope (AMPLS) and consumer private endpoints.
scope: MEDIUM
notes: Private-link connectivity plumbing supporting a single monitoring scope, not a tenant-wide control or data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:network
    notes: Deleting the connection proxy tears down a private-link connectivity component, removing the private network path to the monitoring scope and disrupting authorized private access (DoS-like network destruction).
  Read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading the connection proxy enumerates the AMPLS private-link connectivity configuration, yielding read-only network reconnaissance.
  Write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating or updating the connection proxy can wire a (potentially attacker-controlled) private endpoint into the monitor private-link scope and alter its connectivity binding, enabling network movement and manipulation of the connectivity configuration.
