name: Azure Monitor Private Link Scope private endpoint connection proxy
description: An internal, platform-mediated proxy resource that Azure Monitor uses to orchestrate the private endpoint connection approval handshake between an Azure Monitor Private Link Scope (AMPLS) and consumer private endpoints.
scope: LOW
notes: Private-link connectivity plumbing supporting a single monitoring scope, not a tenant-wide control or data store.
links:
