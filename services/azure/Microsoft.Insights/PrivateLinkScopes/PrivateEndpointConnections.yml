name: Azure Monitor Private Endpoint Connection
description: A private endpoint connection represents a consumer's private endpoint attaching to a Private Link Scope, including its approval state, governing private-network access to the scoped Azure Monitor resources.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting an established private endpoint connection severs a consumer's private-link path to the scoped Azure Monitor resources, destroying the network connection and denying private access to legitimate consumers.
  Read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading a private endpoint connection inventories which consumer endpoints are connected or pending to the scope and their approval state, providing read-only network reconnaissance.
  Write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating or updating a private endpoint connection can attach or approve an attacker-controlled private endpoint into the scope, granting private-network access to the linked monitoring resources and altering approval state.
