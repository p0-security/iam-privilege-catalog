name: Azure Monitor Private Link Resource
description: A private link resource exposes the available private-link sub-resource/group IDs and DNS targets that can be privately linked for a Private Link Scope.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:network
    notes: Reading a private link resource enumerates the available private-link group IDs/sub-resources for the scope, providing read-only network reconnaissance of the private-connectivity surface.
