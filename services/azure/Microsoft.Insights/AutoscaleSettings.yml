name: Azure autoscale settings
description: An autoscale setting defines the elastic scaling rules (min/max/default instance counts, metric-based and scheduled triggers) bound to a target compute resource such as a VM scale set, App Service plan, or AKS node pool.
scope: MEDIUM
notes: Monitoring/autoscale configuration is supporting infrastructure; abusing it affects the availability and cost of a single backed service rather than directly exposing sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Insights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the autoscale setting removes the scaling configuration so the backing service can no longer scale to meet demand, degrading availability under load.
  Write:
    risks:
      - impact:manipulation
      - impact:dos
      - impact:spend
    notes: Creating/updating the autoscale config lets an attacker cap or disable scale-out to starve a service (DoS) or inflate instance counts to drive cost, manipulating operational scaling configuration.
