name: virtualMachines
description: >-
  Azure Virtual Machines (Microsoft.Compute/virtualMachines) provide general-purpose compute.
  Compromise or misuse can expose data, interrupt services, or incur spend.
scope: CRITICAL
notes: >-
  Privileges below are grouped conceptually and do not map 1:1 with ARM operation names.
  Assess in combination with disk, networking, identity, and key vault privileges.
privileges:
  list:
    risks: [discovery:infra, discovery:metadata]
    notes: >-
      Enumerates VMs and metadata such as OS, sizes, and attached resources.
  read:
    risks: [discovery:infra, discovery:metadata, exfiltration:metadata]
    notes: >-
      Reads VM configuration and instance metadata which can reveal sensitive details.
  createOrUpdate:
    risks:
      [
        destruction:infra,
        impact:spend,
        escalation:privilege,
        escalation:network,
        impact:hijack,
      ]
    notes: >-
      Can change images, identities, startup scripts, or sizes; can scale up costs.
  delete:
    risks: [destruction:data, destruction:infra, impact:dos]
    notes: >-
      Permanently removes a VM; attached ephemeral data may be lost.
  start:
    risks: [impact:spend]
    notes: >-
      Starting instances increases spend; may enable exposed services.
  restart:
    risks: [impact:dos]
    notes: >-
      Restarts can disrupt workloads and availability.
  powerOff:
    risks: [impact:dos]
    notes: >-
      Stops the VM without releasing compute allocation; interrupts services.
  deallocate:
    risks: [impact:dos]
    notes: >-
      Stops and releases allocation; VMs become unavailable until started.
  runCommand:
    risks:
      [
        exfiltration:data,
        collection:data,
        exfiltration:crypto,
        execution:code,
        impact:hijack,
        persistence:account,
      ]
    notes: >-
      Executes arbitrary commands inside the guest OS, enabling data theft or tampering.
  login:
    risks:
      - collection:data
      - destruction:data
      - discovery:network
      - discovery:policy
      - escalation:lateral
      - exfiltration:data
      - impact:defacement
      - impact:hijack
    notes: >-
      Allows interactive user login to the VM using Azure AD-backed authentication
      (Microsoft.Compute/virtualMachines/login/action). Grants OS user access.
      Specific risks depend on the instance configuration, but can include most
      of the risks of `loginAsAdmin`, subject to privileges granted within the
      instance OS and file systems.
  loginAsAdmin:
    risks:
      - collection:data
      - destruction:data
      - discovery:network
      - discovery:policy
      - escalation:lateral
      - exfiltration:data
      - impact:defacement
      - impact:hijack
    notes: >-
      Allows interactive administrator login to the VM using Azure AD-backed authentication
      (Microsoft.Compute/virtualMachines/loginAsAdmin/action), effectively allowing full control of
      all services hosted on the instance. Grants privileged OS access.  Allows full access to instance metadata.
      Allows access to all data stored on the instance. Allows access to bound service accounts, 
      granting access to all resources accessible by the service account (potentially including data repositories). Allows
      access to any networks to which the instance is bound. Allows alteration of logs,
      potentially allowing the attacker to conceal their presence. If the instance has a
      service account, additionally requires permission to act as that service account.

  extensionsWrite:
    risks: [
        exfiltration:data,
        - collection:data
        escalation:privilege,
        impact:hijack,
        persistence:account,
      ]
    notes: >-
      Installing or updating VM extensions can run privileged code.
  extensionsDelete:
    risks: [impact:dos, destruction:infra, destruction:defense]
    notes: >-
      Removing required extensions (e.g., monitoring/agents) can break operations or visibility.
  attachManagedDisk:
    risks:
      [
        exfiltration:data,
        exfiltration:crypto,
        exfiltration:metadata,
        destruction:data,
      ]
    notes: >-
      Attaching disks can expose data; write operations can overwrite data.
  detachManagedDisk:
    risks: [destruction:data, impact:dos]
    notes: >-
      Detaching the wrong disk can cause data loss or service interruption.
  capture:
    risks: [exfiltration:data, exfiltration:metadata, collection:data]
    notes: >-
      Creates an image from a VM; images may contain sensitive data.
  generalize:
    risks: [destruction:data, impact:dos]
    notes: >-
      Generalizing can remove machine-specific info; misuse may render systems unusable.
  reimage:
    risks: [destruction:data, impact:dos]
    notes: >-
      Reimages the OS disk; local changes and data can be lost.
  installPatches:
    risks: [impact:dos]
    notes: >-
      Patch operations can require reboots or cause unexpected downtime.
links:
  - https://learn.microsoft.com/azure/role-based-access-control/resource-provider-operations#microsoftcompute
  - https://learn.microsoft.com/azure/virtual-machines/
  - https://learn.microsoft.com/azure/virtual-machines/run-command
