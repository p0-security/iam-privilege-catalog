name: Log Analytics dedicated cluster
description: A Log Analytics dedicated cluster is committed-capacity backing infrastructure for log storage and ingestion across linked workspaces, including customer-managed-key and identity settings.
scope: MEDIUM
notes: Supporting monitoring/log-storage infrastructure with metered committed capacity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - destruction:logs
    notes: Deletes the dedicated cluster, destroying the log-storage backing infrastructure and the ingested log data it retains, disrupting monitoring and incident response.
  read:
    risks:
      - discovery:infra
    notes: Returns cluster configuration (capacity, identity, CMK/encryption settings), reconnaissance of the logging backing infrastructure.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creates/updates the cluster, altering configuration (CMK/encryption, capacity commitment) and provisioning costly committed-tier capacity.
