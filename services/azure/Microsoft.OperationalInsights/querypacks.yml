name: Azure Monitor Query Pack
description: A Query Pack is a container resource that stores reusable Log Analytics KQL queries, allowing teams to share saved monitoring/investigation queries across workspaces.
scope: LOW
notes: A monitoring support artifact; it holds query logic/tooling, not the log data itself, so its inherent sensitivity is low to medium.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: This generic POST action on query packs most plausibly allows modifying the collection of saved KQL query definitions, tampering with the operational query artifacts analysts and dashboards rely on.
    name: Log Analytics resource provider registration
    parent:
      description: Subscription-level action that registers a subscription with the Microsoft.OperationalInsights (Azure Log Analytics) resource provider, enabling use of its APIs.
      notes: Provider registration is an idempotent administrative enablement gate; it grants no data access or access-control change.
  delete:
    risks:
      - destruction:infra
    scope: MEDIUM
    notes: Deleting a query pack removes the saved-query monitoring support resource; it destroys analyst tooling but does not touch ingested log data.
  read:
    risks:
      - discovery:infra
    notes: Reading a query pack returns the saved-query container configuration (the collection of saved KQL queries), an inventory of monitoring tooling rather than log content or secrets.
  write:
    risks:
      - impact:manipulation
    scope: MEDIUM
    notes: Creating or updating a query pack lets an attacker alter saved analyst queries, tampering with operational monitoring/investigation tooling but not the underlying log data.
