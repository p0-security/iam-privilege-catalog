name: Log Analytics workspace table query (generic)
description: The generic data-plane capability to run queries (KQL) over the data of a specific table in an Azure Monitor / Log Analytics workspace.
scope: MEDIUM
notes: Grants per-table query access to ingested log/monitoring data; sensitivity depends on the targeted table but is MEDIUM as a monitoring-data asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Runs queries over the underlying records of a specified workspace table, enabling broad export and enumeration of ingested log content (including potentially sensitive audit/security tables).
