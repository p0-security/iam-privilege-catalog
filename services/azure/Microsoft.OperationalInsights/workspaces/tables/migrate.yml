name: Log Analytics workspace tables
description: A Log Analytics workspace table defines the schema, plan, and retention for a stream of ingested log/telemetry records within a Log Analytics workspace.
scope: MEDIUM
notes: Tables govern monitoring/diagnostic log storage; their configuration controls log retention and availability for detection and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Migrating a table from the V1 to V2 schema variation changes the table's configuration/management model, a low-leverage manipulation of the logging pipeline.
