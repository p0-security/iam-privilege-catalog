name: Log Analytics workspace table configuration
description: A control-plane setting that governs the protection/immutability level applied to a Log Analytics table, controlling tamper-protection safeguards over ingested log data.
scope: MEDIUM
notes: Altering a table's protection configuration affects the integrity guarantees on stored telemetry used for monitoring and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Control-plane write that sets/changes a table's protection level; lowering it weakens tamper/integrity safeguards on the logs and alters the protective configuration of the telemetry pipeline.
