name: Log Analytics workspace data (all tables)
description: The Azure Log Analytics (Microsoft.OperationalInsights) workspace data-plane read entitlement, granting read access to workspace data down to fine-grained tables or rows. Unlike a single per-table read, it can cover every table ingested into the workspace.
scope: MEDIUM
notes: Because the workspace can ingest arbitrary custom tables (application/security/PII data) alongside diagnostic logs, this broad read can reach data beyond pure monitoring telemetry; still MEDIUM as the monitoring-data tier, but the breadth raises exfiltration potential.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - exfiltration:data
    notes: Grants read across all workspace tables/rows, letting an attacker bulk-export and enumerate every ingested log stream and any sensitive application/security data captured in custom tables.
