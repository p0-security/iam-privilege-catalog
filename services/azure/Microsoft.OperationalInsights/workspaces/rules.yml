name: Log Analytics workspace alert rule
description: Alert rules define the monitoring/detection conditions evaluated against workspace data to raise alerts.
scope: LOW
notes: Reading them reveals detection coverage and potential monitoring blind spots.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reads alert rule configuration, letting an attacker learn what activity is monitored/alerted to find blind spots.
