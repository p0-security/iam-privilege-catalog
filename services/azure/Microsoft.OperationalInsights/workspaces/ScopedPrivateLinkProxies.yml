name: Log Analytics workspace scoped Private Link proxy
description: A scoped Private Link proxy represents the private-endpoint network connectivity binding between a workspace and an Azure Monitor Private Link Scope.
scope: MEDIUM
notes: Governs private-network access paths to the monitoring service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deletes the private-link proxy, removing a private-network connectivity component and potentially disrupting private access to the workspace.
  read:
    risks:
      - discovery:network
    notes: Reads private-link connectivity configuration, inventorying the workspace's private network access paths.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creates/updates the private-link proxy, establishing or altering private network connectivity to the workspace (network movement and config manipulation).
