name: Log Analytics storage insight configuration
description: A storage insight configuration links a Log Analytics workspace to an existing storage account, directing the workspace to pull data from a specified location in that storage account for ingestion.
scope: MEDIUM
notes: Supporting monitoring-pipeline configuration; it references a storage account but does not itself return storage credentials or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting the storage insight configuration stops the workspace from reading data from the storage account, disabling that log-collection source and degrading monitoring/detection coverage.
  read:
    risks:
      - discovery:infra
    notes: Gets a storage insight configuration, revealing the linked storage account and ingestion source settings for reconnaissance, without returning data or keys.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a storage insight configuration changes which storage account location the workspace ingests from, altering the monitoring data pipeline.
