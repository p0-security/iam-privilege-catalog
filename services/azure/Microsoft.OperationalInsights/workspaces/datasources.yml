name: Log Analytics workspace data source configuration
description: Data source definitions under a Log Analytics workspace that specify what telemetry/log collection (events, performance counters, syslog, etc.) is configured and from where.
scope: MEDIUM
notes: Controls what the monitoring/detection pipeline collects.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting a data source stops collection of its telemetry stream into the workspace, disrupting log collection and removing a detection/incident-response input.
  read:
    risks:
      - discovery:logs
    notes: Reads a data source configuration, revealing what telemetry/log collection is configured and exposing gaps in monitoring coverage.
  write:
    risks:
      - impact:manipulation
      - destruction:logs
      - destruction:defense
    notes: Upserting a data source alters what telemetry is collected, allowing an attacker to reconfigure or disable log/security-event collection to blind monitoring and evade detection.
