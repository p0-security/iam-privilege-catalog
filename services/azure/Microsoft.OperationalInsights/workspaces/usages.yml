name: Log Analytics workspace usage metrics
description: Aggregate usage/data-volume metrics for a Log Analytics workspace, including the amount of data ingested and read.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reads aggregate ingestion/usage statistics, exposing logging activity volume without revealing log contents.
