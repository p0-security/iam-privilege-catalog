name: Log Analytics scheduled search action
description: The alert/notification action attached to a scheduled saved search in a Log Analytics workspace; defines how a triggered detection notifies or responds.
scope: MEDIUM
notes: The action is the response side of a log alert; altering or removing it suppresses notifications and weakens incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: The operation NAME verb is /delete, removing the action that fires on a scheduled detection alert, disabling alert delivery and aiding evasion; the displayName 'Upsert...' is mislabeled.
  read:
    risks:
      - discovery:logs
    notes: Reads the action configuration tied to a scheduled search, exposing alert/notification wiring for reconnaissance without returning log data.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: The operation NAME verb is /write (create or update scheduled search action per the description), so an attacker can alter or disable the alert response action to suppress/misdirect notifications and manipulate monitoring config; the displayName 'Delete...' is mislabeled.
