name: Log Analytics scheduled saved search
description: A recurring schedule attached to a saved search in a Log Analytics workspace; it periodically runs a KQL query to drive alerting/detection.
scope: MEDIUM
notes: Schedules back log-based alert rules; tampering or removal weakens monitoring/detection coverage.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a scheduled saved search removes a recurring detection/alert query, disabling a monitoring defense and aiding evasion.
  read:
    risks:
      - discovery:logs
    notes: Reads a scheduled saved-search configuration, inventorying what queries/alerts are scheduled without returning log data.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Create/update of a scheduled saved search lets an attacker alter or neuter the detection/alert query and schedule, weakening detection and manipulating monitoring configuration.
