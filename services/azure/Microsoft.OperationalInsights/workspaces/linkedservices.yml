name: Log Analytics workspace linked services
description: A linked service binds a Log Analytics workspace to an external resource such as an Azure Automation account or a dedicated cluster, wiring monitoring/automation integration.
scope: MEDIUM
notes: Integration configuration that references other resources; can connect the workspace to compute/automation identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a linked service severs the workspace's integration with its backing Automation/cluster resource, disrupting the dependent monitoring/automation pipeline.
  write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Upserting a linked service repoints the workspace to an attacker-chosen Automation account/cluster, altering integration config and enabling a pivot into the linked resource's identity/capabilities.
