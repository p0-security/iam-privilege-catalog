name: Log Analytics log restore
description: A restore operation that rehydrates archived/cold log data from a table into a queryable hot restore table in a Log Analytics workspace.
scope: MEDIUM
notes: Surfaces otherwise-inaccessible archived log data and is a metered (restore/storage-billed) operation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - exfiltration:logs
      - impact:spend
    notes: Restoring archived table data into a queryable hot table exposes otherwise-cold log records for export and incurs metered restore/storage cost.
