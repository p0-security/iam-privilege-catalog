name: Log Analytics workspace view
description: "A saved workspace view: a dashboard/visualization definition with embedded queries for monitoring data."
scope: LOW
notes: Operational presentation-layer artifact; does not contain underlying log data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Deleting a view removes a saved dashboard/visualization artifact (operational metadata) without affecting the underlying log data.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a view alters saved dashboards/queries, letting an attacker manipulate the monitoring presentation layer to mislead operators; it does not touch the underlying log data.
