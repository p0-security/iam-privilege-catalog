name: Log Analytics workspace Network Security Perimeter configuration
description: The Network Security Perimeter configuration stored on a Log Analytics workspace, describing the NSP membership and network access rules enforced around the workspace.
scope: MEDIUM
notes: Describes the network-isolation posture of an Azure Monitor / Log Analytics workspace, a monitoring and diagnostics data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Reconcile only re-synchronizes the workspace's stored NSP configuration with the authoritative Microsoft.Network (NRP) copy; it pulls/refreshes state rather than letting the caller set arbitrary perimeter state, granting no meaningful standalone attacker capability.
