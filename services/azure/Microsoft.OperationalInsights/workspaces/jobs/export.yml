name: Log Analytics workspace export job
description: A data-plane action on a Log Analytics workspace that runs a query-based export job, extracting data from the workspace per query and time range to a destination.
scope: MEDIUM
notes: Bulk-export capability spanning all tables in the workspace; monitoring/log-data sensitivity tier, but aggregates the entire telemetry estate.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:logs
      - collection:data
    notes: Runs a query-based export job that bulk-extracts arbitrary workspace query results over a time range to a destination, enabling large-scale automated exfiltration and central collection of all ingested telemetry.
