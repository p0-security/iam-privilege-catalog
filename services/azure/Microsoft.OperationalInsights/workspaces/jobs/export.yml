name: Log Analytics export job
description: Exports data from a workspace for a given query and time range as a one-off bulk job.
scope: HIGH
notes: A bulk read-out of stored log data for arbitrary queries/time ranges; logs may contain sensitive organizational data, so exporting them is HIGH.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:logs
      - exfiltration:data
    notes: Bulk-exports stored logs by query and time range, pulling out telemetry that can include credentials, tokens, and other sensitive data captured in logs.
