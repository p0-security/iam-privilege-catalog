name: Log Analytics workspace log definitions
description: Log definitions enumerate the log categories available for a Log Analytics workspace resource.
scope: LOW
notes: Read-only metadata describing what logging is available; no log content is exposed.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading log definitions enumerates the available log categories for the workspace, read-only reconnaissance of logging capability with no log content returned.
