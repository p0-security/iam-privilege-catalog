name: Log Analytics workspace
description: An Azure Log Analytics workspace is the central data store and management resource for Azure Monitor logs, collecting and retaining telemetry/log data from agents, resources, and Microsoft Sentinel.
scope: MEDIUM
notes: Monitoring/diagnostics asset; it concentrates security and operational telemetry, so tampering with or destroying it enables anti-forensic evasion, but it is scoped to a monitoring function rather than to primary production data or identity controls.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - impact:manipulation
    notes: Returns the workspace ingestion keys exactly like the sharedkeys action, exposing credential material usable to submit falsified log data into the workspace.
  read:
    risks:
      - exfiltration:crypto
      - impact:manipulation
    scope: HIGH
    notes: Despite the /read suffix this returns the workspace shared keys (credential material), so it is cryptographic exfiltration; the keys let an attacker authenticate as an agent and inject or forge log data into the workspace (impact:manipulation).
    name: Log Analytics workspace shared keys
