name: Service Map client group members
description: A Service Map / VM Insights workspace feature that returns the member machines/processes of a client group, i.e. hosts observed communicating with a monitored resource.
scope: MEDIUM
notes: Exposes network connection topology derived from monitoring; reconnaissance metadata rather than raw log content. Scope MEDIUM as a monitoring asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Returns the set of clients/hosts connecting to a monitored resource, inventorying network communication topology for reconnaissance.
