name: Log Analytics workspace query (all tables)
description: The data-plane capability to run arbitrary KQL queries over ALL data ingested into an Azure Log Analytics workspace, spanning every table the workspace collects.
scope: MEDIUM
notes: Broadest query capability over the workspace; can return any ingested telemetry, including security alerts, audit/sign-in logs, and any sensitive data captured in logs.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - exfiltration:data
    notes: Grants arbitrary queries across every table, enabling wholesale export of all collected logs (exfiltration:logs), full enumeration of what is being logged (discovery:logs), and extraction of sensitive data (credentials, PII, configuration) captured within those logs (exfiltration:data).
