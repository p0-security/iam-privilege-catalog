name: Log Analytics workspace query schema (Analytics)
description: The query schema read returns the tables and fields available for KQL search in a Log Analytics workspace, describing the log structure without returning records.
scope: LOW
notes: Read-only metadata about what log types and columns exist.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading the API search schema enumerates the workspace's tables/fields, inventorying available log structure without disclosing the data.
