name: Log Analytics IdentityLogonEvents table
description: A log table in a Log Analytics workspace storing identity logon/authentication event telemetry (accounts, source hosts/IPs, logon outcomes).
scope: MEDIUM
notes: Authentication telemetry revealing which accounts authenticate where.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reading the table exfiltrates logon event telemetry and inventories the accounts authenticating in the environment, aiding target selection.
