name: Log Analytics ASimAssetEntityLogs table
description: A Log Analytics workspace table holding ASIM-normalized asset/entity records (an inventory of hosts, devices, and resources known to the environment). It is security monitoring data within an Azure Monitor / Microsoft Sentinel workspace.
scope: MEDIUM
notes: Normalized security telemetry that inventories organizational assets; medium sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Read exports the normalized asset/entity log content (exfiltration:logs) and inventories the organization's assets and infrastructure entities for reconnaissance (discovery:infra).
