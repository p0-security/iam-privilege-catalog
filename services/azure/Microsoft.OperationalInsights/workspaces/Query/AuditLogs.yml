name: Log Analytics AuditLogs table
description: A Log Analytics workspace data-plane table holding Entra ID / Azure AD audit log records of directory, identity and configuration-change activity.
scope: MEDIUM
notes: Per-table data-plane read permission; audit log content can expose identity, role/permission and policy-change activity useful for targeting.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads directory/audit log records, exporting identity and administrative activity history.
