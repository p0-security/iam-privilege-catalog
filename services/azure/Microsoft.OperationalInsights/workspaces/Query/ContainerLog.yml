name: Log Analytics ContainerLog table
description: A Log Analytics workspace data table holding ContainerLog records — stdout/stderr application log output collected from monitored containers.
scope: MEDIUM
notes: Container application output frequently embeds secrets, tokens, or sensitive runtime data, so the asset is MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads container stdout/stderr application logs, exporting output that frequently contains secrets, tokens, or sensitive application data.
