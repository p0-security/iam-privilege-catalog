name: Log Analytics workspace table (Confidential Ledger user-defined logs)
description: A Log Analytics workspace data-plane table storing user-defined Azure Confidential Ledger entries. Read access returns the table's records.
scope: MEDIUM
notes: User-defined ledger entries hold application-specific confidential records the ledger was designed to protect.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - exfiltration:data
    notes: Reading the table exports user-defined ledger records (exfiltration:logs) whose arbitrary application content may carry sensitive organizational data (exfiltration:data).
