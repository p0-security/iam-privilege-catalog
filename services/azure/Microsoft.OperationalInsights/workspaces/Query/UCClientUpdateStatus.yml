name: Log Analytics UCClientUpdateStatus table
description: A Log Analytics workspace data-plane query against the UCClientUpdateStatus table, recording per-client update-installation status in Update Compliance.
scope: MEDIUM
notes: Monitoring/diagnostics data revealing which devices are unpatched or pending updates.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading the table exports per-client patch status and exposes unpatched, likely-vulnerable hosts.
