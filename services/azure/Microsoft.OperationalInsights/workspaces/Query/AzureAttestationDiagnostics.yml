name: Azure Attestation diagnostics log table (Log Analytics)
description: A Log Analytics workspace query data-plane permission scoped to the AzureAttestationDiagnostics table, which stores Azure Attestation service diagnostic telemetry ingested into the workspace.
scope: MEDIUM
notes: Diagnostic logs for the attestation service may disclose attestation policy evaluations and operational identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Exports attestation-service diagnostic records and inventories the logged service activity; limited further capability in isolation.
