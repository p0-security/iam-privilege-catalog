name: Log Analytics workspace table (AzureLoadTestingOperation)
description: A specific table in an Azure Log Analytics (Azure Monitor) workspace, queried via the data plane, holding Azure Load Testing operation log records.
scope: MEDIUM
notes: Monitoring/operational log data of a single service; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports load-testing operation log records (exfiltration:logs) and inventories the logged operational activity (discovery:logs).
