name: Log Analytics DeviceCustomNetworkEvents log table
description: A Log Analytics workspace data-plane query permission scoped to the DeviceCustomNetworkEvents table, which holds ingested Microsoft Defender for Endpoint network-connection telemetry (destinations, IPs, communication patterns).
scope: MEDIUM
notes: Endpoint security event telemetry; exposes network connections and topology observed on monitored devices.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading this table exports endpoint network-event logs that reveal connection destinations, IPs, and network relationships.
