name: Log Analytics workspace query table (EGNMqttDisconnections)
description: A specific log table within an Azure Log Analytics workspace recording Event Grid Namespace MQTT disconnection events; this data-plane read returns the stored records.
scope: MEDIUM
notes: Monitoring/diagnostics data (MEDIUM). Content may include client identifiers and connection-lifecycle metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports MQTT-disconnection telemetry (exfiltration:logs) and enumerates client connection-lifecycle log entries (discovery:logs).
