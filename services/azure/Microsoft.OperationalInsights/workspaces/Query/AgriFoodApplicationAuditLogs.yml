name: Log Analytics AgriFoodApplicationAuditLogs table
description: A Log Analytics workspace data-plane table holding Azure Data Manager for Agriculture application audit telemetry. Reading it returns the stored application audit log rows.
scope: MEDIUM
notes: Monitoring/audit log data tier; records user/application actions and may disclose actor identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read exports Data Manager for Agriculture application audit records, disclosing user/application activity and actor details.
