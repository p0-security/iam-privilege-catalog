name: Log Analytics NWConnectionMonitorTestResult table
description: A Log Analytics workspace query table holding Azure Network Watcher Connection Monitor test results, recording connectivity-test outcomes and reachability across monitored endpoints.
scope: MEDIUM
notes: Network monitoring telemetry; MEDIUM sensitivity but enumerates monitored endpoints and reachability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Read returns connectivity-test results, exporting telemetry that enumerates monitored endpoints and network reachability.
