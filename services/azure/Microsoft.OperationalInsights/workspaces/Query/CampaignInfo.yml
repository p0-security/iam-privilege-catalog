name: Log Analytics workspace table data (CampaignInfo)
description: A Log Analytics workspace table queried via the data plane; this table (CampaignInfo) holds Microsoft Defender / Sentinel attack-campaign (e.g. phishing-campaign) detection records ingested into the Azure Monitor workspace.
scope: MEDIUM
notes: Monitoring/security data. Reading it exports security detection/investigation telemetry, which can reveal what defenders have detected.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns security attack-campaign detection rows, exporting security telemetry and revealing which campaigns defenders have correlated.
