name: Azure Firewall network-rule log table (Log Analytics)
description: A Log Analytics workspace query data-plane permission scoped to the AZFWNetworkRule table, which stores Azure Firewall network-rule (L3/L4) connection telemetry ingested into the workspace.
scope: MEDIUM
notes: Network-rule logs contain source/destination IPs, ports, protocols, and allow/deny verdicts that map topology and firewall posture.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - discovery:network
    notes: Exports per-connection allow/deny records with source/destination IPs and ports, disclosing network topology and firewall rule effects.
