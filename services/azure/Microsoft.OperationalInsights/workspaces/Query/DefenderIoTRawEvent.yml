name: Log Analytics workspace query table (DefenderIoTRawEvent)
description: A queryable Log Analytics table within an Azure Monitor workspace holding ingested Microsoft Defender for IoT raw security-event telemetry. This is a data-plane (isDataAction) read scoped to a single table.
scope: MEDIUM
notes: Security/monitoring telemetry; confidential operational log data rather than a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports raw Defender for IoT security telemetry, which may reveal device/network detail and the extent of IoT detection coverage.
