name: Log Analytics workspace query table (ProjectActivity)
description: A specific table in an Azure Log Analytics workspace, queried over the data plane via KQL. This table holds project/operational activity telemetry ingested into the workspace.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic data; MEDIUM sensitivity per the scope guide.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns ingested project/activity telemetry rows, exporting stored operational log content.
