name: Log Analytics workspace table (GCPDNS)
description: A Log Analytics workspace table accessed via the data-plane query interface; this table holds ingested GCP DNS log records. Reading it returns the actual log records.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostics data (MEDIUM tier).
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - discovery:network
    notes: Exporting GCP DNS logs discloses domain resolution activity, internal hostnames, and network topology useful for reconnaissance.
