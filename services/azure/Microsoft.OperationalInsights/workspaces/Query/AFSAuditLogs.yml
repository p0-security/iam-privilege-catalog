name: Log Analytics workspace table (AFSAuditLogs)
description: A per-table data-plane read permission on an Azure Log Analytics workspace, scoped to a single named table. AFSAuditLogs holds Azure File Sync audit records.
scope: MEDIUM
notes: Log Analytics tables store collected monitoring telemetry; read-only data-plane access confined to one table is monitoring-grade sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports file-sync audit records that may expose user/file access patterns and operational identifiers.
