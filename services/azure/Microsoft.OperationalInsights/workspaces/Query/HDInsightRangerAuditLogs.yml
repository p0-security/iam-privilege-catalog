name: Log Analytics HDInsight query table (Ranger audit logs)
description: A Log Analytics workspace query-scoped table holding HDInsight Apache Ranger authorization-audit records ingested via diagnostic settings. The data-plane read returns the stored audit rows.
scope: MEDIUM
notes: Monitoring/diagnostics asset tier. Audit records capture access/authorization decisions (who accessed what, allow/deny), useful for evasion reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Reading this table exports Ranger access-authorization audit records, letting an attacker learn what is monitored and exfiltrate the audit/security log content.
