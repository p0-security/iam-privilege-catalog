name: Log Analytics workspace table (DHOSReliability)
description: A specific table inside an Azure Monitor Log Analytics workspace; this resource type controls data-plane query access to the DHOSReliability table, which stores OS reliability / device-health telemetry from managed devices.
scope: MEDIUM
notes: Monitoring/diagnostics asset; MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning OS reliability telemetry rows, enabling export of stored diagnostic log content.
