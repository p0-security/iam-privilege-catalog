name: Log Analytics Anomalies table
description: A Log Analytics workspace data-plane table holding security/UEBA anomaly-detection results (commonly Microsoft Sentinel) ingested into Azure Monitor.
scope: MEDIUM
notes: Contains defensive detection findings; reading reveals what suspicious activity has been flagged, aiding detection evasion.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reads the Anomalies table, letting an attacker both export detection records and inventory which of their activities have been flagged to evade defenses.
