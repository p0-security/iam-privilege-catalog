name: Log Analytics workspace table (NCBMBreakGlassAuditLogs)
description: A single Azure Log Analytics (Microsoft.OperationalInsights) workspace query table. Data-plane reads return the actual ingested log/telemetry records stored in that table within the monitoring workspace.
scope: MEDIUM
notes: This table holds Nexus break-glass (emergency privileged-access) audit records; reading it exposes which emergency/privileged accounts exist and when they were used, identifying high-value targets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns break-glass emergency-access audit records, exporting sensitive privileged-access audit content and revealing emergency-admin usage patterns and timing.
