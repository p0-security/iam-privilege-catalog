name: Log Analytics workspace query table (MNFSystemStateMessageUpdates)
description: A specific log table within an Azure Log Analytics workspace recording Managed Network Fabric system-state message events; this data-plane read returns the stored records.
scope: MEDIUM
notes: Monitoring/diagnostics data (MEDIUM). Content reveals network-fabric system state and topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading this table exports network-fabric system-state logs (exfiltration:logs) and reveals fabric state/topology useful for network reconnaissance (discovery:network).
