name: Log Analytics workspace HDInsightStormLogs table
description: A Log Analytics workspace query table holding raw HDInsight Storm topology log entries ingested from an Azure HDInsight Storm cluster.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry for a single streaming-analytics workload; raw log lines may embed processed-stream data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports raw Storm log entries that may contain sensitive operational content.
