name: Log Analytics KubePodInventory table
description: A log table in a Log Analytics workspace storing the Kubernetes/AKS pod inventory (pod/container names, images, namespaces, state) collected by Container Insights.
scope: MEDIUM
notes: Explicit workload inventory revealing running pods, containers, and images.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading the table exfiltrates pod-inventory telemetry and inventories the workloads and container topology running in the cluster.
