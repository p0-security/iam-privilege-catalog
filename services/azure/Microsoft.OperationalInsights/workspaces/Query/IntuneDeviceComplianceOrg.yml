name: Log Analytics IntuneDeviceComplianceOrg table
description: A log table in a Log Analytics workspace storing organization-wide Intune managed-device compliance state (device IDs, OS, compliance/security posture).
scope: MEDIUM
notes: Reveals the managed-device fleet and which endpoints are weakly protected.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading the table exfiltrates device-compliance telemetry and inventories the managed-device fleet and its security posture for endpoint targeting.
