name: Log Analytics workspace table (AppPlatformSystemLogs)
description: A queryable table within an Azure Log Analytics workspace holding Azure Spring Apps platform system logs.
scope: MEDIUM
notes: Monitoring/diagnostics data about platform-level operational events.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports platform system logs revealing operational and diagnostic details about the service.
