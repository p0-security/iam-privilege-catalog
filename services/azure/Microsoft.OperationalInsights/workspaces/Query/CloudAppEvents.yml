name: Log Analytics CloudAppEvents table
description: A Log Analytics workspace data table holding CloudAppEvents records — Microsoft Defender for Cloud Apps activity telemetry of user and SaaS-application actions.
scope: MEDIUM
notes: Centralized audit trail of user/app activity; can expose sensitive behavioral detail and identifiers, so the asset is MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads Defender for Cloud Apps activity events, exporting a centralized audit trail of user and application activity across SaaS apps.
