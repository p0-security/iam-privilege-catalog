name: Log Analytics workspace table (EmailPostDeliveryEvents)
description: A specific table inside an Azure Monitor Log Analytics workspace; this resource type controls data-plane query access to the EmailPostDeliveryEvents table (Microsoft Defender for Office 365), which stores post-delivery email security actions such as ZAP/remediation events on delivered mail.
scope: MEDIUM
notes: Security-monitoring telemetry revealing email-handling and remediation activity; MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning post-delivery email security action rows, enabling export of remediation/ZAP telemetry on organizational mail.
