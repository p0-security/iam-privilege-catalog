name: Log Analytics workspace table (AZMSHybridConnectionsEvents)
description: A Log Analytics workspace query table holding Azure Relay hybrid-connection event logs for messaging services. Reading it returns the stored connection-event records via the data plane.
scope: MEDIUM
notes: Connectivity diagnostic data; MEDIUM-sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports hybrid-connection event log content (exfiltration:logs) and enumerates the relay activity logged (discovery:logs).
