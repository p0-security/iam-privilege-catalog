name: Log Analytics table data (AHDSDicomAuditLogs)
description: A single Log Analytics workspace table holding Azure Health Data Services DICOM audit telemetry. A data-plane read returns the actual log rows for this table.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic assets (MEDIUM tier). DICOM audit content records who accessed which medical imaging resources, but does NOT contain the imaging data (PHI) itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports DICOM access-audit records (caller identities, accessed studies); it reveals PHI-access patterns but returns audit metadata, not the medical images themselves.
