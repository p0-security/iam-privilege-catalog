name: Log Analytics workspace table data (MDCDetectionK8SApiEvents)
description: A per-table data-plane query permission on a Log Analytics workspace; this one returns rows of the MDCDetectionK8SApiEvents table, which holds Microsoft Defender for Cloud Kubernetes API detection events.
scope: MEDIUM
notes: Security-detection telemetry revealing cluster activity and detection coverage; monitoring/log-data sensitivity tier.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reads Defender for Cloud K8s API detection event rows, exporting security-detection log content and revealing cluster activity and what defenders detect (reading does not disable detection).
