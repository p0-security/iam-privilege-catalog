name: Log Analytics workspace table (DSMDataLabelingLogs)
description: A specific table inside an Azure Monitor Log Analytics workspace; this resource type controls data-plane query access to the DSMDataLabelingLogs table, which stores data-labeling logs disclosing sensitivity labels applied to organizational data.
scope: MEDIUM
notes: Monitoring asset whose contents reveal the location and sensitivity of confidential data; MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:data
    notes: Data-plane read returning data-labeling logs; exports the content and reveals where labeled/sensitive data resides, aiding targeting.
