name: Log Analytics AADServicePrincipalSignInLogs table
description: A Log Analytics workspace data-plane table holding Entra ID service-principal sign-in telemetry (which service principals authenticated to which resources/IPs).
scope: MEDIUM
notes: Monitoring/diagnostics identity telemetry; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reading this table exports service-principal sign-in records, enumerating non-human identities and their authentication activity as lateral-movement reconnaissance.
