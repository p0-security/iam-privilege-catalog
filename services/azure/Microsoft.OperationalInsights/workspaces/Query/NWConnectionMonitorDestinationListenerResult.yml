name: Log Analytics NWConnectionMonitorDestinationListenerResult table
description: A Log Analytics workspace query table holding Azure Network Watcher Connection Monitor destination listener results, recording connectivity telemetry to monitored destination endpoints.
scope: MEDIUM
notes: Network monitoring telemetry; MEDIUM sensitivity but enumerates endpoints and reachability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Read returns connection-monitor listener results, exporting telemetry that enumerates destination endpoints and network reachability.
