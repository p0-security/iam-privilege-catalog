name: Log Analytics workspace table (ACSCallClientServiceRequestAndOutcome)
description: A single named table within an Azure Log Analytics (Operational Insights) workspace, queried via the data plane. This table stores Azure Communication Services call-client service request and outcome telemetry.
scope: MEDIUM
notes: These records contain call/communication metadata and may include participant identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reading this table exports ACS call-client service request/outcome records, which may contain participant identifiers and call metadata.
