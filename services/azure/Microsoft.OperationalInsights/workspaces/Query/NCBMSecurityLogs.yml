name: Log Analytics workspace table (NCBMSecurityLogs)
description: A per-table data-plane read permission on an Azure Log Analytics workspace, scoped to a single named table. NCBMSecurityLogs holds Nexus Cloud bare-metal security event telemetry.
scope: MEDIUM
notes: Log Analytics tables store collected monitoring/security telemetry; read-only data-plane access confined to one table is monitoring-grade sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports bare-metal security event telemetry that can reveal defensive posture and sensitive host events.
