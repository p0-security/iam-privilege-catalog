name: Log Analytics HDInsight query table (Spark executor events)
description: A Log Analytics workspace query-scoped table holding HDInsight Spark executor-event log records ingested via diagnostic settings. The data-plane read returns the stored rows.
scope: MEDIUM
notes: Monitoring/diagnostics asset tier. Executor lifecycle/task runtime telemetry with limited sensitive content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Reading this table exports Spark executor lifecycle/task event telemetry and lets the holder inventory logged cluster workload behavior.
