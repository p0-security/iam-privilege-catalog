name: Log Analytics workspace table (AHDSDicomDiagnosticLogs)
description: A Log Analytics workspace query table that stores diagnostic logs for Azure Health Data Services DICOM (medical imaging) service activity. Reading it returns the stored log records via the data plane.
scope: MEDIUM
notes: Diagnostic/monitoring log data; MEDIUM-sensitivity. Healthcare-service logs may reference access patterns and identifiers but not the imaging data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read returns DICOM diagnostic log content (exfiltration:logs) and enumerates the logged service activity (discovery:logs).
