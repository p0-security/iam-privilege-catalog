name: Log Analytics workspace query table (LinuxAuditLog)
description: A specific table within an Azure Monitor / Log Analytics workspace. The LinuxAuditLog table holds Linux auditd security event records (authentication, sudo, command execution, syscalls) from monitored hosts.
scope: MEDIUM
notes: Log Analytics tables are data-plane monitoring stores; per-table read permissions scope access to one table's collected telemetry. Sensitivity is MEDIUM (monitoring/diagnostics data).
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reads collected auditd security telemetry, exfiltrating sensitive host security logs (auth/sudo/command activity) that may also reveal account and host activity.
