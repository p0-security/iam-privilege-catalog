name: Log Analytics SPAssessmentRecommendation table
description: A Log Analytics workspace table holding SharePoint (on-premises) assessment recommendation records ingested into Azure Monitor.
scope: MEDIUM
notes: Assessment-recommendation logs surface configuration posture and security/best-practice findings about the SharePoint farm; confidential operational data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Read returns the SharePoint assessment recommendation rows, exporting log content exposing SharePoint farm configuration and posture findings.
