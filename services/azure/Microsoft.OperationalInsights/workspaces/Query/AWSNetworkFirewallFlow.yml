name: Log Analytics workspace table data (AWSNetworkFirewallFlow)
description: A per-table data-plane query permission on a Log Analytics workspace; this one returns rows of the AWSNetworkFirewallFlow table, which holds AWS Network Firewall flow logs ingested into the workspace.
scope: MEDIUM
notes: Network flow telemetry exposing source/destination IPs, ports, and traffic patterns; monitoring/log-data sensitivity tier.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reads AWS Network Firewall flow log rows, exporting connection-level network telemetry and mapping hosts, ports, and traffic relationships across the network.
