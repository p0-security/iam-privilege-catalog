name: Log Analytics workspace table (EdgeActionServiceLog)
description: A Log Analytics workspace query table holding ingested edge-action service-side telemetry. Reading it is a data-plane operation returning the stored log rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores of MEDIUM sensitivity; service logs can carry operational and request detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Exports edge-action service-side log records that may contain operational and request/execution detail.
