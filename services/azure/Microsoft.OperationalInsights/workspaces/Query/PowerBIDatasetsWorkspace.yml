name: Log Analytics workspace query table (PowerBIDatasetsWorkspace)
description: A specific table in an Azure Log Analytics workspace, queried over the data plane via KQL. This table holds workspace-scoped Power BI dataset activity/usage telemetry.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic data; MEDIUM sensitivity per the scope guide.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns workspace-scoped Power BI dataset activity records, exporting monitoring log content.
