name: Log Analytics workspace query table (Azure Digital Twins operation)
description: A Log Analytics workspace query table holding ingested Azure Digital Twins twin-operation log records. Reading it is a data-plane operation returning the stored log row content.
scope: MEDIUM
notes: Monitoring/diagnostics data is MEDIUM-sensitivity confidential operational telemetry that can reveal modeled environment structure and activity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns ADT twin-operation rows, exporting twin-lifecycle telemetry that can reveal the modeled environment's structure and activity.
