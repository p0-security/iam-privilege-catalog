name: Log Analytics workspace table data
description: A queryable table within an Azure Log Analytics (Monitor) workspace holding ingested monitoring/diagnostic telemetry. This data-plane read operation returns the row-level records of one specific table in the workspace.
scope: MEDIUM
notes: Monitoring/diagnostics asset; log content can contain sensitive operational identifiers, security telemetry, and reconnaissance-useful infrastructure detail, but is not a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns MCVP audit-log records (actor/action security-relevant events), which an attacker can export to map administrative activity and aid evasion.
