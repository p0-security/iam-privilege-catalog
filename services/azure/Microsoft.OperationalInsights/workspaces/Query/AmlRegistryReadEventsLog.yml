name: Log Analytics AmlRegistryReadEventsLog table
description: A Log Analytics workspace table holding Azure Machine Learning registry read-event audit logs (who accessed which ML registry assets and when). Reading it returns the stored log rows.
scope: MEDIUM
notes: Monitoring data is MEDIUM scope; reveals ML asset access patterns and identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Exports ML registry access audit logs revealing which identities read which models/artifacts and when.
