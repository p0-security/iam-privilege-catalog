name: Log Analytics ACSCallDiagnosticsUpdates table
description: A Log Analytics workspace query table holding Azure Communication Services call-diagnostics telemetry ingested into Azure Monitor.
scope: MEDIUM
notes: Call-diagnostics telemetry; records may contain participant identifiers and call metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read of the ACSCallDiagnosticsUpdates table exports call-diagnostics telemetry that may include participant/call metadata.
