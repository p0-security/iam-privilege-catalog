name: Log Analytics workspace query table (ADF SSIS package executable statistics)
description: A Log Analytics workspace query table holding ingested Azure Data Factory SSIS package executable-statistics log records. Reading it is a data-plane operation returning the stored log row content.
scope: MEDIUM
notes: Monitoring/diagnostics data is MEDIUM-sensitivity confidential operational telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns SSIS executable-statistics rows, exporting pipeline-execution telemetry from the workspace.
