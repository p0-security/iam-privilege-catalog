name: Log Analytics workspace table (WVDMultiLinkAdd)
description: A Log Analytics workspace query table holding ingested Azure/Windows Virtual Desktop multi-link add (session/connection) event telemetry. Reading it is a data-plane operation returning the stored log rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores of MEDIUM sensitivity; VDI connection logs can reveal session and network details.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Exports virtual-desktop connection/session event records revealing session and connectivity activity.
