name: Log Analytics AmlComputeInstanceEvent table
description: A queryable Azure Log Analytics workspace table holding Azure Machine Learning compute-instance event telemetry ingested for monitoring.
scope: MEDIUM
notes: Monitoring/diagnostic log data scoped to a single ML function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads compute-instance event log records, exporting instance lifecycle telemetry.
