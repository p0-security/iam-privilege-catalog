name: Log Analytics AmlInferencingEvent table
description: A queryable Azure Log Analytics workspace table holding Azure Machine Learning inferencing event telemetry ingested for monitoring.
scope: MEDIUM
notes: Monitoring/diagnostic log data scoped to a single ML function; may reveal model usage and request metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads inferencing event log records, exporting model inference activity telemetry.
