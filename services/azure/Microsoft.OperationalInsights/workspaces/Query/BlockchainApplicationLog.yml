name: Log Analytics workspace table (BlockchainApplicationLog)
description: A specific table in an Azure Log Analytics (Azure Monitor) workspace, queried via the data plane, holding blockchain application log records.
scope: MEDIUM
notes: Operational/application log data of a single service; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports blockchain application log content (exfiltration:logs) and enumerates the logged application activity (discovery:logs).
