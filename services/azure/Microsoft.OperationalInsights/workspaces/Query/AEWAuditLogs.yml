name: Log Analytics AEWAuditLogs table
description: A Log Analytics workspace data-plane table holding audit-log records of administrative/operational activity. Reading it returns the stored audit log rows.
scope: MEDIUM
notes: Monitoring/audit log data tier; records who-did-what and can disclose actor identities and activity history.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read exports audit-log records of administrative/operational activity, disclosing actor identities and activity history useful for reconnaissance.
