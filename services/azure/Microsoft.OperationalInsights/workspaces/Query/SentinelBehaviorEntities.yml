name: Log Analytics workspace query table (SentinelBehaviorEntities)
description: A per-table data-plane read permission on a Log Analytics workspace, granting query access to the rows of one specific log/telemetry table ingested into the workspace.
scope: MEDIUM
notes: Log Analytics tables hold ingested monitoring, security, and application telemetry. Sensitivity is MEDIUM (monitoring/diagnostic data), though individual tables can contain confidential operational detail, command lines, identifiers, or security-detection context.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reads Sentinel UEBA behavioral-entity telemetry that profiles users/hosts, exporting the security analytics and enumerating identities and their behavior as compromise targets.
