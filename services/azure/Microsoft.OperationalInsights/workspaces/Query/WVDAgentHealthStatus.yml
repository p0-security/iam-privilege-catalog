name: Log Analytics WVDAgentHealthStatus table
description: A Log Analytics workspace table holding Azure Virtual Desktop session-host agent health telemetry. Reading it is a data-plane query over collected monitoring logs.
scope: MEDIUM
notes: Reveals session-host inventory and operational state of the VDI environment.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Exports AVD agent health telemetry describing session-host state.
