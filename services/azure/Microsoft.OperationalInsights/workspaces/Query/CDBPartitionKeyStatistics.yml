name: Log Analytics workspace query table (Cosmos DB telemetry)
description: A specific log/telemetry table (CDBPartitionKeyStatistics) within an Azure Log Analytics workspace, holding Azure Cosmos DB partition-key statistics diagnostic data ingested for monitoring and analysis.
scope: MEDIUM
notes: Monitoring/diagnostics asset. Log content can reveal operational identifiers and usage patterns but is not a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: This data-plane read returns the contents of the CDBPartitionKeyStatistics table, letting an attacker export collected Cosmos DB partition-key diagnostic telemetry (logs exfiltration).
