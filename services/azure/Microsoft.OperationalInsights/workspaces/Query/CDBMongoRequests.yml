name: Log Analytics workspace table (CDBMongoRequests)
description: A specific table in an Azure Log Analytics (Azure Monitor) workspace, queried via the data plane, holding Azure Cosmos DB Mongo-API request log records.
scope: MEDIUM
notes: Per-request log telemetry exposing commands, collection targets, callers, and access patterns; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports Cosmos DB Mongo-API request log records revealing access patterns (exfiltration:logs) and enumerates the logged data-access activity (discovery:logs).
