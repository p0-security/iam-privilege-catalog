name: Log Analytics AWSCloudTrail table
description: A Log Analytics workspace data-plane table holding ingested AWS CloudTrail audit log records (cross-cloud API and identity activity).
scope: MEDIUM
notes: Per-table data-plane read permission; cross-cloud audit content can reveal AWS principals, API activity and resource operations.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads ingested AWS CloudTrail records, exporting cross-cloud control-plane audit history that exposes AWS identities and API activity.
