name: Log Analytics workspace table (AppPlatformContainerEventLogs)
description: A queryable table within an Azure Log Analytics workspace holding Azure Spring Apps container event logs collected from the platform.
scope: MEDIUM
notes: Monitoring/diagnostics data about container lifecycle and runtime behavior.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports container lifecycle/event telemetry about the running platform.
