name: Log Analytics MAOfficeAddinHealthEventNRT log table
description: A Log Analytics workspace data-plane query permission scoped to the MAOfficeAddinHealthEventNRT table, which holds ingested Microsoft 365 Office add-in health-event/diagnostic telemetry.
scope: MEDIUM
notes: Low-sensitivity operational application telemetry confined to a single source.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reading this table exports Office add-in health telemetry; little directly actionable beyond operational identifiers.
