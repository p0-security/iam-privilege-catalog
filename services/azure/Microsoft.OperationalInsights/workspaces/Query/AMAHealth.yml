name: Log Analytics AMAHealth table
description: A Log Analytics workspace table holding Azure Monitor Agent (AMA) health/heartbeat telemetry. It is operational diagnostic data within an Azure Monitor / Log Analytics workspace.
scope: MEDIUM
notes: Low-sensitivity agent health/diagnostics; its value is mapping monitoring coverage and unmonitored blind spots.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading agent health telemetry reveals which hosts have a functioning Azure Monitor Agent, letting an attacker map monitoring coverage and find logging blind spots; the content itself is not substantive log data worth exfiltrating.
