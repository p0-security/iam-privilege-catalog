name: Log Analytics workspace query table (MNFDeviceUpdates)
description: A specific log table within an Azure Log Analytics workspace recording Managed Network Fabric device-update events; this data-plane read returns the stored records.
scope: MEDIUM
notes: Monitoring/diagnostics data (MEDIUM). Content can reveal network-device inventory and configuration state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading this table exports network-fabric device-update logs (exfiltration:logs) and discloses network device inventory/configuration (discovery:network).
