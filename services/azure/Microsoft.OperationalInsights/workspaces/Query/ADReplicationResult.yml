name: Log Analytics workspace query table (AD replication result)
description: A Log Analytics workspace query table holding ingested Active Directory replication-result log records. Reading it is a data-plane operation returning the stored log row content.
scope: MEDIUM
notes: Identity-infrastructure telemetry is confidential and can reveal domain-controller topology and replication state, but as monitoring log content it remains MEDIUM-sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns AD replication-result rows, exporting directory-health telemetry that can disclose domain-controller topology and replication state.
