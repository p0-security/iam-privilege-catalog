name: Log Analytics NWConnectionMonitorDNSResult table
description: A Log Analytics workspace query table holding Azure Network Watcher Connection Monitor DNS resolution results, recording name-resolution telemetry from connectivity monitoring.
scope: MEDIUM
notes: Network monitoring telemetry; MEDIUM sensitivity but exposes internal hostnames and resolution topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Read returns DNS-resolution monitoring results, exporting telemetry that reveals resolved hosts and name-resolution topology.
