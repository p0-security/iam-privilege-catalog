name: Log Analytics WVDConnectionNetworkData table
description: A Log Analytics workspace table holding Azure Virtual Desktop connection network telemetry (latency, gateway, transport, endpoint addressing). Reading it is a data-plane query over collected monitoring logs.
scope: MEDIUM
notes: Connection network metrics reveal routing details and connection patterns.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Exports AVD connection network metrics (latency, gateway, addresses) supporting network reconnaissance.
