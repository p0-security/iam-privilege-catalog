name: Log Analytics AADDomainServicesPrivilegeUse table
description: A Log Analytics workspace data-plane table holding Azure AD Domain Services privilege-use audit events (invocation of elevated/sensitive privileges).
scope: MEDIUM
notes: Monitoring/diagnostics identity telemetry; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reading this table exports privilege-use audit records identifying which accounts hold and exercise elevated privileges, marking high-value escalation targets.
