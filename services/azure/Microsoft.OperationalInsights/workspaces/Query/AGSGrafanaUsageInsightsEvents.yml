name: Log Analytics AGSGrafanaUsageInsightsEvents table
description: A Log Analytics workspace query table holding Azure Managed Grafana usage-insights event telemetry ingested into Azure Monitor.
scope: MEDIUM
notes: Usage telemetry; records may contain dashboard usage and access patterns/metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read of the AGSGrafanaUsageInsightsEvents table exports Grafana usage telemetry from the workspace.
