name: Log Analytics GCPCDN log table
description: A Log Analytics workspace data-plane query permission scoped to the GCPCDN table, which holds ingested Google Cloud CDN access/edge logs (request paths, client IPs, edge traffic detail) collected into the Azure Monitor workspace.
scope: MEDIUM
notes: Monitoring/log data confined to a single telemetry source; sensitivity is confidential operational data rather than production secrets or identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading this table exports CDN access logs and reveals CDN endpoints, client IPs, and request/network topology.
