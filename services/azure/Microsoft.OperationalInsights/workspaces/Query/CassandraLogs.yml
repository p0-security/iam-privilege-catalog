name: Log Analytics workspace table (CassandraLogs)
description: A specific table in an Azure Log Analytics (Azure Monitor) workspace, queried via the data plane, holding Cassandra database operational/diagnostic log records.
scope: MEDIUM
notes: Operational database log data of a single service; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports Cassandra operational log content (exfiltration:logs) and enumerates the logged database operations (discovery:logs).
