name: Azure assessment-recommendation log table (Log Analytics)
description: A Log Analytics workspace query data-plane permission scoped to the AzureAssessmentRecommendation table, which stores posture/assessment recommendation findings ingested into the workspace.
scope: MEDIUM
notes: Assessment-recommendation logs surface known misconfigurations, security gaps, and infrastructure weaknesses an attacker can target.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Exports posture/recommendation findings that reveal identified weaknesses and misconfigurations across resources, useful for targeting.
