name: Log Analytics workspace table (AppServiceEnvironmentPlatformLogs)
description: A queryable table within an Azure Log Analytics workspace holding App Service Environment platform logs.
scope: MEDIUM
notes: Monitoring/diagnostics data about the hosting environment's operational events.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports ASE platform logs revealing infrastructure-level operational diagnostics.
