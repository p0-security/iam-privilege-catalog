name: Log Analytics MicrosoftGraphActivityLogs table
description: A Log Analytics workspace table holding Microsoft Graph API activity logs (caller identities, app IDs, requested endpoints) auditing tenant identity/API calls. Reading it returns the stored log rows.
scope: MEDIUM
notes: Monitoring data is MEDIUM scope; identity-activity telemetry aids account reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Exports Graph API call records that reveal which principals/apps called which endpoints, enabling inventory of tenant accounts and their activity.
