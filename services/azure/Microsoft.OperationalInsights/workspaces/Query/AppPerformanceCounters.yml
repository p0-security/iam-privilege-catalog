name: Log Analytics workspace table (AppPerformanceCounters)
description: A queryable table within an Azure Log Analytics workspace holding application performance-counter telemetry collected from monitored applications.
scope: MEDIUM
notes: Monitoring/diagnostics data revealing runtime resource metrics; supporting-infra sensitivity, not a primary data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports performance-counter telemetry about application runtime metrics.
