name: Log Analytics workspace table (AZFWDnsFlowTrace)
description: A Log Analytics workspace query table holding ingested monitoring/telemetry data; this data-plane permission grants read access to the records in one specific table.
scope: MEDIUM
notes: Monitoring/diagnostic data; sensitivity is MEDIUM but specific tables may contain request payloads, identifiers, or network detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reads Azure Firewall DNS flow-trace logs, exporting DNS resolution records that reveal internal hostnames, source/destination IPs, and network communication patterns.
