name: Log Analytics workspace table (NCBMSystemLogs)
description: A per-table data-plane read permission on an Azure Log Analytics workspace, scoped to a single named table. NCBMSystemLogs holds Nexus Cloud bare-metal system telemetry.
scope: MEDIUM
notes: Log Analytics tables store collected monitoring telemetry; read-only data-plane access confined to one table is monitoring-grade sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports bare-metal system-level telemetry that may contain operational and configuration detail useful for reconnaissance.
