name: Log Analytics workspace query table (DynamicSummary)
description: A Log Analytics workspace query table is a data-plane view of a specific log table inside an Azure Monitor / Log Analytics workspace. Reading it returns the actual row-level log records ingested into that table.
scope: MEDIUM
notes: The Microsoft Sentinel DynamicSummary table holds analyst-generated/summarized investigation and hunting content derived from ingested logs, which can contain sensitive security findings.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns Sentinel DynamicSummary records, exporting summarized SIEM/investigation content and revealing what defenders have flagged.
