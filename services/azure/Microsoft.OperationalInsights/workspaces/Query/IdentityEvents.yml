name: Log Analytics IdentityEvents table
description: A Log Analytics workspace table holding identity event records (sign-ins, authentication and identity-change activity). It is security monitoring data within an Azure Monitor / Microsoft Sentinel workspace.
scope: MEDIUM
notes: Authentication/identity telemetry exposing account names and sign-in behavior usable for targeting.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Read exports authentication/identity event logs (exfiltration:logs) and enumerates accounts plus their sign-in activity for targeting (discovery:account).
