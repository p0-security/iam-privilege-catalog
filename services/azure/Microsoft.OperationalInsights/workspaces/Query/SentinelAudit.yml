name: Log Analytics SentinelAudit table
description: A Log Analytics query data action over the SentinelAudit table, which records audit entries of Microsoft Sentinel configuration changes and analyst/SOC actions in the SIEM.
scope: MEDIUM
notes: SIEM administrative audit trail; reveals defender operations, tooling, and analytics-rule changes.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exposes SIEM configuration changes and SOC analyst activity, letting an attacker learn defensive tooling/awareness and time evasion, plus export the audit-trail content.
