name: Log Analytics workspace query table (SynapseDXQuery)
description: A specific log table within an Azure Log Analytics (Operational Insights) workspace. Reading it via the query data-plane returns the collected diagnostic/telemetry log records stored in that table.
scope: MEDIUM
notes: Monitoring/diagnostic log data is MEDIUM sensitivity; log contents can include operational identifiers, caller IPs, resource paths, and sometimes query text, but are not the primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns Synapse Data Explorer query logs that can contain executed KQL text exposing data and schema references.
