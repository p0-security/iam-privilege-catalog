name: Log Analytics AppTraces table
description: A Log Analytics workspace data-plane table holding Application Insights trace/diagnostic log records emitted by application code.
scope: MEDIUM
notes: Per-table data-plane read permission on monitoring/diagnostic logs; trace tables frequently contain application-emitted payloads, parameters and identifiers, so content can be sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads application trace records, which commonly include in-application parameters, identifiers, or other sensitive data logged by code.
