name: Log Analytics AADDomainServicesAccountManagement table
description: A Log Analytics workspace data-plane table holding Azure AD Domain Services account-management audit events (account create/modify/delete activity).
scope: MEDIUM
notes: Monitoring/diagnostics identity telemetry; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reading this table exports account-lifecycle audit records, enumerating directory accounts and their administrative changes as compromise targets.
