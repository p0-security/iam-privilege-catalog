name: Log Analytics workspace table (AVSNsxManagerSyslog)
description: A Log Analytics workspace table accessed via the data-plane query interface; this table holds ingested Azure VMware Solution NSX Manager syslog records. Reading it returns the actual log records.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostics data (MEDIUM tier).
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - discovery:network
    notes: Exporting NSX Manager syslog discloses software-defined network management and topology detail useful for network reconnaissance.
