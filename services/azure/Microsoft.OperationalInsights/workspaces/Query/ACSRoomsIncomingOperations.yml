name: Log Analytics workspace query table (ACSRoomsIncomingOperations)
description: A Log Analytics workspace query table is a data-plane view of a specific log table inside an Azure Monitor / Log Analytics workspace. Reading it returns the actual row-level log records ingested into that table.
scope: MEDIUM
notes: Azure Communication Services Rooms incoming-operation logs expose API/operation telemetry and identifiers for communication sessions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns ACS Rooms incoming-operation log records, exporting communications-service operational telemetry and identifiers.
