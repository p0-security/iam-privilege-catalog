name: Log Analytics DatabricksBudgetPolicyCentral table
description: A Log Analytics workspace query table holding Azure Databricks budget-policy diagnostic telemetry ingested into Azure Monitor.
scope: MEDIUM
notes: Cost/spend-policy telemetry; may reveal budget and spend-control configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read of the DatabricksBudgetPolicyCentral table exports budget-policy telemetry that may reveal spend-control configuration.
