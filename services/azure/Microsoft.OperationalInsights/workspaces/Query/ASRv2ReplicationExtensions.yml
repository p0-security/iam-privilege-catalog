name: Log Analytics workspace table data (ASRv2ReplicationExtensions)
description: A Log Analytics workspace table queried via the data plane; this table (ASRv2ReplicationExtensions) holds Azure Site Recovery v2 replication-extension log records ingested into the Azure Monitor workspace.
scope: MEDIUM
notes: Monitoring/diagnostics data. Reading it exports DR replication-extension configuration telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns ASR v2 replication-extension log rows describing replication connectivity configuration.
