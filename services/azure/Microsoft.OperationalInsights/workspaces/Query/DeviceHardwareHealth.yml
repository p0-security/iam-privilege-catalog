name: Log Analytics workspace query table (DeviceHardwareHealth)
description: A queryable Log Analytics table within an Azure Monitor workspace holding ingested device hardware-health telemetry. This is a data-plane (isDataAction) read scoped to a single table.
scope: MEDIUM
notes: Security/monitoring telemetry; confidential operational log data rather than a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports device hardware-health telemetry describing hardware status and inventory.
