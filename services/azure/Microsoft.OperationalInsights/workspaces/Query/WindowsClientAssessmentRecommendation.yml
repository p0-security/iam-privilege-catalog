name: Log Analytics WindowsClientAssessmentRecommendation table
description: A Log Analytics workspace table holding Windows client (endpoint) security and configuration assessment recommendations. Reading it is a data-plane query over collected monitoring logs.
scope: MEDIUM
notes: Assessment findings disclose misconfigurations and weaknesses across client machines, raising reconnaissance value.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Exports security/configuration posture findings that inventory client misconfigurations and weaknesses, aiding target selection.
