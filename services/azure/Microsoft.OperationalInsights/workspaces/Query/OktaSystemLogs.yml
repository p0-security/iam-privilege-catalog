name: Log Analytics workspace table (OktaSystemLogs)
description: A Log Analytics workspace table accessed via the data-plane query interface; this table holds ingested Okta identity-provider system/audit log records. Reading it returns the actual log records.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostics data (MEDIUM tier). Identity-provider logs reveal accounts and authentication activity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - discovery:account
    notes: Exporting Okta system logs discloses user/admin accounts and authentication events, providing an inventory of identities to target.
