name: Log Analytics workspace table (SCGPoolRequestLog)
description: A queryable table within an Azure Log Analytics workspace that stores Spring Cloud Gateway pool request log records. Reading it returns the stored rows via a data-plane KQL query.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostic data at MEDIUM sensitivity; request logs can include paths/headers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns gateway pool request log rows, exporting operational request log data.
