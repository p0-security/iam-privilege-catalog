name: Log Analytics workspace table (DatabricksDataMonitoring)
description: A Log Analytics workspace query table holding ingested log records for a specific data type (here Azure Databricks data monitoring logs). Reading the table returns the stored log rows via the data plane.
scope: MEDIUM
notes: Monitoring/diagnostics asset. Records can disclose data-quality/monitoring telemetry and dataset characteristics.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning Databricks data-monitoring rows, exporting data-quality/profiling telemetry that can reveal dataset structure.
