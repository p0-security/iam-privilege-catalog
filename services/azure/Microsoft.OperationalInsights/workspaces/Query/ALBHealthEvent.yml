name: Log Analytics workspace log table data (ALBHealthEvent)
description: A specific log table (ALBHealthEvent) inside an Azure Log Analytics workspace; this is the ingested log/telemetry data on the data plane.
scope: MEDIUM
notes: Log Analytics tables can contain operational telemetry, identifiers, and sensitive diagnostic context aggregated across resources.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning rows from the ALBHealthEvent table, letting an attacker export collected log data that may contain sensitive operational details.
