name: Log Analytics workspace table (AGCFirewallLogs)
description: A Log Analytics workspace data-plane table holding ingested log/telemetry records. This operation reads rows from the AGCFirewallLogs table, which captures Application Gateway for Containers firewall/WAF events.
scope: MEDIUM
notes: Log Analytics tables are a monitoring/diagnostics asset; their rows can contain operationally sensitive details (identities, queries, IPs) depending on the source.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading this table exports WAF/firewall events, revealing source/destination IPs, traffic patterns, and blocked-request rules useful for mapping and evading network defenses.
