name: Log Analytics UAUpgradedComputer table
description: A Log Analytics workspace data-plane query against the UAUpgradedComputer table, an Update Compliance telemetry table recording which computers have completed OS feature upgrades.
scope: MEDIUM
notes: Monitoring/diagnostics data; rows contain device identifiers and OS/upgrade state useful for fleet reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading the table exports upgrade-compliance log rows and inventories which devices/OS builds exist, aiding device targeting.
