name: Log Analytics Operation table
description: A Log Analytics workspace query table holding the internal Operation log, recording workspace data-collection, ingestion, and agent health/operational events.
scope: MEDIUM
notes: Low-sensitivity internal workspace operational telemetry; MEDIUM sensitivity as monitoring data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Read returns the workspace Operation table, exporting internal data-collection/health/ingestion operational telemetry.
