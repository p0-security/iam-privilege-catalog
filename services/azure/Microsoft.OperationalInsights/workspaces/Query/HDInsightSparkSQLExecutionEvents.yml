name: Log Analytics workspace HDInsightSparkSQLExecutionEvents table
description: A Log Analytics workspace query table holding HDInsight Spark SQL execution event records ingested from an Azure HDInsight Spark cluster.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry for a single analytics workload; records may embed query text and data references.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports Spark SQL execution event logs, which can include query text and processed-data references.
