name: Log Analytics workspace query table (EGNFailedMqttPublishedMessages)
description: A specific log table within an Azure Log Analytics workspace recording Event Grid Namespace failed MQTT published-message events; this data-plane read returns the stored records.
scope: MEDIUM
notes: Monitoring/diagnostics data (MEDIUM). Content may reveal MQTT topics, client identifiers, and messaging metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports failed-MQTT-publish telemetry (exfiltration:logs) and enumerates topic/client messaging log entries (discovery:logs).
