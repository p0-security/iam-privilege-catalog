name: Log Analytics workspace table (NetworkAccessConnectionEvents)
description: A queryable table within an Azure Log Analytics workspace that stores network access connection event records (source/destination, endpoints, timing). Reading it returns the stored rows via a data-plane KQL query.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostic data at MEDIUM sensitivity; network connection logs reveal topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Returns network connection event rows, exporting log data and revealing network connectivity/topology useful for reconnaissance.
