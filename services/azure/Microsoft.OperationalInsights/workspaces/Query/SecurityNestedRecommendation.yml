name: Log Analytics SecurityNestedRecommendation table
description: A Log Analytics query data action over the SecurityNestedRecommendation table, which stores Defender for Cloud nested (sub-resource-level) security recommendation findings.
scope: MEDIUM
notes: Security posture/recommendation telemetry enumerating unremediated weaknesses.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table enumerates granular unremediated security weaknesses across resources, giving an attacker a roadmap of exploitable gaps plus the exported finding content.
