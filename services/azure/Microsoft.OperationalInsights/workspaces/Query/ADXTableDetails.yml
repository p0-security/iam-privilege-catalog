name: Log Analytics ADXTableDetails table
description: A Log Analytics workspace data-plane table holding schema/structure detail metadata about Azure Data Explorer tables. Reading it returns log rows describing ADX table layout rather than event payloads.
scope: MEDIUM
notes: Monitoring/diagnostic metadata tier; primarily table-schema inventory, lower sensitivity than event-content tables.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Read inventories ADX table schema/detail metadata captured as logs; discovery:logs is the headline since the table holds structure metadata rather than event content, but it still exports stored rows.
