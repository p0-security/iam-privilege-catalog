name: Log Analytics workspace table (CDBGremlinRequests)
description: A specific table in an Azure Log Analytics (Azure Monitor) workspace, queried via the data plane, holding Azure Cosmos DB Gremlin-API (graph) request log records.
scope: MEDIUM
notes: Per-request log telemetry exposing graph operations, targets, and access patterns; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports Cosmos DB Gremlin-API request log records (exfiltration:logs) and enumerates the logged graph data-access activity (discovery:logs).
