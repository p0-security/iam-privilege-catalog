name: Log Analytics KubeHealth table
description: A log table in a Log Analytics workspace storing Kubernetes/AKS cluster health and monitoring telemetry collected by Container Insights.
scope: MEDIUM
notes: Reveals cluster component status and operational state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading the table exfiltrates cluster-health telemetry and reveals the health and components of the monitored cluster infrastructure.
