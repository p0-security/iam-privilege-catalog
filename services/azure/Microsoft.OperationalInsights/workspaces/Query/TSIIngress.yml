name: Log Analytics workspace TSIIngress table
description: A data-plane table in an Azure Log Analytics workspace holding ingested time-series telemetry/ingestion records.
scope: MEDIUM
notes: Monitoring asset; contains collected operational telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Querying the TSIIngress table exports ingested time-series telemetry from the workspace.
