name: Azure Firewall IDPS signature log table (Log Analytics)
description: A Log Analytics workspace query data-plane permission scoped to the AZFWIdpsSignature table, which stores Azure Firewall IDPS (intrusion-detection/prevention) signature-match telemetry ingested into the workspace.
scope: MEDIUM
notes: Intrusion-detection telemetry exposes which signatures fire and the firewall's detection coverage, directly aiding defense evasion.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Exports IDPS signature-match records that tell an attacker which probes were detected vs evaded, informing evasion of the firewall's defenses.
