name: Log Analytics AmlModelsEvent table
description: A queryable Azure Log Analytics workspace table holding Azure Machine Learning model lifecycle event telemetry ingested for monitoring.
scope: MEDIUM
notes: Monitoring/diagnostic log data scoped to a single ML function; may reference model artifact names and versions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads model event log records, exporting model registration/versioning telemetry.
