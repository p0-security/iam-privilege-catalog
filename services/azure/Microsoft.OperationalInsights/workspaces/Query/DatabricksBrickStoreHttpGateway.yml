name: Log Analytics workspace table (DatabricksBrickStoreHttpGateway)
description: A Log Analytics workspace query table holding ingested log records for a specific data type (here Azure Databricks BrickStore HTTP gateway logs). Reading the table returns the stored log rows via the data plane.
scope: MEDIUM
notes: Monitoring/diagnostics asset. Gateway logs may contain endpoints and access patterns.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning Databricks BrickStore HTTP gateway log rows, exporting gateway operational telemetry from the workspace.
