name: Log Analytics AEWExperimentAssignmentSummary table
description: A Log Analytics workspace query table holding experimentation (A/B test) assignment-summary telemetry ingested into Azure Monitor.
scope: MEDIUM
notes: Operational experimentation telemetry; may reveal internal experiment configuration and user-segment data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
