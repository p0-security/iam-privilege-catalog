name: Log Analytics workspace table (TOUserAudits)
description: A queryable table within an Azure Log Analytics workspace that stores collected user audit log records. Reading it returns the stored audit rows via a data-plane KQL query.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostic data; sensitivity is MEDIUM though audit logs can contain identity and activity detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns user audit log rows, exporting stored audit/activity records.
