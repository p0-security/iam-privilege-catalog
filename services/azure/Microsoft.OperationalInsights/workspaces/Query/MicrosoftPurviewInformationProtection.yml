name: Log Analytics workspace query table (MicrosoftPurviewInformationProtection)
description: A Log Analytics workspace query table is a data-plane view of a specific log table inside an Azure Monitor / Log Analytics workspace. Reading it returns the actual row-level log records ingested into that table.
scope: MEDIUM
notes: Purview Information Protection logs record sensitivity-label/DLP activity, revealing data classifications and where sensitive content resides; valuable for targeting protected data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns Purview sensitivity-label/DLP audit records, exporting log content that reveals which documents are classified and where sensitive data lives.
