name: Log Analytics workspace table (AppRequests)
description: A queryable table within an Azure Log Analytics workspace holding Application Insights HTTP request telemetry from monitored applications.
scope: MEDIUM
notes: Monitoring/diagnostics data; request telemetry can include URLs, parameters, and client identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports request telemetry revealing API endpoints, request parameters, and traffic patterns.
