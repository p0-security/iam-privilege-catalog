name: Log Analytics AppBrowserTimings table
description: A Log Analytics workspace data-plane table holding Application Insights client-side browser page-load timing telemetry ingested into Azure Monitor.
scope: MEDIUM
notes: Monitoring data that may include page URLs and client performance details.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads the AppBrowserTimings table, exporting client-side performance telemetry including page URLs.
