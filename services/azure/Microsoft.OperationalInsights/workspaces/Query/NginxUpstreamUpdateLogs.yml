name: Log Analytics workspace table (NginxUpstreamUpdateLogs)
description: A queryable table within an Azure Log Analytics workspace that stores NGINX upstream update log records. Reading it returns the stored rows via a data-plane KQL query.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostic data at MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns NGINX upstream-update log rows, exporting operational configuration-change log data.
