name: Log Analytics workspace HuntingBookmark table
description: A Log Analytics workspace query table holding Microsoft Sentinel hunting bookmark artifacts that save threat-hunting query results, flagged log records, and analyst notes.
scope: MEDIUM
notes: Bookmarks embed log-derived event data and reveal what defenders have investigated and flagged.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Data-plane read exports saved hunting query results and pinned log evidence, revealing what defenders have flagged and exporting the underlying log-derived content.
