name: Log Analytics workspace table (AppEnvSessionConsoleLogs)
description: A single named table within an Azure Log Analytics (Operational Insights) workspace, queried via the data plane. This table captures Azure Container Apps dynamic-session console (stdout/stderr) output.
scope: HIGH
notes: Console output of running application sessions frequently contains command results, secrets, tokens, or PII printed to the console, making this table prone to holding sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - exfiltration:data
    notes: Reading this table exports Container Apps session console output, which commonly contains application data, secrets, or command results, enabling sensitive data exfiltration beyond ordinary telemetry.
