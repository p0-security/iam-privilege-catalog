name: Log Analytics workspace table (DnsEvents)
description: A specific table inside an Azure Monitor Log Analytics workspace; this resource type controls data-plane query access to the DnsEvents table, which stores DNS query/resolution event logs collected from monitored hosts.
scope: MEDIUM
notes: Monitoring asset, but DNS event logs disclose internal hostnames, lookups, and network activity useful for reconnaissance. MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Data-plane read returning DNS query/response logs; exports the log content and reveals internal hostnames and network topology for reconnaissance.
