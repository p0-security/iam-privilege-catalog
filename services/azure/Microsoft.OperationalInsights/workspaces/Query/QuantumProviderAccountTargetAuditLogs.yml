name: Log Analytics QuantumProviderAccountTargetAuditLogs table
description: A Log Analytics workspace table holding ingested Azure Quantum provider/target audit-log records. It is monitoring data within an Azure Monitor / Log Analytics workspace.
scope: MEDIUM
notes: Monitoring/diagnostic data store; sensitivity is medium unless the table holds identity or asset inventory content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read exports the Quantum provider/target audit records (exfiltration:logs) and lets an attacker inventory what activity is captured to gauge defender visibility (discovery:logs).
