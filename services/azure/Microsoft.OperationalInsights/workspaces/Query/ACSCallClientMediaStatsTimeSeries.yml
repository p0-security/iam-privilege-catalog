name: Log Analytics workspace query table (ACSCallClientMediaStatsTimeSeries)
description: A specific log table within an Azure Log Analytics workspace recording Azure Communication Services call client media-statistics time-series telemetry; this data-plane read returns the stored records.
scope: MEDIUM
notes: Monitoring/diagnostics data (MEDIUM). Content may include call/participant metadata and communication-quality statistics.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports ACS call media-statistics telemetry (exfiltration:logs) and enumerates communication-session log entries that may include participant metadata (discovery:logs).
