name: Log Analytics workspace table (BlockchainProxyLog)
description: A specific table in an Azure Log Analytics (Azure Monitor) workspace, queried via the data plane, holding blockchain proxy/request log records.
scope: MEDIUM
notes: Operational proxy/request log data of a single service; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports proxy request log content, which can include endpoints and operational detail (exfiltration:logs), and inventories logged proxy activity (discovery:logs).
