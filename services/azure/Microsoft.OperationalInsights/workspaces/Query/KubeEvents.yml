name: Log Analytics KubeEvents table
description: A log table in a Log Analytics workspace storing Kubernetes/AKS cluster event telemetry collected by Container Insights.
scope: MEDIUM
notes: Reveals cluster activity and component/configuration details.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading the table exfiltrates cluster event telemetry and reveals cluster activity and infrastructure components for reconnaissance.
