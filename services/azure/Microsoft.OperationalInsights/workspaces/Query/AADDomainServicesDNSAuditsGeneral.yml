name: Log Analytics table data (AADDomainServicesDNSAuditsGeneral)
description: A single Log Analytics workspace table holding Azure AD Domain Services DNS audit telemetry. A data-plane read returns the actual log rows for this table.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic assets (MEDIUM tier). DNS audit content can reveal internal hostnames, name-resolution activity, and infrastructure layout.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports AAD DS DNS audit records (internal hostnames, DNS queries) and enumerates the logged DNS activity, aiding reconnaissance.
