name: Log Analytics workspace table (BehaviorAnalytics)
description: A specific table in an Azure Log Analytics (Azure Monitor) workspace, queried via the data plane, holding Microsoft Sentinel UEBA user/entity behavior analytics records.
scope: MEDIUM
notes: Security analytics telemetry; reveals user/entity activity baselines and defensive detection coverage. MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports UEBA behavior-analytics records (exfiltration:logs) and reveals what behavioral activity defenders track (discovery:logs).
