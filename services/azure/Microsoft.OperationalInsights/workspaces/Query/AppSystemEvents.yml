name: Log Analytics AppSystemEvents table
description: A Log Analytics workspace data-plane table holding application system event log records ingested via diagnostic settings.
scope: MEDIUM
notes: Per-table data-plane read permission on monitoring/diagnostic logs; sensitivity is that of collected operational log content rather than a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads application system event log records, exporting operational event log content.
