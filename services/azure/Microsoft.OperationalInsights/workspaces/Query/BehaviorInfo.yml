name: Log Analytics workspace table (BehaviorInfo)
description: A single named table within an Azure Log Analytics (Operational Insights) workspace, queried via the data plane. This table stores Microsoft Sentinel/Defender UEBA behavioral-analytics information records.
scope: MEDIUM
notes: Behavioral-analytics tables contain security telemetry about monitored entities and reveal defensive detection coverage.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reading this table exports UEBA behavioral-analytics information records, disclosing security monitoring telemetry.
