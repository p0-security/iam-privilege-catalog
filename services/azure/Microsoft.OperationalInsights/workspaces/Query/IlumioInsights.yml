name: Log Analytics workspace table data (IlumioInsights)
description: A per-table data-plane query permission on a Log Analytics workspace; this one returns rows of the IlumioInsights table, which holds Illumio micro-segmentation and traffic-flow insight telemetry.
scope: MEDIUM
notes: Network segmentation/flow telemetry exposing east-west topology and connectivity; monitoring/log-data sensitivity tier.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reads Illumio insight rows, exporting the log content and mapping internal network topology, segmentation, and inter-workload communication.
