name: Log Analytics query table (AlertHistory — security detections)
description: A Log Analytics workspace query table holding the history/lifecycle of security alerts. This data-plane permission returns the stored alert-history rows via KQL query.
scope: MEDIUM
notes: Security detection telemetry is MEDIUM scope; reveals prior detections and triage activity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading AlertHistory exports historical alert records (exfiltration:logs) and lets an attacker inventory past detections and defensive posture (discovery:logs).
