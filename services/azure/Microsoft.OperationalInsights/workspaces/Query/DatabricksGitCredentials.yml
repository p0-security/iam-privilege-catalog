name: Log Analytics workspace query table (DatabricksGitCredentials)
description: A specific log table within an Azure Log Analytics workspace, holding ingested monitoring/audit telemetry. This table holds Databricks Git-credential management audit records (provider/user/token-name metadata, not secret values).
scope: MEDIUM
notes: Log Analytics tables contain collected diagnostic/audit telemetry; access is data-plane (isDataAction) and constrained to the named table. Sensitivity is monitoring-tier.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports Git-credential management audit events; Databricks audit logs record credential operation metadata (provider, user, token name) but NOT the secret token, so this is log exfiltration, not exfiltration:crypto.
