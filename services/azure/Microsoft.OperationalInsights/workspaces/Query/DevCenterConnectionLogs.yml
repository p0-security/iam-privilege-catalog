name: Log Analytics workspace table data (DevCenterConnectionLogs)
description: A Log Analytics workspace table queried via the data plane; this table (DevCenterConnectionLogs) holds Azure DevCenter / Dev Box connection log records ingested into the Azure Monitor workspace.
scope: MEDIUM
notes: Monitoring/diagnostics data. Reading it exports connection telemetry that can include user, host, and source-IP detail for developer environments.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns DevCenter connection log rows (sessions, source addresses, timing), exporting connection telemetry that can reveal user access patterns.
