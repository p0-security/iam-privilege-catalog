name: Log Analytics workspace HDInsightSparkLogs table
description: A Log Analytics workspace query table holding raw HDInsight Spark application log entries ingested from an Azure HDInsight Spark cluster.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry for a single analytics workload; raw log lines may embed processed-data fragments.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports raw Spark application log entries that may contain sensitive operational content.
