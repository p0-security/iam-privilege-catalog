name: Log Analytics workspace query table (AD FS sign-in logs)
description: A named table within a Log Analytics workspace holding ingested monitoring/diagnostic log records. The query/<TableName>/read data action reads the actual record content from that table via KQL.
scope: MEDIUM
notes: These tables hold monitoring/diagnostic telemetry rather than primary production data, so the asset sensitivity is MEDIUM; content may still reveal operational posture and occasionally sensitive identifiers logged at runtime.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reads AD FS sign-in log records containing usernames, identities, source IPs, and authentication outcomes, exporting auth telemetry and enumerating accounts for targeting.
