name: Log Analytics ContainerLogV2 table
description: A Log Analytics workspace data table holding ContainerLogV2 records — the current schema for stdout/stderr application log output collected from monitored containers.
scope: MEDIUM
notes: Container application output frequently embeds secrets, tokens, or sensitive runtime data, so the asset is MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads V2-schema container stdout/stderr logs, exporting application output that may include credentials and sensitive runtime data.
