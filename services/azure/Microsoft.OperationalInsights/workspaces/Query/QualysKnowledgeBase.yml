name: Log Analytics workspace table (QualysKnowledgeBase)
description: A Log Analytics workspace query table holding ingested Qualys vulnerability knowledge-base reference definitions (generic CVE/vuln dictionary, not org-specific findings). Reading it is a data-plane operation returning the stored rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores of MEDIUM sensitivity; the Qualys KB is largely generic reference data of low intrinsic sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: The KB is generic vulnerability reference content rather than organizational data, so reading it is mainly reconnaissance of the detection/scanning content tracked in the workspace.
