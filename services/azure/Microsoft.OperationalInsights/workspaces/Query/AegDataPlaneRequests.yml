name: Log Analytics AegDataPlaneRequests table
description: A Log Analytics workspace data-plane table holding Azure Event Grid data-plane request telemetry. Reading it returns the stored request log rows.
scope: MEDIUM
notes: Monitoring/diagnostic log data tier; may contain event/request metadata, topic and endpoint identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read exports Event Grid data-plane request log rows, exposing event-routing details and request metadata.
