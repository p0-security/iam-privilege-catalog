name: Log Analytics workspace table (ContainerAppConsoleLogs)
description: A specific log table within an Azure Monitor Log Analytics workspace. Data-plane read returns the ingested log records stored in that table.
scope: MEDIUM
notes: Monitoring/diagnostic data. Container console (stdout/stderr) tables in particular frequently contain application secrets, tokens, and sensitive runtime output.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reads Container Apps console (stdout/stderr) log records, which frequently leak secrets/tokens and sensitive application output, and enumerates logged runtime activity.
