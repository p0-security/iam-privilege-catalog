name: Log Analytics table data (PowerAutomateActivity)
description: A single Log Analytics workspace table holding Power Automate flow activity telemetry. A data-plane read returns the actual log rows for this table.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic assets (MEDIUM tier). Activity content includes flow runs, triggers, user identities, and connector usage.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports Power Automate flow-execution records (workflows, actors, triggers, connectors).
