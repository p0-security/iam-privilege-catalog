name: Log Analytics workspace query table (ArcK8sAuditAdmin)
description: A specific log table within an Azure Log Analytics workspace recording admin-level Azure Arc-enabled Kubernetes audit events (including request/response detail); this data-plane read returns the stored records.
scope: MEDIUM
notes: Monitoring/diagnostics data (MEDIUM). Admin-level audit can include request/response bodies exposing privileged API activity, identities, and RBAC changes.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports verbose admin-level Kubernetes audit logs (exfiltration:logs) and enumerates privileged cluster activity and identities (discovery:logs).
