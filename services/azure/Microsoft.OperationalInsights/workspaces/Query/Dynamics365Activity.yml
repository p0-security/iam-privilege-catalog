name: Log Analytics workspace table (Dynamics365Activity)
description: A specific table inside an Azure Monitor Log Analytics workspace; this resource type controls data-plane query access to the Dynamics365Activity table, which stores Dynamics 365 user-activity/audit records.
scope: MEDIUM
notes: Monitoring/audit telemetry for a single business application (CRM/ERP); reveals user actions and access patterns. MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning Dynamics 365 user-activity audit rows, enabling export of business-application usage telemetry.
