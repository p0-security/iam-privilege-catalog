name: Databricks diagnostic log table (Log Analytics)
description: A Log Analytics workspace table that stores diagnostic/audit log records emitted by Azure Databricks (here, Unity Catalog data-governance activity). Reading it is a data-plane query returning ingested log content.
scope: MEDIUM
notes: Monitoring/diagnostics data sits in the MEDIUM sensitivity tier; governance logs record metastore access and grant/permission events on data assets. This is logged history, not the live governance policy.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:policy
    notes: Reading this table exports Unity Catalog governance audit logs, including data-asset grants and metastore access, both exfiltrating log content and revealing catalog access-control structure.
