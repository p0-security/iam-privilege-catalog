name: Log Analytics DnsAuditEvents table
description: A Log Analytics data-plane table holding ingested DNS audit/query event records for the workspace.
scope: MEDIUM
notes: Ingested DNS log content that exposes internal hostnames, name-resolution activity, and network topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: This data-plane read exports DNS audit/query log records, which expose internal hostnames and name-resolution activity that map network topology for reconnaissance.
