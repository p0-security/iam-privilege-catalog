name: Log Analytics Update table
description: A Log Analytics workspace data-plane query against the Update table, the Update Management assessment table listing missing/installed patches per machine.
scope: MEDIUM
notes: Monitoring/diagnostics data that directly exposes unpatched software and exploitable vulnerabilities per host.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading the table exports per-machine missing-update assessments, directly inventorying unpatched and exploitable hosts.
