name: Log Analytics Usage table
description: A Log Analytics workspace data-plane query against the Usage table, reporting data-ingestion volume/metering statistics per table.
scope: LOW
notes: Aggregate operational metering about the logging pipeline rather than record content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading the table returns per-table ingestion volume statistics, inventorying which log sources exist and their sizes (monitoring-coverage recon) without exposing sensitive log content.
