name: Log Analytics ASimWebSessionLogs table
description: A Log Analytics workspace table holding normalized (ASIM) web-session telemetry (source/destination IPs, URLs, user agents, session metadata). Reading it returns the stored log rows.
scope: MEDIUM
notes: Monitoring data is MEDIUM scope; may contain sensitive web/network session detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Exports normalized web-session telemetry that discloses URLs, hosts, and source/destination network endpoints.
