name: Log Analytics AutoscaleEvaluationsLog table
description: A Log Analytics workspace data-plane table holding autoscale evaluation log records (scaling decisions and capacity metrics).
scope: MEDIUM
notes: Per-table data-plane read permission on low-sensitivity operational/monitoring logs.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads autoscale evaluation records, exporting operational telemetry about scaling decisions and capacity.
