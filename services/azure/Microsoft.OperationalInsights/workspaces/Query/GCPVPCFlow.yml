name: Log Analytics workspace table (GCPVPCFlow)
description: A Log Analytics workspace table accessed via the data-plane query interface; this table holds ingested GCP VPC flow log records. Reading it returns the actual log records.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostics data (MEDIUM tier).
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - discovery:network
    notes: Exporting GCP VPC flow logs discloses IPs, ports, and traffic patterns, enabling network topology reconnaissance.
