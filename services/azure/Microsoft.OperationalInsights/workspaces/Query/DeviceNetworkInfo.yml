name: Log Analytics workspace DeviceNetworkInfo table
description: A Microsoft Defender for Endpoint advanced-hunting table (DeviceNetworkInfo) surfaced through a Log Analytics workspace, holding device network-configuration telemetry such as adapters, IP and MAC addresses, DNS, and connected networks.
scope: MEDIUM
notes: Security telemetry; confidential but not a primary production data store, hence MEDIUM asset sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading this table exports device network configuration and enables network reconnaissance (IPs, MACs, adapters, connected networks).
