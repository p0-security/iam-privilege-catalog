name: Log Analytics table data (PowerPlatformDlpActivity)
description: A single Log Analytics workspace table holding Power Platform data-loss-prevention (DLP) activity telemetry. A data-plane read returns the actual log rows for this table.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic assets (MEDIUM tier). DLP activity content reveals data-loss-prevention enforcement events and policy posture.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports DLP enforcement records (policy evaluations and violations), revealing the org's DLP posture and detection blind spots.
