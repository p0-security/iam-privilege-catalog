name: Log Analytics workspace table (Sentinel Alibaba Cloud WAF logs)
description: A Log Analytics workspace data-plane table storing Microsoft Sentinel-ingested Alibaba Cloud Web Application Firewall logs. Read access returns the table's log records.
scope: MEDIUM
notes: WAF logs contain web request/attack telemetry that exposes endpoints and defensive detections.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading the table exports WAF request/attack telemetry (exfiltration:logs) and reveals protected endpoints and network/request patterns (discovery:network).
