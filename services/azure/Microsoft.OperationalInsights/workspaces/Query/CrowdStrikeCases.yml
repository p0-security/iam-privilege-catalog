name: Log Analytics workspace table (CrowdStrikeCases)
description: A Log Analytics workspace query table holding ingested CrowdStrike EDR security case/incident records. Reading it is a data-plane operation returning the stored log rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores of MEDIUM sensitivity; EDR case records reveal detection coverage and ongoing investigations.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Exports EDR incident/case records, exposing security investigation status and revealing which detections target the attacker, aiding evasion.
