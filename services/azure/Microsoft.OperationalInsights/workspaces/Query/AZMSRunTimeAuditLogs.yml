name: Log Analytics workspace table (AZMSRunTimeAuditLogs)
description: A Log Analytics workspace query table holding runtime audit logs for Azure Messaging Services, recording authentication/authorization and client access events. Reading it returns the stored audit records via the data plane.
scope: MEDIUM
notes: Audit trail of access events to the messaging service; MEDIUM-sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports runtime audit-record content including client identities and auth events (exfiltration:logs) and enumerates the audit activity logged (discovery:logs); reading does not delete or alter the audit trail.
