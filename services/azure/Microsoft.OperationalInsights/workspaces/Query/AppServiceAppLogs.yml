name: Log Analytics workspace table (AppServiceAppLogs)
description: A queryable table within an Azure Log Analytics workspace holding App Service application logs.
scope: MEDIUM
notes: Monitoring/diagnostics data; application logs may contain sensitive runtime output or inadvertently logged secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports App Service application logs that may contain sensitive runtime output.
