name: Log Analytics workspace query table (AMSKeyDeliveryRequests)
description: A Log Analytics workspace query table is a data-plane view of a specific log table inside an Azure Monitor / Log Analytics workspace. Reading it returns the actual row-level log records ingested into that table.
scope: MEDIUM
notes: Azure Media Services key-delivery request logs are audit records about DRM/content-key requests (requester, status, content identifiers); they do NOT contain the keys themselves.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns Media Services key-delivery request log records (telemetry about key requests, not the DRM keys), exporting log content revealing content-protection access patterns.
