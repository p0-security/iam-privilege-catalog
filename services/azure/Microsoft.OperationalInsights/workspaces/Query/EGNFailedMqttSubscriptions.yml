name: Log Analytics workspace query table (EGNFailedMqttSubscriptions)
description: A specific log table within an Azure Log Analytics workspace recording Event Grid Namespace failed MQTT subscription events; this data-plane read returns the stored records.
scope: MEDIUM
notes: Monitoring/diagnostics data (MEDIUM). Content may reveal subscribed topics and client identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports failed-MQTT-subscription telemetry (exfiltration:logs) and enumerates subscription/topic/client log entries (discovery:logs).
