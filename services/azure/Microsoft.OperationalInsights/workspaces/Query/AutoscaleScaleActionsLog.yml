name: Log Analytics AutoscaleScaleActionsLog table
description: A Log Analytics workspace data-plane table holding autoscale scale-action log records (executed scaling operations).
scope: MEDIUM
notes: Per-table data-plane read permission on low-sensitivity operational/monitoring logs.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads autoscale action records, exporting operational telemetry about scaling events.
