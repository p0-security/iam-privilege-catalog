name: Log Analytics workspace table (NTAInsights)
description: A single Azure Log Analytics (Microsoft.OperationalInsights) workspace query table. Data-plane reads return the actual ingested log/telemetry records stored in that table within the monitoring workspace.
scope: MEDIUM
notes: Monitoring/diagnostics data per the scope guide; sensitivity is confidential operational telemetry rather than primary production data, hence MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns Network Traffic Analytics insight records (flows, endpoints, IPs), exporting network-flow log content that exposes traffic patterns and topology.
