name: Log Analytics CrowdStrikeIncidents log table
description: A Log Analytics workspace data-plane query permission scoped to the CrowdStrikeIncidents table, which holds ingested CrowdStrike EDR incident-response records.
scope: MEDIUM
notes: Incident-response telemetry; reveals what defenders are investigating.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports incident records, letting an attacker gauge whether and how their activity is being investigated.
