name: Log Analytics AmlComputeJobEvent table
description: A queryable Azure Log Analytics workspace table holding Azure Machine Learning compute job-execution event telemetry ingested for monitoring.
scope: MEDIUM
notes: Monitoring/diagnostic log data scoped to a single ML function; may reveal job/workload configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads compute job event log records, exporting ML training/job execution telemetry.
