name: Log Analytics SQLAssessmentRecommendation table
description: A Log Analytics workspace table holding SQL Server assessment recommendation records ingested into Azure Monitor.
scope: MEDIUM
notes: Assessment-recommendation logs surface SQL configuration posture and best-practice/security findings; confidential operational data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Read returns the SQL assessment recommendation rows, exporting log content that reveals SQL Server configuration and best-practice/security weaknesses.
