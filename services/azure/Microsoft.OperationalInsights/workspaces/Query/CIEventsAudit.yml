name: Log Analytics CIEventsAudit table
description: A Log Analytics workspace data table holding CIEventsAudit records — Container Insights audit-event telemetry collected from monitored Kubernetes/container environments.
scope: MEDIUM
notes: Monitoring/security telemetry; log content can include identities and operational detail, so the asset is MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns the stored CIEventsAudit audit-event records, exporting log content that may contain sensitive operational and identity detail.
