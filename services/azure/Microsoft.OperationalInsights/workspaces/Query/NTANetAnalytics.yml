name: Log Analytics NTANetAnalytics table
description: A Log Analytics workspace table holding Network Traffic Analytics flow-analytics records (traffic flows, communicating endpoints). Reading it returns the stored log rows.
scope: MEDIUM
notes: Monitoring data is MEDIUM scope; reveals network traffic flows and connectivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Exports network flow telemetry and reveals traffic patterns and communicating endpoints across the environment.
