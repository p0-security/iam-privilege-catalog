name: Log Analytics workspace table (DatabricksFilesystem)
description: A Log Analytics workspace query table holding ingested log records for a specific data type (here Azure Databricks filesystem/DBFS access logs). Reading the table returns the stored log rows via the data plane.
scope: MEDIUM
notes: Monitoring/diagnostics asset. Records can reveal file paths and filesystem-access activity useful for locating sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning Databricks filesystem (DBFS) access-log rows, exporting telemetry that reveals file paths and access patterns.
