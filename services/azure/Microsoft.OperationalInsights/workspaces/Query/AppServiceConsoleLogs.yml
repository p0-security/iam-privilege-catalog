name: Log Analytics workspace table (AppServiceConsoleLogs)
description: A queryable table within an Azure Log Analytics workspace holding App Service console/stdout logs.
scope: MEDIUM
notes: Monitoring/diagnostics data; console output may contain secrets or sensitive runtime data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports console/stdout output that can contain credentials or sensitive runtime data.
