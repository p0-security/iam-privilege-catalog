name: Log Analytics table data (ASimAuthenticationEventLogs)
description: A single Log Analytics workspace table holding normalized (ASIM) authentication event telemetry. A data-plane read returns the actual log rows for this table.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic assets (MEDIUM tier). Authentication event content enumerates accounts, source IPs, and sign-in outcomes.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - discovery:account
    notes: Querying this table exports authentication event records that enumerate user accounts, source IPs, and sign-in success/failure, useful for identity targeting.
