name: Log Analytics workspace table (ACLUserDefinedLogs)
description: A Log Analytics workspace query table holding ingested monitoring/telemetry data; this data-plane permission grants read access to the records in one specific table.
scope: MEDIUM
notes: Monitoring/diagnostic data; sensitivity is MEDIUM but specific tables may contain request payloads, identifiers, or network detail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads arbitrary user-defined custom log content whose structure and sensitivity are operator-controlled and may include secrets.
