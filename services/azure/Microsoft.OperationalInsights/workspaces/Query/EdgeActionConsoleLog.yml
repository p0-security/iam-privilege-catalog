name: Log Analytics workspace table (EdgeActionConsoleLog)
description: A Log Analytics workspace query table holding ingested log/telemetry records (here, edge-action console output). Reading it is a data-plane operation returning the stored log rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores; their sensitivity is MEDIUM, though specific tables can carry secrets or sensitive operational content inadvertently logged.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns edge-action console log records, which can embed errors, operational detail, and inadvertently logged tokens/secrets.
