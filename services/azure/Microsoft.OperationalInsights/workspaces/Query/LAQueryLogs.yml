name: Log Analytics workspace query table (LAQueryLogs)
description: A specific table within an Azure Monitor / Log Analytics workspace. The LAQueryLogs audit table records which KQL queries were run against the workspace, by whom, and when.
scope: MEDIUM
notes: Log Analytics tables are data-plane monitoring stores; per-table read permissions scope access to one table's collected telemetry. Sensitivity is MEDIUM (monitoring/diagnostics data).
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reads the query-audit table, exfiltrating the record of who queried what and revealing defenders' investigative activity and monitoring blind spots.
