name: Log Analytics workspace query table (AOIStorage)
description: A specific log/telemetry table within an Azure Log Analytics workspace; this data-plane read returns the stored records of that table. AOIStorage holds Azure Operator Insights / storage-related operational telemetry ingested into monitoring.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data (MEDIUM tier). They can contain sensitive operational identifiers but are not primary production data stores.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading the AOIStorage table exports the stored log records (exfiltration:logs) and lets an attacker enumerate the ingested telemetry (discovery:logs).
