name: Log Analytics workspace query table (KubeServices)
description: A specific table within an Azure Monitor / Log Analytics workspace. The KubeServices table holds Container Insights telemetry inventorying Kubernetes cluster services and their endpoints.
scope: MEDIUM
notes: Log Analytics tables are data-plane monitoring stores; per-table read permissions scope access to one table's collected telemetry. Sensitivity is MEDIUM (monitoring/diagnostics data).
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Data-plane read returns the actual KubeServices rows, exfiltrating Kubernetes service telemetry and inventorying the cluster's service/endpoint estate.
