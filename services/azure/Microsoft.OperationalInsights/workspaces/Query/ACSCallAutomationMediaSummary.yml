name: Log Analytics table data (ACSCallAutomationMediaSummary)
description: A single Log Analytics workspace table holding Azure Communication Services call-automation media summary telemetry. A data-plane read returns the actual log rows for this table.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic assets (MEDIUM tier). May contain call/media session and participant identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports ACS call-automation media summary telemetry (call/media session metadata).
