name: Log Analytics workspace table (PGSQLServerLogs)
description: A Log Analytics workspace data-plane table holding ingested log/telemetry records. This operation reads rows from the PGSQLServerLogs table, which captures raw PostgreSQL server log output.
scope: MEDIUM
notes: Log Analytics tables are a monitoring/diagnostics asset; their rows can contain operationally sensitive details (identities, queries, IPs) depending on the source.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:data
    notes: Reading this table exports raw PostgreSQL server logs that can contain SQL statements, error context, connection details, and usernames, revealing database activity and structure.
