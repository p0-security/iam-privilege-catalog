name: Log Analytics workspace query table (DatabricksIAMRole)
description: A specific log table within an Azure Log Analytics workspace, holding ingested monitoring/audit telemetry. This table holds Databricks IAM-role / instance-profile access-control audit records.
scope: MEDIUM
notes: Log Analytics tables contain collected diagnostic/audit telemetry; access is data-plane (isDataAction) and constrained to the named table. Sensitivity is monitoring-tier.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:policy
    notes: Data-plane read exports IAM-role/instance-profile access-control audit events, which also disclose role-assignment activity an attacker can use to map permissions and find weak points.
