name: Log Analytics workspace table (Confidential Ledger transaction logs)
description: A Log Analytics workspace data-plane table storing Azure Confidential Ledger transaction records. Read access returns the table's records.
scope: MEDIUM
notes: Confidential Ledger transaction records are tamper-evident business records and may contain sensitive transactional data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - exfiltration:data
    notes: Reading the table exports confidential transaction records (exfiltration:logs) that constitute sensitive business/transactional data (exfiltration:data).
