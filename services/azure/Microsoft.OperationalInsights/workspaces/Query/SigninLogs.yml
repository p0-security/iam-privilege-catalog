name: Log Analytics SigninLogs table
description: A Log Analytics workspace table holding Microsoft Entra ID (Azure AD) sign-in log records ingested into Azure Monitor.
scope: HIGH
notes: "Tenant-wide identity telemetry: user identities, source IPs, locations, MFA status, and conditional-access outcomes; highly sensitive reconnaissance value."
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Read returns Entra ID sign-in records, exporting sensitive authentication telemetry and enabling enumeration of accounts, source IPs, and login patterns for targeting.
