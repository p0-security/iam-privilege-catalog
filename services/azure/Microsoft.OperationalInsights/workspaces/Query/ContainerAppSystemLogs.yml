name: Log Analytics workspace query table (ContainerAppSystemLogs)
description: A Log Analytics workspace query table is a data-plane view of a specific log table inside an Azure Monitor / Log Analytics workspace. Reading it returns the actual row-level log records ingested into that table.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry is MEDIUM-sensitivity; individual log tables may contain operational details, identifiers, and occasionally embedded sensitive values, but are not primary production data stores.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read returning Container Apps system log records, exporting runtime/operational log content and enumerating logged activity.
