name: Log Analytics workspace query table (AMSMediaAccountHealth)
description: A Log Analytics workspace query table is a data-plane view of a specific log table inside an Azure Monitor / Log Analytics workspace. Reading it returns the actual row-level log records ingested into that table.
scope: MEDIUM
notes: Azure Media Services account-health logs are operational health/status telemetry for the media service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns Media Services account-health log records, exporting and enumerating operational health telemetry.
