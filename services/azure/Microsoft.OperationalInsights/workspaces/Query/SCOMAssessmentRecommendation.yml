name: Log Analytics workspace query table (SCOMAssessmentRecommendation)
description: A specific table in an Azure Log Analytics workspace, queried over the data plane via KQL. This table holds System Center Operations Manager (SCOM) assessment recommendation findings.
scope: MEDIUM
notes: Exposes infrastructure health and configuration findings; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Returns Operations Manager assessment findings, exporting the logs (exfiltration:logs) and revealing infrastructure configuration and assessed weaknesses for reconnaissance (discovery:infra).
