name: Log Analytics workspace table data (AADGraphActivityLogs)
description: A per-table data-plane query permission on a Log Analytics workspace; this one returns rows of the AADGraphActivityLogs table, which records Azure AD Graph (directory) API call activity ingested into the workspace.
scope: MEDIUM
notes: Log Analytics tables hold collected security/operational telemetry; sensitivity is the monitoring/log-data tier, but identity-activity tables can disclose accounts and their behavior.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reads the actual log rows of directory API activity, exporting the log content and enumerating principals and their operations as targets for compromise.
