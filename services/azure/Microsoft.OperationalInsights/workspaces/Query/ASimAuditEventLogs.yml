name: Log Analytics workspace table (ASimAuditEventLogs)
description: A specific table within an Azure Monitor / Log Analytics workspace holding ingested log records, queried via the data plane (KQL). This table stores normalized (ASIM) audit event records aggregated across sources.
scope: MEDIUM
notes: Log Analytics monitoring/audit data is a confidential asset whose exposure aids reconnaissance and detection evasion, but it is not a primary production data store; scope is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports normalized security/audit events across sources, revealing principal and activity detail useful for reconnaissance and detection-coverage assessment.
