name: Log Analytics ContainerNodeInventory table
description: A Log Analytics workspace data table holding ContainerNodeInventory records — an inventory of container host nodes including OS, Docker/container-runtime version, and orchestrator details.
scope: MEDIUM
notes: Resource-inventory metadata describing node infrastructure rather than sensitive log payload; MEDIUM sensitivity as monitoring data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads the inventory of container host nodes, exposing node OS, runtime versions, and topology useful for targeting the cluster.
