name: Log Analytics ADXJournal table
description: A Log Analytics workspace data-plane table holding Azure Data Explorer journal/metadata-operation telemetry. Reading it returns the stored journal log rows.
scope: MEDIUM
notes: Monitoring/diagnostic log data tier.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Data-plane read exports ADX journal/metadata-change log rows, which can reveal operational activity and configuration changes.
