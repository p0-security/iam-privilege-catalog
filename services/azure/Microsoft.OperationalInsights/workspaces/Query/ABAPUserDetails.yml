name: Log Analytics workspace table (ABAPUserDetails)
description: A queryable table within an Azure Log Analytics workspace that stores SAP ABAP user-detail records. Reading it returns the stored rows via a data-plane KQL query.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostic data at MEDIUM sensitivity; a user-details table is effectively an account inventory.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Returns SAP user-detail rows, exporting log data and enumerating user accounts as compromise targets.
