name: Log Analytics workspace table (PGSQLQueryStoreQueryText)
description: A Log Analytics workspace query table holding captured PostgreSQL Query Store SQL statement text. Reading it is a data-plane operation returning the stored query-text rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores of MEDIUM sensitivity; captured SQL text can expose schema and embed literal data values or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - exfiltration:data
    notes: Captured SQL statement text exposes database schema (table/column names) and frequently embeds literal data values and parameters, disclosing underlying database content as well as log telemetry.
