name: Log Analytics workspace table data (DevCenterAgentHealthLogs)
description: A Log Analytics workspace table queried via the data plane; this table (DevCenterAgentHealthLogs) holds Azure DevCenter / Dev Box agent health log records ingested into the Azure Monitor workspace.
scope: MEDIUM
notes: Monitoring/diagnostics data. Reading it exports operational health telemetry about Dev Box agents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns DevCenter/Dev Box agent health log rows, exporting operational monitoring telemetry.
