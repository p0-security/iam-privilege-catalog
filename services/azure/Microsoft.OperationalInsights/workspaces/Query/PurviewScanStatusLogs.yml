name: Log Analytics workspace query table (PurviewScanStatusLogs)
description: A specific table in an Azure Log Analytics workspace, queried over the data plane via KQL. This table holds Microsoft Purview data-governance scan-status telemetry.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic data; MEDIUM sensitivity per the scope guide.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns Purview scan-status records, exporting data-governance operational log content (may enumerate scanned data sources).
