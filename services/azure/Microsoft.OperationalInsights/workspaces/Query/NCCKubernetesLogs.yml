name: Log Analytics workspace table (NCCKubernetesLogs)
description: A per-table data-plane read permission on an Azure Log Analytics workspace, scoped to a single named table. NCCKubernetesLogs holds Nexus Kubernetes cluster log telemetry.
scope: MEDIUM
notes: Log Analytics tables store collected monitoring telemetry; read-only data-plane access confined to one table is monitoring-grade sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading this table exports cluster/container logs that may contain secrets, pod details, and sensitive workload output.
