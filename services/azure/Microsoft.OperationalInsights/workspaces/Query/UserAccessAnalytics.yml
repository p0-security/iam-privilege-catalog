name: Log Analytics UserAccessAnalytics table
description: A Log Analytics workspace data-plane query against the UserAccessAnalytics table, a Microsoft Sentinel UEBA enrichment table mapping user identities to the resources and access entitlements they hold.
scope: MEDIUM
notes: Security analytics exposing accounts and access-control relationships useful for selecting privilege-escalation targets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
      - discovery:policy
    notes: Reading the table exports who-accessed-what enrichment rows, inventorying identities and their access/entitlements to find privileged targets.
