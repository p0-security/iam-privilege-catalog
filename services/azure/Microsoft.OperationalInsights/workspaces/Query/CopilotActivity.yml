name: Log Analytics workspace table (CopilotActivity)
description: A Log Analytics workspace query table holding ingested Copilot usage/activity telemetry. Reading it is a data-plane operation returning the stored log rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores of MEDIUM sensitivity; Copilot activity can contain user prompts and sensitive business content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Exports Copilot interaction records that may contain user prompts and sensitive business content.
