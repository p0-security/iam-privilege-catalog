name: Log Analytics workspace query table (ResourceManagementPublicAccessLogs)
description: A specific table in an Azure Log Analytics workspace, queried over the data plane via KQL. This table holds records of public-network access to Azure Resource Manager (control-plane) endpoints.
scope: MEDIUM
notes: Reveals public-facing access patterns and source IPs; security-relevant monitoring data, MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Returns public-access log records for resource-management endpoints, exporting the logs (exfiltration:logs) and revealing publicly reachable management surfaces, source IPs, and access patterns for network reconnaissance (discovery:network).
