name: Log Analytics table data (ApiManagementWebSocketConnectionLogs)
description: A single Log Analytics workspace table holding Azure API Management WebSocket connection log telemetry. A data-plane read returns the actual log rows for this table.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostic assets (MEDIUM tier).
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports APIM WebSocket connection telemetry (client/endpoint details, connection events) and enumerates logged API traffic.
