name: Log Analytics workspace HDInsightSparkJobEvents table
description: A Log Analytics workspace query table holding HDInsight Spark job execution event records ingested from an Azure HDInsight Spark cluster.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry for a single analytics workload; log content may embed operational details.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read exports Spark job event log records describing job execution.
