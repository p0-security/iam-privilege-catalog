name: Log Analytics HDInsight query table (Hive/LLAP logs)
description: A Log Analytics workspace query-scoped table holding HDInsight Hive/LLAP query-engine operational log records ingested via diagnostic settings. The data-plane read returns the stored log rows.
scope: MEDIUM
notes: Monitoring/diagnostics asset tier. HDInsight log tables can embed query text, job parameters, paths, and operational detail, but contain telemetry rather than primary production data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Reading this table exports Hive/LLAP service log content (potentially including query text and host detail) and lets the holder inventory the logged activity.
