name: Log Analytics workspace table (GCPIAM)
description: A Log Analytics workspace table accessed via the data-plane query interface; this table holds ingested GCP IAM log records describing identity/access-control activity. Reading it returns the actual log records.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostics data (MEDIUM tier). IAM logs reveal principals and access-control activity (recon only — these are log records, not the live policy).
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - discovery:policy
      - discovery:account
    notes: Exporting GCP IAM logs discloses role/binding activity (discovery:policy) and principal identities (discovery:account), surfacing privilege-escalation targets and weak points.
