name: Log Analytics workspace query table (ACREntraAuthenticationAuditLog)
description: A queryable log table within an Azure Log Analytics workspace. Data-plane read of this resource returns the ingested log/telemetry rows stored in the named table.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostic data for a single service or function; sensitivity is MEDIUM unless the logs carry highly sensitive content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - discovery:account
    notes: Returns Azure Container Registry Entra authentication audit rows, exporting auth events and letting an attacker inventory the identities/principals that authenticate to the registry.
