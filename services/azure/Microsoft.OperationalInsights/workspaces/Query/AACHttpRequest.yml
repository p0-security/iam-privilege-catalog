name: Log Analytics AACHttpRequest table data
description: AACHttpRequest is a Log Analytics data-plane table holding ingested HTTP request log records queryable within the workspace.
scope: MEDIUM
notes: Data-plane access to ingested HTTP request logs, which can contain sensitive URLs, headers, identifiers, and client details.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: This data action reads actual records from the AACHttpRequest table, allowing an attacker to export HTTP request log data that may contain sensitive request details and identifiers.
