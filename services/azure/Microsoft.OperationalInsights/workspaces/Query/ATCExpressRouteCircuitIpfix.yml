name: Log Analytics ATCExpressRouteCircuitIpfix table
description: A Log Analytics workspace data-plane table holding ExpressRoute circuit IPFIX network flow log records (flows, endpoints, IPs, ports).
scope: MEDIUM
notes: Per-table data-plane read permission on network flow logs; content reveals network topology and traffic flows.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reads ExpressRoute IPFIX flow records, exporting flow log data and revealing network endpoints, IPs and connectivity topology.
