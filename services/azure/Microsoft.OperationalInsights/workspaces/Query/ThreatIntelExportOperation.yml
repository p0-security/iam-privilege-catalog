name: Log Analytics workspace table (ThreatIntelExportOperation)
description: A Log Analytics workspace table accessed via the data-plane query interface; this table holds ingested ThreatIntelExportOperation records describing threat-intelligence export activity. Reading it returns the actual log records.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostics data (MEDIUM tier). Threat-intel operation logs reveal defensive coverage.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Exporting threat-intel export-operation records reveals the organization's threat-intelligence pipeline and detection coverage to an attacker.
