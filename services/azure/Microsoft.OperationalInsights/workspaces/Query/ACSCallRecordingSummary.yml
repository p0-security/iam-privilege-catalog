name: Log Analytics workspace query table (ACSCallRecordingSummary)
description: A Log Analytics workspace query table is a data-plane view of a specific log table inside an Azure Monitor / Log Analytics workspace. Reading it returns the actual row-level log records ingested into that table.
scope: MEDIUM
notes: Azure Communication Services call-recording summary logs contain communications metadata (participant/call identifiers, recording details), which is more sensitive than ordinary operational telemetry but remains log content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Returns ACS call-recording summary records, exporting potentially sensitive communications metadata (participants, durations, recording details).
