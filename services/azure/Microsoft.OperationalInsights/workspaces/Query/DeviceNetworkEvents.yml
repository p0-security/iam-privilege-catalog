name: Log Analytics workspace DeviceNetworkEvents table
description: A Microsoft Defender for Endpoint advanced-hunting table (DeviceNetworkEvents) surfaced through a Log Analytics workspace, holding endpoint network-connection telemetry including remote IPs, ports, and initiating processes.
scope: MEDIUM
notes: Security telemetry; confidential but not a primary production data store, hence MEDIUM asset sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading this table exports network-connection telemetry and lets an attacker map connectivity, remote endpoints, and topology of monitored devices.
