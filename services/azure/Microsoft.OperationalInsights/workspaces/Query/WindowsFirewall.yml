name: Log Analytics WindowsFirewall table
description: A Log Analytics workspace table holding ingested Windows Firewall log records (allowed/blocked connections, rule activity). Reading it is a data-plane query over collected monitoring logs.
scope: MEDIUM
notes: Firewall logs reveal host network posture, rules, and traffic flows.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Exports firewall logs revealing rules, allowed/blocked flows, IPs and ports useful for network reconnaissance.
