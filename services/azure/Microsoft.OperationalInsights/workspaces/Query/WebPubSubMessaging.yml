name: Log Analytics WebPubSubMessaging table
description: A Log Analytics workspace table holding ingested Azure Web PubSub messaging service telemetry (connection and message routing events). Reading it is a data-plane query over collected monitoring logs.
scope: MEDIUM
notes: Monitoring/diagnostic log data; confidential operational telemetry but not a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Querying this table exports Web PubSub messaging log records that may contain connection/message metadata.
