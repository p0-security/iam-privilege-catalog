name: Log Analytics AADDomainServicesDirectoryServiceAccess table
description: A Log Analytics workspace data-plane table holding Azure AD Domain Services directory-service-access audit events (which principals accessed which directory objects).
scope: MEDIUM
notes: Monitoring/diagnostics identity telemetry; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Reading this table exports directory-object access audit records, revealing accounts and the directory objects they access for reconnaissance.
