name: Log Analytics workspace DeviceSkypeSignIn table
description: A Microsoft Defender for Endpoint advanced-hunting table (DeviceSkypeSignIn) surfaced through a Log Analytics workspace, holding Skype/Teams sign-in telemetry tying accounts and devices to sign-in sessions.
scope: MEDIUM
notes: Security telemetry exposing account/sign-in activity. Confidential but not a primary production data store, hence MEDIUM asset sensitivity.
links:
