name: Log Analytics workspace table data (ASRv2ReplicationPolicies)
description: A Log Analytics workspace table queried via the data plane; this table (ASRv2ReplicationPolicies) holds Azure Site Recovery v2 replication-policy log records ingested into the Azure Monitor workspace.
scope: MEDIUM
notes: Monitoring/diagnostics data. Reading it exports DR replication-policy configuration telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returns ASR v2 replication-policy log rows disclosing DR policy configuration.
