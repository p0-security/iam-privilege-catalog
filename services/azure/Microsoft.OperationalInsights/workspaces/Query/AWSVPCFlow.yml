name: Log Analytics AWSVPCFlow table
description: "A Log Analytics workspace data-plane table holding ingested AWS VPC flow log records (network connection telemetry: IPs, ports, flows)."
scope: MEDIUM
notes: Per-table data-plane read permission on network flow logs; content reveals network topology and traffic flows.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reads AWS VPC flow records, exporting flow log data and revealing IP addresses, ports and the network topology of the AWS environment.
