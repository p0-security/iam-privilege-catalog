name: Log Analytics WVDCheckpoints table
description: A Log Analytics workspace table holding Azure Virtual Desktop connection checkpoint/diagnostic records (session lifecycle stages). Reading it is a data-plane query over collected monitoring logs.
scope: MEDIUM
notes: Session lifecycle telemetry of limited sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Exports AVD session checkpoint records describing connection lifecycle events.
