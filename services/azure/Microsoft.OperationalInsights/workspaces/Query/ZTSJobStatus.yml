name: Log Analytics workspace query table (ZTSJobStatus)
description: A data-plane read of a specific table within a Log Analytics workspace, returning the actual ingested log/telemetry records stored in that table.
scope: MEDIUM
notes: Log Analytics tables hold monitoring and diagnostic telemetry, MEDIUM-sensitivity confidential operational data rather than primary business data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Returns stored job-status operational telemetry records from the workspace.
