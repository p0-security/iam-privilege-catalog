name: Log Analytics workspace table (ASRJobs)
description: A Log Analytics workspace query table holding Azure Site Recovery (ASR) job logs recording replication/failover/recovery operation history. Reading it returns the stored job records via the data plane.
scope: MEDIUM
notes: Disaster-recovery operational diagnostic data; MEDIUM-sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports ASR job-history log content (exfiltration:logs) and enumerates the replication/recovery operations logged (discovery:logs).
