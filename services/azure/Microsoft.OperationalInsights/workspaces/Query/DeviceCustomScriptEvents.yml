name: Log Analytics DeviceCustomScriptEvents log table
description: A Log Analytics workspace data-plane query permission scoped to the DeviceCustomScriptEvents table, which holds ingested Microsoft Defender for Endpoint script-execution telemetry (script content, command-line detail).
scope: MEDIUM
notes: Endpoint security event telemetry; reveals which script/command activity is monitored and recorded.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reading this table exports endpoint script-execution logs that may include script content and command-line detail.
