name: Log Analytics workspace table (PowerPlatformAdminActivity)
description: A Log Analytics workspace query table holding ingested log records for a specific data type (here Power Platform administrative activity audit logs). Reading the table returns the stored log rows via the data plane.
scope: MEDIUM
notes: Monitoring/diagnostics asset. Admin audit records reveal administrative actions and tenant configuration history.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read returning Power Platform admin activity audit rows, exporting records that reveal admin actions and configuration history.
