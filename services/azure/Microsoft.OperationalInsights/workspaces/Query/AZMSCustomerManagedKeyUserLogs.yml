name: Log Analytics workspace table (AZMSCustomerManagedKeyUserLogs)
description: A Log Analytics workspace query table holding logs of customer-managed-key (CMK) usage events for Azure Messaging Services. Reading it returns log records describing key-access activity, not the key material itself.
scope: MEDIUM
notes: Diagnostic data referencing CMK usage; MEDIUM-sensitivity. Does not return cryptographic material, so no exfiltration:crypto.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reading exports CMK-usage log records (exfiltration:logs) and inventories encryption-key access activity logged (discovery:logs); the table contains telemetry only, not keys, so this is not crypto exfiltration.
