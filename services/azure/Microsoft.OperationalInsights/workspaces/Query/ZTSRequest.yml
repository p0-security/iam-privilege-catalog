name: Log Analytics workspace table (ZTSRequest)
description: A Log Analytics workspace query table holding ingested zero-trust security request telemetry. Reading it is a data-plane operation returning the stored log rows.
scope: MEDIUM
notes: Log Analytics tables are monitoring/diagnostics data stores of MEDIUM sensitivity; security-request telemetry can reveal access/authorization patterns.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Exports zero-trust request log records revealing access/authorization activity and enforcement patterns.
