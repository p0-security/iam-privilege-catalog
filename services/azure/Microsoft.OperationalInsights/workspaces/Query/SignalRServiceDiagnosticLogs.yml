name: Log Analytics SignalRServiceDiagnosticLogs table
description: A Log Analytics workspace table holding Azure SignalR Service diagnostic log records (connectivity and messaging events) ingested into Azure Monitor.
scope: MEDIUM
notes: Operational diagnostics that may contain connection identifiers, client details, and request/operation telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Read returns SignalR diagnostic log rows, exporting connection/operation telemetry that may reveal client identifiers and service activity.
