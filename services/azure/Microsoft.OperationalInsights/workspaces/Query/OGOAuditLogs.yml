name: Log Analytics workspace table (OGOAuditLogs)
description: A Log Analytics workspace table accessed via the data-plane query interface; this table holds ingested OGOAuditLogs application audit records. Reading it returns the actual log records.
scope: MEDIUM
notes: Log Analytics tables hold monitoring/diagnostics data (MEDIUM tier).
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Exporting audit records discloses administrative/operational activity; enumerating the table reveals what audit telemetry is captured.
