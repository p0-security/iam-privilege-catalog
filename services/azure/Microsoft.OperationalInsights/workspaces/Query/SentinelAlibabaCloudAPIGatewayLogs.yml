name: Log Analytics workspace table (Sentinel Alibaba Cloud API Gateway logs)
description: A Log Analytics workspace data-plane table storing Microsoft Sentinel-ingested Alibaba Cloud API Gateway access logs. Read access returns the table's log records.
scope: MEDIUM
notes: API gateway access logs expose endpoints, callers, and traffic patterns useful for network reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading the table exports API gateway request/access logs (exfiltration:logs) and reveals API endpoints and traffic patterns (discovery:network).
