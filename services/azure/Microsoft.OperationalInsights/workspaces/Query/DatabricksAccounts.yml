name: Log Analytics workspace query table (DatabricksAccounts)
description: A specific log table within an Azure Log Analytics workspace, holding ingested monitoring/audit telemetry. This table holds Databricks account-activity audit records (user/account management events).
scope: MEDIUM
notes: Log Analytics tables contain collected diagnostic/audit telemetry; access is data-plane (isDataAction) and constrained to the named table. Sensitivity is monitoring-tier.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:account
    notes: Data-plane read exports account-management log events that also enumerate Databricks accounts/identities targeted in those events.
