name: Log Analytics ANFFileAccess table
description: A Log Analytics workspace data-plane table holding Azure NetApp Files file-access audit log records ingested into Azure Monitor.
scope: MEDIUM
notes: Audit log data exposing file paths, accessing identities, and access patterns useful for reconnaissance of stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads the ANFFileAccess audit table, exporting records of who accessed which files and exposing sensitive file-access patterns.
