name: Log Analytics AADDomainServicesLogonLogoff table
description: A Log Analytics workspace data-plane table holding Azure AD Domain Services logon/logoff session audit events.
scope: MEDIUM
notes: Monitoring/diagnostics identity telemetry; MEDIUM sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
