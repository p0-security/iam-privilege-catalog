name: Log Analytics workspace query table (CloudDnsEvents)
description: A data-plane read of a specific table within a Log Analytics workspace, returning the actual ingested log/telemetry records stored in that table.
scope: MEDIUM
notes: Log Analytics tables hold monitoring and diagnostic telemetry, MEDIUM-sensitivity confidential operational data rather than primary business data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Returns stored DNS query/resolution event records, exporting resolved hostnames, internal naming, and network destinations useful for network reconnaissance.
