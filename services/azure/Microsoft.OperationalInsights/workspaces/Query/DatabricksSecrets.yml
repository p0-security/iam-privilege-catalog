name: Databricks diagnostic log table (Log Analytics)
description: A Log Analytics workspace table that stores diagnostic/audit log records emitted by Azure Databricks (here, secret-scope operations). Reading it is a data-plane query returning ingested log content.
scope: MEDIUM
notes: This is an audit-log table recording secret-management events (which scope/key was created or accessed, by whom); secret values are redacted, so it is sensitive log content rather than the credential material itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reading this table exports secret-scope audit logs (scope/key names, accessors, timestamps) but not the secret values, so it yields sensitive log content rather than usable credentials.
