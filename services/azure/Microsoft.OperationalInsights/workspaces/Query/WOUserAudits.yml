name: Log Analytics workspace table data (WOUserAudits)
description: A Log Analytics workspace table queried via the data plane; this table (WOUserAudits) holds Windows 365 / Cloud PC user audit log records ingested into the Azure Monitor workspace.
scope: MEDIUM
notes: Monitoring/diagnostics data. Reading it exports collected telemetry that may contain user activity records and operational identifiers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane KQL read returns stored user-audit log rows, letting an attacker export collected audit telemetry.
