name: Log Analytics SecurityIoTRawEvent table
description: A Log Analytics query data action over the SecurityIoTRawEvent table, which stores raw IoT security telemetry records from connected/monitored devices.
scope: MEDIUM
notes: Raw device security telemetry; may expose device/network event content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table exports raw IoT security telemetry and inventories monitored IoT devices and their activity.
