name: Log Analytics workspace table (NCCIDRACLogs)
description: A Log Analytics workspace data-plane table holding ingested log/telemetry records. This operation reads rows from the NCCIDRACLogs table, which captures Nexus/iDRAC bare-metal hardware management-controller logs.
scope: MEDIUM
notes: Log Analytics tables are a monitoring/diagnostics asset; their rows can contain operationally sensitive details (identities, queries, IPs) depending on the source.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports hardware management-controller log records, revealing infrastructure configuration and operational state.
