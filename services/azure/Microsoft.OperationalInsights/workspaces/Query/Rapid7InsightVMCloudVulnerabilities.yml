name: Log Analytics workspace table (Rapid7 InsightVM cloud vulnerabilities)
description: A Log Analytics workspace data-plane table storing ingested Rapid7 InsightVM cloud vulnerability-scan findings. Read access returns the table's log records.
scope: MEDIUM
notes: Vulnerability-scan telemetry is sensitive because it enumerates exploitable weaknesses across scanned cloud assets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading the table exports vulnerability-scan records (exfiltration:logs) and inventories exploitable infrastructure weaknesses/CVEs an attacker can target (discovery:infra).
