name: Log Analytics workspace table (AVNMRuleCollectionChange)
description: A per-table data-plane read permission on an Azure Log Analytics workspace, scoped to a single named table. AVNMRuleCollectionChange holds Azure Virtual Network Manager security-rule-collection change records.
scope: MEDIUM
notes: Log Analytics tables store collected monitoring telemetry; this table specifically records network security rule (NSG/firewall) configuration changes, aiding network reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:network
    notes: Reading this table exports network security rule change history, revealing firewall/NSG rule structure, topology, and defensive posture useful for finding network gaps.
