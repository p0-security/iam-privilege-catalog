name: Log Analytics DatabricksApps table
description: A Log Analytics workspace query table holding Azure Databricks Apps diagnostic/activity telemetry ingested into Azure Monitor.
scope: MEDIUM
notes: Operational diagnostic telemetry; may reveal Databricks application configuration and usage.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Data-plane read of the DatabricksApps table exports Databricks application activity telemetry.
