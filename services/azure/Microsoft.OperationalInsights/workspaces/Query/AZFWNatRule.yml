name: Azure Firewall NAT-rule log table (Log Analytics)
description: A Log Analytics workspace query data-plane permission scoped to the AZFWNatRule table, which stores Azure Firewall DNAT/NAT-rule traffic telemetry ingested into the workspace.
scope: MEDIUM
notes: NAT-rule logs reveal inbound port translations, exposed internal endpoints, and ingress paths into the network.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
      - discovery:network
    notes: Exports inbound DNAT translation records exposing published endpoints, ports, and internal target IPs (network ingress topology).
