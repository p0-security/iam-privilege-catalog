name: Log Analytics SecurityBaselineSummary table
description: A Log Analytics query data action over the SecurityBaselineSummary table, which stores aggregated/roll-up baseline-compliance posture summaries rather than full per-finding payloads.
scope: MEDIUM
notes: Monitoring/security posture summary telemetry.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Querying this table returns aggregated baseline-compliance status across resources, letting an attacker inventory defensive coverage and gaps; summary records are still exported log data.
