name: Log Analytics CrowdStrikeHosts log table
description: A Log Analytics workspace data-plane query permission scoped to the CrowdStrikeHosts table, which holds ingested CrowdStrike EDR host-inventory data (hostnames, OS, agent status).
scope: MEDIUM
notes: Endpoint asset inventory telemetry; doubles as a target catalog for an attacker.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:infra
    notes: Reading this table exports the EDR host inventory, enumerating managed endpoints as potential compromise targets.
