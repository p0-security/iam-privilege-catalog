name: Log Analytics ContainerInventory table
description: A Log Analytics workspace data table holding ContainerInventory records — an inventory of running/stopped containers with their images, ports, and command lines on monitored nodes.
scope: MEDIUM
notes: Resource-inventory metadata enumerating the container estate rather than sensitive log payload; MEDIUM sensitivity as monitoring data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads the inventory of containers, enumerating deployed workloads, images, ports, and command lines for infrastructure reconnaissance.
