name: Log Analytics workspace
description: An Azure Log Analytics workspace is the central data store and management resource for Azure Monitor logs, collecting and retaining telemetry/log data from agents, resources, and Microsoft Sentinel.
scope: MEDIUM
notes: Monitoring/diagnostics asset; it concentrates security and operational telemetry, so tampering with or destroying it enables anti-forensic evasion, but it is scoped to a monitoring function rather than to primary production data or identity controls.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:logs
    notes: Executes a KQL/search query that returns the collected log records, which may contain sensitive operational and security telemetry, enabling log exfiltration.
  read:
    risks:
      - exfiltration:logs
    notes: Returns ingested log records, allowing an attacker to read and export potentially sensitive log content.
    name: Log Analytics workspace search results
