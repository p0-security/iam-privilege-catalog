name: Log Analytics workspace notification settings
description: A user's notification settings for a Log Analytics workspace, controlling delivery preferences for workspace alerts/notifications.
scope: MEDIUM
notes: Low-sensitivity per-user configuration metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting notification settings can disable alert delivery for the workspace, removing a notification-based defense and impairing incident response.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Setting notification configuration can suppress or redirect alert notifications so security teams are not informed, weakening the alerting/response pathway.
