name: Log Analytics summary rule
description: A Log Analytics summary rule defines a scheduled aggregation that periodically runs a query over workspace data and writes derived/summarized records into a destination summary table. It is a control-plane configuration of the workspace logging pipeline.
scope: MEDIUM
notes: Summary rules govern derived monitoring/detection data; tampering affects log visibility and downstream detections but is monitoring-scoped (MEDIUM).
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:logs
    notes: Suspending a summary rule halts aggregation into its summary table, disabling that log collection and creating gaps that disrupt monitoring and detection.
