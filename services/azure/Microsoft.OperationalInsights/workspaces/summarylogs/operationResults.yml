name: Log Analytics summary logs async operation result
description: A status endpoint that returns the result of a previously-submitted asynchronous Log Analytics workspace summary-logs management operation.
scope: LOW
notes: Operation-status polling endpoint; returns only progress/result metadata for an async control-plane operation, not log data or configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the completion state of an async summarylogs operation; an inert status poll with no attacker capability in isolation.
