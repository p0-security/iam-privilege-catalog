name: Log Analytics data export
description: A data export rule that continuously ships ingested log data from selected tables to a destination such as a storage account or Event Hub.
scope: HIGH
notes: An export rule streams a live copy of ingested logs to an external destination; it can be abused to exfiltrate all telemetry or, when removed, to cut a downstream SIEM feed; HIGH.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - exfiltration:logs
      - exfiltration:data
    notes: Creating an export rule can continuously copy all ingested logs to attacker-controlled storage or an Event Hub, exfiltrating telemetry that may contain sensitive organizational data.
  delete:
    risks:
      - destruction:defense
    notes: Deleting an export rule cuts the downstream feed (e.g. to an external SIEM or archive), blinding detections and long-term retention that depend on it.
