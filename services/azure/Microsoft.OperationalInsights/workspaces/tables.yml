name: Log Analytics workspace tables
description: A Log Analytics workspace table defines the schema, plan, and retention for a stream of ingested log/telemetry records within a Log Analytics workspace.
scope: MEDIUM
notes: Tables govern monitoring/diagnostic log storage; their configuration controls log retention and availability for detection and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting a table removes the log stream and its collected records, destroying logs and disrupting the detection/incident-response capability that depends on them.
  read:
    risks:
      - discovery:logs
    scope: LOW
    notes: Reading a table returns its schema, plan, and retention configuration, inventorying which log types and fields exist without returning the log content itself.
  write:
    risks:
      - impact:manipulation
      - destruction:logs
    notes: Creating or updating a table lets an attacker alter schema and (notably) shorten retention or change the plan, manipulating the logging pipeline and silently aging out logs to weaken incident-response visibility.
