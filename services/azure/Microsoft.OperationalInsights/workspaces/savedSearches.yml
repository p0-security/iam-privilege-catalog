name: Log Analytics workspace saved searches
description: Stored KQL saved-search queries in a Log Analytics workspace, used for analyst hunting, dashboards, and as a basis for alert/detection logic.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Deletes a saved search query, removing an operational query/hunting artifact without affecting the underlying log data or collection.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a saved search modifies stored operational query content; it alters analytics/detection logic artifacts but does not by itself read log data or disable collection.
