name: Log Analytics query pack queries
description: Saved, reusable KQL query definitions stored in an Azure Monitor query pack; convenience/tooling artifacts that analysts run against log data.
scope: LOW
notes: Query packs hold query definitions only, not log data or active detections; blast radius is limited to investigative tooling.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    scope: MEDIUM
    notes: Performing actions on queries within a query pack (search/create/modify saved queries) lets an attacker alter the operational saved-query content analysts rely on.
    name: Azure Monitor Query Pack
    parent:
      description: A Query Pack is a container resource that stores reusable Log Analytics KQL queries, allowing teams to share saved monitoring/investigation queries across workspaces.
      notes: A monitoring support artifact; it holds query logic/tooling, not the log data itself, so its inherent sensitivity is low to medium.
  delete:
    risks:
      - destruction:metadata
    notes: Deleting query-pack queries removes saved KQL query definitions used operationally for investigation, with no effect on underlying log data.
  read:
    risks:
      - discovery:logs
    notes: Reading query-pack queries returns saved KQL definitions (not log data), letting an attacker inventory what is monitored and how.
  write:
    risks:
      - impact:manipulation
    notes: Create/update of saved query-pack queries lets an attacker alter shared analyst query definitions to mislead investigations; does not touch log data or detections directly.
