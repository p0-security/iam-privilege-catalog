name: Log Analytics workspace
description: A Log Analytics workspace, the central log store that ingests and retains telemetry for Azure Monitor and Microsoft Sentinel; it holds the security-relevant logs that every downstream detection and investigation depends on.
scope: HIGH
notes: The workspace aggregates security and operational logs across many organizational functions and is the evidence store for incident response, so the resource type is HIGH.
links:
  - https://azure.permissions.cloud/iam/Microsoft.OperationalInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - destruction:logs
    notes: Creating or relinking a workspace and changing its retention/ingestion settings can silently shorten log retention or reroute collection, shrinking the evidence trail.
  delete:
    risks:
      - destruction:logs
      - destruction:data
    notes: Deletes the entire log store, destroying all retained telemetry and the audit trail in one action.
