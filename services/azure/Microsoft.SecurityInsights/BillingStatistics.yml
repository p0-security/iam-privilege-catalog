name: Sentinel billing statistics
description: BillingStatistics expose Microsoft Sentinel data-ingestion volume and associated cost/usage figures for the workspace.
scope: LOW
notes: Read-only financial/usage telemetry; not production data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:finance
    notes: Reading BillingStatistics reveals ingestion volume and security spend, giving an attacker financial reconnaissance on the organization's Sentinel usage.
