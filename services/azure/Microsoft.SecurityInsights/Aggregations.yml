name: Microsoft Sentinel aggregations
description: Aggregations return summary statistics and counts computed over Microsoft Sentinel (SIEM) security data such as incidents and alerts.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Returns aggregate statistics over Sentinel security data, letting an attacker inventory the volume/shape of logged security activity without exporting raw records.
