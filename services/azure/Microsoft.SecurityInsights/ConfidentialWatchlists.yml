name: Microsoft Sentinel confidential watchlists
description: Confidential Watchlists are sensitive curated reference data sets in Microsoft Sentinel (e.g. VIP users, terminated employees, sensitive assets/IPs) that analytics rules correlate against during detection.
scope: HIGH
notes: Explicitly marked confidential; contents are sensitive security operations data, so the asset is HIGH sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - destruction:defense
    notes: Deleting Confidential Watchlists destroys sensitive curated data and removes the lookup tables that detection rules depend on, weakening defensive coverage.
  read:
    risks:
      - exfiltration:data
    notes: Reading Confidential Watchlists returns their sensitive curated contents, directly exfiltrating confidential security data useful for targeting and evasion.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating Confidential Watchlists lets an attacker tamper with the reference data that detection logic correlates against, skewing or evading analytics rules.
