name: Microsoft Sentinel confidential watchlist
description: A confidential Microsoft Sentinel watchlist holding sensitive lookup data used by analytics rules and hunting queries for detection context.
scope: MEDIUM
notes: Like standard watchlists these feed detections, but the confidential flag marks their contents as sensitive; write/delete abuse mirrors watchlists, so this is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Editing a confidential watchlist lets an attacker plant entries so rules joining against it suppress alerts on their activity.
  delete:
    risks:
      - destruction:defense
    notes: Deleting a confidential watchlist breaks the rules and queries that reference it, disabling the detections that depend on its context.
