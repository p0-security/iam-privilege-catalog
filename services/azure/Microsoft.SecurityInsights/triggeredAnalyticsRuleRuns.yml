name: Sentinel triggered analytics rule runs
description: Records of Microsoft Sentinel analytics (detection) rule executions, showing which detection rules have fired and when.
scope: MEDIUM
notes: Reveals detection execution state and coverage; useful for an attacker gauging whether their activity has triggered alerts.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading triggered analytics rule run history enumerates which detection rules have fired, revealing detection coverage and whether the attacker's activity raised alerts.
