name: Microsoft Sentinel subscription registration
description: Provider-level enablement actions that register or unregister a subscription with Microsoft Sentinel (Azure Sentinel), the cloud-native SIEM/SOAR threat-detection service.
scope: LOW
notes: These toggle the SIEM on/off for the workspace/subscription scope.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Idempotent onboarding action that activates the SIEM; it strengthens detection rather than weakening it and grants no offensive capability in isolation.
