name: Sentinel source-control connections
description: Microsoft Sentinel source-control connections that link a Git repository to a workspace and drive automated CI/CD deployment of security content (analytics rules, workbooks, playbooks, parsers).
scope: MEDIUM
notes: The content-deployment pipeline that maintains the SIEM's detection content; tampering can weaken or replace detections.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deletes a source-control connection, severing the pipeline that deploys and synchronizes Sentinel detection content and degrading detection coverage.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creates/updates a connection that auto-deploys detection content from a Git repo, letting an attacker repoint the pipeline at an attacker-controlled source to overwrite or weaken analytics/detection content.
