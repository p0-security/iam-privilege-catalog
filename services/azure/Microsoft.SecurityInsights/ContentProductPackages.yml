name: Sentinel content product packages
description: Content Product Packages are the catalog of installable Microsoft Sentinel solution/Content Hub packages (bundled detections, workbooks, playbooks) available to a workspace.
scope: LOW
notes: Non-sensitive marketplace-style inventory of available content; no data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading available content product packages only enumerates the catalog of installable Sentinel content, a low-sensitivity configuration inventory.
