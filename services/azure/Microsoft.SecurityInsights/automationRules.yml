name: Microsoft Sentinel automation rule
description: A Microsoft Sentinel automation rule that orchestrates incident handling, applying conditions to run playbooks, assign owners, change status, or suppress incidents automatically.
scope: HIGH
notes: Automation rules govern the SOAR response layer; tampering with them can disable auto-response or redirect it to attacker automation, so the resource type is HIGH.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:defense
      - escalation:lateral
    notes: Updating an automation rule can disable automated response or auto-close incoming incidents (defeating response), and can point the rule at an attacker-chosen playbook that then runs under its managed identity.
  delete:
    risks:
      - destruction:defense
    notes: Deleting an automation rule removes the automated incident-response orchestration it provided, so triggered incidents no longer drive a reaction.
