name: Microsoft Sentinel hunting bookmarks
description: Bookmarks are Microsoft Sentinel hunting artifacts that save query results, flagged log records, and analyst notes from threat-hunting investigations.
scope: MEDIUM
notes: Bookmarks embed log-derived event data and reveal what defenders have investigated.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting bookmarks destroys analyst-flagged hunting evidence and the saved log content it references, erasing investigation artifacts and impairing incident response.
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Reading bookmarks exposes saved hunting query results and pinned log evidence, both revealing what defenders have flagged and exporting the underlying log-derived content.
  write:
    risks:
      - impact:manipulation
    notes: Updating bookmarks lets an attacker alter or fabricate analyst hunting findings to mislead investigators and tamper with investigation artifacts.
