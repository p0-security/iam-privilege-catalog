name: Sentinel data export jobs
description: Microsoft Sentinel export connection jobs that configure the automated outbound export of SIEM security log and telemetry data to external destinations.
scope: MEDIUM
notes: Sentinel is the SOC's security monitoring and incident-response platform; export jobs govern the egress pipeline for security telemetry. Sensitivity is monitoring/security-tooling level (MEDIUM), not a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting an export job tears down the configured security-log export pipeline, disrupting downstream log collection and incident-response visibility.
  read:
    risks:
      - discovery:logs
    notes: Reading export-job configuration enumerates what Sentinel data is exported and to which destinations, reconnaissance of the security-log export pipeline.
  write:
    risks:
      - exfiltration:logs
      - collection:data
      - impact:manipulation
    notes: Creating/updating an export job can continuously route Sentinel security logs to an attacker-controlled destination (automated ongoing exfiltration) and alters the export configuration.
