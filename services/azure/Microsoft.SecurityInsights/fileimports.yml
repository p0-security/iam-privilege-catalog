name: Microsoft Sentinel file imports
description: Sentinel File Import objects represent jobs that ingest threat indicators and other data from uploaded files into a Microsoft Sentinel (Security Insights) workspace for detection and investigation.
scope: MEDIUM
notes: Security-monitoring data staging on a Log Analytics / Sentinel workspace; supports a single security function rather than a primary production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting a File Import removes ingested security data objects from the workspace, destroying data used for detection and investigation.
  read:
    risks:
      - discovery:data
    notes: Reading File Import objects enumerates the imported data sets and their metadata staged in the workspace, providing reconnaissance over the ingested security data.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a File Import injects attacker-controlled data into the SIEM, poisoning indicator/correlation inputs that detections and investigations rely on.
