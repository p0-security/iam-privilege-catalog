name: Microsoft Sentinel threat intelligence
description: Threat-intelligence (STIX) data in Microsoft Sentinel, the indicators and IOCs used to match ingested telemetry against known-malicious infrastructure.
scope: MEDIUM
notes: TI is a detection input rather than the full SIEM; degrading it narrows detection coverage but does not disable the platform, so this resource type is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Writing threat intelligence lets an attacker inject false indicators or alter existing ones, poisoning detection logic and potentially whitelisting their own infrastructure.
  delete:
    risks:
      - destruction:defense
    notes: Deleting threat intelligence removes indicators the SIEM matches against, degrading detection coverage of known-malicious infrastructure.
