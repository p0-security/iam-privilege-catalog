name: Microsoft Sentinel case (legacy incident)
description: A legacy Microsoft Sentinel case, the predecessor to incidents, holding aggregated alerts and investigation/response state.
scope: HIGH
notes: Cases are the legacy investigation and response record; deleting or tampering with them destroys the attack audit trail, mirroring incidents, so the resource type is HIGH.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Updating a case lets an attacker close or downgrade it to bury an active detection and mislead responders.
  delete:
    risks:
      - destruction:logs
    notes: Deleting a case destroys the legacy investigation and response record, erasing the audit trail it documented.
