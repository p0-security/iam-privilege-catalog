name: Sentinel incidents
description: Microsoft Sentinel incidents are consolidated security investigation records that aggregate correlated alerts, affected entities, severity, status, and analyst findings about a detected threat within a Log Analytics workspace.
scope: MEDIUM
notes: These records constitute the SOC's view of detection and response; tampering with or destroying them enables defense evasion, while reading them is reconnaissance into the defenders' awareness.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting an incident removes the SOC's consolidated record of a detected threat, destroying investigation/detection evidence and disrupting incident response to evade detection.
  read:
    risks:
      - discovery:logs
    notes: Reading an incident exposes what the SOC has detected (correlated alerts, affected entities, investigation state), letting an attacker learn whether their activity has been noticed.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Updating an incident lets an attacker close it, downgrade severity, or mark it a false positive to suppress SOC response (defense evasion) and tamper with the investigation record.
