name: Microsoft Sentinel threat intelligence indicators
description: Threat intelligence indicators are the indicators of compromise (IOCs) stored in Microsoft Sentinel that drive analytics, hunting, and detection matching against ingested telemetry.
scope: LOW
notes: Tampering with this detection content weakens the SIEM's ability to flag attacker activity, but it is a single security function rather than a tenant-wide control; modal scope is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:data
    notes: Querying the IOC set lets an attacker learn which of their indicators are already tracked, enabling evasion.
