name: Microsoft Sentinel threat intelligence indicators
description: Threat intelligence indicators are the indicators of compromise (IOCs) stored in Microsoft Sentinel that drive analytics, hunting, and detection matching against ingested telemetry.
scope: MEDIUM
notes: Tampering with this detection content weakens the SIEM's ability to flag attacker activity, but it is a single security function rather than a tenant-wide control; modal scope is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting an IOC removes a detection signal so attacker activity matching it goes unflagged.
  read:
    risks:
      - discovery:data
    scope: LOW
    notes: Reading IOCs reveals which indicators of the attacker's infrastructure are already tracked, enabling evasion.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Updating an IOC lets an attacker neuter or falsify indicators of their own infrastructure (weakening detection) and manipulate operational security data.
