name: Microsoft Sentinel threat intelligence
description: Microsoft Sentinel threat-intelligence indicators (IOCs) — the curated set of known-bad indicators (IPs, domains, hashes, etc.) that feed Sentinel analytics rules and detections.
scope: MEDIUM
notes: This is the SOC's detection content; reading it reveals defensive coverage and modifying it directly affects what the SIEM can detect.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:logs
    notes: Querying TI enumerates the stored indicators, exposing the org's detection coverage for evasion planning.
