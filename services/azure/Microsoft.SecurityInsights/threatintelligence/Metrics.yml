name: Microsoft Sentinel threat intelligence
description: Microsoft Sentinel threat-intelligence indicators (IOCs) — the curated set of known-bad indicators (IPs, domains, hashes, etc.) that feed Sentinel analytics rules and detections.
scope: LOW
notes: This is the SOC's detection content; reading it reveals defensive coverage and modifying it directly affects what the SIEM can detect.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:logs
    notes: Collecting TI metrics returns only aggregate counts/statistics about the indicator set — low-sensitivity reconnaissance of defensive scope.
  read:
    risks:
      - discovery:data
    notes: Returns only aggregate counts/statistics about the threat-intel dataset, minor reconnaissance.
    name: Microsoft Sentinel threat intelligence metrics
    parent:
      description: Threat intelligence metrics are aggregate statistics about the threat intelligence (IOC) dataset stored in Microsoft Sentinel.
      notes: Read-only aggregate summary data; low sensitivity.
