name: Microsoft Sentinel incident
description: A Microsoft Sentinel incident aggregating related alerts, entities, and analyst activity into the primary case record for security investigation and response.
scope: HIGH
notes: Incidents are the SOC's investigation and response record; deleting or tampering with them destroys the audit trail of an attack, so the resource type is HIGH.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Updating an incident lets an attacker close it, downgrade its severity, or reassign it to bury an active detection and mislead responders.
  delete:
    risks:
      - destruction:logs
    notes: Deleting an incident destroys the aggregated investigation and response record, erasing the audit trail of the attack it documented.
