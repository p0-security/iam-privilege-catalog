name: Microsoft Sentinel settings
description: Microsoft Sentinel (Security Insights) settings configure the SIEM's analytics and detection features on a Log Analytics workspace, including UEBA, anomalies, entity analytics, and EyesOn data collection.
scope: HIGH
notes: A workspace-scoped SIEM detection/monitoring control underpinning the SOC's threat detection and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:logs
    notes: Deleting a Sentinel setting removes a configured detection/analytics capability and can disrupt the associated security data/log collection (e.g. EyesOn/UEBA ingestion), disabling a defense and impairing incident response.
  write:
    risks:
      - destruction:defense
    notes: Updating Sentinel settings lets an attacker disable SIEM detection analytics (UEBA, anomalies, entity analytics), weakening the SOC's primary threat-detection capability to evade alerting.
