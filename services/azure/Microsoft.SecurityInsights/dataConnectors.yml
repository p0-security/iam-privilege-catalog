name: Sentinel data connectors
description: Microsoft Sentinel data connectors define the telemetry/log sources ingested into the SIEM workspace from Azure, Microsoft, and third-party systems.
scope: HIGH
notes: They determine the SIEM's monitoring coverage; their configuration reveals which systems are and are not logged.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting a data connector halts ingestion of a security log source into the SIEM, destroying log collection and crippling the detection coverage that depends on it.
  read:
    risks:
      - discovery:logs
    scope: MEDIUM
    notes: Reading data connectors enumerates which log/telemetry sources feed the SIEM, exposing monitoring coverage and blind spots an attacker can exploit to avoid being logged.
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Updating a data connector lets an attacker disable or reconfigure ingestion of security telemetry, cutting off log collection feeding detections and blinding the SIEM.
