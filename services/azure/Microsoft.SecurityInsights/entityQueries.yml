name: Microsoft Sentinel entity investigation queries
description: Entity queries are the saved investigation expansion (KQL) query definitions Sentinel uses to pivot from one entity to related entities and activity during investigations.
scope: MEDIUM
notes: These definitions encode SOC investigation tradecraft and detection-pivot logic; reading them can reveal detection gaps.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reads the entity investigation expansion query definitions, exposing how the SOC pivots on entities and where detection coverage may be weak.
