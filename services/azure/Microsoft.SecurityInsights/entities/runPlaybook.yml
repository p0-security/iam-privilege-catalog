name: Microsoft Sentinel entities
description: Microsoft Sentinel entities are the investigation objects (accounts, hosts, IP addresses, files, etc.) that Sentinel extracts and correlates from ingested security logs to build an investigation/entity graph.
scope: HIGH
notes: Entity data is log-derived SIEM investigation telemetry; exposing it reveals what the SOC observes and tracks, which can aid an attacker in understanding detection coverage.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - impact:manipulation
    notes: Triggers a SOAR playbook (Logic App) against an entity, executing automated actions under the playbook's managed identity/connections, enabling lateral movement and mutation of operational/incident state.
