name: Microsoft Sentinel hunt
description: A Microsoft Sentinel hunt, a proactive threat-hunting investigation record capturing hypotheses, queries, findings, and linked evidence.
scope: MEDIUM
notes: Hunts hold proactive investigation context rather than live detection logic; deleting them destroys investigation records but does not disable the platform, so this is MEDIUM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.SecurityInsights
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Updating a hunt lets an attacker alter findings or hypotheses to steer a hunt away from their activity and mislead threat hunters.
  delete:
    risks:
      - destruction:logs
    notes: Deleting a hunt destroys the proactive-investigation record and its linked findings, erasing the trail of what was examined.
