name: Federated identity credentials
description: Federated identity credentials configure OIDC trust bindings (external issuer/subject/audience) on a user-assigned managed identity, allowing an external workload to obtain Azure tokens AS that identity without any secret.
scope: CRITICAL
notes: These are credential-less trust relationships on an identity that may hold arbitrary RBAC; controlling them enables direct impersonation and persistence, so the asset is identity/credential-tier CRITICAL.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ManagedIdentity
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deleting a FIC removes the OIDC trust binding (an access-control policy) that legitimate federated workloads rely on, both destroying the trust policy and denying those workloads their authorized access.
  read:
    risks:
      - discovery:policy
    notes: Reading/listing FICs enumerates the OIDC issuer/subject trust bindings governing who can assume the managed identity, mapping access-control relationships and impersonation weak points.
  write:
    risks:
      - persistence:account
      - escalation:lateral
    notes: Adding/updating a FIC lets an attacker register an external OIDC issuer/subject they control as trusted, minting tokens as the managed identity for durable secretless persistence and lateral movement into that identity's privileges.
