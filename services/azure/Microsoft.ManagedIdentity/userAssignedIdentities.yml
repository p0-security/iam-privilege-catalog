name: User Assigned Identities
description: "Azure user-assigned managed identities: standalone identity principals (with clientId/principalId) that can be granted RBAC roles and attached to compute resources to authenticate as that identity."
scope: CRITICAL
notes: Managed identities are first-class security principals; controlling or attaching them is a direct path to lateral movement and privilege escalation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ManagedIdentity
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:account
      - impact:dos
    notes: Deleting a user-assigned identity destroys an identity principal and breaks authentication for every resource bound to it, denying service to dependent workloads.
  write:
    risks:
      - persistence:account
    notes: Creating a new user-assigned identity establishes an attacker-controlled principal that can later be granted roles and attached to resources, a durable persistence foothold; updating an existing one only changes tags.
