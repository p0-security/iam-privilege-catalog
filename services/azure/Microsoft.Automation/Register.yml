name: Microsoft Automation resource provider registration
description: Subscription-level registration action for the Microsoft.Automation resource provider, which enables the Azure Automation provider namespace in the subscription.
scope: LOW
notes: Provider registration is an administrative enablement action; it does not itself create, read, or delete resources or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Registering the subscription to Azure Automation is an enablement no-op that exposes no data and confers no meaningful attacker capability on its own.
