name: Azure Automation update deployment machine run
description: An Azure Automation update deployment machine run represents the per-machine status/results of an Update Management patch deployment executed against managed machines.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading a machine run exposes patch-deployment status and the inventory/state of targeted machines, providing read-only infrastructure reconnaissance.
