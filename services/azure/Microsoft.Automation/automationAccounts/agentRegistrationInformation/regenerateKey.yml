name: Automation DSC agent registration information
description: DSC agent registration information for an Azure Automation account contains the registration endpoint URL and the primary/secondary registration keys that machines use to enroll as DSC pull-mode managed nodes.
scope: CRITICAL
notes: "The registration keys are credential material: holding them lets an attacker onboard arbitrary/rogue nodes and pull or push desired-state configurations to managed machines, so this resource is treated as CRITICAL."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
      - impact:access
    notes: Regenerating the registration key returns fresh usable key material to the caller (credential exfiltration enabling rogue node onboarding/lateral access) while invalidating the prior key, denying legitimately enrolled nodes the ability to register.
