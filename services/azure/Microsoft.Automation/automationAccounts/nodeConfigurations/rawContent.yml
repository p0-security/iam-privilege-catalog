name: Azure Automation DSC node configuration
description: An Azure Automation DSC Node Configuration is a compiled Desired State Configuration (MOF) document that defines and is enforced on managed nodes (VMs/servers) registered to the Automation account.
scope: HIGH
notes: MOF content can embed sensitive settings, file paths, and (in poorly-secured configs) credentials, and reveals exactly how the managed fleet is configured.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:data
      - discovery:infra
    notes: Returns the raw compiled MOF content of a node configuration, exposing the exact configuration applied to managed nodes and any embedded sensitive settings or credentials.
