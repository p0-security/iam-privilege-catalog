name: Workspace linked to Automation account
description: The linked-workspace resource exposes the identifier of the Log Analytics workspace associated with an Automation account.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns only the resource identifier of the linked Log Analytics workspace, letting an attacker discover an adjacent infrastructure resource to pivot toward, but exposing no data or keys.
