name: Azure Automation private link group information
description: Private Link group (sub-resource) information for an Azure Automation account, listing the groupIds available for creating private endpoints.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading private link group information only enumerates the available private-endpoint group IDs/network metadata, which is network reconnaissance.
