name: Azure Automation watcher stream
description: An Azure Automation watcher stream is the output/log stream emitted by a watcher runbook job, containing its execution output, verbose, and error records.
scope: MEDIUM
notes: Runbook stream output can inadvertently contain sensitive values or identifiers emitted during execution.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reading a watcher stream discloses the runbook job's output/log content (not merely an enumeration), which can leak operationally sensitive data and inadvertently logged values produced during execution.
