name: Azure Automation watcher job
description: An Azure Automation watcher is a scheduled job that repeatedly invokes a watcher runbook (PowerShell) inside the Automation sandbox to monitor for a condition and trigger action runbooks; the code executes under the Automation account's Run As / managed identity.
scope: HIGH
notes: Watcher jobs run attacker-supplied/referenced runbook code as the Automation account's identity, which is frequently granted broad subscription roles.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Stopping the watcher halts the running automation/monitoring it performs, disrupting that operation.
