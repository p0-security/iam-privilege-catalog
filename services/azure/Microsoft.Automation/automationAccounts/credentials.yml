name: Azure Automation credential asset
description: An Azure Automation credential asset stores a username/password pair within an Automation account that runbooks and DSC configurations use to authenticate to external systems and resources.
scope: HIGH
notes: The password value is write-only via ARM and is only retrievable from inside a runbook (Get-AutomationPSCredential); the control plane never returns the secret. The asset still represents a stored service-account identity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:dos
    notes: Deleting a credential asset destroys stored secret credential material and breaks any runbooks/automation that depend on it, disrupting automated operations.
  read:
    risks:
      - discovery:account
    scope: MEDIUM
    notes: The control-plane GET returns the credential's name, username, and metadata but not the password, letting an attacker inventory stored credential identities as targets without exfiltrating secret material.
  write:
    risks:
      - persistence:account
      - impact:manipulation
    notes: Creating or updating a credential asset lets an attacker plant attacker-controlled username/password material that runbooks authenticate with (persistence) or overwrite existing credentials to poison downstream automation (manipulation).
