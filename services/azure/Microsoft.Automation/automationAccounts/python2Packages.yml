name: Automation Python 2 package
description: An imported Python 2 module/package available to runbooks in an Azure Automation account.
scope: MEDIUM
notes: Runbook runtime dependency; reading exposes inventory metadata, while writing injects code executed under the account's managed identity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deleting a Python 2 package removes a runbook dependency artifact, which can break automation jobs that import it.
  read:
    risks:
      - discovery:infra
    notes: Reading a Python 2 package returns metadata (name, version, state), inventorying runbook dependencies without exposing code or secrets.
  write:
    risks:
      - escalation:lateral
      - impact:manipulation
    scope: HIGH
    notes: Importing/updating a Python 2 package plants attacker-controlled code that runbooks load and execute under the Automation account's managed identity, enabling code execution as that identity and supply-chain tampering with automation logic.
