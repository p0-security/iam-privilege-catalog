name: Azure Automation Source Control keys
description: The listKeys action for an Azure Automation source control returns the stored access token (Git PAT/OAuth credential) used to authenticate to the linked repository.
scope: CRITICAL
notes: The displayName is mislabeled as 'Create or Update'; this is a listKeys credential-retrieval action that returns reusable secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Despite the misleading displayName, this listKeys action returns the source control's stored Git access token, exporting reusable credential material that lets an attacker authenticate to and pivot into the linked source repository.
