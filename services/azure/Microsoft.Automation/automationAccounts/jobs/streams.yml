name: Azure Automation job stream
description: An Azure Automation job stream holds the detailed per-record output of a runbook job execution (output, verbose, error, warning, debug, and progress streams).
scope: HIGH
notes: Streams frequently capture intermediate data and values surfaced during runbook execution and are a common place where sensitive data and secrets are inadvertently logged.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:data
    notes: Reads job stream records (output/verbose/error/debug), which frequently expose intermediate sensitive data and occasionally credentials logged during runbook execution.
