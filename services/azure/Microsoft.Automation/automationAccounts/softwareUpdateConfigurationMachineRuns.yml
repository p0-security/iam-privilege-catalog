name: Automation software update configuration machine run
description: The per-machine execution record/result of an Azure Automation software update configuration run.
scope: LOW
notes: Read-only operational run history; exposes targeted machines and patch outcomes but no code or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading a machine run returns per-machine patch-deployment status/results, providing infrastructure reconnaissance with no execution or data access.
