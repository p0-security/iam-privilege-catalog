name: Azure Automation Hybrid Runbook Worker Group
description: An Azure Automation Hybrid Runbook Worker Group is a registered set of on-prem/cloud machines designated to execute Automation runbooks outside the Azure sandbox.
scope: HIGH
notes: Worker groups are execution infrastructure; runbooks run on these hosts under the workers' host/managed identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deletes a worker group, removing the execution capacity for hybrid runbooks and disrupting any automation that depends on those workers.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reads a worker group definition, inventorying the machines registered to execute runbooks and identifying execution targets for later abuse.
  write:
    risks:
      - escalation:lateral
      - impact:hijack
      - impact:manipulation
    notes: Creates/configures a worker group, letting an attacker designate machines that run runbooks under the workers' identities, enabling code execution and lateral movement onto controlled/targeted hosts plus arbitrary workload execution.
