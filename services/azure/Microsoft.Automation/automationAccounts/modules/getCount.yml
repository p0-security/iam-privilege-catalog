name: Azure Automation PowerShell module
description: An Azure Automation PowerShell module is an imported package/dependency available to runbooks within an Automation Account, providing cmdlets the automation scripts rely on.
scope: LOW
notes: Modules are imported code dependencies executed inside runbooks under the Automation Account identity, making module write a supply-chain code-injection vector.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:infra
    notes: Returns only the aggregate count of installed PowerShell modules, a trivial inventory/reconnaissance signal.
