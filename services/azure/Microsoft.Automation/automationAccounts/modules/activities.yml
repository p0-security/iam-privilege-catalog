name: Azure Automation module activities
description: Azure Automation module activities are the cmdlets/activities exposed by PowerShell modules imported into an Automation account. Reading them enumerates the automation capabilities available to runbooks.
scope: LOW
notes: Read-only inventory of module capabilities; non-sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading module activities enumerates the cmdlets/activities exposed by imported modules, a low-sensitivity inventory of available automation capabilities with no data or credential exposure.
