name: Azure Automation runbook operation results
description: The asynchronous operation-result/status record for a long-running Azure Automation runbook control-plane operation.
scope: LOW
notes: Operation-status polling endpoint; returns transient operation state, not runbook content or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling the status/result of a prior async runbook operation returns only operation progress state and grants no meaningful standalone attacker capability.
