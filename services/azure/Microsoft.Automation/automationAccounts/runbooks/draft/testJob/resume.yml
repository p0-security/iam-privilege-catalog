name: Azure Automation runbook draft test job
description: An Azure Automation runbook draft test job represents a test execution of an unpublished (draft) runbook within an Automation account. Creating one runs the draft's PowerShell/Python code in the Automation sandbox, typically under the account's managed identity or Run As credential.
scope: MEDIUM
notes: Test jobs execute arbitrary runbook code under the Automation account's identity, so write/resume actions on them are an effective code-execution-as-identity primitive; the asset is treated as supporting automation infrastructure (MEDIUM) rather than a primary production resource.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - impact:hijack
    notes: Resuming a suspended draft test job continues execution of the runbook code under the Automation account's identity, re-engaging code execution as that identity (lateral movement) and consuming compute to run the workload (hijack).
