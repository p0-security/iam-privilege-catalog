name: Azure Automation statistics
description: Azure Automation statistics are aggregate operational metrics summarizing activity and usage within an Automation Account (e.g. job counts and status summaries).
scope: LOW
notes: Read-only summary metrics; non-sensitive, useful only for reconnaissance of automation activity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading Automation statistics returns aggregate operational metrics about the account, enabling low-sensitivity reconnaissance of automation activity and footprint.
