name: Azure Automation node count summary
description: A node count summary returns aggregate counts of DSC-managed nodes by type for an Automation account.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns only an aggregate node count summary by type, a low-sensitivity enumeration of managed-node inventory size with no configuration content.
