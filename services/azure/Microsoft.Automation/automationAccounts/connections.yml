name: Azure Automation connection asset
description: An Azure Automation Connection asset stores the authentication configuration runbooks use to connect to external services (e.g. service principal app/tenant IDs, certificate thumbprints, subscription bindings). Secret field values are stored encrypted and write-only.
scope: HIGH
notes: Connection assets reference credential material, but the control plane does not return the encrypted secret field values in plaintext; they are resolved only at runbook runtime via Get-AutomationConnection.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Automation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:crypto
    notes: Deleting a connection asset removes the stored credential/connection configuration that runbooks depend on, destroying the credential material and breaking dependent automation jobs (denial of service to those workflows).
  read:
    risks:
      - discovery:infra
      - discovery:account
    scope: MEDIUM
    notes: A control-plane get returns connection field metadata and non-secret values (identity/endpoint references) but not the encrypted credential values, so this is reconnaissance of credential-bearing identities and configuration, not secret exfiltration.
  write:
    risks:
      - persistence:account
      - escalation:lateral
      - impact:manipulation
    notes: Create/update lets an attacker plant or alter the credential/service-principal material that runbooks authenticate with, staging persistent attacker-controlled credentials and redirecting automated jobs to authenticate as a modified identity (lateral movement).
