name: Deleted Backup Instance
description: A deleted Backup Instance is a soft-deleted backup protection configuration retained in the vault that can be inspected or recovered before permanent purge.
scope: LOW
notes: Reflects which resources were protected and recently removed from backup.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DataProtection
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading a soft-deleted backup instance by name enumerates the configuration of removed backup protection, providing reconnaissance of which resources were protected and recently removed.
