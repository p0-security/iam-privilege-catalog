name: Recovery points
description: Recovery points are the individual backup snapshots/restore points of protected workloads held within a Backup Vault's backup instances.
scope: MEDIUM
notes: Reading recovery point details exposes metadata about available restore points but not the backed-up data payload itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DataProtection
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Reading recovery point details enumerates available backup snapshots (timestamps/identifiers), aiding reconnaissance of restorable data without returning the data itself.
