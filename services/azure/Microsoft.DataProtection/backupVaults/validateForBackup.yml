name: Backup vaults
description: A Backup Vault is the Azure DataProtection resource container that holds backup instances, policies, and recovery points for protected workloads.
scope: LOW
notes: The vault and its contained recovery points are the recovery mechanism that mitigates data loss and ransomware.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DataProtection
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: A pre-flight validation check that verifies whether a backup instance can be backed up; performs no state change and returns only feasibility results.
