name: Microsoft.DataProtection resource provider registration
description: Subscription-level registration toggle for the Microsoft.DataProtection resource provider.
scope: LOW
notes: Enablement/disablement of the provider's API surface; idempotent and does not itself touch resources or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DataProtection
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Unregisters the subscription from the provider; in isolation Azure blocks this while resources exist, so it grants no reliable destructive or denial-of-service capability.
