name: Soft-deleted Backup Vault
description: A soft-deleted Backup Vault retained in a recoverable (soft-delete) state, exposing the deleted vault's configuration metadata at the subscription/location scope.
scope: LOW
notes: Read-only enumeration of deleted backup infrastructure; reveals what vaults existed and their configuration but not backed-up data contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DataProtection
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads the configuration of a soft-deleted Backup Vault by name, enabling read-only inventory/reconnaissance of deleted backup infrastructure with no data access or state change.
