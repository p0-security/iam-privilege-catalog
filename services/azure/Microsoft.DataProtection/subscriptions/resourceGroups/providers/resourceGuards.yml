name: Resource guards
description: A ResourceGuard implements Multi-User Authorization (MUA) for Azure Backup, gating critical/destructive backup operations (disabling soft delete, deleting backups, reducing retention) behind a second approval.
scope: HIGH
notes: ResourceGuard is an anti-tampering/anti-ransomware defense control protecting backups from malicious deletion.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DataProtection
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a ResourceGuard removes the multi-user-authorization defense, re-enabling unguarded destructive backup operations (deleting backups, reducing retention, disabling soft delete).
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a ResourceGuard reconfigures which critical backup operations are gated by multi-user authorization, letting an attacker weaken or misconfigure this defense control.
