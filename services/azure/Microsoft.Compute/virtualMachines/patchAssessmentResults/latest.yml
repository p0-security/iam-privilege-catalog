name: Virtual Machine patch assessment results
description: Read-only records summarizing the latest guest OS patch assessment operation on an Azure virtual machine, including counts and categories of outstanding updates.
scope: LOW
notes: Patch assessment data reveals the VM's pending-update/vulnerability posture, useful for targeting but containing no secrets or organizational data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Retrieving the latest patch assessment summary discloses the VM's outstanding-patch/vulnerability posture, read-only reconnaissance that aids target selection but exposes no data or credentials.
