name: VM metric definitions
description: The catalog of Azure Monitor metric definitions (the schema of available metric names/types) for a virtual machine.
scope: LOW
notes: Read-only monitoring schema; exposes which metrics exist, not their values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Enumerates the available monitoring metric schema for a VM; low-sensitivity logs/monitoring reconnaissance.
