name: Virtual Machine patch installation software-patch results
description: Read-only per-patch records listing the individual software patches attempted during the last patch installation operation on an Azure virtual machine.
scope: LOW
notes: Per-patch results reveal the VM's installed/missing software updates and thus its vulnerability posture, useful for targeting but containing no secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Listing the patches attempted during the last installation enumerates per-patch status, revealing the VM's installed/missing patches and vulnerability posture for targeting; discloses no data or secrets.
