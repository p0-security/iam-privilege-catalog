name: Virtual machine preserved OS disk deletion
description: An Azure Compute virtual machine, the primary IaaS compute workload running an operating system, application code, and any locally attached disks.
scope: CRITICAL
notes: A virtual machine is a full application workload; compromise of its configuration or lifecycle typically yields compromise of the OS, application data, and any identities (managed identities, service principals) bound to it.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:data
    scope: HIGH
    notes: Deletes an OS disk preserved from a prior delete/reimage operation, destroying a recovery artifact that could otherwise be used to restore the VM's prior state.
