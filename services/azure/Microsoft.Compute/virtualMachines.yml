name: Virtual Machines
description: "An Azure virtual machine: a production compute resource running an OS, applications, attached disks, network interfaces, and optionally a managed identity."
scope: HIGH
notes: A VM typically supports a single organizational function; control-plane and data-plane access to it can expose on-disk data, attached managed-identity credentials, and the hosted service's availability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - escalation:privilege
      - impact:manipulation
    notes: Creating or updating a VM's model can attach a managed identity or admin credentials, change the OS disk/image, or alter extensions, letting an attacker grant themselves the identity's privileges or plant a backdoored configuration.
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Permanently deletes the virtual machine, destroying the compute workload and interrupting whatever organizational function it served.
