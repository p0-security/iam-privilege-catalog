name: Virtual Machines
description: "An Azure virtual machine: a production compute resource running an OS, applications, attached disks, network interfaces, and optionally a managed identity."
scope: HIGH
notes: A VM typically supports a single organizational function; control-plane and data-plane access to it can expose on-disk data, attached managed-identity credentials, and the hosted service's availability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the VM destroys production compute infrastructure and denies the service it hosts.
  read:
    risks:
      - discovery:infra
    notes: Reading VM properties (size, OS, network interfaces, identity, image, extensions) is read-only infrastructure reconnaissance of a production compute resource.
  write:
    risks:
      - escalation:lateral
      - impact:manipulation
      - impact:hijack
      - impact:spend
    notes: Create/update lets an attacker assign or attach a managed identity (lateral movement), inject extensions/custom-data to run code as the resource, alter VM config, and provision compute to run workloads at organizational cost.
