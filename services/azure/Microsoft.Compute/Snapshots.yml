name: Disk snapshots
description: An Azure snapshot is a read-only point-in-time copy of a managed disk; it captures the complete filesystem contents of the source disk including any OS credentials, application data, and secrets present at capture time.
scope: HIGH
notes: A snapshot is a full copy of a single workload's disk data, often used for backup/recovery. SAS-based access to its raw bytes bypasses VM-level access controls.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - destruction:infra
    notes: Deleting a snapshot destroys the point-in-time copy of organizational data it preserves, undermining backup/recovery, and removes the storage resource.
  read:
    risks:
      - discovery:infra
    notes: Control-plane get returns only snapshot configuration (source disk, size, SKU, encryption state) for infrastructure reconnaissance; it does not return raw snapshot data or a SAS token.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Create/update lets an attacker capture a full point-in-time copy of a disk's data (staging it for later SAS-based exfiltration), alter snapshot configuration, and provision costly storage.
