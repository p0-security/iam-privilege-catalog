name: VM restore point collections
description: "Restore point collections: the container resource that groups VM restore points (point-in-time crash-consistent disk backups) for one or more virtual machines."
scope: HIGH
notes: Backup/recovery infrastructure; contained restore points hold copies of full VM disk data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deletes the collection and cascades to all contained restore points, destroying VM disk backups and defeating the backup mitigation against data loss.
  write:
    risks:
      - impact:manipulation
    scope: MEDIUM
    notes: Creating/updating the collection container alters backup-organization configuration; in isolation it does not capture or expose disk data.
