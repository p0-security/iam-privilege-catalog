name: Compute interconnect blocks
description: An interconnect block is a Microsoft.Compute resource representing high-speed InfiniBand/GPU interconnect fabric used to network compute nodes together for tightly coupled HPC/AI training workloads, and to deploy VMs/VMSS onto that fabric.
scope: HIGH
notes: These resources back specialized, costly GPU supercomputing clusters; manipulating or deploying onto them can incur significant spend and disrupt cluster connectivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting an interconnect block tears down the interconnect fabric backing dependent VM/VMSS deployments, destroying infrastructure with a denial-of-service-like effect on the GPU cluster.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Getting an interconnect block returns its configuration, a read-only inventory of the compute/interconnect topology.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating/updating an interconnect block alters the specialized GPU interconnect fabric configuration and can provision costly reserved capacity, enabling operational manipulation and attacker-incurred spend.
