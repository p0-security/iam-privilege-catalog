name: Virtual Machine Sizes for Availability Set
description: A read-only listing of the VM SKU sizes available for creating or updating a VM within a given availability set; it returns capacity/capability metadata only.
scope: LOW
notes: Pure capability/SKU enumeration with no sensitive data, secrets, or configuration mutation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Listing available VM sizes for an availability set only enumerates non-sensitive capacity/SKU options, basic infrastructure reconnaissance.
