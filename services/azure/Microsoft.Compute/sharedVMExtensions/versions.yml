name: Shared VM extension versions
description: A Shared VM Extension Version is a specific published version of a shared VM extension, carrying the actual executable code/script payload that runs on Azure VMs installing the extension.
scope: HIGH
notes: The version is where the executable payload lives; controlling it lets code run with elevated/system privileges on every consuming VM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deleting an extension version removes a specific published payload artifact that consuming VMs/deployments may be pinned to, disrupting dependent operations.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Reading an extension version only enumerates its configuration properties, yielding infrastructure reconnaissance without disclosing the payload as secret material.
  write:
    risks:
      - impact:manipulation
      - escalation:lateral
      - impact:hijack
    notes: Creating/updating an extension version publishes the actual code payload that executes with system privileges on every consuming VM, enabling code execution as the VM identity (lateral movement), payload tampering, and use of VM resources.
