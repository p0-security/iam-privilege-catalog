name: Compute async operation status
description: The status record of an asynchronous Microsoft.Compute operation in a location, used to poll the progress/result of a long-running request.
scope: LOW
notes: Operation-status polling endpoint; reveals only the state of a previously initiated operation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling an asynchronous operation's status is inert and grants no meaningful attacker capability in isolation.
