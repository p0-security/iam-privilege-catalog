name: VM extension type catalog
description: A read-only view of an Azure Marketplace VM extension type, part of the public catalog of available VM extensions.
scope: LOW
notes: Marketplace catalog data is essentially public and common across all tenants; reading it enables only low-value reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads a VM extension type from the public extension catalog, enumerating available extension types for reconnaissance.
