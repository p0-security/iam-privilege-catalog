name: Run command catalog
description: The catalog of built-in run-command definitions available in a location (the list of supported command templates), not the execution of any command on a resource.
scope: LOW
notes: Listing only enumerates available command definitions; it does not invoke commands or touch any specific resource.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists the available run-command definitions in a location, providing only reference/infrastructure discovery with no execution capability.
