name: Compute usage and quota metrics
description: Subscription-level compute service limits and current usage quantities (quota consumption) for a given location.
scope: LOW
notes: Reveals capacity headroom and utilization useful for planning stealthy provisioning or resource exhaustion, but no sensitive data or control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads compute quota limits and current usage, inventorying the subscription's infrastructure capacity/consumption posture.
