name: Edge-zone platform image catalog
description: The Azure Marketplace / platform image catalog (publishers, offers, SKUs, versions) available in a specific edge zone, browsed when selecting VM images.
scope: LOW
notes: Essentially public, cross-tenant reference catalog data; reading it conveys only which images are available in an edge zone.
links:
