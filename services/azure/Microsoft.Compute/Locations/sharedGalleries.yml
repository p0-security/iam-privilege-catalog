name: Shared image galleries
description: Shared Galleries in Microsoft Compute, image galleries directly shared to a subscription, exposing the gallery's metadata and available shared image definitions.
scope: LOW
notes: Read-only inventory of shared image-gallery metadata; does not expose image contents or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads the properties of a shared gallery, inventorying which image galleries are shared/available for reconnaissance with no data or secret disclosure.
