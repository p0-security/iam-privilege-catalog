name: Shared gallery images
description: Shared Gallery Images in Microsoft Compute, image definitions within a gallery shared to the subscription, exposing the image's catalog metadata.
scope: LOW
notes: Read-only inventory of shared image-catalog metadata; does not expose the image contents or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads the properties of a shared gallery image, enumerating available shared image definitions for reconnaissance without exposing image contents.
