name: Shared gallery image version
description: A versioned VM image artifact published through a shared Azure Compute Gallery, identified by location. Represents image metadata available for VM/scale-set deployment.
scope: LOW
notes: Shared/community gallery image metadata is non-sensitive infrastructure inventory.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading image version properties only enumerates available image artifact metadata for reconnaissance; no contents or credentials returned.
