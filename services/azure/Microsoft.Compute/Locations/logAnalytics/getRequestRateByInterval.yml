name: Compute Log Analytics throttling diagnostics
description: The Microsoft.Compute locations Log Analytics actions generate aggregate diagnostic reports of Compute API request and throttling activity per region. They are read-style telemetry/diagnostics actions.
scope: LOW
notes: Yield only aggregate operational usage/throttling counts; no resource data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:logs
    notes: Generates an aggregate report of total Compute API request rate by time interval, exposing operational usage telemetry for throttling diagnostics.
