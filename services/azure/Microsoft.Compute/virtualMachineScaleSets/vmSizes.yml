name: VM Scale Set available VM sizes
description: This read-only sub-resource lists the VM sizes available for creating or updating virtual machines within a virtual machine scale set.
scope: LOW
notes: Exposes only non-sensitive capability/sizing metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Listing available VM sizes for a scale set is read-only reconnaissance of provisioning options with no sensitive data exposure.
