name: Virtual Machine Scale Set Extensions
description: Virtual machine scale set extensions are agents/code (e.g. CustomScript, RunCommand, antimalware, Azure Monitor Agent) applied fleet-wide to every instance in an Azure VMSS and managed through the scale set control plane.
scope: HIGH
notes: Scale-set extensions provide in-guest code execution amplified across the entire fleet under each instance's managed identity. The GET API does not return protectedSettings, so reads expose only non-secret configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:logs
      - destruction:infra
    notes: Deleting a scale-set extension can strip the security/antimalware agent (Defender) across all instances to blind defenses, remove the monitoring/log-collection agent (AMA/Log Analytics) to halt log collection fleet-wide, and tears down installed agent infrastructure on every node.
  write:
    risks:
      - escalation:lateral
      - impact:hijack
      - impact:manipulation
    notes: Creating/updating a scale-set extension propagates attacker-supplied code to every instance, executing as SYSTEM/root under the fleet's managed identity (lateral movement), running attacker workloads fleet-wide (hijack), and tampering with the instances' software/config (manipulation).
