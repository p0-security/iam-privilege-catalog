name: VM Scale Set network interfaces
description: The network interface (NIC) resources attached to a Virtual Machine Scale Set, holding IP, subnet, and NSG-association configuration.
scope: LOW
notes: Read-only enumeration discloses network topology useful for reconnaissance but no data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Lists all NIC properties of a scale set, inventorying IPs/subnets/NSG associations for network reconnaissance.
