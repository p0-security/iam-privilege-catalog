name: Virtual Machine Scale Set OS upgrade history
description: The history of OS image upgrades for an Azure Virtual Machine Scale Set, recording past image/version upgrade events.
scope: LOW
notes: Read-only configuration/change history of compute infrastructure; image-version details can aid targeting but expose no secrets or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reveals past OS image/version upgrade records, useful for infrastructure reconnaissance and vulnerability targeting.
