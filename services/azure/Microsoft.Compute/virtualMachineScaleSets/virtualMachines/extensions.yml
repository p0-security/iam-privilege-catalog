name: VM scale set VM extensions
description: Extensions are agents/software components (e.g. CustomScript, RunCommand, monitoring/anti-malware agents) installed on individual VM instances within an Azure Virtual Machine Scale Set; writing one executes code inside the production compute instance under its identity.
scope: HIGH
notes: The write path is a code-execution surface on production compute that can run as the instance's managed identity, making this resource type highly sensitive; read/list exposes only non-protected configuration (protected settings are not returned in plaintext).
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - impact:dos
    notes: Deleting an extension can remove a security/monitoring agent (anti-malware, Defender, Log Analytics/diagnostic agent) acting as a defense, and removes installed functionality, disrupting the workload the extension provides on the instance.
  write:
    risks:
      - escalation:lateral
      - impact:hijack
      - impact:manipulation
    notes: Creating/updating an extension (e.g. CustomScript/RunCommand) executes attacker-supplied code on the scale-set VM under its identity context, enabling lateral movement into the attached managed identity, running attacker workloads on the node, and altering instance configuration.
