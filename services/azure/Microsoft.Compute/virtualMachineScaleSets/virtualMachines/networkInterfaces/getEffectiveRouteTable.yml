name: VM Scale Set instance network interfaces
description: The network interface (NIC) resources of an individual VM instance within a Virtual Machine Scale Set.
scope: LOW
notes: Read-only network configuration disclosure for reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Returns the effective route table on a scale set VM NIC, exposing routing topology and next-hops for network mapping; read-only.
