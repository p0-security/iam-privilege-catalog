name: Virtual Machine in Scale Set
description: An individual virtual machine instance within an Azure Virtual Machine Scale Set, a production compute resource that runs application workloads and may carry an attached managed identity.
scope: MEDIUM
notes: Production compute supporting a single organizational function; instances can hold managed identities and host application data on attached disks.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:logs
    notes: Returns blob URIs for the instance's boot diagnostic logs (serial console output and screenshots), which can be exported and may contain sensitive boot-time information.
