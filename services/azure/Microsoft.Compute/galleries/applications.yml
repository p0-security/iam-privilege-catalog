name: Azure Compute gallery application
description: A Gallery Application is a VM application definition stored in an Azure Compute (Shared Image) Gallery, describing a deployable software package that can be installed on VMs and scale sets.
scope: MEDIUM
notes: The parent definition holds packaging metadata and configuration; the actual installable payload and install/remove scripts live in the child version resources.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deleting a gallery application removes a deployable VM-application artifact definition from the shared image gallery.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating the gallery application definition alters the deployable-artifact configuration that downstream versions and VM deployments rely on; the executable payload lives in versions, so this is configuration manipulation only.
