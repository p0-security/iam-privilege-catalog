name: Azure Compute gallery image definitions
description: A Gallery Image (definition) in an Azure Compute/Shared Image Gallery is the logical image template that holds metadata such as OS type, publisher, offer, SKU, generation, and recommended VM sizing. It is the parent under which concrete, bootable image versions are published.
scope: MEDIUM
notes: Supporting provisioning infrastructure for a single function; the definition holds metadata only (no bootable bits), while versions hold the actual image content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deletes a reusable VM image definition artifact from the gallery, disrupting deployments that depend on it.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading the definition only enumerates image-template metadata (OS type, publisher, generation), a read-only infrastructure inventory.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the image definition alters the image-catalog configuration that downstream VM provisioning relies on; control-plane manipulation of operational config, not executable content (which lives in the version).
