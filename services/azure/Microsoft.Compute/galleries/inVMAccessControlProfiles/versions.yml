name: Gallery In-VM Access Control Profile Version
description: A versioned instance of a Gallery In-VM Access Control Profile containing the concrete access-control rules (Metadata Security Protocol) that consuming VMs enforce for in-guest access to WireServer/IMDS endpoints.
scope: HIGH
notes: The version is the actually-consumed ruleset; governs managed-identity/metadata endpoint reachability when adopted by a VM.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - destruction:defense
    notes: Deleting a version removes the enforced access-control ruleset protecting metadata/identity endpoints, destroying a policy and a defense for VMs that pin that version.
  read:
    risks:
      - discovery:policy
    scope: MEDIUM
    notes: Reading a version exposes the concrete versioned access-control ruleset applied to metadata/identity endpoints.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating a version publishes the consumed access-control ruleset; a permissive version weakens the metadata-protection defense for VMs that adopt it.
