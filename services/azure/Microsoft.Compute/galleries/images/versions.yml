name: Azure Compute gallery image versions
description: A Gallery Image Version is the concrete, deployable/bootable image artifact published under a gallery image definition, including the source disk reference and target-region replication settings. VMs and scale sets are provisioned directly from these versions.
scope: MEDIUM
notes: Holds the actual bootable image content; tampering propagates to every workload provisioned from it (supply-chain reach), though it remains supporting infrastructure for a single function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deletes the deployable image-version artifact, breaking provisioning and scale-out that reference that version.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    notes: Creating/updating a version lets an attacker publish a tampered/backdoored bootable image that future VM and scale-set deployments boot, manipulating the provisioning supply chain and enabling attacker-controlled workloads to run on hosts built from the poisoned image.
