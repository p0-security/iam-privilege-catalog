name: VM restore points
description: "Restore points: individual point-in-time crash-consistent snapshots of a VM's OS and data disks, stored within a restore point collection."
scope: HIGH
notes: Each restore point is a full copy of VM disk data; the snapshot data itself is reachable only via separate SAS-URI retrieval.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:data
      - exfiltration:crypto
    notes: "Returns blob SAS URIs for the restore point's disk snapshots: pre-authenticated, credential-bearing tokens granting direct out-of-control-plane download of full VM OS/data disk contents (including any secrets on disk)."
