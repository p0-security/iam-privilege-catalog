name: DiskRestorePoint
description: A disk restore point is a point-in-time incremental snapshot of a VM managed disk captured under a restore point collection, representing a recoverable copy of the full disk (OS/data) contents.
scope: HIGH
notes: The underlying snapshot is a complete copy of disk data (which may contain credentials and sensitive data).
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:data
      - exfiltration:crypto
    notes: Returns a SAS URI granting direct download access to the full disk restore point image (OS/application data, possibly embedded credentials); the SAS token is itself reusable credential material.
