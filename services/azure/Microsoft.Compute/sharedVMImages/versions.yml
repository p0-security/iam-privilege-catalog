name: Shared VM image version
description: A SharedVMImageVersion is a concrete, bootable version of an organization-specific custom VM image used to provision VMs.
scope: MEDIUM
notes: Private, tenant-owned bootable image artifacts; expose image configuration but no secrets or data content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:artifact
    notes: Deletes a shared VM image version, destroying a specific bootable image artifact that deployments rely on for provisioning.
  read:
    risks:
      - discovery:infra
    notes: Reads the properties of a shared VM image version, enabling inventory of the org's concrete bootable image artifacts and their configuration.
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates the concrete bootable image version, letting an attacker inject or alter a backdoored image that downstream VMs are provisioned from (supply-chain manipulation).
