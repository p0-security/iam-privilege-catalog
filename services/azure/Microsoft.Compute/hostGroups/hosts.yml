name: Dedicated hosts
description: A dedicated host is a physical server (reserved single-tenant hardware) within a host group on which customer VMs are placed.
scope: HIGH
notes: Represents costly reserved physical capacity; deletion impacts the VMs pinned to the host.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a dedicated host destroys the physical capacity that VMs are pinned to, disrupting the production workloads hosted on it.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading a dedicated host only inventories its SKU, capacity, and allocation configuration, infrastructure reconnaissance.
  write:
    risks:
      - impact:spend
      - impact:manipulation
    scope: MEDIUM
    notes: Creating/updating a dedicated host provisions expensive reserved physical hardware and alters its configuration, driving significant spend.
