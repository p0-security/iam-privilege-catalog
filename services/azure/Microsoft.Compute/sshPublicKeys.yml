name: Azure SSH public key resource
description: An sshPublicKeys resource is a stored, reusable SSH public key object in Azure Compute that can be referenced when provisioning VMs.
scope: LOW
notes: The resource holds only the non-secret public key component; it is not bound to a running VM and contains no private credential material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting the stored public-key resource removes a low-sensitivity provisioning config object; it does not affect keys already deployed to running VMs.
  read:
    risks:
      - discovery:infra
    notes: Getting an SSH public key resource returns only the non-secret public key and metadata, amounting to read-only inventory rather than credential disclosure.
  write:
    risks:
      - impact:manipulation
    scope: MEDIUM
    notes: Creating or updating the stored public-key resource lets an attacker substitute a public key they control for later VM provisioning, but it only sets the public component and does not attach to a running VM.
