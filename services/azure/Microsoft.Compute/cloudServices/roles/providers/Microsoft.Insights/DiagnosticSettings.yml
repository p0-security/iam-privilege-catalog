name: CloudService Roles diagnostic settings
description: Azure Monitor diagnostic settings for Cloud Service roles, controlling which log/metric categories are collected for the role and where that telemetry is routed (Log Analytics, storage, event hub).
scope: MEDIUM
notes: Diagnostic settings are detective security controls; reading them inventories monitoring coverage and writing them can blind detection.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading the diagnostic setting discloses which log/metric categories are enabled and where they route, letting an attacker map monitoring coverage to plan evasion; returns no secret material.
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating or updating the diagnostic setting lets an attacker disable or redirect log/metric collection for the CloudService roles, suppressing telemetry and removing a detective control.
