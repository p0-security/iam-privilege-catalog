name: Azure Cloud Service instance view
description: The instance view of an Azure Cloud Service reports the runtime status of the deployment and its role instances.
scope: LOW
notes: Read-only operational status; non-sensitive resource state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the instance view returns runtime status, a low-sensitivity reconnaissance of operational state with no secret content.
