name: Azure Cloud Service
description: An Azure Cloud Service (classic/extended) is a managed compute deployment that hosts an application across one or more role instances (worker/web roles) on platform-managed VMs.
scope: HIGH
notes: A production compute resource supporting a single organizational function; control-plane operations here can disrupt or hijack the hosted application.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:hijack
      - impact:spend
    notes: Starting the Cloud Service brings compute online, enabling resource hijacking (running workloads) and incurring spend.
