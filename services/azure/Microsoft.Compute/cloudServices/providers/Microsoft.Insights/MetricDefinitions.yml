name: Cloud Service metric definitions
description: Metric definitions describe the available Azure Monitor metric schema (names/categories) for a Cloud Service.
scope: LOW
notes: Monitoring schema metadata only; not metric values or stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Enumerates the available metric schema for the Cloud Service, exposing only monitoring metadata.
