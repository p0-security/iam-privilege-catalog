name: Capacity Reservations
description: A capacity reservation reserves dedicated Azure compute capacity (specific VM SKU, quantity, and zone) within a capacity reservation group so dependent VMs/VMSS are guaranteed allocation.
scope: MEDIUM
notes: Supporting, cost-bearing compute infrastructure; holding a reservation incurs billed reserved-capacity spend and consumes a limited quota pool.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a reservation removes the guaranteed reserved capacity backing dependent VMs/VMSS, destroying infrastructure and risking those workloads cannot (re)allocate capacity.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Read-only enumeration of a capacity reservation's configuration (SKU, capacity, zone, associated VMs); reconnaissance with no data or secret exposure.
  write:
    risks:
      - impact:spend
      - impact:consumption
    notes: Creating/updating a reservation provisions and holds billed reserved compute capacity, incurring spend and consuming a limited capacity quota.
