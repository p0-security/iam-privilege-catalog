name: Capacity Reservation Groups
description: A capacity reservation group is a container that holds one or more capacity reservations and defines the scope across which reserved compute capacity is shared.
scope: MEDIUM
notes: Lightweight grouping/scaffolding resource for reserved compute capacity; the reservations it contains drive cost and consume quota.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Compute
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the group tears down the reserved-capacity grouping, removing guaranteed capacity and potentially disrupting allocation for dependent VMs/VMSS.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the group writes container configuration (e.g. which zones, sharing scope) for reserved capacity; the group itself is a lightweight container that does not by itself reserve billed capacity.
