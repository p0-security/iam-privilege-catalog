name: Logic business process version
description: A versioned snapshot of a Logic Apps business process resource, representing a specific revision of the workflow/process definition.
scope: MEDIUM
notes: Read-only access to a specific version of integration workflow logic for a single integration function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading a business process version inventories the configuration of a specific revision of the workflow definition (control-plane reconnaissance).
