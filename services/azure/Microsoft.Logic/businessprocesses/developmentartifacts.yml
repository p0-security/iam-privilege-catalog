name: Logic business process development artifacts
description: Business process development artifacts are the design-time definition/configuration of an Azure Integration Environments business process (the orchestration logic authored before deployment).
scope: MEDIUM
notes: These hold automation/workflow definitions, not returned credential material; sensitivity is that of a supporting integration component.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads the development artifact definition, letting an attacker inventory the automation/workflow configuration as reconnaissance; returns no secret material.
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates the development artifact, letting an attacker alter the business-process orchestration logic that drives automated processing.
