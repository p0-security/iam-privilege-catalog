name: Integration Service Environment
description: An Integration Service Environment (ISE) is a dedicated, VNet-injected isolated hosting environment for running Logic Apps workflows and managed-API connectors.
scope: HIGH
notes: The ISE is a production integration host supporting an organizational integration function; its compromise affects all workflows running within it.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Joining a resource into the VNet-injected ISE places an attacker-controlled component onto the environment's private network, extending reachability to co-located resources.
