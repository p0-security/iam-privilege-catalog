name: Logic App workflow run action repetition
description: A workflow run action repetition is a single iteration of a looped action (e.g. For_each/Until) within a Logic App run, including that iteration's inputs and outputs.
scope: MEDIUM
notes: Per-iteration inputs/outputs carry the sensitive per-item data the workflow processed in each loop pass.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:data
    notes: Reading an action repetition exposes that loop iteration's inputs/outputs, leaking the sensitive data processed in that pass.
