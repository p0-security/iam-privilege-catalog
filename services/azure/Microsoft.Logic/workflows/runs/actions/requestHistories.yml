name: Logic App workflow run action request history
description: The recorded request/response payloads (HTTP bodies, headers, query parameters) that a Logic App workflow run action exchanged with endpoints during execution.
scope: HIGH
notes: Request histories capture the actual data that flowed through the integration, frequently including sensitive business data and credentials carried in headers.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:data
    notes: Reading the run action request history returns the concrete request/response payloads processed by the workflow, exposing sensitive integration data and any credentials in headers.
