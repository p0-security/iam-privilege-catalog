name: Logic App workflow run
description: A workflow run is a single execution instance of an Azure Logic App workflow, recording its trigger, status, timing, and per-step execution history.
scope: MEDIUM
notes: Logic App runs orchestrate integration/automation business processes and their run records can reference the data payloads processed by the workflow.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Cancelling an in-progress run aborts execution of the automation, disrupting the business process the Logic App performs.
