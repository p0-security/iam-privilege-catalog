name: Logic Apps workflow
description: "An Azure Logic Apps workflow: a managed automation/integration resource that orchestrates triggers and actions across connected systems, often running under a managed identity with connections to downstream services."
scope: CRITICAL
notes: Workflows commonly hold a managed identity and connection references granting broad downstream access; the control-plane definition reveals integration logic, while access keys/callback URLs are bearer credentials that can invoke the workflow.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the callback URL containing an embedded SAS signature that is a bearer credential, letting an attacker trigger the workflow out-of-band without further Azure permissions, which executes its actions under the workflow's managed identity (lateral movement into connected systems).
