name: Logic App workflow trigger history
description: The execution history of a Logic App workflow trigger, recording past trigger firings along with their input and output payloads, status, and timestamps.
scope: HIGH
notes: Trigger history payloads can contain the actual business data the workflow processed, making them sensitive beyond mere operational status.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - impact:hijack
      - impact:spend
    notes: Resubmitting a historical trigger re-executes the workflow with the prior input under its identity/connections, replaying downstream actions (lateral movement), abusing the resource (hijack), and incurring metered run cost.
