name: Integration Account log definitions
description: Diagnostic log definitions for a Logic Apps Integration Account, describing which Azure Monitor log categories/types the account can emit.
scope: LOW
notes: Read-only logging metadata; exposes no log content or sensitive configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading the log definitions only enumerates which log categories exist for the integration account, a low-sensitivity logs reconnaissance read.
