name: Integration Account Assembly
description: An Integration Account Assembly is a custom compiled .NET DLL uploaded to a Logic Apps integration account, referenced and executed by transformation maps and integration workflows.
scope: MEDIUM
notes: Holds proprietary executable custom code that runs inside the integration runtime.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:code
    notes: Returns a pre-authenticated callback URL granting direct download of the compiled assembly binary, enabling exfiltration of the organization's custom integration code.
