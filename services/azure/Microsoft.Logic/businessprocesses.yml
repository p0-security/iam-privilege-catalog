name: Logic business process
description: A Logic Apps business process resource, defining the workflow/process definition and tracking logic for an integration business process.
scope: MEDIUM
notes: Holds operational integration workflow logic; manipulation affects how organizational data is processed within a single integration function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Logic
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a business process removes the workflow/process definition resource, disrupting the integration function it supports (localized DoS).
  read:
    risks:
      - discovery:infra
    notes: Reading the business process discloses the workflow/process definition configuration (control-plane reconnaissance of integration logic).
  write:
    risks:
      - impact:manipulation
    notes: Writing a business process creates or alters the workflow/process definition, enabling manipulation of operational integration logic and how data is processed.
