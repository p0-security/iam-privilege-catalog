name: NSG Default Security Rule
description: Default security rules are the built-in, immutable allow/deny rules of a Network Security Group (NSG) that define the baseline firewall behavior for traffic to/from associated subnets and NICs.
scope: LOW
notes: These rules cannot be modified or deleted; reading them only reveals the baseline filtering posture.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading a default security rule discloses the immutable baseline NSG firewall configuration, useful for understanding network exposure but not modifiable.
