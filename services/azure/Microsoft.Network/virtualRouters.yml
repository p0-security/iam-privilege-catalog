name: Virtual Router
description: A VirtualRouter is a BGP-based routing component that controls route propagation and traffic flow within a virtual network.
scope: HIGH
notes: Routing infrastructure for a single network function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the virtual router removes routing infrastructure, destroying a network component and disrupting BGP-based connectivity for dependent services.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating or updating the virtual router alters BGP route propagation, enabling traffic redirection and expanded reachability across the network.
