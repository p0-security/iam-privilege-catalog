name: Azure VPN gateway
description: A VpnGateway is an Azure Virtual WAN site-to-site VPN gateway resource that provides cross-premises/hybrid network connectivity, including VPN connections, BGP routing, and IP configuration.
scope: HIGH
notes: Production network connectivity infrastructure for a single organizational function (hybrid/site-to-site connectivity); compromise can extend reach into peered/on-prem networks or sever connectivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Returns the status of BGP peers connected to the gateway, revealing the identity and reachability of peer routers in the connected on-prem/remote network. Read-only, but useful reconnaissance for planning lateral movement beyond Azure. getlearnedroutes and getadvertisedroutes are functionally near-identical (same BGP/routing-table disclosure) and are treated the same way.
