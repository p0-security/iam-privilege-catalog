name: VPN gateway connections
description: A VPN connection on an Azure VPN Gateway represents a site-to-site (or VNet-to-VNet) IPsec/IKE tunnel linking an Azure virtual network to an on-premises or remote network. It carries production hybrid-connectivity traffic for the networks it joins.
scope: HIGH
notes: Production network connectivity component supporting a single organizational function; controls cross-premises reachability.
links:
  - https://azure.permissions.cloud/iam/microsoft.network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:data
    notes: Stopping the capture takes a caller-supplied SAS URL and writes the captured PCAP of tunnel traffic to that (attacker-controlled) storage container, completing exfiltration of in-transit network data.
