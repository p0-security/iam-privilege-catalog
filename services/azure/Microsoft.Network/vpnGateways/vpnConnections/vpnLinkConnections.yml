name: VPN link connection
description: A VPN link connection resource representing an individual tunnel within a Virtual WAN site-to-site VPN connection on a VPN gateway.
scope: LOW
notes: Manages/inspects a live production VPN tunnel; reads expose connectivity posture, the reset action disrupts connectivity.
links:
  - https://azure.permissions.cloud/iam/microsoft.network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading a VPN link connection returns its configuration and status (peer endpoints, BGP, tunnel/connection state), inventorying VPN network topology for reconnaissance.
