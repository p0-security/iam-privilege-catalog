name: VPN link connection shared key
description: The IPsec pre-shared key (PSK) for a VPN link connection within a site-to-site VPN gateway connection. This secret authenticates the IPsec tunnel between the Azure VPN gateway and the peer (on-prem/remote) endpoint.
scope: HIGH
notes: The shared key is a tunnel-authenticating credential; exposure or control of it directly impacts connectivity to and the security of the bridged network.
links:
  - https://azure.permissions.cloud/iam/microsoft.network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:network
    notes: This listSharedKey action returns the VPN link connection's IPsec PSK value (crypto exfiltration); the credential is reusable to impersonate the peer and join the tunnel into the connected network. Semantically identical to the /read operation.
