name: VPN link connection shared key
description: The IPsec pre-shared key (PSK) for a VPN link connection within a site-to-site VPN gateway connection. This secret authenticates the IPsec tunnel between the Azure VPN gateway and the peer (on-prem/remote) endpoint.
scope: HIGH
notes: The shared key is a tunnel-authenticating credential; exposure or control of it directly impacts connectivity to and the security of the bridged network.
links:
  - https://azure.permissions.cloud/iam/microsoft.network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:crypto
      - escalation:network
    notes: Despite the /read verb, this returns the VPN tunnel's IPsec pre-shared key (credential material), enabling crypto exfiltration; with the PSK an attacker can impersonate the peer and stand up a tunnel to reach the connected network.
  write:
    risks:
      - impact:dos
      - impact:manipulation
      - escalation:network
    notes: "Sets/overwrites the IPsec PSK: rotating it breaks the legitimate site-to-site tunnel (DoS), alters tunnel auth config (manipulation), and lets an attacker pin a known key to bring up a rogue tunnel into the connected network."
