name: Private Link Service
description: A Private Link Service is the provider-side resource that exposes a backend service (fronted by a standard load balancer) for private consumption via Azure Private Endpoints. It defines visibility, auto-approval lists, NAT IP configuration, and the set of approved private endpoint connections.
scope: LOW
notes: Controls private network exposure of a single backend service; sensitivity is that of a production network resource for one organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Internal control-plane notification informing a connected Private Link Service that a private endpoint is moving; a signaling no-op that grants no data, identity, or destructive capability in isolation.
