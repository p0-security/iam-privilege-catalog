name: Private Link Service metric definitions
description: The Insights metric definitions for a Private Link Service enumerate which monitoring metrics are available for the resource (the metric schema), not actual metric values.
scope: LOW
notes: Monitoring metadata schema; no metric values or sensitive data are returned.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
