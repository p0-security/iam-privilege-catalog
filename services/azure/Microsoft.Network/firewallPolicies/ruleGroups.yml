name: Azure Firewall Policy rule group
description: A rule group (legacy form of rule collection group) within an Azure Firewall Policy, containing the network/application filtering rules that act as a network defense mechanism.
scope: HIGH
notes: Controls traffic filtering for a single firewall/network function; modifying or removing it weakens network defenses.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the rule group removes the firewall filtering rules, disabling a network defense and opening the protected network to traffic that would otherwise be blocked.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating or updating rule groups lets an attacker add permissive allow rules or remove deny rules, weakening the firewall defense and altering its operational security configuration.
