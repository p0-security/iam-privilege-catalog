name: Public IP Address log definitions
description: The list of Azure Monitor log category definitions (schema of available log types) exposed for a Public IP Address.
scope: LOW
notes: Read-only logging schema; no log content is returned.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Enumerates the available log categories/schema for the Public IP, providing only logging-schema reconnaissance, not log content.
