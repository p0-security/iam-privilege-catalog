name: Public IP Address
description: A Public IP Address is an Azure network resource that provides an internet-routable address which can be associated with VMs, load balancers, gateways, and other resources to expose them externally.
scope: HIGH
notes: Production network infrastructure fronting services; write/delete/join operations directly affect internet exposure and availability of a service, hence HIGH for mutating operations and LOW for read-only enumeration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Joining a public IP attaches an internet-routable address to a resource (NIC/load balancer/gateway), exposing that resource to the internet and extending network reachability.
