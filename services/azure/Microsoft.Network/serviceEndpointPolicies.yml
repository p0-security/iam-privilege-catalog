name: Service Endpoint Policy
description: A Service Endpoint Policy is an Azure network filtering object that restricts which specific Azure service resources (e.g., particular storage accounts) a subnet can reach over service endpoints, acting as a data-exfiltration prevention control.
scope: HIGH
notes: Functions as a defensive egress boundary on a single VNet/subnet; sensitivity is at the level of a single network/function rather than tenant-wide.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the policy removes the egress access-control defense that constrains subnet-to-service traffic.
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading the policy enumerates the network access-control configuration governing which services a subnet may reach, useful for reconnaissance of egress defenses.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating or updating the policy lets an attacker loosen or rewrite the egress restrictions, weakening the exfiltration-prevention defense and manipulating its configuration.
