name: Private DNS operation result
description: The asynchronous operation-result endpoint for a long-running Private DNS control-plane operation, used to poll the outcome of a prior request.
scope: LOW
notes: Status-polling bookkeeping endpoint; conveys only operation state, no DNS data or configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling an async Private DNS operation result returns only operation progress/outcome state and grants no meaningful attacker capability in isolation.
