name: Microsoft Network resource provider registration
description: Provider-level Microsoft.Network operations that manage subscription registration with the network resource provider and perform stateless platform/catalog lookups.
scope: LOW
notes: These are subscription-level administrative and catalog operations, not operations against specific network resources holding sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Unregistering the provider is a reversible registration toggle that is blocked while network resources exist; it does not by itself delete or stop running resources.
