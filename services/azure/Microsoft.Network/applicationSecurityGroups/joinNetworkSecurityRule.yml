name: Application Security Group
description: An Application Security Group (ASG) is a logical grouping construct for network interfaces / IP configurations that Network Security Group (NSG) rules reference by name as source or destination, enabling micro-segmentation without explicit IP ranges.
scope: HIGH
notes: An ASG contains no rules of its own; it groups resources so NSG firewall rules can target them. Its sensitivity derives from the network segmentation it implements for a single workload/function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
      - impact:manipulation
      - destruction:defense
    notes: Associating an NSG security rule with this ASG changes which traffic the firewall rule governs for grouped members, manipulating effective access controls, extending reachability, and weakening the intended segmentation defense.
