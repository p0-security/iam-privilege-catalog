name: Network Virtual Appliance
description: A Network Virtual Appliance (NVA) is a managed, VMSS-backed inline network device (firewall, router, SD-WAN, or IDS/IPS) inserted into the VNet traffic path to inspect, filter, and route traffic.
scope: HIGH
notes: NVAs typically serve as security chokepoints (firewall/IDS) for a single organizational function's traffic, so they are both network infrastructure and a defense control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:infra
    notes: Returns the resource ID of the backing VM scale set, revealing the underlying compute infrastructure of the appliance for inventory/pivoting.
