name: Nat Gateway metric definitions
description: A read-only listing of the Azure Monitor metric definitions (the catalog of metric types/schema) available for a NAT Gateway resource.
scope: LOW
notes: Exposes only which monitoring metrics exist, not their values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Enumerates the available metric definitions (monitoring telemetry schema) for a NAT Gateway, low-value reconnaissance of monitoring metadata with no access to values.
