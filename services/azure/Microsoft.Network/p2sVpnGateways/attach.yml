name: Point-to-site VPN gateway
description: A Point-to-Site (P2S) VPN gateway is a virtual-hub network component that provides remote-access VPN connectivity, letting individual clients establish secure tunnels into a virtual network / virtual WAN.
scope: HIGH
notes: Controls remote-access ingress into the private network; compromise can expose or sever connectivity for a single network function.
links:
  - https://azure.permissions.cloud/iam/microsoft.network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Attaching the gateway hub to the WAN traffic manager alters routing/topology, letting an attacker insert or restore a gateway path and extend reachability across the WAN.
