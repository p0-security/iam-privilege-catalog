name: Internet Analyzer test
description: An Internet Analyzer (networkExperimentProfiles) test is a network performance-measurement experiment that measures client latency to a set of endpoints/origins. It is a supporting diagnostic resource, not production traffic infrastructure.
scope: LOW
notes: Non-production measurement tooling; exposes only network performance telemetry and test configuration, no organizational data, secrets, or identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Returns the test's latency scorecard, exposing aggregate comparative network performance metrics about measured endpoints (reconnaissance only).
