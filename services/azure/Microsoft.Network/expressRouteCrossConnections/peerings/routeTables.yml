name: ExpressRoute cross-connection peering route table
description: The route table of an ExpressRoute cross-connection peering, a read-only diagnostic listing of routes advertised/learned over the provider-side peering.
scope: LOW
notes: Read-only network routing diagnostic data; useful for reconnaissance but exposes no secrets or control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading the cross-connection route table enumerates advertised/learned routes, revealing network topology for reconnaissance.
