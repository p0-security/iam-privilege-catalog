name: ExpressRoute cross-connection peering route table summary
description: A summary of the ExpressRoute cross-connection peering route table, a read-only diagnostic of aggregate routing/BGP state for the provider-side peering.
scope: LOW
notes: Read-only aggregate network routing diagnostic data; useful for reconnaissance but exposes no secrets or control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading the cross-connection route table summary returns aggregate routing/BGP information, providing read-only network topology reconnaissance.
