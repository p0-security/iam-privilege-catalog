name: Express Route Cross Connection
description: An ExpressRoute Cross Connection is the service-provider-facing representation of a dedicated private ExpressRoute circuit, exposing the interconnect configuration (bandwidth, peering location, service provider, provisioning state, service key) that bridges on-premises/provider networks to Azure.
scope: HIGH
notes: Production hybrid-connectivity infrastructure supporting a single connectivity function; manipulating or tearing it down affects all services that depend on the private link.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Joining attaches a resource to the cross connection, linking it onto the private interconnect and granting reachability to resources on the connected network; marked 'not alertable'.
