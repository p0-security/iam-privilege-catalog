name: Network Interface Tap Configuration Proxy
description: A Network Interface Tap Configuration Proxy represents, from the Virtual Network TAP side, the association binding network interfaces to the tap so their traffic is mirrored to a collector.
scope: HIGH
notes: The proxy view of traffic-mirroring associations; managing it controls which NICs' in-transit traffic is intercepted to the tap.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the proxy removes the traffic-mirroring association from the virtual network tap, a network-component deletion that can also disrupt legitimate monitoring feeds.
  write:
    risks:
      - collection:data
      - exfiltration:data
    notes: Creating or updating the proxy attaches NIC traffic mirroring to the virtual network tap, enabling continuous, automated collection and exfiltration of mirrored in-transit traffic.
