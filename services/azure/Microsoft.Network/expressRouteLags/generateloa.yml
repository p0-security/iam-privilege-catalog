name: ExpressRoute LAG
description: An ExpressRouteLag (Link Aggregation Group) represents the physical link-aggregation construct backing an ExpressRoute circuit's dedicated private connectivity between on-premises networks and Azure.
scope: LOW
notes: Underpins hybrid connectivity; touches a single connectivity function rather than tenant-wide controls.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Generating a Letter of Authorization produces a document describing the LAG's physical cross-connect/datacenter provisioning details, disclosing network connectivity metadata without altering resources.
