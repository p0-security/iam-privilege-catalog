name: ExpressRoute LAG authorizations
description: ExpressRoute LAG authorizations are authorization objects (with associated authorization keys) that permit circuits to cross-connect into a dedicated ExpressRoute LAG.
scope: HIGH
notes: The authorization key is a credential that lets a circuit link into the private network; the authorization object's read path returns only metadata, not the key.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:network
    notes: This action returns the ExpressRoute AuthorizationKey, credential material an attacker can export and redeem to cross-connect a circuit into the organization's private network.
