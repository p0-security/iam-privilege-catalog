name: ExpressRoute LAG
description: An ExpressRouteLag (Link Aggregation Group) represents the physical link-aggregation construct backing an ExpressRoute circuit's dedicated private connectivity between on-premises networks and Azure.
scope: HIGH
notes: Underpins hybrid connectivity; touches a single connectivity function rather than tenant-wide controls.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Joining attaches a resource into the link-aggregation fabric, extending reachability to additional resources on the connected network and altering interconnect topology.
