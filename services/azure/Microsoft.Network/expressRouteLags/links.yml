name: ExpressRoute LAG links
description: ExpressRoute LAG links represent the physical link-aggregation-group links of a dedicated ExpressRoute connection.
scope: LOW
notes: Read-only physical connectivity topology of dedicated network links.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
