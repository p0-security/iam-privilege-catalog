name: Express Route Connection
description: An Express Route Connection links an ExpressRoute gateway to an ExpressRoute circuit, establishing private hybrid connectivity between on-premises networks and an Azure virtual network.
scope: HIGH
notes: Production hybrid-connectivity infrastructure supporting a single organizational function; controls routing reachability between on-prem and cloud.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the connection tears down the hybrid link between on-premises and Azure, removing a network component and cutting connectivity for dependent services.
  read:
    risks:
      - discovery:network
    notes: Reading the connection enumerates hybrid-connectivity configuration (circuit linkage, routing weight, peerings), providing network reconnaissance.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating or updating the connection bridges on-prem/peered networks into the VNet and alters routing, granting cross-network reachability and manipulation of hybrid-connectivity configuration.
