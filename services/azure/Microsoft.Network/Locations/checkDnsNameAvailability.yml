name: DNS name availability check
description: A utility that checks whether a given Azure DNS label is available (free) at a specified region. Returns only an availability verdict over a public namespace.
scope: PUBLIC
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Only probes whether a DNS label is taken; reveals no organizational resource or data and enables no meaningful capability.
