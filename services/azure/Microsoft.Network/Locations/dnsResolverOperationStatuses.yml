name: DNS Resolver operation status
description: A polling endpoint that returns the status/progress of a previously issued asynchronous DNS Resolver long-running operation.
scope: LOW
notes: Transient operation-tracking surface exposing no resource configuration or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reading the status of an async DNS Resolver operation is an inert status poll that grants no meaningful attacker capability in isolation.
