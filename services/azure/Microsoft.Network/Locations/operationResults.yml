name: Async operation result
description: The result resource of an asynchronous POST or DELETE Microsoft.Network operation in a given location, reporting completion status.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Retrieving the result of an async POST/DELETE operation returns only operation-completion status and conveys no meaningful attacker capability on its own.
