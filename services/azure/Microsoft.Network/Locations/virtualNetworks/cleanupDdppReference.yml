name: VNet DDoS Protection Plan reference cleanup
description: An internal resource-provider action that clears the DDoS Protection Plan (DDPP) reference on a linked virtual network when the associated DDPP subscription is deleted.
scope: MEDIUM
notes: This is a system-invoked teardown callback rather than a normal user-facing operation; its net effect is detaching a DDoS-protection association from a production VNet.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:defense
    notes: Removing the DDoS Protection Plan reference from a virtual network detaches the DDoS defense association for that production network, weakening volumetric-attack protection.
