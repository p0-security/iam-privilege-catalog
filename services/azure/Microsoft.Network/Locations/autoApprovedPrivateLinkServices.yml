name: Auto-approved Private Link services
description: A region-scoped list of Private Link services to which the subscription may connect a private endpoint without manual owner approval.
scope: LOW
notes: Reveals reachable private-link targets relevant to the calling subscription.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Enumerates Private Link services reachable via auto-approved private endpoints, letting an attacker reconnoiter connection targets that require no owner approval.
