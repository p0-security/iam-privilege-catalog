name: Network usage metrics
description: Per-region resource usage and quota metrics for Microsoft.Network resources, reporting how much of each network resource quota is consumed in a location.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading regional usage/quota metrics only inventories aggregate infrastructure capacity and headroom, a low-sensitivity reconnaissance read.
