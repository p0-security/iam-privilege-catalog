name: Network interface IP configuration
description: A NIC IP configuration is the binding of a private/public IP, subnet, and load-balancer/backend association within a network interface.
scope: LOW
notes: It is a sub-resource of a NIC describing IP-level network placement of a single workload.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reads a NIC IP configuration, enumerating IP addressing and subnet/public-IP/load-balancer bindings for network reconnaissance.
