name: Network Interface
description: A Network Interface (NIC) connects an Azure VM to a virtual network; its diagnostic identity is operational identity metadata used for diagnostics on the resource.
scope: LOW
notes: This sub-resource returns only diagnostic identity metadata, not usable credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the diagnostic identity returns operational/identity metadata about the NIC with no secret material disclosed, yielding only minor infrastructure reconnaissance.
