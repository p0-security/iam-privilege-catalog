name: Network Interface Tap Configuration
description: A Network Interface Tap Configuration attaches a Virtual Network TAP to a network interface, causing all of that NIC's traffic to be mirrored to a collector destination.
scope: HIGH
notes: Traffic-mirroring configuration on a production NIC; when created it enables wholesale interception of in-transit data for that interface.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the tap configuration removes the traffic-mirroring component from the interface, which can also tear down a legitimate monitoring/IDS feed attached to it.
  read:
    risks:
      - discovery:network
    notes: Reading the tap configuration reveals whether and where traffic mirroring is set up on the interface, exposing the traffic-collection topology as network reconnaissance.
  write:
    risks:
      - collection:data
      - exfiltration:data
    notes: Creating the tap configuration mirrors all of the NIC's traffic to an attacker-chosen collector, enabling continuous, automated interception and exfiltration of in-flight data.
