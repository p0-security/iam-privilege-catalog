name: Network interface load balancers
description: A read-only view enumerating the load balancers that a given network interface participates in.
scope: LOW
notes: Reflects network service-association topology for a single NIC.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Lists the load balancers a NIC belongs to, enumerating network service relationships and exposure for topology reconnaissance.
