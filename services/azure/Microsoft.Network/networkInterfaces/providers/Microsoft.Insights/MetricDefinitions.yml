name: Network Interface metric definition
description: Metric definitions for a Network Interface enumerate the monitoring metrics schema available for the NIC via Azure Monitor.
scope: LOW
notes: Low-sensitivity monitoring schema metadata; returns which metrics exist, not their values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Listing metric definitions only enumerates the schema of available monitoring metrics for the NIC, exposing monitoring metadata rather than any data, config, or log content.
