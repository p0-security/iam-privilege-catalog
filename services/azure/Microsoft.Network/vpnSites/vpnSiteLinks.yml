name: VPN site link
description: A VPN site link resource representing an on-premises VPN endpoint connection (link IP/FQDN, bandwidth, BGP settings) used by Virtual WAN site-to-site VPN.
scope: LOW
notes: Read-only connectivity configuration; useful for network reconnaissance but exposes no secret material.
links:
  - https://azure.permissions.cloud/iam/microsoft.network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading a VPN site link returns the on-premises link configuration (IP/FQDN, bandwidth, BGP), inventorying VPN connectivity topology for reconnaissance.
