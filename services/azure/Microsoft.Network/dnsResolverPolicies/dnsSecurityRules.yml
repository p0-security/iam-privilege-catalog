name: DNS Resolver Policy DNS security rule
description: An individual DNS Security Rule within a DNS Resolver Policy, specifying the allow/block/alert filtering logic (which domains/DNS traffic are permitted or denied) for linked virtual networks.
scope: HIGH
notes: The concrete DNS-firewall enforcement rule; defines exactly which malicious domains are blocked.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a DNS security rule removes a DNS-layer filtering/blocking control, allowing previously-denied malicious-domain resolution for C2 or exfiltration.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating a DNS security rule lets an attacker alter the DNS allow/block filtering (e.g. allowlist malicious domains for C2/exfiltration), weakening the DNS-layer defense and manipulating resolution behavior.
