name: DSCP (QoS) configuration
description: A DSCP configuration defines Quality-of-Service (QoS) traffic-marking and prioritization policy applied to network interfaces.
scope: LOW
notes: Supporting traffic-shaping/QoS resource; low operational sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Despite the mislabeled write-style displayName/description, the operation name ends in /read and only retrieves the DSCP QoS configuration; non-sensitive network reconnaissance.
  write:
    risks:
      - impact:manipulation
    scope: MEDIUM
    notes: Creating or updating the DSCP configuration alters network traffic-prioritization settings, manipulating operational network behavior.
