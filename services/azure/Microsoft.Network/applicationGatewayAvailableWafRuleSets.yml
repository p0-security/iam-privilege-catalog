name: Application Gateway available WAF rule sets
description: A read-only catalog of the WAF rule sets and versions that Azure Application Gateway supports. This is static provider/platform reference data, not tenant-specific configuration.
scope: PUBLIC
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the static platform catalog of available WAF rule sets; discloses no organizational resource or configuration, so it grants no meaningful capability in isolation.
