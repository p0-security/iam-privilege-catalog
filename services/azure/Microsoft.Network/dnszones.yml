name: DNS zone
description: An Azure public DNS zone is the authoritative DNS hosting resource for a domain or subdomain, containing the record sets that resolve names for that namespace.
scope: HIGH
notes: Control over a DNS zone governs name resolution for the domain and thus traffic destination for every service under it.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
      - takeover:domain
    notes: Deleting the zone destroys all authoritative DNS for the domain (taking down every record set), causing resolution outage and freeing the namespace for dangling-domain re-registration/takeover.
  write:
    risks:
      - takeover:domain
      - impact:manipulation
    notes: Create-or-update lets an attacker provision or control the authoritative zone for a domain, enabling control over how that domain/subdomain is resolved (domain takeover) and manipulation of zone configuration; note this operation alters only zone-level properties/tags, not the record sets (a separate operation).
