name: Private Link Service Proxy
description: A private link service proxy is the broker component within a private endpoint that mediates the private-link connection between the consumer endpoint and the backing private link service.
scope: HIGH
notes: Subresource of a private endpoint governing private connectivity plumbing to a service supporting a single function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a private link service proxy tears down the private-link connection path, destroying a network component and disrupting private access to the linked service (DoS).
  read:
    risks:
      - discovery:network
    scope: MEDIUM
    notes: Reading a private link service proxy inventories the private-link connection plumbing between consumer and service, providing network reconnaissance of connectivity.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating a private link service proxy establishes or alters the private-link connection path to a service, enabling network movement toward otherwise isolated resources and manipulating connectivity configuration.
