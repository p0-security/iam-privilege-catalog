name: Azure Route Table
description: An Azure route table holds user-defined routes (UDRs) that control how traffic is forwarded within a virtual network, including next-hop overrides for subnets.
scope: HIGH
notes: Controls traffic steering for production network functions; misuse can redirect, intercept, or blackhole traffic for the subnets it is associated with.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a route table removes routing for associated subnets, disrupting connectivity for hosted services.
  write:
    risks:
      - impact:manipulation
      - escalation:network
      - impact:dos
    notes: Creating/updating routes lets an attacker redirect traffic through an attacker-controlled appliance (interception/MitM, reaching other resources) or blackhole prefixes to disrupt connectivity.
