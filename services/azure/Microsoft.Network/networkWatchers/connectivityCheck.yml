name: Network Watcher
description: Network Watcher is an Azure regional service that provides network diagnostics, monitoring, and visibility tools (flow logs, topology, connectivity checks, NSG rule inspection) for resources in a subscription/region.
scope: LOW
notes: A supporting monitoring/diagnostics resource. Its read-style diagnostic actions are powerful network reconnaissance primitives; its flow-log configuration is a defensive logging control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Verifies TCP connectivity from a VM to an arbitrary endpoint, letting an attacker probe reachable internal/external targets from inside the network.
  read:
    risks:
      - discovery:network
    scope: MEDIUM
    notes: Tests TCP reachability from a VM to arbitrary endpoints, letting an attacker probe reachable services and map network paths.
    name: Network Watcher diagnostics
    parent:
      description: Azure Network Watcher diagnostic operations that inspect network behavior, configuration, routing, and reachability for a subscription/region.
      notes: Read-only diagnostic tooling on supporting network infrastructure; exposes effective security/routing posture useful for reconnaissance but cannot modify resources or return secrets.
