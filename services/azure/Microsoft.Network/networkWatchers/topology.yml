name: Network Watcher topology
description: Returns a network-level view of the resources deployed in a resource group and their relationships (VNets, subnets, NICs, NSGs, public IPs, load balancers, and how they connect).
scope: MEDIUM
notes: Read-only. Represents the built-in resource-relationship-mapping entry in Network Watcher's recon toolkit; grouped separately from securityGroupView/connectivityCheck below because it operates at the resource-graph level rather than rule- or path-level.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
      - discovery:infra
    notes: Gives an attacker a ready-made map of a resource group's network architecture and resource relationships, materially speeding up reconnaissance of an unfamiliar environment compared to enumerating each resource type individually.
