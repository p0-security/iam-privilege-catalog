name: Network Watcher
description: Network Watcher is an Azure regional service that provides network diagnostics, monitoring, and visibility tools (flow logs, topology, connectivity checks, NSG rule inspection) for resources in a subscription/region.
scope: LOW
notes: A supporting monitoring/diagnostics resource. Its read-style diagnostic actions are powerful network reconnaissance primitives; its flow-log configuration is a defensive logging control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Returns a network-level view of resources and their relationships in a resource group, a comprehensive topology map for reconnaissance.
  read:
    risks:
      - discovery:network
    notes: Returns a resource-group-wide map of network resources and their relationships, a powerful reconnaissance primitive for mapping the environment.
    name: Network Watcher topology
    parent:
      description: Network Watcher topology returns a network-level view of resources (subnets, NICs, NSGs, public IPs) and their relationships within a resource group. It is a read-only network mapping diagnostic.
      notes: Provides broad read-only reconnaissance of the environment's network layout; valuable for targeting but exposes no data or credentials.
