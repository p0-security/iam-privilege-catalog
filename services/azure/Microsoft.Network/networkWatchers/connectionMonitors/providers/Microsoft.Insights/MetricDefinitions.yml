name: Connection Monitor metric definitions
description: Connection Monitor metric definitions are the schema/catalog of available monitoring metrics (names, types, units) exposed by an Azure Network Watcher Connection Monitor via Microsoft.Insights; reading it lists which metrics exist rather than any metric values.
scope: LOW
notes: Monitoring metadata only; discloses metric schema, not telemetry values or sensitive content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading available metric definitions only enumerates the metric schema/types for a Connection Monitor, a low-sensitivity reconnaissance of monitoring telemetry definitions.
