name: Network Watcher Agent
description: A Network Watcher diagnostic monitoring agent (VM extension) used to perform network observability and packet/connectivity diagnostics.
scope: MEDIUM
notes: Supporting network monitoring/diagnostics asset, not an enforced security control or production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deletes a network monitoring/diagnostic agent, removing a supporting observability component and reducing network visibility.
  read:
    risks:
      - discovery:network
    notes: Reading agent details inventories the monitoring agent configuration and associated monitored network context for reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the agent alters network monitoring configuration on supporting diagnostic infrastructure; no data access or escalation in isolation.
