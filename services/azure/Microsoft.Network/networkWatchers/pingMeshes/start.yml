name: PingMesh
description: PingMesh is a Network Watcher diagnostic that probes connectivity and latency between specified VMs to monitor network health.
scope: MEDIUM
notes: A supporting monitoring/diagnostic resource; reveals reachability/topology between hosts but holds no organizational data and protects no production service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Starting a PingMesh runs connectivity probes between specified VMs, revealing reachability and topology between hosts for network reconnaissance.
