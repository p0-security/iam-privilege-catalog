name: Network Watcher packet captures
description: A Network Watcher packet capture is a network diagnostic resource that records live network traffic to and from a target VM/endpoint and writes the captured packets to a storage account or local file.
scope: MEDIUM
notes: Captured traffic can contain sensitive in-transit data including credentials, tokens, and application payloads, making the create capability effectively a data-interception tool. Status/configuration reads expose only diagnostic metadata, not the captured payload.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a packet capture removes the diagnostic/forensic mechanism and any captured traffic records, eliminating network-traffic visibility used for incident response.
  write:
    risks:
      - exfiltration:data
      - collection:data
      - impact:spend
    scope: HIGH
    notes: Creating a packet capture records live network traffic from a target resource into attacker-readable storage, enabling interception and automated collection of sensitive in-transit data (credentials, tokens, payloads) while incurring capture/storage cost.
