name: Network Watcher packet captures
description: A Network Watcher packet capture is a network diagnostic resource that records live network traffic to and from a target VM/endpoint and writes the captured packets to a storage account or local file.
scope: MEDIUM
notes: Captured traffic can contain sensitive in-transit data including credentials, tokens, and application payloads, making the create capability effectively a data-interception tool. Status/configuration reads expose only diagnostic metadata, not the captured payload.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Returns the run status and configuration properties of a packet capture session; inventories the diagnostic resource state without disclosing captured traffic.
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading capture status reveals whether/which diagnostic captures exist and their state, providing minor reconnaissance of network monitoring activity without exposing captured data.
    name: Network Watcher packet capture status
    parent:
      description: The status endpoint for a Network Watcher packet capture session, reporting the running/stopped/completed state and metadata of a network diagnostic capture.
      notes: Returns only capture session state/metadata, not the captured traffic itself.
