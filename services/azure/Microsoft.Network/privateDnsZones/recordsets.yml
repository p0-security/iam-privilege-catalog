name: Private DNS record set
description: Private DNS record sets hold the internal name-to-address mappings for a private DNS zone resolvable within associated virtual networks.
scope: LOW
notes: Internal DNS records expose private hostnames, service names, and IP topology; read-only and non-sensitive in isolation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reads Private DNS record sets, enumerating internal DNS records that disclose private network topology and internal hostnames.
