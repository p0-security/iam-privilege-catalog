name: Private DNS A record set
description: An A record set maps internal hostnames to IPv4 addresses within an Azure Private DNS zone, used for name resolution inside linked virtual networks.
scope: HIGH
notes: Private (internal) records, not public-facing; supports a single organizational network function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the record set removes name resolution for the host, breaking connectivity to the service it fronts (DoS within the VNet).
  write:
    risks:
      - impact:manipulation
      - takeover:domain
    notes: Creating/updating the record set replaces internal hostname-to-IP mappings, letting an attacker repoint internal names to attacker-controlled IPs to route/intercept traffic (DNS hijack within the private zone).
