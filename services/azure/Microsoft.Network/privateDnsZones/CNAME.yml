name: Private DNS CNAME record set
description: A CNAME record set aliases an internal hostname to a canonical name within an Azure Private DNS zone, used for name resolution inside linked virtual networks.
scope: HIGH
notes: Private (internal) records, not public-facing; supports a single organizational network function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the record set removes the internal alias resolution, breaking connectivity to the aliased service (DoS within the VNet).
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading the CNAME record set discloses internal alias mappings, inventorying private naming and topology.
  write:
    risks:
      - impact:manipulation
      - takeover:domain
    notes: Creating/updating the record set re-aliases an internal hostname to an attacker-chosen target, redirecting internal traffic for that name (DNS hijack within the private zone).
