name: Private DNS AAAA record set
description: An AAAA record set maps internal hostnames to IPv6 addresses within an Azure Private DNS zone, used for name resolution inside linked virtual networks.
scope: HIGH
notes: Private (internal) records, not public-facing; supports a single organizational network function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the record set removes IPv6 name resolution for the host, breaking connectivity to the service it fronts (DoS within the VNet).
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading the AAAA record set discloses internal hostname-to-IPv6 mappings, inventorying private endpoints and topology.
  write:
    risks:
      - impact:manipulation
      - takeover:domain
    notes: Creating/updating the record set replaces internal hostname-to-IPv6 mappings, letting an attacker repoint internal names to attacker-controlled addresses to route/intercept traffic within the private zone.
