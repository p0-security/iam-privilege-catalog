name: Private DNS zone metric definitions
description: Azure Monitor metric definitions for a Private DNS zone describe the schema of metrics (which metric types/dimensions exist) that can be queried for the zone. This is monitoring metadata, not actual metric values or zone records.
scope: LOW
notes: Read-only monitoring schema; benign and low-sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Reading metric definitions only enumerates which monitoring metrics exist for the DNS zone, exposing monitoring schema metadata, not values.
