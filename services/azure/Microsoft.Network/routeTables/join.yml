name: Route table
description: A route table holds user-defined routes that override Azure's default system routes for the subnets it is associated with, controlling the next hop that traffic destined for given address prefixes takes.
scope: HIGH
notes: A route table is a perimeter/segmentation control; it determines the path (and therefore the exposure) of a subnet's traffic. Rated consistent with the other network-segmentation resources documented alongside it, rather than CRITICAL, which is reserved for tenant-wide IAM/policy objects.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Azure requires this permission on the route table itself before a principal can associate a subnet with it, specifically so that a principal with only narrow "create resource" rights cannot silently reroute their own subnet's traffic away from mandated routing (e.g. through a firewall/NVA). Holding join lets an attacker associate an attacker-controlled or victim subnet with a route table that redirects traffic to an attacker-chosen next hop, bypassing intended routing/segmentation control.
