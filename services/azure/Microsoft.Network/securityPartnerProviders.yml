name: Security Partner Provider
description: A SecurityPartnerProvider integrates a third-party security service (firewall-as-a-service / NVA) into an Azure Virtual WAN hub so that network traffic is steered through external inspection. It is a network defense/traffic-inspection control.
scope: HIGH
notes: Defines defensive network inspection wiring for a single network function; modifying or removing it weakens traffic filtering.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:infra
    notes: Deleting the provider tears down the third-party security-inspection integration, disabling a network defense control and destroying that supporting infrastructure.
  read:
    risks:
      - discovery:network
    scope: MEDIUM
    notes: Reading the provider inventories the third-party security integration and its virtual-hub association, revealing the defensive network-inspection topology.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating the provider can reconfigure or repoint the third-party security inspection path, weakening or bypassing the traffic-filtering defense and altering its operational config.
