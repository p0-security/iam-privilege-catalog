name: Azure Firewall FQDN tags
description: A read-only lookup returning Microsoft's globally-published catalog of well-known Azure Firewall FQDN tags (e.g. WindowsUpdate, AzureBackup) that can be referenced in firewall rules. It is static reference data, not the tenant's firewall configuration.
scope: LOW
notes: Globally static reference data identical across tenants; reveals nothing about deployed firewall rules.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns the static, well-known list of Azure Firewall FQDN tags (a reference catalog), not tenant-specific firewall rules or configuration, so it grants no meaningful capability.
