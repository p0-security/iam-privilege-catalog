name: Virtual Network Gateway log definitions
description: The list of Azure Monitor log/event category definitions (schema of available log types) exposed for a Virtual Network Gateway.
scope: LOW
notes: Read-only logging schema; despite the display name it returns log category definitions, not log content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Enumerates the available log/event categories for the Virtual Network Gateway, providing logging-schema reconnaissance rather than actual log events.
