name: Virtual Network Gateway diagnostic settings
description: Diagnostic settings on a virtual network gateway (VPN/ExpressRoute gateway) that control which logs and metrics are collected and where they are routed (Log Analytics, Event Hub, storage).
scope: MEDIUM
notes: Detective/monitoring control; reading or tampering with it affects telemetry coverage but does not directly touch the gateway's data plane or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading the diagnostic settings enumerates which log/metric categories are enabled and where they route, letting an attacker map detection coverage to plan evasion.
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Create/update lets an attacker disable log categories or redirect telemetry away from monitoring sinks, suppressing audit logging and weakening a detective control.
