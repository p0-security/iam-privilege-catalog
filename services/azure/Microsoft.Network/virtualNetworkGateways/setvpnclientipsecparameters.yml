name: Virtual network gateway
description: An Azure Virtual Network Gateway provides VPN (site-to-site / point-to-site) and ExpressRoute connectivity between an Azure VNet and on-premises or remote networks. It is the production network ingress/egress edge for hybrid connectivity.
scope: HIGH
notes: A gateway is the trust boundary for a single VNet's hybrid/remote connectivity; control of it can expose or sever access to an entire private network and its hosted services.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:defense
      - escalation:network
    notes: Sets the IPsec/IKE cipher, integrity, and lifetime parameters used by the gateway's P2S VPN clients. An attacker can downgrade these to weak/deprecated algorithms, enabling interception or decryption of P2S client traffic into the private network.
