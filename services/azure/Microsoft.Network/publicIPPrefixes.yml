name: Public IP prefix
description: A Public IP Prefix is a reserved, contiguous range of static public IP addresses that can be drawn from to assign predictable public IPs to Azure resources.
scope: HIGH
notes: A supporting network addressing resource; its configuration is non-secret network metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a public IP prefix removes the reserved public IP address range, disrupting any service depending on those addresses (DoS-like effect).
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating/updating a public IP prefix alters network address-allocation configuration and provisions a billable reserved range of public IPs.
