name: Traffic Manager profile
description: An Azure Traffic Manager profile is a DNS-based global traffic load balancer that routes client requests for a public DNS name to a set of backend endpoints according to a routing method. It fronts a production internet-facing service.
scope: HIGH
notes: Controlling a profile controls where a public domain's traffic resolves, making it a domain/traffic-routing asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the profile removes the DNS routing component entirely so the domain can no longer route traffic to any backend, destroying a network component and denying service.
  write:
    risks:
      - takeover:domain
      - impact:manipulation
      - impact:dos
    notes: Creating/updating a profile lets an attacker rewrite DNS-based routing and endpoints, redirecting the profile's domain traffic to attacker-controlled targets (domain hijack) or disabling endpoints to deny service.
