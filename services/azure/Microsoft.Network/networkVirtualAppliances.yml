name: Network Virtual Appliance
description: A Network Virtual Appliance (NVA) is a managed, VMSS-backed inline network device (firewall, router, SD-WAN, or IDS/IPS) inserted into the VNet traffic path to inspect, filter, and route traffic.
scope: HIGH
notes: NVAs typically serve as security chokepoints (firewall/IDS) for a single organizational function's traffic, so they are both network infrastructure and a defense control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - destruction:defense
      - impact:dos
    notes: Deleting the NVA removes the inline network/firewall component, tearing down a defense control and disrupting all traffic routed through it (DoS).
  write:
    risks:
      - impact:manipulation
      - destruction:defense
      - impact:spend
    notes: Create/update lets an attacker alter the appliance's routing/firewall configuration (manipulating traffic flow and weakening the defense it enforces) and provisions costly vendor-licensed VMSS-backed compute.
