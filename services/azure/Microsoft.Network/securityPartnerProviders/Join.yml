name: Security Partner Provider
description: A SecurityPartnerProvider integrates a third-party security service (firewall-as-a-service / NVA) into an Azure Virtual WAN hub so that network traffic is steered through external inspection. It is a network defense/traffic-inspection control.
scope: MEDIUM
notes: Defines defensive network inspection wiring for a single network function; modifying or removing it weakens traffic filtering.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: The join action links the provider into a virtual hub/network (marked not alertable), wiring the resource into network paths to extend network reach.
