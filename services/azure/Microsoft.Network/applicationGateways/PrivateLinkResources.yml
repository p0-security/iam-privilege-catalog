name: Application Gateway Private Link Resource
description: Application Gateway Private Link Resources describe the private-link-exposable endpoints (frontends) of an Application Gateway that consumers can connect to over Private Link.
scope: LOW
notes: Read-only configuration metadata about the gateway's private connectivity surface.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Listing private link resources only enumerates the gateway's private connectivity targets, which is network reconnaissance.
