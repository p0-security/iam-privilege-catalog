name: Application Gateway Private Link configuration
description: Private Link configurations on an Application Gateway define the private connectivity setup (private IPs, subnets) used to expose the gateway via Azure Private Link.
scope: MEDIUM
notes: Supporting network connectivity configuration for a single application gateway.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading the configuration enumerates private connectivity topology (IPs, subnets), providing network reconnaissance only.
