name: Azure VPN gateway
description: A VpnGateway is an Azure Virtual WAN site-to-site VPN gateway resource that provides cross-premises/hybrid network connectivity, including VPN connections, BGP routing, and IP configuration.
scope: HIGH
notes: Production network connectivity infrastructure for a single organizational function (hybrid/site-to-site connectivity); compromise can extend reach into peered/on-prem networks or sever connectivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating or updating the gateway lets an attacker reconfigure VPN connections, routing, or BGP settings, redirecting or exposing hybrid traffic to an attacker-controlled endpoint.
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deletes the gateway, severing site-to-site VPN connectivity to the bridged networks.
