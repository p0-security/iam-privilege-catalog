name: Network Security Group
description: A Network Security Group (NSG) is a stateful firewall ruleset (allow/deny by port, protocol, IP, and direction) that can be attached to subnets and network interfaces to control traffic.
scope: HIGH
notes: A primary network defense for a single network/function; the firewall posture it encodes is sensitive but governs one VNet/segment rather than the whole tenant.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - impact:dos
    notes: Deleting an NSG removes the firewall ruleset protecting attached subnets/NICs, eliminating a network defense and potentially disrupting connectivity for services that depend on its rules.
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading an NSG discloses its firewall rules and topology associations, letting an attacker map allowed/denied ports and IP ranges to find exposure points and weak spots.
  write:
    risks:
      - destruction:defense
      - escalation:network
      - impact:manipulation
    notes: Creating or updating an NSG lets an attacker add permissive allow rules or remove deny rules, disabling the firewall defense, exposing services to broader network reach, and altering the security configuration.
