name: Network Verifier
description: A Network Verifier is a connectivity/reachability diagnostic resource that analyzes whether traffic can flow between network endpoints, surfacing effective routes, rules, and segmentation.
scope: MEDIUM
notes: Supporting diagnostic tooling whose results reveal network paths and security rule effects useful for reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a verifier removes a network diagnostic/reachability-analysis resource; low impact beyond loss of the supporting verification tooling, with no effect on production connectivity.
  write:
    risks:
      - impact:manipulation
      - discovery:network
    notes: Creating/updating a verifier alters the diagnostic configuration and provisions a reachability probe that actively maps network paths; it does not change production routing or grant data access.
