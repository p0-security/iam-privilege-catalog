name: Network authentication policies
description: Authentication policies define access-control/authentication enforcement rules applied to Azure Network resources.
scope: MEDIUM
notes: Configuration that governs how authentication is enforced; weakening or removing it can permit unauthorized access to network resources.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: The join action associates a resource with the authentication policy's enforcement scope, an operational configuration change that alters which resources are governed.
