name: DNS Forwarding Rule
description: A DNS Forwarding Rule within a ruleset maps a DNS domain name to one or more target DNS servers, defining how queries for that domain are conditionally forwarded for linked virtual networks.
scope: HIGH
notes: Reveals internal resolution targets and domain routing for production VNets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting a forwarding rule removes the conditional resolution path for its domain, breaking name resolution and disrupting dependent connectivity.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a forwarding rule lets an attacker point a domain's resolution at an attacker-controlled DNS server, redirecting internal name resolution to enable interception or spoofing within linked VNets.
