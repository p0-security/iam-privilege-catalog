name: VPN server configuration
description: A VpnServerConfiguration defines the authentication settings (certificate, RADIUS, and Azure AD) and connection parameters for Point-to-Site (P2S) VPN access into Azure virtual networks via VPN/virtual WAN gateways.
scope: HIGH
notes: Governs remote-access authentication into the network; the RADIUS shared secrets it references are credential material exposed only through the dedicated listAllRadiusServersSecrets action.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the configuration removes the backing for P2S VPN connectivity, disrupting remote access to the network.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
      - escalation:network
    notes: Creating/updating the config alters who can authenticate into the VNet (RADIUS servers, certs, allowed clients), manipulating connectivity config, weakening an authentication defense, and potentially granting inbound network access.
