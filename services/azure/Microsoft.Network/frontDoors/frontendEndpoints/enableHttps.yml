name: Front Door frontend endpoints
description: A Front Door frontend endpoint defines the public hostnames/custom domains and TLS configuration that the Azure Front Door edge answers for.
scope: HIGH
notes: Frontend endpoints are the public ingress/domain binding of the edge; controlling them governs domain routing and the public-facing presence of an application.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Enabling HTTPS binds/changes the TLS certificate configuration on the public endpoint; an attacker could bind an attacker-supplied certificate, altering the endpoint's transport security configuration.
