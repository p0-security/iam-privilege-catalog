name: Front Door frontend endpoints
description: A Front Door frontend endpoint defines the public hostnames/custom domains and TLS configuration that the Azure Front Door edge answers for.
scope: HIGH
notes: Frontend endpoints are the public ingress/domain binding of the edge; controlling them governs domain routing and the public-facing presence of an application.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Disabling HTTPS strips TLS from the public endpoint, removing transport-security defense and exposing traffic to interception/downgrade.
