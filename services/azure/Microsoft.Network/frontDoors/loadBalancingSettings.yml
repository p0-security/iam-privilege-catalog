name: Front Door load balancing settings
description: Front Door load balancing settings define health-probe sampling thresholds and traffic-distribution behavior used to select healthy backends behind the edge.
scope: HIGH
notes: These settings govern backend selection/health evaluation for a single application's public delivery.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: The operation name is /delete despite the mislabeled 'Creates or updates' displayName/description; removing load balancing settings that routing rules depend on breaks backend distribution and disrupts the public-facing service (DoS).
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Gets load balancing settings, inventorying health-probe/distribution configuration — network reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating load balancing settings alters health-probe/sample thresholds, manipulating how traffic is distributed and which backends are considered healthy.
