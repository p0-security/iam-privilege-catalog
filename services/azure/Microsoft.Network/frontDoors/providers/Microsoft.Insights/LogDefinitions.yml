name: Front Door log definitions
description: "Azure Monitor log definitions for an Azure Front Door resource: the read-only schema enumerating which log categories are collectible for the Front Door. It exposes the log-category inventory, not log contents."
scope: LOW
notes: Monitoring/diagnostics metadata for a single edge/CDN resource; low sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading available Front Door log definitions enumerates which log categories exist for the resource, a low-value inventory of log types useful for planning evasion.
