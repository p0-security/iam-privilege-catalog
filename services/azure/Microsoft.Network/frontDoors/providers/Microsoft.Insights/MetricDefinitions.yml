name: Front Door metric definitions
description: "Azure Monitor metric definitions for an Azure Front Door resource: the read-only schema enumerating which metrics (names, units, aggregations) are emitted by the Front Door. It exposes the monitoring schema, not metric values."
scope: LOW
notes: Monitoring/diagnostics metadata for a single edge/CDN resource; low sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Reading available Front Door metric definitions only enumerates the metric schema/types available, which is low-sensitivity metadata discovery (not the metric values themselves).
