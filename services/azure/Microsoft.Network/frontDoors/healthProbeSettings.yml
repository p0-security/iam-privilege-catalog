name: Front Door health probe settings
description: Health probe settings on an Azure Front Door define how the edge service performs backend health checks (probe path, protocol, interval) that drive traffic-routing decisions.
scope: HIGH
notes: Front Door is a production-facing edge/CDN service; this sub-resource is routing configuration, not data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting probe settings removes a Front Door routing/network component and disrupts backend health evaluation and traffic delivery for the hosted service.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Creating/updating probe settings alters operational routing config and can misconfigure health checks to mark healthy backends down, disrupting traffic delivery (DoS).
