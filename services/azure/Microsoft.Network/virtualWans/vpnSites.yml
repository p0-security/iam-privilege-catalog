name: VPN site (via Virtual WAN)
description: A VPN Site represents an on-premises/branch site-to-site VPN endpoint definition (gateway IP/FQDN, address spaces, BGP, link settings) referenced by a Virtual WAN.
scope: HIGH
notes: Reveals on-premises connectivity topology supporting a single network function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Lists all VPN sites referencing the Virtual WAN, inventorying the connected branch/on-premises endpoints for network reconnaissance.
