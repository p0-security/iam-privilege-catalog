name: Virtual WAN supported security providers
description: A read-only lookup that returns the static, Microsoft-curated catalog of security provider types supported for a Virtual WAN. It is a platform capability reference, not tenant-specific configuration.
scope: LOW
notes: Globally static reference data identical across tenants; reveals nothing about deployed resources.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns the generic platform list of supported Virtual WAN security providers, not org-specific configuration, so it grants no meaningful reconnaissance value in isolation.
