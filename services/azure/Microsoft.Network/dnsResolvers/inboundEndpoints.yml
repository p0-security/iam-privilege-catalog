name: DNS Private Resolver inbound endpoint
description: A DNS Resolver inbound endpoint is the IP listener bound to a subnet that receives inbound DNS queries into the virtual network for the private resolver.
scope: HIGH
notes: Defines the DNS ingress point for a single network function; manipulation or removal affects name-resolution into the VNet.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting an inbound endpoint removes the network ingress point for DNS queries, disrupting inbound private name resolution into the VNet and causing denial of service.
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Control-plane get returning the inbound endpoint's configuration (private IP, subnet binding), useful for network reconnaissance but granting no modification or secret access.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating or updating an inbound endpoint provisions or alters a DNS listener IP bound to a subnet, letting an attacker manipulate the resolution ingress path and establish a new reachable endpoint inside the target network.
