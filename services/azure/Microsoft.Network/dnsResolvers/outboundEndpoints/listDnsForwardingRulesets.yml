name: DNS Resolver Outbound Endpoint
description: A DNS Resolver Outbound Endpoint is the subnet-attached egress point of an Azure Private DNS Resolver that forwards conditional DNS queries from a VNet to external/on-prem DNS servers per configured forwarding rulesets.
scope: HIGH
notes: Controls hybrid/private name resolution for a VNet; manipulation can redirect resolution, and its loss breaks DNS for dependent workloads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Lists the DNS forwarding rulesets linked to the outbound endpoint, enumerating DNS routing configuration for reconnaissance.
