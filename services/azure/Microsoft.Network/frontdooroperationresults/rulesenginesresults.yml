name: Front Door rules engine operation result
description: An endpoint that returns the result of an asynchronous Azure Front Door Rules Engine management operation (operation-result tracking).
scope: LOW
notes: Operation-status polling endpoint tied to a Front Door rules engine; primarily conveys completion status of a prior management call.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling the rules engine operation result returns the outcome of a prior management operation; in isolation it is an operation-status read with no meaningful attacker capability.
