name: Service Endpoint Policy
description: A Service Endpoint Policy is an Azure network filtering object that restricts which specific Azure service resources (e.g., particular storage accounts) a subnet can reach over service endpoints, acting as a data-exfiltration prevention control.
scope: HIGH
notes: Functions as a defensive egress boundary on a single VNet/subnet; sensitivity is at the level of a single network/function rather than tenant-wide.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Associating a resource with the policy can alter which networked service resources are reachable, enabling network-reach changes; in isolation it is a linking primitive normally paired with write on the target.
