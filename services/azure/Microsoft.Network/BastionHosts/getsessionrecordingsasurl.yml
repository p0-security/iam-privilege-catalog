name: Bastion Host
description: Azure Bastion is a managed PaaS jump host deployed in a VNet that brokers secure browser-based RDP/SSH connectivity to VMs without exposing public IPs on those VMs.
scope: HIGH
notes: A production secure-access entry point into a private network; controlling or observing it affects reachability of all VMs behind it.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - exfiltration:logs
    notes: Getting the session-recording SAS URL returns a credential-bearing tokenized storage URL granting direct access to recorded administrative sessions, exfiltrating both the SAS token and the sensitive recordings.
  read:
    risks:
      - exfiltration:crypto
      - exfiltration:logs
    notes: Returns the SAS URL (a bearer credential token) that grants direct access to the storage holding recorded RDP/SSH privileged sessions, exposing both the credential token and the sensitive session audit recordings.
    name: Bastion Host session recording SAS URL
