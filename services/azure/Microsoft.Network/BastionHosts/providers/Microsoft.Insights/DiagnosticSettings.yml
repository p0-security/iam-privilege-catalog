name: Bastion Host diagnostic settings
description: The diagnostic settings of an Azure Bastion Host that control whether and where the jump-host's audit logs and metrics are collected and routed.
scope: MEDIUM
notes: Governs audit/monitoring coverage of a privileged RDP/SSH access path; tampering blinds incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reads the diagnostic setting to reveal whether and where Bastion logs are exported, letting an attacker assess monitoring coverage before acting.
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating or updating the Bastion diagnostic setting lets an attacker disable or redirect log forwarding, suppressing audit visibility of the privileged RDP/SSH access path to evade detection.
