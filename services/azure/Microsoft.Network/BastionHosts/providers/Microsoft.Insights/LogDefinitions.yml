name: Bastion Host log definitions
description: The catalog of available audit/diagnostic log category definitions for an Azure Bastion Host (the managed RDP/SSH jump-host service).
scope: LOW
notes: Read-only metadata about which log categories exist; reveals monitoring surface but no log content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Returns only the list of available audit log categories for the Bastion Host, enabling reconnaissance of what logging exists without exposing log content.
