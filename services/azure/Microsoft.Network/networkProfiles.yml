name: Network Profile
description: A Network Profile defines container networking configuration in Azure, specifying how container groups (e.g. Azure Container Instances) attach to virtual network subnets via container network interface (CNI) configurations.
scope: HIGH
notes: Supports a single networking function (container workload connectivity); its configuration governs which subnets and NICs containers bind to.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a network profile removes the container networking configuration dependent workloads rely on, breaking their connectivity (DoS-like network destruction).
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Read-only retrieval of a network profile inventories container networking configuration (subnet and NIC bindings), which is network reconnaissance with no secret disclosure.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating or updating a network profile alters container NIC/subnet bindings, manipulating operational network config and enabling attachment of workloads onto attacker-reachable network segments.
