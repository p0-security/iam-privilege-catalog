name: Load Balancer backend pool addresses
description: Backend pool addresses are the set of backend target IP addresses/instances registered behind a load balancer's backend address pool.
scope: MEDIUM
notes: Reveals internal backend topology for a single load-balanced service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Listing backend pool addresses enumerates the internal IPs/targets behind the load balancer, revealing network topology and attack targets.
