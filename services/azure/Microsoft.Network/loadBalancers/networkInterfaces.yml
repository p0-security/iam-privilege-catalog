name: Azure Load Balancer Backend Network Interfaces
description: A read-only view listing references to all network interfaces participating in a load balancer's backend pool.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Listing the network interfaces behind a load balancer enumerates backend NIC associations and topology, providing network reconnaissance.
