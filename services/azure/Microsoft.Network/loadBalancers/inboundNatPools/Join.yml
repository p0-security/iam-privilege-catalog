name: Load Balancer Inbound NAT Pool
description: An inbound NAT pool on an Azure Load Balancer defines a range of frontend ports that are translated to backend instances, enabling per-instance inbound connectivity (e.g. SSH/RDP) across a scale set.
scope: HIGH
notes: Configuration sub-resource of a load balancer; read is reconnaissance, while join attaches backends into the load-balanced network path.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Joining lets an attacker attach a controlled backend resource to the load balancer's inbound NAT mappings, gaining/extending inbound network reachability on the load-balanced production network.
