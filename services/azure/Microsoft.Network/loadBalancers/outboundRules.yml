name: Load Balancer Outbound Rule
description: A Load Balancer Outbound Rule is a sub-resource of an Azure Load Balancer defining outbound (SNAT) connectivity configuration for backend pool members.
scope: LOW
notes: Read access exposes only network egress/SNAT configuration of a single load balancer sub-resource; no secret material or data is returned.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Read-only retrieval of a load balancer outbound rule inventories outbound/SNAT network configuration, which is network reconnaissance.
