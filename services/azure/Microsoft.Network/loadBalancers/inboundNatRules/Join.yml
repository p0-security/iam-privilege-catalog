name: Load Balancer Inbound NAT Rule
description: A load balancer inbound NAT rule forwards a specific frontend port to a port on a backend instance, exposing that instance for inbound connections (e.g. RDP/SSH).
scope: HIGH
notes: Inbound NAT rules define inbound exposure paths for a single service; creating them can expose otherwise-internal resources to inbound traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Joining attaches an attacker-controlled resource to the inbound NAT rule's forwarded port, gaining the inbound network path to/from that backend target.
