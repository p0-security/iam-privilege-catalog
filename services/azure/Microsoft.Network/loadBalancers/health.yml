name: Azure Load Balancer
description: An Azure Load Balancer distributes inbound traffic across backend pool members (VMs/NICs) using frontend IP configurations, health probes, and load-balancing rules.
scope: LOW
notes: Fronts production services for a single organizational function; reconfiguration can redirect or expose backend traffic and deletion takes the fronted service offline.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Retrieving the load balancer health summary is a read-only action exposing backend/endpoint operational state, useful for reconnaissance of service availability and topology.
