name: Load Balancer Load Balancing Rule
description: A load balancing rule on an Azure Load Balancer maps a frontend IP/port to a backend pool and port, defining how inbound traffic is distributed across backend instances.
scope: LOW
notes: Read-only configuration/health sub-resource; exposes network traffic-distribution layout but no data plane access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading a load balancing rule definition only enumerates network traffic-distribution configuration (frontend/backend, port/protocol), which is network reconnaissance.
