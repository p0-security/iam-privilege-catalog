name: Load Balancer log definitions
description: The catalog of available event/log category definitions for a Load Balancer, enumerating which log types and fields the load balancer can emit.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading load balancer log definitions only enumerates the available log/event categories, a low-sensitivity logging-schema reconnaissance read.
