name: Load Balancer metric definition
description: The metric definitions resource exposes the catalog of Azure Monitor metrics available for a load balancer (metric names, units, dimensions), not the metric values themselves.
scope: LOW
notes: Monitoring metadata only; no metric values or configuration are returned.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading the available metric definitions only enumerates the monitoring metric schema (which metrics exist), low-sensitivity logs/monitoring metadata discovery with no metric values.
