name: Load Balancer Probe
description: A health probe on an Azure Load Balancer defines how backend instance health is checked (protocol, port, path, interval) to determine traffic eligibility.
scope: LOW
notes: Configuration sub-resource of a load balancer; read is reconnaissance, while join allows other resources to reference the probe and attach into the load-balancing fabric.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading a probe definition only enumerates health-probe network configuration (protocol, port, path, interval), which is network reconnaissance.
