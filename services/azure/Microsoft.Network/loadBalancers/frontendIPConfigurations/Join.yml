name: Load Balancer Frontend IP Configuration
description: A load balancer frontend IP configuration defines the public or private IP endpoint(s) through which a load balancer receives inbound traffic before distributing it to backend pools.
scope: HIGH
notes: Frontend IP configuration is network exposure metadata; reading it is reconnaissance, while wiring resources to it can alter the ingress path of a single service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Joining attaches an attacker-controlled resource to the load balancer's frontend IP path, positioning it on the network ingress/exposure path to additional resources.
