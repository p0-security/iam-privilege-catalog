name: Front Door operation result
description: An endpoint that returns the result/status of an asynchronous Azure Front Door management operation (operation-result tracking).
scope: LOW
notes: Operation-status polling endpoint; conveys the outcome of a prior management call rather than standing resource configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reading the operation result only returns the status/outcome of a prior asynchronous Front Door management operation, an inert poll with no exploitable capability.
