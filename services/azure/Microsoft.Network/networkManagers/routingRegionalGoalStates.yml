name: Azure Virtual Network Manager routing regional goal state
description: The intended (desired) routing configuration goal state for an AVNM network manager within a given region.
scope: LOW
notes: Read-only view of the intended routing state for a region.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading the regional routing goal state exposes the intended routing configuration for a region, enabling network reconnaissance.
