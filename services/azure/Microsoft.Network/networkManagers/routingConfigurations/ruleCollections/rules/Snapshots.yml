name: Azure Virtual Network Manager routing rule snapshot
description: A point-in-time snapshot of a deployed AVNM routing rule, capturing the applied individual route state.
scope: LOW
notes: Read-only historical/applied routing state for the managed network.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading a deployed routing rule snapshot discloses the applied route definition, enabling read-only network reconnaissance.
