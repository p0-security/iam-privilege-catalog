name: Azure Virtual Network Manager routing rule collection snapshot
description: A point-in-time snapshot of a deployed AVNM routing rule collection, capturing the applied rule collection state.
scope: LOW
notes: Read-only historical/applied routing state for the managed network.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading a deployed rule-collection snapshot discloses the applied routing rules, providing read-only network reconnaissance.
