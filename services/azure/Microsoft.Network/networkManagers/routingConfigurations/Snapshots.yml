name: Azure Virtual Network Manager routing configuration snapshot
description: A point-in-time snapshot of a deployed AVNM routing configuration, capturing the applied routing state.
scope: LOW
notes: Read-only historical/applied routing state for the managed network.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
