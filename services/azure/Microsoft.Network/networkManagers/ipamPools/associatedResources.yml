name: IPAM pool
description: An IP Address Management (IPAM) pool under a Network Manager that defines and tracks CIDR/address-space allocations used for planning IP assignment across managed networks.
scope: MEDIUM
notes: An address-planning/management construct (supporting infra), not a live traffic-bearing network component.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Despite the /action suffix this lists resources associated to the pool, enabling reconnaissance of which network resources consume its address space.
