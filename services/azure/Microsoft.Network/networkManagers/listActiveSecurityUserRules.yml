name: Azure Virtual Network Manager
description: Azure Virtual Network Manager is a centralized network governance resource that manages connectivity (mesh/hub-spoke peering) and security admin rules across many VNets within a defined scope of subscriptions/management groups.
scope: MEDIUM
notes: Its committed configurations can override NSGs and reshape connectivity across a broad network scope, making it a high-leverage network control plane.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
      - discovery:policy
    notes: Lists the active security user rules deployed across managed VNets, exposing the user-level network security ruleset for reconnaissance of defensive gaps.
  read:
    risks:
      - discovery:network
      - discovery:policy
    scope: HIGH
    notes: Listing the active user rules reveals the effective network traffic-control rules across managed networks, enabling reconnaissance of the network access posture.
    name: Network Manager active security user rules
    parent:
      description: A read permission that returns the effective, deployed security user rules applied by an Azure Virtual Network Manager across its managed virtual networks (user-defined network traffic rules).
      notes: Effective network traffic rules spanning many managed VNets.
