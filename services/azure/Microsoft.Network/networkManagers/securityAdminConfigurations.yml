name: AVNM security admin configurations
description: An Azure Virtual Network Manager security admin configuration is a container for high-priority security (firewall-style) admin rules that override per-VNet NSGs across managed network groups.
scope: HIGH
notes: Acts as a centrally-enforced, NSG-overriding network defense layer across many VNets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:policy
    notes: Deleting the security admin configuration removes the centrally-enforced NSG-overriding security rules protecting managed VNets, disabling a network defense layer.
  read:
    risks:
      - discovery:network
      - discovery:policy
    scope: MEDIUM
    notes: Read-only disclosure of the centrally-enforced NSG-overriding security rule posture, revealing network defense configuration and gaps.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating the security admin configuration alters the high-priority NSG-overriding rule enforcement across managed VNets, letting an attacker weaken or restructure the centrally-enforced network defense.
