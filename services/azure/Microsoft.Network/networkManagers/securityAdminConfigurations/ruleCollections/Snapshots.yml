name: Network Manager security admin rule collection snapshot
description: A snapshot of a deployed security admin rule collection within an Azure Virtual Network Manager security admin configuration - a grouping of centrally-enforced allow/deny network security rules applied across managed virtual networks.
scope: LOW
notes: Security admin rules override subnet NSGs; the rule collection groups the enforced traffic-control rules.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
      - discovery:policy
    notes: Reading the rule collection snapshot enumerates the grouped enforced network security rules, exposing the firewall coverage and weaknesses for reconnaissance.
