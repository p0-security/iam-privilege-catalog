name: Azure Virtual Network Manager
description: Azure Virtual Network Manager is a centralized network governance resource that manages connectivity (mesh/hub-spoke peering) and security admin rules across many VNets within a defined scope of subscriptions/management groups.
scope: MEDIUM
notes: Its committed configurations can override NSGs and reshape connectivity across a broad network scope, making it a high-leverage network control plane.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Lists active connectivity configurations (mesh/hub-spoke peering), mapping cross-VNet connectivity topology for reconnaissance.
  read:
    risks:
      - discovery:network
    scope: HIGH
    notes: Listing active connectivity configurations maps the deployed hub-spoke/mesh topology and peering layout, enabling network reconnaissance for movement planning.
    name: Network Manager active connectivity configurations
    parent:
      description: A read permission that returns the effective, deployed connectivity configurations applied by an Azure Virtual Network Manager (hub-spoke/mesh topology and peerings across managed virtual networks).
      notes: Reveals the cross-VNet network topology and reachability structure.
