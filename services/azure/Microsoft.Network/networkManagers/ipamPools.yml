name: IPAM pool
description: An IP Address Management (IPAM) pool under a Network Manager that defines and tracks CIDR/address-space allocations used for planning IP assignment across managed networks.
scope: MEDIUM
notes: An address-planning/management construct (supporting infra), not a live traffic-bearing network component.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
    notes: Deletes the IPAM pool, destroying address-space planning metadata used operationally to allocate CIDR ranges; it does not itself tear down live VNets/endpoints or sever traffic paths.
  read:
    risks:
      - discovery:network
    notes: Read returns the pool's CIDR/address-space configuration, letting an attacker inventory the organization's IP address planning for reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating an IPAM pool alters the CIDR address-space planning configuration governing how IP ranges are allocated across the managed network.
