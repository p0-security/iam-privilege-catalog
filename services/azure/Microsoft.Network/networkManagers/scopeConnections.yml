name: Network Manager scope connections
description: A network manager scope connection records a cross-tenant/cross-scope trust by which a network manager is authorized to manage subscriptions or management groups in another scope.
scope: HIGH
notes: Control-plane trust binding (often cross-tenant) for extending centralized network governance reach; the record is association metadata, not network data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:access
      - destruction:defense
    notes: Deleting a scope connection removes a scope from centralized management, dropping centrally-enforced security configurations and denying legitimate administrators operational control over those networks.
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading a scope connection enumerates which (potentially cross-tenant) scopes the network manager is connected to, exposing the management blast radius and trust boundaries.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating a scope connection extends the network manager's management reach into additional (potentially cross-tenant) scopes, broadening the set of network resources under centralized attacker-leverageable control.
