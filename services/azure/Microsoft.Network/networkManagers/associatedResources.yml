name: IPAM pool associated resources
description: The list of resources that consume address space from an IP Address Management (IPAM) pool managed by a Network Manager. Represents network address-allocation associations.
scope: LOW
notes: Read-only inventory of network address-space usage; no secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Listing resources associated to an IPAM pool enumerates network address allocations and the consuming resources, yielding network topology reconnaissance only.
