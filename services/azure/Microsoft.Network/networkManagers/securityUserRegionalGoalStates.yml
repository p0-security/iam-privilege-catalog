name: Network Manager security user regional goal state
description: The deployed security user goal state for an Azure Virtual Network Manager in a given region - the intended baseline user-defined network security rule posture applied across managed virtual networks in that region.
scope: LOW
notes: Represents the desired baseline user-level security posture for a region.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
      - discovery:policy
    notes: Reading the regional goal state exposes the deployed baseline user security rule posture for the region, supporting reconnaissance of network defenses.
