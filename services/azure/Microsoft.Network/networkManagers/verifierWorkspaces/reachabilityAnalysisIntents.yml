name: Reachability Analysis Intent
description: A Reachability Analysis Intent is a configuration object inside a Verifier Workspace that defines a network connectivity test (source, destination, protocol) to be analyzed by Azure Virtual Network Manager.
scope: MEDIUM
notes: Its contents disclose network topology and the endpoints being validated; it is diagnostic configuration, not live network state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a Reachability Analysis Intent removes a diagnostic test definition, a minor supporting-infrastructure destruction with no production network impact.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a Reachability Analysis Intent alters the diagnostic test configuration without changing actual network connectivity or granting access.
