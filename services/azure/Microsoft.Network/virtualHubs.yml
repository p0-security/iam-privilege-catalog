name: Virtual Hub
description: A Virtual Hub is the central, Microsoft-managed routing component of an Azure Virtual WAN that interconnects VNets, branch sites, VPN/ExpressRoute gateways and the firewall, hosting the hub route tables.
scope: HIGH
notes: Sits at the core of an organization's WAN connectivity fabric; compromise affects all spokes attached to the hub but is scoped to the networking function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the hub tears down the central routing fabric, severing connectivity for every attached VNet/branch and causing DoS for hosted services.
  read:
    risks:
      - discovery:network
    notes: Reading the hub returns address space, routing settings and attached connections, allowing inventory of the WAN topology.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating the hub lets an attacker alter central routing configuration to redirect traffic and extend reachability across connected networks.
