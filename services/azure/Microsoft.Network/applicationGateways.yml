name: Application Gateway
description: Azure Application Gateway is a managed Layer-7 (HTTP/HTTPS) load balancer and reverse proxy with an integrated Web Application Firewall (WAF) that fronts production web applications, terminating TLS and routing traffic to backend pools.
scope: HIGH
notes: As the production ingress/edge for an application function (TLS termination, WAF defense, routing), control over it enables traffic manipulation, defense weakening, and denial of service for the service it fronts.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the gateway removes the L7 ingress fronting an application, destroying the network component and denying service to the hosted application.
  read:
    risks:
      - discovery:network
    notes: Get returns the full gateway configuration (listeners, backend pools, routing rules, TLS/WAF settings, frontend IPs), which is network/L7 topology reconnaissance.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Create/update can rewrite routing rules, listeners, and backend pools to redirect or intercept traffic (manipulation) and weaken or remove WAF/security rules acting as a defense.
