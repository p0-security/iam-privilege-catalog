name: Custom IP prefixes
description: A Custom IP Prefix (BYOIP) is an Azure resource representing a customer-owned public IP address range that Azure provisions and advertises on the organization's behalf, from which public IP addresses can be allocated.
scope: HIGH
notes: These resources govern an organization's owned public IP address space; deleting or onboarding ranges affects reachability of services that depend on those addresses.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a custom IP prefix removes the advertised public IP range from Azure, withdrawing its advertisement and causing denial of service for any resources using addresses derived from it.
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: A control-plane get/list that returns the BYOIP range configuration (CIDR, provisioning/commissioning state), letting an attacker inventory the organization's owned public IP ranges.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating/updating a custom IP prefix alters which customer-owned public IP ranges Azure provisions and advertises (manipulation of public-facing network configuration) and onboards a billable advertised address resource.
