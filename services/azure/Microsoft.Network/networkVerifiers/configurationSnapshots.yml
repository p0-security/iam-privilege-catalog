name: Network Verifier configuration snapshot
description: A Configuration Snapshot is a captured point-in-time view of network configuration used as input/baseline for Network Verifier reachability analysis. It is diagnostic data, not live network infrastructure.
scope: MEDIUM
notes: Snapshots can contain detailed network topology, rules, and resource configuration, making reads useful for reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a configuration snapshot removes a captured analysis baseline/artifact; impact is limited to diagnostic tooling, not live network.
  read:
    risks:
      - discovery:network
    notes: Reading a configuration snapshot exposes a captured view of network topology and settings, enabling detailed network reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a configuration snapshot tampers with the diagnostic baseline that verification results are computed against, skewing analysis findings.
