name: Network Security Perimeter profile
description: A Network Security Perimeter (NSP) profile is a named collection of access rules and member resources within an NSP, defining the network-isolation policy applied to associated PaaS resources (Storage, Key Vault, SQL, etc.).
scope: HIGH
notes: NSP profiles enforce a network-isolation defense boundary for production PaaS services; weakening them exposes those services to broader network access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Joining a resource to a profile binds it under a chosen rule set, letting an attacker place a controlled or target resource inside the perimeter boundary to gain network reach and alter perimeter membership.
