name: Network Security Perimeter diagnostic settings proxy
description: A proxy resource exposing the diagnostic/logging settings configured for a Network Security Perimeter profile (where perimeter logs and metrics are routed).
scope: MEDIUM
notes: Diagnostic/logging configuration; reading it reveals monitoring coverage but no log data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading the proxy enumerates how/where the perimeter's diagnostics and logs are collected, providing logging-configuration reconnaissance.
