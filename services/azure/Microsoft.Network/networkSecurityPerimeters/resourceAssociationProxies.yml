name: Network Security Perimeter resource association proxy
description: A Network Security Perimeter resource association proxy is the resource-provider-side proxy view of an NSP resource association, exposing and managing the same perimeter-to-resource binding and enforcement mode.
scope: HIGH
notes: Functionally equivalent to the resource association; controls whether perimeter enforcement applies to a resource.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - escalation:network
    notes: Deleting the association proxy detaches the resource's perimeter binding, removing its network-isolation defense and broadening its reachability.
  read:
    risks:
      - discovery:network
    scope: MEDIUM
    notes: Reading the association proxy enumerates the perimeter-to-resource binding, providing the same protected-topology reconnaissance as reading the association directly.
  write:
    risks:
      - destruction:defense
      - escalation:network
      - impact:manipulation
    notes: Creating or updating the association proxy changes how a resource is bound to the perimeter (e.g. Learning mode or rebinding), weakening or disabling its isolation defense and altering its network exposure.
