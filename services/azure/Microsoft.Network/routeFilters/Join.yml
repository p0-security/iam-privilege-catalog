name: Azure Route Filter
description: A Route Filter is an Azure Network resource that controls which BGP community prefixes (e.g. Microsoft 365 / Azure PaaS service routes) are advertised over ExpressRoute Microsoft peering.
scope: HIGH
notes: Route filters govern routing for a single hybrid-connectivity (ExpressRoute) function; misconfiguration disrupts that connectivity or alters reachable network prefixes.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
    notes: Associates the route filter with an ExpressRoute peering/circuit, attaching route-advertisement controls that can extend which network prefixes/resources become reachable over the peering.
