name: Network Watcher
description: Network Watcher is an Azure regional service that provides network diagnostics, monitoring, and visibility tools (flow logs, topology, connectivity checks, NSG rule inspection) for resources in a subscription/region.
scope: MEDIUM
notes: A supporting monitoring/diagnostics resource. Its read-style diagnostic actions are powerful network reconnaissance primitives; its flow-log configuration is a defensive logging control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:infra
    notes: Deletes the Network Watcher, removing the regional network monitoring/diagnostics capability (including flow logging it manages) and impeding network visibility and incident response.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reads the Network Watcher resource definition, inventorying the diagnostic resource's own configuration.
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates the Network Watcher diagnostics resource, altering monitoring/diagnostic configuration on the control plane.
