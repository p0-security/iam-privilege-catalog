name: Interconnect group
description: An Interconnect Group organizes/groups ExpressRoute interconnects (for redundancy and connectivity aggregation) supporting hybrid network connectivity.
scope: HIGH
notes: Supports a single connectivity function; not a tenant-wide control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the interconnect group removes the construct organizing ExpressRoute interconnect redundancy, destroying connectivity infrastructure and potentially disrupting dependent hybrid connectivity.
  read:
    risks:
      - discovery:network
    scope: MEDIUM
    notes: Reading the interconnect group enumerates the grouping of ExpressRoute interconnects, enabling reconnaissance of hybrid-connectivity topology.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating the interconnect group alters how ExpressRoute interconnects are grouped for resiliency, manipulating production hybrid-connectivity configuration.
