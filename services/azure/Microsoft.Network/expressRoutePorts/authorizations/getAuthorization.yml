name: ExpressRoute Ports authorizations
description: An ExpressRoute Ports authorization is a grant on a dedicated ExpressRoute port that permits an ExpressRoute circuit to be linked to that port; it carries an authorization key used to redeem the link.
scope: HIGH
notes: "The authorization key is effectively a network-access credential: holding it lets a party attach a circuit and gain access onto the organization's private ExpressRoute connectivity."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:network
    notes: Retrieves the authorization together with its authorization key, exposing the credential needed to attach a circuit to the port and move onto the private network.
