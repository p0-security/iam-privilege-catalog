name: ExpressRoute port link
description: An ExpressRoute port link represents one of the physical fiber connections of an ExpressRoute Direct port used for dedicated private connectivity to Azure.
scope: LOW
notes: Read returns connectivity configuration only, not secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading an ExpressRouteLink inventories the dedicated port/link connectivity configuration, a network reconnaissance activity.
