name: Azure Virtual Network Manager
description: Azure Virtual Network Manager is a centralized network governance resource that manages connectivity (mesh/hub-spoke peering) and security admin rules across many VNets within a defined scope of subscriptions/management groups.
scope: HIGH
notes: Its committed configurations can override NSGs and reshape connectivity across a broad network scope, making it a high-leverage network control plane.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - destruction:defense
    notes: Deleting the Network Manager tears down centrally managed connectivity and removes the enforced security admin rules, destroying network management components and the network-wide defense enforcement they provide.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the Network Manager alters the central governance object and its managed scope, but staged configs are not enforced until a separate commit, so it does not by itself apply connectivity or weaken defenses.
