name: NAT gateway
description: A NAT Gateway provides outbound (egress) internet connectivity for subnets, mapping their traffic through associated public IPs/prefixes.
scope: HIGH
notes: Production network egress infrastructure supporting a single function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the NAT gateway removes the egress component, severing outbound connectivity for dependent subnets (effective denial of service).
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Getting the NAT gateway definition only inventories egress network configuration (associated subnets/public IPs), read-only network reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a NAT gateway alters outbound egress configuration for a network, manipulating operational connectivity/routing.
