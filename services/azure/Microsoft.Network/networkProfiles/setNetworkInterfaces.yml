name: Network Profile
description: A Network Profile defines container networking configuration in Azure, specifying how container groups (e.g. Azure Container Instances) attach to virtual network subnets via container network interface (CNI) configurations.
scope: HIGH
notes: Supports a single networking function (container workload connectivity); its configuration governs which subnets and NICs containers bind to.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Setting container network interfaces rewrites NIC-to-network bindings, manipulating operational network config and potentially exposing or relocating workloads onto additional network segments.
