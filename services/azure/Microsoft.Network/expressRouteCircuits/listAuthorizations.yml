name: ExpressRoute circuit
description: An ExpressRoute circuit is a dedicated private connectivity resource linking on-premises networks to Azure through a connectivity provider, bypassing the public internet.
scope: HIGH
notes: Production hybrid-connectivity infrastructure supporting a single organizational function's network reach; its authorization keys are connectivity credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:network
    notes: Returns the circuit authorization keys (credential material) that let an external party peer their own VNet/gateway onto the circuit, enabling credential exfiltration and unauthorized network movement onto the connected network.
