name: ExpressRoute Circuit metric definitions
description: Azure Monitor metric definitions for an ExpressRoute circuit, describing which telemetry metrics are available for the circuit.
scope: LOW
notes: Read-only monitoring metadata; exposes the schema of available metrics, not the metric values or any configuration/secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reads the available metric definitions (monitoring schema) for the ExpressRoute circuit, enabling reconnaissance of what telemetry exists without exposing values or secrets.
