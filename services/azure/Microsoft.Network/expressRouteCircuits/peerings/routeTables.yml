name: ExpressRoute circuit peering route table
description: The route table of an ExpressRoute circuit peering, a read-only diagnostic listing of routes advertised/learned over the hybrid peering.
scope: LOW
notes: Read-only network routing diagnostic data; useful for reconnaissance but exposes no secrets or control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading the route table enumerates advertised/learned routes, revealing on-prem and cloud network topology for reconnaissance.
