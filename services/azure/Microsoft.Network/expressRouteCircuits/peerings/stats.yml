name: ExpressRoute circuit peering statistics
description: ExpressRoute circuit peering statistics are read-only traffic/throughput counters (bytes in/out) for a circuit peering.
scope: LOW
notes: Exposes only non-sensitive operational usage metrics.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reads peering traffic statistics, providing low-sensitivity reconnaissance of network usage with no configuration change or data disclosure.
