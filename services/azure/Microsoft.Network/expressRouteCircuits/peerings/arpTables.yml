name: ExpressRoute circuit peering ARP table
description: The ARP table of an ExpressRoute circuit peering, a read-only diagnostic listing of layer-2/3 neighbor IP-to-MAC mappings for the hybrid peering.
scope: LOW
notes: Read-only network diagnostic data; useful for reconnaissance but exposes no secrets or control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading the ARP table enumerates layer-2 address mappings of the peering, providing read-only network topology reconnaissance.
