name: ExpressRoute circuit authorizations
description: An ExpressRoute circuit authorization is a grant (with an associated authorization key) that permits a virtual network gateway to link into a private ExpressRoute circuit, providing hybrid/private connectivity between Azure and on-premises or other networks.
scope: HIGH
notes: "Authorization keys are connection credentials: holding one lets a party peer their own gateway onto the private circuit, so they are sensitive credential material for a single production network function."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
      - persistence:account
      - impact:manipulation
    notes: Creates a new authorization, generating a redeemable authorization key that lets an attacker link their own gateway/VNet into the private circuit and establish a durable connectivity grant.
