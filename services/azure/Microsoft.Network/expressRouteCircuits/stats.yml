name: ExpressRoute circuit statistics
description: Traffic statistics/telemetry for an ExpressRoute circuit, exposing throughput and byte/drop counters for the dedicated connection.
scope: LOW
notes: Low-sensitivity operational telemetry sub-resource; reveals usage patterns but no circuit configuration or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading circuit statistics exposes non-sensitive traffic counters (bytes in/out, drops), providing only minor network usage reconnaissance.
