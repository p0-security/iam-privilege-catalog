name: DNS MX record set
description: Azure DNS MX record set defining the mail-exchange servers that handle inbound email for the domain. Controls public mail routing for the domain.
scope: HIGH
notes: Write access reroutes inbound mail to attacker-controlled servers (mail-flow hijack); delete denies inbound email.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the MX record set removes mail routing for the domain, destroying a network component and denying inbound email delivery.
  write:
    risks:
      - takeover:domain
      - impact:manipulation
    notes: Creating/replacing the MX record set redirects the domain's inbound email to attacker-controlled mail servers, hijacking mail flow and enabling interception/manipulation of communications.
