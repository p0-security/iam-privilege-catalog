name: DNS A record set
description: Azure DNS A record set mapping a hostname to one or more IPv4 addresses within a DNS zone. Controls public name resolution to IPv4 endpoints for the domain.
scope: HIGH
notes: Write access enables repointing traffic (domain takeover); delete breaks resolution (DoS).
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the A record set removes IPv4 name resolution for the hostname, destroying a network component and denying service to whatever it fronts.
  read:
    risks:
      - discovery:network
    notes: Getting the A record set discloses hostname-to-IPv4 mappings, enumerating network endpoints and topology.
  write:
    risks:
      - takeover:domain
      - impact:defacement
      - impact:manipulation
    notes: Creating/replacing the A record set repoints a hostname's IPv4 traffic to attacker-controlled infrastructure, enabling domain/subdomain takeover, defacement of public-facing services, and manipulation of routing config.
