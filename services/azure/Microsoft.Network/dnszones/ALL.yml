name: DNS record set
description: DNS record sets within an Azure public DNS zone (A, CNAME, TXT, MX, etc.) that map hostnames to addresses and targets.
scope: LOW
notes: Read-only enumeration exposes the organization's externally and internally referenced hosts, IPs, and service endpoints.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading record sets across all types inventories the zone's DNS records, mapping hostnames, IPs, and service endpoints for reconnaissance; read-only so it cannot alter routing.
