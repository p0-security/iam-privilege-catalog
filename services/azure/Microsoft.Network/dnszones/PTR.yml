name: DNS PTR record set
description: Azure DNS PTR (reverse-DNS) record set mapping IP addresses back to hostnames within a DNS zone. Used for reverse lookups that services such as mail acceptance rely on.
scope: HIGH
notes: Write access lets an attacker control reverse-DNS resolution to spoof identity/bypass reverse-lookup checks; delete disrupts reverse-lookup-dependent services.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the PTR record set removes reverse-DNS resolution, destroying a network component and disrupting services (e.g. mail acceptance) that depend on reverse lookups.
  write:
    risks:
      - takeover:domain
      - impact:manipulation
    notes: Creating/replacing the PTR record set lets an attacker control reverse-DNS resolution to spoof trusted hostnames (e.g. for mail reputation/FCrDNS) and manipulate routing-adjacent trust data.
