name: DNS zone DNSSEC configuration
description: The DNSSEC signing configuration for an Azure public DNS zone, controlling whether and how the zone's records are cryptographically signed for integrity/authentication.
scope: HIGH
notes: Public-facing authoritative DNS integrity control for a single domain function; write/delete can enable or disable the zone's anti-spoofing protection.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting the DNSSEC configuration unsigns the zone, removing the cryptographic integrity defense and exposing the domain to spoofing/cache-poisoning.
  read:
    risks:
      - discovery:network
    notes: Reads the zone's DNSSEC configuration, revealing whether and how signing is enabled; reconnaissance of the DNS integrity posture.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating the zone DNSSEC configuration lets an attacker disable or re-key signing, removing the integrity defense and altering the zone's trust posture to facilitate spoofing.
