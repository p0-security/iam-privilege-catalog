name: DNS DS record set
description: A DS (Delegation Signer) record set in an Azure public DNS zone. DS records publish the hash of a delegated child zone's signing key, anchoring the DNSSEC chain of trust for that delegation.
scope: HIGH
notes: Public-facing authoritative DNS for a single domain function; write/delete affects DNSSEC validation and resolution trust for delegated subdomains.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - destruction:defense
    notes: Deleting the DS record set removes a public DNS network component and the DNSSEC delegation trust anchor, breaking validation for delegated subzones and enabling spoofing/redirection.
  write:
    risks:
      - takeover:domain
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating DS records alters the DNSSEC chain of trust for delegated subzones, enabling an attacker to control/subvert secure resolution of the delegated domain and tamper with the validation defense.
