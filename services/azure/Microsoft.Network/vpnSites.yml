name: VPN site
description: A VPN Site represents an on-premises/branch site-to-site VPN endpoint definition (gateway IP/FQDN, address spaces, BGP, link settings) used by Virtual WAN connectivity.
scope: HIGH
notes: Reveals on-premises connectivity topology supporting a single network function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deletes a VPN site, removing a site-to-site connectivity endpoint and breaking branch/on-premises connectivity to the WAN (DoS for that link).
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creates or updates a VPN site definition (endpoint, address spaces, BGP), letting an attacker register an attacker-controlled site or alter connectivity to bridge into/redirect traffic on the WAN.
