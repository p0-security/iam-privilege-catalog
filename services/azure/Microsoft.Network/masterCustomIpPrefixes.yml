name: Master Custom IP prefixes
description: A Master Custom IP Prefix is the parent/aggregate BYOIP resource representing the top-level customer-owned public IP address block that Azure advertises (e.g. via BGP), from which child custom IP prefixes are carved.
scope: HIGH
notes: As the parent of an organization's entire owned public IP block, changes here affect all derived child prefixes and the services routed on them.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a master custom IP prefix removes the parent advertised public IP block and any child prefixes derived from it, withdrawing advertisement and causing broad denial of service for dependent services.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating/updating a master custom IP prefix alters the aggregate customer-owned IP block Azure provisions and advertises, manipulating the network configuration governing the entire BYOIP block and onboarding billable advertised address space.
