name: Virtual network gateway connection shared key
description: The shared key of a VirtualNetworkGatewayConnection is the IPsec pre-shared key (PSK) credential that authenticates the site-to-site VPN tunnel between the Azure gateway and its peer.
scope: CRITICAL
notes: The PSK is the credential securing the VPN tunnel; exporting it lets an attacker impersonate or man-in-the-middle the tunnel and reach the connected network.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:crypto
      - escalation:network
    notes: Reads the connection's sharedKey sub-resource, returning the IPsec pre-shared credential and enabling export of secret material usable to authenticate, impersonate, or intercept the tunnel.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Creates or updates the connection's shared key, letting an attacker set a key they control (enabling tunnel impersonation/hijack) or overwrite the existing PSK to break the legitimate peer's authentication (DoS).
  action:
    risks:
      - exfiltration:crypto
      - escalation:network
    notes: Despite the /action naming, this GET returns the connection's IPsec pre-shared key (credential material), enabling exfiltration of the secret and, by reuse, establishing/impersonating the tunnel to reach the connected network.
    name: Virtual network gateway connection
    parent:
      description: A VirtualNetworkGatewayConnection links a virtual network gateway to a peer (another gateway, a local network gateway for site-to-site VPN, or an ExpressRoute circuit), establishing cross-premises or cross-network IPsec/ExpressRoute connectivity.
      notes: These connections bridge Azure VNets with on-premises or partner networks; compromise can expose the IPsec pre-shared key, intercept tunnel traffic, or sever connectivity for dependent workloads.
