name: Private DNS zone link to virtual network
description: A Private DNS Zone Link to Virtual Network associates a private DNS zone with a virtual network so that VMs in the VNet can resolve records in that private zone. It is name-resolution/network linkage configuration.
scope: LOW
notes: Read-only control-plane configuration of DNS-to-network linkage; reveals network topology but no data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading the zone-to-VNet link properties enumerates private DNS/network linkage, providing network reconnaissance of name-resolution topology.
