name: Virtual Network
description: An Azure Virtual Network (VNet) is the fundamental control-plane resource defining a private network in Azure, including address space, subnets, peerings, custom DNS settings, and NSG/route-table associations.
scope: LOW
notes: VNets are core production network infrastructure supporting an organizational function; their configuration governs reachability, isolation, and traffic flow for all hosted resources.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Read-only listing of effective Network Manager connectivity configurations, enumerating how the VNet is connected to other networks.
  read:
    risks:
      - discovery:network
    notes: Listing effective connectivity configurations enumerates how the VNet is peered/connected by Network Manager, providing network topology reconnaissance.
    name: Virtual Network (Network Manager effective config query)
    parent:
      description: Returns the effective Azure Virtual Network Manager connectivity configurations (hub-spoke/mesh peerings) applied to a virtual network. A read-only query that does not mutate configuration.
      notes: Reveals how a VNet is connected/peered across the managed network, useful for lateral-movement planning.
