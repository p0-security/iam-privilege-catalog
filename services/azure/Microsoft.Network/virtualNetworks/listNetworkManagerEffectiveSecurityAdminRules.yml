name: Virtual Network
description: An Azure Virtual Network (VNet) is the fundamental control-plane resource defining a private network in Azure, including address space, subnets, peerings, custom DNS settings, and NSG/route-table associations.
scope: LOW
notes: VNets are core production network infrastructure supporting an organizational function; their configuration governs reachability, isolation, and traffic flow for all hosted resources.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Read-only listing of effective Network Manager security admin rules, exposing the centrally enforced firewall ruleset and its gaps.
  read:
    risks:
      - discovery:network
      - discovery:policy
    notes: Listing effective security admin rules discloses the firewall/allow-deny access-control policy enforced on the VNet, letting an attacker map both topology and policy gaps.
    name: Virtual Network (Network Manager effective config query)
    parent:
      description: Returns the effective Network Manager security admin rules (centrally enforced, NSG-overriding allow/deny firewall-style rules) applied to a virtual network. A read-only query that does not mutate configuration.
      notes: Exposes the enforced network security policy and its gaps, valuable for finding paths an attacker can exploit.
