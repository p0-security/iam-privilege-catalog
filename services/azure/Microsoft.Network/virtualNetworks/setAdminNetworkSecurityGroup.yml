name: Virtual network
description: An Azure virtual network (VNet) is the fundamental L3 network-isolation boundary in Azure, defining the address space, subnets, peerings, and security policy scope for all resources deployed into it.
scope: CRITICAL
notes: The VNet is the primary network-segmentation boundary in Azure; control-plane privileges on it — altering peerings, address space, or security-group associations, or attaching unauthorized resources into it — can enable significant privilege escalation via lateral network access (per the CRITICAL definition in services/README.md).
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:policy
      - escalation:network
    notes: Sets or overrides the Admin Network Security Group (a tenant/network-manager-level security policy) applied to the VNet. Lets an attacker replace the centrally enforced NSG policy with an attacker-controlled one, overriding org-mandated traffic restrictions and opening network paths the admin policy was meant to block.
