name: Virtual Network log definitions
description: The list of Azure Monitor log category definitions (schema of available log types) exposed for a Virtual Network.
scope: LOW
notes: Read-only logging schema; no log content is returned.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Enumerates the available log categories/schema for the VNet, a low-value logging-schema reconnaissance capability with no log content.
