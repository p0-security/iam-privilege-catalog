name: PingMesh metric definitions
description: PingMesh metric definitions describe the set of monitoring metrics available for a virtual network (network connectivity/latency monitoring). This is the metric schema, not actual metric values.
scope: LOW
notes: Read-only monitoring schema metadata; not sensitive data or configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Enumerates which monitoring metrics exist for the VNet, exposing only the metric schema as low-sensitivity reconnaissance.
