name: VNet tagged traffic consumer
description: A tagged traffic consumer is a sub-resource of an Azure Virtual Network that records which services consume tagged (service-endpoint) traffic and how that traffic is routed within the VNet.
scope: HIGH
notes: Control-plane configuration of a production network resource; the consumer definitions themselves contain no secrets or customer data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deletes the tagged traffic consumer, removing a network routing/consumer component of the VNet and potentially disrupting dependent service traffic (DoS-like effect).
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Read-only get of the tagged traffic consumer definition; only enumerates VNet traffic-routing configuration for reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Create/update alters the VNet's tagged traffic-consumer (routing) configuration, manipulating operational network state of a production network resource.
