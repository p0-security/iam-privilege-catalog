name: Virtual network virtual machines
description: A read-only view that returns references to all virtual machines attached to a given virtual network. It is a control-plane enumeration of network-resident compute.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
      - discovery:infra
    notes: Enumerates which VMs sit on a VNet, inventorying network-attached compute and topology for reconnaissance; discloses no data or secrets.
