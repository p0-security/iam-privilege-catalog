name: Virtual network subnet
description: A subnet is a segment of a virtual network's address space, with associated NSG/route-table bindings, service endpoints and delegations that govern connectivity for resources placed in it.
scope: HIGH
notes: Subnets are core production network components supporting a single organizational function; their configuration governs segmentation and reachability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deletes a subnet, removing a network component and severing connectivity for resources hosted in it (DoS-like network destruction).
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating a subnet mutates network config (address ranges, NSG/route-table/service-endpoint associations), letting an attacker alter segmentation and reposition reachability of hosted resources.
