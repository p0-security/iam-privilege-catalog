name: Virtual network peering
description: A virtual network peering is a connection definition that links two virtual networks, controlling cross-VNet routing, traffic forwarding and gateway transit.
scope: HIGH
notes: Peerings govern inter-network reachability; reading them exposes topology and connectivity relationships.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deletes a peering, tearing down cross-VNet connectivity and disrupting services that depend on the inter-network path.
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reads a peering definition, enumerating cross-VNet connectivity and topology for reconnaissance.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating a peering bridges two virtual networks (with configurable traffic forwarding/gateway transit), enabling lateral network movement to resources in the peered VNet while mutating routing configuration.
