name: Subnet effective security user rules
description: The security user rules effectively taking effect on a specific subnet - the resolved set of Azure Virtual Network Manager user-level network security (allow/deny) rules actually applied to that subnet.
scope: LOW
notes: Shows the actual enforced traffic-control posture on a given subnet, including which rules are and are not in force.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
      - discovery:policy
    notes: Reading the effective rules reveals exactly which network security controls apply to the subnet, exposing permitted/denied traffic paths and defensive gaps for targeting.
