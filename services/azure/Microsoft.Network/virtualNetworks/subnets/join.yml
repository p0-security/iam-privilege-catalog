name: Virtual network subnet
description: A subnet is a segment of a virtual network's address space, used to isolate groups of resources and as the attachment point for NSGs, route tables, service endpoints, and delegated services.
scope: CRITICAL
notes: Subnets are the unit of network segmentation within a VNet; write access lets an attacker alter address ranges, NSG/route-table associations, or delegations that other resources rely on for isolation, which can enable significant privilege escalation via lateral network access (per the CRITICAL definition in services/README.md).
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:network
      - escalation:lateral
    notes: Azure requires this permission on the subnet before a principal may attach a new resource (e.g. a VM NIC) into it, specifically to stop principals with only resource-create rights from freely attaching into subnets they don't otherwise control. Holding join therefore lets an attacker deploy attacker-controlled resources directly into a specific, potentially sensitive subnet, bypassing the intended segmentation boundary and gaining network-level access to everything else on that subnet.
