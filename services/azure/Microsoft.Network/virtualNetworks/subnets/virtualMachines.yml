name: VNet subnet virtual machine references
description: A read-only VNet operation that returns references to all virtual machines attached to a given virtual network subnet.
scope: LOW
notes: Returns resource references (IDs) only; no secrets or VM data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
      - discovery:infra
    notes: Lists references to all VMs in a subnet, enumerating both network topology and the compute infrastructure attached to it for target selection.
