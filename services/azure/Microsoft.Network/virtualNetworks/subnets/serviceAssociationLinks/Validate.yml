name: Service association link
description: An internal control-plane marker recording the delegated service that is associated with (injected into) a subnet.
scope: LOW
notes: System-managed delegation/association metadata; not itself a reachability grant.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: A stateless pre-flight validation that only checks a service association link's validity and returns a verdict, making no change and disclosing no sensitive material; inert in isolation.
