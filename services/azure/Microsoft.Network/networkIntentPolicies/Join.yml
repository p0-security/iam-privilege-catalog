name: Network Intent Policy
description: A Network Intent Policy is an internal Azure network configuration object used in subnet preparation (PrepareNetworkPolicies) flows, defining intended network connectivity/intent settings applied to virtual network subnets for managed services such as Private Link.
scope: LOW
notes: An internal control-plane network configuration construct, not a user-facing security/firewall enforcement policy or an RBAC access-control policy.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: An internal association/linking primitive explicitly marked 'Not alertable'; in isolation it grants no meaningful standalone attacker capability.
