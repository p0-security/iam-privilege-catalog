name: Traffic Manager Realtime User Metrics key
description: A subscription-level key used to authenticate client-side Realtime (Real) User Metrics telemetry submission for Traffic Manager.
scope: MEDIUM
notes: The key is a secret that authorizes RUM telemetry reporting; it does not by itself grant identity or data-plane access, so its blast radius is limited to the metrics/telemetry function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
    notes: Deleting the subscription-level metrics key disables Realtime User Metrics collection across the subscription, disrupting the telemetry feed used for metric-driven routing.
  read:
    risks:
      - exfiltration:crypto
    notes: This get returns the subscription-level RUM collection key (secret material), so it exports cryptographic/credential material rather than merely enumerating it.
  write:
    risks:
      - impact:manipulation
    notes: Creating/regenerating the subscription-level metrics key alters the telemetry-collection configuration and can invalidate the existing key, disrupting legitimate Realtime User Metrics reporting.
