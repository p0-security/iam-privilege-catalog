name: Local network gateways
description: A LocalNetworkGateway represents the on-premises (remote) side of a site-to-site VPN connection, holding the peer gateway public IP, the on-prem address space(s), and optional BGP settings.
scope: HIGH
notes: Defines hybrid-network routing for a single organizational function; altering it can redirect cross-premises traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the local network gateway removes the on-prem peer definition backing the site-to-site VPN, tearing down hybrid connectivity and causing a DoS-like loss of the network link.
  read:
    risks:
      - discovery:network
    notes: Getting the local network gateway exposes the on-premises peer IP and routed address spaces, providing network-topology reconnaissance of the hybrid connection.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating the local network gateway lets an attacker redefine the on-prem peer IP and advertised address prefixes, manipulating VPN routing to redirect/hijack cross-premises traffic toward attacker-controlled endpoints and reach additional networked resources.
