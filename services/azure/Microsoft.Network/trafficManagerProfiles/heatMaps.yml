name: Traffic Manager heat map
description: A Traffic Manager heat map is operational traffic telemetry for a profile, containing query counts and latency data broken down by location and source IP. It is monitoring/analytics data for a public-facing routing service.
scope: MEDIUM
notes: Exposes client source IPs and traffic-distribution patterns useful for targeting.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reads aggregated query counts and latency by location and source IP, exposing traffic-pattern telemetry and client source IPs useful for network reconnaissance.
