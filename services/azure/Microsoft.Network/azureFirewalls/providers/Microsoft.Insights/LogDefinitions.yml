name: Azure Firewall log definitions
description: Azure Firewall log definitions describe the available log/event categories exposed for an Azure Firewall via Azure Monitor.
scope: LOW
notes: Read-only log schema; enumerates log categories rather than returning log contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Enumerates the available log categories/event types for the firewall, a logs-discovery activity that does not expose actual log content.
