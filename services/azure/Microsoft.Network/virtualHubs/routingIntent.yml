name: Virtual Hub routing intent
description: Routing intent is a child resource of a Virtual WAN hub that declares routing policies steering internet and private traffic to a next-hop security solution (Azure Firewall, NVA, or SaaS) deployed in the hub.
scope: HIGH
notes: Controls whether traffic is forced through inspecting security appliances; central to the hub's network security posture and connectivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - destruction:defense
    notes: Deletes the routing intent, removing the policy that forces traffic through security appliances, disrupting hub routing (DoS) and removing the firewall/inspection enforcement.
  write:
    risks:
      - impact:manipulation
      - escalation:network
      - destruction:defense
    notes: Creates/updates routing intent to redirect internet/private traffic through attacker-chosen next hops or bypass the inspecting firewall, manipulating routing, enabling interception/movement across the connected network, and weakening defensive inspection.
