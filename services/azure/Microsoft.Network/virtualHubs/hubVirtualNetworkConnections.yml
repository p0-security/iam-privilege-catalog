name: Hub Virtual Network Connection
description: A HubVirtualNetworkConnection attaches a spoke virtual network to a Virtual WAN hub and defines how that VNet's traffic is routed and propagated through the hub.
scope: HIGH
notes: Governs which VNets are bridged into the WAN and their routing; controls lateral reachability between spokes via the hub.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a connection severs a VNet's attachment to the hub, removing a network component and causing DoS for that network's traffic through the hub.
  read:
    risks:
      - discovery:network
    notes: Reading a connection returns its peering and routing configuration, revealing which VNets are attached to the hub and how they route.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating a connection peers a (possibly attacker-controlled) VNet into the hub and alters route propagation, granting lateral network reach into connected environments and manipulating routing.
