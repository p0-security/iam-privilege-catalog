name: Virtual Hub BGP connection
description: A Virtual Hub BGP connection defines a dynamic-routing (BGP) peering between a Virtual WAN hub's virtual router and a peer, controlling route advertisement/learning across the hubbed network.
scope: HIGH
notes: BGP peerings on the hub govern dynamic routing for an entire regional Virtual WAN; manipulating them affects traffic paths for all attached networks.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a BGP connection tears down a routing peering, breaking dynamic route propagation and disrupting connectivity for dependent network segments.
  read:
    risks:
      - discovery:network
    notes: Reading a BGP connection inventories the hub's routing peer configuration, revealing network topology and peering relationships for reconnaissance.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating or updating a BGP connection lets an attacker manipulate dynamic routing or introduce a malicious peer to redirect/intercept traffic and reach additional networked resources.
