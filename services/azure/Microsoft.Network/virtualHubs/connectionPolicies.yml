name: Virtual WAN hub connection policy
description: A Connection Policy child resource of a Virtual WAN (Virtual Hub), governing how connections are admitted and handled through the production routing hub.
scope: HIGH
notes: Controls connectivity behavior for a single networking function (the hub); a production network component but not tenant-wide.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deletes the hub's connection-policy component, removing connectivity-governing configuration and potentially disrupting connectivity through the production hub.
  read:
    risks:
      - discovery:network
    scope: MEDIUM
    notes: Control-plane read that returns the hub's connection-policy configuration, letting an attacker inventory hub connectivity/admission rules for reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating the hub connection policy alters operational network admission/connectivity configuration of a production WAN hub.
