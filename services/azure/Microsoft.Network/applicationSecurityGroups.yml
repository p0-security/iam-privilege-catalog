name: Application Security Group
description: An Application Security Group (ASG) is a logical grouping construct for network interfaces / IP configurations that Network Security Group (NSG) rules reference by name as source or destination, enabling micro-segmentation without explicit IP ranges.
scope: HIGH
notes: An ASG contains no rules of its own; it groups resources so NSG firewall rules can target them. Its sensitivity derives from the network segmentation it implements for a single workload/function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Network
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting an ASG removes a network component referenced by NSG rules, breaking firewall rule resolution and disrupting connectivity/segmentation for dependent services.
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading an ASG returns only its identifier/configuration, providing read-only reconnaissance of network grouping constructs.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating an ASG alters the grouping construct that NSG rules target, manipulating which resources are subject to firewall policy and the operational network configuration.
