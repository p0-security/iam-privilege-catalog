name: Worker App
description: A Worker App is an App Service compute resource that runs background/worker workloads (a container-based worker application).
scope: HIGH
notes: Supporting compute resource for a single application function; its configuration may reveal but does not directly return secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a Worker App destroys the compute resource and the workload it hosts, causing a denial-of-service-like loss of that function.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Getting a Worker App's properties is read-only reconnaissance of the compute resource's configuration.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
      - impact:spend
      - escalation:lateral
    notes: Creating or updating a Worker App lets an attacker deploy and run arbitrary workload code (compute hijacking), incur infrastructure spend, alter operational configuration, and run code under an attached managed identity for lateral movement.
