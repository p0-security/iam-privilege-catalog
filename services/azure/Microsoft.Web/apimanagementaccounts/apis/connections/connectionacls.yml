name: API connection access-control lists (legacy connector connection ACLs)
description: Connection ACLs are access-control list entries on legacy API Management account / managed-connector API connections, governing which principals and resources may use a connection. The connection itself typically holds backing credentials (tokens/keys) to a connected backend.
scope: MEDIUM
notes: Sensitivity is that of a single integration function's authorization gate; the connection may broker credentialed access to a backend.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deleting the connection ACL removes the access-control policy restricting the connection (enabling unrestricted use) and can strip authorized principals of their legitimate access.
  write:
    risks:
      - escalation:privilege
      - impact:manipulation
    notes: Creating/updating the connection ACL lets an attacker grant a controlled principal use of the credentialed connection (an access-control grant) and tamper with who may invoke it.
