name: API Management account API ACLs
description: Access-control lists (ACLs) governing API access for an (legacy) API Management account, defining authorization configuration for APIs.
scope: LOW
notes: Read exposes authorization policy that an attacker can survey for weak points.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading API ACLs inventories the access-control/authorization configuration, revealing weak points an attacker could exploit.
