name: Logic Apps connection access-control list
description: The connection access-control list governing which principals/resources may use an API Management account's connections.
scope: MEDIUM
notes: Reading exposes authorization policy and its weak points but no data or secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reads the connection ACLs, letting an attacker inventory the authorization rules governing connection use and identify weak points.
