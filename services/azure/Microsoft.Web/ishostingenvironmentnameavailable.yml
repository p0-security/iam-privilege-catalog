name: Hosting environment name availability check
description: A stateless pre-provisioning helper that reports whether a candidate App Service Environment name is available.
scope: LOW
notes: Returns only a yes/no verdict against a namespace; exposes no organizational data and changes no state.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Checks whether a hosting environment name is free; an inert validation utility with no attacker capability in isolation.
