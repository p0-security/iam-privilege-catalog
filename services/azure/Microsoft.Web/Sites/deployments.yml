name: Web App deployments
description: A Web App deployment is a deployment-history record/artifact tracking a code/content release to an Azure App Service (commit id, status, author, timestamp), used for status tracking and rollback.
scope: HIGH
notes: Operational deployment state/history for a single application; not the live app data or compute itself.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a deployment record removes deployment history/artifacts for the web app, destroying recoverable deployment state and impairing rollback continuity.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading deployment records enumerates the app's deployment history and metadata (commit ids, status, authors), providing reconnaissance of how and when code was shipped.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a deployment record alters the app's deployment metadata/state (e.g. which deployment is marked active), manipulating operational configuration of the web app.
