name: Web App Private Endpoint Connection Proxies
description: Internal Private Link connection-proxy objects that broker and orchestrate private endpoint connectivity for an Azure App Service web app. They represent the plumbing state for how a web app is reached over a private network path.
scope: HIGH
notes: Supporting connectivity plumbing for a single web app (a single organizational function), not a primary data store or identity asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:network
    notes: Deleting the proxy tears down a private-link connectivity component, severing the private path and disrupting authorized access to the web app.
  Write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating or updating the proxy alters the private-link connectivity broker for the web app, potentially establishing/approving a private-network path to the otherwise-isolated service and manipulating its connectivity configuration.
