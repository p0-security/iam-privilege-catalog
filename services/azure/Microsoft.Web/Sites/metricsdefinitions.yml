name: Web App metric definitions
description: Metric definitions for a Web App enumerate the catalog of Azure Monitor metrics available for the app (metric names, units, aggregations), i.e. the monitoring schema rather than the metric values.
scope: LOW
notes: Read-only monitoring schema metadata; no telemetry values or sensitive data are returned.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Lists which monitoring metrics exist for the web app, exposing only monitoring metadata schema.
