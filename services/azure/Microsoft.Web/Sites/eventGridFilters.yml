name: Web App Event Grid filter
description: An Event Grid event-subscription filter attached to an App Service web app, defining which lifecycle/event-grid events are routed from the app to downstream subscribers.
scope: MEDIUM
notes: Supporting event-routing/integration configuration for a single app; not a data store or credential.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting the Event Grid filter removes the app's event-routing configuration, disrupting event-driven integrations for that single app.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the filter alters which events are emitted/routed from the app, letting an attacker suppress or redirect operational event delivery.
