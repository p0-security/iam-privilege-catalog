name: Web App publishing credentials policy
description: The policy controlling whether basic-authentication publishing methods (SCM/FTP) are allowed for an Azure Web App.
scope: MEDIUM
notes: This is a security-hardening control; whether basic-auth publishing is enabled affects the credential-based deployment attack surface.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:policy
    notes: Reads which publishing methods (basic-auth SCM/FTP) are allowed, disclosing the security-control posture and whether a credential-based publishing path is open.
  Write:
    risks:
      - destruction:defense
      - impact:manipulation
    scope: HIGH
    notes: Despite the mislabeled 'List' displayName (copied from Read), the /Write verb sets the policy and can re-enable basic-auth publishing, disabling a hardening defense and opening a credential-based deployment path.
