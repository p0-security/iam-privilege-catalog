name: Web app custom hostname analysis
description: A read-only validation check that analyzes a custom hostname's DNS/binding configuration for a web app.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Analyzing a custom hostname returns DNS/domain-binding validation details for reconnaissance without modifying anything.
