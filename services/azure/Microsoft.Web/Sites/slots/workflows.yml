name: Logic App workflows (Web Apps Workflows)
description: Workflow resources hosted within a Logic App (Standard), which runs on an Azure Web App/App Service site. These represent automation/integration logic.
scope: MEDIUM
notes: Control-plane workflow listing/configuration reads are supporting-automation reconnaissance; they expose how integrations are wired but do not return runtime data or secret material in isolation.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists the workflows in a deployment slot of a Logic App; slot-scoped automation inventory reconnaissance with no secret exposure.
