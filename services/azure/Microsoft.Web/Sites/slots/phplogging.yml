name: Web App slot PHP logging configuration
description: The PHP application logging/diagnostic configuration for a web app slot (whether and how PHP logging is enabled).
scope: LOW
notes: Low-sensitivity diagnostic configuration; does not return log contents or secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading the PHP logging configuration inventories the slot's diagnostic logging settings, revealing logging coverage to an attacker.
