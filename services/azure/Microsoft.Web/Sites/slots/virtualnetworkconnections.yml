name: Web App slot virtual network connections
description: Virtual network connections represent the VNet integration that bridges a deployment slot of an Azure App Service web app into a private virtual network to reach backend resources.
scope: HIGH
notes: Network integration providing access to private/internal resources.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting the slot's VNet integration removes the network connection component, cutting the app off from the integrated private network and disrupting dependent traffic.
  read:
    risks:
      - discovery:network
    notes: Reading VNet connections inventories the private network topology the slot is integrated with, revealing reachable subnets/VNets.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating the slot's VNet integration attaches the app to a chosen private network, enabling network movement to reach otherwise private resources and altering network configuration.
