name: Web App slot custom hostname analysis
description: A read-only diagnostic that validates and reports DNS/hostname binding readiness for a custom hostname on a web app deployment slot.
scope: LOW
notes: Returns DNS/binding check results only; grants no domain control or binding capability.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Analyzing a custom hostname returns DNS/binding validation details for a deployment slot, read-only network reconnaissance.
