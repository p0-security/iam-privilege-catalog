name: Web App slot functions
description: Functions deployed to a Web App / Function App deployment slot; this action lists the function access keys that authorize invoking those functions.
scope: CRITICAL
notes: Function keys are invocation credentials enabling code execution as the function app.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns function access keys (invocation credentials), enabling an attacker to call protected functions and run code as the app.
