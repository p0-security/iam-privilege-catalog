name: Web App slot operation results
description: The status/result endpoint for asynchronous management operations issued against a web app slot.
scope: LOW
notes: Returns only the completion state of a previously issued request.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling async operation results is an inert status check that grants no meaningful attacker capability in isolation.
