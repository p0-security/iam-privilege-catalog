name: Web App slot hybrid connection relays
description: A hybrid connection relay on a Web App deployment slot is an Azure Relay-backed network bridge that lets the slot reach a specific backend TCP endpoint (often on-premises or in a private network) by host and port.
scope: MEDIUM
notes: Configuration discloses the relay namespace and target host/port (network topology); relay keys are credential material retrieved via separate key actions.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Control-plane read returns the deployment slot's relay configuration (namespace, target host/port), enabling reconnaissance of the slot's hybrid/private backend connectivity; no keys are returned.
