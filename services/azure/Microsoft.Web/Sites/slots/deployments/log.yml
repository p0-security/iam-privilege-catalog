name: Web Apps Slots Deployments Log
description: Deployment logs are the build/deploy log output recorded for an App Service slot deployment.
scope: MEDIUM
notes: Logs can disclose build paths, environment details, and occasionally sensitive values surfaced during deployment.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Reading deployment logs both enumerates and exports build/deploy log content for the slot, which may contain sensitive operational or build details.
