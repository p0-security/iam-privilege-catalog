name: Web App deployment slot backups
description: Backup objects and backup configuration for an App Service web app deployment slot, capturing the slot's content, configuration, and connected databases to a storage destination for recovery.
scope: MEDIUM
notes: Backups are a recovery mechanism; restoring overwrites live state and deleting them defeats recovery. Read/list operations expose only backup metadata (status, destination, schedule), not backup contents or credentials.
privileges:
  Read:
    risks:
      - discovery:infra
    notes: Reading a slot backup's properties returns backup configuration/status metadata, inventorying the slot's recovery points without exposing backup contents.
    links:
      - https://azure.permissions.cloud/iam/Microsoft.Web
      - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
  action:
    risks:
      - discovery:infra
    notes: Discovering slot backups enumerates available backup sets and their metadata/locations, a read-only reconnaissance of recovery resources without returning backup contents.
    name: Web App deployment slot
    parent:
      description: An Azure App Service deployment slot is a live, addressable instance of a web/function/Logic App hosting application code, configuration (app settings, connection strings), and an assigned managed identity. Slots can be swapped into the production endpoint.
      notes: Slots host a single organizational function's production or staging workload; their configuration and managed identity make them a pivot point for code execution and lateral movement.
    links:
      - https://azure.permissions.cloud/iam/microsoft.web
      - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
  delete:
    risks:
      - destruction:data
    scope: HIGH
    notes: Deleting a slot backup permanently destroys a recovery point for the deployment slot, undermining recovery from data loss or ransomware.
    links:
      - https://azure.permissions.cloud/iam/microsoft.web
      - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
