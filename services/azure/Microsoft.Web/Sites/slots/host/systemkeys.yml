name: Web Apps Functions Host system keys
description: Functions host system keys are credential material that authenticate calls to the Azure Functions host's admin and extension endpoints (including the master-level admin key) for a function app deployment slot.
scope: HIGH
notes: These keys are high-privilege authentication credentials scoped to a single function app/slot; possessing them grants invocation and admin access to that function host.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:access
    notes: Deleting host system keys destroys secret credential/key material (destruction:crypto) and revokes the keys that legitimate callers, integrations, and webhooks depend on, denying authorized operational access to the function host (impact:access).
  write:
    risks:
      - persistence:account
      - escalation:lateral
      - impact:manipulation
    notes: Setting/overwriting host system keys lets an attacker plant a known credential value for durable backdoor access (persistence:account) and use it to invoke functions and privileged admin/extension endpoints as the function app identity (escalation:lateral), while altering the security-sensitive auth-key configuration (impact:manipulation).
