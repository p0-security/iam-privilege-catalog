name: App Service slot network configuration
description: The network configuration of an App Service deployment slot, including VNet integration, subnet bindings, outbound connectivity, and IP access restrictions.
scope: HIGH
notes: Governs both network connectivity (VNet integration) and IP-based access restrictions that act as a network defense.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the slot network configuration removes VNet integration/network components, tearing down the network path and disrupting connectivity for the hosted service.
  read:
    risks:
      - discovery:network
    scope: MEDIUM
    notes: Reading the slot's network configuration inventories VNet integration, subnets, and access-restriction settings, providing network-posture reconnaissance.
  write:
    risks:
      - escalation:network
      - impact:manipulation
      - destruction:defense
    notes: Updating the slot network configuration can attach/rewire the app onto a VNet to reach otherwise private resources (network movement), alter operational network config, and remove IP access restrictions that act as a network defense.
