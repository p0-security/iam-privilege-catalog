name: Web App slot metrics
description: The Azure Monitor metric values (operational telemetry such as CPU, memory, request counts, throughput) for a web app slot.
scope: MEDIUM
notes: Aggregate operational telemetry useful for reconnaissance of app activity and capacity; not stored business data.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading slot metrics returns operational telemetry values, providing reconnaissance of the app's activity, traffic, and capacity.
