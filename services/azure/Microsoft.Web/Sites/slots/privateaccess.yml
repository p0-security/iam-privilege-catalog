name: Web Apps Private Access
description: Private site access settings for a web app deployment slot, including whether private access is enabled and which Virtual Networks are authorized to reach the slot.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reveals private access enablement state and the authorized VNet list for a slot; reconnaissance of network access-control topology useful for planning access.
