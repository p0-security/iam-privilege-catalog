name: Web App slot snapshots
description: Slot snapshots are point-in-time restore points of an App Service deployment slot's file content and configuration; this operation lists/gets the available snapshots.
scope: HIGH
notes: The snapshot contents (files, config, embedded secrets) are sensitive, but this list/get operation returns snapshot metadata/restore-point inventory rather than the captured content itself.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns the inventory/metadata of available content-and-config restore points for the slot; retrieving or restoring the snapshot content is a separate operation, so this is infrastructure reconnaissance.
