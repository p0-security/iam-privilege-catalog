name: Web App slot network trace results
description: Async operation results of an App Service network trace (packet capture) request for a deployment slot, returning the trace outcome and captured network connection information.
scope: MEDIUM
notes: Network traces surface the slot's traffic and connection details; the results endpoint exposes network topology/connection metadata about the slotted app.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading the slot network-trace operation results returns captured network/connection information about the slot, network reconnaissance.
