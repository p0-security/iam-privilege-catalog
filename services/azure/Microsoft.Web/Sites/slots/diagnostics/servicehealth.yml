name: Web App slot service-health diagnostics
description: Service-health diagnostics for an Azure App Service (Web App) deployment slot, a read-only troubleshooting facility that reports the operational/platform health status of the slot.
scope: LOW
notes: Surfaces operational/infrastructure health metadata for reconnaissance; exposes no data-plane contents or secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading slot service-health diagnostics only inventories the slot's operational/platform health state, low-value infrastructure reconnaissance.
