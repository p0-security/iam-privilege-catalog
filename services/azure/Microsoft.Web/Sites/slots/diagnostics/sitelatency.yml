name: Web App slot diagnostics detectors
description: App Service slot diagnostic detectors return read-only analysis/telemetry about a deployment slot's deployment, performance, and health.
scope: MEDIUM
notes: Monitoring/diagnostic data is non-sensitive operational telemetry useful mainly for reconnaissance.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the slot latency detector returns read-only request-latency/performance telemetry about the slot, useful only for operational reconnaissance.
