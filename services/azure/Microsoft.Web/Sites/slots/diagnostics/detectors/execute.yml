name: Web App slot diagnostics detectors
description: App Service diagnostic detectors scoped to a deployment slot of a web app (e.g. CPU, failed requests, configuration issues), returning health/troubleshooting signals.
scope: MEDIUM
notes: Diagnostics/monitoring supporting data for a single app's slot; surfaces configuration/health detail but no stored application data or secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Action:
    risks:
      - discovery:infra
    notes: Running a slot diagnostic detector collects and returns configuration/health diagnostics without modifying state, providing infrastructure reconnaissance.
