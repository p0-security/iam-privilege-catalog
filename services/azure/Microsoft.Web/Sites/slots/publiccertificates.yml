name: App Service slot public certificates
description: Public certificates attached to an App Service (Web App) deployment slot. These hold only the public (.cer) portion of a certificate (e.g. trusted CA/intermediate certs) with no private key material.
scope: MEDIUM
notes: Because public certificates contain no secret/private-key material, this resource type is low sensitivity; it governs the app's TLS trust configuration rather than any exfiltratable credential.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deletes a slot's public/trust certificate, removing a configuration object the app may depend on and potentially breaking its TLS trust validation for a single function.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reads the public certificate objects configured on a slot, enabling inventory of the slot's certificate/trust configuration but not disclosure of any private key.
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates the slot's public/trust certificate configuration, letting an attacker inject an attacker-controlled CA cert or otherwise alter the certificates the app trusts.
