name: Web App Slot configuration
description: The configuration sub-resource of an App Service deployment slot, holding the slot's runtime/site settings, app settings, and connection strings. Slots are staging/production variants of a Web App.
scope: HIGH
notes: The control-plane Read masks secret values; the security-sensitive settings (publishing credentials, connection strings) are returned only by the separate list/Action.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Updating slot configuration lets an attacker alter app settings, connection strings, and startup/runtime config, manipulating operational config and injecting behavior that runs under the app's managed identity or redirects it to attacker-controlled backends.
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the slot's configuration removes operational settings the application depends on, destroying the config resource and disrupting the slot's service.
