name: Web App slot WebJobs
description: WebJobs are continuous/background executables or scripts deployed to a deployment slot of an Azure App Service web app.
scope: HIGH
notes: Application code/logic running for a single web app function.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading WebJobs enumerates the continuous/background jobs deployed on the slot; the management-plane read returns job metadata/configuration rather than source code.
