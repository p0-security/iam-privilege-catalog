name: Web App slot MySQL migration
description: The in-app MySQL migration resource for an Azure App Service (Web App) deployment slot, reporting the status/configuration of an in-app MySQL-to-Azure-MySQL migration operation.
scope: LOW
notes: Reading it exposes migration infrastructure state metadata only, not database contents or credentials.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the slot's MySQL migration status only returns migration operation state/configuration, infrastructure reconnaissance with no data or secret exposure.
