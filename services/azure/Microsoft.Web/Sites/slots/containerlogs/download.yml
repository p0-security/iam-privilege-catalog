name: Web App slot container logs
description: Container/runtime logs for an Azure App Service deployment slot, capturing stdout/stderr and diagnostic output from the slotted web app.
scope: MEDIUM
notes: App logs frequently contain stack traces, request data, environment details, and inadvertently logged secrets or connection strings.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:logs
    notes: Downloads the slot's container logs, exporting log content that can include sensitive runtime data and leaked credentials.
