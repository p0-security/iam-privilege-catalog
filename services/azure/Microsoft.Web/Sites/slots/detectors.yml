name: Web App slot diagnostic detectors
description: App Service diagnostic detector output for a deployment slot, surfacing health and configuration diagnostics for the app.
scope: LOW
notes: Operational/health diagnostics only; no sensitive data or credentials.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads diagnostic detector results for a slot, exposing only non-sensitive health/configuration state for reconnaissance.
