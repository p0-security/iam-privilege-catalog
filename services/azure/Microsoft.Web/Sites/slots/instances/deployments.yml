name: Web App slot instance deployments
description: Deployment records/history for a web app slot's worker instances, capturing release metadata (author, message, commit, status, timestamps).
scope: MEDIUM
notes: Read-only release configuration metadata for a single app; does not expose source code or secrets directly.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading deployment records inventories the slot's deployment history and configuration metadata, providing reconnaissance of the app's release state.
