name: Web App slot app setting
description: App settings of an Azure App Service deployment slot, injected into the running app as environment variables.
scope: CRITICAL
notes: App settings routinely hold API keys, passwords, and connection secrets returned in cleartext; treated as credential material.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Deleting a slot's app setting removes a required environment value, altering operational config and potentially disrupting the slot's app.
