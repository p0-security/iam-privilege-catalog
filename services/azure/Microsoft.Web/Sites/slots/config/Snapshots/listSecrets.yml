name: Web App slot config snapshots
description: Point-in-time configuration snapshots of an App Service deployment slot, capturing the slot's saved application settings and connection-string configuration history.
scope: CRITICAL
notes: The snapshot metadata/list does not return secret values; secret material is exposed only via the dedicated listsecrets action.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: This listsecrets action returns the secret app settings and connection strings captured in a slot config snapshot, exporting reusable credential/connection-string material that authenticates to backing data stores and enables pivoting to other identities.
