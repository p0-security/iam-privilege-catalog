name: Web App slot config snapshots
description: Point-in-time configuration snapshots of an App Service deployment slot, capturing the slot's saved application settings and connection-string configuration history.
scope: MEDIUM
notes: The snapshot metadata/list does not return secret values; secret material is exposed only via the dedicated listsecrets action.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading/listing the slot's config snapshots inventories the app's configuration history (which snapshots exist and their structure) without returning the captured secret values, i.e. configuration reconnaissance.
