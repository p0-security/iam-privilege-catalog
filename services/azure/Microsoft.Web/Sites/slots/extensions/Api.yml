name: Web Apps slot site extensions
description: Site (Kudu/SCM) extensions installed on an App Service deployment slot are code modules/tooling that run inside the app's sandbox.
scope: HIGH
notes: Control-plane configuration of the app's runtime components; reads return no secret material.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - impact:manipulation
      - impact:hijack
      - exfiltration:data
    notes: Invoking the slot extension (Kudu/SCM) APIs allows command execution, file/content read-write, and deployment in the app's context, running code as the app's managed identity, reading app files/code, and modifying the deployment.
