name: Web App
description: An Azure App Service site (Web App, Function App, or Logic App Standard) is a managed hosting resource that runs an organization's application code, often with an attached managed identity, app settings/connection strings, and a public-facing endpoint.
scope: HIGH
notes: Production application hosting for a single organizational function; can hold secrets in app settings, run code under a managed identity, and serve public traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Reconciling the NSP configuration re-applies/alters the app's perimeter association, changing its enforced network boundary state.
  read:
    risks:
      - discovery:network
    notes: Reading the stored NSP configuration inventories the web app's network-perimeter rules and membership, useful reconnaissance for finding gaps in the network defense around the production app.
    name: Web App Network Security Perimeter configuration
    parent:
      description: The Network Security Perimeter configuration stored on an App Service Web App, describing the NSP membership and network access rules enforced around the web application.
      notes: Describes the network-defense boundary for a single production web service; reading it reveals the isolation posture.
