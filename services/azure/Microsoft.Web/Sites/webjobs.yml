name: App Service continuous WebJobs
description: "Continuous WebJobs hosted by an App Service web app: deployed scripts/executables that run continuously as background tasks in the app's runtime."
scope: MEDIUM
notes: WebJobs run in the web app's process and inherit the site's managed identity.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists/gets the configured continuous WebJobs and their settings, inventorying the app's background workloads without returning the job scripts or secrets.
