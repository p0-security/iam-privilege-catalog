name: Web App source control configuration
description: The source-control deployment configuration of an App Service Web App, linking it to a Git/GitHub/other repository (URL, branch) for continuous deployment.
scope: HIGH
notes: Reveals where the application's source code lives and how it is deployed, but does not return the source code or repository credentials itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the source-control configuration disconnects the app's continuous-deployment integration, destroying the deployment-pipeline config and disrupting the ability to deploy or update the service.
  Read:
    risks:
      - discovery:infra
      - discovery:code
    scope: MEDIUM
    notes: Reading the source-control configuration reveals the linked repository URL, branch, and deployment settings, inventorying both the deployment pipeline and the location of the application's source code.
  Write:
    risks:
      - impact:manipulation
      - escalation:lateral
      - impact:defacement
    notes: Repointing source control to an attacker-controlled repository triggers deployment of arbitrary code that executes as the app's managed identity (lateral movement), alters the running application (manipulation), and can deface the public-facing site.
