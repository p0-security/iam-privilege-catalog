name: Web Apps Functions host system keys
description: Azure Functions host system keys are app-level bearer credentials that authorize the Functions runtime admin API and privileged extension webhook endpoints (e.g. Durable Functions, Event Grid extension) of a function app.
scope: HIGH
notes: These keys are credential material gating privileged/admin invocation of the function app; functions invoked with them run under the app's assigned managed identity.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:access
      - impact:dos
    notes: Deleting host system keys destroys the credential material and revokes the access that extensions/integrations (Event Grid, Durable Functions) and operators depend on, denying authorized access and breaking those privileged endpoints.
  write:
    risks:
      - persistence:account
      - escalation:lateral
      - exfiltration:crypto
      - impact:manipulation
    notes: PUT creates/overwrites a host system key with an attacker-chosen value and returns the resolved key in the response, planting a persistent credential that authorizes privileged admin/extension invocation running as the app identity.
