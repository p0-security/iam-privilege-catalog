name: Web App network trace results
description: Async operation results of an App Service network trace (packet capture) request for a web app, returning the trace outcome and captured network connection information.
scope: MEDIUM
notes: Network traces surface the app's traffic and connection details; the results endpoint exposes network topology/connection metadata about the site.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading the network-trace operation results returns captured network/connection information about the site, network reconnaissance.
