name: Web App backups
description: Backup objects and backup configuration for an App Service web app, capturing the app's content, configuration, and connected databases to a storage destination for recovery.
scope: MEDIUM
notes: Backups are a recovery mechanism; restoring overwrites live state and deleting them defeats recovery. Read/list operations expose only backup metadata (status, destination, schedule), not backup contents or credentials.
privileges:
  Read:
    risks:
      - discovery:infra
    notes: Reading a backup's properties returns backup configuration/status metadata (existence, schedule, destination), inventorying the recovery posture without exposing the backup contents.
    links:
      - https://azure.permissions.cloud/iam/Microsoft.Web
      - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
  action:
    risks:
      - discovery:data
    notes: Discovering an existing app backup in blob storage enumerates a restorable backup data object for reconnaissance toward restore/exfiltration.
    name: Web App
    parent:
      description: An Azure App Service site (Web App, Function App, or Logic App Standard) is a managed hosting resource that runs an organization's application code, often with an attached managed identity, app settings/connection strings, and a public-facing endpoint.
      notes: Production application hosting for a single organizational function; can hold secrets in app settings, run code under a managed identity, and serve public traffic.
    links:
      - https://azure.permissions.cloud/iam/microsoft.web
      - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
  delete:
    risks:
      - destruction:data
    scope: HIGH
    notes: Deleting a web app backup permanently destroys a recovery point (app content, configuration, and connected database snapshot), undermining recovery from data loss or ransomware.
    links:
      - https://azure.permissions.cloud/iam/microsoft.web
      - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
  write:
    risks:
      - impact:manipulation
    scope: HIGH
    notes: Updating the backup configuration alters the schedule, retention, and destination storage settings, letting an attacker silently disable or redirect backups and undermine recoverability.
    links:
      - https://azure.permissions.cloud/iam/microsoft.web
      - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
