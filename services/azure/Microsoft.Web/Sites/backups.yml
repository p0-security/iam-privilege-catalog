name: Web App backups
description: Backup objects and backup configuration for an App Service web app, capturing the app's content, configuration, and connected databases to a storage destination for recovery.
scope: HIGH
notes: Backups are a recovery mechanism; restoring overwrites live state and deleting them defeats recovery. Read/list operations expose only backup metadata (status, destination, schedule), not backup contents or credentials.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting a web app backup permanently destroys a recovery point (app content, configuration, and connected database snapshot), undermining recovery from data loss or ransomware.
  write:
    risks:
      - impact:manipulation
    notes: Updating the backup configuration alters the schedule, retention, and destination storage settings, letting an attacker silently disable or redirect backups and undermine recoverability.
