name: Web App Network Security Perimeter association proxy
description: The association proxy that binds an App Service Web App into a Network Security Perimeter (NSP), enforcing a network-isolation boundary (access mode and rules) around the production web application.
scope: HIGH
notes: The NSP association is a network-layer defense control around a single production web service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - escalation:network
    notes: Deleting the NSP association proxy detaches the web app from its Network Security Perimeter, removing the network-isolation defense and re-exposing the production service to broader network access.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Writing the NSP association proxy can change or weaken the perimeter binding/access mode (e.g. switching to a lenient/learning enforcement mode), degrading the network-isolation defense and altering the app's network security configuration.
