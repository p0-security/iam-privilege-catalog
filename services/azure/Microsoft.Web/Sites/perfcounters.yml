name: Web App performance counters
description: Runtime performance counter telemetry (CPU, memory, I/O) for an Azure App Service web app.
scope: MEDIUM
notes: Monitoring/diagnostic telemetry; exposes runtime utilization but not stored data or secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only access to performance counters enables reconnaissance of the app's runtime resource profile.
