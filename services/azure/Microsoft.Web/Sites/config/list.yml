name: Web App configuration
description: The configuration sub-resource of an App Service Web App, holding the app's runtime/site settings, app settings, and connection strings.
scope: CRITICAL
notes: The control-plane Read masks secret values; the security-sensitive settings (publishing credentials, connection strings) are returned only by the separate list/Action.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
      - takeover:account
    notes: Explicitly returns the Web App's security-sensitive settings including publishing credentials, app settings, and connection strings; publishing credentials are a reusable deployment credential and connection strings grant access to backing data stores.
