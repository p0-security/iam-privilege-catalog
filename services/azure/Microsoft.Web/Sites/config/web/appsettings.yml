name: Web App app setting
description: App settings of an Azure App Service web app, injected into the running app as environment variables.
scope: CRITICAL
notes: App settings routinely hold API keys, passwords, and connection secrets returned in cleartext; treated as credential material.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Deleting an app setting removes an environment value the app depends on, altering operational config and potentially breaking the running app.
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Reading a single app setting returns its cleartext value, which commonly contains secrets/credentials exportable for lateral movement to dependent systems.
  write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Creating/updating an app setting changes a runtime environment variable the app consumes, enabling injection of attacker-controlled config/credentials executed in the app's context.
