name: Web App settings (application settings)
description: "A Web App's application settings: the environment-variable configuration injected into the app, which routinely holds connection strings, storage account keys, API keys, and other credentials."
scope: CRITICAL
notes: The ARM management API returns these values in cleartext; they commonly contain credentials enabling access to backing data stores and services.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Reading app settings returns the cleartext environment variables, exporting secret material (connection strings, account keys, API keys) usable for lateral movement into backing services.
