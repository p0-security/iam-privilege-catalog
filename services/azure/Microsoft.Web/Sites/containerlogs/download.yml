name: Web App container logs
description: Container/runtime logs produced by a Web App, downloadable as log files.
scope: MEDIUM
notes: Logs may contain sensitive runtime data, request contents, stack traces, or inadvertently logged secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:logs
    notes: Downloads container logs, exporting log content that frequently includes sensitive runtime data and may leak secrets.
