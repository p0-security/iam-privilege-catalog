name: Azure Functions master key
description: The Azure Functions master key, an administrative credential that grants full control to invoke and manage all functions and the function-app admin/key-management APIs.
scope: CRITICAL
notes: This is a root-level runtime credential equivalent to code execution as the function app and its managed identity.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the master key, reusable credential material enabling arbitrary code execution as the app and lateral movement to its identity.
