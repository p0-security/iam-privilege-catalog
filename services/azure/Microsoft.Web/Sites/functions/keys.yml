name: Web Apps Functions keys
description: Access keys for an individual Azure Functions function, used as bearer credentials to authorize HTTP invocation of that function.
scope: HIGH
notes: Function invocation keys are credentials; invoking a function runs code under the function app's (possibly managed) identity. Asset is a single function app -> HIGH.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:access
      - impact:dos
    notes: Deleting a function key revokes the credential legitimate callers use to invoke the function, denying authorized access and disrupting that function's HTTP endpoint.
  write:
    risks:
      - persistence:account
      - escalation:lateral
      - impact:manipulation
    notes: Sending a PUT request to set a function key lets an attacker set a known invocation credential (durable backdoor / persistence) enabling repeated invocation that runs code as the app's identity (lateral), and overwriting an existing key alters/revokes the legitimate credential (manipulation).
