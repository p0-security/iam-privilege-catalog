name: Web App functions
description: A function within an App Service Function App, comprising the deployed executable code/logic, its bindings/trigger configuration, and invocation keys.
scope: CRITICAL
notes: Runs application logic under the function app's compute and (any attached) managed identity; supports a single organizational function.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the function's secret material (function/host/system keys), bearer credentials usable to invoke and access the function endpoint.
