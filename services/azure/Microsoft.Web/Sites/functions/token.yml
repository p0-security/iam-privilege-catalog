name: Function App authentication token
description: The Functions runtime/admin authentication token for a Function App, a bearer credential used to authenticate to and invoke the function host and key-management endpoints.
scope: CRITICAL
notes: Returns usable credential material that grants control of the function runtime and can pivot to the app's identity.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the Functions bearer token an attacker can replay to authenticate to and act as the function app, exfiltrating credential material and enabling lateral movement into the function identity/key store.
