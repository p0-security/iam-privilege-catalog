name: Web App
description: An Azure App Service site (Web App, Function App, or Logic App Standard) is a managed hosting resource that runs an organization's application code, often with an attached managed identity, app settings/connection strings, and a public-facing endpoint.
scope: HIGH
notes: Production application hosting for a single organizational function; can hold secrets in app settings, run code under a managed identity, and serve public traffic.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Migrating the app's MySQL database moves/transforms backing data and provisions new database resources, manipulating production data and incurring cost.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reads the status/configuration of the web app's MySQL migration, yielding operational infrastructure reconnaissance with no data or credential exposure.
    name: Web App MySQL migration
    parent:
      description: The migrateMySql resource exposes the status and configuration of an in-app MySQL migration operation for a Web App (moving a local MySQL database to Azure Database for MySQL).
      notes: Read-only operation status/configuration; returns migration progress and settings, not database data or credentials.
