name: Web App hybrid connection relays
description: Hybrid connection relays expose the Azure Relay namespace/endpoint configuration backing the web app's hybrid connections.
scope: LOW
notes: Read-only network topology information for the app's relay-based connectivity.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading hybrid connection relays enumerates the Azure Relay namespaces/endpoints associated with the app, providing network reconnaissance of reachable internal paths.
