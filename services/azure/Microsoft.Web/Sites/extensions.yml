name: Web App site extensions
description: "Site (Kudu/SCM) extensions installed on an Azure App Service web app: add-on tooling and code components that run inside the app's environment."
scope: HIGH
notes: Site extensions execute code within the App Service worker under the app's identity; they are a code-deployment and runtime-tooling surface for a production web app.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deletes an installed site extension, removing deployed components from the app and degrading or disrupting its function.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Lists the installed site extensions, inventorying the app's add-on components for reconnaissance with no data or secret return.
  write:
    risks:
      - escalation:lateral
      - impact:hijack
      - impact:manipulation
    notes: Installing or updating a site extension deploys code that executes inside the app process under its managed identity, enabling lateral movement via that identity, running attacker workloads, and altering app behavior.
