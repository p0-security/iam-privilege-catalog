name: Web App recommendation history
description: Historical Azure Advisor recommendation records for an Azure App Service web app (configuration, performance, and posture advisories).
scope: LOW
notes: Read-only advisory metadata; reveals configuration/posture insight but no stored data or secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading recommendation history surfaces past advisory findings about the app's configuration and health for reconnaissance.
