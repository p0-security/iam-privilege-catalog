name: Web App worker processes
description: The Kudu/SCM process-explorer listing of worker processes running inside a web app's runtime.
scope: MEDIUM
notes: Enumerates the app's runtime execution state (PIDs, process names, command lines) for a single app.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists the web app's running worker processes, granting runtime reconnaissance of the executing workload without directly returning stored data.
