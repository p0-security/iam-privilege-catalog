name: Web App diagnostic settings
description: The Microsoft.Insights diagnostic setting for an Azure App Service (Web App), defining which logs/metrics are collected and where they are routed (Log Analytics, Storage, Event Hub).
scope: LOW
notes: Monitoring/diagnostics configuration is a detective control; reading it only reveals coverage, while modifying it can blind detection.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading the setting reveals which logs/metrics are collected and their destinations, letting an attacker inventory monitoring coverage to find blind spots before evasion.
  write:
    risks:
      - destruction:logs
      - destruction:defense
    scope: MEDIUM
    notes: Creating/updating the diagnostic setting lets an attacker disable or redirect log/metric collection for the web app, blinding incident response and removing a detective control.
