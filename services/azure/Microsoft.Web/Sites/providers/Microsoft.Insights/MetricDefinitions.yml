name: Web App metric definitions
description: The metric definitions (available metric schema) for an App Service Web App, exposing which monitoring metrics exist via Azure Monitor, not actual metric values.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:metadata
    notes: Lists the available metric definitions for a Web App, enabling enumeration of monitoring metadata schema only.
