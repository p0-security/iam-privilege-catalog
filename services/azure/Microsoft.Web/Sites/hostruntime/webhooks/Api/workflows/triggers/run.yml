name: Web Apps Hostruntime Workflow Triggers
description: The trigger definitions of Logic Apps Standard / Functions-style workflows hosted in an App Service site host runtime. Triggers define how and when a workflow's automation fires (HTTP webhook, schedule, connector event).
scope: HIGH
notes: Workflows often run with a managed identity and connections to other services; their triggers and run history can expose how business automation is wired and the data it processes.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:hijack
      - impact:manipulation
    notes: Manually firing the trigger forces the workflow to execute on demand, running its workload (metered, attacker-driven) and driving its downstream write/integration actions to alter operational data.
