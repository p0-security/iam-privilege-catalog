name: Web Apps Hostruntime Workflow Runs
description: The execution run history of Logic Apps Standard / Functions-style workflows hosted in an App Service site host runtime. A run represents one invocation of a workflow.
scope: MEDIUM
notes: Run records reference the data a workflow processed; the list endpoint exposes run inventory and status metadata, while reading individual run action inputs/outputs requires deeper operations.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists workflow run instances and their status metadata, enumerating automation activity; the list level returns run inventory rather than the input/output payload contents.
