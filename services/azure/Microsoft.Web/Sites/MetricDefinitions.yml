name: Web App metric definitions
description: Metric definitions list the available monitoring metric names, units, and schema exposed for an App Service web app.
scope: LOW
notes: Monitoring catalog metadata only; returns no actual metric values or logs.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Reading metric definitions returns only the schema/list of available metric types for the app, which is non-sensitive monitoring-metadata reconnaissance.
