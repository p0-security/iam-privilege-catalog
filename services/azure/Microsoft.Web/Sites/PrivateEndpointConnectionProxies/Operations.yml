name: Web App Private Endpoint Connection Proxy Operations
description: Asynchronous operation-status resources tracking the progress and result of long-running private endpoint connection proxy operations on an App Service web app.
scope: LOW
notes: Transient operation-status metadata; carries no organizational data or credentials.
links:
