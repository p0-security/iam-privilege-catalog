name: App Service web app virtual network connections
description: Virtual network integration configuration of an App Service web app, binding the app to a VNet/subnet so it can reach private backend resources.
scope: HIGH
notes: VNet integration governs the app's reachability into private networks.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deletes the app's VNet integration, removing a network connectivity component and severing the app's access to private backend services, implying denial of service.
  read:
    risks:
      - discovery:network
    scope: MEDIUM
    notes: Reads the app's VNet connection configuration, inventorying the private network topology (VNet/subnet) the app is integrated into.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creates/updates the VNet integration, attaching the app to an attacker-chosen virtual network to reach additional private resources and altering the app's network connectivity configuration.
