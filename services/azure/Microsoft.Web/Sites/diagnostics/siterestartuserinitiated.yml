name: Web App diagnostics detector
description: App Service Diagnostics detectors that return health/troubleshooting analysis derived from operational telemetry for a web app or one of its deployment slots.
scope: MEDIUM
notes: Read-only diagnostic detectors expose operational/configuration insight about a single app but no stored data, secrets, or control-plane mutation.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads the user-initiated-restart detector (a GET of restart history, not a restart action), giving read-only operational reconnaissance only.
