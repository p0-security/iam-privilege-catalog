name: Web App diagnostics detectors
description: App Service diagnostic detectors return read-only analysis/telemetry about a web app's deployment, performance, and health.
scope: MEDIUM
notes: Monitoring/diagnostic data is non-sensitive operational telemetry useful mainly for reconnaissance.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the latency detector returns read-only request-latency/performance telemetry about the app, useful only for operational reconnaissance.
