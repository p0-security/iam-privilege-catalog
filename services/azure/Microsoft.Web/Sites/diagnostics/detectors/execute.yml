name: Web App diagnostics detectors
description: App Service (Web App) diagnostics detectors, a self-service troubleshooting subsystem whose detector definitions and cached results report the app's configuration/health findings.
scope: LOW
notes: Surfaces infrastructure configuration/health metadata for reconnaissance; does not expose data-plane contents or secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Action:
    risks:
      - discovery:infra
    notes: Running a diagnostics detector executes a read-only health analysis returning operational/configuration findings about the web app, enabling infrastructure reconnaissance without data access or state change.
