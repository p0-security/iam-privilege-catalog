name: Web App failed-requests-per-URI diagnostics
description: App Service (Web App) diagnostics reporting aggregated failed-request counts per request URI, a read-only troubleshooting facility surfacing operational error telemetry.
scope: LOW
notes: Exposes endpoint URIs and aggregated error/operational telemetry for reconnaissance, not the application's stored data-plane contents.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading per-URI failed-request diagnostics enumerates the app's request URIs and error patterns, letting an attacker inventory endpoints and operational state without accessing data.
