name: Web App deployment diagnostics detector
description: App Service diagnostic detectors that return analyzed deployment troubleshooting output (deployment history/configuration) for a web app.
scope: LOW
notes: Read-only diagnostic reconnaissance of a single app's deployment state.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads deployment diagnostic output, inventorying the app's deployment history/configuration for infrastructure reconnaissance.
