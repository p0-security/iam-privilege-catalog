name: Web App log-analyzer diagnostics detector
description: App Service log-analyzer diagnostic detector that returns analyzed application/platform log content for a web app.
scope: MEDIUM
notes: Returns log content that may include request data, error details, and identifiers.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Returns analyzed log content for the app, allowing both enumeration and export of log data that may contain sensitive runtime/request information.
