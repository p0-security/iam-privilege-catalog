name: Web App diagnostics
description: Web Apps diagnostic detectors expose operational/runtime health and configuration telemetry for an App Service web app or deployment slot.
scope: MEDIUM
notes: Read-only diagnostic surface for a single web app; reveals operational detail useful for reconnaissance but no data-plane content or secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads ASP.NET Core diagnostic detector output, surfacing app runtime/configuration detail for reconnaissance.
