name: Web App FREB diagnostic analysis
description: FREB (Failed Request Event Buffering) analysis is an App Service diagnostic detector that returns failed-request tracing data, including request URLs, headers, status codes, and timing.
scope: MEDIUM
notes: Request-level diagnostic traces can expose URLs, headers, and request parameters that contain sensitive identifiers.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading FREB analysis returns request-trace diagnostic data for the app, enabling reconnaissance of request-level behavior and configuration.
