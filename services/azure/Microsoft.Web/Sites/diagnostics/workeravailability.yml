name: Web App worker availability diagnostics
description: Worker availability diagnostics return worker/instance availability and health telemetry for an Azure App Service.
scope: MEDIUM
notes: Operational compute-worker health telemetry; supporting diagnostic data, not primary organizational data.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading worker availability diagnostics returns the app's worker/instance health telemetry, providing read-only infrastructure reconnaissance.
