name: Web App deployment slot
description: An Azure App Service deployment slot is a live, addressable instance of a web/function/Logic App hosting application code, configuration (app settings, connection strings), and an assigned managed identity. Slots can be swapped into the production endpoint.
scope: HIGH
notes: Slots host a single organizational function's production or staging workload; their configuration and managed identity make them a pivot point for code execution and lateral movement.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a slot tears down a deployed application instance and its configuration, destroying that infrastructure and denying service for the function it hosts.
  Read:
    risks:
      - discovery:infra
    notes: Reading slot properties enumerates the app's configuration and hosting metadata for reconnaissance; control-plane read does not return secret app-setting values.
  Write:
    risks:
      - impact:manipulation
      - escalation:lateral
      - impact:defacement
    notes: Creating/updating a slot lets an attacker rewrite app code, app settings, connection strings, and the assigned managed identity, run code as that identity, and stage content that can reach the public-facing production site.
