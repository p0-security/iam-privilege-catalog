name: Web App hybrid connection
description: A web app hybrid connection is an Azure Relay-based network bridge that lets the App Service app reach a specific backend or on-premises host:port endpoint.
scope: HIGH
notes: Provides the app's connectivity path to private/on-prem backend resources for a single application function.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting a hybrid connection severs the relay-based network path the app uses to reach backend/on-prem resources, disrupting the dependent service.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating a hybrid connection establishes or repoints a relay bridge from the app to attacker-chosen backend/on-prem host:port, granting network reach to additional resources and altering connectivity configuration.
