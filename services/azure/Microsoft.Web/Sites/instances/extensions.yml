name: Web App instance extensions
description: Per-instance site (Kudu/SCM) extensions on a specific scaled-out worker of an Azure App Service web app.
scope: MEDIUM
notes: Exposes the extension/tooling components deployed to an individual app worker instance; read-only enumeration with no data or secret return.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists extensions on a specific app instance, inventorying per-instance components for reconnaissance.
