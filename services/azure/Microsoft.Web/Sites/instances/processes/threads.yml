name: Web App process threads
description: Per-instance runtime introspection of threads belonging to processes running inside an Azure App Service / Web App worker instance.
scope: LOW
notes: Read-only runtime execution detail; exposes no application data or credentials.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Enumerates thread-level runtime state of a running process, providing only non-sensitive reconnaissance of the workload's execution.
