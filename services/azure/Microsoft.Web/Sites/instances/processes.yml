name: Web App instance processes
description: Instance processes are the live worker processes running the web app's workload on a given App Service instance, exposed via the Kudu/SCM process API.
scope: HIGH
notes: Runtime process detail can include command lines and environment variables, which on App Service commonly hold connection strings and secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
    notes: Deleting (killing) a running worker process on an app instance terminates the executing workload, disrupting service availability.
  read:
    risks:
      - discovery:infra
      - exfiltration:crypto
    notes: Reading process detail via the Kudu process API exposes command lines and environment variables, which on App Service routinely contain connection strings, account keys, and other secrets — enabling credential exfiltration beyond mere process enumeration.
