name: Web App instance extension processes
description: Process listing for a specific Azure App Service worker instance, exposed via the per-instance Kudu/SCM extension surface.
scope: MEDIUM
notes: Reveals the running workload's process state on a single app instance but no data or credentials.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists processes on a specific app instance via the extension/Kudu endpoint, runtime reconnaissance of the worker.
