name: Web App instance extension logs
description: Logs produced by a site (Kudu/SCM) extension on a specific Azure App Service worker instance.
scope: MEDIUM
notes: Extension logs can contain diagnostic output, configuration, and inadvertently logged secrets or sensitive runtime data.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
    notes: Reads an instance extension's logs, exporting log content that may include sensitive runtime or diagnostic data.
