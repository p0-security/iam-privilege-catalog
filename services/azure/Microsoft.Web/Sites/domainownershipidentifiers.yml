name: Web App domain ownership identifiers
description: Domain ownership identifiers are the custom-domain verification tokens/configuration that bind and assert ownership of custom hostnames for an App Service web app.
scope: HIGH
notes: Govern which custom domains can be associated with the app; manipulating them affects public-facing hostname routing for a single application.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
      - impact:dos
    notes: Deletes the custom-domain ownership verification identifiers, removing the domain-binding metadata which can break custom-domain validation and disrupt the app's public-facing access.
  write:
    risks:
      - takeover:domain
      - impact:manipulation
    notes: Creating/updating domain ownership identifiers alters the custom-domain verification binding, letting an attacker assert ownership and route a custom domain/subdomain to the app.
