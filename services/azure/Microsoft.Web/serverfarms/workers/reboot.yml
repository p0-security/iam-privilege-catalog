name: App Service Plan workers
description: The worker compute instances of an App Service Plan that run all hosted web apps.
scope: HIGH
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Rebooting the plan's worker instances forcibly restarts the compute hosting all apps on the plan, causing denial of service.
