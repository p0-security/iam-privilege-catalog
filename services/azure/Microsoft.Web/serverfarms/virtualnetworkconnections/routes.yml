name: App Service Plan VNet connection routes
description: The routing entries of an App Service Plan's virtual network connection, controlling which traffic flows over the VNet integration.
scope: HIGH
notes: Network routing components for hosted apps; alteration/removal reshapes connectivity and reachability.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting VNet connection routes removes network routing components, disrupting connectivity for apps relying on those routes.
  write:
    risks:
      - impact:manipulation
      - escalation:network
      - impact:dos
    notes: Updating VNet connection routes lets an attacker redirect/intercept hosted-app traffic, extend reach into the connected network, and disrupt connectivity for dependent services.
