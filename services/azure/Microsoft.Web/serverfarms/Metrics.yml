name: App Service Plan metrics
description: Performance and usage metrics (CPU, memory, instance utilization telemetry) for an App Service Plan, the compute pool hosting web apps.
scope: LOW
notes: Read-only operational telemetry; reveals capacity and load but no application data or credentials.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading plan performance metrics inventories the compute's operational state and capacity for reconnaissance.
