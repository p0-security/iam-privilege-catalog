name: App Service plan diagnostic settings
description: The Microsoft.Insights diagnostic setting for an Azure App Service plan (serverfarm), defining which logs/metrics are collected and where they are routed (Log Analytics, Storage, Event Hub).
scope: LOW
notes: Monitoring/diagnostics configuration is a detective control; reading it only reveals coverage, while modifying it can blind detection.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading the App Service plan's setting reveals which logs/metrics are collected and their destinations, enabling reconnaissance of monitoring coverage for evasion planning.
  write:
    risks:
      - destruction:logs
      - destruction:defense
    scope: MEDIUM
    notes: Creating/updating the App Service plan diagnostic setting lets an attacker disable or redirect plan-level log/metric collection, blinding incident response and removing a detective control.
