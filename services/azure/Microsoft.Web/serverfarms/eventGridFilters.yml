name: App Service Plan Event Grid filter
description: An Event Grid event-subscription filter attached to an App Service plan (server farm), defining which plan lifecycle events are routed to downstream subscribers.
scope: MEDIUM
notes: Supporting event-routing/integration configuration for the hosting plan; not a data store or credential.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting the filter removes the plan's event-routing configuration, disrupting event-driven integrations tied to the plan.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading the filter only enumerates the plan's event-subscription configuration for reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the filter alters plan-level event-routing configuration, letting an attacker suppress or redirect event delivery.
