name: App Service Plan first-party app settings
description: Internal first-party application configuration settings associated with an App Service Plan (server farm), a supporting platform configuration resource.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
    notes: Deletes first-party app configuration settings on the plan, altering/removing operational configuration of a supporting plan component which can disrupt dependent app behavior.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Read-only retrieval of first-party app settings on the plan, configuration reconnaissance of a supporting component with no secret material returned in isolation.
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates first-party app settings on the plan, allowing an attacker to alter operational configuration of a supporting plan component.
