name: Connector Gateway custom connector
description: A custom connector definition hosted on a Connector Gateway (Microsoft.Web/connectorGateways), describing how Logic Apps/Power Platform integrations connect to a backend API (endpoints, schema, auth configuration).
scope: MEDIUM
notes: Supporting integration infrastructure for a single function; config can reference connection/endpoint details but secret material is not returned by control-plane reads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: An action on a custom connector definition lets an attacker alter or exercise how the gateway invokes backend APIs (target endpoint/auth handling), manipulating operational integration behavior.
    name: Connector Gateway
    parent:
      description: A Connector Gateway is a Microsoft.Web integration resource that bridges cloud services (Logic Apps, Power Platform) to backend/on-premises data sources, brokering credentialed connections and connector definitions.
      notes: Supporting integration infrastructure; the gateway itself is a connectivity bridge rather than a primary data store, but the connections it brokers can carry credentials to backend systems.
  delete:
    risks:
      - destruction:infra
    notes: Deleting a custom connector removes integration infrastructure that dependent workflows rely on, breaking the connection with a localized denial-of-service effect.
  read:
    risks:
      - discovery:infra
    notes: Control-plane get returning the custom connector's configuration (endpoints, integration settings), enabling reconnaissance of the integration without exposing secret material.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a custom connector lets an attacker alter the connector's endpoints/auth/schema (e.g. repoint calls to an attacker-controlled backend), manipulating the integration's operational configuration.
