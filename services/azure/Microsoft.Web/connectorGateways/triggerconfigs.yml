name: Connector Gateway trigger config
description: A trigger configuration on a Connector Gateway (Microsoft.Web/connectorGateways), defining when and how gateway-backed integrations/workflows fire.
scope: MEDIUM
notes: Supporting integration configuration for a single function; control-plane reads return configuration, not secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: An action on a trigger config lets an attacker alter or fire the event triggers that initiate gateway-backed workflows, manipulating when/how downstream integration processes execute.
    name: Connector Gateway
    parent:
      description: A Connector Gateway is a Microsoft.Web integration resource that bridges cloud services (Logic Apps, Power Platform) to backend/on-premises data sources, brokering credentialed connections and connector definitions.
      notes: Supporting integration infrastructure; the gateway itself is a connectivity bridge rather than a primary data store, but the connections it brokers can carry credentials to backend systems.
  delete:
    risks:
      - destruction:infra
    notes: Deleting a trigger config removes the configuration that fires the workflow, disrupting the dependent integration in a DoS-like manner.
  read:
    risks:
      - discovery:infra
    notes: Control-plane get returning trigger config properties, enabling reconnaissance of how and when gateway-connected workflows are triggered without exposing secrets.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a trigger config lets an attacker alter the conditions under which gateway-backed workflows fire, manipulating the integration's operational triggering logic.
