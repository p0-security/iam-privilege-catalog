name: Connection Gateways (on-premises data gateway)
description: A Connection Gateway is a Microsoft.Web resource representing an on-premises data gateway — a bridge that lets Azure cloud services (Logic Apps, Power Platform) reach data sources inside a private/on-premises network.
scope: HIGH
notes: A hybrid-connectivity bridge into a private network; write/delete/join/associate operations touch the path into on-prem resources, while reads only inventory the bridge and do not return installation keys or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
    notes: Deleting the gateway tears down the on-prem connectivity bridge, severing all Logic Apps/flows that rely on it to reach private data sources (denial of service).
  Write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Create/update reconfigures the bridge between Azure and a private on-prem network, letting an attacker tamper with connectivity settings and potentially extend or redirect reachability into on-prem resources.
