name: Azure Static Web App
description: An Azure Static Web App (Static Site) is a managed hosting resource that serves a public-facing static frontend with linked source-repository/CI build configuration and optional managed serverless API (Azure Functions) backend.
scope: HIGH
notes: Asset hosts a single public-facing web application; its app settings and deployment tokens routinely contain secrets and connection strings, making secret-returning operations effectively credential disclosure.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
    notes: Deletes the static site resource, removing the hosted public-facing application infrastructure and causing denial of service for that function.
  Write:
    risks:
      - impact:manipulation
      - impact:defacement
      - escalation:lateral
    notes: Create/update alters the public-facing app configuration (defacement/manipulation of repo and build settings) and can attach/configure a managed identity to the resource, enabling lateral movement.
