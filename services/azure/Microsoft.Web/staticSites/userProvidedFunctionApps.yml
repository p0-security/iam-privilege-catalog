name: Static Site user-provided Function App binding
description: A user-provided Function App registration binds an external Azure Function App as the dynamic API backend of an Azure Static Web App (public-facing site).
scope: MEDIUM
notes: Controls the backend wiring of a public-facing static site; affects a single application's behavior and availability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Detaching the Function App removes the static site's backend API binding, altering operational configuration and disrupting the public site's dynamic functionality.
  Read:
    risks:
      - discovery:infra
    notes: Listing the registered user-provided Function Apps inventories the backend resources wired into the static site (reconnaissance).
  Write:
    risks:
      - impact:manipulation
    notes: Registering a Function App re-points the public site's API backend to an attacker-chosen function, manipulating the application's served behavior.
