name: Static Site build app settings
description: Application settings (key/value runtime configuration, frequently including secrets and connection strings) scoped to a specific build/environment of an Azure Static Web App.
scope: HIGH
notes: Build app settings commonly hold credentials/connection strings consumed by the build's managed functions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Creating/updating a build's app settings lets an attacker alter that environment's runtime configuration and inject secrets, manipulating behavior and enabling lateral movement to backend resources.
