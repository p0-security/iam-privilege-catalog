name: Static Site build user-provided Function App binding
description: A user-provided Function App registration on a static site build binds an external Azure Function App as the dynamic API backend for a specific build/preview environment of an Azure Static Web App.
scope: MEDIUM
notes: Controls the backend wiring of a static site build environment; affects a single build/preview deployment's behavior and availability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Detaching the Function App removes the build's backend API binding, altering its configuration and disrupting that build's dynamic functionality.
  Read:
    risks:
      - discovery:infra
    notes: Listing the registered user-provided Function Apps for a build inventories the backend resources wired into that build (reconnaissance).
  Write:
    risks:
      - impact:manipulation
    notes: Registering a Function App re-points the build's API backend to an attacker-chosen function, manipulating the served application behavior.
