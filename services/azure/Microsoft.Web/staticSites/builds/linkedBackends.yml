name: Static Site Build linked backends
description: A linked backend is the association that wires a Static Web App build (frontend) to a backing service such as a Function App or API, defining how the static site routes its API calls.
scope: HIGH
notes: Controls routing/integration for a single web application; not a credential or data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Unlinking the backend severs the frontend-to-backend integration, breaking the application's API connectivity (DoS-like) by tearing down the integration wiring.
  Read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Enumerates which backend resources are linked to the static site build, providing infrastructure/integration reconnaissance with no data or secret exposure.
  Write:
    risks:
      - impact:manipulation
    notes: Registering/updating a linked backend repoints where the public-facing static site routes its API calls, letting an attacker attach an attacker-chosen backend and manipulate the served integration.
