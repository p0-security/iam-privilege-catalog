name: Static Site build
description: A deployed build/environment (e.g. production or preview staging) of an Azure Static Web App that serves the site's static content and managed functions.
scope: HIGH
notes: A build represents a deployed version/environment serving public content and backing functions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:defacement
      - impact:manipulation
      - escalation:lateral
    notes: Deploying arbitrary zipped content overwrites the public-facing site and its managed function code, enabling defacement, manipulation of served content/code, and execution of attacker code under the site's identity.
