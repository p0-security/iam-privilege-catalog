name: Static Site build database connections
description: A database connection resource that links a Static Web App build (e.g. a preview/staging environment) to a backend database, powering that build's Data API. It holds the target database binding, an optional managed-identity, and (retrievable separately) the connection string credential.
scope: HIGH
notes: The connection binds a build environment to its backing data tier; the show action returns reusable database credentials, making that path credential-sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deletes the database connection of a Static Web App build, removing that environment's data-tier binding and breaking its data-driven functionality (denial of service for that build).
  Read:
    risks:
      - discovery:infra
    notes: Build-scoped GET returns the connection overview (database resourceId, region, identity) with the connection string masked, inventorying the backend-database wiring without exposing the credential.
  Write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Create/update lets an attacker repoint the build's Data API to an attacker-controlled database or inject a connection string and attach a managed identity used to reach backend data stores.
