name: Static Site Build Functions
description: The functions (serverless API endpoints) associated with a Static Web App build, representing the deployed function inventory for that build.
scope: LOW
notes: Read returns the function inventory/configuration metadata, not the function source code or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:infra
    notes: Listing the functions of a static site build inventories the deployed function resources/endpoints, infrastructure reconnaissance without exposing code or data.
