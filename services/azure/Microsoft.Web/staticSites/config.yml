name: Static Site app settings
description: Application settings (key/value runtime configuration, frequently including secrets and connection strings) for an Azure Static Web App.
scope: HIGH
notes: App settings commonly hold credentials/connection strings consumed by the site's managed functions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Creating/updating app settings lets an attacker alter runtime configuration and inject secrets/backend references the app trusts, manipulating behavior and pivoting to connected resources.
