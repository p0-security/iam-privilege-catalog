name: App Service Environment Private Endpoint Connection Proxies
description: Internal Private Link connection-proxy objects that broker and orchestrate private endpoint connectivity for an App Service Environment (ASE). They represent the plumbing state for how the isolated hosting environment is reached over a private network path.
scope: HIGH
notes: Supporting connectivity plumbing for an ASE that hosts apps for a single organizational function; not a primary data store or identity asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:network
    notes: Deleting the proxy tears down a private-link connectivity component, severing the private path and disrupting authorized access to apps hosted in the ASE.
  Write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating or updating the proxy alters the private-link connectivity broker for the ASE, potentially establishing/approving a private-network path into the otherwise-isolated environment and manipulating its connectivity configuration.
