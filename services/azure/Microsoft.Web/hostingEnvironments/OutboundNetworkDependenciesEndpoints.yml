name: App Service Environment outbound network dependency endpoints
description: The set of outbound network dependency endpoints required by an App Service Environment (ASE), the isolated, single-tenant hosting environment for App Service apps.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Returns the ASE's outbound network endpoints, letting an attacker inventory egress paths and connected resources.
