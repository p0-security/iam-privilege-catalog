name: App Service Environment diagnostic settings
description: The Microsoft.Insights diagnostic setting for an Azure App Service Environment (ASE), defining which logs/metrics are collected and where they are routed (Log Analytics, Storage, Event Hub).
scope: MEDIUM
notes: Monitoring/diagnostics configuration is a detective control; reading it only reveals coverage, while modifying it can blind detection.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating/updating the ASE diagnostic setting lets an attacker disable or redirect log/metric collection across the hosting environment, blinding incident response and weakening detective defenses.
