name: App Service Environment log definitions
description: Azure Monitor diagnostic log category definitions for an App Service Environment (the available log types/schema, not log content).
scope: LOW
notes: Returns only logging-capability metadata (which categories exist), not any log data.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Enumerates the available diagnostic log categories for the hosting environment, low-value logs-schema reconnaissance.
