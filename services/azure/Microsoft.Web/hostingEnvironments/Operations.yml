name: App Service Environment operations
description: The async operation-status records for long-running operations on an App Service Environment (ASE), an isolated dedicated App Service hosting deployment.
scope: LOW
notes: Operation-status polling endpoints return only the state of in-flight management operations and expose no resource data or secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reads the status of asynchronous operations on a hosting environment; an inert operation-status poll with no actionable data in isolation.
