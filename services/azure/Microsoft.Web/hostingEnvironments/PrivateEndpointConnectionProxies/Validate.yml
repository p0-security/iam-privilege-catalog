name: App Service Environment Private Endpoint Connection Proxies
description: Internal Private Link connection-proxy objects that broker and orchestrate private endpoint connectivity for an App Service Environment (ASE). They represent the plumbing state for how the isolated hosting environment is reached over a private network path.
scope: LOW
notes: Supporting connectivity plumbing for an ASE that hosts apps for a single organizational function; not a primary data store or identity asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: A stateless pre-flight validation that only checks a candidate proxy configuration and returns a verdict; it persists no change and discloses no sensitive material, so it is inert in isolation.
