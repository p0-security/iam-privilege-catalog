name: App Service Environment private endpoint connection
description: A connection record binding a consumer private endpoint to an App Service Environment (ASE), including its approval state, governing which private endpoints can privately reach the isolated hosting environment and its apps.
scope: HIGH
notes: This control-plane object gates private network connectivity to a production App Service Environment that hosts apps for a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:network
    notes: Deletes a private endpoint connection, severing a consumer's private-link path to the App Service Environment and disrupting authorized private connectivity to the hosted apps.
  Read:
    risks:
      - discovery:network
    scope: LOW
    notes: Gets or lists the App Service Environment's private endpoint connections and approval state, enumerating its private-link bindings for network reconnaissance.
  Write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Approving/rejecting a private endpoint connection can attach an attacker-controlled private endpoint to the App Service Environment (or reject legitimate ones), granting private-network access to the hosted apps and altering approval state.
