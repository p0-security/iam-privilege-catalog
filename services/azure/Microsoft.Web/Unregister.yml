name: Microsoft.Web resource provider registration
description: Subscription-level registration state for the Microsoft.Web (App Service / Web Apps) resource provider, which controls whether the provider's resource types can be managed and provisioned within the subscription.
scope: MEDIUM
notes: Provider registration is a subscription-wide control plane toggle; it is not a data store but affects the availability of an entire resource provider's functionality.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Unregistering the Microsoft.Web provider for the subscription disables management and provisioning of all Web/App Service resources subscription-wide, causing a denial-of-service against the function.
