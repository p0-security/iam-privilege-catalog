name: Geo Region
description: A Geo Region is the static catalog of Azure geographic regions in which App Service can be deployed; it is global platform reference data, not an organizational resource.
scope: PUBLIC
notes: Public reference data describing where Azure offers App Service; reveals nothing about the organization's own deployments or configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks: []
    notes: Listing available Azure geo regions returns static public catalog information about where App Service is offered, granting no attacker capability.
