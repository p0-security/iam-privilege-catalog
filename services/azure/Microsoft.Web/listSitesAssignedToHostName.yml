name: Sites Assigned To Hostname
description: A read-only lookup that returns the names of App Service sites bound to a given hostname, mapping hostnames to the web app resources serving them.
scope: LOW
notes: Low-sensitivity hostname-to-site mapping metadata used for reconnaissance; holds no data plane and exposes no secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:infra
    notes: Resolving which site names are assigned to a hostname enumerates app-to-hostname mappings, a low-sensitivity reconnaissance action for targeting the apps that back a domain.
