name: App Service Environment
description: An App Service Environment (ASE) is a dedicated, network-isolated Azure App Service deployment that hosts web apps, function apps, and API apps on dedicated compute within a customer VNet.
scope: HIGH
notes: An ASE supports a single hosting function but is VNet-integrated, so changes to it can affect network isolation and all apps it hosts.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting an ASE destroys the dedicated hosting infrastructure and takes down every app hosted in it, equivalent to denial of service for that function.
  Write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating or updating an ASE alters the dedicated hosting environment configuration (scaling, networking, DNS) and can provision costly isolated compute capacity.
