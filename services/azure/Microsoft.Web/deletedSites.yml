name: Deleted Web App
description: A deleted Web App resource represents a soft-deleted App Service site whose retained properties/configuration can be inventoried (and is a candidate for restore).
scope: LOW
notes: Read-only metadata of removed sites; exposes prior configuration, not live data plane contents or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Read:
    risks:
      - discovery:infra
    notes: Reads the properties of a soft-deleted web app, inventorying removed-site configuration for reconnaissance/targeting with no data or secret disclosure.
