name: App Service source control configuration
description: Source control / continuous-deployment configuration for an App Service web app, binding the app to a code repository (URL, branch, deployment settings).
scope: MEDIUM
notes: Reveals where the app's source code lives and how its CI/CD deployment is wired; deployment tokens are not returned by the read.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
      - discovery:code
    notes: Reads the source control deployment configuration (repository URL, branch, deployment settings), inventorying the app's source repository linkage and CI/CD wiring without returning the source itself.
  write:
    risks:
      - escalation:lateral
      - impact:manipulation
      - impact:defacement
    scope: HIGH
    notes: Repoints the app's deployment source to an attacker-controlled repository, causing arbitrary code to deploy and run under the site's managed identity (lateral movement), altering the deployed application (manipulation) and defacing the public-facing web app.
