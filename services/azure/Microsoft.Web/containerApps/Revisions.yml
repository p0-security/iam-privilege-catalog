name: Container App revision
description: A Container App revision is an immutable deployed version of a Container App, capturing the container image, scaling, traffic weight, and replica configuration for that version.
scope: HIGH
notes: Versioned operational state of a single-function production app.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading a revision returns its configuration snapshot (image, scale, traffic state) for reconnaissance without exposing secret values.
