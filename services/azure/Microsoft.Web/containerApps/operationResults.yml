name: Container App operation results
description: An asynchronous operation-result/status endpoint that reports the progress and outcome of a prior Container App control-plane request.
scope: LOW
notes: Status-polling endpoint exposing operation progress metadata only.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling the result/status of an async operation yields only operation progress metadata and grants no meaningful attacker capability in isolation.
