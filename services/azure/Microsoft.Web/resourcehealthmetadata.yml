name: App Service resource health metadata
description: Resource Health metadata for App Service resources, describing the health signal categories and monitoring configuration associated with the resource.
scope: LOW
notes: Low-sensitivity health/monitoring metadata; no access to stored application data or secrets.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading resource health metadata lets an attacker inventory the resource's health/monitoring configuration as low-sensitivity infrastructure reconnaissance.
