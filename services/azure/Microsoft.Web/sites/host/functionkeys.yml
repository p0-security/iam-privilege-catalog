name: Web Apps Functions host function keys
description: Host-level function keys for a function app, bearer credentials valid across all functions in the app to authorize HTTP invocation.
scope: HIGH
notes: Host-wide invocation credentials; invoking functions runs code under the app's (possibly managed) identity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:access
      - impact:dos
    notes: Deleting a host-level function key revokes a credential used to invoke functions across the app, denying authorized callers and disrupting the app's HTTP endpoints.
  write:
    risks:
      - persistence:account
      - escalation:lateral
      - impact:manipulation
    notes: PUTting a host-level function key sets a known credential valid across the whole app (durable backdoor / persistence), enabling repeated invocation as the app identity (lateral); overwriting an existing host key alters/revokes the legitimate credential (manipulation).
