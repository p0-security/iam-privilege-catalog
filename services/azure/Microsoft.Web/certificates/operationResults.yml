name: Certificate operation results
description: An async operation-results endpoint that reports the provisioning status of a long-running App Service certificate operation.
scope: LOW
notes: Returns operation status metadata only, not certificate material.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
