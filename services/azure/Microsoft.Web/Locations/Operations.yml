name: Microsoft.Web Regional Operations
description: Regional asynchronous operation-status resources that return the progress/state of long-running Microsoft.Web control-plane operations submitted in a location.
scope: LOW
notes: Transient operation-status metadata; carries no organizational data or credentials.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the status of a long-running regional operation, returning only transient progress state; an inert status-poll no-op with no attacker capability.
