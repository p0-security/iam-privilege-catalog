name: Locations connection gateway installations
description: Inventory of on-premises data/connection gateway installations registered in a region, supporting hybrid connectivity for Logic Apps and connectors.
scope: LOW
notes: Read returns connectivity-infrastructure inventory/metadata, not credentials or data.
links:
  - https://azure.permissions.cloud/iam/microsoft.web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Enumerates the connection gateway installations in a location, allowing reconnaissance of hybrid-connectivity infrastructure.
