name: App Service network intent policies
description: Location-scoped network intent policies governing VNet integration constraints for App Service deployments.
scope: LOW
notes: Read-only network policy configuration; useful for mapping network restrictions but not itself sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:network
    notes: Despite the /action suffix this reads network intent policies for a location, letting an attacker inventory network restriction configuration and find weak points.
