name: Location managed API connectors
description: Managed API connectors available in an Azure region, used by Logic Apps and Web Apps to connect to backing services (the catalog of connector definitions and their exposed operations).
scope: MEDIUM
notes: Connector catalog metadata is low-sensitivity; the join action that wires a workload to a connector is the sensitive capability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Web
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  Action:
    risks:
      - escalation:network
    notes: Joining a managed API connector wires a workload/connection into the connector's connectivity context, extending reachability to the backing service it fronts.
