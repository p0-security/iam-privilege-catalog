name: Azure SQL Managed Instance
description: Azure SQL Managed Instance is a fully managed PaaS SQL Server engine hosting production relational databases and the organizational data they contain.
scope: HIGH
notes: A production data store supporting a single organizational function; its configuration governs data availability, encryption, identity, and network access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - destruction:infra
      - impact:dos
    notes: Deleting the managed instance destroys the production database server and all hosted organizational data, causing irreversible data loss and denial of service.
  read:
    risks:
      - discovery:infra
    notes: Listing/getting managed instance properties is control-plane reconnaissance that inventories database infrastructure configuration without returning stored data or secrets.
  write:
    risks:
      - impact:manipulation
      - escalation:lateral
      - impact:spend
    notes: Creating/updating an instance lets an attacker alter critical configuration (network, admin, security), attach a managed identity to pivot (lateral movement), and provision costly compute (spend).
