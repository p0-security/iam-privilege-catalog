name: Microsoft SQL Database resource provider
description: Subscription-level operations on the Microsoft SQL Database resource provider itself, governing provider registration and pre-provisioning checks rather than any specific server or database.
scope: LOW
notes: Provider-level control-plane operations; most are idempotent enablement or validation utilities with little inherent sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Only verifies whether a SQL server name is available worldwide; an inert pre-provisioning probe that returns a boolean availability status and grants no attacker capability.
