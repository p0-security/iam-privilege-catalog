name: Network Security Perimeter association proxy operation results
description: An async operation-result endpoint that reports the outcome state of NSP association proxy operations on an Azure SQL server.
scope: LOW
notes: Operation-status polling endpoints expose only completion state, not configuration, data, or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the result/status of an NSP association-proxy async operation; no configuration, secrets, or data are exposed, so it is inert.
