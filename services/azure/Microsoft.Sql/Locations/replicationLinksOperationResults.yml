name: SQL replication link operation status
description: An async operation/status controller for replication-link operations between Azure SQL databases. It tracks the progress and result of long-running replication-link operations.
scope: LOW
notes: Operation-status polling endpoints expose only completion state, not replication configuration or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the result/status of a replication-links operation; an inert status-polling endpoint.
