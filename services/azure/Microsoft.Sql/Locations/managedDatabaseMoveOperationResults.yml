name: Managed database move operation results
description: An async operation-result endpoint that reports the status/result of an Azure SQL Managed Instance database move operation.
scope: LOW
notes: Operation-status polling endpoints expose only completion state, not configuration, data, or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the progress/result state of a managed-database move async operation; no organizational data or actionable capability is granted, so it is inert.
