name: Azure SQL elastic pool operation result
description: The transient status/result of an asynchronous long-running operation on an Azure SQL Database elastic pool.
scope: LOW
notes: Returns only operation-progress state; low sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reading the result of an async elastic-pool operation returns only operation progress/completion status, granting no meaningful attacker capability in isolation.
