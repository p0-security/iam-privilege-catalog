name: SQL server external policy-based authorization operation status
description: An async operation/status controller for external policy-based authorization operations on Azure SQL servers. It tracks the progress of long-running authorization-configuration operations.
scope: LOW
notes: Operation-status polling endpoints expose only completion state, not the authorization policy contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the operation result/status for an external policy-based authorization operation; inert, no underlying policy data.
