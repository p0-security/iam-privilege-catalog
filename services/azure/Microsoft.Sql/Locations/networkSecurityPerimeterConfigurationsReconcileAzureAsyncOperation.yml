name: SQL async operation / operation-results status
description: Location-scoped tracker endpoints that report the in-progress status and results of asynchronous Azure SQL control-plane operations (Azure-AsyncOperation and OperationResults polling URLs).
scope: LOW
notes: These return only operation lifecycle state (running/succeeded/failed); they expose no resource configuration, secrets, or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Despite a misleading 'Sync ... effective configuration' displayName, this is a /read on the reconcile async-operation tracker that returns only operation status and performs no reconciliation.
