name: SQL database encryption protector revert async operation status
description: A location-scoped endpoint that reports the status of the asynchronous 'revert key' operation for an Azure SQL database encryption protector (TDE protector key revert workflow).
scope: LOW
notes: Status-polling endpoint; exposes operation progress only, not the key, data, or any control over the revert.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reading the status of the async encryption-protector revert operation is an inert status poll that returns no key, data, or actionable capability in isolation.
