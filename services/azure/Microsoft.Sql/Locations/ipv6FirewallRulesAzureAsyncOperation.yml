name: IPv6 SQL server firewall rule operation status
description: An async operation/status controller for IPv6 firewall rule operations on Azure SQL servers. It tracks the progress of long-running create/update/delete firewall rule operations.
scope: LOW
notes: Operation-status polling endpoints expose only completion state, not the underlying firewall configuration or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the status/progress of an in-flight firewall rule operation; an inert status poll with no actionable capability in isolation.
