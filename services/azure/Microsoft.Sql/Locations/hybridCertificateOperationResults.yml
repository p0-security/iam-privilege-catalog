name: Azure SQL Managed Instance hybrid certificate operation results
description: An async operation-status endpoint that reports the progress/result state of a long-running hybrid certificate operation on an Azure SQL Managed Instance.
scope: LOW
notes: Operation-status polling endpoints expose only completion state, not configuration, data, or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the in-progress/succeeded/failed status of the async hybrid-certificate operation; no certificate material or configuration is exposed, so it is inert in isolation.
