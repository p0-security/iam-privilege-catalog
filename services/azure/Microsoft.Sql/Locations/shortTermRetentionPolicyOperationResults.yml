name: SQL short-term retention policy operation result
description: An asynchronous operation status endpoint for Azure SQL short-term retention policy operations.
scope: LOW
notes: Purely a long-running-operation polling endpoint; returns operation status, not resource secrets or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the status of a short-term retention policy operation, an inert operation-status poll with no actionable capability.
