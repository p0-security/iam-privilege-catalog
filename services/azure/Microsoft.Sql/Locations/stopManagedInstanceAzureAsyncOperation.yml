name: Azure SQL Managed Instance stop async operation status
description: A read-only endpoint that reports the status of a long-running asynchronous operation to stop an Azure SQL Managed Instance.
scope: LOW
notes: Operation-status polling endpoints expose only progress/outcome metadata, not the underlying resource configuration or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the progress status of a stop operation; confers no actionable attacker capability in isolation.
