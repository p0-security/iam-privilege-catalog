name: Azure SQL Database instance failover group
description: An instance failover group defines the disaster-recovery / geo-replication relationship and failover policy between two Azure SQL Managed Instances.
scope: HIGH
notes: Governs availability and replication topology of production managed-instance databases supporting a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deletes the failover group, tearing down the DR/geo-replication relationship for production databases and removing failover protection.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Creates/updates the failover group, altering DR/replication topology and read/write failover policy of production databases, which can disrupt or redirect production database availability.
