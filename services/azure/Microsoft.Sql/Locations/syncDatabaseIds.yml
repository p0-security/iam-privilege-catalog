name: Azure SQL Data Sync database IDs
description: Identifiers of databases configured for SQL Data Sync within a given region and subscription.
scope: LOW
notes: Enumerates database identifiers eligible for/participating in sync; reveals data-store references, not their contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Retrieving sync database IDs for a region/subscription enumerates the databases configured for Data Sync, a read-only data-resource inventory.
