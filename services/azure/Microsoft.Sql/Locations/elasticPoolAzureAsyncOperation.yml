name: Azure SQL elastic pool operation status
description: Read-only endpoint that returns the status of an asynchronous (long-running) Azure SQL elastic database pool operation.
scope: LOW
notes: Operation-status polling endpoint exposing only operation state, not pool configuration or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the status of an elastic pool async operation; a status-polling read exposing no sensitive data or configuration.
