name: Azure SQL Managed Instance private endpoint connection operation results
description: An async operation-results/status sub-resource for private endpoint connection operations on an Azure SQL Managed Instance. Holds only the completion status of a long-running ARM operation.
scope: LOW
notes: Operation-status polling endpoint; carries no resource configuration or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the result/status of an asynchronous private endpoint connection operation; returns only transient operation state, granting no meaningful attacker capability in isolation.
