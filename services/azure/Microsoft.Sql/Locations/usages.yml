name: Azure SQL location usage metrics
description: Per-location and subscription-level Azure SQL resource quota limits and current usage counts for the subscription.
scope: LOW
notes: Read-only quota/capacity metadata; low sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns subscription usage/quota metrics for a location, letting an attacker inventory SQL resource consumption and capacity headroom.
