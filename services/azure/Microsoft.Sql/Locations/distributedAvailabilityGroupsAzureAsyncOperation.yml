name: Azure SQL Managed Instance distributed availability groups async operation status
description: A read-only endpoint that reports the status of a long-running asynchronous distributed availability group operation on an Azure SQL Managed Instance.
scope: LOW
notes: Operation-status polling endpoints expose only progress/outcome metadata, not the underlying resource configuration or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the progress status of a long-running DAG operation; an inert poll with no offensive capability.
