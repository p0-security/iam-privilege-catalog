name: Azure SQL Database private endpoint connection proxy
description: An asynchronous operation-status tracker for private endpoint connection proxy operations on an Azure SQL Database server. It reports the result/state of a long-running proxy operation.
scope: LOW
notes: Returns only operation progress/status; the proxy itself mediates Private Link connectivity but this endpoint exposes no proxy configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the result of an async private-endpoint-connection-proxy operation, returning only status; inert in isolation.
