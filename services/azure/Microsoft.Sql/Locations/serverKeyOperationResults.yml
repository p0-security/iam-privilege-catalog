name: Azure SQL TDE server key operation result
description: An asynchronous operation-status tracker for Transparent Data Encryption (TDE) server-key control-plane operations on Azure SQL. It reports the in-progress state of a long-running server-key operation.
scope: LOW
notes: Despite the encryption-key subject, these endpoints return only operation progress/status bookkeeping, never key material or protector configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls in-progress status of a TDE server-key operation and returns only operation progress, not key material or configuration; inert in isolation.
