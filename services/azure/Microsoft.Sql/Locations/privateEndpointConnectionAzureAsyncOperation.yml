name: SQL private endpoint connection async operation status
description: An AzureAsyncOperation status endpoint for Azure SQL private endpoint connection operations.
scope: LOW
notes: Purely a long-running-operation polling endpoint; returns operation status, not resource secrets or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
