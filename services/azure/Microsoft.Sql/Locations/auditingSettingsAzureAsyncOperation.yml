name: Server Blob Auditing Azure Async Operation
description: An Azure async-operation status endpoint that returns the result/status of a prior extended server blob auditing policy Set operation.
scope: LOW
notes: Despite a displayName implying it returns the policy, the resourceType is an async-operation status endpoint reporting only the outcome of a previously submitted set operation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the async-operation result/status of a prior extended server blob auditing Set operation, an inert status poll with no actionable resource data in isolation.
