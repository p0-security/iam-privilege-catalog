name: Azure SQL Database private endpoint connection proxy
description: An asynchronous operation-status tracker for private endpoint connection proxy operations on an Azure SQL Database server. It reports the result/state of a long-running proxy operation.
scope: LOW
notes: Returns only operation progress/status; exposes no proxy configuration or resource data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reads async-operation status for a private-endpoint-connection-proxy operation, returning only progress; inert in isolation.
