name: SQL database encryption protector revalidate async operation status
description: A location-scoped async operation tracker that returns the progress/status of a long-running database encryption protector revalidation request.
scope: LOW
notes: Status-polling endpoint; exposes only operation progress, no sensitive configuration, key material, or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reads only the status of a long-running encryption-protector revalidate operation; an inert poll with no offensive capability.
