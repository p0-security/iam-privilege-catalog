name: Azure SQL long-term retention backup
description: A long-term retention (LTR) backup of an Azure SQL database — a full, restorable point-in-time copy of the source production database's contents retained according to an LTR policy.
scope: HIGH
notes: An LTR backup holds the complete data of a single production database; it is both a recovery asset and a full copy of sensitive organizational data, so its destruction, immutability controls, and copy operations directly affect that database's confidentiality and recoverability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting an LTR backup irreversibly destroys a retained full copy of the database, eliminating a recovery point and undermining recovery from a data-loss or ransomware event.
  read:
    risks:
      - discovery:data
    scope: LOW
    notes: Listing the LTR backups for a database only enumerates the available backup objects and their metadata (recovery points/timestamps) without returning the underlying database contents.
