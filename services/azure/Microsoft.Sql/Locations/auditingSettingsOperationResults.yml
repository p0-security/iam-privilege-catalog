name: Server Blob Auditing Operation Results
description: An asynchronous long-running-operation status endpoint that returns the result/status of a prior server blob auditing policy Set operation.
scope: LOW
notes: This is operation-status bookkeeping, not the auditing policy resource itself; it conveys only success/failure/state of a previously submitted set operation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the status/result of a previously submitted server blob auditing Set operation, an inert async operation-status read granting no meaningful attacker capability in isolation.
