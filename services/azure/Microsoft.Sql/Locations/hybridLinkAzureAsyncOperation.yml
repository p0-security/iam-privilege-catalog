name: Azure SQL Managed Instance hybrid link async operation status
description: An async operation-status endpoint that reports progress/completion state of a long-running hybrid link operation on a SQL Managed Instance.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only operation progress/completion state; an inert status poll granting no meaningful attacker capability in isolation.
