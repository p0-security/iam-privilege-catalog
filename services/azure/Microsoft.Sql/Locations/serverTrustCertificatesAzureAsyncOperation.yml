name: Azure SQL Managed Instance server trust certificate async operation status
description: A status/result endpoint for long-running asynchronous operations on Azure SQL Managed Instance server trust certificates (used for distributed transactions / hybrid links).
scope: LOW
notes: Despite the certificate-related name, these endpoints expose only operation progress/completion state, not certificate material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls only the status of a long-running async operation; returns no certificate material, configuration, or data, so it grants no offensive capability in isolation.
