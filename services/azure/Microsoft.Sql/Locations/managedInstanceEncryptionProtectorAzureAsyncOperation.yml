name: TDE managed instance encryption protector operation status
description: A read-only endpoint that reports in-progress operations on the Transparent Data Encryption (TDE) managed instance encryption protector.
scope: LOW
notes: Returns only operation progress state, not protector/key material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
