name: Deleted SQL server
description: A soft-deleted Azure SQL logical server resource that remains recoverable for a retention window along with the databases it hosted.
scope: LOW
notes: Recovery re-instantiates a production database server and the data it contained.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Listing or getting deleted servers inventories recoverable SQL server resources and their properties, infrastructure reconnaissance.
