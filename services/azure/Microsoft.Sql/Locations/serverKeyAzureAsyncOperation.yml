name: TDE server key operation status
description: A read-only endpoint that reports in-progress operations on Transparent Data Encryption (TDE) server keys.
scope: LOW
notes: Returns only operation progress state, not key material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the in-progress status of a TDE server-key operation, not the key, so it is an inert status read.
