name: Azure SQL Virtual Cluster
description: An Azure SQL virtual cluster is the dedicated network/compute infrastructure that hosts one or more SQL Managed Instance deployments within a subnet.
scope: HIGH
notes: Virtual clusters underpin production Managed Instance databases; control-plane changes affect connectivity and availability of the hosted database service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Updating the virtual cluster's DNS servers alters name-resolution configuration for the hosted Managed Instances, which can redirect or disrupt connectivity for the production database service.
