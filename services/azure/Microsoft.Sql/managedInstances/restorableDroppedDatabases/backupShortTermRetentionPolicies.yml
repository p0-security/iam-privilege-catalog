name: Dropped managed database short-term retention policy
description: The short-term backup retention policy for an already-dropped (deleted) database in an Azure SQL Managed Instance, governing how long the deleted database remains restorable.
scope: HIGH
notes: This retention setting is the recovery mechanism allowing recovery of a deleted database.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Updating the policy on a dropped database can reduce the window during which the deleted database remains restorable, undermining the recovery defense and tampering with protective config.
