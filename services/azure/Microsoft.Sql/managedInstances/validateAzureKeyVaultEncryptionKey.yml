name: Azure SQL Managed Instance
description: Azure SQL Managed Instance is a fully managed PaaS SQL Server engine hosting production relational databases and the organizational data they contain.
scope: LOW
notes: A production data store supporting a single organizational function; its configuration governs data availability, encryption, identity, and network access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Validating a customer-managed Key Vault encryption key only checks the key's reachability/validity and returns a status; it exposes no key material and mutates no configuration.
