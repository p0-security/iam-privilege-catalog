name: Azure SQL Managed Instance DNS alias
description: A friendly, CNAME-style DNS name that maps to an Azure SQL Managed Instance endpoint, allowing clients to connect using a stable alias rather than the instance's native hostname.
scope: HIGH
notes: Controlling an alias controls where client connection traffic for a database endpoint resolves; aliases can be transferred (acquired) between instances.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - takeover:domain
      - impact:manipulation
    notes: Acquiring an alias from another managed instance repoints that DNS name to the attacker's instance, hijacking client traffic destined for the legitimate database to intercept or impersonate it.
