name: Managed database threat detection policy
description: The Advanced Threat Protection / threat-detection (security alert) policy for an Azure SQL Managed Instance database, controlling whether and how anomalous-activity alerts are generated.
scope: MEDIUM
notes: This is a per-database defensive detection control; disabling it lets malicious database activity proceed unobserved.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading the policy reveals whether/how threat detection is configured, letting an attacker find monitoring blind spots before acting.
  write:
    risks:
      - destruction:defense
    scope: HIGH
    notes: Updating the policy lets an attacker disable or weaken threat-detection alerting on the managed database to operate undetected.
