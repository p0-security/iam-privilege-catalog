name: Azure SQL Managed Database
description: A database hosted on an Azure SQL Managed Instance, holding production organizational data for a single application or function.
scope: HIGH
notes: Production data store; the data plane holds sensitive organizational data, while the control plane manages the database resource configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Completes a managed database move, finalizing relocation of the database to a target instance and altering its operational placement/state.
