name: SQL Managed Instance database current sensitivity labels
description: The currently applied data-classification sensitivity labels on columns of an Azure SQL Managed Instance database.
scope: MEDIUM
notes: Applied labels feed auditing and label-based data-protection/DLP controls; they map the location of sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Reading the applied labels enumerates the classification metadata indicating which columns contain sensitive data, aiding targeted data discovery.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Batch-updating the applied labels lets an attacker strip or falsify column classifications, manipulating operational metadata and degrading audit/DLP detection that keys off those labels.
