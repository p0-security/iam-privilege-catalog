name: Managed database Advanced Threat Protection settings
description: Managed database Advanced Threat Protection settings are the per-database toggle controlling whether Microsoft Defender threat detection/alerting is enabled on a SQL managed-instance database.
scope: MEDIUM
notes: A resource-scoped defensive monitoring control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading the managed database ATP settings reveals whether threat protection is enabled, exposing which databases are monitored versus blind; returns no data or secrets.
  write:
    risks:
      - destruction:defense
    notes: Updating the managed database ATP settings lets an attacker disable Defender threat detection/alerting on the database, removing a defensive monitoring mechanism to evade detection.
