name: SQL Managed Instance database recommended sensitivity labels
description: Engine-recommended (auto-discovered) data-classification sensitivity labels for columns of an Azure SQL Managed Instance database that the platform infers are likely sensitive.
scope: MEDIUM
notes: Recommendations are advisory metadata pointing to columns the discovery engine flags as sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Listing recommended labels reveals which columns the engine flags as likely sensitive, giving an attacker a ready-made inventory of high-value data targets.
  write:
    risks:
      - impact:manipulation
    notes: Batch-updating (enabling/dismissing) recommended labels manipulates advisory classification metadata, letting an attacker suppress recommendations that would otherwise flag sensitive columns.
