name: Managed Instance Database Diagnostic Settings
description: The Azure Monitor diagnostic settings on a database within an Azure SQL Managed Instance, defining which logs/metrics are collected and to which sinks they are routed.
scope: MEDIUM
notes: Controls the database audit/telemetry pipeline; reading reveals monitoring coverage, writing can suppress it.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating/updating the diagnostic setting lets an attacker disable or redirect database audit log/metric collection that would record data access, suppressing telemetry and weakening a detective control.
