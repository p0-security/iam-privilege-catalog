name: Azure SQL Managed Instance query execution statistics
description: The query execution statistics sub-resource of a Query Store query on an Azure SQL Managed Instance database, returning performance telemetry (timings, counts, resource usage) for a query id.
scope: MEDIUM
notes: Exposes operational query workload metadata rather than the underlying row data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Returns query execution statistics by query id, letting an attacker inventory database workload patterns and infer data activity without returning the underlying records.
