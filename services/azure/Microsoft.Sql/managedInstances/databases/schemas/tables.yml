name: Azure SQL Managed Database table
description: Represents a table object within a schema of an Azure SQL Managed Instance database.
scope: MEDIUM
notes: Data-plane schema metadata; reveals table-level structure of stored data but not the row contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Reading a table enumerates table objects within the schema, providing data-discovery reconnaissance of stored data containers without exposing row contents.
