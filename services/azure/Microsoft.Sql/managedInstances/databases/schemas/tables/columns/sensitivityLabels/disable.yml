name: Database column sensitivity label
description: A data-classification sensitivity label applied to a column in a managed-instance database, marking the column's information type and sensitivity rank (e.g., PII, financial) for auditing and DLP/protection controls.
scope: MEDIUM
notes: Sensitivity labels drive classification-based auditing and data-protection defenses; tampering with them weakens detection of access to sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:defense
    notes: Disabling sensitivity recommendations on a column suppresses the automated classification/discovery engine that flags sensitive data, weakening defensive visibility into unlabeled sensitive columns.
