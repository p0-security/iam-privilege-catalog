name: Azure SQL Managed Database column
description: "Represents the schema metadata (column definitions: names and types) of a table within an Azure SQL Managed Instance database."
scope: MEDIUM
notes: Data-plane schema metadata; reveals the structure of stored data but not the row contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Reading a column enumerates the data schema (column names/types), revealing the structure of stored data without returning row data.
