name: Azure SQL Managed Database Transparent Data Encryption
description: Transparent Data Encryption (encryption-at-rest) configuration state for an Azure SQL Managed Instance database.
scope: MEDIUM
notes: Reveals/controls the at-rest encryption defense posture; does not expose key material itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only retrieval of the database's TDE enabled/disabled state, inventorying the encryption-at-rest defense posture without returning key material.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    scope: HIGH
    notes: Changing TDE can disable encryption-at-rest on a production managed database, removing a data-protection defense control while altering its security configuration.
