name: Managed database security events
description: Security/audit event records for an Azure SQL Managed Instance database, capturing recorded database access activity such as queries, principals, and source IPs (data plane).
scope: MEDIUM
notes: Audit-log content that may contain sensitive operational detail and reveals detection coverage.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
      - exfiltration:logs
    notes: Retrieves recorded security/audit events, both inventorying security telemetry and exporting log content that can contain sensitive query/access details.
