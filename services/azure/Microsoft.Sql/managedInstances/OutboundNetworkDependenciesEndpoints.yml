name: Azure SQL Managed Instance outbound network dependency endpoints
description: A read-only listing of the outbound network dependency endpoints (FQDNs/ports) that an Azure SQL Managed Instance requires for connectivity.
scope: LOW
notes: Read-only network dependency metadata; useful for reconnaissance but does not expose sensitive data or grant control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Lists the managed instance's outbound network dependency endpoints, enabling inventory of its network egress requirements and topology.
