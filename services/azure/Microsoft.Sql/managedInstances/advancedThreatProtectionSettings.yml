name: Managed instance Advanced Threat Protection settings
description: Managed instance Advanced Threat Protection settings are the instance-level toggle controlling whether Microsoft Defender threat detection/alerting is enabled across a SQL managed instance.
scope: MEDIUM
notes: A resource-scoped defensive monitoring control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading the managed instance ATP settings discloses whether threat protection is enabled, useful reconnaissance of the defensive posture without yielding data or secrets.
  write:
    risks:
      - destruction:defense
    notes: Updating the managed instance ATP settings lets an attacker disable Defender threat detection across the instance, removing a defensive monitoring mechanism to evade detection.
