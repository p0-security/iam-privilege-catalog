name: Azure SQL Managed Instance private link resources
description: The private-link resources sub-resource of an Azure SQL Managed Instance, enumerating the available private-endpoint group IDs / linkable sub-resources for the server.
scope: LOW
notes: Read-only enumeration of private connectivity targets/network metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Returns the private-link resources (group IDs/required members), letting an attacker inventory private connectivity targets and network topology of the managed instance.
