name: Managed instance metrics
description: Runtime performance/utilization metrics (CPU, connections, IO, etc.) for an Azure SQL Managed Instance.
scope: MEDIUM
notes: Monitoring/telemetry data; reveals operational behavior and capacity but not stored database contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads managed instance performance/usage metrics, enabling reconnaissance of resource utilization and operational activity patterns.
