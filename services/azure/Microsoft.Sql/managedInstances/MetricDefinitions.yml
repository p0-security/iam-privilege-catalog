name: Managed instance metric definitions
description: The schema of available monitoring metrics (metric definitions) for an Azure SQL Managed Instance.
scope: LOW
notes: Monitoring metadata only; exposes the catalog of monitorable metrics, not their values or any stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Reads the list of available metric definitions, exposing only the monitoring metric schema/metadata for the instance.
