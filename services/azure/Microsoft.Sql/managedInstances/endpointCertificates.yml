name: Azure SQL Managed Instance endpoint certificate
description: The public endpoint certificate of an Azure SQL Managed Instance, used to establish trust for service endpoints (e.g. replication, distributed availability groups / managed instance link).
scope: MEDIUM
notes: This is the public certificate used for endpoint trust validation, not the private key.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns the managed instance's public endpoint certificate used for endpoint trust validation; exposes infrastructure/trust configuration rather than private key material.
