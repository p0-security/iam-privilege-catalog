name: Azure SQL Managed Instance distributed availability groups
description: A distributed availability group is a replication link between an Azure SQL Managed Instance and a partner instance (or SQL Server), used for high availability, disaster recovery, and migration.
scope: HIGH
notes: These links sit in front of production managed-instance databases; controlling them affects data replication direction, availability, and where production data flows.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the distributed availability group tears down the replication/DR link supporting the production database's high availability, destroying that infrastructure and disrupting availability.
  read:
    risks:
      - discovery:infra
    notes: Lists/gets distributed availability group configuration, letting an attacker inventory replication topology and linked partner instances of a production database service.
  write:
    risks:
      - exfiltration:data
      - impact:manipulation
    notes: Creating/configuring a distributed availability group establishes a replication link that can continuously stream production database contents to an attacker-influenced partner instance and alters the instance's replication configuration.
