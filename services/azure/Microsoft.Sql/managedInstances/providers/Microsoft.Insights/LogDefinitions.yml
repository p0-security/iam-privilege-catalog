name: Managed Instance Log Definition
description: The set of available Azure Monitor diagnostic log categories (log definition schema) for an Azure SQL Managed Instance.
scope: LOW
notes: Read-only logging schema; exposes no log content or stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Listing the available log definitions enumerates which diagnostic log categories exist for the managed instance, low-value logging-coverage reconnaissance for evasion planning without access to log content.
