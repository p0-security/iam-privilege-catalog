name: Azure SQL Managed Instance administrator
description: The Azure AD/Entra administrator binding for an Azure SQL Managed Instance, designating the privileged principal that holds full administrative control over the instance and all databases it hosts.
scope: CRITICAL
notes: This is the top-level identity/access-control assignment for a production database instance; controlling it confers admin over all instance data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deletes the existing administrator binding, removing the access-control assignment (destruction:policy) and revoking the legitimate admin's authorized access to the instance (impact:access).
  read:
    risks:
      - discovery:policy
      - discovery:account
    notes: Reads the configured admin binding, inventorying the access-control assignment (discovery:policy) and the privileged admin identity itself (discovery:account) as a target for compromise.
  write:
    risks:
      - escalation:privilege
      - escalation:lateral
      - persistence:account
    notes: Creates or updates the AAD administrator, letting an attacker designate an attacker-controlled principal as full instance admin (escalation:privilege), gaining admin over all instance data (escalation:lateral) and establishing durable privileged access (persistence:account); also overwrites the legitimate admin.
