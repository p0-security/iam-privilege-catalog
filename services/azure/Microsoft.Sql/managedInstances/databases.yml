name: Azure SQL Managed Database
description: A database hosted on an Azure SQL Managed Instance, holding production organizational data for a single application or function.
scope: HIGH
notes: Production data store; the data plane holds sensitive organizational data, while the control plane manages the database resource configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - impact:dos
    notes: Deleting a managed database destroys all organizational data it holds (mitigated only by backups) and removes the service supporting that function, causing denial of service.
  read:
    risks:
      - discovery:infra
    notes: Control-plane get returns the managed database's configuration/metadata (not the row data inside), enabling reconnaissance/inventory of the database resource.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Create/update alters database configuration/operational state and can provision new billable database resources on the production instance.
