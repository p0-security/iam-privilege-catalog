name: Azure SQL recoverable managed databases
description: The inventory of recoverable (including dropped/backed-up) databases on an Azure SQL Managed Instance, available for restore.
scope: LOW
notes: Listing exposes database/backup existence and names but not their contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Listing recoverable managed databases enumerates the stored database/backup inventory (including dropped databases), giving an attacker reconnaissance of available data targets without exposing contents.
