name: Azure SQL Managed Instance DNS alias
description: A friendly, CNAME-style DNS name that maps to an Azure SQL Managed Instance endpoint, allowing clients to connect using a stable alias rather than the instance's native hostname.
scope: HIGH
notes: Controlling an alias controls where client connection traffic for a database endpoint resolves; aliases can be transferred (acquired) between instances.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting a DNS alias removes the connection endpoint name clients depend on, breaking name resolution to the managed instance and denying service to dependent applications.
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Listing/getting DNS aliases enumerates the connection endpoint names mapped to the managed instance, providing network/endpoint reconnaissance with no data access.
  write:
    risks:
      - takeover:domain
      - impact:manipulation
    notes: Creating/updating a DNS alias controls the name clients use to reach the managed instance, letting an attacker redirect database client connection traffic to an instance they control.
