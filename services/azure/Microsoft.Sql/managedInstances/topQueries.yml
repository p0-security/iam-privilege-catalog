name: Azure SQL managed instance top queries
description: Top resource-consuming query text and statistics for an Azure SQL managed instance.
scope: MEDIUM
notes: Query text can expose schema, table/column names, and potentially literal values referenced in queries, leaking stored-data structure.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Retrieving the top resource-consuming queries exposes query text revealing schema and data references for reconnaissance of the managed instance's databases.
