name: Azure SQL instance pool
description: An instance pool is a SQL resource that provides reserved, pre-provisioned compute capacity within which multiple Azure SQL Managed Instances can be deployed cost-effectively.
scope: HIGH
notes: Control-plane resource that underpins managed-instance database hosting for a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting an instance pool destroys the compute infrastructure hosting managed instances, disrupting the dependent database service.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading an instance pool returns its control-plane configuration, enabling infrastructure reconnaissance without exposing data or secrets.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating or updating an instance pool alters production database compute infrastructure configuration and can provision costly reserved capacity.
