name: Azure SQL recoverable database
description: The list and properties of recoverable Azure SQL databases (including dropped databases) available for restore on an Azure SQL server.
scope: LOW
notes: Read-only inventory of database objects available for recovery; does not return database contents or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Lists/gets recoverable databases, enumerating the database objects (including dropped ones) on a server, constituting data-store inventory reconnaissance.
