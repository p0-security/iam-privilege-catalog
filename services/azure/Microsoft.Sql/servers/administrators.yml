name: Azure SQL server Azure AD administrator
description: The Azure Active Directory administrator binding for an Azure SQL logical server, designating the identity that holds full administrative control over the server and all its databases.
scope: CRITICAL
notes: This is an access-control assignment pointing at a highly privileged identity; controlling it grants full server/database admin authority.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deletes the Azure AD administrator binding, removing the access-control assignment (policy destruction) and denying the legitimate administrator their authorized access.
  write:
    risks:
      - escalation:privilege
      - escalation:lateral
    notes: Adds/updates the Azure AD administrator, letting an attacker designate a controlled identity as full server admin, granting privileged data/control access (escalation) and access via another identity (lateral movement).
