name: Azure SQL DB outbound firewall rule
description: Outbound (egress) firewall rules form the allowlist of external FQDN destinations a production Azure SQL server is permitted to send data to; they act as a data-exfiltration-prevention control.
scope: HIGH
notes: Egress allowlists on a production database server are a defensive boundary; their integrity gates where data may flow.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting an outbound firewall rule removes part of the egress-restriction control that constrains where the server can send data, dismantling a data-exfiltration-prevention defense.
  read:
    risks:
      - discovery:network
    notes: Reading the outbound firewall rules inventories the SQL server's permitted egress destinations, revealing the exfiltration-prevention posture and any gaps for reconnaissance.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating an outbound firewall rule lets an attacker add a permissive egress destination, weakening the exfiltration-prevention defense and manipulating the egress security configuration to open a new outbound path.
