name: Azure SQL Server
description: An Azure SQL logical server that hosts one or more production SQL databases and governs their admin login, identity, networking, and encryption configuration.
scope: CRITICAL
notes: A primary production data store; control over the server confers broad control over hosted databases and their data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:encryption
      - impact:manipulation
    notes: Creating/updating the TDE certificate replaces the encryption key material protecting data at rest, enabling ransomware-style key control and manipulation of the server's encryption configuration.
