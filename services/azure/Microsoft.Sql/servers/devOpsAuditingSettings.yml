name: Server DevOps audit policy
description: The server DevOps audit policy configures auditing of DevOps actions on an Azure SQL server, including whether auditing is enabled and where audit logs are sent.
scope: MEDIUM
notes: Audit/logging configuration relevant to detection and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Changing the policy lets an attacker disable or redirect DevOps audit logging, suppressing collection and undermining a detection/defense mechanism to evade incident response.
