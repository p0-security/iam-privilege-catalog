name: Azure SQL disaster recovery configuration
description: Geo-replication / failover (disaster recovery) configuration for an Azure SQL server, defining replication relationships and partner servers for a production database service.
scope: HIGH
notes: Governs availability and recoverability of a production database; modifying it affects business continuity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Triggers a planned failover, forcing a primary/secondary role switch that disrupts active connections and operations of the production database during the transition.
