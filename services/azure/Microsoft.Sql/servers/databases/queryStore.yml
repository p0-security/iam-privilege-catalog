name: Query Store settings
description: Query Store performance-monitoring configuration for an Azure SQL Database (capture mode, retention), an operational/diagnostic tuning setting.
scope: MEDIUM
notes: Configuration metadata for performance telemetry; does not contain stored business data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns Query Store configuration values, low-value reconnaissance of the database's performance-monitoring setup.
  write:
    risks:
      - impact:manipulation
    notes: Updating Query Store settings alters operational/diagnostic capture configuration (e.g., disabling query-history capture), tampering with telemetry without directly touching data or security policy.
