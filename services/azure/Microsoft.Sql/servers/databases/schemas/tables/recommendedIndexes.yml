name: Recommended index
description: Index recommendations for an Azure SQL database, scoped to specific schemas, tables, and columns, generated by the automatic tuning advisor.
scope: HIGH
notes: Recommendations reveal schema/table/column structure of a single database but no row data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Applies an index recommendation, altering the production database's physical configuration (creating/changing indexes), which modifies operational behavior and can degrade performance or consume resources.
