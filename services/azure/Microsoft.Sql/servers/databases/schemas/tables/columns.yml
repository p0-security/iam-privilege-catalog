name: Azure SQL Database column
description: A column definition within a table of an Azure SQL Database, exposed via the control plane as schema metadata (column name, data type) rather than the stored row values.
scope: MEDIUM
notes: Schema metadata maps where sensitive data lives but does not return the data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Reading a column definition lets an attacker inventory table structure to locate sensitive fields; it returns structural metadata, not row data.
