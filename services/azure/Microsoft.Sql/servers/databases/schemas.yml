name: Azure SQL Database schema
description: A schema (logical structure / object grouping) within an Azure SQL Database, exposed via the control plane as structural metadata rather than stored data.
scope: MEDIUM
notes: Schema metadata helps map where sensitive data resides but does not return the data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Reading a database schema enumerates structural metadata, letting an attacker map where sensitive objects reside without returning row data.
