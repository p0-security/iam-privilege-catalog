name: Azure SQL database service tier advisors
description: Service tier advisors return recommendations to scale a database up or down based on aggregate query-execution statistics, for performance/cost tuning.
scope: LOW
notes: Low-sensitivity operational advisory metadata derived from usage statistics.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading scaling recommendations exposes performance/cost advisory metadata derived from query statistics, low-sensitivity reconnaissance.
