name: Database Advanced Threat Protection settings
description: Database Advanced Threat Protection settings are the per-database toggle controlling whether Microsoft Defender threat detection/alerting is enabled on a SQL database.
scope: MEDIUM
notes: A resource-scoped defensive monitoring control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading the database ATP settings reveals whether threat protection is enabled, letting an attacker identify monitored versus blind databases before acting; returns no data or secrets.
  write:
    risks:
      - destruction:defense
    notes: Updating the database ATP settings lets an attacker disable Defender threat detection/alerting on the database, removing a defensive monitoring mechanism to evade detection.
