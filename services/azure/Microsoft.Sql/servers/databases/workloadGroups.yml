name: SQL data warehouse workload group
description: A data-warehouse workload-management workload group on an Azure SQL database, governing CPU/memory/concurrency resource allocation for query workloads.
scope: HIGH
notes: Controls resource governance; misconfiguration or removal degrades query performance for the workload.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Drops a workload group, removing resource-governance allocations and disrupting the prioritized query workloads that depend on it.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Sets workload-group properties controlling CPU/memory/concurrency, letting an attacker alter resource-governance config and starve or throttle legitimate query workloads.
