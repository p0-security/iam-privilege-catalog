name: Azure SQL Database metric definitions
description: Read-only listing of the types/schema of metrics available for an Azure SQL database (metric names, units, aggregation types), not the metric values themselves.
scope: LOW
notes: Monitoring schema metadata only; low inherent sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Lists the available metric types for databases, inventorying monitoring schema metadata without revealing actual usage values or stored data.
