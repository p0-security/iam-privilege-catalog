name: Azure SQL Database
description: An Azure SQL Database is a managed relational database hosted on a logical SQL server, storing production organizational data for an application or function.
scope: HIGH
notes: Control-plane operations manage the database resource and its configuration; the row data itself is on the data plane. The asset typically backs a single production function, hence HIGH.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:data
    notes: Exporting the database to a bacpac produces a full copy of all stored data to a storage target, directly enabling bulk data exfiltration.
