name: Database restore point
description: A database restore point is a recovery snapshot/timestamp of a SQL database used to restore it to a prior state.
scope: MEDIUM
notes: Backup/recovery artifact; enumerating it reveals the database's recoverable data state and backup posture.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:spend
    notes: Creating a restore point adds a recovery snapshot and only consumes incremental backup storage; it neither reads, alters, nor destroys data, so its sole minor abuse is incidental storage spend.
    name: Azure SQL Database
    parent:
      description: An Azure SQL Database is a managed relational database hosted on a logical SQL server, storing production organizational data for an application or function.
      notes: Control-plane operations manage the database resource and its configuration; the row data itself is on the data plane. The asset typically backs a single production function, hence HIGH.
  delete:
    risks:
      - destruction:data
    scope: HIGH
    notes: Deleting a restore point destroys a recovery snapshot, removing the backup that would mitigate data destruction/ransomware and degrading recoverability.
  read:
    risks:
      - discovery:data
    notes: Listing restore points enumerates available recovery snapshots and their timestamps, inventorying recoverable data state without returning the data itself.
