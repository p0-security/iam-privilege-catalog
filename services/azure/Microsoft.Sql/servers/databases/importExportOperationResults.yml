name: SQL database import/export operations
description: Represents the status and results of in-progress import or export (BACPAC data-movement) operations on an Azure SQL database.
scope: LOW
notes: Read-only operation-status resource; exposes management activity metadata, not database data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Polls in-progress import/export job status, exposing only operational metadata about ongoing data-movement activity.
