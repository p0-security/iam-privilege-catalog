name: Azure SQL Database operation status
description: Read-only endpoints that return the progress/result status of asynchronous (long-running) Azure SQL database operations.
scope: LOW
notes: Operation-status polling endpoints that expose only operation state, not database data or configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the status of an in-flight database async operation; a status-polling read exposing no sensitive data or configuration.
