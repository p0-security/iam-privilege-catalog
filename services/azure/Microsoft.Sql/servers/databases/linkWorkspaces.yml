name: SQL database Synapse Link workspaces
description: The Synapse Link workspaces associated with an Azure SQL database — the linked Synapse analytics workspaces that consume the database's change feed/data for downstream analytics.
scope: LOW
notes: Read-only enumeration of linked analytics integrations; reveals connected resources but no data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Listing/getting the Synapse Link workspaces for a database enumerates linked analytics infrastructure and data-flow relationships for reconnaissance, without returning data or credentials.
