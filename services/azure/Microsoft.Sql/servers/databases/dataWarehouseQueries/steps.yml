name: Azure SQL data warehouse query step
description: Distributed query step (execution plan) details for a data warehouse query on an Azure SQL database.
scope: MEDIUM
notes: Query step details expose query plan/structure and table/column references, revealing the data schema and operational query patterns.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Reading distributed query-step details can reveal query plan, table/column names, and structure of the underlying warehouse data.
