name: SQL database short-term retention policy
description: The short-term (point-in-time) backup retention policy for an Azure SQL database, defining how many days of automated backups are kept for point-in-time restore.
scope: LOW
notes: This is a recovery-posture configuration object; its read exposes backup window settings and its write can weaken the recovery safety net.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads the short-term backup retention configuration, revealing the database's point-in-time recovery window without exposing data or credentials.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    scope: HIGH
    notes: Updating the policy lets an attacker shrink the point-in-time restore window, weakening the backup defense that mitigates data destruction/ransomware while altering an operational protection setting on a production database.
