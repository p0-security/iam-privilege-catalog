name: Azure SQL Sync Member Database schema
description: The Azure SQL Sync Member database schema is the enumerated table/column structure of a database participating in a sync group, used to configure synchronization.
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Listing sync member database schemas discloses the table/column structure of the synced production database, aiding reconnaissance of where sensitive data lives.
