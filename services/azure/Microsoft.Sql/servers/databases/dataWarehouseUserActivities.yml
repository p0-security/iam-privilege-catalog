name: SQL Data Warehouse user activities
description: User activity records for an Azure Synapse / SQL Data Warehouse instance, including currently running and suspended queries. Reflects in-flight operational query workload against a production analytics database.
scope: HIGH
notes: Query activity can expose table/column references and access patterns over a production analytics datastore.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Retrieves running and suspended queries, revealing in-flight query text, target objects, and activity patterns that disclose what data exists and is being processed; it does not return underlying row data.
