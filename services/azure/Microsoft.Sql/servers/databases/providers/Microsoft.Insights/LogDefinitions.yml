name: Database log definitions
description: Catalog of available log categories (logging schema) for an Azure SQL database.
scope: LOW
notes: Read-only logging metadata; no access to actual log content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Lists the available log categories for databases, a read-only logging-schema inventory enabling detection-coverage reconnaissance without exposing log content.
