name: Azure SQL Sync Group
description: An Azure SQL Data Sync group defines a hub-and-member data replication topology that synchronizes table data between a hub database and one or more member databases. It is a control-plane configuration object on a production database.
scope: HIGH
notes: Sync groups govern the flow of operational data between databases; misconfiguration can redirect, overwrite, or disrupt replication of a single organizational function's data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a sync group tears down the replication relationship, destroying the sync configuration and disrupting ongoing data synchronization between the hub and member databases.
  write:
    risks:
      - impact:manipulation
      - exfiltration:data
    notes: Creating/updating a sync group defines which databases replicate, the direction, and conflict resolution; an attacker can reshape operational data flow and add a member pointing at a database they influence to siphon synced production data.
