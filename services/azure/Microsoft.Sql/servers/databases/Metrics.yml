name: Azure SQL Database metrics
description: Read-only access to the actual metric values (DTU/throughput, storage, connections, utilization) for an Azure SQL database.
scope: MEDIUM
notes: Operational telemetry useful for reconnaissance of database activity and capacity; does not expose stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns actual database performance/utilization metrics, enabling reconnaissance of database activity and infrastructure usage patterns.
