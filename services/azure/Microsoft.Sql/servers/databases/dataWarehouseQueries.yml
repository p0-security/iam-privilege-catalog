name: Azure SQL data warehouse query
description: Diagnostic information about a distribution query executed against an Azure SQL data warehouse (Synapse / dedicated SQL pool) database, identified by query ID.
scope: MEDIUM
notes: Returns query execution/distribution metadata (plan internals), not the underlying stored row data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the distribution query information for a query ID is read-only reconnaissance of query execution internals and operational metadata, not retrieval of stored data.
