name: Database long-term retention policy
description: The long-term retention (LTR) policy of an Azure SQL database, defining how long weekly/monthly/yearly backups are retained.
scope: HIGH
notes: A recoverability control; weakening retention undermines the backup safeguard that mitigates data destruction and ransomware.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Setting the LTR policy lets an attacker shorten or disable backup retention, manipulating the recoverability configuration that protects the database's data.
