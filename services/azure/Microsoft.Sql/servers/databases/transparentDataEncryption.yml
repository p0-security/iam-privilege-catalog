name: Azure SQL Database Transparent Data Encryption
description: Transparent Data Encryption (TDE) configuration for an Azure SQL logical database, controlling encryption-at-rest of the database's data files, logs, and backups.
scope: HIGH
notes: TDE is a data-protection defense control on a single production database; the resource type governs the encryption-at-rest state but does not itself hold or return key material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only retrieval of a database's TDE configuration reveals whether encryption-at-rest is enabled and which key protects it, providing reconnaissance of the data-protection posture without returning key material.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Updating TDE lets an attacker disable encryption-at-rest (removing a data-protection defense) and otherwise alter the database's encryption security configuration.
