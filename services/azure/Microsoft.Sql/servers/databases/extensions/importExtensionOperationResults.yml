name: Azure SQL database import operation results
description: Async operation-status resource tracking the progress of an in-progress database import (import-extension) operation.
scope: LOW
notes: Operation-status endpoints return only operation state, not the imported data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the status of an in-progress database import; exposes no data or configuration in isolation.
