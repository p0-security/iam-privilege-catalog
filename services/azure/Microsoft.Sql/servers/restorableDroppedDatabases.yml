name: Restorable dropped database
description: The collection of databases that were dropped on a server but remain recoverable within the retention/restore window.
scope: LOW
notes: Listing enumerates recoverable (deleted-but-retained) data stores without returning their contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Lists dropped-but-restorable databases, inventorying recoverable data stores still within retention as potential restore/exfiltration targets.
