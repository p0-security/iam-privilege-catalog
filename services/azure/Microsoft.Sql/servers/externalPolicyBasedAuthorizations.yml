name: SQL server external policy-based authorization
description: The external policy-based authorization configuration on an Azure SQL logical server, binding an external authorization provider/policy that governs who is authorized to access the database server.
scope: CRITICAL
notes: This is the authorization control-plane configuration governing access to a production database server.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deleting the external policy-based authorization removes an access-control policy; when it would otherwise deny access this enables privilege escalation, and it can also revoke legitimate users' authorized access.
  read:
    risks:
      - discovery:policy
    scope: HIGH
    notes: Reading the external policy-based authorization property exposes the access-control/authorization configuration of the SQL server, letting an attacker identify weak points.
  write:
    risks:
      - escalation:privilege
      - impact:manipulation
    notes: Adding/updating the external policy-based authorization alters the authorization mapping governing database access, enabling an attacker to grant attacker-controlled principals access (privilege escalation) and manipulate the authorization configuration.
