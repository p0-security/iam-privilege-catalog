name: Azure SQL job agent private endpoints
description: Private endpoint connections that provide private-network connectivity to an Azure SQL server's job agent (elastic job automation).
scope: HIGH
notes: Private endpoints govern private-link network access to the database service; their configuration is supporting network connectivity infrastructure for a single SQL server.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a private endpoint removes a network connectivity component, disrupting private access to the SQL job agent service (DoS-like effect).
  read:
    risks:
      - discovery:network
    scope: MEDIUM
    notes: Reading a private endpoint configuration lets an attacker inventory the SQL job agent's private network connectivity (target service, connection state).
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating a private endpoint can establish private-network connectivity to reach the SQL job agent from attacker-controlled network resources and alters the resource's network configuration.
