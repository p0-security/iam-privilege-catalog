name: Azure SQL DB job execution
description: An Azure SQL Database elastic-job (job agent) execution record, representing a run of a scheduled T-SQL automation job against target databases.
scope: MEDIUM
notes: Elastic jobs run T-SQL across many databases under the job agent's identity; their execution metadata reveals the automation footprint and target topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Getting a single job execution returns its run status and details, providing reconnaissance into the job automation.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    scope: HIGH
    notes: Creating/updating a job execution triggers the elastic job to run its configured T-SQL steps against all target databases under the job agent's credential, letting an attacker manipulate operational data and consume database compute to run the job-defined workload at scale.
