name: Azure SQL DB job version
description: A versioned definition of an Azure SQL DB elastic job, capturing the historical configuration of a scheduled T-SQL automation job.
scope: MEDIUM
notes: Job definitions can include the configured T-SQL actions and target groups, revealing what the automation does.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading a job version exposes the job's configured definition/history, inventorying the automation logic operating against databases.
