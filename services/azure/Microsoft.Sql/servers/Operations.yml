name: SQL Server operations
description: The management-operation history/status records for an Azure SQL logical server (operations performed against the server).
scope: LOW
notes: Read-only operational activity metadata; no data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Listing operations on a logical SQL server only enumerates management activity history, low-value reconnaissance.
