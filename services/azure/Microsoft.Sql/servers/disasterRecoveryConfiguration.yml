name: Azure SQL disaster recovery configuration
description: Geo-replication / failover (disaster recovery) configuration for an Azure SQL server, defining replication relationships and partner servers for a production database service.
scope: HIGH
notes: Governs availability and recoverability of a production database; modifying it affects business continuity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deletes the DR configuration, removing the geo-replication/failover resilience infrastructure and degrading availability and recoverability of the production database.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Creating or changing the DR configuration alters replication/failover relationships, allowing an attacker to repoint or break replication and disrupt availability/recoverability of the production database.
