name: SQL Server inaccessible databases
description: The list of databases in an inaccessible state on an Azure SQL logical server (enumeration of database objects, not their contents).
scope: LOW
notes: Enumerates existence/names/state of databases without exposing stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Listing inaccessible databases on a logical server enumerates database data stores without exposing their contents.
