name: SQL server private link resources
description: The private-link sub-resource group IDs (e.g. sqlServer) that an Azure SQL server exposes for private endpoint connections.
scope: LOW
notes: Read-only enumeration of available private-network connectivity targets for the server.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Lists the private link resources (group IDs) available for the SQL server, enumerating private-network connectivity targets useful for topology mapping.
