name: SQL Server Advanced Threat Protection settings
description: The Advanced Threat Protection (Microsoft Defender for SQL) settings on an Azure SQL server, controlling whether threat detection and security alerting are enabled for the server and its databases.
scope: HIGH
notes: A security monitoring/defense control for a production database server; disabling it blinds detection of malicious activity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:defense
    notes: Updating ATP settings lets an attacker disable threat detection/alerting on the SQL server, suppressing alerts for malicious database activity to evade detection.
