name: Azure SQL Data Sync Agent linked databases
description: The set of databases linked to an Azure SQL Data Sync agent for participation in synchronization.
scope: LOW
notes: Enumerates which data stores participate in sync; reveals data-store targets, not their contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Listing the databases linked to a sync agent inventories which data stores participate in synchronization, a data-resource enumeration.
