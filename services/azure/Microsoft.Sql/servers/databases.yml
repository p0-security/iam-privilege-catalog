name: Azure SQL Database
description: An Azure SQL Database is a managed relational database hosted on a logical SQL server, storing production organizational data for an application or function.
scope: HIGH
notes: Control-plane operations manage the database resource and its configuration; the row data itself is on the data plane. The asset typically backs a single production function, hence HIGH.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - impact:dos
    notes: Deletes the database and all its stored data, causing irrecoverable data loss (absent a separate backup/restore path) and interrupting the function it backs.
  write:
    risks:
      - impact:manipulation
    notes: Creates or updates the database's ARM properties, including SKU/tier, read-scale, zone redundancy, and transparent data encryption settings; an attacker can degrade the service (config drift) or weaken TDE-related protections on stored data.
