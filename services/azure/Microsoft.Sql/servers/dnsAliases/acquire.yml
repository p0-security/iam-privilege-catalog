name: Azure SQL Database server DNS alias
description: A SQL server DNS alias is a stable CNAME-like DNS name that maps clients to an Azure SQL logical server, allowing the underlying server to change without updating connection strings.
scope: HIGH
notes: Controlling an alias controls the connection endpoint clients resolve to reach production databases; it is effectively a routing/domain control for the database service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - takeover:domain
      - impact:manipulation
    notes: Acquiring an existing alias from its current server and repointing it to another server hijacks the stable connection endpoint, silently redirecting client traffic to an attacker-chosen SQL server (and denying the legitimate one).
