name: SQL server threat detection policy operation results
description: The asynchronous operation-status result for a prior write to a SQL server's threat-detection (security alert) policy. Returns the completion state of that long-running configuration operation.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the async operation status of a threat-detection policy write; returns completion state rather than policy content, so it is inert in isolation.
