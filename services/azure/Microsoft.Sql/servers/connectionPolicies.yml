name: SQL Server connection policy
description: The server connection policy controls how clients connect to an Azure SQL server (Default/Proxy/Redirect connection type).
scope: HIGH
notes: Read-only config of a production SQL server's client connectivity routing.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Creates/updates the connection policy, altering how clients route to the production SQL server (e.g., forcing Proxy/Redirect), modifying operational connectivity configuration.
