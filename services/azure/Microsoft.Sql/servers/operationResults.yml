name: Azure SQL server operation result
description: The transient status/result of an asynchronous long-running control-plane operation on an Azure SQL server.
scope: LOW
notes: Returns only operation-progress state; low sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reading in-progress server operation results returns only async operation status/progress, granting no meaningful attacker capability in isolation.
