name: Azure SQL elastic pool operations
description: Represents asynchronous management operations performed on an Azure SQL Database elastic pool (a shared resource pool for production databases).
scope: LOW
notes: Control-plane operations affecting a production database tier supporting a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists management operations performed on the elastic pool, providing read-only reconnaissance of management activity and configuration history.
