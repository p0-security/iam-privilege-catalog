name: Elastic pool metric definitions
description: Catalog of metric types (monitoring/telemetry schema) available for an Azure SQL Database elastic pool.
scope: LOW
notes: Read-only monitoring metadata; no access to actual metric values or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Returns the available metric type definitions for elastic pools, exposing only monitoring schema metadata with no metric values.
