name: Azure SQL elastic pool metrics
description: Read-only access to the actual metric values (resource utilization, capacity, throughput) for an Azure SQL elastic database pool.
scope: MEDIUM
notes: Operational telemetry useful for reconnaissance of infrastructure usage and sizing; does not expose stored database data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns actual elastic pool utilization/performance metrics, enabling reconnaissance of infrastructure usage and capacity for a database function.
