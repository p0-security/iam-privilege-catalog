name: Azure SQL elastic pool activity
description: Operational activity and details for an Azure SQL elastic database pool (scaling/operation history and resource configuration of the pool).
scope: MEDIUM
notes: Exposes operational/diagnostic metadata about the pool, not the stored data within its databases.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only retrieval of elastic pool activity/operation history, reconnaissance of supporting database infrastructure configuration.
