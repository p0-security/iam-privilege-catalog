name: Azure SQL elastic pool operations
description: Represents asynchronous management operations performed on an Azure SQL Database elastic pool (a shared resource pool for production databases).
scope: HIGH
notes: Control-plane operations affecting a production database tier supporting a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Cancels a pending async management operation (e.g. an in-flight scaling/maintenance action) on the elastic pool, disrupting intended administrative operations.
