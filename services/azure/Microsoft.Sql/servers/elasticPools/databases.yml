name: Azure SQL elastic pool databases
description: The collection of Azure SQL Databases contained within an elastic pool on a server.
scope: LOW
notes: Listing enumerates data-store names/configuration without returning their contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: Lists the databases in an elastic pool, inventorying the stored data stores on the server as targets without disclosing their contents.
