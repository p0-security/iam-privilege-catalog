name: Azure SQL elastic pool database activity
description: Operational activity and details for an individual database that is part of an Azure SQL elastic database pool.
scope: MEDIUM
notes: Exposes operational/diagnostic metadata about the database within the pool, not its stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only retrieval of per-database activity within an elastic pool, reconnaissance of database operations and configuration.
