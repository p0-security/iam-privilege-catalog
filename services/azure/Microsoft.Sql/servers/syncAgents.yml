name: Azure SQL Data Sync Agent
description: SQL Data Sync agent registered on an Azure SQL logical server, bridging on-premises/hybrid databases into Data Sync groups for cross-database replication.
scope: HIGH
notes: Supporting data-replication infrastructure; the registration key is a credential into the sync trust boundary.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a sync agent removes the Data Sync infrastructure component, disrupting database synchronization for the affected databases.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Read-only listing/get of sync agent properties, inventorying data-sync infrastructure configuration without returning credentials.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a sync agent alters the Data Sync configuration governing cross-database replication, manipulating the operational sync topology.
