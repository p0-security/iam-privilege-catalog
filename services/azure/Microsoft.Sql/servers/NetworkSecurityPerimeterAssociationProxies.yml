name: Network Security Perimeter association proxy
description: A Network Security Perimeter (NSP) association proxy binds an Azure SQL server into a network security perimeter and defines its access/enforcement mode, forming a network-isolation defense boundary.
scope: HIGH
notes: NSP associations are a network-isolation defense; their configuration reveals or governs the network boundary protecting a production database server.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Sql
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - escalation:network
    notes: Dropping the NSP association removes the SQL server from its network security perimeter, tearing down the network-isolation defense and re-exposing the server to broader network reachability.
  read:
    risks:
      - discovery:network
    notes: Reading the NSP association inventories whether and how the SQL server is bound to its network-isolation perimeter and its enforcement mode, mapping the defensive network boundary for reconnaissance.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating the NSP association can change the perimeter binding or switch to a learning/transition mode, weakening the network-isolation defense and manipulating the server's network access-control configuration.
