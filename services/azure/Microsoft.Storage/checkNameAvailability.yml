name: Storage account name availability
description: An operation that checks whether a proposed storage account name is valid and not already in use.
scope: LOW
notes: Returns availability/validity; can be used to probe existence of account names.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Checking name availability can confirm whether a given storage account name already exists, leaking minor existence/inventory information about deployed accounts.
