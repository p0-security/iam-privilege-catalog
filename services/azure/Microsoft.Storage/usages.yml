name: Storage usage metrics
description: Per-location and subscription-level storage resource quota limits and current usage counts for the subscription.
scope: LOW
notes: Read-only quota/capacity metadata; low sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns subscription-level quota limits and current usage counts, letting an attacker inventory provisioned storage capacity and headroom.
