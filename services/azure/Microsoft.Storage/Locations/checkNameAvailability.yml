name: Storage account name availability
description: A global helper that validates whether a candidate storage account name is syntactically valid and not already in use.
scope: LOW
notes: Operates on the global account namespace, not any organizational asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only an availability boolean; an inert provisioning helper granting no meaningful attacker capability.
