name: ActionsRP operation status
description: An internal resource-provider record tracking the progress/result of an asynchronous (long-running) Azure Storage Actions operation.
scope: LOW
notes: Service-internal control-plane bookkeeping; it conveys no access to organizational data, identities, or real resources.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Trivial polling of an async operation-status record; returns only long-running-operation state and discloses no sensitive data or configuration.
  write:
    risks: []
    notes: Creates/updates an internal async operation-status bookkeeping record; in isolation it mutates no organizational resource or data and grants no attacker capability.
