name: Deleted storage accounts
description: Soft-deleted Azure Storage accounts that remain recoverable for a retention window at the subscription level.
scope: LOW
notes: Read-only listing exposes inventory of previously existing storage infrastructure, no data or credential access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists soft-deleted storage accounts, letting an attacker inventory previously existing/recoverable storage infrastructure.
