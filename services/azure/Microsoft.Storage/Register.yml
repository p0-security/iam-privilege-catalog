name: Microsoft.Storage provider registration
description: A control-plane operation on the Microsoft.Storage resource provider that registers a subscription with the provider.
scope: LOW
notes: An idempotent prerequisite enablement step; grants no data access and does not alter access-control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Provider-registration no-op that enables creation of storage accounts for a subscription but confers no attacker-relevant capability in isolation; later account creation requires separate write permissions.
