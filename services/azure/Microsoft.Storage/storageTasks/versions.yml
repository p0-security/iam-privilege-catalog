name: Storage tasks
description: A storage task (Azure Storage Actions) is a reusable definition of conditions and operations (set blob tier/tags/immutability/legal-hold, undelete, delete) that can be executed in bulk against storage account blobs; versions are its definition history.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists versions of a storage task definition, exposing the configured conditions/operations history as read-only reconnaissance of the automation.
