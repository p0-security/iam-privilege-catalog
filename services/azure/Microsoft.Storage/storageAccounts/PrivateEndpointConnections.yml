name: Storage Account Private Endpoint Connection
description: Private endpoint connections binding a private-link endpoint to a storage account, including their approval state, controlling private network access to the account.
scope: HIGH
notes: These control-plane objects gate private network connectivity to a production storage account; approving or removing them changes which networks can reach the account.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deletes a private endpoint connection, removing a private-link binding and disrupting private connectivity to the storage account.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creates or approves a private endpoint connection, letting an attacker attach/expose the storage account to a controlled private network and alter the connection's approval state.
