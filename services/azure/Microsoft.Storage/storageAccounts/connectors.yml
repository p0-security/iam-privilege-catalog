name: Storage Connector
description: A storage connector is a control-plane sub-resource of a storage account that defines a data-movement/integration connection wiring the storage account to other data sources or sinks.
scope: MEDIUM
notes: Supporting integration configuration rather than a primary data store; it governs how data flows in and out of a single storage account.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a connector tears down the integration configuration, disrupting dependent data flows (DoS-like effect) without touching underlying stored data.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Listing or getting connector properties enumerates connector configuration, providing infrastructure reconnaissance with no secret material returned.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating a connector alters the account's connection/data-flow configuration, letting an attacker reconfigure or redirect how data moves through the storage account.
