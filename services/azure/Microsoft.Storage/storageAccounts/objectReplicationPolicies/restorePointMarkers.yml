name: Object replication restore point marker
description: A marker that creates an object-replication restore point, part of a storage account's blob replication/recovery configuration.
scope: MEDIUM
notes: Supporting data-protection/recovery configuration, not primary data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Creating a restore-point marker writes to replication/recovery configuration, manipulating supporting data-management infrastructure.
