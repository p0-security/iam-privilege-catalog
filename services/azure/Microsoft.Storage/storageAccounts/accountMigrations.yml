name: Storage account migration
description: A control-plane resource representing a storage account redundancy/SKU migration and its status.
scope: MEDIUM
notes: Operational migration status/configuration; non-sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: Initiating a redundancy migration (e.g. changing LRS/GRS/ZRS) alters the account's durability configuration as a control-plane manipulation of operational settings.
