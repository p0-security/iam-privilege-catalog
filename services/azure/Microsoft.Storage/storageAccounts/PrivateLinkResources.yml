name: Storage account private link resources
description: The private-link sub-resource group IDs (e.g. blob, file, queue, table) that a storage account exposes for private endpoint connections.
scope: LOW
notes: Read-only connectivity metadata; no data or credential content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Lists the private-link group IDs supported by the account, enabling private-endpoint network reconnaissance.
