name: Storage DataShare
description: A storage data share is a control-plane sub-resource of a storage account that configures sharing of the account's data with recipients, potentially external or cross-tenant.
scope: MEDIUM
notes: Directly governs distribution of a single storage account's organizational data, making it a sensitive data-egress control point.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a data share removes the sharing configuration, disrupting downstream consumers that depend on the share, but does not delete the underlying stored data.
  write:
    risks:
      - exfiltration:data
      - impact:manipulation
    scope: HIGH
    notes: Creating or updating a data share can expose the account's data to attacker-controlled recipients (data egress channel) and alters the sharing configuration.
