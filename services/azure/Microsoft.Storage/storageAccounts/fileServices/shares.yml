name: Azure file share
description: An Azure Files share within a storage account that holds production file data accessible over SMB/NFS.
scope: HIGH
notes: Production data store backing a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deletes the file share and all file data it contains, destroying organizational data unless backed up.
  write:
    risks:
      - impact:manipulation
    notes: Create/update of share configuration (quota, tier, metadata, access settings) alters operational settings of a production data store.
