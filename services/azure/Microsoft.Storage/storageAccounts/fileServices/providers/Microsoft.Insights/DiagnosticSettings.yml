name: File service diagnostic settings
description: Diagnostic settings on the file service that control which logs and metrics are collected and where they are routed.
scope: MEDIUM
notes: Detective/monitoring control over file data-access telemetry; reading it reveals coverage but exposes no stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading the file-service diagnostic setting discloses which logs/metrics are collected and where routed, letting an attacker map monitoring coverage before tampering.
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Create/update lets an attacker disable or redirect file access/audit log collection, suppressing telemetry and weakening a detective control over stored files.
