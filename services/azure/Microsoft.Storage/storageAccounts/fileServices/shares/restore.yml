name: Azure file share
description: An Azure Files share within a storage account that holds production file data accessible over SMB/NFS.
scope: HIGH
notes: Production data store backing a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Restores a soft-deleted file share, changing the operational state of the data store by resurrecting a previously removed share.
