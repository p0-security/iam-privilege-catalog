name: Storage account local users (SFTP)
description: A local user identity configured on an Azure Storage account for SFTP/blob access, with its own credentials (password / SSH keys / shared key) and permission scopes.
scope: HIGH
notes: Grants data-plane access to blob/file data of a single storage account; a credentialed identity scoped to one organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns the local user's SSH/shared key credential material, letting an attacker authenticate as that user for SFTP/blob data-plane access.
