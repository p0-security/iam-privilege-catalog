name: Storage table service
description: The table service of a storage account exposes NoSQL key/value table storage and its control-plane properties (CORS, storage analytics logging/metrics settings). The data-plane holds organizational table data.
scope: CRITICAL
notes: Control-plane property reads expose only service configuration, not table data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Returns a user delegation key, cryptographic material that can sign user-delegation SAS tokens granting direct data-plane access to table data under a delegated credential, enabling pivot to data access.
