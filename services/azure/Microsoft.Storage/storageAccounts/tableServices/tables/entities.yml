name: Storage Table entities
description: Azure Table Storage entities — the structured NoSQL records (rows) stored in a storage account's tables.
scope: HIGH
notes: Production data store holding organizational structured data for a single function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Data-plane delete of table entities directly destroys stored organizational data.
  read:
    risks:
      - exfiltration:data
    notes: Data-plane query returns the actual table entity contents, enabling exfiltration of stored organizational data.
  write:
    risks:
      - impact:manipulation
    notes: Insert/merge/update/replace of table entities lets an attacker alter or fabricate stored organizational data.
