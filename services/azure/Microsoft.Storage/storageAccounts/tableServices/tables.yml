name: Storage Tables
description: An Azure Storage Table is a NoSQL key-attribute data store within a storage account that holds structured organizational entity data (rows).
scope: HIGH
notes: Tables are a production data store supporting a single organizational function; their entities can hold confidential application data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Control-plane delete of a table resource destroys the table and all entity data it contains.
  read:
    risks:
      - discovery:data
    notes: Lists/gets table resources, enumerating the data containers present in the account without returning entity contents.
  write:
    risks:
      - impact:manipulation
    notes: Control-plane create/update of a table resource alters the account's data-store structure (provisioning or reconfiguring tables).
