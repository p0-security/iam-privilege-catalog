name: Storage Queue Service Messages
description: Queue messages are the individual data payloads (work items) enqueued in a storage queue for asynchronous processing by downstream consumers.
scope: HIGH
notes: Message payloads may contain sensitive operational data, identifiers, or commands that drive downstream automation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: This data action deletes messages from the queue, destroying organizational data in transit and dropping work items consumers would have processed.
  read:
    risks:
      - exfiltration:data
    notes: This data action returns the contents of a queue message, enabling exfiltration of potentially sensitive payload data.
  write:
    risks:
      - impact:manipulation
    notes: This data action updates message content/visibility, letting an attacker tamper with queued operational data that downstream consumers process.
