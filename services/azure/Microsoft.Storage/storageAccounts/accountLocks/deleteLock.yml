name: Storage account management locks
description: Azure management locks (CanNotDelete/ReadOnly) applied to the storage account, which protect it from modification or deletion.
scope: HIGH
notes: Locks are a deny/protection control guarding a production data store; removing them enables otherwise-blocked destructive actions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:policy
    notes: Removes a management lock protecting the storage account, stripping a deny control that would otherwise block deletion or modification.
