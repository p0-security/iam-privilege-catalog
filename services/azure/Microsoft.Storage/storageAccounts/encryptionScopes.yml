name: Storage account encryption scope
description: An encryption scope defining the key (Microsoft-managed or customer-managed) used to encrypt data written under it within a storage account.
scope: MEDIUM
notes: Configuration reveals which key/Key Vault protects data; reads return no key material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns encryption scope configuration (key source, state, CMK reference), enabling reconnaissance of the encryption setup without exposing key material.
  write:
    risks:
      - impact:encryption
      - impact:manipulation
    scope: HIGH
    notes: Create/update lets an attacker point the scope at a customer-managed key they control, enabling ransomware-style key control over data written under the scope and altering encryption configuration.
