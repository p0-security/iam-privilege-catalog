name: Storage task assignments
description: A storage task assignment binds an Azure Storage Actions task to a storage account, scheduling the task's bulk operations (set blob tier/tags/immutability/legal-hold, undelete, or delete blobs) to run across the account's blobs under a managed identity.
scope: MEDIUM
notes: Although it is a control-plane automation binding, an enabled assignment can execute mutating and destructive operations at scale against production blob data, making the resource more sensitive than ordinary supporting config.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deletes the assignment that binds a storage task to the account, tearing down the configured automation (which may enforce lifecycle/immutability/retention); destroys configuration/infrastructure but not the underlying blob data.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Read-only retrieval of the assignment configuration (bound task, conditions, target/exclude scope, schedule, report location), enabling reconnaissance of the account's data-management automation without exposing blob data or secrets.
  write:
    risks:
      - impact:manipulation
      - destruction:data
    scope: HIGH
    notes: Creating/updating an assignment enables a storage task to execute its operations (SetBlobTier/SetBlobTags/SetBlobImmutabilityPolicy or DeleteBlob) at scale across the account's blobs, enabling mass manipulation and, via DeleteBlob, destruction of organizational data.
