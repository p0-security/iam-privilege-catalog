name: Storage Connector
description: A storage connector is a control-plane sub-resource of a storage account that defines a data-movement/integration connection wiring the storage account to other data sources or sinks.
scope: LOW
notes: Supporting integration configuration rather than a primary data store; it governs how data flows in and out of a single storage account.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:infra
    notes: Testing an existing connector only validates connectivity and returns reachability/status, an inert reconnaissance action that returns no data or credentials.
