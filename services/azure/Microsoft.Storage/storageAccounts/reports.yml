name: Storage task run reports
description: Storage task run reports/statuses record the execution results of Azure Storage Actions tasks against a storage account (objects targeted, operations attempted/succeeded, run status).
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads account-scoped storage task run reports, exposing operational execution status/metadata of automation runs but no blob contents or credentials.
