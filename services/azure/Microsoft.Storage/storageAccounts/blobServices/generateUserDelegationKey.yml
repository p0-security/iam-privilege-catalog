name: Storage Blob Services
description: The control-plane blob service of a storage account, holding service-level configuration such as CORS rules, soft-delete, versioning, change feed, restore policy, and retention settings.
scope: CRITICAL
notes: Control-plane configuration of a single storage account's blob service; reads here do not return blob data or secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - exfiltration:data
      - escalation:lateral
    notes: Returns a user delegation key, exporting cryptographic credential material that can sign SAS tokens granting direct data-plane access to blobs, thereby enabling data exfiltration and acting with delegated access to the underlying data.
