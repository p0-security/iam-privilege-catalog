name: Storage Blob Services
description: The control-plane blob service of a storage account, holding service-level configuration such as CORS rules, soft-delete, versioning, change feed, restore policy, and retention settings.
scope: LOW
notes: Control-plane configuration of a single storage account's blob service; reads here do not return blob data or secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:infra
    notes: An informational get action returning blob service configuration/status metadata, functioning as infrastructure reconnaissance with no secret or blob-data disclosure.
