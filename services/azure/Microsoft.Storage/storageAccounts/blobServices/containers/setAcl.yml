name: Storage Blob Service Containers
description: A blob container is a namespace within an Azure Storage account's blob service that groups and holds blobs, similar to a directory. Containers also carry their own metadata, stored access policies, and immutability/legal-hold protections.
scope: HIGH
notes: Container-level operations affect every blob grouped under the container at once and control the access-policy and immutability settings that govern them; scope matches the underlying blobs.yml rating for consistency.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
      - impact:manipulation
    notes: Sets the container's stored access policy, the named, revocable access-policy definitions that container/blob SAS tokens can reference for their permissions and expiry. An attacker who can write this policy can mint or broaden a policy identifier granting long-lived or overly broad access, which every SAS token scoped to it will then honor, and can do so without minting a new SAS itself, similar in effect to attaching a favorable IAM policy.
