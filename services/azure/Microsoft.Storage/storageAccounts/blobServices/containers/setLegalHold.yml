name: Storage Blob Service Containers
description: A blob container is a namespace within an Azure Storage account's blob service that groups and holds blobs, similar to a directory. Containers also carry their own metadata, stored access policies, and immutability/legal-hold protections.
scope: HIGH
notes: Container-level operations affect every blob grouped under the container at once and control the access-policy and immutability settings that govern them; scope matches the underlying blobs.yml rating for consistency.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    scope: LOW
    notes: Sets a legal hold on the container, blocking deletion of its blobs until cleared. The opposite of clearLegalHold; an attacker's use is limited to nuisance denial of legitimate data lifecycle/deletion operations rather than direct data loss or exposure.
