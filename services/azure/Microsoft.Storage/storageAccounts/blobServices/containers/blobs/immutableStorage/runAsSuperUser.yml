name: Immutable (WORM) blob storage
description: The immutable-storage (WORM) layer of blobs in a storage account, governed by time-based retention and legal-hold policies that prevent modification or deletion.
scope: HIGH
notes: A compliance/anti-ransomware data-protection control over a single storage account's blob data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - destruction:defense
      - destruction:data
      - impact:manipulation
    notes: Super-user action bypasses immutability/WORM and legal-hold protections, defeating the data-protection defense and enabling deletion or overwrite of otherwise-protected blob data.
