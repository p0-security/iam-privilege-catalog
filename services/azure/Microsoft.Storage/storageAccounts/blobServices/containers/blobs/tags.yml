name: Storage blob tags
description: "Blob index tags: user-defined key/value metadata attached to blobs in a storage account's Blob service, used to classify, index, and query stored objects."
scope: HIGH
notes: Data-plane metadata on a production data store; tags can carry sensitive identifiers/classifications.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Storage
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:metadata
    notes: This data action reads blob index tags, exposing object metadata that may contain sensitive identifiers and can be used to locate/filter stored blobs.
  write:
    risks:
      - impact:manipulation
      - destruction:metadata
    notes: This data action overwrites blob index tags, letting an attacker alter or remove the metadata used for indexing, lifecycle, and discovery of blobs, disrupting operational processes.
