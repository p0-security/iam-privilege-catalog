name: Kubernetes userextras impersonation (Arc-connected cluster)
description: The Kubernetes impersonate verb on user-extra attributes for an Azure Arc-connected cluster. It allows the holder to assert arbitrary extra authentication attributes (Impersonate-Extra headers, e.g. scopes/claims) that authorizers and admission webhooks consume in authorization decisions.
scope: CRITICAL
notes: "Impersonation is an identity-spoofing primitive: holding it on users/groups/userextras effectively grants the union of all identities' permissions, up to cluster-admin (system:masters). This is among the most powerful capabilities in a cluster."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
      - escalation:lateral
    notes: Impersonating user-extra attributes lets an attacker forge additional authorization-relevant claims, completing the impersonation chain to assume privileged identities and move laterally.
