name: Kubernetes TokenReviews (Azure Arc connected cluster)
description: TokenReview is a Kubernetes authentication API request object that submits a bearer token to the API server, which validates it and returns whether it is authenticated along with the associated username, UID, groups and audiences.
scope: MEDIUM
notes: A non-persistent request/response (write) object; it validates and reflects identity but does not mint or return new credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:account
    notes: Creating a TokenReview lets an attacker validate a (possibly stolen) bearer token and enumerate the identity, UID and group memberships behind it; it does not return new secret material, so no exfiltration:crypto.
