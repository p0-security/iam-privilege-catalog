name: Arc connected cluster API server health probe (healthz)
description: The Kubernetes API server /healthz health-check endpoints on an Azure Arc-connected cluster, which report liveness/readiness status of the API server and its internal components. These endpoints return only ok/not-ok status indicators, not configuration, data, or credentials.
scope: LOW
notes: Health probes are functionally equivalent to operation-status polls; they expose no sensitive data and grant no actionable attacker capability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reads the autoregister-completion health subcheck, returning only a pass/fail status of an internal startup hook with no exploitable content.
