name: Kubernetes API Priority and Fairness PriorityLevelConfigurations (Arc connected cluster)
description: PriorityLevelConfiguration objects are Kubernetes API Priority and Fairness (APF) control-plane resources that define concurrency shares and queueing for kube-apiserver request handling. Surfaced via Azure Arc on a connected cluster.
scope: HIGH
notes: These objects govern apiserver concurrency/overload protection for the entire cluster control plane; they hold no organizational data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:defense
    notes: Deleting PriorityLevelConfigurations removes apiserver concurrency-control/overload protections, disabling a defense and degrading or denying control-plane availability.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Read-only enumeration of apiserver concurrency/queueing tiers; non-sensitive control-plane configuration reconnaissance.
  write:
    risks:
      - impact:dos
      - impact:manipulation
    notes: Writing PriorityLevelConfigurations changes apiserver concurrency limits and queueing, letting an attacker throttle or exhaust control-plane request capacity (DoS) and manipulate control-plane behavior.
