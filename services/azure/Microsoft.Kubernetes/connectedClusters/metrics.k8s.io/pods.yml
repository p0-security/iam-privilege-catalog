name: Kubernetes pod metrics
description: The metrics.k8s.io pods endpoint exposes read-only per-pod resource-utilization telemetry (CPU/memory) for the connected (Azure Arc) Kubernetes cluster.
scope: LOW
notes: Read-only operational telemetry; no sensitive data or control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading pod metrics returns only resource-usage telemetry and a pod inventory, useful for low-sensitivity reconnaissance of running workloads.
