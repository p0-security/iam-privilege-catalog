name: Kubernetes Events (Arc-connected cluster)
description: Kubernetes Event objects on an Azure Arc-connected cluster, which are operational/audit-style records of cluster activity (scheduling, errors, state changes).
scope: MEDIUM
notes: Events form the cluster's near-term activity trail used for monitoring and incident response.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
    notes: Deleting Events erases the cluster's activity/audit trail, removing evidence of attacker actions and disrupting incident response.
  read:
    risks:
      - discovery:logs
    notes: Reading Events inventories the cluster's activity/diagnostic record, exposing operational state and recent actions for reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Writing Events lets an attacker inject false activity records, polluting the operational trail to mislead operators and monitoring.
