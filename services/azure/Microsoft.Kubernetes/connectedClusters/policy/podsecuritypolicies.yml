name: Kubernetes pod security policies (Arc-connected cluster)
description: PodSecurityPolicies are Kubernetes admission-control objects in an Azure Arc-connected cluster that constrain the security context of pods (e.g. privileged mode, hostPath, host namespaces, runAsRoot), acting as a cluster security/defense mechanism.
scope: HIGH
notes: PSPs are a defensive admission control; their configuration reveals where privileged-pod restrictions are weak.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a PSP removes a pod admission-control defense, lifting restrictions that otherwise block privileged or host-accessing workloads.
  write:
    risks:
      - destruction:defense
      - escalation:privilege
    notes: Creating/updating a PSP lets an attacker author or weaken a permissive admission policy (permit privileged/hostPath/host-namespace pods), disabling a cluster defense and enabling container breakout to node/cluster escalation.
