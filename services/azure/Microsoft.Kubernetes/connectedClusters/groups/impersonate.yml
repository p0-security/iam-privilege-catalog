name: Kubernetes group impersonation (Arc-connected cluster)
description: The Kubernetes impersonate verb on group identities for an Azure Arc-connected cluster. It allows the holder to assert arbitrary group memberships (via Impersonate-Group headers) when making API requests, inheriting the RBAC bound to those groups.
scope: CRITICAL
notes: "Impersonation is an identity-spoofing primitive: holding it on users/groups/userextras effectively grants the union of all identities' permissions, up to cluster-admin (system:masters). This is among the most powerful capabilities in a cluster."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
      - escalation:lateral
    notes: Group impersonation lets the holder assume membership in privileged groups such as system:masters, inheriting their RBAC for full privilege escalation and lateral movement.
