name: Arc-connected cluster readiness probe
description: The aggregate /readyz readiness health probe of an Azure Arc-connected Kubernetes cluster's API server, returning an operational up/not-ready health status.
scope: LOW
notes: Returns only trivial liveness/health status indicators, not any cluster data, logs, or configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads the aggregate API server readiness probe, confirming the connected cluster exists and is reachable as minor infrastructure reconnaissance.
