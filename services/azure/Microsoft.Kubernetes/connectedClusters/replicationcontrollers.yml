name: Kubernetes replication controllers
description: Kubernetes ReplicationController objects in an Azure Arc-connected cluster. A ReplicationController maintains a specified number of running pod replicas from an embedded pod spec, actively scheduling and running workloads.
scope: HIGH
notes: Unlike PodTemplates, ReplicationControllers actively run workloads, so write operations directly schedule containers and delete operations tear down running pods.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting replication controllers tears down the controllers and the pods they maintain, destroying running workload infrastructure and denying service to the applications they back.
  write:
    risks:
      - impact:hijack
      - impact:manipulation
      - escalation:lateral
    notes: Creating/updating replication controllers schedules and continuously runs attacker-defined containers (cryptomining/botnet hijack), can run pods under existing service accounts to obtain their identities (lateral movement), and alters running workload state.
