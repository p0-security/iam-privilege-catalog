name: Azure Arc connected-cluster Kubernetes persistent volume claims
description: PersistentVolumeClaim objects in the Kubernetes data plane of an Azure Arc-enabled (connected) cluster, representing workloads' requests/bindings to persistent storage (size, storage class, bound volume).
scope: HIGH
notes: PVCs reference where application data is stored but do not themselves contain the data contents; manipulating or deleting them affects which storage workloads mount and can cascade to the underlying volume's data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - impact:dos
    notes: Deleting a PVC can trigger reclaim/deletion of the bound persistent volume and its data (per reclaim policy) and detaches storage from workloads, destroying organizational data and disrupting dependent services.
  read:
    risks:
      - discovery:data
    scope: MEDIUM
    notes: Reading/listing PVCs enumerates the storage claims bound to workloads (sizes, storage classes, bound volumes), inventorying where persistent data resides without exposing its contents.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating PVCs lets an attacker provision or rebind storage claims, altering which volumes workloads mount and the cluster's data-attachment configuration.
