name: Kubernetes Namespaces (Arc-connected cluster)
description: Kubernetes Namespace objects on an Azure Arc-connected cluster, which are the logical isolation/tenancy boundaries that partition workloads, configuration, and resources.
scope: HIGH
notes: Namespaces define cluster tenancy and scope policy enforcement; their inventory maps the cluster's structure.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - destruction:data
      - impact:dos
    notes: Deleting a Namespace cascade-deletes all contained workloads, configs, secrets, and data, causing broad infrastructure and data loss plus denial of service for that tenant.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Reading/listing Namespaces enumerates the cluster's tenancy and workload partitioning, mapping structure for further targeting.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    notes: Creating/updating Namespaces lets an attacker carve out new tenancy boundaries to host their own workloads and alter namespace labels/metadata that drive policy targeting.
