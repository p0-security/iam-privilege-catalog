name: Kubernetes CSIStorageCapacities (Arc connected cluster)
description: CSIStorageCapacity objects are Kubernetes storage resources that report available storage capacity per CSI driver and topology, consumed by the scheduler for capacity-aware volume placement. Surfaced via Azure Arc on a connected cluster.
scope: MEDIUM
notes: These are ephemeral, driver-regenerated scheduler hints rather than persistent data or infrastructure; blast radius is limited to volume-aware scheduling decisions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
      - destruction:metadata
    notes: Deleting CSIStorageCapacity removes the scheduler's capacity-reporting metadata, distorting capacity-aware volume placement for stateful workloads; objects are typically regenerated by the CSI driver.
  write:
    risks:
      - impact:manipulation
    notes: Writing CSIStorageCapacity falsifies reported storage availability, manipulating the scheduler's capacity-aware volume placement decisions for stateful workloads.
