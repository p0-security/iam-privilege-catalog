name: Kubernetes VolumeAttachments (Arc-connected cluster)
description: Cluster-scoped Kubernetes VolumeAttachment objects on an Azure Arc-connected cluster. A VolumeAttachment is a CSI/attach-detach controller record tracking which PersistentVolume is attached to which node.
scope: HIGH
notes: "Attachment state is supporting storage infrastructure: read reveals storage-to-node topology, while write/delete can disrupt where persistent volumes are mounted for stateful workloads."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting VolumeAttachments forcibly detaches persistent volumes from nodes, disrupting access to backing storage for running stateful workloads and causing denial of service.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Read/list only enumerates which volumes are attached to which nodes, providing storage topology reconnaissance with no data or secret exposure.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Creating/updating VolumeAttachments manipulates volume-to-node binding state, potentially mis-attaching volumes or corrupting attachment records and disrupting persistent-storage availability for stateful workloads.
