name: Kubernetes PriorityClasses (Arc-connected cluster)
description: Cluster-scoped Kubernetes PriorityClass objects on an Azure Arc-connected cluster. A PriorityClass maps a name to an integer priority value used by the scheduler to decide pod scheduling order and preemption (eviction of lower-priority pods).
scope: MEDIUM
notes: "Scheduling configuration is supporting cluster infrastructure: read access is benign reconnaissance, but write/delete can disrupt cluster-wide scheduling and aid workload preemption."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting PriorityClasses removes scheduling configuration that pods reference, disrupting pod admission/scheduling and operations across the cluster.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Read/list only enumerates cluster scheduling-priority configuration; pure infrastructure reconnaissance with no data or credential exposure.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Creating/updating PriorityClasses lets an attacker define high-priority, preempting classes that evict or starve legitimate workloads and prioritize attacker pods, manipulating scheduling and causing denial of service.
