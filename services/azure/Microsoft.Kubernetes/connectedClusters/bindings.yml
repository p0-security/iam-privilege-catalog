name: Kubernetes pod bindings (Arc-connected cluster)
description: The Kubernetes Binding subresource on an Azure Arc-connected cluster, which assigns (binds) a Pod to a specific Node, performing the scheduling decision normally made by kube-scheduler.
scope: HIGH
notes: Controls workload placement; writing a binding bypasses scheduler constraints to pin pods onto chosen nodes.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:hijack
      - impact:manipulation
    notes: Creating a binding force-schedules a pod onto an attacker-chosen node (e.g. a privileged or targeted node), commandeering compute and overriding normal scheduling decisions.
