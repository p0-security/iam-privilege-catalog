name: Arc connected cluster coordination API (Leases)
description: The coordination.k8s.io API group of an Azure Arc-enabled (connected) Kubernetes cluster, which holds Lease objects used for leader election and node/component heartbeats.
scope: MEDIUM
notes: Leases expose only control-plane coordination metadata (which component holds leadership, heartbeat timing); low-value reconnaissance with no data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading coordination.k8s.io/v1 Leases enumerates leader-election and heartbeat state, infrastructure reconnaissance only.
