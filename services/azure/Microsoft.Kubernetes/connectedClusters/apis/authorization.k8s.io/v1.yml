name: Arc-connected cluster authorization.k8s.io API
description: The authorization.k8s.io API group on an Azure Arc-connected Kubernetes cluster, which exposes access-review resources (SubjectAccessReview, SelfSubjectAccessReview, SelfSubjectRulesReview, LocalSubjectAccessReview) used to evaluate effective permissions.
scope: LOW
notes: These are create-only evaluation resources; combined with the related access-review machinery they let a principal probe what access subjects hold, aiding reconnaissance of the cluster's authorization posture and weak points.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Version-scoped read of authorization.k8s.io/v1, surfacing the access-review API used to enumerate effective permissions for policy reconnaissance.
