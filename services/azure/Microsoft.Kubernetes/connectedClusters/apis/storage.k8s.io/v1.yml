name: Arc connected cluster Kubernetes storage API (storage.k8s.io)
description: The Kubernetes storage.k8s.io API group on an Azure Arc-connected cluster, exposing storage configuration objects such as StorageClasses, VolumeAttachments, and CSIDrivers/CSINodes. This is the cluster's storage infrastructure configuration, not the data inside volumes.
scope: LOW
notes: Read access reveals only storage configuration metadata, which is non-sensitive infrastructure reconnaissance; it does not expose the contents of persistent volumes.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: A data-plane get/list against storage.k8s.io/v1 enumerates StorageClasses, VolumeAttachments, and CSI driver objects, yielding read-only inventory of cluster storage configuration.
