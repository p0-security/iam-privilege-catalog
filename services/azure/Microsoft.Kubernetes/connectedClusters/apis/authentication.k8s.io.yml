name: Arc-connected cluster authentication.k8s.io API
description: The authentication.k8s.io API group on an Azure Arc-connected Kubernetes cluster, which exposes create-only review resources (TokenReview, SelfSubjectReview) used to validate tokens and report identity context.
scope: LOW
notes: These are non-persisted review resources created at request time; a read/list returns no stored accounts, tokens, or credentials and only enumerates the available authentication API surface.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads/lists the authentication.k8s.io group, which holds only create-only review resources, so it merely enumerates the authentication API surface and returns no account or credential data.
