name: Arc-connected cluster autoscaling API
description: The autoscaling API group on an Azure Arc-connected Kubernetes cluster, which holds HorizontalPodAutoscaler objects defining workload scaling targets, metrics, and thresholds.
scope: LOW
notes: Reading this group exposes only scaling configuration and references to target workloads; it contains no secrets or stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Version-scoped read of autoscaling/v2beta2 HorizontalPodAutoscaler objects, inventorying workload scaling configuration.
