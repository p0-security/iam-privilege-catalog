name: Arc-connected Kubernetes RBAC API group
description: The Kubernetes rbac.authorization.k8s.io API group on an Azure Arc-connected cluster, containing Roles, ClusterRoles, RoleBindings, and ClusterRoleBindings that define the cluster's access-control model.
scope: LOW
notes: Reading RBAC exposes the full access-control policy, letting an attacker map who holds which permissions and identify privilege-escalation weak points.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Read/list of rbac.authorization.k8s.io/v1beta1 enumerates legacy RBAC roles and bindings, disclosing access-control policy and weak points for escalation.
