name: Arc connected cluster extensions API (legacy Deployments/Ingresses/NetworkPolicies)
description: The legacy extensions API group of an Azure Arc-enabled (connected) Kubernetes cluster, which historically aggregated workload objects (Deployments, DaemonSets, ReplicaSets) together with Ingress and NetworkPolicy objects.
scope: MEDIUM
notes: Reading it inventories both workload configuration and network-exposure/policy of the cluster; read-only metadata with no secret payload.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
      - discovery:network
    notes: Get/list of the extensions group enumerates Deployments/DaemonSets plus Ingress and NetworkPolicy objects, exposing both workload configuration and network ingress/exposure topology for reconnaissance.
