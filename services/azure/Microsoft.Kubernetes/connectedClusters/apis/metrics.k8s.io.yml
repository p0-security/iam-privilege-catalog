name: Arc connected cluster metrics API (resource-usage metrics)
description: The metrics.k8s.io API group of an Azure Arc-enabled (connected) Kubernetes cluster, served by the metrics-server, which returns live CPU and memory resource-usage metrics for nodes and pods.
scope: MEDIUM
notes: Monitoring telemetry that reveals workload presence, names, and cluster capacity/utilization; no sensitive content or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Get/list of metrics.k8s.io returns node/pod CPU and memory usage, letting an attacker profile running workloads and cluster capacity, monitoring-tier infrastructure reconnaissance.
