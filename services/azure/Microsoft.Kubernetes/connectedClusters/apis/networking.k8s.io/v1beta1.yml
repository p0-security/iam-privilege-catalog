name: Arc-connected Kubernetes networking API group
description: The Kubernetes networking.k8s.io API group on an Azure Arc-connected cluster, containing NetworkPolicies, Ingresses, and IngressClasses that define cluster network segmentation and ingress routing.
scope: LOW
notes: Data-plane reads expose network topology and exposure rules but return no secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Read/list of networking.k8s.io/v1beta1 enumerates legacy Ingress and network-policy objects, revealing network configuration.
