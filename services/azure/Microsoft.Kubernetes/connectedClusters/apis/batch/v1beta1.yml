name: Arc connected cluster batch API (Jobs/CronJobs)
description: The Kubernetes batch API group (Jobs and CronJobs) of an Azure Arc-enabled (connected) Kubernetes cluster, accessed via the Arc data-plane proxy. It holds the definitions and pod templates of scheduled and batch workloads.
scope: MEDIUM
notes: Read-only data-plane access to a single connected cluster's workload configuration; reveals images, commands, and schedules but no secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the legacy batch/v1beta1 group (CronJobs) inventories scheduled-workload configuration on the cluster.
