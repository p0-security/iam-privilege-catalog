name: Arc-connected cluster apiregistration.k8s.io API
description: The apiregistration.k8s.io API group on an Azure Arc-connected Kubernetes cluster, which holds APIService objects that register aggregated/extension API servers with the cluster's API aggregation layer.
scope: LOW
notes: Read-only data-plane enumeration of API aggregation registration; reveals the cluster's API extension surface but no workload data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists/gets APIService registration objects, inventorying which aggregated API servers/extensions are registered on the cluster — infrastructure-surface reconnaissance only.
