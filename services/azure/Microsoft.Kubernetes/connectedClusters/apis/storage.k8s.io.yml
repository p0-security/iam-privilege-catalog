name: Arc-connected Kubernetes storage API group
description: The Kubernetes storage.k8s.io API group on an Azure Arc-connected cluster, containing StorageClasses, VolumeAttachments, and CSI driver/node objects that define the cluster's storage backend configuration.
scope: LOW
notes: Reads expose storage backend and provisioner configuration metadata, not the stored data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read/list of storage.k8s.io enumerates StorageClasses, VolumeAttachments, and CSI driver definitions, disclosing storage infrastructure configuration.
