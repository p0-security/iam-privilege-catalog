name: Kubernetes pod security policies
description: PodSecurityPolicies are cluster-scoped Kubernetes admission-control objects that constrain what pods may do (privileged mode, host namespaces, volume types, capabilities). They are a security-enforcement guardrail for the connected (Azure Arc) Kubernetes cluster.
scope: HIGH
notes: "Acts as a defense mechanism: relaxing or removing it enables privileged pod deployment and node/cluster breakout."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:policy
    notes: Deleting a PodSecurityPolicy removes a cluster-wide admission-control guardrail, disabling a security defense and tearing down the admission policy that would otherwise block privileged pods.
  write:
    risks:
      - destruction:defense
      - escalation:privilege
    notes: Creating/updating a PodSecurityPolicy can relax admission controls to permit privileged/hostPath/host-namespace pods, disabling a defense and enabling escalation to privileged workloads and node breakout.
