name: Kubernetes deployments (Arc-connected cluster)
description: Kubernetes Deployment objects in an Azure Arc-connected cluster; controllers that manage replicated application pods, accessed via the cluster data plane.
scope: HIGH
notes: Deployments expose container images, replica topology, environment references, and pod templates; controlling them means running application workloads within a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting deployments tears down application workloads, destroying running infrastructure and causing denial of service for the hosted applications.
  read:
    risks:
      - discovery:infra
    notes: Reading/listing deployments inventories application workload configuration (images, replicas, env, pod templates), providing infrastructure reconnaissance of running services.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating deployments runs arbitrary attacker-controlled containers (cryptomining/botnet hijack), abuses mounted service-account tokens/secrets for lateral movement, and alters running application configuration.
