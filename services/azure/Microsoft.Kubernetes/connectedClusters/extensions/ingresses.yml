name: Kubernetes ingresses (Arc-connected cluster)
description: Kubernetes Ingress objects in an Azure Arc-connected cluster; HTTP(S) routing rules mapping external hostnames/paths to backend services, accessed via the cluster data plane.
scope: HIGH
notes: Ingresses define how external traffic reaches in-cluster services, including hostnames, paths, TLS, and backend mappings; they are the public-facing entry point for a single function's services.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting ingresses removes the external routing rules fronting services, severing inbound access and amounting to network-component destruction with a DoS effect.
  read:
    risks:
      - discovery:network
    notes: Reading/listing ingresses enumerates external routing rules, hostnames, paths, TLS, and backend service mappings, revealing the cluster's network exposure topology.
  write:
    risks:
      - escalation:network
      - impact:manipulation
      - impact:defacement
    notes: Creating/updating ingresses can reroute external traffic to attacker-controlled backends, expose internal services publicly, and alter public-facing host/path routing to deface or intercept traffic.
