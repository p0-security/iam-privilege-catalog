name: Azure Arc connected-cluster Kubernetes persistent volumes
description: PersistentVolume objects in the Kubernetes data plane of an Azure Arc-enabled (connected) cluster, representing cluster-wide storage resources and their backing references (disks, shares, NFS paths) and reclaim policies.
scope: HIGH
notes: PVs map cluster storage to external backends; reading reveals where data resides, while writing or deleting can repoint, expose, or destroy the backing storage and its data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - impact:dos
    notes: Deleting persistent volumes removes the storage objects backing application data and, depending on reclaim policy, can release/delete the underlying storage, destroying data and disrupting dependent workloads.
  write:
    risks:
      - impact:manipulation
      - escalation:data
    notes: Creating/updating PVs lets an attacker define volumes that reference arbitrary or existing storage backends and alter reclaim behavior, manipulating storage plumbing and enabling access to existing data within the compromised cluster.
