name: Azure Arc connected-cluster Kubernetes pods
description: Pod objects in the Kubernetes data plane of an Azure Arc-enabled (connected) cluster, representing running workload instances, their container specs, images, environment, mounted volumes/secret references, and service-account bindings.
scope: HIGH
notes: Pods are the unit of cluster code execution; creating pods or exec'ing into them can run arbitrary code, assume service-account identities, and reach mounted secrets and data, making write/exec on pods effectively cluster code execution.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting pods terminates running workloads, disrupting the services they back; the pods themselves are running infrastructure rather than stored organizational data.
  read:
    risks:
      - discovery:infra
      - exfiltration:metadata
    notes: Reading/listing pods enumerates running workloads and exposes pod specs whose inline environment variables, mounted secret references, and annotations frequently leak sensitive identifiers and configuration.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    scope: CRITICAL
    notes: Creating/updating pods lets an attacker run arbitrary containers (cryptomining/botnet), mount secrets/host paths, and bind service-account tokens to assume cluster identities, making it effectively arbitrary code execution with lateral movement.
