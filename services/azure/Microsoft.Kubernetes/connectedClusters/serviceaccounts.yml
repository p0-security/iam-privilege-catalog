name: Kubernetes service accounts (connected cluster)
description: Kubernetes ServiceAccount objects on an Azure Arc-enabled (connected) cluster. These are in-cluster workload identities that pods authenticate as and that are bound to RBAC roles governing what they can do in the cluster.
scope: CRITICAL
notes: Service accounts are identities; a service account bound to a privileged ClusterRole can be cluster-admin equivalent, so this asset can be highly sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:account
      - impact:access
    notes: Deleting service accounts destroys in-cluster identities, breaking legitimate workloads' authentication and denying authorized operational access.
  write:
    risks:
      - persistence:account
      - escalation:privilege
    notes: Creating/updating service accounts lets an attacker mint new in-cluster identities (and their tokens) for persistence and obtain principals that can be attached to workloads to gain elevated privileges.
