name: Kubernetes SelfSubjectRulesReviews
description: A Kubernetes SelfSubjectRulesReview is a query-shaped (POST/create) authorization API on an Azure Arc connected cluster that enumerates the full set of RBAC rules/permissions the calling identity holds within a namespace.
scope: LOW
notes: "Non-persistent introspection: it changes no state and reveals only the caller's own access."
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:policy
    notes: Creating a SelfSubjectRulesReview returns the complete list of rules the caller holds in a namespace, giving the attacker a full map of their own privileges for planning escalation.
