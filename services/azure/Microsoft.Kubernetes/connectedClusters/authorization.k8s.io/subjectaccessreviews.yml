name: Kubernetes SubjectAccessReviews
description: A Kubernetes SubjectAccessReview is a query-shaped (POST/create) authorization API on an Azure Arc connected cluster that resolves whether an arbitrary subject (any user, group, or service account) is permitted to perform a specified action.
scope: LOW
notes: Non-persistent introspection that mutates nothing, but unlike the self-* reviews it can probe other principals' permissions, enabling broad RBAC reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:policy
    notes: Lets the caller query whether ANY arbitrary subject can perform an action, enabling systematic mapping of the cluster's RBAC to locate high-privilege identities and weak points.
