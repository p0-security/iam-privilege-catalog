name: Kubernetes certificate signing requests (Arc-connected cluster)
description: Kubernetes CertificateSigningRequest (CSR) objects on an Azure Arc-connected cluster. A CSR requests a signed X.509 client certificate for a named user/group identity; once approved its status carries the issued, signed certificate.
scope: CRITICAL
notes: CSRs are the cluster's credential-issuance mechanism. The signed certificate embedded in an approved CSR is a usable cluster authentication credential, and CSRs can request arbitrary identities up to system:masters (cluster-admin), making this an identity/credential asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
    notes: Deleting CSRs removes pending requests and the embedded signed certificate material, destroying cryptographic credential artifacts and disrupting cert issuance/rotation.
  read:
    risks:
      - exfiltration:crypto
      - discovery:policy
    notes: Reading/listing CSRs returns the issued signed client certificate stored in status.certificate (usable identity credential = crypto exfiltration) and enumerates the identities/groups requesting cluster access (policy recon).
  write:
    risks:
      - escalation:privilege
      - persistence:account
      - escalation:lateral
    notes: Creating/updating CSRs (including writing the status to inject a signed cert) lets an attacker mint client certificates for arbitrary identities such as system:masters, granting elevated, persistent, impersonatable cluster credentials.
