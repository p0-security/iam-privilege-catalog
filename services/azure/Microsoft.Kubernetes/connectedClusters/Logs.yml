name: Arc connected cluster logs
description: The data-plane logs resource of an Azure Arc-connected Kubernetes cluster, exposing runtime/operational log output from the cluster.
scope: MEDIUM
notes: Cluster logs can contain sensitive operational identifiers, tokens, or application data useful for further attack.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reads connected-cluster logs, allowing both inventory of available logs and export of log content that may contain sensitive operational details or secrets.
