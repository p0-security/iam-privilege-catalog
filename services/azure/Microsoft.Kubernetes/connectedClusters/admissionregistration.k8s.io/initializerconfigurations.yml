name: Kubernetes initializer configurations (admission control)
description: Initializer configurations are in-cluster admissionregistration.k8s.io objects (a deprecated dynamic admission-control mechanism) that intercept and can mutate Kubernetes API objects as they are created. They form part of the cluster's admission-control / security-enforcement plumbing.
scope: CRITICAL
notes: Admission-control objects gate and can rewrite every object admitted to the cluster, so write/delete over them is a cluster-wide defense and escalation primitive; this is a data-plane (in-cluster) resource of an Arc-connected production cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting initializer admission configurations removes cluster-wide admission-control enforcement, disabling a defense mechanism that would otherwise gate/restrict resource creation in the cluster.
  read:
    risks:
      - discovery:infra
    scope: HIGH
    notes: This data-plane read enumerates the cluster's initializer admission-control configuration, revealing the admission/security setup for reconnaissance without returning secret material.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating initializer admission configurations alters cluster-wide admission control that intercepts and mutates objects at creation, letting an attacker manipulate admission behavior and weaken or bypass admission-based security enforcement.
