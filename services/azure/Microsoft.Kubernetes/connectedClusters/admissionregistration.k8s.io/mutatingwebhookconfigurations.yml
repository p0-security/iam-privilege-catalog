name: Kubernetes mutating webhook configurations (admission control)
description: Mutating webhook configurations are in-cluster admissionregistration.k8s.io objects that register webhooks intercepting and rewriting every matching Kubernetes API object on create/update. They are a core admission-control and security-policy-enforcement mechanism for the cluster.
scope: CRITICAL
notes: A mutating webhook can rewrite any admitted object cluster-wide (inject sidecars/credentials, alter privileges), so write over these objects is effectively a cluster-admin-equivalent primitive; this is a data-plane (in-cluster) resource of an Arc-connected production cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting mutating webhook configurations removes cluster-wide admission-control mutation/enforcement, disabling defensive policy-enforcement webhooks (e.g. policy/security mutators) so non-compliant or malicious objects pass unmodified.
  read:
    risks:
      - discovery:infra
    scope: HIGH
    notes: This data-plane read enumerates the cluster's mutating admission webhooks (endpoints, rules, CA bundles), revealing admission-control wiring useful for planning evasion, without returning credential material.
  write:
    risks:
      - escalation:privilege
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating a mutating webhook lets an attacker intercept and rewrite every admitted Kubernetes object (e.g. inject privileged sidecars, mount secrets, alter RBAC-bound pods) and redirect admission traffic, a cluster-wide privilege-escalation, tampering, and defense-bypass primitive.
