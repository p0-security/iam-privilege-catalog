name: Kubernetes ingresses
description: Ingresses are Kubernetes objects defining external HTTP(S) routing rules (hostnames, paths, TLS, backend services) that expose cluster services in the connected (Azure Arc) Kubernetes cluster.
scope: HIGH
notes: Govern public-facing routing; writing them can reroute/expose traffic and hijack hostnames, deleting them severs public access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting Ingresses removes the external routing for services, severing public access to exposed applications and causing denial of service.
  read:
    risks:
      - discovery:network
    scope: MEDIUM
    notes: Reading Ingresses inventories external routing rules, hostnames, paths, and backend services, mapping the cluster's public-facing attack surface.
  write:
    risks:
      - impact:manipulation
      - escalation:network
      - impact:defacement
    notes: Creating/updating Ingresses lets an attacker reroute external traffic to attacker-controlled backends, expose internal services publicly, or hijack hostnames/paths to deface public-facing endpoints.
