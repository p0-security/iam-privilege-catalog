name: Arc-connected cluster apiserver readyz health probe
description: A Kubernetes apiserver readyz health-probe sub-resource on an Azure Arc-connected cluster. It reports apiserver lifecycle/readiness status (here, whether the server is shutting down), not any configuration or data.
scope: LOW
notes: Returns only a transient operational health/lifecycle signal, not sensitive contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reveals only whether the apiserver is in graceful shutdown, a benign cluster lifecycle signal.
