name: Kubernetes ConfigMaps (Arc-connected cluster)
description: Kubernetes ConfigMap objects on an Azure Arc-connected cluster, holding non-secret application and component configuration consumed by workloads and controllers.
scope: HIGH
notes: Though intended for non-secret config, ConfigMaps in practice frequently contain sensitive values (endpoints, tokens, connection strings, CA bundles) and drive runtime behavior of workloads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - impact:dos
    notes: Deleting configmaps removes configuration that workloads and controllers depend on, destroying operational data and breaking or crashing dependent services.
  read:
    risks:
      - exfiltration:data
    notes: Reading/listing configmaps exports application and cluster configuration that commonly contains sensitive values misplaced outside Secrets, enabling data exfiltration.
  write:
    risks:
      - impact:manipulation
    notes: Writing configmaps alters configuration consumed by workloads and controllers, allowing injection of malicious config (e.g. CA bundles, kubelet/admission config) to tamper with operational behavior.
