name: Connected-cluster async operation statuses
description: Operation status resources track the progress/state of asynchronous Microsoft.Kubernetes connected-cluster control-plane operations.
scope: LOW
notes: Control-plane bookkeeping for in-flight requests; exposes no organizational data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling async operation status returns only progress/state of in-flight requests and grants no meaningful attacker capability.
  write:
    risks: []
    notes: Writing operation-status records is an internal resource-provider async-tracking bookkeeping operation with no exploitable effect on real resources or data.
