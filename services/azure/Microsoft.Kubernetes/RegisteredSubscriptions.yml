name: Kubernetes registered subscriptions
description: A read-only listing of the subscriptions registered with the Microsoft.Kubernetes resource provider.
scope: LOW
notes: Provider-registration state is low-sensitivity inventory metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Lists which subscriptions are registered/onboarded to the Microsoft.Kubernetes provider, a read-only inventory of provider-registration state aiding infrastructure reconnaissance.
