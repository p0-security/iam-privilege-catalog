name: Microsoft.Kubernetes provider registration
description: A control-plane action on the Microsoft.Kubernetes resource provider that registers (or unregisters) a subscription with the provider, used for Azure Arc-enabled / connected Kubernetes clusters.
scope: LOW
notes: An idempotent prerequisite enablement toggle; registration grants no cluster, data, or identity access, while unregistration is typically blocked while connected-cluster resources still exist.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Kubernetes
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Provider-registration no-op that enables use of Microsoft.Kubernetes resource types for a subscription but confers no attacker-relevant capability in isolation.
