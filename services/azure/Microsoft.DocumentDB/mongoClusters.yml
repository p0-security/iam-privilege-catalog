name: Mongo Cluster
description: An Azure Cosmos DB for MongoDB (vCore) Mongo Cluster — a managed, production MongoDB-compatible database cluster resource and its control-plane configuration (SKU, node topology, networking, settings).
scope: HIGH
notes: A production data store supporting a single organizational function; its data plane holds organizational data and its connection strings are credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - destruction:infra
    notes: Deleting the cluster destroys the production database and all data it holds along with the underlying infrastructure, an irreversible data- and infrastructure-destruction primitive with DoS effect.
  read:
    risks:
      - discovery:infra
    notes: Control-plane get/list of cluster configuration (SKU, topology, endpoints, settings) for infrastructure reconnaissance; returns no data or secret material.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Create/update of cluster properties and tags lets an attacker alter the operational configuration of a production database and provision costly clustered capacity.
