name: Cosmos DB throughput pools
description: A throughput pool is a shared provisioned-throughput (RU/s) capacity construct in Cosmos DB (DocumentDB) that multiple database accounts can draw from.
scope: LOW
notes: Capacity/cost-management infrastructure backing production database accounts.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read/list only enumerates throughput pool configuration and capacity topology, exposing no stored data or credentials.
  write:
    risks:
      - impact:manipulation
      - impact:spend
      - impact:dos
    scope: HIGH
    notes: This write verb includes create/update/delete of the pool; an attacker can alter shared capacity backing many accounts (manipulation), provision/raise costly pooled RU/s (spend), and shrink or remove the pool to starve dependent accounts of throughput (dos).
