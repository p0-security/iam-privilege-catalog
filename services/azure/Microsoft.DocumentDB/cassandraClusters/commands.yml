name: Managed Cassandra cluster command output
description: Azure Managed Instance for Apache Cassandra is a managed NoSQL database; this resource type exposes the data-plane read of output from commands previously run on the cluster.
scope: HIGH
notes: Command output can contain query results, configuration, and operational data from a production database supporting a single organizational function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:data
    notes: Reading the output of previously-run commands can return query results and operational/database data, enabling exfiltration.
