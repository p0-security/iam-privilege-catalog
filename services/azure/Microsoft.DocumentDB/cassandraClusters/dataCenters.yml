name: Managed Cassandra data center
description: A data center (regional node group / replica set) within a managed Cassandra cluster, defining the cluster's per-region topology, node sizing, and network placement.
scope: HIGH
notes: A sub-resource of a production database cluster; control-plane operations alter or inventory the cluster's regional infrastructure but do not directly read the stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - destruction:data
      - impact:dos
    notes: Deleting a data center removes the nodes and data replicas hosting the cluster in that region, destroying infrastructure and its hosted data copies and degrading/denying service availability.
  read:
    risks:
      - discovery:infra
    notes: Reading or listing data centers in a Cassandra cluster only inventories regional/topology configuration; no data or secrets are exposed.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating or updating a data center alters cluster topology, node sizing, and network placement (manipulating operational config) and can provision additional costly compute nodes.
