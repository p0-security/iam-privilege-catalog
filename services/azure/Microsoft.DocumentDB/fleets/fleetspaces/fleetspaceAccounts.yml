name: Cosmos DB FleetspaceAccount resource
description: A FleetspaceAccount represents the enrollment/association of a Cosmos DB database account within a Fleetspace, with its fleet-level throughput allocation and governance settings.
scope: MEDIUM
notes: This is supporting management/governance metadata mapping accounts to fleets; it does not directly hold or expose the underlying database data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting a FleetspaceAccount removes a database account's fleet enrollment, disrupting its pooled-throughput/governance association while leaving the account and its data intact.
  read:
    risks:
      - discovery:infra
    notes: Reading/listing FleetspaceAccount resources enumerates which database accounts are enrolled in a fleetspace, exposing fleet membership topology for reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a FleetspaceAccount enrolls or reconfigures a database account's membership and throughput allocation within a fleetspace, manipulating fleet-level governance/pooling configuration.
