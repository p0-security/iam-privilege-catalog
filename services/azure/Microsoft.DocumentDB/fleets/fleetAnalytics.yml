name: Cosmos DB fleet analytics resource
description: A FleetAnalytics resource attached to an Azure Cosmos DB (DocumentDB) Fleet, providing analytics/monitoring configuration over the fleet. It is a supporting telemetry/analytics surface, not a primary data store.
scope: MEDIUM
notes: Control-plane resource; sensitivity is that of supporting monitoring/analytics infrastructure for a single fleet, not primary databases or identity/RBAC.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deletes the FleetAnalytics resource, removing a supporting analytics/monitoring component for the fleet with a limited, DoS-like blast radius.
  write:
    risks:
      - impact:manipulation
    notes: Create/update of the FleetAnalytics resource lets an attacker alter the fleet's analytics/monitoring configuration.
