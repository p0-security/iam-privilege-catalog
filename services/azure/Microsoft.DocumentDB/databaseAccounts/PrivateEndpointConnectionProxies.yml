name: Cosmos DB account private endpoint connection proxy
description: An internal control-plane proxy object that orchestrates a Private Link private-endpoint connection between a consumer network and a Cosmos DB database account.
scope: HIGH
notes: Represents private-network connectivity plumbing for a production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the proxy tears down a private-link connectivity component for the account, severing the private network path and disrupting authorized private access (DoS-like).
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating the proxy can establish or alter a private-endpoint network path to the production Cosmos DB account, enabling network movement toward the data store and manipulating its connectivity configuration.
