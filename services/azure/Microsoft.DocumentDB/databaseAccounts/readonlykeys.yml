name: Cosmos DB database account
description: An Azure Cosmos DB (DocumentDB) database account, the top-level control-plane resource that hosts databases and containers and governs endpoints, regions, consistency, networking, identity, and backup configuration. It is a primary production data store.
scope: CRITICAL
notes: Account master keys are root-equivalent data-plane credentials granting full read/write access to all data in the account, which makes this resource type security-sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - exfiltration:data
    notes: Returns the read-only master keys, reusable bearer credentials that grant full read access to all data in the account; can be exfiltrated and replayed to read all data.
  read:
    risks:
      - exfiltration:crypto
      - exfiltration:data
    notes: Despite the /read verb, this returns the actual read-only account keys (secret credential material) usable to connect and bulk-read every document in the account, so it is credential exfiltration that directly enables data exfiltration, not mere discovery.
    name: Cosmos DB account read-only keys
    parent:
      description: The read-only access keys for an Azure Cosmos DB (DocumentDB) database account. These keys are long-lived account-level credentials that authenticate data-plane connections.
      notes: Read-only keys grant read access to all databases, collections, and documents in the account, so they are credential material equivalent to a connection string.
