name: Cosmos DB graph throughput setting (Gremlin API)
description: The provisioned throughput (RU/s) setting of a Gremlin-API graph within an Azure Cosmos DB account. It controls the request-unit capacity allocated to a single production graph database.
scope: HIGH
notes: Throughput settings govern capacity and billing of a production data store but do not expose the stored data itself. This resource path is deprecated in favor of the non-'/apis/' path.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:dos
      - impact:spend
      - impact:manipulation
    notes: Updating the graph's provisioned RU/s lets an attacker lower capacity to throttle/degrade the production graph database (impact:dos), raise it to inflate metered spend (impact:spend), and alter operational capacity configuration (impact:manipulation).
