name: Cosmos DB collection throughput setting operation results
description: Represents the status/result of an asynchronous long-running operation on a Cosmos DB MongoDB-API collection throughput (RU/s) setting.
scope: LOW
notes: Operation-result polling endpoint returns only completion state, not the underlying resource configuration or data.
links:
