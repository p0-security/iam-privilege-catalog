name: Cosmos DB Gremlin graph
description: A Gremlin graph (container) within a database in an Azure Cosmos DB account; holds vertices and edges of organizational graph data.
scope: HIGH
notes: Production NoSQL graph data store for a single organizational function; control-plane operations manage container/schema rather than reading graph contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting a graph destroys the container and all vertices/edges it holds, causing irreversible loss of organizational data.
  read:
    risks:
      - discovery:data
    notes: Reading or listing graphs enumerates the data containers within a Gremlin database, inventorying stored data objects without returning graph contents.
  write:
    risks:
      - impact:manipulation
    notes: Control-plane create/update of a graph alters the schema/structure of a production graph data store without itself reading the contained data.
