name: Cosmos DB database throughput setting
description: The provisioned throughput (RU/s) setting for an Azure Cosmos DB database (SQL/MongoDB/Gremlin API); a metered capacity/cost configuration knob, not the data itself.
scope: MEDIUM
notes: "Supporting/metered configuration: it governs cost and capacity rather than granting access to stored data."
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the throughput setting discloses non-sensitive provisioned-capacity configuration, useful only for infrastructure reconnaissance.
  write:
    risks:
      - impact:dos
      - impact:spend
    notes: Updating provisioned throughput lets an attacker raise capacity to inflate metered spend or lower it to throttle and starve the database, degrading or denying service.
