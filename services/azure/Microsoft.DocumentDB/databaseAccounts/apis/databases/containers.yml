name: Cosmos DB SQL container
description: A Cosmos DB SQL-API container within a database, the production NoSQL data store holding the organization's documents/items along with its partition key, indexing policy, throughput and TTL configuration.
scope: HIGH
notes: Production data store supporting a single organizational function; sensitivity is HIGH.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting a SQL container destroys the container and all documents/items it holds, irreversibly removing organizational data (mitigated only by backup).
  read:
    risks:
      - discovery:data
    notes: Reading or listing containers enumerates the data stores present in the account (without returning item contents), letting an attacker inventory stored data objects.
  write:
    risks:
      - impact:manipulation
    notes: Control-plane create/update alters the container's structure/configuration (partition key, indexing, throughput, TTL), manipulating operational settings of a production data store.
