name: Cosmos DB table throughput operation results (Cassandra API)
description: The asynchronous operation-status tracker for a Cassandra-API table throughput update. Polling it returns only the progress/completion state of the async operation.
scope: LOW
notes: Returns transient operation status only; no organizational data, configuration, or secrets. This resource path is deprecated in favor of the non-'/apis/' path.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Inert status-polling endpoint that returns only completion state and confers no attacker-relevant capability in isolation.
