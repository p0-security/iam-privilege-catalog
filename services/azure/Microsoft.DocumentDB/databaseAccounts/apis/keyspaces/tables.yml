name: Cosmos DB Cassandra table
description: A Cassandra table within a keyspace in an Azure Cosmos DB account; a data container holding rows of organizational data.
scope: HIGH
notes: Production NoSQL data store for a single organizational function; control-plane operations manage container/schema rather than reading row contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting a table destroys the container and all rows it holds, causing irreversible loss of organizational data.
  read:
    risks:
      - discovery:data
    notes: Reading or listing tables enumerates the data containers within a keyspace, inventorying stored data objects without returning row contents.
  write:
    risks:
      - impact:manipulation
    notes: Control-plane create/update of a table alters the schema/structure of a production data store without itself reading the contained rows.
