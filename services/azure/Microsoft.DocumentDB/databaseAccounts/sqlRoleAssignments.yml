name: Cosmos DB SQL role assignment
description: A Cosmos DB native (SQL API) data-plane RBAC role assignment binding a principal to a SQL role definition at a scope within a database account.
scope: CRITICAL
notes: Access-control binding governing which identities can read and write the production database's data plane; creating/deleting these directly controls data access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deleting a SQL role assignment destroys a data-plane access binding, stripping legitimate principals of access (denial-of-access) and tearing down grants that would otherwise constrain the attacker.
  read:
    risks:
      - discovery:policy
    notes: Reading a SQL role assignment enumerates which principals hold which data-plane roles on the account, mapping the RBAC graph to find privileged targets.
  write:
    risks:
      - escalation:privilege
      - escalation:lateral
      - persistence:account
    notes: Creating a SQL role assignment binds a controlled principal or managed identity to a data-plane role, the headline primitive that grants the attacker (or another identity) read/write access to the database, enables lateral movement, and establishes durable access.
