name: MongoDB collection throughput operation result
description: The status record of an asynchronous control-plane operation on a MongoDB collection throughput setting. It exposes only operation-progress/state information.
scope: LOW
notes: Pure operation-status polling endpoint; exposes no resource data or configuration of value.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reading the status of an asynchronous operation is an inert polling call that grants no meaningful attacker capability.
