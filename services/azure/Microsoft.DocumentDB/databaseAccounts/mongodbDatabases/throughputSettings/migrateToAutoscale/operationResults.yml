  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Inert status-polling endpoint for a MongoDB database migrate-to-autoscale operation that returns only completion state and confers no attacker-relevant capability in isolation.
