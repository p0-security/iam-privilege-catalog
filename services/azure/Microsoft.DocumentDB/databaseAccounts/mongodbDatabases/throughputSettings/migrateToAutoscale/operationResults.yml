name: Cosmos DB MongoDB database throughput migration operation results
description: The asynchronous operation-status tracker for a Cosmos DB MongoDB-API database throughput migration (manual <-> autoscale). Polling it returns only the progress/completion state of the async operation.
scope: LOW
notes: Returns transient operation status only; no organizational data, configuration, or secrets.
links:
