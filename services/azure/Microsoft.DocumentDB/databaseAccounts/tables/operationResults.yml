name: Cosmos DB table operation results
description: The async operation-status resource for Table API table management operations within a Cosmos DB database account. It exposes only the transient progress/status of a long-running control-plane operation.
scope: LOW
notes: Operation-status polling endpoints return no resource configuration, code, or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the status of an asynchronous table management operation; returns only transient state and grants no actionable capability.
