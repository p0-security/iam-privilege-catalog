name: Cosmos DB container copy jobs
description: Container copy jobs are Cosmos DB data-movement operations that copy or migrate the contents of a container between containers or database accounts.
scope: MEDIUM
notes: Although the job resource is control-plane configuration, the write operation moves the actual production database data, so this resource type sits close to a production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Cancelling a copy job aborts an in-progress data migration, disrupting the operational task and potentially leaving target data incomplete, but does not destroy source data.
