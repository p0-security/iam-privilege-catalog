name: Gremlin database throughput setting
description: The provisioned throughput (RU/s) configuration for a Gremlin (graph) database within an Azure Cosmos DB account, controlling the capacity and billing model of a production graph database.
scope: HIGH
notes: This is a capacity/cost knob on a production database function, not the data itself; adverse changes degrade service availability or inflate metered spend.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:spend
      - impact:dos
    notes: Switching the Gremlin database offer to autoscale changes its capacity/billing mode, which can drive RU/s up to inflate spend or disrupt the established capacity profile.
