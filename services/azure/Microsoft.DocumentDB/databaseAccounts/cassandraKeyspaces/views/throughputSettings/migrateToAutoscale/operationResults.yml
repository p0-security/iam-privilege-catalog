name: Cassandra view throughput operation results
description: An asynchronous operation-status (operationResults) endpoint for Cassandra view throughput operations. It reports only the progress/state of a long-running control-plane operation.
scope: LOW
notes: Status-polling endpoint; exposes no resource configuration, data, or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reading the status of the autoscale-migration operation is an inert poll with no attacker value.
