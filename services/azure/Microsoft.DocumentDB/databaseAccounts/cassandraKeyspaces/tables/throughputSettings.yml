name: Cassandra table throughput setting
description: The provisioned throughput (RU/s) configuration for a Cassandra table within an Azure Cosmos DB account, controlling the capacity and billing model of a production database table.
scope: LOW
notes: This is a capacity/cost knob on a production database function, not the data itself; adverse changes degrade service availability or inflate metered spend.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the table throughput only discloses the provisioned capacity configuration value, infrastructure reconnaissance with no data or secret exposure.
  write:
    risks:
      - impact:spend
      - impact:dos
    scope: HIGH
    notes: Updating the table's provisioned RU/s can be set high to inflate billing or low to throttle the table into denial of service.
