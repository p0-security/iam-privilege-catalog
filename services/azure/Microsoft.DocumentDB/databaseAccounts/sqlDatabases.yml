name: Cosmos DB SQL database
description: An Azure Cosmos DB SQL (Core) API database within a database account, acting as a namespace container for collections (containers) of organizational documents/items.
scope: HIGH
notes: Production NoSQL data store backing a single application/function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting a SQL database destroys all contained containers and organizational data, an irreversible data-destruction action mitigated only by backups.
  read:
    risks:
      - discovery:data
    notes: Reading/listing SQL databases enumerates the data stores present in the account (control-plane inventory of data objects) without returning the documents inside.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating/updating a SQL database alters the account's data-store structure and provisions billable database throughput, manipulating operational config and incurring cost.
