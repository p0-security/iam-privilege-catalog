name: Cosmos DB SQL stored procedure operation results
description: The async operation-status resource for SQL stored procedure management operations on a Cosmos DB container. It exposes only the transient progress/status of a long-running control-plane operation.
scope: LOW
notes: Operation-status polling endpoints return no resource configuration, code, or data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polls the status of an asynchronous stored-procedure operation; returns no data, code, or secret material and grants no actionable capability in isolation.
