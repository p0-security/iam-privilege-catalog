name: Cosmos DB SQL container throughput migration operation results
description: The asynchronous operation-status tracker for a Cosmos DB SQL (Core API) container throughput migration (manual <-> autoscale). Polling it returns only the progress/completion state of the async operation.
scope: LOW
notes: Returns transient operation status only; no organizational data, configuration, or secrets.
links:
