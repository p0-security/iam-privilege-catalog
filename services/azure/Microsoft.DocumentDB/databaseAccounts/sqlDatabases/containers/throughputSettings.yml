name: Cosmos DB SQL container throughput setting
description: The provisioned/autoscale throughput (RU/s) capacity configuration for a Cosmos DB SQL container (collection). This is a control-plane metered-capacity setting, not the stored data itself.
scope: LOW
notes: "Throughput is a metered capacity/billing knob: raising it inflates cost, lowering it throttles the container. It exposes no stored data, credentials, or access-control configuration."
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the throughput setting only discloses the provisioned/autoscale RU/s capacity configuration, a read-only infrastructure inventory exposing no data or secrets.
  write:
    risks:
      - impact:spend
      - impact:dos
      - impact:manipulation
    scope: MEDIUM
    notes: Updating provisioned RU/s lets an attacker raise throughput to inflate billing (impact:spend), lower it to throttle/degrade the production container (impact:dos), and otherwise mutate the operational capacity configuration (impact:manipulation).
