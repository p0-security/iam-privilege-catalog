name: Cosmos DB SQL database operation result
description: Represents the status of an asynchronous operation on a Cosmos DB SQL database. It exposes only operation progress/state, not the database contents or configuration.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling the async operation status returns only operation progress and grants no meaningful attacker capability in isolation.
