name: Cosmos DB SQL container
description: An Azure Cosmos DB SQL (Core) API container (collection) within a database, holding the actual documents/items and defining throughput, indexing, partitioning, and TTL configuration.
scope: HIGH
notes: Production NoSQL collection storing organizational data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting a container irreversibly destroys all documents/items it holds, a direct organizational data-destruction action.
  read:
    risks:
      - discovery:data
    notes: Reading/listing containers enumerates the collections holding organizational data without returning the documents themselves.
  write:
    risks:
      - impact:manipulation
      - impact:spend
    notes: Creating/updating a container alters data-store configuration (throughput, indexing, TTL) on a production database and can provision billable dedicated throughput.
