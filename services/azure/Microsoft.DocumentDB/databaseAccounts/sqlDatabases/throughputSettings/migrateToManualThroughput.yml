name: Cosmos DB SQL database throughput setting
description: The provisioned/autoscale throughput (RU/s) capacity configuration for a Cosmos DB SQL database. This is a control-plane metered-capacity setting, not the stored data itself.
scope: MEDIUM
notes: "Throughput is a metered capacity/billing knob: raising it inflates cost, lowering it throttles the database. It exposes no stored data, credentials, or access-control configuration."
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Migrating from autoscale to fixed manual throughput can cap RU/s below demand, throttling the production database (impact:dos), and changes the provisioning mode (impact:manipulation).
