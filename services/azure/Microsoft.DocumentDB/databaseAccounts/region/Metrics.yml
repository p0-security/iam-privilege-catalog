name: Cosmos DB account and region metrics
description: Account- and region-level operational metrics (throughput, latency, request volume) for a Cosmos DB database account. Aggregate monitoring telemetry, not data.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading account/region metrics exposes aggregate operational telemetry for reconnaissance, with no access to stored data or credentials.
