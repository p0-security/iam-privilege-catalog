name: Cosmos DB account metric definitions
description: The Azure Monitor metric definitions available for a Cosmos DB database account (which metrics/telemetry schema can be queried).
scope: LOW
notes: Read-only monitoring schema metadata; exposes no metric values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Enumerates which metrics exist for the account; low-value monitoring-telemetry reconnaissance with no access to actual values.
