name: Cosmos DB account log definitions
description: The Azure Monitor log category definitions available for a Cosmos DB database account (which diagnostic log types can be collected).
scope: LOW
notes: Read-only monitoring schema metadata; exposes no log content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Enumerates which log categories exist for the account, low-value logging-coverage reconnaissance with no access to log content.
