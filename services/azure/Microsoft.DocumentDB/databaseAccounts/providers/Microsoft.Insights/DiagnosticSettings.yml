name: Cosmos DB account diagnostic settings
description: The Azure Monitor diagnostic setting for a Cosmos DB database account, controlling which logs/metrics are collected and where they are routed.
scope: MEDIUM
notes: Monitoring/diagnostics configuration; a detective control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Creating/updating the diagnostic setting lets an attacker disable or redirect log/metric collection for the account, blinding incident response and weakening a detective control.
