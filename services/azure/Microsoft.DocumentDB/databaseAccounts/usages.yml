name: Cosmos DB account usages
description: Account-level usage statistics (storage/document counts, quota consumption) for a Cosmos DB database account.
scope: LOW
notes: Sizing/consumption metadata only; does not expose stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Reads account usage/quota statistics, revealing how much data the account holds without exposing the data itself; operational sizing metadata.
