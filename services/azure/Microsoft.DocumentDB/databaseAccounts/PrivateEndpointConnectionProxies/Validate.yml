name: Cosmos DB account private endpoint connection proxy
description: An internal control-plane proxy object that orchestrates a Private Link private-endpoint connection between a consumer network and a Cosmos DB database account.
scope: LOW
notes: Represents private-network connectivity plumbing for a production data store.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Pre-flight validation check during the connection handshake; mutates no state and returns no sensitive data, granting no actionable capability in isolation.
