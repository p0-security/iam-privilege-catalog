name: Cosmos DB database usages
description: Database-level usage statistics (storage/document counts, quota consumption) within a Cosmos DB account.
scope: LOW
notes: Sizing/consumption metadata only; does not expose stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Reads database usage/quota statistics, revealing data sizing for a database without exposing the data itself; operational sizing metadata.
