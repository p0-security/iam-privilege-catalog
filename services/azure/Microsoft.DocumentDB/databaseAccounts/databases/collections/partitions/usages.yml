name: Cosmos DB partition-level usages
description: Partition-level usage statistics (storage/throughput sizing per partition) for a collection in a Cosmos DB database account.
scope: LOW
notes: Sizing/usage metadata only; does not return the stored documents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Reads partition-level usage/sizing counters, revealing how much data a collection's partitions hold but not the data itself; operational sizing metadata.
