name: Cosmos DB restorable database account
description: A restorable (backup) record of an Azure Cosmos DB database account, capturing point-in-time-restore metadata for existing and previously-deleted accounts in a region.
scope: LOW
notes: Exposes recovery-estate metadata (account IDs, regions, creation/deletion timestamps, restore windows) but not the underlying database contents; the restore action that consumes it is the high-impact capability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads/lists restorable Cosmos DB accounts and their restore-point metadata, providing reconnaissance to target a subsequent point-in-time restore; returns no actual data or credentials.
