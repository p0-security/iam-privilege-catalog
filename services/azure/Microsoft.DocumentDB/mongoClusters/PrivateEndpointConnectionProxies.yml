name: Mongo Cluster private endpoint connection proxies
description: An internal NRP-mediated private-link proxy object that binds a private endpoint to a production Azure Cosmos DB for MongoDB (vCore) Mongo cluster, controlling private network reachability to the database.
scope: HIGH
notes: Gates private network connectivity to a production data store; the proxy/connection objects themselves are connectivity plumbing, not the data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the connection proxy removes a private-link connectivity component for the cluster, severing legitimate private access (DoS-like effect captured by destruction:network).
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Read-only enumeration of the proxy's private-link connectivity configuration, providing network reconnaissance of the cluster's private connectivity topology.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating the connection proxy can attach or approve an attacker-influenced private endpoint to the production Mongo cluster, granting private-network reach to the database and altering its connectivity/approval configuration.
