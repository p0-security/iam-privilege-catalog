name: Mongo Cluster private endpoint connections
description: Private endpoint connection objects representing consumer private endpoints bound to a production Mongo cluster and their approval state, controlling private network reachability to the database.
scope: HIGH
notes: Gates private network connectivity to a production data store; the connection objects are connectivity plumbing, not the data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting a private endpoint connection severs an approved private-link path to the cluster, destroying a network component and disrupting legitimate private access (DoS-like effect captured by destruction:network).
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading/listing private endpoint connections enumerates which consumer endpoints are bound to the cluster and their approval state, providing network reconnaissance.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/approving a private endpoint connection can attach an attacker-controlled private endpoint to the production cluster, granting private-network access to the database and altering its approval state.
