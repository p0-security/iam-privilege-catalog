name: Mongo Cluster private link resources
description: Read-only descriptors of the private-link sub-resources (group IDs / connectable subresources) that a Mongo cluster exposes for private endpoints.
scope: LOW
notes: Connectivity metadata only; identifies what can be privately connected, not the data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Listing private link resources enumerates the cluster's available private-link group IDs, providing network reconnaissance of connectable subresources.
