name: Mongo Cluster private endpoint connection proxies
description: An internal NRP-mediated private-link proxy object that binds a private endpoint to a production Azure Cosmos DB for MongoDB (vCore) Mongo cluster, controlling private network reachability to the database.
scope: LOW
notes: Gates private network connectivity to a production data store; the proxy/connection objects themselves are connectivity plumbing, not the data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: A pre-flight validation helper that only checks the well-formedness of a proposed proxy configuration; it neither mutates state nor returns sensitive data, so it is inert in isolation.
