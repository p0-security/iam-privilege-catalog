name: Cosmos DB operation results
description: An operation result represents the status/progress state of a long-running asynchronous control-plane operation on Azure Cosmos DB (DocumentDB) resources.
scope: LOW
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling the status of a prior asynchronous operation returns only progress/result state with no resource configuration, data, or credentials, so it grants no meaningful attacker capability in isolation.
