name: Cosmos DB database account
description: An Azure Cosmos DB (DocumentDB) database account, the top-level control-plane resource that hosts databases and containers and governs endpoints, regions, consistency, networking, identity, and backup configuration. It is a primary production data store.
scope: CRITICAL
notes: Account master keys are root-equivalent data-plane credentials granting full read/write access to all data in the account, which makes this resource type security-sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - destruction:infra
    notes: Deleting the account permanently destroys all hosted databases/containers and their data along with the account infrastructure.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    scope: HIGH
    notes: Create/update lets an attacker alter account configuration, including IP firewall rules, VNet/network ACLs, and public-network access, manipulating operational config and weakening network defenses on a production data store.
