name: Garnet cluster (Redis-compatible cache)
description: Microsoft DocumentDB Garnet clusters are a Redis-compatible in-memory cache/data store. The acl child resource scopes data-plane commands executed against the cluster keyspace and pub/sub system.
scope: LOW
notes: Holds cached organizational data and carries application pub/sub message streams; treated as a production data store supporting a single function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - discovery:metadata
    notes: PUBSUB NUMPAT returns only an aggregate count of active pattern subscriptions, trivial reconnaissance metadata about pub/sub usage with no channel names or contents.
