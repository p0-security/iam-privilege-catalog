name: Garnet cluster vector-set data
description: Azure Managed Garnet is a Redis-compatible in-memory data store; this resource type is the data-plane (ACL-scoped) command surface over vector sets and other structures held in the cluster.
scope: HIGH
notes: Holds production application data (caches, sessions, queues, vector/sorted sets) for a single organizational function; data-plane access reads/writes/deletes the stored records directly.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: VADD inserts a vector into a vector set, writing/altering operational data stored in the cluster.
