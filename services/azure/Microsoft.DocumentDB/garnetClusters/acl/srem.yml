name: Garnet cluster set data
description: Garnet is a Redis-compatible in-memory cache/data store offered under Azure Cosmos DB (Microsoft.DocumentDB). This operation acts on set data structures held within a Garnet cluster's data plane.
scope: HIGH
notes: Production cache data store supporting a single organizational function; data-plane operations read or mutate the cached organizational data directly.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: SREM removes members from a set, deleting stored organizational data in the cache (data-plane delete).
