name: Garnet Cluster cache data
description: Microsoft Azure Cosmos DB for Garnet (a Redis-compatible in-memory cache/data store). These data-plane ACL command permissions govern individual key/value operations against the cluster's stored data.
scope: HIGH
notes: A production in-memory data store backing a single application function; it commonly holds session tokens, cached PII, and other sensitive application state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
    notes: SETEX writes/overwrites a key's value with an attacker-controlled value plus a TTL, manipulating cached operational data and controlling its lifetime.
