name: Garnet cluster sorted-set data
description: Garnet is a Redis-compatible in-memory cache/data store offered under Azure Cosmos DB (Microsoft.DocumentDB). This operation acts on sorted-set data structures held within a Garnet cluster's data plane.
scope: HIGH
notes: Production cache data store supporting a single organizational function; data-plane operations read or mutate the cached organizational data directly.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: ZCOUNT returns only a count of members within a score range, an aggregate enumeration rather than disclosure of member values.
