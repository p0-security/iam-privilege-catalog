name: Garnet cluster cached data
description: Microsoft Garnet is a high-performance, Redis-compatible cache/in-memory data store offered under Microsoft.DocumentDB. These data-plane operations execute Redis-style commands directly against the keyspace, reading, writing, or deleting the values stored in the cluster.
scope: HIGH
notes: A production cache cluster typically holds operational data for a single organizational function (sessions, counters, cached query results), which can include sensitive content; it is a single-function production data store (HIGH).
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:data
    notes: GET returns the actual stored value for a key, allowing an attacker to read and exfiltrate cached organizational data.
