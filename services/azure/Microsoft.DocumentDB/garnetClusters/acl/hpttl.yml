name: Garnet cluster data (hash)
description: A Garnet cluster is a Microsoft Redis-compatible in-memory data store; this is a data-plane operation governed by an ACL on the cached data it holds.
scope: HIGH
notes: Production cache data store supporting a single application function; its contents can include session, application, and potentially sensitive cached data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:data
    notes: HPTTL returns only the time-to-live metadata of a hash field, enumerating existence/expiry of stored data without returning the values themselves.
