name: Garnet cluster sorted-set data
description: A data-plane sorted-set command surface on an Azure Managed Garnet (Redis-compatible) cache cluster, holding cached/operational key-value data for an application.
scope: HIGH
notes: Production in-memory data store supporting a single organizational function; sorted-set entries may contain sensitive application data such as session, ranking, or queue state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.DocumentDB
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deletes all members within a lexicographical range; a full range can wipe an entire sorted set.
