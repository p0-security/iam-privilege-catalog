name: Attestation provider operation status
description: An operation status resource exposes the progress/result of a previously issued asynchronous management operation on a Microsoft Azure Attestation provider.
scope: LOW
notes: A transient polling endpoint that reflects only the state of a prior request.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Attestation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling async operation status returns only the progress/result of a prior request and exposes no sensitive configuration, data, or actionable capability.
