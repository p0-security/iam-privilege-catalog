name: Attestation provider NSP configurations
description: A Network Security Perimeter (NSP) configuration holds the network-security-perimeter access rules and profiles applied to a Microsoft Azure Attestation provider, as stored on the resource.
scope: MEDIUM
notes: Describes the network-defense boundary for a single service; reading it reveals the isolation posture.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Attestation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:manipulation
    notes: Reconcile forces the attestation provider's stored NSP configuration to re-sync with the Network Resource Provider's copy, mutating the effective perimeter state rather than merely reading it.
