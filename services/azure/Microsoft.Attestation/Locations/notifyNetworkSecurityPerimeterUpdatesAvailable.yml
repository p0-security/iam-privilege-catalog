name: Attestation location (NSP update notification)
description: A location-scoped internal notification endpoint that checks whether the Network Security Perimeter configuration for the Microsoft.Attestation provider needs updating.
scope: LOW
notes: Passive signaling action; reads no sensitive data and modifies no perimeter configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Attestation
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: This internal notification merely checks whether the Network Security Perimeter configuration needs refreshing for the Attestation provider; it makes no change and exposes no sensitive data.
