name: Kubernetes Pods
description: Kubernetes Pod objects on an AKS managed cluster, the running unit of workload execution; their specs include container images, command/args, environment variables, and references to mounted secrets, configmaps, volumes, and service accounts.
scope: CRITICAL
notes: Pod specs frequently embed or reference credentials and sensitive configuration, and pods carry service-account tokens granting in-cluster and cloud identity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - exfiltration:data
      - impact:hijack
      - impact:manipulation
    notes: Exec grants an interactive shell inside a running container, executing code as that pod's service-account/managed identity to read mounted secrets and data, move laterally to whatever the workload can reach, hijack the compute, and tamper with the workload.
