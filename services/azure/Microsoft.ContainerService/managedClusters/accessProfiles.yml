name: AKS managed cluster access profile (kubeconfig credentials)
description: An AKS managed cluster access profile for a named role (e.g. clusterAdmin/clusterUser), which embeds the kubeconfig containing client certificate/token credential material for authenticating to the Kubernetes API.
scope: CRITICAL
notes: Returns reusable cluster credentials; clusterAdmin yields full cluster-admin control of the Kubernetes control plane, workloads, and in-cluster secrets/identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Getting the access profile by role name returns the embedded kubeconfig credential, exporting reusable certificate/token material that grants direct authenticated Kubernetes API access (often cluster-admin) and pivot into the cluster's workloads and identities.
