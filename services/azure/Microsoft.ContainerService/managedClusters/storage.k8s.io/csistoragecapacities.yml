name: AKS CSIStorageCapacities
description: Kubernetes CSIStorageCapacity objects in an AKS cluster, which report per-driver/topology storage capacity that the scheduler uses for capacity-aware volume placement.
scope: MEDIUM
notes: Scheduling hint metadata reported by CSI drivers; contains no stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:metadata
      - impact:manipulation
    notes: Deleting csistoragecapacities removes scheduler-consumed capacity metadata (normally regenerated by the CSI driver), disrupting capacity-aware volume scheduling.
  write:
    risks:
      - impact:manipulation
    notes: Writing csistoragecapacities lets an attacker falsify reported storage capacity, manipulating the scheduler's volume-placement decisions for stateful workloads.
