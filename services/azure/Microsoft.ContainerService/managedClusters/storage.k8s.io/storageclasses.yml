name: Kubernetes StorageClasses (AKS)
description: Cluster-scoped Kubernetes StorageClass objects in an AKS managed cluster that define how persistent volumes are dynamically provisioned (provisioner/CSI driver, parameters, reclaim policy, default-class designation).
scope: HIGH
notes: These are control objects for the cluster's storage subsystem; they configure provisioning behavior cluster-wide but do not themselves contain stored data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting StorageClasses removes the dynamic-provisioning definitions the cluster relies on, breaking new PVC fulfillment and denying storage to stateful workloads.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating StorageClasses lets an attacker alter how persistent volumes are dynamically provisioned cluster-wide (flip the default class, change provisioner/parameters/reclaim policy), manipulating storage behavior for all future PVCs.
