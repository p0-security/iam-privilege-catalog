name: Kubernetes Services (AKS data plane)
description: Kubernetes Service objects within an AKS managed cluster that define network endpoints (ClusterIP/NodePort/LoadBalancer), ports, and traffic routing to workload pods.
scope: HIGH
notes: Cluster networking for the workloads of a single application function; production network resource sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting Services removes the network endpoints fronting workloads, severing connectivity and causing denial of service for the hosted applications.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating Services can reroute traffic to attacker pods and provision LoadBalancer/NodePort objects that expose internal workloads externally, manipulating routing and reaching additional networked resources.
