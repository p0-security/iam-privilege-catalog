name: AKS API server healthz poststarthook probe
description: A Kubernetes API server /healthz post-start-hook readiness probe endpoint exposed through an AKS managed cluster, reporting whether a specific apiserver startup hook has completed.
scope: LOW
notes: These data-plane endpoints return only a boolean liveness/readiness status for an internal apiserver component; they disclose no configuration, organizational data, or credential material despite suggestive names like 'ca-registration'.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Despite the 'ca-registration' name, returns only the readiness status of the CA-registration startup hook, not any certificate or key material; inert status poll.
