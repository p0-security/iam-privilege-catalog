name: AKS API server health-check endpoints
description: The Kubernetes API server health-check (/healthz) endpoints on an AKS managed cluster, returning only liveness/readiness status of control-plane components.
scope: LOW
notes: Returns only up/down or ok/not-ok status strings, not the contents of any component (no etcd data, no log contents, no configuration).
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reads a post-start-hook health subcheck for the apiservice registration controller, returning only readiness status.
