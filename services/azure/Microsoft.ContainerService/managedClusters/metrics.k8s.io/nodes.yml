name: AKS Kubernetes node metrics
description: Per-node resource-utilization telemetry (CPU/memory) exposed via the Kubernetes metrics.k8s.io API for an AKS managed cluster's data plane.
scope: LOW
notes: Metrics expose only non-sensitive utilization data useful for reconnaissance, not data access or control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading node metrics enumerates cluster nodes and their capacity/usage, a low-sensitivity infrastructure reconnaissance signal.
