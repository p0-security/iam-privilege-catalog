name: AKS managed cluster upgrade profile
description: The upgrade profile of an AKS managed cluster, reporting the current and available Kubernetes versions for the cluster and its agent pools.
scope: LOW
notes: Read-only version/configuration detail of the cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the upgrade profile reveals the cluster's current and available Kubernetes versions, infrastructure reconnaissance that can identify outdated/vulnerable clusters; exposes no data or credentials.
