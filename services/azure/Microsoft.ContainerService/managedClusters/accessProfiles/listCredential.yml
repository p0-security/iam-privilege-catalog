name: AKS managed cluster access profile (kubeconfig credentials)
description: An AKS managed cluster access profile for a named role (e.g. clusterAdmin/clusterUser), which embeds the kubeconfig containing client certificate/token credential material for authenticating to the Kubernetes API.
scope: CRITICAL
notes: Returns reusable cluster credentials; clusterAdmin yields full cluster-admin control of the Kubernetes control plane, workloads, and in-cluster secrets/identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: This listCredential action returns the cluster access profile's kubeconfig credential for a named role, directly exfiltrating secret material that an attacker redeems for full authenticated control of the Kubernetes cluster.
