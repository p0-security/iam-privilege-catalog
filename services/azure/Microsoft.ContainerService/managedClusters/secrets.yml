name: Kubernetes Secrets (AKS data plane)
description: "Kubernetes Secret objects within an AKS managed cluster holding credential material: service-account tokens, passwords, TLS private keys, connection strings, and registry/pull credentials."
scope: CRITICAL
notes: Highest-sensitivity in-cluster asset; secrets directly grant identity access and are usable across cluster functions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:dos
    notes: Deleting Secrets destroys cryptographic/credential material that pods depend on for authentication, causing irrecoverable key loss and outages for dependent workloads.
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
      - takeover:account
    notes: Reading Secrets returns the actual credential material, enabling direct exfiltration of cryptographic/credential data and reuse of those credentials to assume other identities and take over accounts.
  write:
    risks:
      - impact:manipulation
      - persistence:account
      - escalation:lateral
    notes: Creating/updating Secrets lets an attacker plant or overwrite credentials/tokens that workloads mount and consume, establishing persistence and enabling lateral movement as the identities those secrets authenticate.
