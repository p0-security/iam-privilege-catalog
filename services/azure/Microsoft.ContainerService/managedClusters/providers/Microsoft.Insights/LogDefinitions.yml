name: AKS managed cluster log definitions
description: The catalog of Azure Monitor log category definitions available for an AKS managed cluster.
scope: LOW
notes: Read-only logging schema; exposes which log categories the cluster can emit, not log content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Listing log definitions only enumerates the available log categories for the cluster, low-sensitivity logging-schema reconnaissance with no log content returned.
