name: Kubernetes DaemonSets (AKS)
description: A DaemonSet is a Kubernetes apps controller that ensures a copy of a pod runs on every (or every selected) node, commonly used for node-level agents (CNI, logging, monitoring). It is a live workload controller on the cluster data plane.
scope: HIGH
notes: DaemonSet pods frequently run with host mounts, hostNetwork, or privileged access and carry service-account tokens, making write access a powerful node-compromise and lateral-movement primitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a DaemonSet tears down its per-node pods (often critical agents like CNI, logging, or monitoring), removing running infrastructure across nodes and causing denial of service.
  read:
    risks:
      - discovery:infra
    notes: Reading DaemonSets enumerates node-wide workload definitions including container images, volume mounts, env references, and service-account references, providing infrastructure reconnaissance of cluster workloads.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a DaemonSet schedules an attacker-controlled (potentially privileged, hostPath/hostNetwork) container on every node, enabling cluster-wide resource hijacking, node/host compromise, and lateral movement via mounted service-account tokens and node identities.
