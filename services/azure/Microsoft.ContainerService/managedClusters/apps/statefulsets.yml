name: Kubernetes StatefulSets (AKS)
description: Kubernetes StatefulSet workload controllers inside an AKS managed cluster; they manage ordered, stateful pods with stable identities and associated persistent volume claims. This is a data-plane (in-cluster) resource accessed through the AKS Kubernetes API.
scope: HIGH
notes: StatefulSets back data-bearing services (databases, queues); their specs expose images, volume-claim templates, and service-account bindings.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting (or DeleteCollection of) StatefulSets removes the pods running stateful services, destroying workload infrastructure and disrupting those data-backed services.
  read:
    risks:
      - discovery:infra
    notes: Reading/listing StatefulSets inventories stateful workload configuration including images, volume-claim templates, and pod specs, providing reconnaissance of data-bearing applications.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating StatefulSets lets an attacker run arbitrary stateful containers, mount persistent volumes and service-account tokens to access data and pivot to other identities, and modify operational workload config.
