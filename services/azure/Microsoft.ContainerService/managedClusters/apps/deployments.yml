name: Kubernetes Deployments (AKS)
description: A Deployment is a Kubernetes apps controller that manages a replicated set of pods for stateless application workloads, controlling rollout and scaling via ReplicaSets. It is a live workload controller on the cluster data plane.
scope: HIGH
notes: Deployment pod specs reference images, env vars, mounted secrets/configs, and service accounts, so write access enables running arbitrary containers and assuming pod identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a Deployment removes its managed ReplicaSets and pods, tearing down the backing application workloads and causing denial of service for the affected services.
  read:
    risks:
      - discovery:infra
    notes: Reading Deployments enumerates application workload definitions including container images, replica counts, env vars, and references to mounted secrets/configs, providing infrastructure reconnaissance of running services.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a Deployment runs arbitrary attacker-controlled containers in the cluster (resource hijacking), can mount secrets and assume pod service-account identities for lateral movement, and tampers with production application workload definitions.
