name: Kubernetes ControllerRevisions (AKS)
description: ControllerRevision objects store immutable point-in-time snapshots of the pod-template configuration of DaemonSets and StatefulSets, used by their controllers for rollout and rollback. They are workload-history records on the cluster data plane.
scope: MEDIUM
notes: They hold workload configuration history (images, env references, mounts) rather than live running workloads or secret values.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting ControllerRevisions destroys the workload rollback history of DaemonSets/StatefulSets, removing operational recovery data needed to safely roll back.
  write:
    risks:
      - impact:manipulation
    notes: Writing ControllerRevisions tampers with the stored revision history controllers rely on, so a rollout/rollback can apply attacker-crafted pod templates, manipulating operational workload state.
