name: AKS API server readiness probe
description: A Kubernetes API server readyz health endpoint exposed via the AKS managed cluster data plane that reports apiserver readiness/lifecycle state.
scope: LOW
notes: Returns only a readiness/lifecycle status string; no organizational or configuration data is exposed.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the readyz/shutdown probe reveals only whether the apiserver is in graceful shutdown, a trivial availability status disclosure.
