name: AKS API server readiness probe
description: A Kubernetes API server readyz post-start-hook health endpoint exposed via the AKS managed cluster data plane that reports whether an internal control-plane startup hook has completed.
scope: LOW
notes: Returns only a readiness/liveness status string for an internal apiserver subsystem; no organizational or configuration data is exposed.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the apiextensions-informers readyz hook reveals only that informer subsystem's readiness state as minor infrastructure recon.
