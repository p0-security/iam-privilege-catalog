name: AKS Kubernetes cluster role bindings
description: A Kubernetes ClusterRoleBinding grants a ClusterRole's permissions to a subject (user, group, or service account) across the entire cluster. On AKS this is a data-plane RBAC binding controlling cluster-wide authorization.
scope: CRITICAL
notes: Cluster role bindings are the core cluster-wide access-control bindings; the asset is cluster-admin-grade identity and access-control data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deleting ClusterRoleBindings removes cluster-wide RBAC grants, destroying access-control policy and revoking legitimate operators' (including responders') cluster access while attacker access can persist.
  write:
    risks:
      - escalation:privilege
      - escalation:lateral
      - persistence:account
    notes: Creating/updating a ClusterRoleBinding lets an attacker bind cluster-admin (or any ClusterRole) to themselves or a controlled subject, the canonical Kubernetes cluster-wide privilege-escalation, lateral-movement, and persistence primitive.
