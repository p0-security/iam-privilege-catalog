name: Kubernetes Events (AKS)
description: Kubernetes Events are time-bounded operational records of cluster activity (scheduling, lifecycle, errors) for an AKS managed cluster, functioning as an activity/audit-like trail.
scope: LOW
notes: Events are an operational/observability record useful for reconnaissance of activity and for incident response; deleting them erases the activity trail.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
    scope: MEDIUM
    notes: Erases the cluster activity/audit trail, disrupting incident response and removing a detection signal of attacker actions.
  read:
    risks:
      - discovery:logs
      - discovery:infra
    notes: Reads the cluster event stream, inventorying recent activity and infrastructure lifecycle changes for reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Injects forged or misleading event records into the cluster activity stream, manipulating observability data to mislead operators or detection.
