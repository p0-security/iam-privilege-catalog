name: AKS cluster authentication API resources
description: Kubernetes authentication.k8s.io API-group resources (TokenReview/SelfSubjectReview identity-review objects) within an AKS managed cluster, accessed via the cluster's data plane.
scope: MEDIUM
notes: Read access enumerates the cluster's identity/authentication surface; the isolated read does not itself mint or return usable tokens.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:account
    notes: Reads authentication.k8s.io resources, enabling inventory of authenticated identities and group information for account targeting.
