name: AKS Kubernetes node API group
description: Data-plane access to the Kubernetes node.k8s.io aggregated API on an AKS managed cluster, which exposes RuntimeClass objects defining container-runtime configuration.
scope: LOW
notes: Exposes only low-sensitivity node runtime configuration metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Versioned read of node.k8s.io/v1beta1 RuntimeClass objects, enabling inventory of node runtime configuration only.
