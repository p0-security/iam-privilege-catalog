name: AKS cluster authorization API resources
description: Kubernetes authorization.k8s.io API-group resources (SubjectAccessReview/SelfSubjectRulesReview access-review objects) within an AKS managed cluster, accessed via the cluster's data plane.
scope: MEDIUM
notes: Read access lets an attacker probe effective RBAC permissions and authorization decisions to locate access-control weak points.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reads authorization.k8s.io/v1 access-review resources, enabling reconnaissance of effective RBAC permissions to identify weak points.
