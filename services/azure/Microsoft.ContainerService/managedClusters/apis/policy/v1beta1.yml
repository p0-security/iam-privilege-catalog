name: AKS Kubernetes policy API group
description: Data-plane access to the Kubernetes 'policy' aggregated API group on an AKS managed cluster, which exposes PodDisruptionBudgets and (historically) PodSecurityPolicies.
scope: MEDIUM
notes: Read access reveals workload availability constraints and legacy pod-security admission posture, useful for finding enforcement gaps.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Versioned read of policy/v1beta1 (PSPs, PDBs), enumerating cluster availability and pod-security configuration for reconnaissance.
