name: Kubernetes SubjectAccessReviews (AKS)
description: "Kubernetes SubjectAccessReview is a write-only cluster-scoped authorization-query API in an AKS managed cluster: it answers whether an arbitrary subject is permitted to perform any given action cluster-wide. Data-plane resource accessed through the AKS Kubernetes API."
scope: MEDIUM
notes: Exposes the entire cluster RBAC authorization model for any subject, helping identify privileged accounts and escalation paths.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:policy
    notes: Creating a SubjectAccessReview lets an attacker query whether any arbitrary subject can perform any cluster-wide action, fully mapping cluster RBAC to find weak points.
