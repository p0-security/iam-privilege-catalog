name: Kubernetes LocalSubjectAccessReviews (AKS)
description: "Kubernetes LocalSubjectAccessReview is a write-only authorization-query API in an AKS managed cluster: it answers whether an arbitrary subject is permitted to perform a given action within a specific namespace. Data-plane resource accessed through the AKS Kubernetes API."
scope: MEDIUM
notes: Reveals RBAC authorization decisions for any subject, exposing access-control posture and weak points without granting access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:policy
    notes: Creating a LocalSubjectAccessReview lets an attacker probe whether any subject can perform actions in a namespace, mapping RBAC grants to find privilege-escalation paths.
