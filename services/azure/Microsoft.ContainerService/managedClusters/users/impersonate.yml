name: Kubernetes user impersonation (AKS)
description: The Kubernetes user-impersonation capability on an AKS managed cluster, allowing the API caller to issue requests as an arbitrary cluster user identity.
scope: CRITICAL
notes: Impersonation lets the holder act as any other identity (including cluster-admins), inheriting that identity's full RBAC privileges — equivalent to broad cluster takeover.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating a user lets the attacker act as any other cluster identity, acquiring that identity's privileges for both lateral movement and privilege escalation up to cluster-admin.
