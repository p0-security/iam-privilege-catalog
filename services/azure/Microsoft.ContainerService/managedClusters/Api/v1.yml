name: Kubernetes API discovery endpoints
description: Kubernetes API server discovery endpoints (/api, /api/v1, /apis, and per-group/per-version discovery) of an AKS managed cluster, which enumerate the available API groups, versions, and resource types exposed by the cluster.
scope: LOW
notes: These endpoints return only API-surface capability metadata, not the underlying resource objects or their data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the /api/v1 discovery endpoint lists the core API group's resource types, API-surface reconnaissance without access to resource data.
