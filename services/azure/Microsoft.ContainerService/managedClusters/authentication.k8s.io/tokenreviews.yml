name: Kubernetes TokenReviews (AKS)
description: "Kubernetes TokenReview is a write-only authentication-introspection API in an AKS managed cluster: submitting a bearer token returns whether it is valid and the username, UID, and group memberships it maps to. Data-plane resource accessed through the AKS Kubernetes API."
scope: MEDIUM
notes: Acts as a credential-validation and identity-enumeration oracle; it validates tokens but does not mint or return credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:account
    notes: Submitting a TokenReview validates a held bearer token and returns the associated identity and groups, letting an attacker confirm token validity and enumerate the account/groups it maps to.
