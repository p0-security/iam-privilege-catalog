name: Kubernetes userextra impersonation (AKS)
description: The Kubernetes userextra-impersonation capability on an AKS managed cluster, allowing the API caller to attach arbitrary extra authentication attributes to impersonated requests.
scope: CRITICAL
notes: Extra attributes used in authorization decisions augment user/group impersonation, helping satisfy authorization rules to assume more-privileged identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating userextras fields lets the attacker forge additional identity attributes used in authorization, augmenting impersonated identities to satisfy authz rules and escalate access.
