name: Kubernetes mutating webhook configurations (AKS)
description: Cluster-wide Kubernetes mutating admission webhook configurations on an AKS managed cluster that intercept and can rewrite API objects before they are persisted.
scope: CRITICAL
notes: Mutating webhooks are a primary admission enforcement and injection mechanism; controlling them is effectively cluster-admin over every workload.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:policy
    notes: Deleting mutating webhook configurations removes cluster-wide admission enforcement (policy/security mutation controllers such as Pod Security or sidecar injection), disabling a defense and the access-control policy it enforced.
  write:
    risks:
      - escalation:privilege
      - escalation:lateral
      - destruction:defense
      - impact:manipulation
    notes: Creating/updating a mutating webhook lets an attacker silently rewrite every admitted object cluster-wide (inject privileged sidecars/credentials, mount secrets, change service accounts) and point it at an attacker endpoint, yielding cluster-admin-level privilege escalation, lateral movement, and bypass of admission defenses.
