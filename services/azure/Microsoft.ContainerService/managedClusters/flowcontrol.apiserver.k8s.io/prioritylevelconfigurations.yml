name: AKS API Priority and Fairness priority-level configurations
description: Kubernetes API Priority and Fairness (APF) PriorityLevelConfiguration objects in an AKS cluster, which define request concurrency, queuing, and fairness limits for the kube-apiserver.
scope: HIGH
notes: These are control-plane flow-control settings that protect the apiserver from overload; they contain no data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting priority-level configurations removes apiserver flow-control/fairness protections, degrading control-plane request handling and enabling denial of service against the cluster.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Creating/updating priority-level configurations alters apiserver concurrency and queuing limits, letting an attacker starve or throttle legitimate API traffic (DoS) by manipulating control-plane operational config.
