name: AKS API server version endpoint
description: The Kubernetes API server version endpoint exposed via the AKS managed cluster data plane, returning the cluster build/version.
scope: LOW
notes: Version fingerprinting helps an attacker match the cluster against known CVEs.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the version endpoint discloses the Kubernetes/apiserver version, enabling fingerprinting for vulnerability targeting.
