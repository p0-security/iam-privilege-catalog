name: AKS cluster API server readiness probe
description: Data-plane read of the AKS-managed Kubernetes API server /readyz endpoint, which returns the aggregate readiness/health status of the cluster control plane.
scope: LOW
notes: Health-probe reads expose only readiness status (a boolean/status string), not data, configuration, secrets, or policy contents; they are low-sensitivity operational status signals.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns the aggregate control-plane readiness status, confirming the cluster exists and is reachable — trivial infrastructure-health reconnaissance.
