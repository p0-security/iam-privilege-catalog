name: Kubernetes ServiceAccounts (AKS data plane)
description: Kubernetes ServiceAccount objects within an AKS managed cluster representing in-cluster identities that workloads authenticate as and that are bound to RBAC roles.
scope: CRITICAL
notes: Identities themselves; manipulating or impersonating them is high impact, but plain enumeration of the objects is low-sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:account
      - impact:dos
    notes: Deleting ServiceAccounts removes the in-cluster identities workloads authenticate with, destroying accounts and breaking dependent controllers/workloads.
  read:
    risks:
      - discovery:account
    scope: LOW
    notes: Reading ServiceAccount objects enumerates in-cluster identities and their metadata (bound token secrets are read separately), providing account reconnaissance for impersonation targeting.
  write:
    risks:
      - persistence:account
      - escalation:lateral
      - escalation:privilege
    notes: Creating/updating ServiceAccounts lets an attacker mint new in-cluster identities (and configure their tokens/annotations, e.g. workload-identity bindings) for durable persistence and lateral movement, and to position identities for privileged access.
