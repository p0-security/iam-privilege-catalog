name: AKS cluster command results
description: Command results hold the captured stdout/stderr output of a previously issued AKS Run Command (command invoke), which executes kubectl/shell commands inside the cluster under a privileged in-cluster context.
scope: HIGH
notes: Run-command output routinely contains dumped Kubernetes secrets, kubeconfig material, environment variables, and other sensitive cluster data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:data
    notes: Retrieving a prior command's stored result returns the output of arbitrary in-cluster commands, enabling exfiltration of secrets, config, and cluster-internal data.
