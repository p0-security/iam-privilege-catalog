name: Kubernetes Endpoints (AKS)
description: Kubernetes Endpoints objects map Services to the backing pod IPs and ports, describing the internal network topology of an AKS managed cluster.
scope: HIGH
notes: Endpoints reveal reachable in-cluster targets and let traffic routing be repointed; writes can intercept or hijack service traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Removes the service-to-backend mappings, severing service connectivity and causing denial of service for affected workloads.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Repoints a Service's backend addresses to attacker-controlled hosts, manipulating in-cluster traffic routing and reaching/intercepting traffic destined for other network resources.
