name: Fleet TrafficManagerProfile resource
description: A Kubernetes Fleet networking CRD (TrafficManagerProfile) that defines the Azure Traffic Manager DNS-based global routing configuration (routing method, domain, endpoint list) for fleet services.
scope: HIGH
notes: Data-plane (isDataAction) resource controlling public DNS-based traffic routing of a domain to fleet service endpoints.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting removes the DNS routing component entirely so the domain can no longer route traffic to any fleet backend, destroying network routing and denying service.
  write:
    risks:
      - impact:manipulation
      - takeover:domain
      - escalation:network
    notes: Creating/updating rewrites DNS-based routing and endpoints for the profile's domain, letting an attacker redirect public domain traffic to attacker-controlled targets, alter routing, and extend network reach.
