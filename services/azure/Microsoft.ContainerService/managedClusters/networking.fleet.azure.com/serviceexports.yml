name: Fleet ServiceExport resource
description: A Kubernetes Fleet Manager networking custom resource (data-plane, networking.fleet.azure.com) representing a local cluster service exported/advertised to the rest of the fleet, making it reachable by other member clusters.
scope: HIGH
notes: Governs cross-cluster exposure of a cluster's services; manipulation affects multi-cluster network reachability for a single cluster's function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Delete withdraws the service from cross-cluster availability, removing network endpoints and causing DoS for consumers in other member clusters.
  read:
    risks:
      - discovery:network
    scope: MEDIUM
    notes: Read/list only enumerates which local services are exported to the fleet, revealing cross-cluster network exposure topology as reconnaissance.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Create/update advertises a local service across the fleet so other member clusters can reach it, manipulating networking config and expanding cross-cluster network reachability (network movement).
