name: Fleet TrafficManagerBackend resource
description: A Kubernetes Fleet networking CRD (TrafficManagerBackend) that wires fleet service endpoints as backends into an Azure Traffic Manager (DNS-based global routing) profile.
scope: HIGH
notes: Data-plane (isDataAction) resource governing public DNS-based traffic routing to fleet service endpoints.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting removes a DNS routing target from the Traffic Manager profile so the domain no longer routes to that fleet backend, destroying a routing component and disrupting service availability.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating changes which cluster endpoints receive DNS-routed traffic behind the Traffic Manager profile, manipulating routing and exposing/redirecting service endpoints across the network.
