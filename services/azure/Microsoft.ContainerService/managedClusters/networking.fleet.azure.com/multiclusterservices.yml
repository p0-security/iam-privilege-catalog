name: Fleet MultiClusterService resource
description: A Kubernetes Fleet networking CRD (MultiClusterService) that aggregates and load-balances a service's endpoints imported across multiple member clusters in the AKS fleet.
scope: HIGH
notes: Data-plane (isDataAction) resource controlling cross-cluster service aggregation and routing for production fleet workloads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting tears down the aggregated cross-cluster service endpoint, removing a network routing component and denying service to dependent clients.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating changes which cross-cluster endpoints traffic is aggregated to and load-balanced across, letting an attacker redirect internal multi-cluster traffic and reach additional services on the fleet network.
