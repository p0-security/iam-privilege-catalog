name: AKS managed namespaces
description: A managed namespace of an AKS managed cluster - an Azure-managed Kubernetes namespace with its quotas, network policy, isolation, and default settings governing how workloads run within that namespace.
scope: HIGH
notes: Control-plane configuration of cluster tenancy boundaries; the read returns configuration metadata only, while write/delete and credential listing escalate sharply.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a managed namespace tears down the namespace and the workloads/resources scoped to it, destroying infrastructure and disrupting the hosted service.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading a managed namespace returns its configuration metadata, providing reconnaissance of the cluster's namespace layout with no secret material returned.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a managed namespace alters cluster tenancy/configuration (quotas, network policy, isolation), letting an attacker reshape workload boundaries and establish a namespace foothold.
