name: Fleet ResourceOverride
description: An Azure Kubernetes Fleet Manager ResourceOverride is a namespace-scoped placement policy that applies RFC 6902 JSON patches to namespaced Kubernetes resources as they are propagated from the fleet hub to selected member clusters.
scope: HIGH
notes: These override rules can rewrite arbitrary fields of namespaced workloads (including container images and security contexts) across many member clusters, making them a high-leverage fleet-wide configuration control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
    notes: Deleting a ResourceOverride removes the override applied during propagation, changing what namespaced resources are deployed to member clusters fleet-wide without destroying the underlying live resources.
  read:
    risks:
      - discovery:infra
    notes: Reading the ResourceOverride enumerates the override/JSON-patch rules and cluster selectors governing how namespaced resources are mutated across member clusters; configuration reconnaissance returning no secret material.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    notes: Creating/updating a ResourceOverride injects attacker-controlled JSON patches into namespaced manifests propagated fleet-wide, letting an attacker tamper with operational config and swap in attacker-supplied container images to run their own workloads across member clusters.
