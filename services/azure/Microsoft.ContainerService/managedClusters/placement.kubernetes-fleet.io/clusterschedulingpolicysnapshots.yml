name: Fleet ClusterSchedulingPolicySnapshot
description: A Kubernetes Fleet Manager ClusterSchedulingPolicySnapshot is an immutable captured scheduling policy that governs which member clusters are selected to receive a ClusterResourcePlacement's resources.
scope: HIGH
notes: Policy snapshots drive the fleet scheduler's cluster-selection decisions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a policy snapshot removes the policy record the fleet scheduler reconciles against, disrupting placement decisions and the dependent workloads across member clusters.
  read:
    risks:
      - discovery:infra
    notes: Reading a policy snapshot reveals the scheduling policy (target clusters, replica counts, affinity) used to place workloads across the fleet, aiding reconnaissance of placement logic.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    notes: Writing a policy snapshot alters which member clusters are selected for placement, letting an attacker redirect/expand workload placement onto attacker-chosen clusters (hijack) and manipulate scheduling behavior.
