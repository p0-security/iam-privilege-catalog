name: Fleet ClusterResourceOverride
description: An Azure Kubernetes Fleet Manager ClusterResourceOverride is a placement policy that applies RFC 6902 JSON patches to cluster-scoped Kubernetes resources (namespaces, cluster roles/bindings, CRDs) as they are propagated from the fleet hub to selected member clusters.
scope: HIGH
notes: These override rules can rewrite arbitrary fields of workloads/configuration (including container images, security contexts, and RBAC objects) across many member clusters, making them a high-leverage fleet-wide configuration control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
    notes: Deleting a ClusterResourceOverride removes the override applied during propagation, changing what cluster-scoped resources are deployed to member clusters fleet-wide (e.g. dropping a security-hardening patch) without destroying the underlying live resources.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    notes: Creating/updating a ClusterResourceOverride injects attacker-controlled JSON patches into cluster-scoped manifests propagated fleet-wide, letting an attacker tamper with operational config and swap in attacker-supplied container images to run their own workloads across member clusters.
