name: Fleet ClusterStagedUpdateStrategy resource
description: A Kubernetes Fleet Manager custom resource (data-plane, kubernetes-fleet.io) that defines the staged rollout orchestration governing the order, grouping, and timing by which updates propagate across member clusters in an AKS fleet.
scope: MEDIUM
notes: Operational orchestration config that controls update propagation across multiple member clusters; not a data store or credential, but tampering can affect multi-cluster update operations.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Delete removes the orchestration object governing staged fleet update rollouts, disrupting controlled update propagation across member clusters.
  read:
    risks:
      - discovery:infra
    notes: Read/list only enumerates the staged-update strategy configuration (stages, ordering, member-cluster grouping), giving infrastructure reconnaissance of the fleet rollout orchestration with no secret or data exposure.
  write:
    risks:
      - impact:manipulation
    notes: Create/update alters how and when updates roll out across fleet member clusters, letting an attacker tamper with the operational rollout orchestration (e.g. stalling or accelerating propagation).
