name: Fleet ClusterStagedUpdateRun resource
description: An Azure Kubernetes Fleet Manager object that orchestrates a staged, wave-based rollout of resource/configuration changes across fleet member clusters.
scope: HIGH
notes: Drives multi-cluster propagation of changes; creating or altering one can deploy or disrupt workloads at fleet scale.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Deleting an in-flight staged update run aborts the rollout, manipulating deployment state and potentially leaving member clusters in an inconsistent, partially-updated condition that disrupts controlled propagation.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Read-only enumeration of staged update runs only inventories rollout orchestration configuration and progress, providing fleet-wide infrastructure reconnaissance.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Creating/updating a staged update run triggers orchestrated propagation of configuration changes across member clusters, manipulating cluster state at fleet scale and potentially disrupting running services during the rollout.
