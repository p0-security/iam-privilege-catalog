name: Kubernetes LimitRanges
description: A Kubernetes LimitRange is a namespace-scoped policy object that sets default, minimum, and maximum compute resource (CPU/memory) constraints for pods and containers in a namespace.
scope: MEDIUM
notes: Supporting operational governance config; not a primary data store and contains no secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
    notes: Deleting LimitRanges removes the namespace resource-constraint guardrails, lifting caps that would otherwise bound workload resource consumption.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading LimitRanges only enumerates namespace resource-constraint configuration, providing low-sensitivity reconnaissance of how workload resource limits are set.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating LimitRanges alters the namespace resource-constraint policy, e.g. relaxing caps so attacker workloads can over-consume CPU/memory; the manipulation of governance config is the headline.
