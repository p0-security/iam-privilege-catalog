name: Kubernetes Leases
description: "Kubernetes Lease objects (coordination.k8s.io) in an AKS managed cluster: lightweight coordination records used for controller/scheduler leader election and node heartbeats."
scope: MEDIUM
notes: Leases hold no sensitive data but are control-plane coordination primitives; tampering disrupts leader election and node availability.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
    notes: Deleting Leases (including DeleteCollection) removes leader-election and heartbeat locks, forcing re-election churn or marking nodes unhealthy, disrupting controllers and components that depend on them.
  read:
    risks:
      - discovery:infra
    notes: Reading/listing Leases reveals leader-election holders and node-heartbeat state — low-value reconnaissance about which controllers/components are active.
  write:
    risks:
      - impact:dos
      - impact:manipulation
    notes: Writing Leases lets an attacker hijack or corrupt leader-election locks and node-heartbeat records, stalling controllers/scheduler (split-brain or no active leader) and disrupting cluster control loops.
