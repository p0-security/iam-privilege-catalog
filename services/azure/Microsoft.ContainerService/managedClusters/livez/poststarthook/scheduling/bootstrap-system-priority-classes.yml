name: AKS cluster API server liveness poststart-hook probe
description: A Kubernetes API server livez liveness sub-probe (data-plane health endpoint) exposed through the AKS managed cluster that reports the ok/not-ok completion status of a specific internal control-plane post-start hook.
scope: LOW
notes: These endpoints return only a boolean component health/started signal, equivalent to operation-status polling; they expose no organizational data, configuration, RBAC contents, or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reports only whether the system-priority-classes bootstrap hook completed; inert health signal.
