name: Kubernetes DaemonSets
description: Kubernetes DaemonSet workload controllers in an AKS managed cluster, which schedule a copy of a pod on every (or selected) node, commonly used for node-level agents like CNI, logging, and monitoring.
scope: HIGH
notes: DaemonSet specs expose container images, host mounts, security contexts, and service-account references; control over them grants node-wide workload execution.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting DaemonSets removes node-wide workloads (e.g. CNI, logging, monitoring, security agents) cluster-wide, destroying infrastructure and disrupting cluster operations.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a DaemonSet runs an attacker-controlled (potentially privileged, host-mounting) container on every node, enabling resource hijacking, lateral movement via mounted service-account tokens/host access, and tampering with running workloads.
