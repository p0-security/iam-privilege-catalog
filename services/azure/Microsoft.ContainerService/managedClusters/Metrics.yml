name: AKS cluster metrics
description: Data-plane access to operational/performance metrics and telemetry of an AKS managed cluster, exposing resource utilization and workload activity but no organizational data or secrets.
scope: LOW
notes: Metrics are non-sensitive operational telemetry useful only for reconnaissance of cluster activity and posture.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading cluster metrics lets an attacker inventory resource utilization and workload behavior for infrastructure reconnaissance.
