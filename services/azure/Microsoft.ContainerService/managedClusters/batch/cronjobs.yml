name: Kubernetes CronJobs
description: "Kubernetes CronJob objects in an AKS managed cluster: workload controllers that create Jobs (and thus pods/containers) on a recurring schedule. Their pod templates specify container images, commands, environment variables, and references to mounted volumes/secrets and service accounts."
scope: HIGH
notes: Running pods execute arbitrary code under a namespace service account, so write access to batch workloads is effectively code execution and identity assumption on the cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting CronJobs (including DeleteCollection) removes scheduled workload definitions, halting recurring jobs the cluster depends on and denying the functions they support.
  read:
    risks:
      - discovery:infra
    notes: Reading CronJob specs inventories scheduled workload configuration (images, commands, env, secret/volume references), which is cluster infrastructure reconnaissance; it returns configuration, not the secret values themselves.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a CronJob schedules arbitrary attacker-controlled containers that recur (cryptomining/workload hijack) and can mount any namespace service-account token to assume that identity (lateral movement); modifying existing CronJobs tampers with operational workloads.
