name: Kubernetes Nodes
description: A Kubernetes Node object represents a worker host in the cluster, exposing its capacity, labels, taints, addresses, and conditions.
scope: HIGH
notes: Node objects expose compute topology but no secrets or workload data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting node objects removes worker hosts from the cluster, evicting the pods they host and disrupting dependent services.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Writing node objects lets an attacker cordon/drain, taint, or relabel nodes to manipulate scheduling and evict workloads, disrupting the services they host.
