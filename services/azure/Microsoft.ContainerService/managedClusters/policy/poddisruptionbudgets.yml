name: Kubernetes PodDisruptionBudgets
description: PodDisruptionBudget objects in the AKS cluster (policy API group) that constrain how many pods of a workload may be voluntarily disrupted at once, protecting workload availability during drains, evictions, and upgrades.
scope: MEDIUM
notes: A PDB is an availability-protection config object, not an IAM/access-control policy; manipulating or removing it affects workload resilience and node maintenance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting PodDisruptionBudgets removes the availability guardrail protecting workloads, allowing unrestricted simultaneous evictions/drains and enabling denial-of-service; the deletion itself destroys cluster config objects.
  read:
    risks:
      - discovery:infra
    notes: Listing PodDisruptionBudgets inventories workload availability/disruption configuration as infrastructure reconnaissance.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Creating/updating a PDB (e.g. minAvailable=replicas or maxUnavailable=0) lets an attacker block all voluntary evictions/node drains and upgrades, disrupting operations and workload availability.
