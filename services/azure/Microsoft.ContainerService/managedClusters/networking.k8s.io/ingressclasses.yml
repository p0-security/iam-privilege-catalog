name: AKS IngressClasses
description: Kubernetes IngressClass objects in an AKS cluster, which declare the available ingress controllers and the parameters that route external traffic to in-cluster services.
scope: HIGH
notes: Cluster-scoped networking configuration governing inbound traffic delivery.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting ingressclasses removes the routing class backing ingress objects, breaking external traffic delivery to cluster-hosted services and causing denial of service.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating ingressclasses lets an attacker repoint which controller handles ingress traffic and alter its parameters, manipulating routing to expose, intercept, or redirect inbound service traffic.
