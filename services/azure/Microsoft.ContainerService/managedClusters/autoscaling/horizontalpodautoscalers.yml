name: Kubernetes HorizontalPodAutoscalers (AKS)
description: Kubernetes HorizontalPodAutoscalers inside an AKS managed cluster; they automatically scale the replica count of target workloads based on observed metrics. Data-plane resource accessed through the AKS Kubernetes API.
scope: MEDIUM
notes: Supporting scaling configuration; its specs reveal scaling thresholds, target workloads, and capacity limits.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
    notes: Deleting an HPA removes automatic scaling so the target workload can no longer scale to meet demand, degrading availability under load.
  read:
    risks:
      - discovery:infra
    notes: Reading/listing HPAs enumerates autoscaling configuration (min/max replicas, target metrics, scaled targets), providing reconnaissance of scaling behavior.
  write:
    risks:
      - impact:manipulation
      - impact:spend
      - impact:dos
    notes: "Creating/updating an HPA alters scaling behavior: an attacker can raise max replicas to overprovision pods and inflate spend, or force min replicas to zero to deny service."
