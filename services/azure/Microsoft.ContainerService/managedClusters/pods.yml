name: Kubernetes Pods
description: Kubernetes Pod objects on an AKS managed cluster, the running unit of workload execution; their specs include container images, command/args, environment variables, and references to mounted secrets, configmaps, volumes, and service accounts.
scope: HIGH
notes: Pod specs frequently embed or reference credentials and sensitive configuration, and pods carry service-account tokens granting in-cluster and cloud identity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting pods terminates running workloads, disrupting the services they host and tearing down the compute units backing applications.
  read:
    risks:
      - discovery:infra
      - exfiltration:data
    notes: Reading/listing pods inventories running workloads and exposes pod specs whose environment variables and mounted secret/configmap references frequently leak credentials and sensitive operational data.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    scope: CRITICAL
    notes: Creating/updating pods lets an attacker run arbitrary containers (cryptomining/workloads), mount any secret, service-account token, host path, or the node managed identity to assume cluster/cloud identities and move laterally, and alter the cluster's running workload state.
