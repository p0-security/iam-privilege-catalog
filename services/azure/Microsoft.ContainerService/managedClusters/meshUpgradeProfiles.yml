name: AKS managed cluster mesh upgrade profiles
description: A managed cluster's service mesh upgrade profile enumerates the available service-mesh upgrade paths and versions applicable to that specific cluster.
scope: LOW
notes: Non-sensitive per-cluster version/capability configuration; no data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading a cluster's mesh upgrade profile enumerates available mesh upgrade paths/versions, providing infrastructure reconnaissance of cluster upgrade options.
