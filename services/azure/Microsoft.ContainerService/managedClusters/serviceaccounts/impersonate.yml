name: Kubernetes ServiceAccounts (AKS data plane)
description: Kubernetes ServiceAccount objects within an AKS managed cluster representing in-cluster identities that workloads authenticate as and that are bound to RBAC roles.
scope: CRITICAL
notes: ServiceAccounts are workload identities; the ability to impersonate them lets a caller act as that identity with its bound RBAC permissions, which can lead to full cluster compromise.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating a ServiceAccount lets an attacker act directly as that identity with its bound RBAC permissions, a direct lateral-movement and privilege-escalation primitive (potentially to cluster-admin-bound accounts).
