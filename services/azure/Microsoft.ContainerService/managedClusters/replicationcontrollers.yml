name: Kubernetes ReplicationControllers
description: Kubernetes ReplicationController objects on an AKS managed cluster, controllers that maintain a desired number of pod replicas from an embedded pod template (images, env, mounts, service accounts).
scope: HIGH
notes: RC specs embed a full pod template (with secret/identity references) and the desired replica/scaling configuration of running workloads; they schedule and continuously maintain pods at scale.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting replication controllers tears down the controllers and the pod replicas they maintain, terminating workloads and removing the infrastructure that sustains the affected services.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    scope: CRITICAL
    notes: Creating/updating replication controllers schedules and continuously maintains attacker-defined pod replicas at scale (durable cryptomining/workload hijack), mounting service-account tokens or the node identity for lateral movement while altering managed workloads.
