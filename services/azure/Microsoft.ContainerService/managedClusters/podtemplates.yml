name: Kubernetes PodTemplates
description: Kubernetes PodTemplate objects on an AKS managed cluster, reusable pod specifications (images, env vars, command, mounted secret/volume/service-account references) that controllers can instantiate into running pods.
scope: HIGH
notes: PodTemplate specs embed the same sensitive configuration and secret/identity references as pod specs and define how workloads are constructed.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting pod templates removes reusable workload definitions, disrupting controllers/operators that rely on them to provision pods.
  read:
    risks:
      - discovery:infra
      - exfiltration:data
    notes: Reading/listing pod templates inventories reusable workload definitions and exposes embedded environment variables and secret/identity references that can disclose credentials and sensitive configuration.
  write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Creating/updating pod templates injects malicious pod specifications (attacker images, privileged settings, mounted tokens/identities) that controllers later instantiate, manipulating workload definitions and seeding lateral movement when those pods run.
