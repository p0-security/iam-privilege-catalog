name: Kubernetes CertificateSigningRequests
description: "Kubernetes CertificateSigningRequest (CSR) objects in an AKS managed cluster: requests to the cluster CA to sign an X.509 client/serving certificate. Approved CSRs carry the issued certificate in their status.certificate field, and the requested subject (username/groups) determines the identity the certificate authenticates as."
scope: CRITICAL
notes: CSRs are a credential-issuance primitive; the certificate-issuance path is a well-known Kubernetes privilege-escalation vector that can mint cluster-admin (system:masters) credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
    notes: Deleting CSRs (including DeleteCollection) removes pending/issued certificate-signing objects and their embedded certificate material, destroying credential-issuance artifacts and disrupting legitimate certificate provisioning.
  read:
    risks:
      - exfiltration:crypto
      - discovery:account
    notes: Reading/listing CSRs returns the signed client certificate from status.certificate of approved requests (usable Kubernetes authentication credential) and enumerates the identities/groups requesting certificates.
  write:
    risks:
      - escalation:privilege
      - persistence:account
      - escalation:lateral
    notes: Creating/updating a CSR (and the status/approval subresource) lets an attacker request a client certificate for an arbitrary username/group (e.g. system:masters) which, once signed, yields durable cluster-admin credentials — the canonical Kubernetes escalation path.
