name: Kubernetes ResourceQuotas (AKS data plane)
description: Kubernetes ResourceQuota objects within an AKS managed cluster that define per-namespace caps on aggregate resource consumption (CPU, memory, object counts).
scope: MEDIUM
notes: Governance/guardrail configuration rather than organizational data; sensitivity is low-to-moderate operational config.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:hijack
    notes: Deleting a ResourceQuota removes the enforcement object that caps namespace consumption, eliminating a governance guardrail and freeing an attacker to consume cluster capacity for their own workloads.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading ResourceQuota objects only enumerates namespace resource-limit configuration, low-sensitivity infrastructure reconnaissance.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    notes: Creating/updating ResourceQuotas alters operational caps; raising or removing limits lets an attacker schedule unbounded workloads (resource hijacking) or tighten quotas to starve legitimate workloads.
