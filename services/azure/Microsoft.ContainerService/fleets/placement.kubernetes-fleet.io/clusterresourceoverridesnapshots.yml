name: Fleet ClusterResourceOverrideSnapshot
description: A Kubernetes Fleet Manager ClusterResourceOverrideSnapshot is an immutable, controller-managed, point-in-time capture of a cluster-scoped resource-override policy that defines how cluster-scoped Kubernetes resources are mutated (patched) as they are propagated to member clusters.
scope: HIGH
notes: Override configuration governs fleet-wide multi-cluster deployment behavior; it is sensitive supporting infrastructure config but contains no credentials or workload data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
      - destruction:artifact
    notes: Deleting a versioned override snapshot removes a controller-tracked override-policy artifact, disrupting override versioning and altering how cluster-scoped resources are reconciled and propagated to member clusters.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the snapshot tampers with the versioned override configuration the placement controllers reconcile from, altering how cluster-scoped resources are mutated when propagated across member clusters.
