name: Fleet ClusterResourcePlacement resource
description: A Fleet ClusterResourcePlacement (CRP) is the fleet-wide policy that selects which hub cluster-scoped resources are propagated to which member clusters, governing multi-cluster workload distribution.
scope: HIGH
notes: CRP is the central fleet scheduling policy; writing it can propagate attacker-controlled workloads across many member clusters at once.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a CRP removes the placement policy, causing fleet-wide withdrawal of the propagated resources from member clusters and disrupting the orchestrated workloads.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Reading a ClusterResourcePlacement enumerates the fleet's placement policies and which resources are scheduled to which member clusters, revealing the multi-cluster deployment topology for reconnaissance.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
      - escalation:lateral
    notes: Writing a CRP controls which resources propagate to which member clusters, enabling fleet-wide deployment of attacker-controlled workloads (resource hijacking), manipulation of multi-cluster scheduling config, and lateral movement into many clusters under their identities at once.
