name: Fleet cluster approval request
description: A KubeFleet ClusterApprovalRequest is a data-plane object representing a request for user approval to advance a staged update run (a change-control gate for fleet rollouts).
scope: HIGH
notes: Approval requests gate staged rollouts for a single fleet/application function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
    notes: Deleting an approval request removes a rollout gate object, altering the staged-update change-control workflow state.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Read/list only enumerates pending approval-gate objects, revealing rollout/gating workflow state for reconnaissance with no secrets returned.
  write:
    risks:
      - impact:manipulation
    notes: Writing an approval request lets an attacker self-approve a gated staged update, advancing a rollout across member clusters and manipulating the change-control workflow state.
