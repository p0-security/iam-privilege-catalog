name: Fleet ClusterResourceSnapshot
description: A KubeFleet placement data-plane object capturing a point-in-time set of Kubernetes resource manifests selected for propagation across the fleet's member clusters.
scope: HIGH
notes: Part of the Azure Kubernetes Fleet multi-cluster placement engine; the snapshot is the manifest payload that gets deployed fleet-wide.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - impact:manipulation
    notes: Deleting a snapshot removes the manifest payload backing a placement, disrupting reconciliation and the workloads it drives across member clusters.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    notes: Writing a snapshot defines the resource manifests propagated across member clusters, letting an attacker inject or alter workload definitions and run their own containers fleet-wide.
