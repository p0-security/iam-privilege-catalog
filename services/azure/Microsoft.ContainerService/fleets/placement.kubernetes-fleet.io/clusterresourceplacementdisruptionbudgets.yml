name: Fleet placement disruption budget
description: A KubeFleet ClusterResourcePlacementDisruptionBudget is a data-plane policy object that caps how many placed workloads may be voluntarily disrupted at once, acting as an availability guardrail for fleet placements.
scope: HIGH
notes: These budgets are protective availability controls for a single fleet/application function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - impact:dos
    notes: Deleting the disruption budget removes the safeguard that caps simultaneous placement disruptions, eliminating an availability defense and enabling unrestricted eviction/disruption of fleet workloads.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Writing a disruption budget can loosen or replace the guardrail that limits simultaneous workload disruption, weakening an availability defense and manipulating placement protection policy.
