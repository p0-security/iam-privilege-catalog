name: AKS fleet Kubernetes node API (node.k8s.io)
description: The node.k8s.io API group on an AKS Fleet member cluster, which holds RuntimeClass objects describing available container runtime handlers and node configuration.
scope: LOW
notes: Read access reveals runtime/node configuration metadata only; no secrets or data payloads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Enumerates RuntimeClass objects, revealing node runtime handler configuration for infrastructure reconnaissance.
