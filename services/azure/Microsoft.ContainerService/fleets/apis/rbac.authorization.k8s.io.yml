name: AKS fleet Kubernetes RBAC API (rbac.authorization.k8s.io)
description: The rbac.authorization.k8s.io API group on an AKS Fleet member cluster, holding Roles, ClusterRoles, RoleBindings, and ClusterRoleBindings that define in-cluster access-control policy.
scope: LOW
notes: Reading RBAC objects discloses the cluster's access-control graph (who can do what), valuable for finding over-privileged principals and escalation paths, but grants no modification capability on its own.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Enumerates Roles/ClusterRoles and their bindings, letting an attacker map cluster access-control policy and identify privilege-escalation weak points.
