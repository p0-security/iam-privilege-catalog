name: AKS Fleet Kubernetes API (events.k8s.io group)
description: Data-plane read access to the events.k8s.io API group (Event objects) on an AKS Fleet member cluster's aggregated Kubernetes API. Events are operational/audit-like records of cluster activity.
scope: LOW
notes: Event records are log-like operational data revealing cluster activity and resource state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Read-only listing of cluster Event objects enables reconnaissance of cluster activity and recent operational behavior via log-like records.
