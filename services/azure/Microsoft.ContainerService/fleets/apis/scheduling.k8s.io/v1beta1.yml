name: AKS fleet Kubernetes scheduling API (scheduling.k8s.io)
description: The scheduling.k8s.io API group on an AKS Fleet member cluster, which holds PriorityClass objects that define workload scheduling priority and preemption behavior.
scope: LOW
notes: Read access reveals scheduling-priority configuration metadata only; no secrets or data payloads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads scheduling.k8s.io/v1beta1 PriorityClass objects, enumerating scheduling configuration for reconnaissance.
