name: AKS Fleet Kubernetes autoscaling API (autoscaling group)
description: The Kubernetes data-plane autoscaling API group (HorizontalPodAutoscaler / scale objects) exposed through an Azure Kubernetes Fleet Manager fleet hub. These objects define workload scaling configuration and targets.
scope: LOW
notes: Read-only enumeration of scaling configuration; non-sensitive infrastructure metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading autoscaling/v1 HPA objects enumerates workload scaling configuration, read-only infrastructure inventory.
