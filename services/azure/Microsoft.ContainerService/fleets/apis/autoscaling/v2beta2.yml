name: AKS Fleet Kubernetes API (autoscaling group)
description: Data-plane read access to the autoscaling API group (HorizontalPodAutoscaler objects) on an AKS Fleet member cluster's aggregated Kubernetes API. HPA objects describe how workloads scale based on resource metrics.
scope: LOW
notes: Read-only enumeration of scaling configuration; contains no secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only get/list of HorizontalPodAutoscaler objects exposes workload scaling configuration as infrastructure reconnaissance only.
