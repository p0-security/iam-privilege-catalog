name: AKS Fleet Kubernetes authorization API (authorization.k8s.io)
description: The Kubernetes data-plane authorization API group (SubjectAccessReview / SelfSubjectRulesReview objects) exposed through an Azure Kubernetes Fleet Manager fleet hub. These objects evaluate and report RBAC/access-control decisions.
scope: LOW
notes: Read access lets an attacker probe effective permissions/RBAC posture to find access-control weak points; reconnaissance of access-control policy.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading the authorization.k8s.io group exposes access-review objects revealing what permissions subjects hold, mapping RBAC weak points for escalation planning.
