name: AKS Fleet Kubernetes workloads (apps group)
description: The Kubernetes data-plane apps API group (Deployments, StatefulSets, DaemonSets, ReplicaSets) exposed through an Azure Kubernetes Fleet Manager fleet hub. These objects define workload configuration and pod templates.
scope: LOW
notes: Read access exposes workload specs (images, args, replica counts, env/secret references) but returns no secret values; configuration reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Get/list of apps/v1 workload objects discloses workload topology and pod-spec configuration, read-only infrastructure discovery.
