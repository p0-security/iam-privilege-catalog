name: Kubernetes Fleet API discovery
description: The Kubernetes API discovery endpoints of an AKS Fleet hub cluster, which return only the API surface metadata (available API versions, groups, and resource types) rather than any actual resource content.
scope: LOW
notes: These endpoints expose schema/surface metadata only; they do not return workload data, secrets, or policy object contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads the admissionregistration.k8s.io/v1beta1 group-version discovery endpoint, enumerating its resource types; API-surface reconnaissance only.
