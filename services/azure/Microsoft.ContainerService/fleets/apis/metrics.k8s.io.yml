name: AKS Fleet Kubernetes API (metrics.k8s.io group)
description: Data-plane read access to the metrics.k8s.io API group on an AKS Fleet member cluster's aggregated Kubernetes API. This group exposes pod and node resource-usage metrics (CPU/memory).
scope: LOW
notes: Read-only operational telemetry; contains no secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only retrieval of pod/node resource-usage metrics provides low-sensitivity operational/utilization reconnaissance of cluster workloads.
