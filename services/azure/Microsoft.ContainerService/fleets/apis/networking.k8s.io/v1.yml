name: AKS fleet Kubernetes networking API (networking.k8s.io)
description: The networking.k8s.io API group on an AKS Fleet member cluster, covering NetworkPolicies, Ingresses, and IngressClasses that define cluster network segmentation and external exposure.
scope: LOW
notes: Read access exposes network topology and exposure rules but no payload data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reads networking.k8s.io/v1 objects (NetworkPolicies, Ingresses), enabling reconnaissance of network configuration and exposed services.
