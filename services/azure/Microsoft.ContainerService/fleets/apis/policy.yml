name: AKS fleet Kubernetes policy API (policy group)
description: The Kubernetes 'policy' API group on an AKS Fleet member cluster, covering PodDisruptionBudgets (and legacy PodSecurityPolicies) that govern workload availability and pod admission constraints.
scope: LOW
notes: This is workload/availability configuration, NOT IAM/access-control; reading it is infrastructure reconnaissance, not policy discovery.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Enumerates PodDisruptionBudgets and legacy pod-security constraints, revealing workload availability and admission posture for reconnaissance.
