name: AKS Fleet Kubernetes API (extensions group)
description: Data-plane read access to the legacy extensions API group on an AKS Fleet member cluster's aggregated Kubernetes API. This group historically exposed Deployments, Ingress, and NetworkPolicy objects describing workload and network-routing configuration.
scope: LOW
notes: Read-only enumeration of workload and network/ingress configuration; contains no secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
      - discovery:network
    notes: Read-only listing of extensions/v1beta1 objects (Deployments, Ingress, NetworkPolicy) exposes workload and network-routing/topology configuration as infrastructure and network reconnaissance.
