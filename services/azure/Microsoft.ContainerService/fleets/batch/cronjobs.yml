name: Kubernetes CronJobs
description: Kubernetes CronJob objects in an AKS fleet that schedule containerized workloads to run on a recurring basis, including full pod templates (images, commands, env, volume mounts).
scope: HIGH
notes: Workload definitions can reference or inline sensitive configuration and execute with mounted service-account identities, supporting a single application function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting CronJobs removes scheduled workloads, disrupting recurring operational processes (backups, cleanup, reconciliation) and destroying workload infrastructure.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
      - impact:spend
    notes: Creating/updating a CronJob schedules attacker-defined containers that run repeatedly under the pod's service-account identity, enabling cryptomining/hijacking, lateral movement via the mounted token, and tampering with scheduled operations.
