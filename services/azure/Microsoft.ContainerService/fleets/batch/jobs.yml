name: Kubernetes Jobs
description: Kubernetes Job objects in an AKS fleet that run containerized batch workloads to completion, including full pod templates (images, commands, env, volume mounts).
scope: HIGH
notes: Workload definitions can reference or inline sensitive configuration and execute with mounted service-account identities, supporting a single application function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting Jobs terminates running/queued batch workloads and removes their pods, disrupting the processing they perform.
  read:
    risks:
      - discovery:infra
    notes: Listing/getting Jobs enumerates batch-workload definitions and their pod specs (images, commands, env references), constituting infrastructure reconnaissance.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
      - impact:spend
    notes: Creating/updating a Job runs an attacker-controlled container in the cluster under the pod's service-account identity, enabling resource hijacking (cryptomining), lateral movement via the mounted token, and manipulation of batch processing.
