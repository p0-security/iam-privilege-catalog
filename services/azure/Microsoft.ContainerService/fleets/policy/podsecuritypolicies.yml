name: Kubernetes PodSecurityPolicies (Fleet)
description: PodSecurityPolicies are cluster-level admission-control objects that constrain what pods may do (privileged mode, hostPath/hostNetwork/hostPID, capabilities, volume types), enforcing a pod-security defense across an AKS Fleet's member clusters.
scope: HIGH
notes: A security defense mechanism; weakening or removing it permits privileged pods that can escalate to node/cluster control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
    notes: Deleting a PSP removes the admission-control enforcement that restricts pod privileges, disabling a defense so otherwise-restricted privileged pods can run.
  write:
    risks:
      - destruction:defense
      - escalation:privilege
    notes: Writing a PSP can relax admission controls (allow privileged/hostPath/hostPID pods), disabling a defense and enabling deployment of privileged pods that escalate to the node/cluster.
