name: Fleet TrafficManagerBackend (public DNS routing backend)
description: An AKS Fleet Manager TrafficManagerBackend resource that registers fleet member-cluster service endpoints as backends of an Azure Traffic Manager (DNS-based) profile.
scope: HIGH
notes: Data-plane object wiring fleet services into public DNS-based traffic routing; controls which endpoints receive externally routed traffic for a service.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting removes an endpoint from the Traffic Manager routing pool, disrupting public traffic delivery to that backend.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating changes which endpoints serve traffic behind the Traffic Manager profile, letting an attacker redirect public-routed traffic to chosen endpoints and reach additional networked services.
