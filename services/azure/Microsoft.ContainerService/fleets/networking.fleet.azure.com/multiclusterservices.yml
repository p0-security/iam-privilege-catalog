name: Fleet MultiClusterService (aggregated cross-cluster service)
description: An AKS Fleet Manager MultiClusterService resource that imports and aggregates Kubernetes Services across member clusters into a single cross-cluster endpoint.
scope: HIGH
notes: Data-plane fleet networking object controlling cross-cluster service discovery and load balancing; defines how a service is reachable across the fleet's internal network.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting removes the aggregated cross-cluster service endpoint, destroying network routing and denying service to dependent workloads.
  read:
    risks:
      - discovery:network
    notes: Reading enumerates which services are imported/aggregated across member clusters and their backend targets, revealing cross-cluster service topology.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating/updating imports and exposes a service across member clusters, enabling network movement to additional cluster resources and manipulation of cross-cluster routing/load-balancing.
