name: Kubernetes service accounts (fleet)
description: Kubernetes ServiceAccount objects within an AKS fleet namespace, which represent in-cluster workload identities that pods authenticate as and that are bound to RBAC roles.
scope: CRITICAL
notes: Workload identities are targets for impersonation and credential theft; controlling them enables persistence and privilege escalation across the cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:account
      - impact:dos
    notes: Deleting ServiceAccounts removes cluster workload identities, destroying accounts and breaking authentication for the pods that depend on them, disrupting those services.
  read:
    risks:
      - discovery:account
    scope: MEDIUM
    notes: Reading ServiceAccount objects inventories the cluster's workload identities, providing reconnaissance and targets for compromise or impersonation; it does not return their token secrets.
  write:
    risks:
      - persistence:account
      - escalation:privilege
      - escalation:lateral
    notes: Creating/updating ServiceAccounts lets an attacker provision new cluster identities or modify existing ones (including bound credentials/annotations), establishing persistence and attaching more capable identities to controlled workloads for privilege escalation and lateral movement.
