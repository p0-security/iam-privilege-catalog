name: Kubernetes pod metrics (Fleet)
description: Pod resource-utilization metrics exposed via the Kubernetes Metrics API (metrics.k8s.io) for fleet clusters. Returns per-pod CPU/memory usage telemetry and the pod inventory.
scope: LOW
notes: Read-only utilization telemetry; no data, secrets, or control-plane access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads pod CPU/memory metrics, enumerating running workloads and their utilization as low-sensitivity infrastructure reconnaissance.
