name: Kubernetes node metrics (Fleet)
description: Node resource-utilization metrics exposed via the Kubernetes Metrics API (metrics.k8s.io) for fleet clusters. Returns per-node CPU/memory capacity and usage telemetry and the node inventory.
scope: LOW
notes: Read-only utilization telemetry; no data, secrets, or control-plane access.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads node CPU/memory metrics, enumerating cluster nodes and their capacity/usage as low-sensitivity infrastructure reconnaissance.
