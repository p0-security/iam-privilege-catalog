name: Kubernetes DaemonSets (Fleet)
description: A Kubernetes DaemonSet is a workload controller that ensures a copy of a pod runs on every (or selected) node, managed across Azure Kubernetes Fleet Manager member clusters. DaemonSets commonly run node-level agents (logging, monitoring, CNI) with elevated host access.
scope: HIGH
notes: Workload controllers can run arbitrary containers under pod service-account identities with mounted secrets and host resources, making them a high-value target on production clusters.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting DaemonSets tears down node-level workloads (often logging/monitoring/CNI agents) across the fleet, destroying running infrastructure and disrupting the services they support.
  read:
    risks:
      - discovery:infra
    notes: Reading DaemonSet specs across the fleet inventories workload configuration (images, node selectors, env, mounted volume/secret references) for reconnaissance; it returns config references, not the secret values themselves.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating DaemonSets schedules attacker-controlled containers on every node (often privileged/hostPath), enabling cryptomining/host compromise, lateral movement via mounted service-account tokens and node credentials, and tampering with operational workload configuration.
