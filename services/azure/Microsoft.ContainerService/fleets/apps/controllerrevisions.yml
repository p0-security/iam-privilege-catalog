name: Kubernetes ControllerRevisions (Fleet)
description: ControllerRevisions are immutable Kubernetes objects that store historical snapshots of DaemonSet and StatefulSet state (pod templates) to support rollouts and rollbacks. In a Fleet they hold workload revision history for member clusters.
scope: MEDIUM
notes: Revision snapshots embed full pod-template specs, including environment variables, command arguments, and config that can incidentally reference or contain sensitive workload data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - impact:manipulation
    notes: Deleting ControllerRevisions destroys the rollout/rollback history of StatefulSets/DaemonSets, removing the ability to revert to known-good states and disrupting controller-managed operational state.
  read:
    risks:
      - discovery:infra
    notes: Reading ControllerRevisions exposes historical DaemonSet/StatefulSet pod-template specs, revealing workload configuration and embedded references useful for reconnaissance.
  write:
    risks:
      - impact:manipulation
    scope: HIGH
    notes: Creating/updating ControllerRevisions tampers with the stored revision/rollback history that StatefulSet/DaemonSet controllers act upon, corrupting rollout state and what a rollback restores.
