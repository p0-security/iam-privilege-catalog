name: AKS Fleet Manager fleet
description: An AKS Fleet (Fleet Manager) is a multi-cluster management/orchestration hub that groups and coordinates updates and configuration across member AKS clusters, optionally hosting a managed hub cluster.
scope: CRITICAL
notes: Governs centralized orchestration across multiple member AKS clusters.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
      - takeover:account
    notes: Returns the fleet hub kubeconfig credential, exporting reusable secret material that grants administrative Kubernetes API access to the fleet and pivots into orchestration across its member clusters.
