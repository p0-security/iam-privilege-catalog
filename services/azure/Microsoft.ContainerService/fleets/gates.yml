name: AKS fleet update gates
description: A gate within an AKS Fleet update run - a rollout-orchestration control object that approves or blocks staged updates across member clusters of the fleet.
scope: MEDIUM
notes: Governs multi-cluster update rollout flow; not a data store, but manipulating gates affects deployment orchestration across the fleet.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:manipulation
    notes: Deleting a fleet gate removes a rollout-control checkpoint, disrupting the fleet update workflow and bypassing the gating barrier.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a fleet gate lets an attacker approve, block, or alter rollout gating, manipulating the multi-cluster update orchestration to force or stall deployments.
