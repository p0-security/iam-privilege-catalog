name: Kubernetes VolumeAttachments (Fleet)
description: Cluster-scoped Kubernetes VolumeAttachment objects on an AKS Fleet, which track the attach/detach state binding persistent volumes to specific nodes.
scope: MEDIUM
notes: VolumeAttachment objects describe storage topology (which volume is bound to which node) but do not contain the stored data itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting VolumeAttachments forcibly tears down volume-to-node attachment records, detaching storage from running pods and disrupting stateful workloads.
  read:
    risks:
      - discovery:infra
    notes: Reading VolumeAttachments enumerates which persistent volumes are attached to which nodes, supporting storage-topology reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating VolumeAttachments manipulates the volume-to-node attach/detach state machine, which can wedge or misroute storage attachment and disrupt stateful workloads.
