name: Kubernetes CSIDriver objects (AKS fleet)
description: Cluster-scoped Kubernetes CSIDriver objects that register Container Storage Interface drivers and configure how volumes are attached and mounted across the cluster's workloads.
scope: HIGH
notes: Storage-subsystem configuration for a single AKS fleet/cluster; controls volume provisioning and mount behavior but holds no secrets or identity material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting CSIDriver registration removes the storage driver from the cluster, breaking volume provisioning/mounting and denying storage to dependent stateful workloads.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Read-only get/list of CSIDriver objects only inventories which storage drivers are installed and their configuration, i.e. infrastructure reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating CSIDriver objects alters cluster-wide storage driver behavior (attachRequired, podInfoOnMount, fsGroupPolicy, mount lifecycle), manipulating operational storage configuration.
