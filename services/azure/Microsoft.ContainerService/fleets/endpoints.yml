name: Fleet Kubernetes endpoints
description: Kubernetes Endpoints objects inside an Azure Fleet hub cluster, mapping Services to their backend Pod IPs and ports.
scope: HIGH
notes: Endpoints expose internal service-to-backend network topology; controlling them lets an attacker redirect or sever in-cluster traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting endpoints removes service-to-backend mappings, severing traffic delivery to pods and causing denial of service for affected services.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Writing endpoints lets an attacker repoint a Service's backends to attacker-controlled IPs, redirecting/intercepting in-cluster traffic and reaching additional network targets.
