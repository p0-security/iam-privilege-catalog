name: Kubernetes service accounts (fleet)
description: Kubernetes ServiceAccount objects within an AKS fleet namespace, which represent in-cluster workload identities that pods authenticate as and that are bound to RBAC roles.
scope: CRITICAL
notes: Workload identities are targets for impersonation and credential theft; controlling them enables persistence and privilege escalation across the cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating a ServiceAccount lets an attacker act as another in-cluster identity, inheriting its (potentially broader) RBAC permissions, directly enabling lateral movement and privilege escalation.
