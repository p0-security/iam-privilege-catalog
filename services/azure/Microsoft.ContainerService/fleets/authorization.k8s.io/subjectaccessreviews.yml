name: Kubernetes SubjectAccessReviews (Fleet)
description: A Kubernetes SubjectAccessReview is an authorization-query API object that reports whether an arbitrary subject can perform a given action cluster-wide. It creates no persistent resource.
scope: MEDIUM
notes: Lets a caller probe other principals' cluster-wide RBAC permissions.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:policy
    notes: Submitting SubjectAccessReviews lets an attacker probe whether any subject is authorized for cluster-wide actions, comprehensively mapping RBAC to locate privileged accounts and escalation targets.
