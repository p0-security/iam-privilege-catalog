name: Kubernetes SelfSubjectRulesReviews (Fleet)
description: A Kubernetes SelfSubjectRulesReview is an authorization-query API object that returns the full set of rules/permissions the calling identity has within a namespace. It creates no persistent resource.
scope: LOW
notes: "Self-scoped: enumerates only the caller's own RBAC rules."
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:policy
    notes: Creating SelfSubjectRulesReviews returns the caller's complete effective RBAC rule set in a namespace, letting an attacker inventory its own access footprint.
