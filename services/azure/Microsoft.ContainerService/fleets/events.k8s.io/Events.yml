name: Kubernetes events (Fleet)
description: Kubernetes Event objects in fleet-managed cluster namespaces, records of cluster activity such as pod scheduling, image pulls, failures, and state changes.
scope: LOW
notes: Events are low-sensitivity informational/log-like objects but reveal operational state and recent activity across the fleet.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
      - destruction:defense
    notes: Deleting events removes the cluster activity/audit-like trail, disrupting incident response and erasing evidence of attacker actions.
  read:
    risks:
      - discovery:logs
      - discovery:infra
    notes: Reading events enumerates the cluster activity/log stream and reveals infrastructure and workload state, supporting reconnaissance of recent operations.
  write:
    risks:
      - impact:manipulation
    notes: Writing/forging events lets an attacker inject false operational records to mislead operators and obscure malicious activity.
