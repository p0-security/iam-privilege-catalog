name: Kubernetes DaemonSets (Fleet)
description: Kubernetes DaemonSet controllers in fleet-managed cluster namespaces, which run a copy of a pod on every (or selected) node, commonly used for node-level agents (CNI, logging, monitoring, security).
scope: HIGH
notes: DaemonSets run node-wide and often require privileged/host access; controlling them affects every node across fleet clusters and can expose container images, mounts, and service-account references.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting DaemonSets removes node-level workloads (e.g. CNI, logging, monitoring, security agents) across the fleet, disrupting cluster operations and tearing down deployed workload infrastructure.
  read:
    risks:
      - discovery:infra
    notes: Reading DaemonSet specs inventories node-level workload configuration (images, volumes, mounts, host access, service-account refs) across fleet clusters.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a DaemonSet schedules an attacker-controlled container on every node (often with host mounts and the workload service-account token), enabling resource hijacking, lateral movement to node/cluster identities, and tampering with deployed workloads.
