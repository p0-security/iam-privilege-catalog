name: Kubernetes Ingresses (Fleet)
description: Kubernetes Ingress resources in fleet-managed cluster namespaces, which define external HTTP(S) routing rules, hostnames, paths, TLS, and backend service mappings.
scope: HIGH
notes: Ingresses govern public-facing exposure of cluster services across the fleet; controlling them affects external reachability and traffic routing of production services.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:network
    notes: Deleting Ingresses removes external routing rules, severing public access to the backing services and causing denial of service.
  read:
    risks:
      - discovery:network
    notes: Reading Ingress objects enumerates external routing rules, hostnames, paths, TLS config, and backend service mappings, mapping the cluster's network exposure across the fleet.
  write:
    risks:
      - escalation:network
      - impact:manipulation
      - impact:defacement
    notes: Creating/updating an Ingress lets an attacker reroute or expose internal services externally and alter public-facing host/path routing, enabling traffic interception, network exposure, and defacement of public endpoints.
