name: Kubernetes Deployments (Fleet)
description: Kubernetes Deployment controllers in fleet-managed cluster namespaces, which manage replicated, declaratively-updated application pods.
scope: HIGH
notes: Deployments define production application workloads including container images, environment, volumes, and service-account references across fleet clusters.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting Deployments tears down running application workloads, causing denial of service to the functions they support and destroying deployed workload infrastructure.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a Deployment runs arbitrary attacker-controlled containers, can mount secrets and assume pod service-account identities for lateral movement, and alters running application config.
