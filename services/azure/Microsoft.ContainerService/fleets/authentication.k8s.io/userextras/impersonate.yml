name: Kubernetes userextras impersonation (Fleet)
description: The Kubernetes userextras-impersonation privilege on an AKS Fleet, which allows a caller to forge extra identity attributes (userextras) attached to an impersonated request and used in authorization decisions.
scope: CRITICAL
notes: Userextras impersonation completes the impersonation primitive by spoofing authorization-relevant identity claims, enabling assumption of higher-privileged identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
      - escalation:lateral
    notes: Impersonating userextras lets an attacker forge extra authentication claims used in authorization, enabling privilege escalation and assumption of another identity's access.
