name: Kubernetes CertificateSigningRequests
description: Kubernetes CertificateSigningRequest objects in an AKS fleet, which request and (once approved/signed) carry issued client certificates used to authenticate identities to the cluster API.
scope: CRITICAL
notes: "CSRs are PKI/credential material: an approved CSR's status field contains a signed client certificate usable to authenticate as an arbitrary subject, including cluster-admin groups."
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:access
    notes: Deleting CSRs destroys pending/issued certificate-signing material and can block legitimate principals from obtaining the certificates they are awaiting, denying authorized access provisioning.
  read:
    risks:
      - exfiltration:crypto
      - discovery:policy
    notes: Reading CSRs returns the issued client certificate in status.certificate (usable authentication credential) and reveals the requested subjects/groups, exposing both crypto material and identity-provisioning detail.
  write:
    risks:
      - escalation:privilege
      - persistence:account
      - escalation:lateral
    notes: Creating/updating CSRs (including the approval/status subresources implied by write) lets an attacker request and mint client certificates for arbitrary usernames/groups such as system:masters, forging cluster-admin identities for privilege escalation and durable credential-based persistence.
