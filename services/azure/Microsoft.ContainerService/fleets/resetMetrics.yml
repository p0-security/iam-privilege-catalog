name: AKS Fleet apiserver metrics endpoint
description: The AKS Fleet apiserver resetMetrics endpoint exposed as a read action through the fleets resource provider. As a read it returns only operational metrics/status of the control plane.
scope: LOW
notes: Surfaced as /read, it exposes metrics/operational state and does not mutate or reset state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns only operational metrics/status of the fleet apiserver; low-value infra reconnaissance with no mutation.
