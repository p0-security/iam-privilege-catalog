name: AKS Fleet auto-upgrade profile
description: An AKS Fleet auto-upgrade profile defines the automated Kubernetes/node-image upgrade orchestration policy (channel, target versions, schedule) that governs how member clusters in a fleet are upgraded.
scope: MEDIUM
notes: Controls lifecycle/upgrade orchestration across multiple member clusters; mutating it can force or stall version rollouts fleet-wide, but it holds no secrets or workload data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting the profile removes the fleet's upgrade-orchestration configuration object, disrupting governed patching/upgrade automation without destroying the underlying clusters or their data.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    scope: HIGH
    notes: Creating/updating the profile alters fleet-wide upgrade policy and can force disruptive Kubernetes/node-image rollouts that cycle/reboot nodes across member clusters, manipulating operational config and risking service disruption.
