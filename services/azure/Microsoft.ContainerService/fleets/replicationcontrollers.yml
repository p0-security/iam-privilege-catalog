name: Kubernetes replication controllers (AKS Fleet)
description: ReplicationControllers are namespaced Kubernetes workload controllers that keep a specified number of pod replicas running, embedding a pod template (images, env, mounts, service accounts) in AKS Fleet-managed clusters.
scope: HIGH
notes: As active workload controllers they both run pods (hijack/lateral surface) and define the running application topology.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting a replication controller tears down the pods it manages, terminating running workloads and causing denial of service to the affected applications.
  read:
    risks:
      - discovery:infra
    notes: Reading replication controllers inventories running workloads, their embedded pod specs (images, env, service-account references) and replica counts, revealing deployment configuration across the fleet.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating replication controllers actively schedules and maintains attacker-defined pods running arbitrary images as cluster service accounts, enabling resource hijacking (e.g. cryptomining), lateral movement via mounted service-account tokens, and tampering with running workloads.
