name: AKS Fleet apiserver readyz health probe
description: A Kubernetes apiserver readyz post-start-hook health-check endpoint exposed through the AKS Fleet (fleets) resource provider. It reports only the readiness/completion status of an internal control-plane startup hook.
scope: LOW
notes: These are data-plane reads that return a liveness/readiness status string, not any configuration, data, RBAC policy, or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns only whether the apiextensions informers start hook completed; low-value infra reconnaissance.
