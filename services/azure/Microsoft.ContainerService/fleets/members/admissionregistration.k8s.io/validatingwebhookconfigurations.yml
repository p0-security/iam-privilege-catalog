name: Kubernetes validating webhook configurations (fleet member)
description: ValidatingWebhookConfigurations are cluster-wide Kubernetes admission-control objects that register webhooks which accept or reject objects as they are admitted to the API server (e.g. OPA/Gatekeeper, Kyverno, Pod Security enforcement), accessed here as a data action against a fleet member cluster.
scope: CRITICAL
notes: Validating admission webhooks are the cluster's policy-enforcement guardrails; controlling them lets an attacker neutralize cluster-wide security policy, making the asset cluster-admin-equivalent in security impact.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - impact:dos
    notes: Deleting validating webhook configurations removes cluster-wide policy-enforcement admission gates (Gatekeeper/Kyverno/Pod Security), disabling a key defense so malicious or non-compliant objects are admitted; for a fail-closed webhook, deletion can also block legitimate API operations, disrupting operations.
  read:
    risks:
      - discovery:policy
    notes: Reading validatingwebhookconfigurations enumerates the policy-enforcing admission webhooks and their rules/endpoints, exposing exactly which security policies are enforced so an attacker can find gaps to evade, without exposing secret material.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Creating or updating a validating webhook lets an attacker weaken or neuter the cluster's policy-enforcement gates (e.g. permit previously blocked privileged workloads) or install a deny/fail webhook that manipulates which objects are admitted cluster-wide, defeating admission defenses.
