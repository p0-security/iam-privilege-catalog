name: Kubernetes mutating webhook configurations (fleet member)
description: MutatingWebhookConfigurations are cluster-wide Kubernetes admission-control objects that register webhooks intercepting and rewriting objects as they are admitted to the API server, accessed here as a data action against a fleet member cluster.
scope: CRITICAL
notes: Mutating admission webhooks can rewrite every object admitted cluster-wide (inject containers, mount secrets, attach privileged identities); controlling them is the canonical Kubernetes cluster-takeover primitive, making the asset cluster-admin-equivalent.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - impact:dos
    notes: Deleting mutating webhook configurations removes admission-time controls that frequently enforce security defaults (sidecar/policy/identity injection), disabling a defense; deleting a failurePolicy=Fail webhook can also block all matching admissions, disrupting cluster operations.
  read:
    risks:
      - discovery:policy
    notes: Reading mutatingwebhookconfigurations inventories the webhooks that rewrite admitted objects and their endpoints/rules/CA bundles, revealing the admission posture and where the cluster can be subverted, without exposing secret material.
  write:
    risks:
      - escalation:lateral
      - impact:manipulation
      - escalation:privilege
      - destruction:defense
    notes: Creating or updating a mutating webhook lets an attacker intercept and rewrite every object admitted cluster-wide, injecting privileged sidecars/containers, mounting Secrets and service-account tokens, and attaching privileged identities, a cluster-admin-equivalent primitive enabling lateral movement, privilege escalation, workload manipulation, and bypass of admission defenses.
