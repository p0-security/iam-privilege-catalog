name: AKS fleet member cluster NetworkPolicies
description: Kubernetes NetworkPolicy objects inside an AKS fleet member cluster, accessed via the Azure data plane. NetworkPolicies are the cluster's pod-level firewall, defining permitted pod-to-pod and egress traffic (network segmentation).
scope: HIGH
notes: These rules act as an in-cluster network defense/segmentation control.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - escalation:network
    notes: Deleting NetworkPolicies (incl. DeletesCollection) removes the pod-level firewall enforcement, dismantling network-segmentation defenses and enabling unrestricted east-west lateral movement between pods.
  write:
    risks:
      - destruction:defense
      - escalation:network
      - impact:manipulation
    notes: Creating/updating a NetworkPolicy lets an attacker loosen or rewrite pod-level firewall/segmentation rules, disabling a defense and opening previously denied pod-to-pod/egress paths for network movement.
