name: Kubernetes PodTemplates (AKS fleet member)
description: Kubernetes PodTemplate objects within a fleet member (AKS) cluster, accessed via the Azure-managed Kubernetes data plane. A PodTemplate is a reusable, stored pod specification (images, commands, mounts, service-account and volume references) that controllers can instantiate.
scope: MEDIUM
notes: PodTemplates are configuration/template objects, not running workloads; their specs can reference service accounts and secret/volume mounts that downstream controllers use when creating pods.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:manipulation
    notes: Deleting pod templates removes stored, reusable pod-spec definitions used operationally to provision workloads, altering the cluster's workload configuration; PodTemplates back no running pods, so there is no direct DoS or data destruction.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
      - escalation:lateral
    scope: HIGH
    notes: Creating/updating pod templates lets an attacker define arbitrary container specs (images/commands) that controllers instantiate to run attacker workloads, and reference privileged service accounts / secret mounts that the resulting pods use to pivot to other identities.
