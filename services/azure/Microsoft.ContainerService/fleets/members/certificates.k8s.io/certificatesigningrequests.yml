name: Kubernetes CertificateSigningRequests (AKS fleet member)
description: CertificateSigningRequest objects on a Kubernetes cluster that is a member of an AKS fleet. They request that the cluster CA sign a client certificate for a named username/group, and approved requests carry the issued signed certificate in their status.
scope: CRITICAL
notes: "CSRs are the classic Kubernetes credential-minting primitive: approved requests expose usable client certificates, and creating them lets a principal request credentials for arbitrary identities including cluster-admin groups (system:masters)."
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:access
    notes: Deleting CSRs removes pending/issued certificate-signing requests and their embedded signed certificate material, disrupting legitimate credential issuance and blocking authorized principals from obtaining certificates.
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Reading CSRs returns the issued signed client certificate embedded in status.certificate of approved requests, which is reusable identity credential material that authenticates as the requested cluster identity.
  write:
    risks:
      - escalation:privilege
      - persistence:account
      - escalation:lateral
    notes: Creating/updating a CSR lets an attacker request a client certificate for an arbitrary username/group (e.g. system:masters); once signed it mints durable cluster-admin credentials, enabling privilege escalation, persistent credential-based access, and movement to other identities.
