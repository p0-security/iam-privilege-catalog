name: Kubernetes pod bindings
description: Kubernetes Binding objects within a Fleet member cluster. A Binding assigns a Pod to a specific Node, performing the scheduling decision normally made by the scheduler.
scope: HIGH
notes: Control over pod-to-node placement lets an attacker steer workloads onto chosen nodes (e.g. attacker-controlled or privileged nodes), enabling workload placement and co-location attacks.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:hijack
      - impact:manipulation
      - escalation:lateral
    notes: Writing a binding assigns a pod to an attacker-chosen node, letting them place/run workloads on specific nodes (resource hijacking), manipulate scheduling, and co-locate pods with high-value nodes to reach node-level identities/secrets (lateral movement).
