name: Kubernetes API discovery endpoint (fleet member)
description: The Kubernetes /api discovery endpoint on a fleet member cluster enumerates the available API group paths and versions exposed by the cluster's API server.
scope: LOW
notes: Pure API-surface discovery metadata; reveals cluster capabilities but no data or configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the /api discovery root only lists available API group paths, generic low-sensitivity reconnaissance of cluster capabilities.
