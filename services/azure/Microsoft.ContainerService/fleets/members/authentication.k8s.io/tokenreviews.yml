name: Kubernetes TokenReviews (Fleet member)
description: Kubernetes TokenReview API on an Azure Fleet member cluster; a non-persisted request that asks the API server to validate a bearer token and return the authenticated identity (username, UID, group memberships).
scope: MEDIUM
notes: "Acts as an identity-verification oracle: confirms whether a captured token is valid and reveals the account/groups behind it; creates no persistent state."
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:account
    notes: Submitting a TokenReview validates an arbitrary bearer token and returns its associated username/UID/groups, letting an attacker confirm stolen tokens and enumerate the identities they map to.
