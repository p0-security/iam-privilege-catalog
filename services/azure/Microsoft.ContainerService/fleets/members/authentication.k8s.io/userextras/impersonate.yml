name: Kubernetes userextras impersonation (AKS fleet member)
description: The Kubernetes impersonation capability for user-extra attributes on a member cluster of an AKS fleet. The impersonate verb on userextras lets a caller attach arbitrary extra authentication attributes (claims/scopes) when impersonating an identity.
scope: CRITICAL
notes: Forged extra attributes feed authorization webhooks/policies, completing identity-spoofing chains to escalate privilege, hence CRITICAL.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating userextras lets an attacker forge additional authentication attributes used in authorization decisions, augmenting an impersonated identity to escalate privilege and move laterally.
