name: Kubernetes secrets (Fleet member)
description: Kubernetes Secret objects in a namespace of an AKS Fleet member cluster. They hold credential material such as service-account tokens, TLS private keys, image-pull credentials, passwords, and connection strings consumed by workloads.
scope: CRITICAL
notes: Secrets are first-class credential stores; reading them yields directly usable identity material enabling lateral movement and takeover across the cluster and connected systems.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:dos
    notes: Deleting Secrets destroys cryptographic/credential material (keys, tokens, certs) that workloads depend on, irreversibly removing secret data and disrupting pods that fail to mount or authenticate.
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
      - takeover:account
    notes: Reading/listing Secrets returns raw credential material (tokens, keys, passwords, connection strings), enabling direct cryptographic exfiltration, lateral movement to the identities they authenticate, and account takeover.
  write:
    risks:
      - impact:manipulation
      - persistence:account
      - escalation:lateral
    notes: Writing Secrets lets an attacker plant or overwrite credential material consumed by workloads, manipulating authentication data, establishing persistent attacker-controlled credentials, and enabling lateral movement via injected identities.
