name: Kubernetes DaemonSets (AKS Fleet member)
description: DaemonSets are namespaced Kubernetes workload objects that ensure a copy of a specified pod runs on every (or selected) node in a Fleet member cluster, commonly used for node-level agents (CNI, logging, monitoring, security).
scope: HIGH
notes: DaemonSet pods often run privileged with host mounts and node-scoped service-account tokens; controlling them grants node-level and cluster-wide reach.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a DaemonSet tears down its pods across all nodes, removing node-level services (CNI/networking, logging, monitoring, security agents) and causing cluster-wide denial of service.
  read:
    risks:
      - discovery:infra
    notes: Reading/listing DaemonSets enumerates per-node workload definitions including container images, env references, and volume/host mounts, providing detailed workload reconnaissance across the cluster.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a DaemonSet schedules an attacker-controlled pod on every node (potentially privileged with host mounts and node service-account tokens), enabling cluster-wide code execution, resource hijacking, and lateral movement onto every node and its identities.
