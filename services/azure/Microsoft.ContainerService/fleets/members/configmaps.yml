name: Kubernetes ConfigMaps
description: Kubernetes ConfigMap objects within a Fleet member cluster. ConfigMaps store non-confidential application and cluster configuration as key-value data consumed by workloads.
scope: HIGH
notes: Although intended for non-secret config, ConfigMaps very frequently contain sensitive values (connection strings, endpoints, tokens, and misplaced credentials), so they are treated as sensitive configuration data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - impact:dos
    notes: Deleting ConfigMaps destroys configuration data that workloads depend on, erasing operational config and breaking dependent pods (crash-loops / failed starts).
  read:
    risks:
      - exfiltration:data
    notes: Reading ConfigMaps exports application/cluster configuration that frequently contains connection strings, endpoints, and embedded credentials — direct data exfiltration.
  write:
    risks:
      - impact:manipulation
    notes: Writing ConfigMaps lets an attacker alter configuration consumed by workloads — injecting malicious settings, redirecting endpoints, or poisoning application behavior.
