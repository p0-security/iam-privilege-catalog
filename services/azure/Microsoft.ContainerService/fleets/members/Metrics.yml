name: AKS fleet member apiserver metrics
description: The Kubernetes API server /metrics (Prometheus) data-plane endpoint on an AKS fleet member cluster, exposing operational and resource telemetry.
scope: MEDIUM
notes: Metrics reveal cluster activity, object counts, and component state useful for reconnaissance but contain no secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the metrics endpoint lets an attacker inventory cluster/control-plane resource counts and operational state for reconnaissance.
