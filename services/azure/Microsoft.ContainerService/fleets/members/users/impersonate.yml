name: Kubernetes user impersonation (AKS fleet member)
description: The Kubernetes impersonation capability for user identities on a member cluster of an AKS fleet. The impersonate verb on users lets a caller issue API requests as an arbitrary other user identity.
scope: CRITICAL
notes: Impersonation lets an attacker act as any identity (including cluster-admins), so it is a direct path to full cluster compromise, hence CRITICAL.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating a user lets an attacker act as any other identity, assuming its (potentially cluster-admin) privileges for both lateral movement and privilege escalation.
