name: Kubernetes SelfSubjectRulesReviews (Fleet member)
description: Kubernetes SelfSubjectRulesReview API on an Azure Fleet member cluster; a non-persisted request that returns the full set of actions the calling identity is permitted to perform in a namespace.
scope: MEDIUM
notes: Self-scoped enumeration of the caller's complete RBAC rule set; creates no persistent state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:policy
    notes: Creating a SelfSubjectRulesReview returns the caller's full list of permitted rules in a namespace, directly mapping the compromised identity's abusable privileges.
