name: Kubernetes LocalSubjectAccessReviews (Fleet member)
description: Kubernetes LocalSubjectAccessReview API on an Azure Fleet member cluster; a non-persisted request that queries whether an arbitrary subject is authorized to perform a given action within a namespace.
scope: MEDIUM
notes: An RBAC reconnaissance oracle disclosing other principals' effective permissions; creates no persistent state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:policy
    notes: Posting a LocalSubjectAccessReview probes any subject's namespace-scoped permissions, mapping RBAC to locate over-privileged identities and escalation paths.
