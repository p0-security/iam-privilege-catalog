name: Kubernetes group impersonation (AKS fleet member)
description: The Kubernetes impersonation capability for group identities on a member cluster of an AKS fleet. The impersonate verb on groups lets a caller issue API requests claiming membership in arbitrary groups.
scope: CRITICAL
notes: Impersonating a privileged group such as system:masters yields full cluster-admin access, hence CRITICAL.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating groups lets an attacker assume the aggregate RBAC permissions of any group (e.g. system:masters), enabling lateral movement and privilege escalation.
