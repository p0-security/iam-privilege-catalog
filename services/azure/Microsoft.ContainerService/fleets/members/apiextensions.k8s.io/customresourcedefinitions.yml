name: Kubernetes CustomResourceDefinitions (AKS Fleet member)
description: CustomResourceDefinitions are cluster-scoped Kubernetes objects that register new custom API resource types (schemas) into a Fleet member cluster's API server, defining the API surface used by operators and controllers.
scope: HIGH
notes: CRDs are cluster-wide control-plane API machinery; they shape how the entire cluster's extended APIs and operators behave.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a CRD cascades to delete every custom resource instance of that type cluster-wide and breaks the operators/controllers depending on it, destroying cluster infrastructure and disrupting dependent services.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating cluster-scoped CRDs alters the cluster API surface and can register, shadow, or modify custom resource types (and conversion webhooks) that controllers act on, manipulating control-plane configuration cluster-wide.
