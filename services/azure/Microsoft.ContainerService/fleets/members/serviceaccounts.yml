name: Kubernetes service accounts (Fleet member)
description: Kubernetes ServiceAccount objects in a namespace of an AKS Fleet member cluster. They represent in-cluster workload identities that pods authenticate as and that can be bound to RBAC roles and cloud (workload-identity) credentials.
scope: CRITICAL
notes: ServiceAccounts are identity objects; creating, deleting, or impersonating them directly affects who can act in the cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:account
      - impact:dos
    notes: Deleting ServiceAccounts removes the in-cluster identities workloads authenticate as, destroying accounts and denying service to pods that can no longer obtain valid tokens.
  write:
    risks:
      - persistence:account
      - escalation:privilege
      - escalation:lateral
    notes: Creating/updating ServiceAccounts lets an attacker mint new in-cluster identities or rebind them (including workload-identity annotations), establishing persistent accounts and enabling privilege escalation and lateral movement via the new identity.
