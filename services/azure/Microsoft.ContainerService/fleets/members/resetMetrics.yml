name: AKS fleet member kube-apiserver metrics-reset endpoint
description: A kube-apiserver debug resetMetrics endpoint on an AKS fleet member cluster, exposed via the managed control-plane passthrough. It clears/returns runtime Prometheus metrics counters for the control plane.
scope: LOW
notes: Debug/metrics endpoints expose only low-value operational telemetry, no sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Exposes/clears apiserver metrics counters, yielding only low-value operational telemetry; no sensitive data or control capability in isolation.
