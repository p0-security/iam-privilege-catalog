name: AKS Fleet member control-plane health probe
description: A Kubernetes API server healthz/livez health-probe sub-endpoint exposed as an Azure data action on a member cluster of an AKS Fleet. It reports the liveness/sync status of an internal control-plane component (here, the crd-informer-synced poststarthook).
scope: LOW
notes: These are operational health-check endpoints that return only ok/failed status strings, never the underlying data, secrets, certificates, or configuration. They are among the lowest-sensitivity read operations in the resource provider.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns only whether the CRD informer has synced; marginal control-plane component recon with no CRD data exposed.
