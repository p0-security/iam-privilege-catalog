name: Kubernetes ReplicationControllers (AKS fleet member)
description: Kubernetes ReplicationController objects within a fleet member (AKS) cluster, accessed via the Azure-managed Kubernetes data plane. A ReplicationController ensures a specified number of pod replicas (defined by an embedded pod template) are running.
scope: HIGH
notes: "ReplicationControllers actively run workloads: creating/updating one schedules pods that consume compute and run under cluster service-account identities, while deleting one tears down the managed pods."
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting a replication controller tears down the pods it maintains, terminating the running workload and denying service for the affected application while destroying the controller infrastructure object.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Reads/lists replication controllers, enumerating running workload configuration including replica counts, embedded pod templates, images, and service-account references (workload reconnaissance).
  write:
    risks:
      - impact:hijack
      - impact:manipulation
      - escalation:lateral
    notes: Creating/updating replication controllers schedules and scales arbitrary attacker-defined pods (cryptomining/botnet), runs them under chosen cluster service accounts for lateral movement, and alters existing workload definitions.
