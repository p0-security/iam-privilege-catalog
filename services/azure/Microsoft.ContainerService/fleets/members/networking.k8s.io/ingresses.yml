name: Kubernetes Ingresses (fleet member)
description: Kubernetes Ingress objects in a fleet member cluster define external HTTP(S) routing rules (hostnames, paths, TLS, backend services) that expose in-cluster services to outside traffic.
scope: HIGH
notes: Ingresses control the cluster's public-facing entry points for a single application/function; manipulation can redirect or expose production traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting Ingresses removes the external routing for services, severing public access to the workloads they front and causing denial of service.
  read:
    risks:
      - discovery:network
    notes: Reading Ingresses enumerates external hostnames, routing rules, TLS references, and backend service mappings, inventorying the cluster's externally exposed attack surface.
  write:
    risks:
      - impact:manipulation
      - escalation:network
      - impact:defacement
    notes: Writing Ingresses lets an attacker reroute external host/path traffic to attacker-controlled backends, expose internal services publicly, and alter public-facing routing (defacement).
