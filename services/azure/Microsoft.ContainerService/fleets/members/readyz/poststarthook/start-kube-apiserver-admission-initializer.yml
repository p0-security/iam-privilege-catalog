name: AKS fleet member kube-apiserver readiness probe
description: A kube-apiserver readiness (readyz) post-start-hook health endpoint on an AKS fleet member cluster, exposed via the managed control-plane passthrough. It reports whether a specific internal apiserver startup component (here, the admission initializer) has finished starting.
scope: LOW
notes: Health/liveness probe endpoints return only operational status signals, not organizational data or resource inventory.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns only the readiness/startup status of the apiserver admission-initializer component, a trivial control-plane state signal.
