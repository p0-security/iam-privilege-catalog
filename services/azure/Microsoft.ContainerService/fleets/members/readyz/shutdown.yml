name: AKS fleet member kube-apiserver readiness probe
description: A kube-apiserver readyz shutdown health endpoint on an AKS fleet member cluster, exposed via the managed control-plane passthrough. It reports whether the apiserver is undergoing graceful shutdown.
scope: LOW
notes: Health/liveness probe endpoints return only operational status signals, not organizational data or resource inventory.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns only whether the apiserver is shutting down, a minor operational status signal.
