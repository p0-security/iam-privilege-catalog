name: AKS Fleet member Kubernetes API discovery
description: A data-plane read against the Kubernetes API server of an AKS Fleet member cluster, exposed through the Azure resource-provider proxy. This top-level /apis path enumerates the API groups served by the member cluster.
scope: LOW
notes: Kubernetes API discovery/listing surface; returns API-group/version/resource metadata, not the underlying workload objects or any secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads the Kubernetes /apis discovery root, enumerating which API groups are served on the member cluster, which is read-only fingerprinting of the cluster API surface.
