name: Kubernetes services (Fleet member)
description: Kubernetes Service objects in a namespace of an AKS Fleet member cluster. They define network endpoints (ClusterIP/NodePort/LoadBalancer), ports, and selectors that route traffic to backing pods.
scope: HIGH
notes: Services are the cluster's network fabric; modifying them reroutes or exposes workloads, and deleting them severs application connectivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting Services tears down the network endpoints routing traffic to workloads, destroying network components and denying service to dependent applications.
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading/listing Service objects enumerates cluster networking (ClusterIPs, ports, LoadBalancer endpoints, selectors), providing network topology reconnaissance.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating Services lets an attacker repoint selectors to intercept/redirect traffic or expose internal workloads via LoadBalancer/NodePort, manipulating routing and broadening network reach.
