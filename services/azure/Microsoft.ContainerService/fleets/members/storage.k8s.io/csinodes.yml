name: Kubernetes CSINodes (AKS fleet member)
description: Cluster-scoped Kubernetes CSINode objects in an AKS Fleet member, which record per-node CSI driver registration, node topology, and volume attachment limits used by the scheduler for volume placement.
scope: MEDIUM
notes: Storage subsystem state (data-plane/isDataAction) — supporting infrastructure describing per-node storage capabilities, not the underlying data and not secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting CSINode objects removes per-node CSI driver registration, preventing the scheduler from placing and attaching volumes on affected nodes and disrupting storage for workloads on those nodes.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating CSINode objects manipulates per-node CSI driver registration and topology metadata used by the scheduler, which can misroute or corrupt volume placement and attachment decisions.
