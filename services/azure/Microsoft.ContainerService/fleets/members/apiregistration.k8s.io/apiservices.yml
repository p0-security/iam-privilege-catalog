name: Kubernetes APIServices / aggregation layer (AKS Fleet member)
description: APIServices are cluster-scoped Kubernetes objects in the API aggregation layer that register API groups and route them to built-in or aggregated (extension) API servers within a Fleet member cluster.
scope: HIGH
notes: The aggregation layer is core control-plane routing; a malicious APIService can intercept API traffic for an entire API group.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting an APIService deregisters an API group (e.g. metrics or extension API servers), breaking access to those resource types and disrupting clients and controllers that depend on them.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Reading/listing APIServices only enumerates registered API groups and aggregated API server backends, providing infrastructure reconnaissance of the cluster's API topology.
  write:
    risks:
      - impact:manipulation
      - escalation:lateral
    notes: Creating/updating an APIService can repoint an API group to an attacker-controlled aggregated backend, man-in-the-middling control-plane API traffic and capturing credentials/tokens the kube-apiserver forwards, enabling both manipulation and lateral movement.
