name: AKS fleet member cluster health endpoint
description: Kubernetes API server /healthz/autoregister-completion health subcheck on an AKS fleet member cluster, reporting API auto-registration readiness. Accessed via the fleet's managed Kubernetes data plane.
scope: LOW
notes: Returns only an internal readiness/health status indicator; exposes no configuration, data, or identity information.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reading the autoregister-completion subcheck returns only an API-registration readiness status, an inert operational probe with no attacker value.
