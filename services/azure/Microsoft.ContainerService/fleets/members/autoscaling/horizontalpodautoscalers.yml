name: Kubernetes HorizontalPodAutoscalers (AKS fleet member)
description: HorizontalPodAutoscaler objects on a Kubernetes cluster that is a member of an AKS fleet. They define autoscaling policy (target workload, min/max replicas, target metrics) for cluster workloads.
scope: MEDIUM
notes: Autoscaling configuration is supporting infrastructure config; it does not itself contain secret data, but altering it affects availability and cost of the workloads it governs.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
    notes: Deleting an HPA removes autoscaling so workloads can no longer scale to meet demand, degrading or disrupting the affected service under load.
  write:
    risks:
      - impact:manipulation
      - impact:dos
      - impact:spend
    notes: "Creating/updating an HPA alters scaling policy: an attacker can force scale-to-minimum/zero to degrade a service (DoS) or inflate max replicas to drive cost and exhaust capacity."
