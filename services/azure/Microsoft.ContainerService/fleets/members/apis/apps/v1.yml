name: AKS Fleet member Kubernetes API discovery
description: A data-plane read against the Kubernetes API server of an AKS Fleet member cluster, exposed through the Azure resource-provider proxy. This path covers the apps/v1 API (Deployments, StatefulSets, DaemonSets, ReplicaSets).
scope: LOW
notes: Kubernetes API discovery/listing surface; returns API-group/version/resource metadata, not the underlying workload objects or any secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads apps/v1, inventorying workload-controller configuration (Deployments/StatefulSets/DaemonSets) on the member cluster as infrastructure reconnaissance.
