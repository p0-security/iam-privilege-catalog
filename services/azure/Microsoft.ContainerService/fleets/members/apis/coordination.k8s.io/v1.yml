name: AKS fleet member Kubernetes coordination API (Leases)
description: The Kubernetes coordination.k8s.io data-plane API group on an AKS fleet member cluster, which exposes Lease objects used for leader election and node/controller heartbeats.
scope: LOW
notes: Lease objects carry only operational liveness/leader-election metadata, not sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading coordination/v1 Lease objects inventories leader-election and node-heartbeat state, a low-sensitivity infrastructure reconnaissance capability.
