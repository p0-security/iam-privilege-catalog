name: AKS fleet member Kubernetes networking API
description: The Kubernetes networking.k8s.io data-plane API group on an AKS fleet member cluster, which exposes Ingress, IngressClass, and NetworkPolicy objects describing network exposure and segmentation.
scope: LOW
notes: Read-only enumeration of routing, ingress exposure, and network-policy (segmentation) configuration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Reading networking.k8s.io/v1beta1 Ingress/NetworkPolicy objects inventories network exposure and segmentation configuration for network reconnaissance.
