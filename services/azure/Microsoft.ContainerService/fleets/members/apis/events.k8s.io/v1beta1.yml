name: AKS fleet member Kubernetes events API
description: The Kubernetes events.k8s.io data-plane API group on an AKS fleet member cluster, which exposes Event objects recording operational cluster activity (scheduling, image pulls, failures, state changes).
scope: LOW
notes: Events are operational log-style records of cluster activity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Reading events.k8s.io/v1beta1 Event objects exposes the cluster's operational activity log for reconnaissance of operations and recent changes.
