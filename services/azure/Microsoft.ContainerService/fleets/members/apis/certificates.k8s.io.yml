name: AKS fleet member Kubernetes certificates API
description: The Kubernetes certificates.k8s.io data-plane API group on an AKS Fleet member cluster. It exposes CertificateSigningRequest objects and signer configuration used for cluster identity/PKI provisioning.
scope: MEDIUM
notes: Listing CSRs reveals certificate-based identity issuance and signer/trust configuration (public CSR data and approval state) but does not return issued private keys; it is access-control-adjacent reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Read/list of certificates.k8s.io enumerates CertificateSigningRequests and signer configuration, exposing the cluster's certificate-based identity/trust provisioning for reconnaissance without returning private key material.
