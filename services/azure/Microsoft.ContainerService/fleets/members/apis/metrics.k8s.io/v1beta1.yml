name: AKS fleet member Kubernetes metrics API
description: The Kubernetes metrics.k8s.io data-plane API group on an AKS fleet member cluster, which serves ephemeral pod/node CPU and memory resource-usage metrics.
scope: LOW
notes: Monitoring/utilization telemetry only; no sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading metrics.k8s.io/v1beta1 pod/node resource metrics inventories cluster capacity and workload activity, a low-sensitivity infrastructure/monitoring reconnaissance capability.
