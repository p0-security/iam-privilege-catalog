name: AKS Fleet member Kubernetes API discovery
description: A data-plane read against the Kubernetes API server of an AKS Fleet member cluster, exposed through the Azure resource-provider proxy. This path covers the apiextensions.k8s.io/v1 API (CustomResourceDefinitions).
scope: LOW
notes: Kubernetes API discovery/listing surface; returns API-group/version/resource metadata, not the underlying workload objects or any secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads apiextensions.k8s.io/v1, inventorying the custom resource definitions / extended API types installed on the cluster.
