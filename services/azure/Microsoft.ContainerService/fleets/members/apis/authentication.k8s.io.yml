name: AKS fleet member Kubernetes authentication API
description: The Kubernetes authentication.k8s.io data-plane API group on an AKS Fleet member cluster. It exposes authentication-related resources (TokenReview, SelfSubjectReview) that describe how identities authenticate to the cluster.
scope: MEDIUM
notes: Authentication objects identify accounts/identities in the cluster but do not return standing credentials when listed; sensitivity is moderate as it aids account reconnaissance for a single member cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:account
    notes: Read/list of the authentication.k8s.io group enumerates identity/authentication objects in the fleet member cluster, enabling account discovery without returning usable secret material.
