name: AKS fleet member Kubernetes extensions API (legacy)
description: The legacy Kubernetes extensions data-plane API group on an AKS fleet member cluster, which historically aggregates workload (Deployments, DaemonSets, ReplicaSets) and Ingress/NetworkPolicy objects.
scope: LOW
notes: Read-only enumeration of workload and ingress configuration; does not expose secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
      - discovery:network
    notes: Reading extensions/v1beta1 inventories legacy workload deployments and ingress/network exposure of the cluster, yielding infrastructure and network reconnaissance.
