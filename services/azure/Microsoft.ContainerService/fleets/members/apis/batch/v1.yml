name: AKS fleet member Kubernetes batch API
description: The Kubernetes batch data-plane API group on an AKS Fleet member cluster. It exposes Job and CronJob workload definitions including their pod templates.
scope: MEDIUM
notes: Job/CronJob pod templates can reveal command lines, environment variables, image references and scheduling details, so listing them yields somewhat richer workload/configuration reconnaissance than plain infra metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Versioned read of batch/v1 enumerates Job/CronJob workload definitions, providing infrastructure discovery.
