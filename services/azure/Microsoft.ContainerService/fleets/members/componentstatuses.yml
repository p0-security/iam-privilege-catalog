name: Kubernetes componentstatuses
description: Kubernetes ComponentStatus objects within a Fleet member cluster — a deprecated, read-only resource synthesized by the API server that reports the health of control-plane components (scheduler, controller-manager, etcd).
scope: LOW
notes: ComponentStatuses are computed health reports, not persisted objects; they cannot be meaningfully written or deleted and contain no sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks: []
    notes: ComponentStatus is a synthesized read-only resource that cannot actually be deleted, so this grant confers no real destructive capability.
  read:
    risks:
      - discovery:infra
    notes: Reading componentstatuses inventories control-plane component health, a low-sensitivity infrastructure reconnaissance signal.
  write:
    risks: []
    notes: ComponentStatus is a synthesized read-only resource the API server does not persist, so a write grant has no real effect and confers no meaningful attacker capability in isolation.
