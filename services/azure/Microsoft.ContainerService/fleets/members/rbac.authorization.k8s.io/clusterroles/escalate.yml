name: Kubernetes ClusterRoles (AKS Fleet member)
description: Kubernetes ClusterRole objects on a member cluster of an AKS Fleet. ClusterRoles define cluster-wide permission sets (verbs over resources) that bindings can grant to subjects.
scope: CRITICAL
notes: Cluster-wide RBAC permission definitions; creating/expanding or binding them enables cluster-admin escalation, hence CRITICAL asset sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
    notes: The Kubernetes 'escalate' verb explicitly bypasses the privilege-escalation prevention check, letting an attacker add permissions to a ClusterRole that exceed those they currently hold, enabling unbounded cluster-wide privilege escalation.
