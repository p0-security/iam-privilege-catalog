name: Kubernetes Roles (AKS fleet member)
description: Kubernetes namespaced Roles on a member cluster of an AKS fleet. A Role defines a set of permission rules (verbs over resources) that can be granted to subjects via RoleBindings, forming the cluster's RBAC policy definitions.
scope: CRITICAL
notes: Roles define the permission sets that drive cluster authorization; controlling them enables privilege escalation, hence CRITICAL.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deleting Roles removes RBAC permission definitions, destroying access-control policy and denying authorized principals (who depend on those roles) their operational access.
  write:
    risks:
      - escalation:privilege
    notes: Creating/updating a Role defines or expands the permission rules that all bound subjects inherit, enabling privilege escalation (subject to RBAC escalate guardrails).
