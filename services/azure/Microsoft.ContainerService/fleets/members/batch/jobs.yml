name: Kubernetes Jobs (AKS fleet member)
description: Job objects on a Kubernetes cluster that is a member of an AKS fleet. They define one-off batch workloads via an embedded pod template (container images, commands, env, mounts, service account).
scope: HIGH
notes: Pod specs can reference operational configuration and run code under cluster identities; the ability to create them is effectively the ability to run arbitrary workloads on the cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
      - destruction:infra
    notes: Deleting Jobs terminates running/queued batch workloads and removes their pods, disrupting the in-progress processing those jobs perform.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Reading Jobs enumerates batch workload definitions and their pod specs (images, commands, status), providing infrastructure reconnaissance of cluster workloads.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a Job runs arbitrary attacker-controlled containers immediately under a chosen pod service account, enabling resource hijacking (cryptomining) and lateral movement via the pod's mounted identity/tokens.
