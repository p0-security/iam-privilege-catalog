name: Fleet Kubernetes configmaps
description: Kubernetes ConfigMap objects inside an Azure Fleet hub cluster, holding application and cluster configuration consumed by workloads and controllers.
scope: HIGH
notes: ConfigMaps routinely contain endpoints, connection settings, and inadvertently-stored credentials or tokens, making them sensitive to read and impactful to alter or delete.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - impact:dos
    notes: Deleting configmaps destroys configuration data workloads depend on, breaking dependent pods/controllers and disrupting service.
  read:
    risks:
      - exfiltration:data
    notes: Reading configmaps discloses configuration data that frequently contains sensitive values (endpoints, connection strings, occasionally credentials), enabling data exfiltration.
  write:
    risks:
      - impact:manipulation
    notes: Writing configmaps lets an attacker poison configuration consumed by workloads/controllers (e.g. CoreDNS, CA bundles, mounted scripts), altering operational behavior.
