name: Kubernetes Fleet nodes
description: Kubernetes Node objects within AKS Fleet-managed clusters. Nodes represent the worker compute hosts (capacity, addresses, labels, taints, scheduling state) backing the fleet's clusters.
scope: HIGH
notes: Data-plane (isDataAction) representations of production compute; mutations affect scheduling and workload availability for the cluster's function.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting node objects removes worker compute from the cluster, evicting hosted workloads and reducing capacity, causing denial of service to running applications.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Reading/listing nodes inventories the worker compute substrate (capacity, addresses, labels, taints) of the fleet's clusters for reconnaissance and targeting.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Writing node objects lets an attacker alter scheduling state (cordon/taint/labels/unschedulable), manipulating workload placement and disrupting scheduling across the fleet.
