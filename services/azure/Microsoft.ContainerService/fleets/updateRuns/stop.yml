name: AKS fleet update runs
description: An AKS Fleet Manager update run is an upgrade-orchestration object that coordinates Kubernetes and node-image upgrades across the member clusters of a fleet.
scope: HIGH
notes: Governs how production member clusters are upgraded; mutating/triggering it can disrupt running workloads, but the object itself is upgrade-rollout configuration rather than data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
    notes: Stopping an in-progress update run interrupts the orchestrated rollout, potentially leaving member clusters in an inconsistent, partially-upgraded state and disrupting maintenance operations.
