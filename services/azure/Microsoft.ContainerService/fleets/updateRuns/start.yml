name: AKS fleet update runs
description: An AKS Fleet Manager update run is an upgrade-orchestration object that coordinates Kubernetes and node-image upgrades across the member clusters of a fleet.
scope: HIGH
notes: Governs how production member clusters are upgraded; mutating/triggering it can disrupt running workloads, but the object itself is upgrade-rollout configuration rather than data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - impact:dos
      - impact:manipulation
    notes: Starting an update run triggers rolling Kubernetes/node-image upgrades across member clusters, cycling nodes and disrupting running workloads (DoS) while forcing version/state changes fleet-wide (manipulation).
