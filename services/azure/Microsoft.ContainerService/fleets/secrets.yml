name: Kubernetes secrets (fleet)
description: Kubernetes Secret objects within an AKS fleet namespace, which store credential material such as service-account tokens, TLS keys, passwords, connection strings, and registry credentials consumed by workloads.
scope: CRITICAL
notes: Holds live credential/cryptographic material; compromise yields identity takeover and lateral movement across the cluster and connected systems.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:dos
    notes: Deleting Secrets destroys stored cryptographic/credential material, breaking authentication for dependent workloads and disrupting the services that consume those secrets.
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
      - takeover:account
    notes: Reading Kubernetes Secrets returns the actual credential material (tokens, keys, connection strings, service-account tokens), enabling direct exfiltration of secrets and reuse of those identities for lateral movement and account takeover.
  write:
    risks:
      - persistence:account
      - impact:manipulation
      - escalation:lateral
    notes: Writing Secrets lets an attacker plant or overwrite credential material consumed by workloads, establishing persistence, manipulating trusted configuration, and injecting attacker-controlled credentials to pivot to other identities.
