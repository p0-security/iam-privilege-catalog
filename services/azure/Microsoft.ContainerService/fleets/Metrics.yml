name: AKS Fleet API server metrics
description: The Kubernetes-style /metrics endpoint of an Azure Kubernetes Fleet Manager hub cluster's API server, returning Prometheus-style operational telemetry counters about control-plane activity and resource state.
scope: LOW
notes: Health/observability data-plane endpoint; non-sensitive operational telemetry, no secrets or stored data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading fleet API server metrics exposes aggregate operational/usage telemetry useful for reconnaissance of the fleet's internal state, but returns no secrets or stored data.
