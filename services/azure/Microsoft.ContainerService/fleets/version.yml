name: AKS Fleet apiserver version endpoint
description: The AKS Fleet apiserver version endpoint exposed as a read action through the fleets resource provider. It returns the Kubernetes/control-plane build and version string.
scope: LOW
notes: Useful for fingerprinting to match known vulnerabilities, but non-sensitive in isolation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns only the apiserver version string, enabling version fingerprinting to target known CVEs; low-value infra reconnaissance.
