name: AKS fleet update runs
description: An AKS Fleet Manager update run is an upgrade-orchestration object that coordinates Kubernetes and node-image upgrades across the member clusters of a fleet.
scope: HIGH
notes: Governs how production member clusters are upgraded; mutating/triggering it can disrupt running workloads, but the object itself is upgrade-rollout configuration rather than data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
    notes: Deleting an update run removes the upgrade-orchestration object, disrupting planned or in-progress coordinated cluster upgrades.
  write:
    risks:
      - impact:manipulation
    notes: Creating or updating an update run alters the upgrade plan (stages, version/node-image targets) that controls how member clusters are upgraded, manipulating operational rollout configuration.
