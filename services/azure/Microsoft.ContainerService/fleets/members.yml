name: AKS Fleet members
description: A fleet member represents an AKS managed cluster enrolled in an Azure Kubernetes Fleet Manager, carrying the reference to the cluster and its update group/stage configuration for centralized multi-cluster orchestration.
scope: HIGH
notes: Fleet membership is control-plane orchestration metadata that governs update and configuration rollout across enrolled production clusters; it does not itself hold cluster credentials or workload data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a fleet member removes a production cluster from centralized fleet orchestration, tearing down the membership and disrupting coordinated update/config rollout to that cluster.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating a fleet member joins or re-configures a cluster's enrollment (update group/stage), altering the orchestration posture that drives fleet-wide rollouts to a production cluster.
