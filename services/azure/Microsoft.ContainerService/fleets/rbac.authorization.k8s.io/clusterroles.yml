name: Kubernetes cluster roles (AKS Fleet)
description: Kubernetes ClusterRole objects in an AKS Fleet cluster, defining cluster-wide RBAC permission rules (verbs on resources) that grant authorization when bound to subjects via (Cluster)RoleBindings.
scope: CRITICAL
notes: ClusterRoles are cluster-wide access-control definitions; control over them (and the ability to bind/escalate them) can lead to full cluster-admin, the canonical CRITICAL RBAC asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deleting ClusterRoles removes cluster-wide access-control policy, which both tears down RBAC controls and can revoke legitimate operators' authorized access (denial-of-access).
  read:
    risks:
      - discovery:policy
    notes: Reading/listing ClusterRoles inventories the cluster-wide RBAC permission model, letting an attacker map authorization and find over-privileged roles and weak points.
  write:
    risks:
      - escalation:privilege
    notes: Creating/updating a ClusterRole lets an attacker define arbitrary cluster-wide permissions (e.g. all verbs on all resources) that escalate any subject bound to that role.
