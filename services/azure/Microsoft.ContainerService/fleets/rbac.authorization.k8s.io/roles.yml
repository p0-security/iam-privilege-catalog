name: Kubernetes roles (AKS Fleet)
description: Kubernetes Role objects in an AKS Fleet cluster, defining namespaced RBAC permission rules (verbs on resources) that grant authorization when bound to subjects via RoleBindings.
scope: CRITICAL
notes: Roles are namespaced access-control definitions; combined with bind/escalate they enable privilege escalation, so the RBAC asset class is treated as CRITICAL.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deleting namespaced Roles removes access-control policy, tearing down RBAC controls and potentially revoking legitimate principals' access.
  read:
    risks:
      - discovery:policy
    notes: Reading/listing namespaced Roles inventories RBAC permission definitions, letting an attacker locate over-privileged or exploitable roles.
  write:
    risks:
      - escalation:privilege
    notes: Creating/updating a Role lets an attacker define arbitrary namespaced permissions that escalate any subject bound to that role.
