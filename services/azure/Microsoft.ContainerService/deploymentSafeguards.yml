name: AKS Deployment Safeguards
description: AKS Deployment Safeguards - the Azure Policy / Gatekeeper-based admission guardrail configuration that enforces deployment best practices and blocks non-compliant or insecure workloads on the cluster.
scope: HIGH
notes: A defensive policy-enforcement control; weakening or removing it permits non-compliant or malicious deployments.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:policy
    notes: Deleting Deployment Safeguards removes the admission-policy enforcement entirely, disabling a defense control and destroying the associated deployment-restricting policy.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
    notes: Updating Deployment Safeguards can downgrade enforce to warn or add exclusions, weakening or disabling the admission-policy defense and manipulating the security configuration.
