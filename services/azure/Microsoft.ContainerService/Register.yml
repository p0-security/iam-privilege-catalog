name: Container Service resource provider registration
description: The subscription-level registration toggle for the Microsoft.ContainerService resource provider, which enables (or disables) the use of Container Service management APIs within the subscription.
scope: LOW
notes: Provider registration flags are administrative enablement controls; they do not themselves hold or expose any organizational data or running resources.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Registering the provider merely enables the Container Service APIs for the subscription; it is an inert administrative no-op that grants no offensive capability in isolation.
