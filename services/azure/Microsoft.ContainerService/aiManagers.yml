name: AKS AI Manager
description: An AKS AI Manager control-plane resource that provisions and manages AI/ML workload infrastructure on a managed Kubernetes cluster and carries access credentials for the managed resource.
scope: HIGH
notes: A managed compute/AI resource that runs workloads and exposes credential material via listCredential, making the resource type sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting the AI Manager destroys the managed AI infrastructure resource and disrupts the workloads/services that depend on it.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Reading the AI Manager returns its control-plane configuration for reconnaissance; secret material is gated behind the separate listCredential action.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating the AI Manager alters its operational configuration, manipulating the managed AI resource's settings.
