name: AKS Fleet membership extension
description: A fleet membership extension is the binding/linkage configuration that associates a Kubernetes cluster with a Fleet Manager hub, establishing the cluster-to-fleet relationship.
scope: CRITICAL
notes: This is control-plane linkage metadata for centralized multi-cluster management; it contains no workload data or credentials by itself.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - impact:manipulation
    notes: This action proxies/forwards arbitrary calls through the fleet into the underlying member cluster's Kubernetes API, giving hands-on operational reach to act against and manipulate the member cluster's resources under the fleet's access.
