name: AKS OS options catalog
description: OS options is a region-level catalog of the node-pool operating-system choices/SKUs available for AKS in a given location.
scope: LOW
notes: Static, non-tenant-specific capability metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns the available node OS choices for a region, a generic, near-public capability catalog with only trivial reconnaissance value.
