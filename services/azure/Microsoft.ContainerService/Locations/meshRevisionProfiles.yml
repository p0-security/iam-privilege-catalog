name: AKS service mesh revision profiles
description: Service mesh revision profiles list the available/supported Istio-based service-mesh revisions and compatibility metadata for managed clusters in a location.
scope: LOW
notes: Near-public regional version catalog metadata; no organizational data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reads region-level available service-mesh revision profiles, exposing only generic version/capability metadata for reconnaissance.
