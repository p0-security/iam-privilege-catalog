name: Container Service async operation status
description: The status of an asynchronous Microsoft.ContainerService control-plane operation (operation-status polling endpoint).
scope: LOW
notes: Inert status-polling endpoint conveying only operation progress/state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Polling the status of an asynchronous operation returns only progress/outcome state and grants no data access, escalation, or destructive capability in isolation.
