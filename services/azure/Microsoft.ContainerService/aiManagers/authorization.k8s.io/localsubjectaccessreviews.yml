name: Kubernetes LocalSubjectAccessReviews (AKS AI managers)
description: "LocalSubjectAccessReview is a non-persisted Kubernetes authorization API: a POST asks whether a specified subject is authorized to perform a given action within a namespace, returning an allow/deny answer."
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:policy
    notes: Submitting LocalSubjectAccessReviews lets an attacker probe whether arbitrary subjects can perform actions in a namespace, enumerating others' effective RBAC permissions to find weak points and escalation targets.
