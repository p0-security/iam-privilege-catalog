name: Kubernetes SubjectAccessReviews (AKS AI managers)
description: "SubjectAccessReview is a non-persisted, cluster-scoped Kubernetes authorization API: a POST asks whether any specified subject is authorized to perform a given action anywhere in the cluster."
scope: MEDIUM
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:policy
    notes: Creating cluster-scoped SubjectAccessReviews lets an attacker systematically test whether any subject can perform any action, comprehensively mapping the RBAC model to locate privileged accounts and escalation paths.
