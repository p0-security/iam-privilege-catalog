name: AI Manager nodes
description: Kubernetes-style Node objects for an AKS AI Manager, representing the worker compute hosts backing the cluster, including capacity, labels, taints, conditions, and addresses.
scope: HIGH
notes: Nodes are the compute fleet; writing/deleting them affects scheduling and availability of all hosted workloads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting node objects removes compute capacity from the cluster, evicting workloads and disrupting the services scheduled on those nodes.
  read:
    risks:
      - discovery:infra
    scope: MEDIUM
    notes: Reading/listing nodes enumerates the cluster's compute hosts and their configuration/capacity, providing reconnaissance for workload placement and targeting.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
      - impact:dos
    notes: Writing node objects alters scheduling state (labels, taints, cordon/unschedulable), letting an attacker steer workloads onto chosen nodes (hijack) or block scheduling and disrupt service (DoS).
