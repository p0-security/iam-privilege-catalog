name: Kubernetes userextras impersonation
description: The Kubernetes userextras-impersonation capability on an AKS-managed aiManagers cluster, which lets a caller set arbitrary extra authentication attributes on impersonated requests.
scope: CRITICAL
notes: Extra authentication attributes feed authorization decisions (e.g. authorizing webhooks); spoofing them completes privileged impersonation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating userextras lets an attacker forge extra authentication attributes used in authorization, completing identity assumption and enabling privilege escalation and lateral movement.
