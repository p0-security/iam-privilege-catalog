name: Kubernetes TokenReviews (AKS AI managers)
description: "TokenReview is a non-persisted Kubernetes authentication API: a POST submits a bearer token and the server returns whether it is valid plus the authenticated username, UID, and group memberships it maps to."
scope: MEDIUM
notes: It validates rather than mints tokens; it does not return new credentials or secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - discovery:account
    notes: Creating a TokenReview lets an attacker submit tokens to confirm validity and enumerate the identity and groups behind them, providing account reconnaissance without changing state or exfiltrating credentials.
