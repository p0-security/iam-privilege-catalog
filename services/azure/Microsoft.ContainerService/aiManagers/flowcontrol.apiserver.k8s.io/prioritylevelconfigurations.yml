name: Kubernetes API Priority and Fairness PriorityLevelConfigurations (AKS aiManagers)
description: PriorityLevelConfigurations are Kubernetes API Priority and Fairness (APF) resources (in the aiManagers AKS data plane) that define concurrency limits and queueing behavior for the priority levels into which API-server requests are sorted.
scope: MEDIUM
notes: This is control-plane concurrency/capacity configuration; abusing it affects API-server availability rather than data confidentiality.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
    notes: Deleting PriorityLevelConfigurations removes API-server concurrency-control settings, disrupting request handling and degrading control-plane availability.
  write:
    risks:
      - impact:dos
      - impact:manipulation
    notes: Writing PriorityLevelConfigurations changes API-server concurrency limits and queueing, letting an attacker throttle or exhaust control-plane request capacity and cause denial of service.
