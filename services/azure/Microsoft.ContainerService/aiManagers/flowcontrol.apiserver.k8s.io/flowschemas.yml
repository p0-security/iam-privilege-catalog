name: Kubernetes API Priority and Fairness FlowSchemas (AKS aiManagers)
description: FlowSchemas are Kubernetes API Priority and Fairness (APF) resources (in the aiManagers AKS data plane) that classify inbound API-server requests into priority levels for fair queueing and throttling.
scope: MEDIUM
notes: This is control-plane request-classification configuration; abusing it affects API-server availability rather than data confidentiality.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - impact:dos
    notes: Deleting FlowSchemas removes API-server request-fairness rules, disrupting request handling and degrading control-plane availability for other clients.
  write:
    risks:
      - impact:dos
      - impact:manipulation
    notes: Writing FlowSchemas reclassifies API-server request prioritization/throttling, letting an attacker starve or throttle legitimate traffic and degrade control-plane availability.
