name: Kubernetes group impersonation
description: The Kubernetes group-impersonation capability on an AKS-managed aiManagers cluster, which lets a caller assert arbitrary group memberships (e.g. system:masters) on impersonated requests.
scope: CRITICAL
notes: Group impersonation grants the aggregated RBAC permissions of any group, including privileged built-in groups; equivalent to cluster-admin.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating groups lets an attacker assume membership in privileged groups like system:masters, inheriting their RBAC grants to escalate and move laterally.
