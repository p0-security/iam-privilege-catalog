name: Kubernetes StatefulSets (AKS AI managers)
description: StatefulSets are Kubernetes workload controllers that manage stateful, ordered, persistently-identified pods (e.g. databases, queues) running inside an AKS AI/GPU-manager cluster namespace.
scope: HIGH
notes: Pod templates embed container images, environment variables, volume/secret references, and the service account the workload runs as; control over them grants the ability to run code as cluster identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting (or DeleteCollection across the namespace) tears down stateful workload controllers and their pods, destroying running infrastructure and denying service to the hosted applications.
  read:
    risks:
      - discovery:infra
    notes: Reading/listing StatefulSets enumerates workload pod specs (images, env, volume and secret references, replica topology), which is infrastructure reconnaissance of the cluster's stateful applications.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating StatefulSets lets an attacker run arbitrary containers (cryptomining/workloads), craft pod specs that mount service-account tokens or secrets to assume cluster identities for lateral movement, and tamper with operational workload configuration.
