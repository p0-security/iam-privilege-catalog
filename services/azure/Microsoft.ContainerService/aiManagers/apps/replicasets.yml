name: Kubernetes ReplicaSets (AKS AI managers)
description: ReplicaSets are Kubernetes workload controllers that maintain a stable set of replica pods from a pod template, typically managed under Deployments inside an AKS AI/GPU-manager cluster namespace.
scope: HIGH
notes: Pod templates embed container images, environment variables, volume/secret references, and the service account the workload runs as; control over them grants the ability to run code as cluster identities.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting (or DeleteCollection) ReplicaSets removes the controllers managing application pods, tearing down running workload infrastructure and disrupting service availability.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating ReplicaSets lets an attacker schedule arbitrary pods (resource hijacking), mount service-account tokens/secrets to pivot to cluster identities (lateral movement), and modify running workload configuration.
