name: Kubernetes Deployments
description: Deployments are Kubernetes workload controllers that manage replicated, declaratively-versioned application pods via ReplicaSets. This is data-plane (Kubernetes object) access within an AKS-managed 'aiManagers' cluster.
scope: HIGH
notes: Write access runs arbitrary replicated containers that auto-mount service-account tokens and secrets, enabling resource hijacking and lateral movement to workload identities; delete takes down the backing application.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a Deployment removes its ReplicaSets/pods, destroying the application workload and denying service to the function it backs.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a Deployment runs arbitrary attacker-controlled containers (resource hijacking), alters existing applications, and leverages auto-mounted service-account tokens/secrets to assume pod identities for lateral movement.
