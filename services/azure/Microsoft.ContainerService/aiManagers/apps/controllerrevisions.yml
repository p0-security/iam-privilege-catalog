name: Kubernetes ControllerRevisions
description: ControllerRevisions store serialized point-in-time snapshots of DaemonSet/StatefulSet pod templates that controllers use to track rollout history and perform rollbacks. This is data-plane (Kubernetes object) access within an AKS-managed 'aiManagers' cluster.
scope: MEDIUM
notes: Snapshots may embed container specs, image references, environment variables and secret references; the objects also constitute the rollback/recovery state for stateful and per-node workloads.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
    notes: Deleting ControllerRevisions destroys the rollout/rollback history controllers rely on, removing known-good revert points for DaemonSets/StatefulSets.
  read:
    risks:
      - discovery:infra
    notes: Reading ControllerRevisions inventories historical workload pod templates (images, mounts, env, secret references), workload-configuration reconnaissance.
  write:
    risks:
      - impact:manipulation
    notes: Writing ControllerRevisions tampers with the stored rollout/rollback history, letting an attacker inject a malicious pod template that a controller may later roll back to, or corrupt operational rollout state.
