name: AKS AI Managers Kubernetes pods
description: Kubernetes Pod objects within an AKS AI Managers cluster, representing running containerized workloads. Pod specs include container images, environment variables, mounted volumes, and references to secrets and service-account tokens.
scope: CRITICAL
notes: Data-plane access to pods is equivalent to control over the workloads of a single cluster/application function; pod specs frequently embed sensitive configuration and credential references.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - exfiltration:data
      - impact:hijack
      - impact:manipulation
    notes: Exec grants interactive command execution (RCE) inside a running container, giving the pod's mounted service-account identity and secrets, access to in-container data, the ability to run attacker code, and tampering with the workload.
