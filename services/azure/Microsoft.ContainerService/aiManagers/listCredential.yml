name: AKS AI Manager
description: An AKS AI Manager control-plane resource that provisions and manages AI/ML workload infrastructure on a managed Kubernetes cluster and carries access credentials for the managed resource.
scope: CRITICAL
notes: A managed compute/AI resource that runs workloads and exposes credential material via listCredential, making the resource type sensitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
      - takeover:account
    notes: This listCredential action returns the AI Manager's credential material (kubeconfig/access keys), exporting usable secret credentials that authenticate as the resource identity for lateral movement and effective account/cluster takeover.
