name: AKS AI Managers Kubernetes custom resources
description: Arbitrary Kubernetes custom resources (CRD-defined objects) within an AKS AI Managers cluster, used by operators and controllers to hold extension configuration and operational state.
scope: HIGH
notes: CRD contents are generic and vary by operator; they may include operational settings but are not inherently secret material.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting custom resources (including DeleteCollection) removes controller-managed objects, tearing down the infrastructure operators reconcile and disrupting dependent services.
  read:
    risks:
      - discovery:infra
    notes: Reading arbitrary custom resources inventories operator/controller configuration and CRD-defined objects across the cluster.
  write:
    risks:
      - impact:manipulation
    notes: Writing arbitrary custom resources alters operator/controller-driven configuration, manipulating operationally significant cluster state.
