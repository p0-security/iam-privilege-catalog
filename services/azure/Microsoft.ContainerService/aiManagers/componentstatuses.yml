name: Kubernetes componentstatuses (AKS aiManagers)
description: The Kubernetes ComponentStatus resource within an AKS aiManagers cluster, a deprecated, system-generated, read-only object reporting the health of control-plane components (etcd, scheduler, controller-manager).
scope: LOW
notes: Non-sensitive operational health metadata that is populated and regenerated by the control plane; it holds no user-controllable data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks: []
    notes: componentstatuses are ephemeral, control-plane-regenerated health objects, so deleting them has no durable destructive effect and grants no real attacker capability.
  read:
    risks:
      - discovery:infra
    notes: Reading componentstatuses inventories control-plane component health, providing read-only infrastructure reconnaissance of non-sensitive cluster status.
  write:
    risks: []
    notes: componentstatuses is a system-reported, effectively read-only Kubernetes kind with no writable spec, so a write verb confers no meaningful attacker capability in isolation.
