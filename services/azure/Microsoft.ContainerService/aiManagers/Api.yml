name: Kubernetes API discovery root
description: The Kubernetes /api discovery endpoint lists the available API group versions supported by the cluster's API server.
scope: LOW
notes: Returns only API surface/version metadata, no resource data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the API discovery root enumerates available API groups/versions, low-value reconnaissance of the cluster's API surface.
