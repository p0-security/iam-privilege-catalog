name: Kubernetes Bindings
description: Kubernetes core Binding objects, the scheduler subresource that assigns a Pod to a specific Node.
scope: HIGH
notes: Writing a binding bypasses the scheduler to force pod placement, enabling node-targeted hijacking and scheduling manipulation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    notes: Writing bindings assigns pods to chosen nodes (e.g. privileged/control-plane or attacker-targeted nodes), letting an attacker manipulate scheduling and co-locate or hijack workload placement.
