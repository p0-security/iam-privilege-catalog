name: Kubernetes API server schema/UI surface
description: Kubernetes API server documentation/schema surface endpoints (Swagger UI, OpenAPI definition, UI assets, version) exposed through the AKS-managed aiManagers resource provider.
scope: LOW
notes: Exposes the API server's schema/endpoint surface, which is non-sensitive metadata useful only for reconnaissance of available API operations.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:metadata
    notes: Reads the Swagger/OpenAPI schema definition, enumerating available resource types and operations as metadata reconnaissance.
