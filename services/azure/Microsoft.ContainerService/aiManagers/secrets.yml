name: AKS AI Manager secrets
description: Kubernetes Secret objects within an AKS AI Manager namespace holding credential material such as tokens, passwords, TLS keys, connection strings, and service-account tokens.
scope: CRITICAL
notes: Reading a Secret returns the raw secret material in plaintext, so this is a credential store of the highest sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
      - impact:dos
    notes: Deleting secrets destroys credential/key material and breaks the workloads that mount it, causing service disruption.
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
      - takeover:account
    notes: Reading secrets returns raw credential/key material that can be exfiltrated and reused to impersonate the identities those secrets authenticate.
  write:
    risks:
      - persistence:account
      - escalation:lateral
      - impact:manipulation
    notes: Writing secrets lets an attacker plant or overwrite credential material consumed by workloads, establishing persistence and supplying attacker-controlled identities for lateral movement.
