name: AKS managed control-plane apiserver logs
description: A data-plane read of the Kubernetes API server log output exposed through the AKS aiManagers managed control plane. It returns actual control-plane log content (request handling, errors, audit-adjacent operational detail).
scope: MEDIUM
notes: Control-plane logs can contain sensitive operational identifiers, request metadata, object names, and error detail useful for reconnaissance or to expose secrets that have leaked into log lines.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - exfiltration:logs
      - discovery:logs
    notes: Reads and exports apiserver log content, enabling both enumeration of logged activity and exfiltration of potentially sensitive operational details and identifiers from the control plane.
