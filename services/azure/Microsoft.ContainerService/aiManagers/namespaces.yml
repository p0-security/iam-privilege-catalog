name: AI Manager namespaces
description: Kubernetes-style namespaces for an AKS AI Manager, the logical workload-isolation/tenancy boundaries within which AI workloads, configuration, and access objects are organized.
scope: HIGH
notes: Namespaces are tenancy boundaries; the credential action on this resource type exposes usable cluster access, raising its sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting a namespace cascades to destroy all workloads, configs, and access objects within it, taking down the hosted services it backs.
  write:
    risks:
      - impact:manipulation
      - impact:hijack
    notes: Creating/updating a namespace lets an attacker provision a new workload-isolation boundary to host attacker-controlled containers and reconfigure cluster tenancy.
