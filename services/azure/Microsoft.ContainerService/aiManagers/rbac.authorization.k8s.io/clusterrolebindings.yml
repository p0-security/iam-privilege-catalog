name: Kubernetes ClusterRoleBindings
description: A ClusterRoleBinding is a cluster-scoped Kubernetes RBAC object that binds a subject (user, group, or service account) to a ClusterRole, granting that subject the role's permissions across the entire cluster.
scope: CRITICAL
notes: ClusterRoleBindings are the core cluster-wide access-control bindings of Kubernetes (the analog of Azure roleAssignments); they can confer cluster-admin, so the asset is cluster-wide identity and access-control data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deleting a ClusterRoleBinding destroys a cluster-wide access-control binding, stripping legitimate principals (including defenders) of their access while tearing down grants that would otherwise constrain the attacker.
  read:
    risks:
      - discovery:policy
    notes: Reading ClusterRoleBindings enumerates which subjects hold which cluster-wide roles, mapping the RBAC grant graph to identify privileged principals and escalation targets.
  write:
    risks:
      - escalation:privilege
      - escalation:lateral
      - persistence:account
    notes: Creating or updating a ClusterRoleBinding lets an attacker bind cluster-admin (or any ClusterRole) to their own identity or a controlled service account, the headline cluster-wide privilege-escalation and lateral-movement primitive that also establishes durable persistence.
