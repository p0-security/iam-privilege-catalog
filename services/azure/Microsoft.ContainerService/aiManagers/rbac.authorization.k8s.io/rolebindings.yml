name: Kubernetes RoleBindings
description: Kubernetes RoleBindings in an AKS-managed aiManagers cluster, which bind RBAC Roles/ClusterRoles to subjects (users, groups, service accounts) and thereby determine who holds which in-cluster permissions.
scope: CRITICAL
notes: RBAC bindings are the cluster's access-control policy; controlling them is equivalent to controlling who can do what, up to cluster-admin.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:access
    notes: Deleting RoleBindings tears down RBAC grants, destroying access-control policy and stripping legitimate operators of their cluster access.
  read:
    risks:
      - discovery:policy
    notes: Reading RoleBindings enumerates which subjects are granted which roles, mapping the cluster access-control graph and revealing escalation paths.
  write:
    risks:
      - escalation:privilege
    notes: Creating/updating a RoleBinding binds an attacker-controlled subject to any role, directly granting elevated cluster permissions (the canonical privilege-escalation primitive).
