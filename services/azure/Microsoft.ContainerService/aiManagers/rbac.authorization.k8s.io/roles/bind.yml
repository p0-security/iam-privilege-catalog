name: Kubernetes Roles
description: Kubernetes Roles in an AKS-managed aiManagers cluster, which define sets of RBAC permission rules (verbs over resources) that are granted to subjects via bindings.
scope: CRITICAL
notes: Role definitions are core cluster access-control policy; manipulating them governs the permission surface up to cluster-admin.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
    notes: The Kubernetes 'bind' verb authorizes referencing a role in a new binding even without holding its permissions, letting an attacker grant the role's privileges to a controlled subject.
