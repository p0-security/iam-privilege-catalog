name: Kubernetes node metrics (AKS aiManagers metrics.k8s.io)
description: The metrics.k8s.io nodes resource (in the aiManagers AKS data plane) exposes runtime resource-usage telemetry (CPU/memory) for cluster nodes via the metrics API.
scope: LOW
notes: Read-only utilization telemetry; useful for reconnaissance of cluster capacity but not sensitive data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading node metrics returns CPU/memory usage telemetry that inventories cluster nodes and their capacity, low-sensitivity reconnaissance.
