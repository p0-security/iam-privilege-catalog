name: AKS managed control-plane apiserver metrics
description: A data-plane read of the Kubernetes API server metrics endpoint (Prometheus-style operational counters) exposed through the AKS aiManagers managed control plane. It returns aggregate runtime telemetry about the control plane (request rates, component counts, resource-usage statistics).
scope: LOW
notes: Apiserver metrics reveal operational and infrastructure state (component inventory, request patterns, resource counts) useful for reconnaissance, but do not return workload data, secrets, or policy contents.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns aggregate operational metrics that inventory control-plane state and activity patterns, supporting infrastructure reconnaissance.
