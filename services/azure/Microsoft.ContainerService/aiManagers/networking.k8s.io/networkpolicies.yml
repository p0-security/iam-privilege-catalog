name: Kubernetes NetworkPolicies
description: Kubernetes NetworkPolicy objects define pod-level ingress/egress traffic-filtering rules that act as an in-cluster firewall, segmenting which workloads can communicate.
scope: HIGH
notes: NetworkPolicies function as a defensive network-segmentation control; weakening them enables lateral movement, but they govern a single cluster's workload network rather than tenant-wide assets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - escalation:network
    notes: Deleting NetworkPolicies removes pod-level firewall enforcement, disabling a defense and collapsing isolation so previously denied traffic flows freely for lateral movement.
  write:
    risks:
      - destruction:defense
      - escalation:network
      - impact:manipulation
    notes: Creating/updating NetworkPolicies lets an attacker loosen or rewrite the in-cluster firewall, disabling a segmentation defense and opening lateral network paths to otherwise-isolated pods/services.
