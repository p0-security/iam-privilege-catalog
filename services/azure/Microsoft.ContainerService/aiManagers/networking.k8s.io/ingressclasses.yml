name: Kubernetes IngressClasses
description: Kubernetes IngressClass objects are cluster-scoped definitions naming the ingress controller implementations and parameters available to back Ingress routing.
scope: MEDIUM
notes: IngressClasses are low-sensitivity routing-infrastructure metadata describing which controllers handle ingress traffic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
      - impact:dos
    notes: Deleting an IngressClass breaks ingress resolution for every Ingress referencing it, disrupting external routing across dependent services.
  read:
    risks:
      - discovery:network
    scope: LOW
    notes: Reading IngressClasses inventories the available ingress controllers and their parameters, low-value reconnaissance of how external traffic is routed.
  write:
    risks:
      - impact:manipulation
      - escalation:network
    notes: Creating/updating IngressClasses alters which controller/parameters realize ingress routing cluster-wide, manipulating and potentially redirecting how external traffic is handled.
