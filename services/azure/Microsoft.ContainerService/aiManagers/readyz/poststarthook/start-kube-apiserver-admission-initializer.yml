name: Kubernetes API server readiness probe
description: A Kubernetes API server readyz post-start-hook health-check endpoint exposed through the AKS-managed aiManagers resource provider. It reports the readiness/liveness status of an internal control-plane component.
scope: LOW
notes: Health/readiness probes return only operational status (ready/not-ready) and disclose no organizational data, configuration, or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reads the start-kube-apiserver-admission-initializer readiness status; an inert health poll with no actionable attacker capability.
