name: AKS managed control-plane readiness probe
description: A Kubernetes API server /readyz readiness-gate sub-endpoint exposed through the AKS aiManagers data plane. Each endpoint returns a binary health/ready verdict for one internal control-plane component or startup hook.
scope: LOW
notes: These are operational health probes, not resource-data or configuration endpoints; they return readiness status tokens, never the contents of the named subsystem.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reads only the readiness verdict of the API server logging subsystem (ok/not-ready), not log contents, so it grants no meaningful capability in isolation.
