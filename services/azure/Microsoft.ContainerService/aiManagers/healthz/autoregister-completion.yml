name: AKS cluster health-probe endpoint
description: The healthz autoregister-completion sub-check of a managed AKS cluster's Kubernetes API server, returning internal readiness status for API autoregistration. This is a data-plane status probe on the cluster.
scope: LOW
notes: Returns only an internal readiness/status boolean; exposes no organizational data, configuration, or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Reads an internal API-server health sub-check returning only readiness status, an inert probe with no exploitable capability.
