name: AKS managed control-plane apiserver readiness probe
description: A data-plane read of a Kubernetes API server readiness (readyz) endpoint exposed through the AKS aiManagers managed control plane. It reports the aggregate or per-check readiness status of the control plane to serve requests.
scope: LOW
notes: These endpoints return only readiness/health signals, not configuration or data; their value to an attacker is limited to confirming control-plane availability and component state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns only the aggregate readiness status of the apiserver, a minor control-plane availability recon signal.
