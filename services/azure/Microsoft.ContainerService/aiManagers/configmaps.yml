name: Kubernetes ConfigMaps (AKS aiManagers)
description: The Kubernetes ConfigMaps resource within an AKS aiManagers cluster, holding key-value application and workload configuration consumed by pods as env vars, files, or mounted volumes.
scope: HIGH
notes: Although not a designated secret store, ConfigMaps routinely contain sensitive operational values (endpoints, connection strings, tokens) and, as a common anti-pattern, inadvertently stored credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:data
      - impact:dos
    notes: Deleting ConfigMaps destroys configuration data that workloads depend on, breaking or crashing dependent pods and disrupting the hosted service.
  read:
    risks:
      - exfiltration:data
      - discovery:infra
    notes: Reading ConfigMaps exports workload configuration that frequently includes sensitive settings and misplaced credentials, exfiltrating data while inventorying cluster/workload config.
  write:
    risks:
      - impact:manipulation
    notes: Creating/overwriting ConfigMaps lets an attacker poison configuration consumed by pods, altering workload behavior or redirecting applications.
