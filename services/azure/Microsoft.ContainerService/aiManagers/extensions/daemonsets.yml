name: Kubernetes DaemonSets (AI Managers extension)
description: "A Kubernetes DaemonSet object inside an AKS/AI Managers cluster: a controller that runs a copy of a pod on every node, typically used for node-level agents, logging, networking, and monitoring workloads."
scope: HIGH
notes: DaemonSet specs reference container images, host mounts, node placement, and service-account/secret references, so they reveal cluster workload topology even read-only. This is a data-plane (isDataAction) operation on workloads supporting a single cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting DaemonSets tears down node-level workloads (often logging/CNI/monitoring agents), destroying running infrastructure and disrupting the services those pods provide.
  read:
    risks:
      - discovery:infra
    notes: Reading/listing DaemonSets enumerates per-node workload configuration (images, mounts, node selectors) for cluster infrastructure reconnaissance without returning secret material.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a DaemonSet schedules attacker-controlled containers on every node (cryptomining/workload hijack), can mount host paths or run as a pod service-account/node identity for lateral movement, and alters operational workload configuration.
