name: Kubernetes Deployments (AI Managers extension)
description: "A Kubernetes Deployment object inside an AKS/AI Managers cluster: a controller that manages a replicated set of pods running an application workload."
scope: HIGH
notes: Deployment specs reference container images, replica counts, environment, and service-account/secret references, exposing application workload topology even read-only. This is a data-plane (isDataAction) operation on workloads supporting a single cluster.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting Deployments removes the managed pods/replicas, destroying running application infrastructure and causing denial of service for the hosted application.
  write:
    risks:
      - impact:hijack
      - escalation:lateral
      - impact:manipulation
    notes: Creating/updating a Deployment lets an attacker run arbitrary containers (compute hijacking), execute as the pods' mounted service-account/managed identity for lateral movement, and tamper with running application configuration.
