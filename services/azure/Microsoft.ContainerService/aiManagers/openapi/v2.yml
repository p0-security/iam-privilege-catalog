name: AKS managed control-plane apiserver OpenAPI schema
description: A data-plane read of the Kubernetes API server OpenAPI v2 schema document exposed through the AKS aiManagers managed control plane. It enumerates the available API resource types, versions, and installed CRD/aggregated-API surface of the cluster.
scope: LOW
notes: The OpenAPI schema is API-surface/schema metadata; it reveals which resource types and extensions exist (cluster capability fingerprinting) without exposing any actual object data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Enumerates the cluster's API surface and installed resource/CRD types, providing infrastructure reconnaissance of cluster capabilities.
