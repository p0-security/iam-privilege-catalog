name: AKS Kubernetes authentication API (data plane)
description: The Kubernetes authentication.k8s.io API group exposed through the AKS aiManagers data plane. It holds identity-verification resources such as TokenReview, TokenRequest, and SelfSubjectReview objects used to authenticate principals to the cluster.
scope: LOW
notes: Read access reveals identity/authentication configuration but does not return live credential material; useful for account reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:account
    notes: Get/List of the authentication.k8s.io group enumerates authentication/identity-review resources, inventorying cluster accounts and identities as compromise targets.
