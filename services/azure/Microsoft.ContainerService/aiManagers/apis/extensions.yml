name: AKS Kubernetes extensions (legacy) API objects
description: The legacy aggregated extensions Kubernetes API group inside an AKS aiManagers cluster, historically exposing workload objects (Deployments, ReplicaSets, DaemonSets) and network objects (Ingresses, NetworkPolicies).
scope: LOW
notes: Reading this group enumerates workload and network configuration; it returns object specs/config, not secrets or in-pod application data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only get/list of the legacy extensions group inventories cluster workload and ingress/network configuration for reconnaissance.
