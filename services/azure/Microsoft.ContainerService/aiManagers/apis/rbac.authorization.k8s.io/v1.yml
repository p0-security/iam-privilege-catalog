name: AKS cluster RBAC API resources
description: The rbac.authorization.k8s.io API group of a managed AKS cluster's Kubernetes API server, exposing Roles, RoleBindings, ClusterRoles, and ClusterRoleBindings that define the cluster's access-control model. This is a data-plane read surface on the cluster.
scope: LOW
notes: Reading RBAC reveals who can do what in the cluster, enabling identification of over-privileged subjects and escalation/lateral-movement paths; read-only.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Read-only enumeration of RBAC v1 role and binding objects, exposing the cluster authorization model for escalation reconnaissance.
