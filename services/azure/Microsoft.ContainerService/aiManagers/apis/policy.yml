name: AKS cluster policy API resources
description: The policy API group of a managed AKS cluster's Kubernetes API server, exposing PodDisruptionBudget and (historically) PodSecurityPolicy objects that govern workload security and availability constraints. This is a data-plane read surface on the cluster.
scope: LOW
notes: Reveals pod security/admission and disruption policy posture; useful for evasion planning but read-only.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Read-only enumeration of pod security/disruption policy objects, letting an attacker map the cluster's security-enforcement posture to find weak points.
