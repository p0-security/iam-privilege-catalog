name: AKS Kubernetes metrics.k8s.io API objects
description: The metrics.k8s.io Kubernetes API group (metrics-server aggregated API) inside an AKS aiManagers cluster, serving live CPU/memory resource-usage metrics for nodes and pods.
scope: LOW
notes: Returns operational utilization telemetry only; no application data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only get/list of metrics.k8s.io returns node/pod resource-usage metrics, enabling capacity/utilization reconnaissance of the cluster.
