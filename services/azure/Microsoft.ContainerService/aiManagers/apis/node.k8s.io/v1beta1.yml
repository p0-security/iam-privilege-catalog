name: AKS cluster node.k8s.io API resources
description: The node.k8s.io API group of a managed AKS cluster's Kubernetes API server, exposing RuntimeClass objects that define node/runtime configuration. This is a data-plane (Kubernetes API) read surface on the cluster.
scope: LOW
notes: Read-only enumeration of cluster runtime configuration; non-sensitive infrastructure metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only get/list of RuntimeClass objects, enumerating node runtime configuration for reconnaissance.
