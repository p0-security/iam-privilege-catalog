name: AKS Kubernetes networking.k8s.io API objects
description: The networking.k8s.io Kubernetes API group inside an AKS aiManagers cluster, holding Ingress, IngressClass, and NetworkPolicy objects that define service exposure and intra-cluster traffic segmentation.
scope: LOW
notes: Reveals exposed routes/hosts and network-policy gaps useful for targeting; returns configuration only, not secrets or traffic data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:network
    notes: Read-only get/list of networking.k8s.io/v1 enumerates Ingress and NetworkPolicy objects, revealing cluster network exposure and segmentation.
