name: AKS Kubernetes certificates API (data plane)
description: The Kubernetes certificates.k8s.io API group exposed through the AKS aiManagers data plane. It holds CertificateSigningRequest objects and signer configuration governing certificate-based identity provisioning and trust.
scope: LOW
notes: Reading CSR objects reveals requested identities, signers, and issuance status but does not return private keys, so it is reconnaissance of certificate/identity-trust configuration rather than crypto exfiltration.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Get/List of the certificates.k8s.io group enumerates CertificateSigningRequests and signer/trust configuration, revealing the cluster's certificate-based identity provisioning used for access control.
