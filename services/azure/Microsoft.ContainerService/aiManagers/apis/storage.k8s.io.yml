name: AKS cluster storage.k8s.io API resources
description: The storage.k8s.io API group of a managed AKS cluster's Kubernetes API server, exposing StorageClass, VolumeAttachment, CSINode, and CSIDriver objects that describe storage backend configuration. This is a data-plane read surface on the cluster.
scope: LOW
notes: Enumerates storage infrastructure configuration, not the data stored within volumes; read-only metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only get/list of StorageClass/VolumeAttachment/CSI objects, inventorying cluster storage infrastructure configuration.
