name: AKS Kubernetes autoscaling API (data plane)
description: The Kubernetes autoscaling API group exposed through the AKS aiManagers data plane. It holds HorizontalPodAutoscaler resources and their scaling targets/configuration.
scope: LOW
notes: Read-only inventory of workload-scaling configuration; non-sensitive infrastructure reconnaissance.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Get/List of the versioned autoscaling/v1 surface enumerates autoscaler configuration for infrastructure reconnaissance.
