name: AKS Kubernetes node.k8s.io API objects
description: The node.k8s.io Kubernetes API group inside an AKS aiManagers cluster, holding RuntimeClass objects that define the available node runtime handlers and scheduling configuration for pods.
scope: LOW
notes: Returns node runtime configuration only; no application data or credentials.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Read-only get/list of node.k8s.io RuntimeClass objects enumerates available node runtime handlers and scheduling configuration for infrastructure reconnaissance.
