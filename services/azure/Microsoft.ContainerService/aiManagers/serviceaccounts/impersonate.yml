name: AKS AI Manager service accounts
description: Kubernetes ServiceAccount objects within an AKS AI Manager namespace that represent workload identities used by pods to authenticate to the cluster API.
scope: CRITICAL
notes: Reading the account object enumerates identities but does not by itself return their token secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:lateral
      - escalation:privilege
    notes: Impersonating a service account lets an attacker act as that workload identity with its (potentially broader) RBAC permissions, the canonical lateral-movement and privilege-escalation primitive.
