name: AKS managed control-plane apiserver liveness probe
description: A data-plane read of a Kubernetes API server liveness (livez) post-start-hook sub-endpoint exposed through the AKS aiManagers managed control plane. It reports whether a specific internal apiserver startup hook has completed and is healthy.
scope: LOW
notes: These endpoints return only component health/readiness signals, not configuration or data; their value to an attacker is limited to confirming control-plane component existence and operational state.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Returns only the health status of the system-priority-classes bootstrap hook, a minor control-plane component-state recon signal.
