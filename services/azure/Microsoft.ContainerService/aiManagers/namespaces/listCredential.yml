name: AI Manager namespaces
description: Kubernetes-style namespaces for an AKS AI Manager, the logical workload-isolation/tenancy boundaries within which AI workloads, configuration, and access objects are organized.
scope: CRITICAL
notes: Namespaces are tenancy boundaries; the credential action on this resource type exposes usable cluster access, raising its sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: This action returns usable namespace credential material (e.g. a kubeconfig/access token), directly exfiltrating secret material and granting identity-bearing lateral access into the namespace and its workloads.
