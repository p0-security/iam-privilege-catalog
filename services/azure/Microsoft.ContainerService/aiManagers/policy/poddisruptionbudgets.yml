name: Kubernetes PodDisruptionBudgets
description: Kubernetes PodDisruptionBudget (PDB) policy objects exposed through the AKS-managed aiManagers resource provider. PDBs constrain how many pods of a workload may be voluntarily disrupted (evicted/drained) at once, protecting workload availability.
scope: HIGH
notes: PDBs are availability-control policy; they reveal workload selectors and disruption tolerance, and abusing them affects a single workload/cluster function rather than tenant-wide assets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - impact:dos
    notes: Deleting a PDB removes the availability guardrail protecting a workload, allowing mass simultaneous eviction/drain to take all replicas offline (denial of service).
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Lists/gets PodDisruptionBudgets, inventorying workload availability constraints and pod selectors as infrastructure reconnaissance.
  write:
    risks:
      - impact:manipulation
      - impact:dos
    notes: Creating/updating a PDB alters availability policy; setting maxUnavailable=0 / high minAvailable can block node drains, evictions, and upgrades, disrupting workload maintenance and scheduling.
