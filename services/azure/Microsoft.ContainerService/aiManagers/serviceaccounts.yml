name: AKS AI Manager service accounts
description: Kubernetes ServiceAccount objects within an AKS AI Manager namespace that represent workload identities used by pods to authenticate to the cluster API.
scope: CRITICAL
notes: Reading the account object enumerates identities but does not by itself return their token secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:account
      - impact:dos
    notes: Deleting service accounts removes workload identities, breaking authentication for dependent pods and disrupting the services they run.
  write:
    risks:
      - persistence:account
      - escalation:privilege
      - escalation:lateral
    notes: Creating/updating service accounts lets an attacker provision or modify cluster identities (and their bound credentials) for persistent, escalatable, laterally-usable access.
