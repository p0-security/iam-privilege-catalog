name: Kubernetes custom resource definitions (CRDs)
description: Cluster-wide Kubernetes CustomResourceDefinition objects (apiextensions.k8s.io) that register extended API types and schemas, backing operators, controllers, and policy engines across the AKS-managed cluster.
scope: HIGH
notes: CRDs define the cluster's extended API surface; they underpin operators and security tooling but are infrastructure/schema rather than directly access-control policy.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - destruction:data
      - destruction:defense
    notes: Deleting a CRD cascade-deletes every custom resource instance of that type cluster-wide, tearing down operator/controller infrastructure, destroying their stored state/data, and removing policy-enforcement CRDs (e.g. Gatekeeper constraints) that act as defenses.
  read:
    risks:
      - discovery:infra
    notes: Reading CRDs inventories the cluster's extended API types and installed operators/controllers/security tooling, mapping the attack surface without exposing secret data.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating CRDs alters cluster-wide API schemas and can shadow or subvert CRDs that operators and policy engines (e.g. Gatekeeper constraints) rely on, breaking enforcement and tampering with controller behavior; conversion webhooks can also trigger privileged controller actions.
