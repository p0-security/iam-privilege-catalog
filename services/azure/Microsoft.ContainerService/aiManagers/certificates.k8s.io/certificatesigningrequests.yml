name: Kubernetes CertificateSigningRequests
description: Kubernetes CertificateSigningRequest objects (certificates.k8s.io) used to request and issue X.509 client/serving certificates that authenticate identities to the cluster API server.
scope: CRITICAL
notes: An approved CSR's status.certificate field contains a signed client certificate that is a usable cluster credential; CSRs are a well-known Kubernetes privilege-escalation and credential-minting vector, making this a CRITICAL identity/credential asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:crypto
    notes: Deleting CSRs removes pending/issued certificate-signing requests and their associated signed-certificate material, destroying cryptographic identity artifacts and disrupting certificate provisioning.
  read:
    risks:
      - exfiltration:crypto
      - escalation:lateral
    notes: Reading/listing CSRs can return the signed client certificate in status.certificate (usable authentication credential) and enumerates the identities/groups requesting cluster access; the exported cert authenticates as the requested identity.
  write:
    risks:
      - escalation:privilege
      - persistence:account
      - escalation:lateral
    notes: Creating CSRs lets an attacker request a client certificate bound to an arbitrary username/group (e.g. system:masters / cluster-admin); once signed it mints a durable credential for a higher-privileged identity.
