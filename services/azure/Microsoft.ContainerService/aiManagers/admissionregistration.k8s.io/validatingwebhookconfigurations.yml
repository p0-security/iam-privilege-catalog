name: Kubernetes validating webhook configurations (admission control)
description: Cluster-wide Kubernetes validatingWebhookConfiguration objects (admissionregistration.k8s.io) that register webhooks validating/admitting API requests (e.g. OPA Gatekeeper, Kyverno, Pod Security) across the entire AKS-managed cluster.
scope: CRITICAL
notes: Validating admission webhooks are the cluster's primary policy guardrails; controlling them governs what workloads can be admitted, hence CRITICAL asset sensitivity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:defense
      - destruction:policy
    notes: Deleting validating webhook configurations removes cluster-wide admission policy validation (Gatekeeper/Pod Security), disabling a key defense so previously-denied privileged or non-compliant resources are admitted unchecked.
  write:
    risks:
      - destruction:defense
      - impact:manipulation
      - escalation:privilege
    notes: Writing validating webhook configurations lets an attacker neuter or repoint cluster-wide policy enforcement (Gatekeeper/Kyverno/Pod Security) to admit previously-blocked privileged or malicious workloads, or set failurePolicy/scope to deny legitimate operations.
