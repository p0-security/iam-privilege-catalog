name: AI Manager events
description: Kubernetes-style Event objects for an AKS AI Manager, recording operational activity such as scheduling decisions, pod/node lifecycle transitions, warnings, and errors within the cluster.
scope: MEDIUM
notes: Events are low-sensitivity, often ephemeral diagnostic/activity records rather than the organization's primary data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:logs
    notes: Deleting events removes the operational/activity trail used for monitoring and incident response, erasing evidence of attacker actions and disrupting forensic visibility.
  read:
    risks:
      - discovery:infra
    scope: LOW
    notes: Reading/listing events enumerates cluster activity and resource state, providing reconnaissance into the AI Manager's operations without exposing secrets or organizational data.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating events lets an attacker inject or alter operational event records to mislead operators and obscure activity in the cluster's monitoring stream.
