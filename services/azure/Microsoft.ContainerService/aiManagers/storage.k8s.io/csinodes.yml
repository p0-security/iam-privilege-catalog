name: AKS CSINode objects (Kubernetes storage)
description: Kubernetes cluster-scoped CSINode objects within an AKS AI Manager, recording which CSI storage drivers are registered on each node along with topology keys and per-driver volume-attach limits.
scope: MEDIUM
notes: Data-plane (Kubernetes) objects used by the scheduler for volume attachment decisions; they hold storage-topology configuration metadata, not organizational data or secrets.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:infra
      - impact:dos
    notes: Deleting CSINode objects removes node storage-driver registration the scheduler relies on, breaking volume attachment/scheduling and denying storage to stateful workloads.
  write:
    risks:
      - impact:manipulation
    notes: Creating/updating CSINode objects falsifies the cluster's node-to-driver/topology view, manipulating scheduler decisions for volume attachment and provisioning.
