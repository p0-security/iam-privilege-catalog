name: Kubernetes core API (v1) discovery
description: The Kubernetes /api/v1 discovery endpoint enumerates the core API group's resource types and their supported verbs.
scope: LOW
notes: Returns only API surface metadata, no resource content.
links:
  - https://azure.permissions.cloud/iam/Microsoft.ContainerService
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:infra
    notes: Reading the api/v1 discovery endpoint lists the core API resources available, basic reconnaissance of cluster API capabilities.
