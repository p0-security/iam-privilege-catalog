name: Policy set definition version
description: A policy set definition (initiative) version is a versioned bundle of Azure Policy rules that, when assigned, enforces governance/compliance controls (audit/deny/deployIfNotExists effects). The definition itself is inert until assigned.
scope: MEDIUM
notes: Governance/compliance guardrail configuration; the definition is a control-plane artifact whose enforcement depends on a separate assignment, hence MEDIUM-tier.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - destruction:defense
    notes: Deleting a policy set definition version removes governance/compliance enforcement logic (audit/deny initiatives), destroying the policy and disabling the security control it provided.
  read:
    risks:
      - discovery:policy
    notes: Reading a policy set definition version exposes the governance/compliance rules that may be enforced, revealing controls and gaps an attacker could exploit.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating a policy set definition version alters governance policy logic (e.g. neutering deny/audit effects), manipulating the configuration and weakening security/compliance enforcement that assigned scopes depend on.
