name: PIM role eligibility schedule request
description: A Privileged Identity Management (PIM) role eligibility schedule request makes a principal eligible for an Azure RBAC role at a scope, creating a standing eligibility the principal can later activate (here, subject to approval).
scope: CRITICAL
notes: Operates on RBAC/identity controls; eligibility for a privileged role is a tenant/subscription-wide privilege-escalation primitive.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  write:
    risks:
      - escalation:privilege
      - persistence:account
    notes: Creating a role eligibility schedule request places a principal on the path to a (potentially privileged) RBAC role and establishes durable standing eligibility, even though final activation is approval-gated.
