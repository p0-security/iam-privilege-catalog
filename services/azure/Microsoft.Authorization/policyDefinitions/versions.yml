name: Azure Policy definition version
description: An Azure Policy definition version is an immutable, versioned copy of a custom policy definition — the governance/compliance rule template (audit/deny/modify/deployIfNotExists logic) that is enforced wherever the definition is assigned.
scope: HIGH
notes: A definition (version) is inert until referenced by a policy assignment, but its logic acts as a security/compliance guardrail across assigned scopes.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - destruction:defense
    notes: Deleting a policy definition version removes a governance/access-control policy artifact and disables the enforcement guardrail it provides where assigned.
  read:
    risks:
      - discovery:policy
    scope: LOW
    notes: Reading a policy definition version reveals the governance rule logic and effects, letting an attacker inventory enforcement controls and find gaps.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating a custom policy definition version can rewrite or soften the deny/audit/modify logic that assigned policies enforce, manipulating governance config and neutralizing a security guardrail.
