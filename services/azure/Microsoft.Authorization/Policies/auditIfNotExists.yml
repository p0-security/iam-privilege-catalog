name: Azure Policy evaluation effect
description: An internal Azure Policy engine effect-marker action emitted when a policy rule with a given effect (audit/auditIfNotExists/deny/deployIfNotExists) is evaluated against a resource. These represent evaluation outcomes recorded by the policy service, not management operations a principal directly invokes.
scope: LOW
notes: These effect markers are emitted by the Azure Policy engine during compliance evaluation; remediation deployments for deployIfNotExists run under the policy assignment's own managed identity, not under a principal holding this marker.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks: []
    notes: Records the outcome of an 'auditIfNotExists'-effect evaluation; an internal compliance notation with no standalone offensive capability.
