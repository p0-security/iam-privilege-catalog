name: Azure policy definitions
description: A policy definition describes a single Azure Policy rule (condition plus effect such as audit, deny, deployIfNotExists, or modify). It is a template that is inert until referenced by an assignment.
scope: MEDIUM
notes: Definitions are management-plane governance artifacts; enforcement only occurs via a separate assignment. Custom definitions can embed deployIfNotExists/modify logic that runs under an assigned managed identity.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - destruction:defense
    notes: Deleting a policy definition removes a governance/security rule construct, destroying the control and disabling the enforcement it would provide once assigned.
  read:
    risks:
      - discovery:policy
    scope: LOW
    notes: Reading a policy definition exposes the rule logic and effect, helping an attacker understand how a control works and where it can be evaded.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating a custom policy definition lets an attacker alter the rule logic or effect of a governance control; if already assigned, this can turn a deny/audit guardrail into a no-op, weakening defenses.
