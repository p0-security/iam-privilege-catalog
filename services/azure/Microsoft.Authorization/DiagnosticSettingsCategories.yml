name: Diagnostic settings categories
description: Diagnostic settings categories enumerate the log and metric category types that a given resource type is capable of emitting.
scope: LOW
notes: Read-only enumeration of logging capabilities; low-sensitivity metadata.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:logs
    notes: Lists which log/metric category types a resource supports, low-value reconnaissance of logging capabilities with no modification.
