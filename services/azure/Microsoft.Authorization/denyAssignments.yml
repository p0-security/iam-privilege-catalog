name: Azure deny assignments
description: A deny assignment is an RBAC primitive that explicitly blocks specified principals from performing specified actions at a scope, overriding any Allow role assignments. Deny assignments are created by Azure (e.g. Blueprints/managed apps) and govern the access-control fabric.
scope: CRITICAL
notes: Deny assignments override role grants and are a tenant access-control control; creating/removing them reshapes who can do what across a scope.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - escalation:privilege
    notes: Deleting a deny assignment removes an explicit-deny rule that was overriding Allow grants and blocking actions; lifting it unblocks the attacker's otherwise-denied actions, effectively escalating their access.
  write:
    risks:
      - impact:access
      - destruction:defense
    notes: Creating a deny assignment blocks other principals' authorized actions even if they hold Owner, letting an attacker lock out legitimate administrators/defenders while exempting themselves to entrench access.
