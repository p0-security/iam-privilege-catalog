name: Effective permissions
description: A read-only enumeration of the effective RBAC permissions (allowed/denied actions) the caller holds at a given scope.
scope: CRITICAL
notes: Reflects only the caller's own effective access surface within the RBAC system rather than the full tenant access graph.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Lists the permissions the caller holds at a scope, enabling reconnaissance of one's own effective access surface to plan escalation or pivots.
