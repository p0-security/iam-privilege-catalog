name: Provider operations catalog
description: A read-only catalog of all resource-provider operations (permissions) that can be referenced when authoring role definitions.
scope: LOW
notes: Largely static, essentially public reference metadata about the RBAC permission vocabulary.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Lists the universe of provider operations usable in role definitions, low-value reconnaissance that aids crafting privileged custom roles but exposes only static, non-sensitive catalog data.
