name: Azure policy set definitions (initiatives)
description: A policy set definition (initiative) is a reusable grouping of Azure Policy definitions that, once assigned to a scope, enforces governance and compliance rules. The definition itself is a template and is inert until referenced by an assignment.
scope: MEDIUM
notes: Definitions are management-plane governance artifacts; their security impact is indirect because enforcement only occurs via a separate assignment. Custom definitions can embed deployIfNotExists/modify logic.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
      - destruction:defense
    notes: Deleting an initiative removes a grouped governance/security control definition; deletion is normally blocked while assignments reference it, but removal tears down the policy construct and disables enforcement it would provide.
  read:
    risks:
      - discovery:policy
    scope: LOW
    notes: Reading an initiative definition discloses the governance/compliance rules it groups, letting an attacker map enforced controls and find coverage gaps.
  write:
    risks:
      - impact:manipulation
      - destruction:defense
    notes: Creating/updating a custom initiative alters the body of grouped governance rules; if the initiative is already assigned, weakening or neutering its rules undermines enforced security guardrails.
