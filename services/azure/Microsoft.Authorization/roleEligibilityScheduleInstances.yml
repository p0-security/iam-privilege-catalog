name: PIM role eligibility schedule instances
description: PIM role eligibility schedule instances represent the materialized eligibility entries indicating which principals are eligible to activate which Azure roles at a scope.
scope: CRITICAL
notes: Touches the identity/RBAC control surface; enumerating eligibility exposes privilege-escalation paths.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading these instances enumerates which principals are eligible to activate privileged roles, exposing escalation targets in the access-control configuration.
