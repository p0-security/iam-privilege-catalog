name: PIM role eligibility schedule
description: A role eligibility schedule represents an active (current or scheduled) PIM eligibility for a principal to activate a privileged RBAC role at a scope. Reading it enumerates who is eligible for which roles.
scope: CRITICAL
notes: Discloses the privilege-escalation map of the subscription/tenant (who can elevate into what), useful for targeting.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading enumerates which principals are eligible for which privileged roles and at what scope, exposing escalation pathways and access-control weak points.
