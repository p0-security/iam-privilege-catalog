name: PIM role assignment schedule
description: A role assignment schedule represents an active (current or scheduled) PIM-managed RBAC role assignment for a principal at a scope. Reading it enumerates who currently holds which privileged roles.
scope: CRITICAL
notes: Discloses the live privileged-access map of the subscription/tenant, useful for targeting escalation and lateral movement.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading enumerates active and scheduled RBAC assignments and their principals at a scope, disclosing the access-control posture and where privilege is concentrated.
