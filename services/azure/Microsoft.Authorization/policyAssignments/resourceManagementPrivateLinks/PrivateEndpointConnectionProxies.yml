name: Resource Management Private Link private endpoint connection proxy
description: A private endpoint connection proxy under a Resource Management Private Link mediates and represents the private-endpoint connection plumbing between a private endpoint and the ARM management private link.
scope: MEDIUM
notes: A network-connectivity sub-component of the resource management private link; sensitivity tracks supporting management-plane network infrastructure.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:network
    notes: Deleting the connection proxy tears down a private-endpoint network connectivity component, which can disrupt private connectivity to the management plane.
  read:
    risks:
      - discovery:network
    notes: Reading the connection proxy enumerates the private-endpoint connection plumbing for the management private link, providing network reconnaissance.
  write:
    risks:
      - escalation:network
      - impact:manipulation
    notes: Creating or updating the connection proxy provisions/alters the private-endpoint binding to the management private link, enabling network movement and manipulation of the connectivity configuration.
