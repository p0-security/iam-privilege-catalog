name: PIM role assignment schedule instances
description: Privileged Identity Management (PIM) role assignment schedule instances represent the materialized, time-bound active RBAC role assignments at a scope. They record which principals currently hold which Azure roles and over what window.
scope: CRITICAL
notes: Touches the identity/RBAC control surface; enumerating active privileged assignments directly reveals high-value targets for compromise and escalation.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading these instances inventories who holds active/scheduled privileged role assignments at a scope, which is access-control reconnaissance identifying privileged principals.
