name: Azure Authorization provider operations catalog
description: A static, provider-published catalog of the REST API operations exposed by the Microsoft.Authorization resource provider. It contains no tenant-specific data.
scope: PUBLIC
notes: Public reference metadata; identical for every tenant.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks: []
    notes: Returns only the static list of available provider operations; it discloses no tenant resources or configuration and grants no attacker capability.
