name: Management lock
description: A management lock (CanNotDelete or ReadOnly) applied at a scope to prevent deletion or modification of resources by any principal.
scope: MEDIUM
notes: Locks are a governance/protective control; the asset's sensitivity is supporting/governance rather than primary data.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  delete:
    risks:
      - destruction:policy
    notes: Deleting a management lock removes the protective control that would otherwise block deletion or modification, clearing the way for downstream destructive actions.
  write:
    risks:
      - impact:access
    notes: Adding a CanNotDelete or ReadOnly management lock can block authorized operators from modifying or deleting resources, denying legitimate operational access while protecting attacker-controlled state.
