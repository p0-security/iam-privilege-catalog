name: PIM role management policy
description: A PIM role management policy defines the activation rules and guardrails (MFA, approval, justification, maximum activation duration, notifications) governing how eligible principals activate privileged Azure roles.
scope: CRITICAL
notes: Directly governs how privileged-role activation is controlled; weakening it enables tenant/subscription-wide privilege escalation, hence a CRITICAL-tier asset.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  read:
    risks:
      - discovery:policy
    notes: Reading the policy discloses activation guardrails (MFA/approval/justification requirements), revealing weakly-protected privileged roles.
  write:
    risks:
      - escalation:privilege
      - destruction:defense
    notes: Updating the policy lets an attacker remove MFA/approval/justification requirements or extend activation durations on privileged roles, easing privilege escalation and disabling the defensive controls guarding PIM activation.
