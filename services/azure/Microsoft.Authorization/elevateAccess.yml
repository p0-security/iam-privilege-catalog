name: Tenant access elevation
description: A tenant-scope administrative action that self-assigns the caller the User Access Administrator role at the root (tenant) scope, granting authority to manage role assignments across every subscription in the tenant.
scope: CRITICAL
notes: This is the canonical Azure privilege-escalation primitive; once elevated, the caller can assign any role (including Owner) anywhere in the tenant.
links:
  - https://azure.permissions.cloud/iam/Microsoft.Authorization
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations
privileges:
  action:
    risks:
      - escalation:privilege
      - escalation:lateral
    notes: Self-elevates to User Access Administrator at tenant root scope, directly escalating privilege and enabling the attacker to subsequently assign roles to themselves or any controlled identity tenant-wide.
