  CreateAlias:
    risks:
      - impact:access  # Creating an alias can allow redirection of function invocations, potentially enabling persistence or evasion if an attacker points an alias to malicious code
    scope: MEDIUM  # Aliases themselves do not grant code execution, but can be used to facilitate attacks
  CreateCodeSigningConfig:
    risks:
      - impact:access  # Creating a code signing config can allow an attacker to control which code is trusted for deployment, potentially enabling persistence or evasion
    scope: MEDIUM  # Does not directly execute code, but can affect code integrity
  CreateEventSourceMapping:
    risks:
      - impact:access  # Can connect new event sources to functions, potentially enabling persistence or privilege escalation if attacker can trigger function execution
    scope: HIGH  # Can be used to trigger functions in response to attacker-controlled events
  CreateFunction:
    risks:
      - execution:code  # Allows creation of new Lambda functions, enabling arbitrary code execution (MITRE: Initial Access, Execution)
      - persistence:cloud  # Can be used to establish persistence in the environment
    scope: CRITICAL  # Direct code execution and persistence
  CreateFunctionUrlConfig:
    risks:
      - impact:access  # Exposes function via HTTP endpoint, potentially increasing attack surface
    scope: HIGH  # Can expose functions to the public internet
  DeleteAlias:
